<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digtionary — 디그 용어사전</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --primary:#0A2342;
  --primary-light:#0d2d52;
  --accent:#00C896;
  --accent-dim:rgba(0,200,150,.15);
  --bg:#F4F6F9;
  --card-bg:#fff;
  --text:#1A1D2E;
  --text-light:#6B7280;
  --border:#E5E7EB;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.06);
  --shadow-hover:0 8px 32px rgba(0,0,0,.12);
  --radius:16px;
  --radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── 헤더 ── */
header{background:var(--primary);position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.25)}
.header-top{display:flex;align-items:center;gap:20px;padding:13px 32px}
.logo{text-decoration:none;display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.logo-sub{font-size:10px;font-weight:600;color:rgba(255,255,255,.4);letter-spacing:.14em;text-transform:uppercase;line-height:1}
.logo-main{font-size:21px;font-weight:900;line-height:1.1;letter-spacing:-.4px;white-space:nowrap}
.logo-main .dig{color:var(--accent);font-style:normal}
.logo-main .tionary{color:#fff;font-style:normal}
.search-wrap{flex:1;max-width:540px;position:relative}
.search-wrap input{width:100%;padding:10px 42px 10px 42px;border:none;border-radius:100px;background:rgba(255,255,255,.12);color:#fff;font-size:14.5px;font-family:inherit;outline:none;transition:background .2s,box-shadow .2s}
.search-wrap input::placeholder{color:rgba(255,255,255,.4)}
.search-wrap input:focus{background:rgba(255,255,255,.2);box-shadow:0 0 0 2px var(--accent)}
.si{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.55;pointer-events:none}
.sc{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;width:22px;height:22px;border-radius:50%;font-size:14px;cursor:pointer;line-height:1;display:none;align-items:center;justify-content:center;transition:background .15s}
.sc:hover{background:rgba(255,255,255,.3)}
.header-meta{color:rgba(255,255,255,.5);font-size:13px;white-space:nowrap;margin-left:auto}
.header-meta strong{color:rgba(255,255,255,.9)}

/* ── 카테고리 탭 ── */
.cat-nav{display:flex;gap:0;padding:0 26px;overflow-x:auto;scrollbar-width:none}
.cat-nav::-webkit-scrollbar{display:none}
.cat-btn{padding:9px 16px 10px;border:none;background:transparent;color:rgba(255,255,255,.5);font-size:13.5px;font-weight:500;font-family:inherit;cursor:pointer;white-space:nowrap;border-bottom:2.5px solid transparent;transition:all .18s;letter-spacing:-.1px}
.cat-btn:hover{color:rgba(255,255,255,.85)}
.cat-btn.active{color:#fff;border-bottom-color:var(--accent)}

/* ── 초성 네비 ── */
.alpha-nav{background:#fff;border-bottom:1px solid var(--border);padding:7px 32px;display:flex;gap:1px;flex-wrap:wrap;align-items:center}
.alpha-label{font-size:10.5px;font-weight:700;color:var(--text-light);letter-spacing:.6px;text-transform:uppercase;margin-right:8px;flex-shrink:0}
.alpha-btn{padding:4px 8px;border:none;background:none;font-size:12.5px;color:var(--text-light);cursor:pointer;border-radius:6px;transition:all .15s;font-weight:500;font-family:inherit}
.alpha-btn:hover{background:var(--bg);color:var(--primary)}
.alpha-btn.active{background:var(--primary);color:#fff}
.alpha-sep{width:1px;height:14px;background:var(--border);margin:0 8px;flex-shrink:0}
.alpha-reset{color:#EF4444!important;font-size:12px}

/* ── 메인 ── */
.main{max-width:1440px;margin:0 auto;padding:26px 32px}
.results-bar{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.results-count{font-size:13.5px;color:var(--text-light)}
.results-count strong{color:var(--text);font-weight:700}
.sort-sel{margin-left:auto;padding:7px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);background:#fff;cursor:pointer;outline:none;font-family:inherit}
.sort-sel:hover{border-color:#aaa}

/* ── 카드 그리드 ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(288px,1fr));gap:14px}

.card{background:var(--card-bg);border-radius:var(--radius);padding:20px 22px 16px;cursor:pointer;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s,border-color .2s;border:1.5px solid transparent;position:relative;overflow:hidden;display:flex;flex-direction:column}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--cat-color,#ccc);opacity:0;transition:opacity .2s;border-radius:var(--radius) var(--radius) 0 0}
.card:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px);border-color:var(--border)}
.card:hover::after{opacity:1}
.card--global{--cat-color:#3B82F6}.card--finance{--cat-color:#10B981}.card--policy{--cat-color:#8B5CF6}.card--business{--cat-color:#F59E0B}.card--society{--cat-color:#EF4444}.card--realestate{--cat-color:#06B6D4}.card--macro{--cat-color:#F97316}.card--monetary{--cat-color:#6366F1}

.card-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.card-terms{flex:1;min-width:0}
.card-name{font-size:17px;font-weight:800;color:var(--primary);line-height:1.35;letter-spacing:-.2px;word-break:break-word}
.badge{padding:3px 9px;border-radius:100px;font-size:10.5px;font-weight:700;white-space:nowrap;flex-shrink:0;margin-top:3px;letter-spacing:.02em}
.badge--global{background:#EFF6FF;color:#1D4ED8}.badge--finance{background:#ECFDF5;color:#065F46}.badge--policy{background:#F5F3FF;color:#5B21B6}.badge--business{background:#FFFBEB;color:#92400E}.badge--society{background:#FEF2F2;color:#991B1B}.badge--realestate{background:#ECFEFF;color:#0E7490}

.card-snippet{font-size:13px;color:#6B7280;line-height:1.65;flex:1 1 auto;min-height:calc(1.65em * 2);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.card-snippet.no-def{color:#C4C9D4;font-style:italic}
.card-foot{margin-top:12px;padding-top:10px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px}
.card-date{font-size:11.5px;color:var(--text-light);margin-left:auto}
.def-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;box-shadow:0 0 0 2px var(--accent-dim)}

/* ── 빈 상태 ── */
.empty{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--text-light)}
.empty-icon{font-size:52px;margin-bottom:14px;opacity:.7}
.empty h3{font-size:17px;color:var(--text);margin-bottom:6px;font-weight:700}
.empty p{font-size:14px}

/* ── 모달 ── */
.overlay{position:fixed;inset:0;background:rgba(10,35,66,.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:200;display:flex;align-items:flex-start;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;width:620px;max-width:94vw;height:100vh;overflow-y:auto;overflow-x:hidden;box-shadow:-12px 0 48px rgba(0,0,0,.16);transform:translateX(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column}
.overlay.open .modal{transform:translateX(0)}

.modal-hd{padding:22px 26px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:#fff;z-index:10}
.modal-nav{display:flex;align-items:center;gap:6px;margin-bottom:16px}
.mnav-btn{background:none;border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:8px;font-size:12.5px;font-family:inherit;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:3px;font-weight:500}
.mnav-btn:hover:not(:disabled){background:var(--bg);border-color:#bbb}
.mnav-btn:disabled{opacity:.3;cursor:default}
.mnav-pos{font-size:12px;color:var(--text-light);padding:0 4px}
.mclose{margin-left:auto;background:none;border:none;width:32px;height:32px;border-radius:8px;font-size:18px;cursor:pointer;color:var(--text-light);display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.mclose:hover{background:var(--bg);color:var(--text)}

.modal-name{font-size:26px;font-weight:900;color:var(--primary);letter-spacing:-.5px;line-height:1.25;word-break:break-word}
.modal-meta{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.modal-date{font-size:12.5px;color:var(--text-light)}
.modal-copy{display:flex;align-items:center;gap:5px;margin-left:auto;background:none;border:1px solid var(--border);color:var(--text-light);font-size:12px;font-family:inherit;padding:5px 11px;border-radius:8px;cursor:pointer;transition:all .15s;font-weight:500}
.modal-copy:hover{background:var(--bg);color:var(--text);border-color:#bbb}
.modal-copy.copied{color:var(--accent);border-color:var(--accent);background:var(--accent-dim)}

.modal-bd{padding:28px 26px 40px;flex:1}

/* ── 정의 콘텐츠 ── */
.def-content{font-size:16px;line-height:2;color:#374151;word-break:break-word}
.def-content p{margin-bottom:1.1em}
.def-content p:last-child{margin-bottom:0}
.def-no-content{text-align:center;padding:48px 20px;color:var(--text-light)}
.def-no-content .dni{font-size:40px;margin-bottom:12px;opacity:.5}
.def-no-content h4{font-size:16px;color:var(--text);margin-bottom:6px;font-weight:700}
.def-no-content p{font-size:13.5px;line-height:1.7}

/* ── 로딩 ── */
.loading{display:flex;align-items:center;gap:12px;padding:40px 0;color:var(--text-light);font-size:14.5px}
.spinner{width:20px;height:20px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

mark{background:rgba(0,200,150,.22);color:inherit;border-radius:2px;padding:0 1px}

/* ── TOP 버튼 ── */
.go-top{position:fixed;bottom:28px;right:28px;width:42px;height:42px;background:var(--primary);color:#fff;border:none;border-radius:50%;font-size:17px;cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,.22);transition:all .2s;display:none;align-items:center;justify-content:center;z-index:150}
.go-top.vis{display:flex}
.go-top:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(0,0,0,.28)}

/* ── 반응형 ── */
@media(max-width:768px){
  .header-top{padding:11px 16px;gap:12px}
  .header-meta{display:none}
  .cat-nav{padding:0 14px}
  .alpha-nav{padding:6px 16px}
  .main{padding:16px 14px}
  .grid{grid-template-columns:1fr;gap:12px}
  .modal{width:100vw;max-width:100vw}
  .modal-hd{padding:18px 18px 14px}
  .modal-bd{padding:22px 18px 36px}
}
@media(max-width:420px){
  .modal-name{font-size:22px}
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <a class="logo" href="#">
      <span class="logo-sub">디그 용어사전</span>
      <span class="logo-main"><em class="dig">Dig</em><em class="tionary">tionary</em></span>
    </a>
    <div class="search-wrap">
      <svg class="si" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35" stroke-linecap="round"/></svg>
      <input id="searchInput" type="text" placeholder="용어·내용 검색... (예: OPEC, 금리, 반도체)" autocomplete="off">
      <button class="sc" id="scBtn" onclick="clearSearch()">✕</button>
    </div>
    <div class="header-meta">총 <strong id="totalCount">0</strong>개 용어</div>
  </div>
  <nav class="cat-nav" id="catNav"></nav>
</header>

<div class="alpha-nav" id="alphaNav"></div>

<main class="main">
  <div class="results-bar">
    <div class="results-count" id="rcnt"></div>
    <select class="sort-sel" id="sortSel" onchange="renderGrid()">
      <option value="newest">최신순</option>
      <option value="alpha">가나다/ABC순</option>
      <option value="id-asc">번호순 (오래된)</option>
    </select>
  </div>
  <div class="grid" id="grid"></div>
</main>

<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-hd">
      <div class="modal-nav">
        <button class="mnav-btn" id="mPrev" onclick="navModal(-1)">← 이전</button>
        <span class="mnav-pos" id="mPos"></span>
        <button class="mnav-btn" id="mNext" onclick="navModal(1)">다음 →</button>
        <button class="mclose" onclick="closeModal()" title="닫기 (Esc)">✕</button>
      </div>
      <div class="modal-name" id="mName"></div>
      <div class="modal-meta" id="mMeta"></div>
    </div>
    <div class="modal-bd" id="mBd"></div>
  </div>
</div>

<button class="go-top" id="goTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="맨 위로">↑</button>

<script>
// =====================================================
// 설정
// =====================================================
const API_URL = 'https://dig.mk.co.kr/event_handler.html?mode=ajax&type=NEWSTERM';

// =====================================================
// 사전 내장 정의 (로그인 없이도 표시)
// =====================================================
const DEFS = {
  '워런 버핏': {
    title: '워런 버핏',
    content: `세계에서 가장 유명한 투자 전문가는 누구일까요. 여러 사람에게 같은 질문을 했을 때 제일 많이 등장할 이름은 '워런 버핏(Warren Buffett)'이 아닐까 싶은데요. 1930년생인 그는 90대의 나이에도 여전히 활발하게 활동하는 '투자의 대가'죠.

버핏의 투자 회사인 '버크셔 해서웨이'는 1964년부터 2022년까지 378만 7464%의 수익률을 올렸다고 해요. 지난해에 경매 매물로 나온 '버핏과의 점심 기회'는 1900만 달러(약 250억원)에 낙찰됐다고 해요.

버핏은 경기 침체기에 과감하게 투자하는 것으로 유명해요. 다른 투자자들이 불안한 마음에 자산을 팔 때, 오히려 싼 값에 자산을 매수해 장기간 보유하는 거죠. 대표적인 사례가 미국의 대형 은행인 뱅크오브아메리카(BoA)에 투자한 건데요. 세계 금융 위기가 닥쳤던 2008년에 그는 BoA 지분을 싼값에 대거 사들였고, 이후 이 회사의 주가는 꾸준히 상승 중이에요.

버핏은 경쟁사가 넘보기 힘든 경쟁력을 갖춘 '1등 기업'에 투자하는 걸 선호하는 것으로 알려졌어요. 버핏은 1988년부터 코카콜라에 투자하기 시작했어요. 그의 투자 회사가 코카콜라 투자로 올린 수익률이 1000만%에 이를 것이라는 분석도 나오죠. 버크셔 해서웨이는 2016년부터 애플에도 투자하고 있어요.

2008년 세계 금융위기 당시에 그는 신문에 '미국 기업을 사라, 나는 그렇게 하고 있다'라는 글을 기고해 화제를 모았죠. 실제로 당시 투자자들의 투자 심리가 회복되는 효과를 봤다고 해요. 최근 장기 투자의 대가인 버핏이 일본 회사에 대한 투자를 늘리고 있다는 사실이 알려진 게 일본 기업들의 주가 상승에 영향을 미쳤다는 분석도 나와요.`
  },
  '투자은행(IB)': {
    title: '투자은행(IB)',
    content: `투자은행(IB, Investment Bank)은 기업의 장기 자금 조달, 인수·합병(M&A) 같은 중개 업무를 하는 금융기관을 말해요. 주로 자금을 필요로 하는 기업들과 투자할 곳을 찾는 기업들을 연결해 주는 역할을 하죠.

우리가 국내에서 보통 '은행'이라고 부르는 곳은 일반 예금이나 대출을 취급하는 상업은행(CB, Commercial Bank)이에요. 상업은행은 고객의 예금을 받고 대출해주는 걸 주 업무로 삼지만, 투자은행은 고객의 예금을 받지 않아요.

투자은행은 주식이나 채권 등 다양한 자산을 사들이고 판매하면서 기업에 장기 자금을 공급하는 일은 물론, 기업의 인수·합병, 증권·채권 발행, 자산 운용 등 여러 문제에 대해 자문도 하는 기업 금융 전문기관이에요.

한 번쯤 들어보셨을 법한 골드만삭스(Goldman Sachs), 모건스탠리(Morgan Stanley), JP모건체이스(JPMorgan Chase), 씨티그룹(Citi Group), BoA메릴린치(Bank of America Merrill Lynch) 등이 미국의 대표적인 투자은행이에요.

우리나라에서는 투자은행이 발전하기 시작한 지 얼마 되지 않았어요. 국내의 경우 증권사의 IB 담당 조직이 해외의 투자은행에 해당하는데요, 2008년 세계 금융 위기 이후 정부 차원의 증권사 대형화 정책이 추진되면서 투자은행을 육성하기 시작했어요.`
  },
  '투자은행': {
    title: '투자은행',
    content: `투자은행(IB, Investment Bank)은 기업의 장기 자금 조달, 인수·합병(M&A) 같은 중개 업무를 하는 금융기관을 말해요. 주로 자금을 필요로 하는 기업들과 투자할 곳을 찾는 기업들을 연결해 주는 역할을 하죠.

우리가 국내에서 보통 '은행'이라고 부르는 곳은 일반 예금이나 대출을 취급하는 상업은행(CB, Commercial Bank)이에요. 투자은행은 고객의 예금을 받지 않아요.

투자은행은 주식이나 채권 등 다양한 자산을 사들이고 판매하면서 기업에 장기 자금을 공급하는 일은 물론, 기업의 인수·합병, 증권·채권 발행, 자산 운용 등 여러 문제에 대해 자문도 하는 기업 금융 전문기관이에요.

  },
  '검은 ○요일이란?': {
    title: '검은 ○요일이란?',
    content: `경제 기사를 읽다 보면 '검은 월요일(Black Monday)'이라는 표현이 종종 등장하죠. 이 표현이 널리 사용되기 시작한 건 1987년이에요. 그해 10월 19일 미국 증권 시장의 대표 주가지수인 다우존스산업평균지수가 하루 만에 22.6%나 폭락했는데요. 사상 최대 하락률이었고 이 기록은 아직도 깨지지 않고 있어요.

전날까지만 해도 미국 주식 시장 분위기가 좋았기 때문에 이런 일이 발생할 거라 예상한 사람은 거의 없었대요. 당연히 투자자들은 큰 충격을 받았고, 엄청난 손해를 감당해야 했어요. 영국이나 일본, 홍콩 등 당시 주요국의 주가지수도 폭락했죠.

이보다 앞선 시점에도 주식 시장이 큰 충격을 받은 적이 있었어요. 세계적인 경제 대공황이 발생한 1929년, 그해 10월 28일에 미국 증시가 하루 만에 10% 이상 하락했어요. 그리고 투자자들에게 충격을 안겼던 1929년과 1987년의 두 날이 모두 공교롭게도 월요일이었기 때문에 많은 사람이 '검은 월요일'이라는 표현을 쓰기 시작했대요.

이후 미국은 물론 전 세계에서 월요일에 주가가 큰 폭으로 하락하면 검은 월요일이라는 말을 자주 쓰고 있어요. 꼭 월요일이 아니더라도 주식 시장 분위기가 안 좋은 날이면 '검은 ○요일'이라고 부르기도 하고요. 이젠 주식 시장뿐 아니라 경제 분야 어디서든 큰 충격이 발생하면 일반적으로 사용하는 표현이 됐어요.`

  '상·하원': {

    content: `국회의원의 종류가 하나뿐인 우리나라와 달리, 일부 국가들은 국회의원의 종류를 둘로 구분한 제도를 채택하고 있어요. 한국과 같은 제도를 '단원제'나 '일원제'라고 부르고, 두 종류의 의원을 두는 제도는 '양원제' 또는 '이원제'로 불러요.

그래서 모든 주에서 같은 수로 뽑는 '상원(The Senate)'과 인구수에 비례해 선출하는 '하원(The House of Representatives)'을 나누게 됐어요. 미국에서 상원은 각 '주 정부'와 '주 의회'를 대표하는 기관이고, 하원은 '주민'들을 대표하는 기관이에요.

  '자회사': {

    content: `기업 관련 뉴스를 보다 보면 '계열사'나 '자회사' 같은 용어들이 자주 등장합니다.

  '연방준비제도이사회(FRB)': {
    title: '연방준비제도이사회(FRB)',
    content: `경제 기사를 보면 FOMC나 FRB, Fed 같은 단어들이 많이 나오는데요. 한국말로 번역해도 다 '연방'이 붙어서 헷갈리게 생겼어요. 이 용어들은 미국의 독특한 중앙은행 시스템인 연방준비제도(Fed)에서 나온 것들이에요. 여기서 결정하는 경제정책은 우리나라 경제에도 막대한 영향을 미쳐요.

Fed는 연방준비은행, 연방준비제도이사회(FRB), 연방공개시장위원회(FOMC) 등으로 구성돼요.

• 연방준비은행
우리나라 중앙은행은 한국은행 한 곳뿐이지만 미국은 중앙은행 역할을 하는 연방준비은행이 12곳이나 돼요. 중앙에 집중된 결정 시스템을 기피하는 미국은 중앙은행도 국토를 12개로 나눠 구역마다 배치했어요. 보통 연방준비제도(Fed)를 미국의 중앙은행이라고 하는데, 정확히 말하면 Fed는 12곳의 중앙은행이 모인 '중앙은행 시스템'이라고 볼 수 있어요.

• 연방준비제도이사회(FRB)
FRB는 중앙은행 시스템인 Fed의 최고의사결정기구예요. 가장 핵심적인 역할을 하는 곳이죠. 앞서 설명한 12곳의 연방준비은행을 관리·감독해요. FRB 위원은 7명으로 구성되고 이들은 모두 미국 대통령이 직접 임명하죠. 뉴스에서 자주 등장하는 '제롬 파월'은 바로 FRB의 의장이에요.

• 연방공개시장위원회(FOMC)
FRB 산하 위원회인 FOMC는 6주마다 한 번 씩, 1년에 8번의 정례회의를 개최해요. 여기서 미국의 기준금리를 결정하죠.

    content: `5만원권 지폐를 얼마나 찍어낼지는 어디서 결정할까요? 물론 우리나라 중앙은행인 한국은행이죠. 엔화는 일본은행에서, 파운드화는 영란은행(잉글랜드 은행)에서 결정해요.

그렇다면 달러화는 어떨까요? 달러 발행은 연방준비제도(Fed)라고 불리는 미국의 중앙은행 역할을 하는 기구에서 해요.

여러 주(State)가 모여 하나의 국가를 이루는 미국은 독립적인 단일 기관 대신, 각 지역을 담당하는 12개의 연방준비은행 등이 모여 연방준비제도를 구성해요. 미국은 태생적으로 중앙에 집중된 결정 시스템을 기피하는 경향이 있는데요. 연방준비제도라는 다소 생소한 이름도 미국의 독특한 국가 시스템 때문에 탄생한 거예요.

연방준비제도는 달러를 발행하고 기준금리를 결정하는 등 시중에 돌아다니는 달러화의 유통량을 조절해 미국의 경제상황을 관리해요. 궁극적인 목표는 미국의 물가를 안정시키고 적정한 고용수준을 유지하는 거죠. 다만 달러화는 국적이 다른 기업 간의 거래나 글로벌 금융 시장에서 기준으로 사용되기 때문에, 연방준비제도의 결정이 사실상 전 세계 경제에 막대한 영향을 미치게 돼요.`

    content: `국제유가는 어떻게 정해지는 걸까요? 물론 가치가 달라지는 게 당연하긴 한데, 주식 가격처럼 예민하게 시시각각 바뀌는 건 신기하게 느껴지기도 하잖아요.

'선물'은 미래의 특정 시점에 물건을 넘겨주겠다는 약속을 하고, 미리 가격을 정해서 체결하는 거래를 말해요. 한자로는 먼저 선(先)에 물건 물(物). 영어로는 'Futures'거든요. 결국 미래에 대한 거래라는 거죠.

선물 거래의 개념을 설명할 땐 농촌에서 이뤄지는 '밭떼기' 계약을 예로 많이 들어요. 보통 배추 같은 농작물들은 아직 다 자라지 않아 수확이 끝나지 않은 시점에 도매상과 밭 단위로 미리 거래를 해요. "제가 한 달 후에 포기당 3000원에 A농장 배추를 살게요"라고 약속하는 거예요.

그런데 막상 한 달 후가 되면 배추의 가격은 4000원이 될 수도 있고, 2000원이 될 수도 있어요. 배춧값이 4000원으로 오르면 미리 계약한 도매상은 돈을 더 벌게 돼요. 반면 2000원으로 떨어졌다면 손해를 보죠.

왜 굳이 수확 전에 미리 사고파냐고요? 배추를 키우는 사람은 최소한 받아야 하는 돈이 있을 거예요. 선물 거래를 하면 손해를 보지 않도록 3000원은 보장받는 '위험 회피'를 할 수 있는 거죠. 배추를 사는 사람은 값이 오르거나 내리는 위험을 감수하지만 나중에 큰 이익을 볼 수도 있는 일종의 '투자'를 하는 셈이에요.

이런 원리를 금융 시장에 그대로 적용한 것이 선물 시장이에요. 석유나 천연가스, 금이나 구리, 알루미늄 같은 금속, 밀과 쌀 같은 곡식처럼 수요가 항상 충분한 상품들은 금융 시스템과 연결된 '선물 시장'에서 거래하게 된 거죠. 이런 선물 시장이 크게 형성돼 있기 때문에 투자자들의 돈이 주요 상품 거래소(뉴욕, 런던, 도쿄 등)에 모여 있고, 각 상품들의 국제적인 시세도 아주 예민하게 반응해요.`
  },
  '소비자물가(CPI)': {
    title: '소비자물가(CPI)',
    content: `경제 기사를 읽다보면 소비자물가지수(CPI · Consumer Price Index)라는 용어가 자주 나와요. 소비자물가지수는 우리가 일상에서 소비하는 상품과 서비스의 가격 변동을 측정한 지수예요. 우리나라는 통계청이 매달 집계해 발표하죠. 기준 시점을 100으로 두고 물가의 높고 낮은 정도를 나타내요.

소비자물가지수의 정확도를 높이기 위해선 어떤 품목을 조사 대상으로 넣는지가 중요해요. 현재 측정하는 상품과 서비스는 총 460개예요. 배추나 달걀, 돼지고기, 휘발유, 라면, 화장품, 전기요금, 휴대전화요금, 보험료 등등 다양하죠. 여기에 각 품목이 일반적인 소비 지출에서 차지하는 비중을 고려해 가중치를 반영해요.

그래서 통계청은 5년마다 조사 대상 품목과 가중치를 조정하고 있어요. 예를 들면 사람들이 많이 사용하게 된 식기세척기는 조사 품목에 새롭게 넣고, 이제 잘 쓰지 않는 연탄은 뺀다거나 하는 식이죠.

일반적으로 사람들은 적게 오르거나 하락한 품목보다는 많이 오른 품목을 중심으로 물가 변동을 인식하는 경향이 있어요. 우리나라 소비자물가지수에는 사람들의 경제생활에서 차지하는 비중이 큰 집값이 포함되지 않는다고 해요. 또 요즘 급격히 늘어난 배달료도 외식·택배비의 일부로만 반영돼 있어 우리가 실제 느끼는 부담을 반영 못한다는 의견도 있죠.

기업들이 가격을 올리는 대신 제품 용량을 줄이거나 서비스의 질을 낮추는 방법으로 간접적으로 가격 인상을 하는 경우도 있어요. 이런 행위를 막기 위해 각국 통계청은 제품의 가격과 용량을 함께 조사하고 있지만 기업들의 방식도 점점 교묘해지고 있대요.`
  },
  'RE100(재생에너지 100% 사용)': {
    title: 'RE100(재생에너지 100% 사용)',
    content: `RE100은 재생 에너지 사용을 확대하자는 국제 프로젝트예요. 기업이 사용하는 전력의 100%를 재생 에너지(Renewable Energy)에서 얻자는 거죠. 여기서 말하는 재생 에너지에는 태양광·태양열과 풍력, 수력, 지열 등이 있는데요. 온난화의 원인인 탄소를 배출하지 않고 고갈될 염려 없이 지속해서 사용가능한 에너지들이죠. 원자력은 재생 에너지에 해당하지 않아요.

RE100은 2014년에 한 다국적 비영리 단체가 시작했어요. 기업들의 자발적인 참여로 진행되는 캠페인이에요. 그래서 국가 간 무역협정이나 조약처럼 국제법적 구속력은 없어요. 하지만 구글이나 애플, 샤넬, 스타벅스 같은 글로벌 기업들이 참여하면서 영향력이 커지고 있어요. 먼저 가입한 기업들이 아직 가입하지 않은 기업들에 참가를 요구하고, 참여하지 않으면 거래나 협력을 거부하기도 해서 반강제성을 띠고 있죠.

일부 기업들은 이미 RE100을 달성했는데요. 그렇다고 이들이 실제 사용하는 전력이 모두 재생에너지로 만들어진다는 의미는 아니에요. RE100은 일종의 우회로를 통해서도 달성할 수 있거든요. 재생 에너지 발전소는 환경친화적으로 전기를 생산했다는 의미에서 인증서를 받아요. RE100을 달성하고 싶은 기업은 화력발전소 전기를 쓰면서 재생 에너지 발전소에 돈을 주고 인증서를 살 수도 있어요.

최근엔 'CF100'이라는 것도 등장했어요. 탄소중립(Carbon-Free) 100%의 약자인데요. 정식 명칭은 '24/7 Carbon-Free Energy'예요. 24시간, 일주일(7일) 내내 사용하는 전력의 100%를 탄소를 배출하지 않는 에너지원으로부터 직접 공급받자는 의미죠. CF100은 인증서 구매 방식은 인정하지 않아요. 태양광·풍력으로 생산한 전력을 직접 공급받아야 하죠. 다만 원자력 발전을 통해 생산한 전력은 인정해요. CF100 달성을 목표로 하는 대표적인 기업은 구글이에요.`
  },
  'CES': {
    title: 'CES',
    content: `경제나 정보기술(IT) 관련 뉴스를 눈여겨보셨다면 'CES'라는 단어를 한 번쯤은 접하셨을 수도 있어요. CES는 국제 소비자 가전 전시회(The International Consumer Electronics Show)예요. 1967년 미국 뉴욕에서 시작된 행사고, 최근엔 매년 1월 미국 라스베이거스에서 열리고 있죠. 미국 소비자 기술협회(CTA)라는 단체가 주관하는 전시회예요.

이름에서 알 수 있듯이 CES는 원래 가전제품을 전시하던 행사였어요. 2000년대 초반까지만 하더라도 TV나 오디오 같은 일상생활에서 많이 사용되는 전자제품 신제품이 주로 소개됐죠.

행사의 성격이 바뀌기 시작한 건 2010년대부터예요. IT 기술이 급격하게 발달하면서 가전제품에 온갖 첨단 기술이 접목되기 시작했거든요. 이후로는 단순히 신제품을 전시하는 데 그치지 않고, 첨단 기업들이 각자의 기술력을 선보이는 행사로 거듭났죠.

'첨단기술' 하면 빠지지 않고 언급되는 인공지능(AI), 사물인터넷(IoT), 드론, 도심 항공 교통(UAM), 자율주행차, 가상현실(VR)·증강현실(AR), 5세대 이동통신(5G) 등의 기술들이 모두 CES를 통해 선을 보이면서 화제를 모았어요.

자동차 회사들은 매년 미래지향적 디자인의 콘셉트카를 선보이고 있어요. '사회·경제적 상호작용 수준이 높아진 디지털 기반 가상 세계'를 뜻하는 메타버스, 우리의 생활을 편리하게 만들어줄 각종 로봇들도 CES의 단골손님이에요.

CES는 독일 베를린에서 열리는 국제 가전 박람회(IFA), 스페인 바르셀로나에서 열리는 모바일 월드 콩그레스(MWC)와 더불어 '세계 3대 IT 전시회'로 꼽혀요. 삼성전자나 LG전자, 현대자동차 같은 한국 회사들은 물론, 마이크로소프트(MS), 애플, 인텔, 소니 등 누구나 알 만한 세계적인 기업들이 총출동해 기술력을 과시하는 자리가 됐죠.`
  },
  '닥터코퍼': {
    title: '닥터코퍼',
    content: `경기의 변동에 앞서 움직이는 경향이 있는 지표를 '경기 선행 지표'라고 하는데요. 구리(Copper) 가격은 대표적인 경기 선행 지표예요. 구리가 다양한 산업 분야에 사용되기 때문에 그 가격만 봐도 경제 상황이 어느 정도 예측할 수 있다는 거예요.

전기를 잘 통하는 구리는 전선 제조에 주로 사용돼요. 채굴된 구리의 약 절반 정도가 여기에 활용된다고 해요. 또 쉽게 구부리거나 자를 수 있어서 전기 장치나 전자 회로에 구리가 들어가요. 구리는 내구성이 높고 부식에 강해 건축 재료로도 널리 사용돼요. 송수관이나 지붕을 만들 때 구리를 사용하는 경우가 많죠. 자동차나 선박, 배터리를 만들 때 역시 구리가 활용돼요.

이렇게 구리가 광범위한 분야에 활용되다 보니 경기 변동을 미리 보여주는 경향이 있어요. 경기가 호황일 걸로 예상되면 기업들이 활발하게 생산 활동을 하면서 구리를 많이 찾겠죠. 그러면 구리 가격은 올라요. 반대로 경기가 부진할 걸로 보이면 구리 수요가 줄면서 가격이 내려가요. 그래서 구리 가격이 상승하면 경기 회복의 징후로, 반대로 구리 가격이 하락하면 경기 침체의 가능성이 있는 걸로 여겨요. 구리 가격이 향후 경기 상황을 미리 알려주는 경제 전문가와 같다는 의미로 '닥터 코퍼(Dr. Copper)'라는 표현을 사용하기도 해요.

실제 2000년 미국의 닷컴버블 붕괴, 2008년 글로벌 금융위기, 2019년 미·중 무역분쟁, 2020년 코로나19 확산처럼 큰 경제 위기가 있기 전 구리 가격은 크게 하락하는 모습을 보였어요.`
  },
  '일대일로(육·해상 실크로드) 프로젝트': {
    title: '일대일로(육·해상 실크로드) 프로젝트',
    content: `일대일로는 세계 곳곳에 경제적 거점을 확보해 경제 영토를 넓히겠다는 중국 정부의 대규모 장기 프로젝트예요. 중국 주도로 과거의 '실크로드(Silk road)'를 재현하겠다는 구상이죠.

실크로드는 과거 중국에서 중앙아시아를 거쳐 유럽을 연결하던 교역 경로인데요. 당시 대표적인 교역 상품이 비단(실크)이었기 때문에 붙은 이름이에요. 이 경로를 통해 아시아와 유럽 간 문물이 왕래했고, 실크로드 주변엔 경제 활성화에 따라 도시나 마을이 생겼다고 해요.

실크로드에서 영감을 얻은 일대일로 프로젝트는 2013년에 시진핑 중국 국가주석이 발표했어요. '일대'는 '하나의 띠', '일로'는 '하나의 길'을 뜻해요. 하나의 띠는 중앙아시아를 통해 유럽에 닿는 육상 실크로드를 만들겠다는 의미예요. 하나의 길은 동남아시아와 중동, 아프리카를 통해 유럽에 도달하는 해상 실크로드를 구축하겠다는 목표고요. 최근에는 중남미 지역까지 거점으로 확보하려는 노력을 하고 있어요.

중국은 교역로 확보를 위해 저개발 국가에 철도와 항만, 고속도로 같은 기반 시설들을 만들도록 장려하고 있어요. 이때 해당 국가들에 돈을 빌려주면서 영향력을 확대하고 있고요. 이렇게 중국으로부터 돈을 빌렸다가 어려움을 겪는 국가도 존재해요. 기반 시설 건설은 중국 기업과 노동자가 주도한 탓에 저개발 국가들은 일자리 창출 같은 부수적인 효과를 거의 누리지 못했기 때문이래요.`
  },
  '자율주행 레벨': {
    title: '자율주행 레벨',
    content: `차량 자율주행에는 기술 수준에 따라 단계가 매겨져 있어요. 자율주행시스템이 운전에 어떻게 관여하는지, 그때 운전자가 차를 어떻게 제어하는지에 따라 비자동화에서 완전 자동화까지 단계를 나누죠. 2016년부터 국제자동차기술자협회(SAE International)에서 분류한 단계가 세계적 기준으로 통용되고 있어요. '레벨 0'에서 '레벨 5'까지 총 6단계예요.

레벨 0 - 비자동화 (No Automation)
운전자가 모든 주행을 통제하고 책임지는 단계예요. 차량 시스템은 긴급 상황 알림 같은 보조 기능만을 수행해요.

레벨 1 - 운전자 보조 (Driver Assistance)
운전자를 차량 기능이 보조하는 단계예요. 특정 주행모드에서 시스템이 조향(핸들 조작) 또는 감속·가속 중 한 가지를 수행하는 수준이죠. 차로 유지를 보조하는 기능, 주행 속도와 앞 차와의 거리를 자동으로 제어해 주는 '스마트 크루즈 컨트롤' 등이 레벨 1에 해당해요.

레벨 2 - 부분 자동화 (Partial Automation)
특정 조건 내에서 일정 시간 동안은 차량의 조향과 감속, 가속을 차량이 인간과 동시에 제어할 수 있는 단계예요. 완만한 커브를 돌거나, 앞 차와의 간격을 유지하는 보조 주행 등을 차가 알아서 하지만, 아직 변수 감지와 주행 책임은 모두 인간에게 있어요. 레벨2 자율주행을 활용할 땐 운전자가 항상 주행 상황을 지켜보고 있어야 해요.

레벨 3 - 조건부 자율주행 (Conditional Automation)
'레벨3'부터는 주행 제어와 주행 중 변수 감지를 시스템이 담당해요. 시스템이 전체 주행을 하는 단계라고 할 수 있어요. 레벨3 부터는 자동차 스스로 차선을 변경하고, 앞차를 추월하거나 장애물을 피하는 등 일반적인 주행을 모두 할 수 있게 돼요. 고속도로와 같은 특정 조건을 정해두고, 그 구간에서는 시스템이 주행을 담당하죠. 위험할 경우에만 운전자가 개입해요.

레벨 4 - 고등 자율주행 (High Automation)
레벨 4는 시스템이 전체 주행을 수행한다는 점에서는 레벨 3과 동일하지만, 위험 상황 발생 시에도 시스템이 스스로 안전하게 대응할 수 있어야 한다는 점에서 큰 차이가 나요. 대부분의 도로에서 자율주행이 가능하고, 주행의 책임 또한 시스템에 있어요. 악천후 등 제한적인 일부 상황을 제외하고는 운전자의 개입이 필요 없어요. 하지만 특정 조건을 만족하지 않는 일부 도로나 악천후, 비상 상황에는 인간이 운전을 해야 하기 때문에 아직은 운전대(스티어링 휠)와 페달처럼 인간을 위한 주행 제어 장치가 필요해요.

레벨 5 - 완전 자율주행 (Full Automation)
완전히 자동화된 주행이 가능한 기술 수준이에요. 운전자가 아예 필요 없고, 탑승자만 존재하는 단계라고 할 수 있죠. 레벨 4는 자율 주행 지역에 일부 제한이 있는 경우가 대부분이지만, 레벨 5부터는 이런 제약이 전혀 없어요. 탑승자는 목적지만 입력하고, 시스템이 모든 조건에서 주행을 담당해요. 레벨 5단계에서는 아예 인간이 운전을 하지 않기 때문에 운전대와 페달 등의 주행 장치가 없어도 돼요.`

- D램

    title: '공시제도',
    content: `공시란 어떤 내용을 공개적으로 게시해서 알리는 일을 말해요. 쉽게 말하면 '알림'이라고 할 수 있죠. 우리가 뉴스에서 접하게 되는 공시는 기업들이 직접 전자 시스템을 통해 전하는 사업 관련 내용을 뜻할 때가 가장 많아요.

기업들이 이렇게 사업 관련 정보를 알리는 건 우리나라의 '공정 공시제도'를 지켜야 하기 때문이에요. 이 제도는 주식시장에 상장된 모든 기업에 공시 의무를 부과하고 있거든요. 상장기업이 아니더라도 자산 총액이나 직원 수가 일정 규모를 초과하는 일부 기업은 공시를 해야 하고요.

공시제도는 투자자들이 공정하게 한 회사의 사업 계획이나 재무적인 상황, 실적 같은 중요한 내용을 알 수 있도록 하자는 취지에서 만들어졌어요. 정보 제공이 공정하게 이뤄지지 않으면, 주식시장에서도 불공정한 거래가 이뤄질 수밖에 없으니까요.

공정 공시제도는 미국이 2000년에 가장 먼저 시작했고, 우리나라도 2002년부터 도입했어요. 이 제도에 따라 기업들은 중요한 정보를 어떤 사람에게 알릴 일이 생기면, 그 전에 꼭 공시부터 해야 해요.

우리나라는 금융감독원에서 운영하는 '기업 정보 전자공시 시스템(DART)' 홈페이지에서 누구나 공시를 열람할 수 있어요. 네이버 같은 포털 사이트의 증권 정보에서도 공시를 쉽게 확인할 수 있는데요, 이 정보 또한 DART에서 제공하는 내용을 표시해 주는 거예요.`
  },
  '시스템반도체': {
    title: '시스템반도체',
    content: `우리나라가 반도체 강국이라는 얘기는 많이 들어보셨죠? 하지만 모든 반도체를 다 잘 만드는 건 아닙니다. 삼성전자와 SK하이닉스가 잘 만드는 D램과 낸드플래시는 모두 메모리반도체의 일종입니다. 반도체의 종류는 크게 2가지로 나눌 수 있는데요. 정보를 저장하는 메모리반도체와 정보를 연산하고 처리하는 시스템반도체가 있죠.

• 시스템반도체
혹시 CPU(중앙처리장치)라고 들어보셨나요. 이름 그대로 컴퓨터의 중심에서 모든 데이터를 연산하고 처리하는 장치입니다. 컴퓨터에서 뇌 역할을 하는 부품이라고 생각하면 됩니다. 이런 CPU가 대표적인 시스템반도체입니다. 스마트폰에서 CPU 역할을 하는 반도체는 AP(어플리케이션프로세서)라고 해요.

• 메모리반도체
CPU 같은 시스템반도체가 열심히 계산한 결과를 저장할 공간도 필요하겠죠? 메모리반도체는 IT 기기에 정보를 저장할 때 사용되는 부품이에요. 메모리반도체는 다시 낸드플래시와 D램으로 구분됩니다.

- 낸드플래시
컴퓨터나 스마트폰에 사진이나 파일을 너무 많이 저장하면 저장 공간이 부족하다고 하잖아요? 여기서 말하는 저장 공간에 사용되는 대표적인 반도체가 바로 이 낸드플래시입니다. 낸드플래시는 속도는 비교적 느리지만 전원이 꺼지더라도 정보가 저장되는 게 특징입니다. USB와 SD카드, SSD가 낸드플래시로 만든 대표적 저장 장치입니다.

- D램
CPU가 연산할 때마다 그 결과를 속도가 느린 낸드플래시에 저장하다 보면 작업 속도가 너무 늦어지게 될 겁니다. D램은 속도가 빠른 임시저장장치라고 생각하면 됩니다. CPU와 낸드플래시 사이에서 데이터를 임시로 저장하면서 빠른 작업을 도와주는 역할이죠. 대신에 전원이 꺼지면 저장 중인 정보가 날아가 버리죠. 가끔 스마트폰이 좀 느리다 싶으면 '스마트폰 최적화' 기능 사용하시죠? 바로 이때 D램 안에 임시 저장된 정보를 지워 속도를 빠르게 하는 것입니다.`
  },
  '독과점': {
    title: '독과점',
    content: `경제 뉴스엔 종종 '독과점'이라는 표현이 등장하는데요, 독과점은 독점(Monopoly)과 과점(Oligopoly)을 한꺼번에 부르는 말이에요. 일반적으로 독과점이 발생하면 소비자는 피해를 보게 돼요.

독점은 한 기업이 특정 시장의 유일한 공급자인 상황을 뜻해요. 이 기업의 제품을 대체할 만한 상품이 없는 상태인 거죠. 예를 들어 한 기업이 세계 최초로 하늘을 나는 자동차를 발명해 판매를 시작했다면, 소비자들이 경쟁자로 여길만한 후발주자가 등장할 때까지 하늘을 나는 자동차 시장은 독점 시장이 되는 거예요.

독점 시장에선 당연히 독점 기업이 큰 영향력을 갖게 돼요. 경쟁자가 없으니 사실상 가격을 마음대로 좌우할 수 있죠. 상품을 소량만 만들어서 비싸게 팔 수도 있고, 가격을 조금 낮게 책정하고 판매량을 늘리는 것도 가능해요.

독점이 가능한 건 다른 기업이 시장에 진입할 수 없도록 만드는 '진입장벽'이 존재하기 때문이에요. 이를테면 첨단 제품을 만들 수 있는 독보적인 기술력을 갖췄거나, 특정 상품을 만드는 데 꼭 필요한 원자재를 독점적으로 확보한 경우에 진입장벽이 만들어지죠.

정부가 효율성을 위해 의도적으로 독점 시장을 만들기도 해요. 대표적인 게 전기 판매 시장이에요. 우리나라에선 한국전력공사가 각 가정과 산업체가 사용하는 전기를 독점 판매하고 있어요.

과점은 소수의 기업이 압도적인 점유율을 차지하는 상황을 뜻해요. 우리가 구매하는 상품이나 서비스 중 상당수가 과점 상태인데요. 스마트폰이나 이동통신 서비스는 물론 라면, 과자, 아이스크림, 편의점, 화장품 등의 시장은 모두 사실상의 과점 시장으로 볼 수 있어요.

다른 선택지가 없는 독점 시장이나, 선택의 폭이 넓지 않은 과점 시장에선 소비자들이 피해를 볼 수 있어요. 더 이상 치열하게 경쟁할 필요가 없게 된 회사들이 마음대로 가격을 올리거나, 소비자에게 제공하던 혜택을 줄일 수도 있는 거죠. 이런 현상을 '독과점의 폐해'라고 불러요.

우리나라에선 공정거래위원회(공정위)가 독과점의 폐해를 예방하고 바로잡는 역할을 해요. 공정위는 시장 점유율이 과도하게 높은 회사들을 '시장 지배적 사업자'로 지정하는데, 일반적으로 '한 회사의 시장 점유율이 50% 이상'이거나 '3개 이하 회사의 시장 점유율 합계가 75% 이상'인 경우에 해당해요.`
  },
  '역진성': {
    title: '역진성',
    content: `역진세란 세금을 매기는 대상의 금액이 많을수록 세율을 낮게 부과하는 방식을 말합니다. 예를 들어 소득세를 역진세로 부과한다면, 1년에 2000만원을 버는 사람에겐 10%의 세금을 매기고, 2억원을 버는 사람에겐 5%만 내라고 하는 식이 되는 거죠. 돈을 더 버는 사람들에게 유리한 구조예요.

더 적게 버는 사람에게 세금을 더 많이 걷는다니, 얼핏 봐도 조금 이상해 보이는데요. 그래서 실제로는 역진세가 거의 존재하지 않아요.

역진세는 아마 많이 들어보셨을 '누진세'와는 반대 개념이라고 보시면 돼요. 누진세는 세금을 매기는 대상이 클수록 높은 세율을 부과하거든요. 실제로 우리나라는 연소득이 2000만원인 사람에겐 15%의 소득세를 걷고, 2억원을 버는 사람에겐 38%의 세금을 걷고 있어요.

세금을 매기는 방법은 3가지인데요, 앞서 설명한 누진세나 역진세와 함께 '비례세'가 있어요. 비례세는 아예 세율을 정해놓고 세금을 매기는 대상의 금액 크기와 상관없이 과세하는 방식을 말해요. 주로 물건을 살 때 자연스럽게 부담하게 되는 부가가치세 등의 소비세에 비례세율이 적용돼요.

소득세나 재산세처럼 우리가 직접 세금을 내는 과정을 거치지 않아도, 어떤 물건을 살 때 지불하는 가격에 붙어있는 세금들이 있거든요. 싼 물건이든 비싼 물건이든 부가가치세는 10%로 정해져 있어요.

앞서 '역진세'는 실제로 거의 존재하지 않는다고 설명 드렸는데요, 방금 언급했던 부가가치세 등의 소비세는 일부 품목에 부과할 땐 사실상 '역진적인 성격'을 갖고 있어요. 생활필수품을 생각해보면 이해가 쉬워요. 누구나 꾸준히 비슷한 양을 구매해 사용하는 생활필수품이라면, 돈을 적게 버는 사람이나 많이 버는 사람이나 구매할 때 내게 되는 부가가치세는 비슷할 수밖에 없겠죠.

소득이 적은 사람이 생필품을 구매할 때 내는 세금은 자신의 소득에서 상대적으로 높은 비율을 차지할 테고, 고소득자는 소득 전체에서 생필품 구매 시 내는 세금의 비율이 낮을 거예요.`
  },
  '브렌트유': {
    title: '브렌트유',
    content: `경제 뉴스를 읽다 보면 '국제유가'라는 단어가 정말 많이 등장하죠. 그런데 뉴스에서 기름 가격을 이야기할 때 꼭 나오는 단어가 있어요. 바로 서부텍사스유(WTI)와 북해 브렌트유예요. 어떤 차이가 있길래 석유에 이름까지 붙여 구별하는 걸까요?

기름이 국제적으로 거래되는 형태인 '원유'는 땅속에서 뽑아내 아직 정제하지 않은 상태의 석유를 말해요. 이 원유를 정제해서 비행기에 들어가는 항공유부터 우리가 흔히 소비하는 휘발유, 경유 등을 만들어 내거나 석유화학 제품 생산에 써요.

그런데 전 세계 곳곳에서 뽑아내는 수백 종류의 원유는 지역마다 품질이 조금씩 달라요. 당연히 사고팔 때 가격에도 차이가 있어야 하겠죠. 보통 이 가격의 기준이 되는 3대 원유가 서부텍사스유(WTI, West Texas Intermediate), 북해 브렌트유, 중동 두바이유예요. 각각 이름대로 미국 서부 텍사스, 영국과 유럽 대륙 사이에 있는 북해의 브렌트 유전, 중동 아랍에미리트 인근에서 생산되는 원유를 말해요.

이 3대 원유 시세를 기준으로 품질이나 생산지 등을 고려해 원유 가격이 결정돼요. 대체로 미주 지역은 WTI, 유럽은 브렌트유, 중동과 아시아 지역은 두바이유 가격을 기준으로 삼는다고 보면 되겠죠.

품질은 WTI가 가장 좋고 브렌트유가 다음 순위로 꼽혀요. 그래서 가격도 보통 WTI가 가장 비싸지만, 이 가격 순위는 다양한 요인 때문에 바뀌기도 해요. 전쟁으로 인한 유럽 지역의 에너지난 우려가 나오기 시작한 뒤로는 브렌트유가 조금 더 비싸게 거래되고 있어요.

WTI는 생산해서 대부분 미국에서 소비하는 점이 특징이에요. 미국에서 자기들끼리 다 써버리긴 하지만, 미국 금융시장이 워낙 발달한 데다 국제유가 시장과도 연결돼 있다 보니 WTI는 가장 대표적인 국제유가 지표로 사용되고 있어요. 그다음 중요 지표는 브렌트유 정도죠.

우리나라를 포함해 아시아 지역 국가들은 지역적으로 가까운 중동에서 원유를 가장 많이 수입하고 있어서 두바이유 가격에 가장 큰 영향을 받는다고 볼 수 있어요. 다만 다른 종류의 원유라도 결국 대체 관계이기 때문에 가격 움직임은 비슷한 경우가 많아요.`
  },
  '국내총생산(GDP)': {
    title: '국내총생산(GDP)',
    content: `뉴스에서 국가별 경제 규모를 이야기할 때 빠지지 않는 용어가 '국내총생산(GDP, Gross Domestic Product)'입니다. '경제 성장률'이라는 말도 많이 들어보셨을 텐데요, 이 경제 성장률을 따질 때 GDP를 사용해요.

GDP란 일정 기간 한 나라 영토 안에서 생산된 모든 '최종생산물'의 가격을 합한 수치예요. 국경을 기준으로 하니까 외국인이 우리나라에서 생산하면 한국 GDP에 포함되고, 한국인이 외국에서 생산한 것들은 포함되지 않겠죠.

최종생산물에는 여러 물건이나 건물 같은 재화는 물론 서비스도 포함돼요. '최종생산물'이라는 기준을 굳이 붙인 이유는 어떤 제품이 완전히 만들어지기 전 '중간재' 상태인 경우는 계산하지 않기 위해서예요.

예를 들어 자동차나 선박에 들어가는 철강재들은 결국 차나 배로 완성돼야 시장에서 거래되잖아요. 그런데 아직 사용되지 않은 이런 중간재들을 GDP 측정할 때 포함해 버리면 최종생산물인 자동차 가치를 계산할 때 중복으로 집계되겠죠. 완성된 자동차 가치에는 철강재 가격도 포함된 거니까요. 이런 이유로 GDP를 측정할 땐 중간재는 빼고 '최종생산물'만 집계해요.

또 '일정 기간' 생산된 것만 계산해야하니까 일반적으로 중고 제품 거래나 기존 주택 매매 같은 시장 거래는 포함되지 않아요. 이미 제품이나 아파트를 만들어 판매했을 때 '최종생산물'로 한번 집계됐기 때문이에요. 이때도 중복 계산을 피하는 거죠.

또 원칙적으로 시장에서 정식으로 거래된 것들만을 집계하기 때문에 불법 암시장에서 이뤄진 거래는 포함되지 않아요. 다만 시장에서 거래된 것은 아니지만 '국방·치안 서비스' 같은 공공 서비스는 GDP에 포함해요. 우리나라에서는 한국은행이 GDP를 집계하고 있어요.

 · 명목 GDP? 실질 GDP?
명목 GDP는 일정 기간에 생산된 재화와 서비스를 당시 가격 그대로 집계한 수치예요. 예를 들어 2022년 GDP라면, 실제 2022년의 가격으로 집계한 수치인 거죠. 그런데 매년 이렇게 집계하면 실제로 경제가 얼마나 성장했는지 알기 힘들어요. 해마다 물가 수준이 다르기 때문이에요. 작년보다 명목 GDP가 3% 만큼 늘어났는데, 물가도 3% 올랐다면 사실 경제는 성장하지 못한 셈이니까요.

그래서 물가 상승률을 빼고 경제 성장률을 따져보기 위해 만든 지표가 실질 GDP예요. 실질 GDP는 기준 연도를 정해놓고 이때 가격으로 GDP를 집계해요. 2022년 GDP라도, 기준 연도가 2015년이라면 모든 제품 가격을 2015년과 똑같이 계산해서 집계하는 거예요. 이러면 같은 가격을 기준으로 생산량만 따져볼 수 있으니 경제가 얼마나 성장했는지 쉽게 알 수 있어요.

결국 한 나라의 전체적인 경제 규모가 얼마나 되는지를 파악할 때는 명목 GDP를, 경제의 성장 추세가 어떤지를 따져보고 싶을 때는 실질 GDP를 사용하게 돼요.

경제 성장률(실질 GDP 성장률)이 3%이고, 같은 기간 물가 상승률이 3%였다면, 사실 명목 GDP는 6%쯤 늘어났을 테니까요.`

  '메모리반도체': {

    content: `우리나라가 반도체 강국이라는 얘기는 많이 들어보셨죠? 하지만 모든 반도체를 다 잘 만드는 건 아닙니다. 삼성전자와 SK하이닉스가 잘 만드는 D램과 낸드플래시는 모두 메모리반도체의 일종입니다. 반도체의 종류는 크게 2가지로 나눌 수 있는데요. 정보를 저장하는 메모리반도체와 정보를 연산하고 처리하는 시스템반도체가 있죠.

기름이 국제적으로 거래되는 형태인 '원유'는 땅속에서 뽑아내 아직 정제하지 않은 상태의 석유를 말해요. 이 원유를 정제해서 비행기에 들어가는 항공유부터 우리가 흔히 소비하는 휘발유, 경유 등을 만들어 내거나 석유화학 제품 생산에 써요.

그런데 전 세계 곳곳에서 뽑아내는 수백 종류의 원유는 지역마다 품질이 조금씩 달라요. 당연히 사고팔 때 가격에도 차이가 있어야 하겠죠. 보통 이 가격의 기준이 되는 3대 원유가 서부텍사스유(WTI, West Texas Intermediate), 북해 브렌트유, 중동 두바이유예요. 각각 이름대로 미국 서부 텍사스, 영국과 유럽 대륙 사이에 있는 북해의 브렌트 유전, 중동 아랍에미리트 인근에서 생산되는 원유를 말해요.

이 3대 원유 시세를 기준으로 품질이나 생산지 등을 고려해 원유 가격이 결정돼요. 대체로 미주 지역은 WTI, 유럽은 브렌트유, 중동과 아시아 지역은 두바이유 가격을 기준으로 삼는다고 보면 되겠죠.

일정한 경제적 활동 중 대표적인 게 수입과 수출이에요. 예를 들어 옆 나라에 반도체를 수출하고 바나나를 수입해오는 나라가 있다고 가정해볼게요. 이 외에는 다른 국가들과 경제적 거래는 일절 하지 않는 나라죠. 이 나라가 이번 달에 반도체를 수출해 100억원을 벌고, 바나나를 수입해오면서 90억원을 지출했으면 이 나라의 이번 달 경상 수지는 10억원 흑자인 거예요.

경상 수지는 한 나라의 경제 상황을 보여주는 중요한 지표로 여겨져요. 그래서 우리나라 중앙은행인 한국은행이 매달 집계해 발표하죠. 경상 수지를 구성하는 요소는 다음과 같아요.

• 상품 수지(무역 수지)
상품을 수출해서 벌어들인 금액에서 상품을 수입할 때 지급한 금액을 뺀 결과예요. 보통은 경상수지를 구성하는 요소 중에 비중이 제일 크고 그만큼 중요해요.

• 서비스 수지
다른 나라와 각종 서비스를 주고받는 과정에서 발생한 수입과 지출을 따져 본 결과예요. 외국인이 우리나라에 여행을 와서 쓴 돈, 우리나라 선박회사가 외국 회사의 상품을 운반하고 받은 운임 등은 서비스 수지 수입에 해당하죠.

• 소득 수지
우리나라 사람들이 외국 회사에 취업해 돈을 받거나, 해외 주식에 투자해 배당금을 받으면 소득수지 수입이 돼요.

• 경상 이전 수지
그 비중이 크진 않지만 아무런 대가 없이 돈이나 물건을 주고받을 때도 있잖아요. 예를 들어 외국에 있는 교포가 국내의 친척에게 돈을 보내거나, 외국 자선단체가 국내에 구호물자를 보내면 경상 이전 수지 수입이 돼요.

위에서는 반도체 수출과 바나나 수입만 하는 나라를 예로 들었지만, 실제로는 이 4가지 요소들의 결과를 함께 계산해서 경상 수지를 따져보는 거예요.

무조건 흑자가 좋은 거야?
한 나라의 경상 수지가 흑자이고 흑자 규모가 커지고 있다면 보통 수출이 잘돼서 기업들이 돈을 잘 벌고, 국민의 소득도 높다는 의미예요. 이러면 그 나라의 경제 상황도 좋다고 볼 수 있죠. 반대로 경상 수지 적자 폭이 커지고 있다면 경제 상황이 좋지 않을 가능성이 크고요.

하지만 경상 수지가 흑자라고 무조건 좋은 것만은 아니에요. 한 나라가 오랜 기간 큰 규모의 경상 수지 흑자를 기록하고 있다면 다른 나라들의 불만이 쌓일 수도 있어요. 다 같이 잘살아 보자고 무역을 하는 건데 왜 혼자서만 이득을 보냐는 식으로요. 심할 경우 국가 간의 무역 갈등이 생길 수도 있어요.`

  '그래픽처리장치(GPU)': {
    title: '그래픽처리장치(GPU)',
    content: `엔비디아는 1993년에 젠슨 황이라는 인물에 의해 미국에서 설립된 회사예요. 컴퓨터 게임을 즐기던 젠슨 황은 게임 시장이 빠르게 성장할 거라 내다봤고, 정교한 그래픽의 게임을 구동할 때 필요한 반도체 수요도 함께 증가할 거라고 생각했죠.

컴퓨터의 중심에서 모든 데이터를 계산하고 처리하는 반도체는 CPU(Central Processing Unit·중앙처리장치)예요. 우리가 컴퓨터 게임 등을 즐기려면 CPU가 연산해 낸 결과를 모니터에 표시하는 과정을 거쳐야 하는데요. 모니터는 아주 작은 '화소(픽셀)'들로 이루어졌어요. 수백만 개의 화소가 모여 전체 이미지를 만들어 내는 거예요.

화소 하나에 신호를 보내는 건 간단하고 쉬운 일이지만, 수백만 개에 달하는 화소에 '동시에' 신호를 보내는 건 만만치 않은 작업이에요. 특히 CPU는 한 번에 하나씩 일을 처리하기 때문에 이 작업에 적합하지 않죠.

그래서 엔비디아의 최고경영자(CEO)인 젠슨 황은 GPU(Graphic Processing Unit·그래픽처리장치)를 개발하는 데 집중했어요. CPU에 비해 비교적 단순한 일밖에 못 하지만 '동시에' 많은 일을 할 수 있도록 GPU를 설계했죠. 수많은 화소에 동시에 신호를 보내는 작업을 시키기 위해 GPU를 만든 거예요.

그런데 GPU의 또 다른 쓰임새가 발견됐어요. 처음 GPU가 등장했을 땐 생각지 못했던 건데요. 바로 인공지능(AI) 기술이에요. AI는 반복 학습을 통해 정교해져요. 얼마나 많은 데이터를 학습했는지에 따라 성능이 결정되죠. 효율적으로 학습하려면 수많은 문제를 동시에 풀어야 하는데, 생각해 보니 GPU가 안성맞춤이었던 거예요.

물론 엔비디아 말고도 GPU를 생산하는 기업들이 있어요. 하지만 인공지능 분야에선 큰 힘을 못 쓴다고 해요. 엔비디아는 반도체만 만드는 게 아니거든요. GPU 사용을 돕는 프로그램도 일찌감치 만들어 놨어요.

예전엔 대부분의 개발자가 CPU에만 익숙했다고 해요. AI를 연구하는데 GPU를 활용해 보고 싶어도 어려움이 많았죠. 그래서 엔비디아는 이들을 위한 프로그램을 만들었어요. 따로 공부하지 않아도 CPU를 사용하듯 GPU를 쓸 수 있도록 돕는 프로그램이에요. 엔비디아는 2006년부터 자사 GPU에 특화된 이 프로그램을 무료로 배포했어요.

요즘 인공지능을 연구하는 사람들은 사실상 엔비디아가 만든 프로그램을 사용할 수밖에 없대요. 세계에서 4만여 개 기업이 AI 개발에 엔비디아의 프로그램을 활용하는 것으로 알려졌어요. 그 덕에 엔비디아는 인공지능 분야에서 독보적인 반도체 기업으로 올라설 수 있었어요. 이 회사가 일찌감치 AI와 GPU의 활용성에 주목했기에 가능했던 일이에요.`
  },

  '추가경정예산(추경)': {
    title: '추가경정예산(추경)',
    content: `흔히 '추경'으로 부르기도 하는 추가경정 예산은 정부가 1년 동안 살림살이를 하기 위해서 계획해뒀던 본예산과는 별도로 편성하는 예산을 말해요. 우리나라 정부 예산은 매년 1년 단위의 지출 계획을 짜서 써야 하는데요, 중간에 돈을 더 써야 할 일이 생기거나 예상보다 세금이 적게 걷혀서 돈이 부족할 수도 있어요. 이럴 때 이미 정해진 예산안을 바꿀 수는 없으니까 추경을 활용하는 거예요. 물론 꼭 필요하다고 판단될 때만 써야겠죠.

추경은 정부가 기존의 예산안에서 변경된 내용을 국회에 제출하고, 국회 의결을 거쳐 집행할 수 있어요. 국회에서 동의를 해주지 않으면 추경을 활용할 수 없다는 뜻이에요. 그래서 '추경'을 두고 정부 관계자나 국회의원이 설전을 벌이는 모습이 종종 경제 뉴스에 등장해요.

우리나라는 과거 가뭄이나 폭우 같은 자연재해로 발생한 피해를 복구하기 위해 추가경정 예산을 편성하는 경우가 많았고, 1990년대 이후에는 사회적 기반 시설 건설·중소기업 지원 등에 쓸 돈을 마련하기 위해 추경을 활용하기도 했어요. 최근에는 코로나19 유행으로 피해를 본 국민을 지원하는 데에 썼죠. 대부분 국가들이 거의 매년 추가경정 예산을 편성하고 있어요.`

  'OPEC': {
    title: 'OPEC',
    content: `OPEC(Organization of Petroleum Exporting Countries)은 석유를 생산·수출하는 11개 국가가 참여하는 협의체예요. 우리 말로는 '석유수출국기구'라고 불러요. 석유 생산·수출량을 조절해 회원국들의 이익을 극대화하는 게 이 단체의 목표죠.

OPEC이 결성되기 전엔 석유 생산국들의 영향력이 지금만큼 크지 않았어요. 1950년대에 중동과 아프리카 등지에서 대형 유전이 연이어 발견됐는데요. 너도나도 석유를 생산하다 보니 시장에 너무 많은 석유가 공급됐고, 자연스럽게 가격은 하락했어요.

그래서 1960년 9월에 이라크가 주도하고 이란, 사우디아라비아, 쿠웨이트, 베네수엘라가 참여해 5개국이 OPEC을 결성했어요. OPEC은 초창기에는 회원국 간에 활발하게 정보를 공유하며 유가가 과도하게 떨어지지 않도록 조정하는 역할을 했는데요. 회원국 수가 증가하고 영향력이 커지며 지금은 사실상 국제 석유 가격을 좌우하는 단체가 됐어요. 리비아, 아랍에미리트, 알제리, 나이지리아 등이 합류하며 한때 13개국까지 늘었지만, 앙골라(2024년)와 아랍에미리트(2026년)가 차례로 탈퇴하며 지금은 회원국이 총 11개국이에요.

이들의 영향력을 보여준 대표적인 사례는 1973년에 발생한 '1차 석유 파동'이에요. 당시 OPEC 회원국들이 조직적으로 석유 생산량을 줄이면서 유가가 3~4배나 뛰기도 했죠. 1978년에 발생한 '2차 석유 파동'을 겪으며 OPEC의 영향력은 더욱 커졌어요.

다만 OPEC의 영향력이 예전만 못하다는 시각도 있어요. 미국이 셰일 오일(Shale Oil)을 생산할 수 있게 됐기 때문이에요. 셰일 오일은 기존에 생산하던 석유보다 지하 깊은 곳에 매장돼 있는 석유예요. 과거에는 생산 비용이 많이 들어서 '팔아봤자 손해'인 자원이었죠. 그런데 점차 기술이 발전하면서 마침내 손익분기점을 넘어 이익을 낼 수 있게 됐고, 2014년부터 미국 기업을 중심으로 셰일 오일 생산이 시작됐어요.

OPEC에 가입하지 않은 산유국인 러시아, 말레이시아, 멕시코 등도 OPEC의 독주에 제동을 걸고 있어요. 이들은 석유 생산·수출량과 가격을 두고 OPEC과 잦은 마찰을 빚었죠. 결국 OPEC에 비회원 산유국들까지 더해진 새로운 협의체 'OPEC+(오펙 플러스)'가 등장했어요. OPEC+에는 OPEC 회원인 11개국과 함께, 비회원 산유국인 러시아 등 10개국이 참여하고 있어요.`
  },
  '국제통화기금(IMF)': {
    title: '국제통화기금(IMF)',
    content: `세계은행(World Bank)은 국제 연합(UN)이 관할하는 금융기구예요. 이름 그대로 전 세계 국가들을 대상으로 돈을 빌려주는 은행 역할을 하죠. 세계은행은 우리나라 사람이라면 한 번쯤 들어봤을 국제통화기금(IMF), 세계무역기구(WTO)와 함께 3대 국제경제기구로 꼽히는데요. 각 기구의 역할은 다음과 같아요.

 • WTO
WTO는 전 세계가 자유로운 무역을 하면서 다 함께 잘살아 보자는 취지로 만들어졌어요. 회원국 간에 무역을 할 때 서로 차별하지 말고 공정하게 하자는 거였죠. 또 WTO는 무역과 관련한 분쟁이 생기면 옳고 그름을 판단하고, 잘못된 것은 고치도록 감시도 해요.

 • IMF
IMF의 설립 목적은 자유로운 무역을 돕는 거예요. 무역을 하는 과정에서 더욱 안정적으로 국가 간에 돈을 주고받을 수 있도록 하는 게 목표죠. 그래서 IMF는 환율을 안정시키기 위해 노력해요. 화폐 간의 교환 비율인 환율이 불안정하면 무역을 하는 사람들이 혼란을 겪을 수 있거든요.

또 IMF는 달러 등 외환 보유액이 부족해진 나라에 돈을 빌려주기도 해요. 한 나라는 다른 나라에 진 빚을 갚거나 유사시를 대비해 외화(외국의 돈)를 구비해 두는데요. 모두가 가치 있다고 여기고, 국제적으로 사용되는 외화인 달러를 갖춰두는 게 중요하죠.

그런데 만약 한 나라가 갑자기 심각한 경제 위기를 겪고, 구비해둔 외화도 바닥나면 그 나라의 화폐 가치도 급격하게 떨어져요. 이런 현상이 여러 국가에서 나타나면 환율 시장도 불안정해지는 거고요. 그래서 IMF는 이런 나라들에 달러 등을 단기간(보통 수년간) 빌려줘요. 이때 IMF는 돈을 빌려주는 대가로 이자를 받는 것은 물론 돈을 빌린 나라의 각종 경제 정책에 개입하기도 해요.

 • 세계은행
세계은행은 원래 제2차 세계대전 후 전쟁 때문에 피해를 본 국가들을 지원하기 위해 만든 기관인데요. 지금은 선진국에 비해 경제 개발이 늦은 개발도상국들을 대상으로 돈을 빌려주는 역할을 해요. 이 돈으로 빈곤 퇴치나 보건, 교육, 환경 등의 분야에 투자하고 국가를 발전시키라는 거죠. 세계은행은 IMF에 비해 장기간(보통 수십 년간) 돈을 빌려줘요. 물론 이자도 받고요.

IMF가 갑자기 경제 위기를 맞아 외화가 부족해진 나라들을 돕기 위해 잠깐 돈을 빌려주는 거라면, 세계은행은 경제 성장이 필요한 나라들에 장기간 대출을 해주는 거죠. IMF와 세계은행은 유럽과 미국이 주도하는 국제 금융기구예요. IMF 총재는 유럽인이, 세계은행 총재는 미국인이 각각 맡는 게 관행이에요. 김용 전 세계은행 총재(2012~2019년) 역시 한국계 미국인이죠.`

  '공시대상기업집단': {
    title: '공시대상기업집단',
    content: `우리는 흔히 규모가 큰 회사를 '대기업'이라고 불러요. 돈도 많고 직원도 많은 회사라는 의미로 누구나 대충 알아듣죠. 그렇다면 대기업으로 구분하는 기준은 뭘까요?

우리나라 법은 '대기업'의 기준을 엄밀하게 정해두고 있지는 않아요. 하지만 '중소기업'과 '중견기업'의 기준은 정해져 있어서 이 범위를 넘어가는 기업들을 보통 대기업이라고 부르죠.

원래는 중견기업이라는 개념과 기준도 없었지만, 워낙 중소기업 간에도 규모 차이가 크고, 중소기업과 대기업 사이의 규모 차가 커서 '중견기업'이라는 개념을 만들었어요. 2017년에는 중견기업 간에도 차이가 크다는 점을 고려해 '준대기업'이라는 개념까지 등장했고요.

이렇게 법에서 콕 집어 '여기는 대기업'이라고 말해주진 않는데요, 그나마 명확하게 존재하는 기준은 공정거래위원회에서 매년 4월 지정하는 '대규모 기업 집단(대기업 집단)'이에요. 공정위가 간접적으로 대기업을 정의하고 있다고 볼 수 있어요, 기업 집단은 '삼성그룹', '현대자동차그룹', 'SK그룹' 같은 계열사의 묶음으로 보시면 돼요.

대기업 집단은 크게 자산 규모가 5조원 이상이면 지정되는 '공시대상 기업집단'과 10.4조원을 넘어설 때 지정되는 '상호출자 제한 기업집단'으로 나뉘어요. 대기업으로 볼 수 있는 기준이 두 가지인 셈이죠.

이런 대기업 집단으로 지정되면 공시 의무 등 여러 규제가 적용돼요. 당연히 더 큰 기업인 상호출자 제한 기업집단이 더 엄격한 규제를 받는데요, 계열사 간 '상호출자'가 금지된다는 점, 계열사끼리 빚보증을 서지 못한다는 점 등이 중요해요.

상호출자란 기업 집단에 속한 회사끼리 서로 상대 회사에 주식에 투자해서 상호 보유하는 것을 말해요. 같은 그룹 계열사끼리 주식을 사주고 서로의 주주가 되는 걸 막는 거죠. 상호출자를 하면 계열사들이 서로의 주식을 보유함으로써 주주들 중 '내 편'을 쉽게 확보할 수 있어요. 그래서 경영권을 보호할 수 있는 면은 장점으로 꼽혀요. 하지만 실질적인 투자가 없이 인위적으로 자본금을 늘려 부실기업을 양산할 수 있는 폐해 또한 존재해요.

예를 들어 각각 100억원씩 자본금을 가진 A회사와 B회사가 서로의 주식을 받고 50억원씩 투자하면, 실제로 늘어난 돈은 하나도 없겠죠. 그런데도 A회사와 B회사는 50억원씩 투자받은 게 돼요. 왜냐하면 50억원을 투자할 땐 50억원 어치 주식을 받기 때문에 서류상 자산이 줄어들지 않거든요. 50억원을 투자받은 쪽에선 자산이 늘어나고요. 두 회사 모두 서류상 자본금은 150억원으로 증가하는 거예요.`

  '스톡옵션': {
    title: '스톡옵션',
    content: `스톡옵션(Stock option)은 한 회사가 임직원에게 회사의 주식을 살 수 있는 권리를 주는 제도예요. 우리말로는 '주식매수선택권'이라고 부르기도 하죠. 이 권리는 부여되는 시점에 가격을 정하기 때문에, 임직원은 나중에 회사 주식값이 올랐을 때 이 권리를 행사해 큰돈을 벌 수도 있어요.

예를 들어 A회사가 직원 B씨에게 회사 주식을 만원에 살 수 있는 스톡옵션을 100주 부여했는데, 나중에 회사 가치가 높아져 주가가 5만원이 됐다면 B직원은 권리를 행사해서 100주를 100만원에 산 다음 이걸 500만원에 팔 수 있는 거죠.

회사는 왜 직원들에게 이런 권리를 줄까요? 보통 자금이 부족해서 높은 연봉을 주기 힘든 벤처기업에서 많이 활용해요. 유능한 인재는 채용하고 싶은데, 연봉을 두둑하게 주기는 어려우니까 "회사 주식을 싸게 사게 해줄 테니 함께 회사를 성공시켜보자"고 제안하는 거예요.

스톡옵션을 줄 땐 보통 시세보다 낮은 가격으로 매입할 수 있는 권리를 부여하고, 바로 팔지는 못하게 해요. 회사에 충분한 기여를 할 시간 동안은 갖고 있게 하는 거죠. 스톡옵션을 받은 임직원 입장에선 회사가 성공하면 할수록 큰돈을 벌게 되니 근로 의욕이 높아지겠죠? 만약 전망이 밝은 기업이라면 스톡옵션 매력은 더 클 거고요.

◉ 노란봉투법, 핵심 정리!

① 근로자에게 손해배상 청구하기 어렵게
이전에는 파업으로 인해 피해가 발생하면 노조의 구성원 모두가 똑같은 책임을 져야 했어요. 노란봉투법은 각 근로자가 파업에 참여한 정도에 따라 책임을 다르게 지도록 해요. 회사가 노조에 손해 배상을 청구하려면 파업 노조원들이 각각 어떤 피해를 얼마나 끼쳤는지 하나하나 따져서 입증해야 하죠.

② 하청근로자가 원청 사장 만날 수 있게
기존 노조법에 따르면 하청업체의 노동자들은 원청업체의 사장을 대상으로 교섭하거나 파업할 수 없었어요. 노란봉투법은 하청업체 노동자들이 원하면 원청업체 사장도 의무적으로 만나서 교섭할 수 있도록 했어요.

◉ 경영계가 반대하는 이유

노동계는 교섭과 파업 권리를 보장받을 수 있다는 점에서 노란봉투법을 지지해요. 반면 경영계는 불법 파업에 대해 노조원 개인별 책임 입증이 사실상 불가능해 무분별한 파업을 조장하는 '파업 조장법'이 될 수 있다고 우려해요. 또 수백 개 하청업체가 동시에 원청에 교섭을 요구하는 혼란이 생길 수 있고, 기업들이 노동 불확실성을 피해 해외로 이전해 국가 경쟁력이 떨어질 수 있다고도 지적해요.`

IMF가 갑자기 경제 위기를 맞아 외화가 부족해진 나라들을 돕기 위해 잠깐 돈을 빌려주는 거라면, 세계은행은 경제 성장이 필요한 나라들에 장기간 대출을 해주는 거죠. IMF와 세계은행은 유럽과 미국이 주도하는 국제 금융기구예요. IMF 총재는 유럽인이, 세계은행 총재는 미국인이 각각 맡는 게 관행이에요. 김용 전 세계은행 총재(2012~2019년) 역시 한국계 미국인이죠.`

  '상한가·하한가': {
    title: '가격제한폭',
    content: `'가격 변동 제한폭'으로 부르기도 하는 가격제한폭은 주식시장에서 한 종목의 주가가 하루 동안 오르거나 내릴 수 있는 폭을 의미해요. 현재 한국거래소는 국내 최대 주식 시장인 코스피(KOSPI)와 성장주 위주의 시장인 코스닥(KOSDAQ)의 가격제한폭을 30%로 정해놨죠. 보통 가격제한폭까지 오른 주가를 '상한가', 가격제한폭까지 내린 주가를 '하한가'라고 불러요.

한국거래소가 가격제한폭을 정해 둔 건 급격한 주가 변동으로 인한 혼란을 방지하기 위해서예요. 주식 시장은 주식을 사들이는 사람이 몰려들면 덩달아 매수에 나서는 사람들이 늘어나고, 반대로 주식을 내다 파는 사람이 급증할 땐 순간 매도자가 더 늘어나는 경향이 있어요. 이런 시장의 특성을 고려해 가격제한폭을 둬서 주가의 급등락을 완화하려고 하는 거죠.

정말 주가에 큰 영향을 줄 만한 일이 발생해서 주가가 급등락했다면 문제가 없겠지만, 주식 시장은 시시각각 변하는 투기적 시장이다 보니 실제로 갑자기 과도하게 가격이 변화할 때가 있어요. 누군가 불공정한 방법으로 특정 주식의 가격을 과도하게 높이거나 낮추려 할 때도 있고요. 가격제한폭 제도는 이럴 때 선의의 일반 투자자들이 보게 되는 피해를 줄일 수 있는 장치예요.

과거 우리나라 주식 시장의 가격제한폭은 훨씬 작았어요. 평균 4.6%(주가에 따라 차등 적용)였던 것을 1995년에 일괄 6%로 조정했고, 이후 몇 번의 조정을 거쳐 2015년 6월부터 30%로 확대했어요. 가격제한폭을 확대한 건 주식 시장의 효율성을 높이기 위해서예요. 가격제한폭이 너무 작으면 기업의 가치 변동과 투자자들의 평가가 신속하게 주가에 반영되지 못한다고 판단했기 때문이에요.

가격제한폭 제도를 채택하는 것 자체가 주식 시장의 효율성을 떨어뜨린다고 보는 사람들도 있어요. 주식 시장이 성숙한 상태이고 규모도 충분히 크다면, 가격에 개입하지 않고 시장에 맡겨두는 게 더 낫다고 판단하는 사람들이죠. 그래서 미국과 영국 등 국가의 주식 시장에는 아예 가격제한폭이 없어요. 미국에선 특정 회사의 주가가 하루 만에 수십 배씩 폭등하거나 절반 이하로 급락해버리는 현상이 일어나기도 해요.`

    content: `디지털 시장법(Digital Markets Act, DMA)이란 지난 2022년 유럽연합(EU) 의회가 통과시킨 법이에요. 거대 IT 플랫폼 기업들이 더 이상 시장을 독점하지 못하도록 규제하겠다는 취지예요. 구글이나 메타(페이스북), 애플, 아마존 등 주요 IT 플랫폼 기업들이 적용 대상이고, 2024년 3월부터 본격적으로 시행됐어요. 주요 플랫폼 기업들에 큰 반향을 일으켰다는데요, 핵심 내용을 크게 4가지로 정리할 수 있어요.

• 자사 추천 금지
플랫폼 기업이 운영하는 검색 서비스에서 자사 상품이나 서비스를 우선 노출하는 게 금지돼요. 예를 들어 구글 검색에서 어떤 상품을 찾으면, 구글의 자체 쇼핑 서비스가 다른 경쟁사보다 먼저 뜨도록 해선 안 된다는 뜻이에요. 이 법이 적용되면 아마존이 자체 브랜드 상품을 검색 결과 상단에 우선 노출하는 행위도 할 수 없게 돼요.

• 앱 마켓 독점 허용 안 돼
앱스토어를 통해 앱을 내려받을 때 소비자가 구매한 상품의 수수료 일부(최대 30%)를 가져가지 못하게 해요. 플랫폼 기업이 운영하는 앱스토어 외에 다른 마켓에서도 앱을 내려받을 수 있도록 허용해야 하고, 두 개 이상의 앱 마켓을 동시에 설치할 수 있어야 해요.

• 메신저는 상호운용성 갖춰야
IT 플랫폼 기업들이 운영하는 메신저 서비스가 서로 연동될 수 있어야 해요. 플랫폼 기업의 메신저 앱을 쓰지 않더라도 다른 앱을 통해 메시지를 주고받을 수 있어야 한다는 거예요. 예를 들어 왓츠앱(WhatsApp)을 쓰지 않더라도 카카오톡 같은 다른 메신저로 왓츠앱 이용자에게 메시지를 보낼 수 있게 되는 식이죠.

• Siri냐, 알렉사냐… 기본 앱도 자유롭게
스마트폰을 사면 기본 서비스나 앱이 탑재되는데요. 디지털 시장법이 적용되면 스마트폰 제조사가 자사 서비스만 기본으로 탑재하지 않고, 이용자가 원하는 서비스나 앱을 기본으로 선택할 수 있게 해야 해요. 예를 들어 아이폰을 구매했을 때 AI 음성비서로 애플의 '시리' 대신 아마존의 '알렉사'를 기본 앱으로 설정할 수 있게 될 가능성이 있는 거죠.`

    title: '시세·호가·실거래가·공시가격',
    content: `집은 하나인데 집값은 여러 개예요. 실제로 집 한 채에는 호가·시세·실거래가·공시가격 등 여러 가격이 매겨져요.

• 호가
'파는 사람이 부르는 값'이에요. 부동산에 붙어 있는 매물 안내에 적힌 가격이 호가예요. 매도자는 비싸게 팔고 싶고, 매수자는 깎고 싶으니 실제 거래 가격과 다를 수 있어요.

• 시세
사람들이 실제로 거래하는 가격의 흐름이에요. 공신력 있는 통계 자료도 있는데, 우리나라에선 공기업인 한국부동산원과 민간 KB국민은행이 각각 집계해요. 두 기관이 따로 조사하기 때문에 '부동산원 시세'와 'KB시세'가 일치하지 않을 수도 있어요.

• 실거래가
호가와 시세를 참고해 실제로 거래된 가격이에요. 우리나라에선 부동산을 사고팔 때 실제 거래 가격을 반드시 지방자치단체에 신고해야 해요. 정부는 이 실거래가를 모아서 공개하고 있어요. 실거래가가 시세와 크게 다르게 형성되면 시세에 반영돼요.

• 공시가격
정부가 건물의 가치를 조사해 공식적으로 매기는 가격이에요. 재산세·종합부동산세 같은 보유세를 부과할 때 기준으로 삼아요. 건물은 '공시가격', 땅은 '공시지가'로 불러요. 매년 조사해서 공개하며, 새 공시가격에 이의가 있으면 신청 기간 내에 이의 신청을 할 수 있어요.`

  '공시가격': {
    title: '공시가격',
    content: `공시가격은 정부가 건축물의 가치가 얼마나 되는지 조사해서 공식적으로 매기는 가격이에요. 시장에서 실제로 거래되는 가격과 비슷한 '시세'와는 다른 개념인데요, 공시가격은 재산세와 종합부동산세 같은 부동산 관련 '보유세(재산세·종합부동산세)'를 매길 때 기준으로 삼는 가격이라는 점이 가장 큰 차이죠.

재산세와 종합부동산세는 부동산의 '공시가격'을 기준으로 1년마다 매겨요. 정부가 조사해서 정하는 공시가격은 보통 시세보다는 낮은 수준이에요. 예전엔 실제로 주택이 거래되는 가격의 50~70% 수준에서 정해지는 게 보통이었어요.

그런데 지난 정부는 실제 주택 가격과 공시가격의 차이를 줄이는 '공시가격 현실화' 정책을 펼쳤어요. 시세 대비 공시가격의 비율을 '현실화율'이라고 부르는데요, 예를 들어 10억원짜리 아파트의 공시가격이 7억원이라면 현실화율은 70%인 거죠.

부동산 공시가격 현실화는 법적으로 규정된 '적정 가격'보다 낮은 가격으로 공시가격을 매기는 관행에서 벗어나기 위한 정책이었어요. 부동산 유형별로 공시가격이 시세와 너무 큰 차이가 나서 세금을 매길 때 공정성을 해친다는 지적도 나왔고요. 특히 단독주택의 현실화율은 아파트보다 훨씬 낮아서 형평성 문제가 자주 제기됐대요. 올해 기준 현실화율은 공동주택(아파트) 평균이 69%, 단독주택 평균이 53.6%, 토지 평균이 65.5% 수준이에요.

지난 정부는 부동산 유형별로 현실화율이 크게 다른 상황을 고려해 토지는 2028년, 공동주택은 2030년, 단독주택은 2035년까지 8~15년에 걸쳐 현실화율을 90%로 높이는 계획을 세웠어요. 곧 공시가격은 예전보다 큰 폭으로 오르게 됐어요. 지난 2021년까지 몇 년간 주택 가격이 폭등한 영향으로 공시가격은 더 빠르게 올랐어요.

그래서 부동산 보유세 부담도 늘어났어요. 현실화율을 높이겠다는 건 결국 세금의 기준이 되는 '공시가격'이 높아진다는 거고, 결국 세금을 많이 걷겠다는 뜻이니까 주택 보유자들에겐 중요한 문제예요.

현 정부는 부동산 보유세를 다시 내리겠다는 방침을 세웠어요. 그러려면 공시가격 관련 정책을 가만히 둘 수 없겠죠. 정부가 지난 정부의 '공시가격 현실화' 계획 자체를 재검토하기로 한 이유예요. 시세의 90%였던 현실화율 목표를 80% 선으로 낮추거나, 목표 도달 시점을 늦추는 방안을 고민하고 있다고 해요.`

  '세계경제포럼(WEF)': {
    title: '다보스 포럼',
    content: `다보스 포럼의 정식 명칭은 세계경제포럼(WEF, World Economic Forum)이에요. 스위스 동부 휴양지인 다보스에서 열리기 때문에 다보스 포럼으로 불려요. 전 세계의 전·현직 대통령과 총리, 경제장관, 중앙은행 총재는 물론 다국적 기업의 총수와 대표, 경제학자, 언론인 등이 모여 세계 경제에 대해 논의하는 자리예요.

다보스 포럼은 1971년에 처음 시작됐어요. 초창기에는 유럽의 기업인들에게 기업 경영 전략 등을 강연하는 작은 모임이었는데요. 1986년에 발생한 사건이 전 세계의 주목을 받는 계기로 작용했어요. 당시 전쟁 가능성까지 거론될 정도로 큰 갈등을 빚었던 그리스와 터키의 정상이 다보스 포럼에 참석해 정상회담을 가지고 화해를 한 일이었죠. 1994년 이스라엘과 팔레스타인 간 평화 협상의 계기를 마련한 것도 다보스 포럼이었어요.

이렇게 명성이 쌓이면서 다보스 포럼은 세계적인 영향력을 가진 사람들이 모여 경제뿐 아니라 인류 사회의 중요한 문제들을 논의하는 자리로 자리 잡았어요. 매년 수천 명에 달하는 참가자들이 정치·경제부터 문화에 이르기까지 폭넓은 분야에 걸쳐 토론을 벌여요. 비밀리에 중요한 만남이 성사되는 경우가 많다 보니 다보스 포럼을 '세계를 움직이는 사람들의 고급 사교 클럽'으로 부르는 사람들도 있어요.

하지만 이렇게 폐쇄적인 성격 때문에 비판을 받기도 해요. 세계를 대표하는 경제 포럼으로 볼 수 없다는 거예요. 선진국의 입장을 대변하는 '부자들의 잔치'일 뿐이라는 거죠. 다보스 포럼이 구체적인 결론이나 실천적인 합의점은 도출하지 못한다는 비판 또한 존재해요.`

    content: `실업에는 여러 종류가 있어요.

• 스크루플레이션(Screwflation)
'돌려 조인다'는 뜻의 스크루(Screw)와 물가 상승을 합성한 말이에요. 물가가 오르는 상황에서 실질 임금이 감소해 중산층이 실제로 소비할 수 있는 소득이 줄어드는 현상을 뜻해요. 경제가 겉으로는 회복하는 것처럼 보여도 중산층이 체감하는 경기는 점점 나빠지는 상태죠. 스태그플레이션이 '물가'와 '경기침체'라는 거시적 차원에서 경제를 바라본 용어라면, 스크루플레이션은 중산층의 일상과 체감 물가에 더 주목한 용어예요.

느리다는 뜻의 슬로우(Slow)와 물가 상승을 합친 말이에요. 경제 성장률이나 경기 회복 속도가 느려진 상황에서 물가 상승이 일어나는 현상이에요. 스태그플레이션이 마이너스(-) 경제 성장률과 물가 급등이 동시에 일어나는 정도라면, 슬로우플레이션은 마이너스 성장까지는 아닌 아주 낮은 성장률을 이어가는 상태에서의 물가 상승이에요. 슬로우플레이션이 지속돼 상황이 악화하면 스태그플레이션으로 이어질 수 있어요.`

EIB는 오늘날의 EU로 발전한 유럽경제공동체(EEC) 산하 금융기관으로 1958년에 만들어졌어요. 처음에는 6개 창립국에 개발 자금을 빌려주는 게 목적이었는데, EU가 발전하면서 기능도 EU 회원국이나 기업에 장기 자금을 대출해주는 역할로 확대됐어요. 지금은 EU 회원국뿐 아니라 전 세계 국가들을 대상으로 투자 기관 역할을 하고 있으며, 각국 정부에 정책 조언도 하고 EU의 탄소중립 목표 달성을 위한 '기후은행' 역할도 맡고 있어요.

EIB는 유로화 기반 통화정책을 담당하는 유럽중앙은행(ECB)과 더불어 유럽 관련 경제 뉴스에 자주 등장하는 기관이에요.`

  '인플레이션 감축법(IRA)': {
    title: '인플레이션 감축법(IRA)',
    content: `인플레이션 감축법(The Inflation Reduction Act, IRA)은 2022년 8월부터 미국에서 시행된 법이에요. 핵심은 '대기업들로부터 더 많은 세금을 걷어 기후 변화 대응에 활용하자'는 거예요.

2022년 빠르게 치솟은 화석연료 가격이 물가 상승을 이끌었는데요. 친환경 에너지 기업 지원을 늘려 에너지 공급과 소비를 다각화하면 화석연료 의존도를 낮추고 에너지 가격도 내릴 수 있다는 논리예요.

논란이 됐던 건 전기차 보조금 조항이에요. 미국에서 친환경 전기차를 구매하면 한 대당 최대 7500달러(약 1000만원)의 지원금을 주는데, 미국·캐나다·멕시코에서 조립·생산된 전기차에만 혜택이 주어져요. 또 배터리 부품의 북미산 비중(50% 이상, 2029년부터 100%), 핵심 광물의 미국 또는 미국과 FTA를 맺은 국가 채굴 비중도 충족해야 해요. 중국 견제가 주목적이지만 한국 전기차 기업(현대차·기아)도 피해를 봤어요. 현대차그룹은 직전에 미국에 14조원 투자를 약속했는데, 채 3개월도 안 돼 이 법이 통과됐거든요.

한국을 비롯한 독일·영국·일본 등이 한미FTA 위반이라며 강하게 항의했어요. 이에 미국 정부는 전기차를 리스(대여) 등 상업용으로 판매하는 경우 생산·조립 지역과 상관없이 보조금 혜택을 제공하는 방향으로 내용을 완화했어요.`

    content: `기업경기실사지수(BSI·Business Survey Index)는 기업이 체감하는 경기를 나타내는 지수예요. 기업가들을 대상으로 '향후 경기가 어떻게 될 것으로 예상하는지'를 묻는 방식으로 조사해요. 보통 '긍정', '보통', '부정' 중 하나의 응답을 요구하고, 긍정적인 응답과 부정적인 응답의 차이로 지수를 산출해요.

  '황금 낙하산': {
    title: '황금 낙하산',
    content: `황금 낙하산(Golden parachute)은 회사가 인수·합병(M&A)을 당했을 때 기존 경영진을 쉽게 해고할 수 없도록 고용 계약이나 정관에 각종 장치를 해두는 것을 말해요. 대체로 거액의 퇴직금, 스톡옵션, 남은 임기 동안의 보너스 등을 지급하도록 해둬요.

마치 낙하산처럼 비상시에 대비하는 수단이지만 경영진이 많은 돈을 챙길 수 있도록 한다는 점에서 '황금'이라는 말이 붙었어요. 다만 부실 경영으로 경영권을 빼앗긴 무능한 경영진까지 보호해주는 수단으로 전락할 수 있다는 비판도 있어요.`

  '디커플링': {
    title: '디커플링',
    content: `커플링(coupling)은 한 나라의 경제가 다른 국가나 세계 경제 흐름과 유사한 흐름을 보이는 동조화 현상이에요. 증권가의 '미국이 기침하면 한국은 감기에 걸린다'는 속설처럼, 미국 주가가 오르면 한국 주가도 오르고 내리면 같이 내리는 경우가 커플링의 대표 사례예요.

디커플링(decoupling·탈동조화)은 반대예요. 한 나라의 경제가 다른 국가나 전반적인 세계 경제의 흐름과 다른 모습을 보이는 현상이죠.

디커플링은 세계화가 후퇴하는 현상을 설명할 때도 사용돼요. 미국과 중국의 패권 경쟁이 심해지면서 탈세계화 속도가 빨라졌다는 분석이 많아요. 트럼프 전 대통령은 재임 기간(2017년~2021년) 중국과의 경제 교류를 축소하는 디커플링을 강조했고, 영국 경제 매체 파이낸셜타임스는 2019년 올해의 단어 중 하나로 디커플링을 선정하기도 했어요.`

  '빠른 5G? 느린 5G?': {
    title: '빠른 5G? 느린 5G?',
    content: `5세대 이동통신(5G) 서비스의 품질에 대한 소비자들의 불만이 끊이질 않아요. 잘 터지지 않고 심지어 빠르지도 않다는 거죠. 이런 불만은 5G의 특성과 관련이 있어요. 흔히 5G를 두고 '속도는 빠르지만 약하다'는 말을 하거든요.

• 넓은 도로 사용하는 5G
5G는 4G에 비해 대역폭이 넓어요. 대역폭은 보통 '도로 폭'에 많이 비유하는데요. 4G가 왕복 2차선 도로라면, 5G는 왕복 10차선 도로 쯤 된다는 거죠. 도로 폭이 넓으니 데이터 전송속도가 빠른 거고요. 그래서 실감 나는 가상현실(VR)이나 완전 자율주행 자동차처럼 초고속 데이터 통신이 필수인 기술은 5G 없이는 제대로 구현하기가 불가능하다고 해요.

• 장애물에 약한 5G
그런데 5G 통신에 사용하는 전파는 약해요. 건물이나 벽 같은 장애물을 잘 통과하지 못한대요. 속도는 빠르지만 멀리 퍼지지 못하는 거예요. 그래서 5G는 4G에 비해 전파를 퍼뜨려주는 기지국을 더 많이 설치해야 한대요.

소비자들이 '5G가 잘 안 터진다'라고 불만을 품는 것도 이 때문이에요. 5G는 기지국이 여러 개 필요한데 현재 기지국이 너무 부족한 거죠.

그런데 5G 서비스를 쓸 수 있는 지역에서도 '속도가 그렇게 빠르지 않다'라는 불만이 많아요. 5G 서비스를 처음으로 시작할 때 통신사들은 '5G가 4G에 비해 20배 빠르다'며 대대적으로 광고를 했는데, 직접 써보니 별 차이를 못 느끼겠다는 거죠. 왜 생각만큼 빠르지 않은 걸까요?

사실 5G는 종류가 두 가지예요. '빠른 5G'가 있고 '느린 5G'도 있어요. 물론 둘 다 4G보단 빠르지만, 차이가 꽤 커요. 앞서 대역폭을 도로 폭에 비유했었는데요. 빠른 5G는 28㎓(기가헤르츠)의 주파수 대역을 사용하고 대역폭이 아주 넓어서 속도도 아주 빨라요. 느린 5G는 3.5㎓의 주파수 대역을 사용하는데요. 빠른 5G에 비해선 대역폭이 좁아서 속도도 비교적 느려요.

4G보다 20배 빠르다고 했던 5G도 바로 이 '빠른 5G'를 말한 거예요. '느린 5G'도 4G보다는 빠르지만 최고 속도를 비교하면 2배 정도밖에 차이가 안 난대요.

그런데 현재 한국에서 20배 빠른 5G 서비스를 사용할 수 있는 지역은 사실상 없다고 해요. 지금까지 설치한 기지국이 대부분 '느린 5G'용이기 때문이에요. '빠른 5G'용 기지국을 만드는 게 더 어렵기도 하고, 막상 만들어도 활용할 만한 곳이 많지 않기 때문이래요. 초고속 통신을 사용하는 VR이니 자율주행이니 하는 분야의 기술이 아직 무르익지 않았다는 거죠. 하지만 서비스를 이용하는 소비자로선 불만이 쌓일 수밖에 없어요.`
  },

4G보다 20배 빠르다고 했던 5G도 바로 이 '빠른 5G'를 말한 거예요. '느린 5G'도 4G보다는 빠르지만 최고 속도를 비교하면 2배 정도밖에 차이가 안 난대요.

그런데 현재 한국에서 20배 빠른 5G 서비스를 사용할 수 있는 지역은 사실상 없다고 해요. 지금까지 설치한 기지국이 대부분 '느린 5G'용이기 때문이에요. '빠른 5G'용 기지국을 만드는 게 더 어렵기도 하고, 막상 만들어도 활용할 만한 곳이 많지 않기 때문이래요. 초고속 통신을 사용하는 VR이니 자율주행이니 하는 분야의 기술이 아직 무르익지 않았다는 거죠. 하지만 서비스를 이용하는 소비자로선 불만이 쌓일 수밖에 없어요.`

    content: `의무보호예수(Lock up)는 '잠근다'라는 영어 단어의 의미처럼 주식을 보유한 주주가 일정 기간 주식을 팔지 못하게 하는 제도예요. 주식시장 상장 등 기업이 새로운 주식을 발행할 때 소액 투자자들을 보호하기 위해 만들어졌죠.

    title: '기업형 벤처캐피털(CVC)',
    content: `성장 가능성이 큰 벤처기업에 투자해서 수익을 올리는 회사를 벤처캐피털(Venture Capital·VC)이라고 해요. 벤처기업은 독창적인 기술이나 아이디어가 있지만 경영기반이 약해 자금을 동원하기 어려운 경우가 많은데요. 벤처캐피털은 벤처기업에 투자해 이들이 안정적으로 성장할 수 있도록 돕죠. 이때 벤처캐피털은 투자한 만큼의 지분을 갖게 되니, 나중에 투자한 기업이 성장해 기업가치가 상승하면 지분을 비싸게 팔아 돈을 벌 수 있고요.

기업형 벤처캐피털(Corporate Venture Capital·CVC)은 보통 대기업이 설립한 벤처캐피털을 의미해요. 벤처캐피털이 투자하는 주요 목적은 벤처기업을 성장시켜 지분을 비싸게 파는 건데요. 이와 달리 기업형 벤처캐피털의 주된 투자 목적은 유망한 벤처기업들을 미리 '찜'해놓는 거예요. 만약 어떤 대기업이 사업을 확장하고 싶다면, 기업형 벤처캐피털을 통해 사업 확장에 도움이 될 만한 벤처기업에 미리 투자해두는 거죠. 앞서 투자해 둔 기업이라면 나중에 인수 협상을 더욱 수월하게 할 수 있으니까요.

미국이나 일본 같은 국가엔 기업형 벤처캐피털이 많다고 해요. 구글이나 인텔 등의 기업들이 기업형 벤처캐피털을 설립해 활발하게 투자하는 중이죠. 이와 달리 한국에서는 대기업이 기업형 벤처캐피털을 설립하는 게 쉽지 않았는데요. 부작용이 우려된다며 이를 각종 규제로 제한해뒀었기 때문이죠. 대기업이 투자를 빌미로 문어발식 사업 확장을 할 수도 있고, 기업형 벤처캐피털을 통해 대기업 총수의 개인 회사를 부당하게 지원할지도 모른다는 거예요.

그런데 경제 활성화를 위해 벤처기업을 키우는 게 중요하다는 목소리가 커지면서 분위기가 달라졌어요. 대기업이 설립해 자금력이 탄탄한 기업형 벤처캐피털이 많아져야 벤처기업 투자도 활성화될 거라는 주장인데요. 실제 미국에선 벤처기업에 대한 투자 금액의 절반 정도가 기업형 벤처캐피털로부터 나온대요. 결국 작년 말(2021년 12월 30일)부터는 우리나라에서도 대기업이 수월하게 기업형 벤처캐피털을 설립할 수 있도록 법이 개정됐어요.`

    content: `성장 가능성이 큰 벤처기업에 투자해서 수익을 올리는 회사를 벤처캐피털(Venture Capital·VC)이라고 해요. 벤처기업은 독창적인 기술이나 아이디어가 있지만 경영기반이 약해 자금을 동원하기 어려운 경우가 많은데요. 벤처캐피털은 벤처기업에 투자해 이들이 안정적으로 성장할 수 있도록 돕죠. 이때 벤처캐피털은 투자한 만큼의 지분을 갖게 되니, 나중에 투자한 기업이 성장해 기업가치가 상승하면 지분을 비싸게 팔아 돈을 벌 수 있고요.

미국이나 일본 같은 국가엔 기업형 벤처캐피털이 많다고 해요. 구글이나 인텔 등의 기업들이 기업형 벤처캐피털을 설립해 활발하게 투자하는 중이죠. 이와 달리 한국에서는 대기업이 기업형 벤처캐피털을 설립하는 게 쉽지 않았는데요. 부작용이 우려된다며 이를 각종 규제로 제한해뒀었기 때문이죠. 대기업이 투자를 빌미로 문어발식 사업 확장을 할 수도 있고, 기업형 벤처캐피털을 통해 대기업 총수의 개인 회사를 부당하게 지원할지도 모른다는 거예요.

그런데 경제 활성화를 위해 벤처기업을 키우는 게 중요하다는 목소리가 커지면서 분위기가 달라졌어요. 대기업이 설립해 자금력이 탄탄한 기업형 벤처캐피털이 많아져야 벤처기업 투자도 활성화될 거라는 주장인데요. 실제 미국에선 벤처기업에 대한 투자 금액의 절반 정도가 기업형 벤처캐피털로부터 나온대요. 결국 작년 말(2021년 12월 30일)부터는 우리나라에서도 대기업이 수월하게 기업형 벤처캐피털을 설립할 수 있도록 법이 개정됐어요.`
  },

  '공공비축제도': {
    title: '공공비축제도',
    content: `공공비축제도는 정부가 쌀 같은 주요 곡물을 직접 사들여 비축해두는 제도예요. 흉년이 들거나 자연재해, 전쟁 등으로 식량 위기가 발생하는 것을 대비해 일정량의 곡물을 보관해놓는 거죠. 곡물 부족 사태를 대비한다는 목적도 있지만, 곡물이 남아돌아서 가격이 폭락해 농민들이 큰 피해를 보는 것을 방지하는 데 활용되기도 해요.

공공비축제도 하에서 정부는 비축용 쌀을 확보하기 위해 시장에서 거래되는 가격으로 쌀을 매입하는데요. 공공비축제도가 도입되기 전까진 '추곡수매제도'라는 걸 시행했어요. 정부가 쌀을 사들였다 되판다는 점은 같지만, 추곡수매제도는 정부가 시장에서 거래되는 가격보다 비싸게 쌀을 사들이고, 싸게 되판다는 점이 달랐죠. 그런데 세계무역기구(WTO)에서 이 제도에 문제가 있다고 지적했어요. 정부가 자국 농민들을 보호한다며 인위적으로 비싸게 쌀을 사들이는 방식으로 시장에 개입하면, 자유롭고 공정한 무역에 악영향을 줄 수 있다는 거였어요.

이에 2005년 정부는 추곡수매제도를 폐지하고 현재 시행 중인 공공비축제도를 도입했어요. 시장에 과도하게 개입하지 않기 위해 정부는 전국 평균 가격을 계산해 그 가격으로 쌀을 구매해요. 연간 쌀 소비량의 17~18% 정도를 비축해놓는 게 원칙인데요. 쌀이 썩는 것을 방지하기 위해 일정 기간이 지나면 비축해뒀던 쌀을 다시 팔아요. 이때 해당 시기의 평균 쌀값을 구해 되팔죠. 쌀만을 대상으로 시행되던 공공비축제도는 2013년부터 쌀과 밀, 콩으로 그 대상이 확대됐어요.`
  },

  '더블딥': {
    title: '더블딥',
    content: `더블 딥(Double dip)이란 불황에 빠졌던 경기가 단기간에 회복세를 보이다 금세 다시 불황에 빠지는 W자형 이중 경기 침체를 뜻해요. 보통 경제 성장률이 2분기 연속 마이너스 수치이면 '경기 침체' 국면으로 보는데요. 더블 딥은 2개 분기 이상 연속으로 경제가 마이너스 성장률을 기록한 뒤 잠시 회복된 듯한 모습을 보이다가, 다시 2분기 연속 마이너스 성장세에 돌입한 상황을 뜻하는 거죠.

더블 딥은 자주 발생하는 현상은 아니에요. 미국에서는 1980년대 초 이후로 일어나지 않았을 정도로 드문 일이죠. 미국은 1970년대 후반에 물가 폭등 현상을 겪었는데요. 당시 아랍 지역의 산유국들이 석유 생산을 줄이고 가격을 올려 발생한 '석유 파동'도 영향을 미쳤어요.

이때 미국의 중앙은행인 연방준비제도(Fed·연준)는 물가를 잡아보겠다며 1979년부터 기준금리를 대폭 올렸어요. 보통 기준금리를 인상하면 시중의 금리(이자율)가 높아져 대출이나 투자·소비는 줄고, 예금이 늘어나거든요. 결국 시중에 풀린 돈이 줄게 되니 돈의 가치는 상대적으로 높아지고 물가 수준은 낮아지는 거죠.

하지만 기준금리를 올리면 대체로 경기는 위축되고, 주식 시장도 침체에 빠질 가능성이 커져요. 석유 가격이 여전히 비싼 상태였다는 점도 악재였고요. 미국은 1980년 1월~7월에 경기 침체를 겪었어요.

이후 미국 경기는 1980년 말까지 잠시 회복되는 모습을 보였는데요. 그런데도 물가 상승세는 완화될 기미가 보이지 않았죠. 연준은 확실하게 물가를 잡아보겠다며 다시 기준금리를 올렸고, 미국은 1981년부터 그다음 해인 1982년까지 다시 경기 침체에 빠져서 더블 딥을 겪게 됐어요.

최근 더블 딥 현상이 발생할지 모른다는 우려의 목소리가 커지고 있어요. 2020년 초에 여러 국가가 코로나19 유행으로 경기 침체를 겪었잖아요. 이후 각국 중앙은행이 기준금리 인하 등의 정책을 펼치며 경기가 살아나는 듯했고요. 그런데 요즘 물가가 너무 올라서 기준금리를 빠르게 인상하는 중앙은행들이 많아지다 보니, 또다시 경기침체가 찾아와 더블 딥 현상으로 이어질지 모른다는 전망을 하는 사람들이 등장한 거예요.`
  },

  '액면분할': {
    title: '액면분할',
    content: `삼성전자 주식에 투자한 분 있나요? 한때 9만원을 넘겼던 주가가 요즘엔 6만원대까지 떨어졌는데요. 그런데 약 5년 전만 해도 삼성전자 주가가 260만원이 넘었던 거, 알고 계신가요?

바로 액면분할 때문인데요. 액면분할은 주식을 일정한 비율로 나눠서 주식 수를 증가시키는 거예요. 예를 들어 5만원 짜리 주식을 1주 샀다고 가정해볼까요. 그런데 이 기업이 10대1의 주식 액면 분할을 했다면 5천원 짜리 주식을 10주를 갖게 되는 거죠. 이때 보유하고 있는 주식의 가치(5천원×10주=5만원)엔 변화가 없어요.

근데 왜 액면분할을 할까요? 단기적으로 주가를 끌어올리기 위해 하는 경우가 많아요. 보다 많은 소액 투자자들을 끌어들이려는 거죠. 주식에 한 100만원 정도만 투자하려 했던 투자자 입장에선 예전의 삼성전자처럼 1주 가격이 260만원을 넘어버리면 투자하기 어렵잖아요.

그래서 삼성전자는 2018년 5월에 50대1의 액면분할을 실시했어요. 액면분할 전 265만원이던 삼성전자 주식 1주를 갖고 있던 주주는 5만3000원 짜리 주식 50주를 갖게 됐죠.

당시 삼성전자에 투자하고 싶었는데 너무 비싸서 고민만 하던 사람들도 투자를 할 수 있게 된 거고요. 이렇게 갑자기 사겠다는 사람이 늘어나니 주가가 오르기도 해요. 실제 카카오는 지난 2021년 4월에 5대1로 액면분할한 뒤 11만원이던 주가가 두 달여 만에 16만원까지 올랐어요. 삼성전자 역시 2018년 1월 액면분할을 결정했다는 뉴스가 보도된 뒤 주가가 8% 급등하기도 했죠.

또 기업 입장에서는 보다 많은 투자자들이 주주가 되면 기업에 우호적인 여론을 조성할 수 있다는 장점도 있어요. 여러분이 투자한 기업이 있다면 그 기업 물건을 하나라도 더 사게 되고, 악재가 생기더라도 아무래도 편을 들게 되잖아요. 한국사람 10명 중 1명은 투자했다는 삼성전자가 '국민주'가 된 것도 이 액면분할의 역할이 컸죠.

하지만 액면분할을 한다고 꼭 주가가 오르는 건 아니에요. 투자 자금이 흘러들어오기 쉬워진 거지 기업 자체의 가치가 변한 건 아니니까요. 주가는 결국 기업의 실적이나 성장 가능성을 따라갈 수밖에 없죠.`
  },

  '중대재해법': {
    title: '중대재해법',
    content: `중대재해 처벌 등에 관한 법률(중대재해법)은 산업 현장에서 노동자가 사망하거나, 한 사고로 6개월 이상 치료가 필요한 노동자가 2명 이상 발생했을 때 사업주와 경영책임자를 형사처벌 하는 내용을 담은 법이에요. 물론 안전이나 보건 관리 등 의무사항을 지키지 않았을 경우에만 처벌할 수 있어요. 간단히 말해 회사가 사고를 예방하기 위한 조치들을 하지 않은 상태에서 큰 사고가 나면 사장한테 무거운 책임을 묻겠다는 거죠.

꼭 산업 현장이 아닌 일상에서도 적용받는 경우가 있어요. 공공 시설이나 대중교통에서 벌어진 재해도 중대재해가 될 수 있거든요. 공공 시설과 대중교통 수단에 결함이 있어서 사망자가 1명 이상 발생하거나 부상자가 10명 이상 나오면 '중대시민재해'로 인정돼요.`
  },

  'P2E': {
    title: 'P2E',
    content: `온라인 PC게임이나 모바일 게임을 통해 실제 돈을 벌 수 있도록 만든 걸 P2E(Play To Earn)라고 불러요. 돈 버는 방법은 간단히 말해서 '게임 아이템 판매'예요. 사실 이것만 따지면 전혀 새로워 보이지 않죠. 아이템을 현금으로 사고파는 경우는 오래전부터 있었으니까요.

달라진 건 게임 회사가 '안정적인 거래 시스템'을 보장한다는 점이에요. 기존에는 게임 아이템이나 게임머니를 현금 받고 팔려면 거래할 사람을 인터넷 커뮤니티나 중개 사이트에 들어가 찾고, 구매자와 연락해서 아이템과 현금을 주고받는 과정까지 거쳐야 했어요. 마치 당근마켓에서 중고 거래를 하는 느낌인데 좀 귀찮았죠.

P2E 게임은 게임머니나 아이템을 암호화폐로 바꾼 다음, 코인 거래소에서 팔 수 있도록 만들어 뒀어요. 암호화폐라는 거래 수단이 대중적으로 보급되자 게임 회사들이 이런 시스템을 고안해낸 거예요. 예전에도 아이템을 거래했다고는 하지만, 사실 일부 사용자들의 이야기였어요. 그런데 이렇게 제도적인 거래 시스템이 생기면 누구나 이용하기 쉬워져요.

우리나라 게임회사가 만든 P2E 게임 중 가장 화제가 됐던 게 위메이드의 '미르4'예요. 미르4는 사용자가 선택한 캐릭터로 몬스터를 사냥하며 레벨을 올리는 게임인데요, '메이플스토리' '리니지' '디아블로' 같은 유명한 게임들과 비슷한 점이 많은 게임이라고 볼 수 있어요.

이 게임을 하다 보면 '흑철'이라는 아이템을 얻을 수 있는데요, 이걸 모아서 게임 개발사인 위메이드가 만든 암호화폐와 교환이 가능해요. 이 암호화폐는 업비트나 빗썸 같은 국내 주요 암호화폐 거래소에서 판매할 수 있었어요. 당연히 판매한 다음엔 은행 계좌로 금방 출금할 수도 있었죠. 게임을 열심히 하면 돈을 벌게 되는 거예요.

아이템의 가치가 실제 현금 가치와 연결되는 P2E 시스템은 게임이 계속해서 인기를 얻는 원동력이 될 수 있어요. 가상 세계의 아이템이 실제로 가치 있다는 믿음을 주기 때문이기도 하고, 돈을 벌기 위해서 게임을 하는 사람들이 생겨나는 덕도 있겠죠.

아직 이런 게임은 우리나라에선 출시가 허용되지 않았어요. 게임 아이템을 현금으로 교환할 수 있게 만든 P2E 게임이 '사행성'을 엄격히 따지는 우리 규제를 통과하지 못했기 때문이에요. 일부 해외 국가에서는 서비스가 가능하다고 해요. 그래서 앞서 설명한 미르4도 외국에서 출시했고, 꽤 인기를 얻었어요.

암호화폐 기술과 시장의 발달로 주목받기 시작한 P2E 게임을 비판하는 사람들도 많아요. 결국 게임 회사가 '돈놀이'를 유도하면서 직접 발행한 코인으로 이익을 챙길 뿐, 게임 자체는 별로 새로울 게 없다는 거예요. 게임 개발이나 서비스보다 암호화폐를 만들어 돈을 버는 데에 집중하는 것처럼 보인다는 거죠.`
  },

  '세계가 달 탐사에 나서는 이유': {
    title: '세계가 달 탐사에 나서는 이유',
    content: `몇 년 전부터 미국이나 중국, 유럽연합(EU) 등 주요국들이 우주 탐사와 개발에 막대한 예산을 쏟아 붓고 있어요. 1950~1960년대에 미국과 소련(소비에트 연방)이 경제력과 기술 수준을 과시하기 위해 우주 개발 경쟁에 나섰던 것과는 달리, 2010년대 후반부터는 실용적인 목적을 위한 경쟁이 시작됐죠.

① 우주에서 보내주는 내 위치정보
우리가 매일 사용하는 GPS(위치정보 시스템)은 인공위성이 보내주는 신호를 통해서 우리의 위치를 확인하거나 길 안내를 받을 수 있게 해주는데요. 사실 GPS는 미국이 군사적 목적으로 개발했으나 민간 용도로 사용 가능하도록 무료로 개방한 기술이에요. 만약 미국이 이런저런 이유로 다른 나라의 GPS 사용을 중단시키거나, 더 이상 무료로 제공하지 않으면 큰 혼란이 벌어질 지도 모르는 거죠. 그래서 한국 등 주요국들은 자체 GPS를 개발 하고 있어요. 이때 필요한 위성들을 우리 손으로, 우리가 원하는 때에 발사하려면 우주 로켓 기술이 꼭 필요하고요.

② 6G에도 꼭 필요한 인공위성
2030년부터 상용화될 것으로 예상되는 6세대 이동통신(6G)을 위해서도 우주 개발 기술은 필요해요. 6G는 5G보다 통신 속도가 빠르다는 것 외에도, 공중 혹은 바다 등 어디에서나 통신이 가능하다는 게 특징이에요. 당연히 지상에서도 통신이 불안정한 음영 지역이 없어야 6G로 인정받을 수 있어요.

예를 들어 운전자가 필요 없는 완전 자율주행차 도입을 위해서는 6G 도입이 필수예요. 주변 차량이나 도로 환경에 대한 정보를 거의 실시간으로 주고받아야 하는데, 통신이 불안정하면 치명적인 사고로 이어질지도 모르니까요. 통신이 불안정한 음영 지역을 없애려면, 기지국을 장애물이 많은 지상뿐 아니라 인공위성에도 설치해서 어디서든 통신망에 접속할 수 있도록 해야 하는 거예요.

③ 더 먼 우주를 향해
우주 탐사의 목적이 인공위성만을 위한 건 아니에요. 미국은 2019년부터 달 표면과 궤도에 인간이 장기 체류할 수 있는 기지를 건설하고, 더 먼 우주를 탐사하기 위한 중간기지로 활용한다는 계획의 '아르테미스 프로젝트'를 진행 중이죠.

중간기지 건설 외에도 달의 활용가치는 높아요. 달에서 아주 귀한 자원들이 발견됐거든요. 이 중에는 '헬륨3'이라 불리는 물질도 있어요. 지구에는 거의 없지만 달에는 최소 100만 톤이 존재하는 것으로 추정돼요. 이 물질을 핵융합 발전에 활용하면 유해한 방사성 폐기물 없이 기존 원자력 발전의 5배 이상 효율로 전기 에너지를 만드는 게 가능하대요. 일부 과학자는 이 물질이 100톤만 있어도 지구 온난화나 환경오염, 방사능의 문제없이 모든 인류가 1년간 사용하는 에너지를 생산할 수 있다고 말하죠. 달 뿐만 아니라 화성이나 더 먼 우주로 나가 자원과 미래 인류를 위한 삶의 터전을 찾는 게 우주 개발의 궁극적인 목적이에요.`

① 우주에서 보내주는 내 위치정보
우리가 매일 사용하는 GPS(위치정보 시스템)은 인공위성이 보내주는 신호를 통해서 우리의 위치를 확인하거나 길 안내를 받을 수 있게 해주는데요. 사실 GPS는 미국이 군사적 목적으로 개발했으나 민간 용도로 사용 가능하도록 무료로 개방한 기술이에요. 만약 미국이 이런저런 이유로 다른 나라의 GPS 사용을 중단시키거나, 더 이상 무료로 제공하지 않으면 큰 혼란이 벌어질 지도 모르는 거죠. 그래서 한국 등 주요국들은 자체 GPS를 개발 하고 있어요. 이때 필요한 위성들을 우리 손으로, 우리가 원하는 때에 발사하려면 우주 로켓 기술이 꼭 필요하고요.

② 6G에도 꼭 필요한 인공위성
2030년부터 상용화될 것으로 예상되는 6세대 이동통신(6G)을 위해서도 우주 개발 기술은 필요해요. 6G는 5G보다 통신 속도가 빠르다는 것 외에도, 공중 혹은 바다 등 어디에서나 통신이 가능하다는 게 특징이에요. 당연히 지상에서도 통신이 불안정한 음영 지역이 없어야 6G로 인정받을 수 있어요.

예를 들어 운전자가 필요 없는 완전 자율주행차 도입을 위해서는 6G 도입이 필수예요. 주변 차량이나 도로 환경에 대한 정보를 거의 실시간으로 주고받아야 하는데, 통신이 불안정하면 치명적인 사고로 이어질지도 모르니까요. 통신이 불안정한 음영 지역을 없애려면, 기지국을 장애물이 많은 지상뿐 아니라 인공위성에도 설치해서 어디서든 통신망에 접속할 수 있도록 해야 하는 거예요.

  'MSCI 지수': {
    title: 'MSCI 지수',
    content: `MSCI 지수(Morgan Stanley Capital International index)는 JP모건 체이스, 골드만삭스와 함께 세계 3대 투자은행으로 불리는 '모건스탠리(모건스탠리 캐피털 인터내셔널)'가 1969년에 세계 최초로 만든 국제적 주가지수예요. 워낙 큰 투자은행이 만든 것이기도 하고, 전 세계 투자 기관들이 투자의 기준으로 삼기 때문에 영향력이 매우 커요.

• 주가지수가 뭔데?
일단 '주가지수'는 증권 시장에서 형성되는 주가의 변동 상황을 종합적으로 나타내는 지표예요. 세계에는 워낙 기업들도 많고 주식도 많잖아요, 그래서 이 주식들이 대체로 어떻게 움직이는지를 한눈에 알기란 불가능하죠. 그래서 만들어진 게 주가지수예요. 예를 들어 나라별 주식들의 큰 흐름이 어떤지를 보려면 나라별로 있는 주가지수를 살펴보면 돼요. 업종별, 규모별로도 만들어둔 다양한 지수를 통해 주가 흐름을 파악할 수 있어요.

주가지수는 각국 증권 시장에 있는 주식들을 모두 묶어 만들거나(미국: 나스닥, 한국: 코스피 등) 특정 주식들을 한데 묶어서 만들어요. '대형 반도체 기업'이나 '규모로 100등 안에 드는 기업' 등 다양한 기준으로 묶어서 만드는 거죠. MSCI는 미국 모건스탠리가 각 주식들이 가지는 영향력을 반영하도록 계산해서 만든 거예요.

• MSCI 지수가 여러 개야?
MSCI 지수에도 여러 종류가 있는데요, 주요 지수로는 국가별 주식 시장의 발전 단계에 따라 만든 선진국 지수(MSCI World Index), 신흥국 지수(MSCI Emerging Markets Index) 등이 있어요. 지수를 구성하는 국가나 종목별 비중은 정기적으로 바뀌어요. 우리나라는 선진국 지수 편입을 시도하고 있지만, 아직은 신흥시장 지수에 머물러 있어요. 이런 국가별 지수 외에도 지역별, 업종별로 100여 개에 달하는 MSCI 지수가 있어요.

• MSCI의 영향력은?
MSCI 지수는 국제적인 투자 기관들이 기준으로 삼는 대표적인 지표예요. MSCI 선진국 지수에 편입된 국가의 주식시장은 명실상부한 '선진 주식시장'으로 인정받을 수 있죠. 이 지수를 따라서 투자하는 전 세계 투자 기금 규모만 약 3조 5000억 달러(약 4200조원)에 달한다고 해요. 이 큰돈이 MSCI의 변동에 따라서 이리저리 움직이는 거예요.`
  },

    content: `노동이사제는 회사의 의사결정에 노동자의 목소리를 반영시키는 제도예요. 회사의 업무와 관련된 의사를 결정하는 기관을 이사회라고 해요. 이사회는 주주들이 선임한 이사들로 구성되는 게 원칙인데요. 노동이사제가 시행되면 노동자가 뽑은 대표인 노동이사가 이사회 회의에 참가할 수 있게 되죠.

노동이사제 도입을 찬성하는 사람들은 이 제도가 노동자의 권리를 강화한다고 주장해요. 노동이사가 이사회 회의에 참석해 주요 안건에 대한 의견을 내게 되니까요. 사업 계획은 물론 투자 결정이나 임금 인상 같은 중요한 사안에 노동자의 목소리가 반영될 수 있겠죠.

또 주주가 선임한 이사들과 달리, 노동이사는 근로자의 경험을 살려 기업 경영에 현장의 목소리를 반영할 수 있어요. 경영진을 감시하고 견제하는 이사회에 노동자 대표가 참여하게 되니 기업 경영의 투명성은 높아지고요.

노동이사제에 반대하는 사람들은 이 제도가 주주들의 권리를 침해할지 모른다고 우려해요. 회사의 주인인 주주 외에 다른 사람들이 회사 경영에 목소리를 내게 되는 거니까요. 노동자를 위한 의사결정이 주주의 이익과는 상충할지도 모른다는 거죠. 또 노동이사가 이사회 회의에 참가하면 의사 결정이 지체된다거나, 이들의 경영 전문성이 부족해 문제가 된다는 주장도 나와요.

노동이사제는 유럽에서 보편화된 제도예요. 노동이사제를 가장 먼저 채택한 독일에선 임직원이 500명을 넘는 모든 회사에 의무적으로 노동이사를 둬야 하죠. 독일을 포함한 유럽 19개국에서 노동이사제를 의무화하는 법이 시행되고 있어요. 이 중 14개국은 공기업 등 공공기관과 민간 기업 모두에 노동이사제를 적용했고, 그리스와 아일랜드 등 5개 국가는 공공기관에만 노동이사를 두고 있어요.

한국에선 노동이사제 도입을 의무화하는 법이 지난 8월부터 시행됐어요. 공공기관에만 적용되는 법인데요. 공공기관에선 3년 이상 재직한 근로자 중 1명을 노동이사로 선임해야 하죠. 노동자 대표가 추천하거나, 노동자 과반의 동의를 얻어야 노동이사로 뽑힐 수 있어요. 노동이사제는 근로자이사제라고 부르기도 해요.`
  },

  '탄소국경세': {
    title: '탄소국경세',
    content: `탄소국경세는 해외에서 생산한 제품을 수입할 때, 자국보다 이산화탄소를 많이 배출하는 국가에 대해 부과하는 세금이에요. 제품이 무역을 통해 국경을 넘어올 때 부과하는 '관세'의 일종이라고 볼 수 있어요. 세계 환경 보호와 탄소 중립 목표 달성을 위해 미국 조 바이든 행정부와 유럽연합(EU)이 주도적으로 도입을 추진하고 있어요. 탄소 배출 관련 규제가 느슨한 국가에 페널티를 부여해 탄소 배출을 줄이도록 유도하기 위한 수단인 셈이죠.

탄소국경세를 도입하면, 자국에 수입되는 제품을 생산하는 과정에서 얼마나 많은 탄소가 배출됐는지를 따져요. 탄소를 더 많이 배출하며 생산한 제품일수록 더 큰 비용을 부과하는 거예요. EU는 철강과 전력, 비료, 알루미늄, 시멘트, 유기 화학제품, 플라스틱, 수소, 암모니아 등 품목에 탄소국경세를 부과하는 방안을 검토해왔어요. 제조 과정에서 많은 탄소를 배출하는 대표적인 품목들이에요.

EU에 비해 미국은 조금 더 신중하게 탄소국경세 도입을 검토하고 있지만, 기후 변화에 대응한다는 차원에서 결국 함께 도입하게 될 것이라는 전망이 나와요. 탄소국경세가 도입될 경우, 석유화학·철강 등 탄소를 많이 배출하는 산업 분야에서 강점을 보유한 우리나라는 큰 부담이 생길 것으로 예상돼요.`

  '생산자 물가지수': {
    title: '생산자 물가지수(PPI)',
    content: `물가 상승률이 높다는 이야기, 지난해부터 참 많이 들으셨죠? 경제 뉴스에서 이런 소식을 전할 때면 '물가지수'라는 용어를 자주 사용하는데요, 물가지수란 물가가 어떻게 움직이는지를 수치로 쉽게 파악하기 위해 만든 지표예요. 가격을 조사할 제품과 서비스들을 정해두고, 정기적으로 조사한 다음 품목별 가중치까지 반영한 분석을 통해서 산출해요.

물가지수는 기준 시점의 물가를 '100'으로 두고 물가 수준을 판단할 수 있게 해줘요. 예를 들어 기준 시점이 2015년이었고 지난달 물가지수가 '105'였다면, 지난달 물가가 2015년보다 5% 비쌌다고 볼 수 있는 거죠. 기준 시점과 조사 품목들은 경제 구조 변화를 반영하기 위해서 5년마다 정기적으로 바꿔요.

대표적인 물가지수로는 소비자물가지수(CPI, Consumer Price Index)와 생산자물가지수(PPI, Producer Price Index)가 있어요. CPI는 일반적인 소비자가 자주 구매하거나 많은 금액을 쓰는 품목들을 조사해 산출하고, PPI는 생산자들이 국내 시장에 공급하는 품목들을 조사한 다음, 전체 경제에서 차지하는 중요도를 고려해서 계산해요.

CPI는 우리가 일상에서 물건을 살 때의 가격인 '소비자 가격'의 변동을 나타내지만, PPI는 제조회사가 도·소매업자에게 판매한 가격의 변동을 반영해요. 우리가 상점에서 사는 물건들을 공장에서 들여올 때의 가격이죠. 우리나라에서 CPI는 통계청이, PPI는 한국은행이 담당하고 있어요.`

    content: `베이지북(Beige Book)은 미국 연방준비제도(Fed·연준)의 최고 의사결정기구인 연방준비제도이사회(FRB)가 1년에 8차례 발표하는 미국 경제동향 종합보고서를 일컫는 말이에요. 연준에서 가장 핵심적인 역할을 하는 FRB 산하 12개 지역 연방준비은행이 이 보고서를 쓰는데요. 기업인과 경제학자, 시장 전문가의 견해는 물론이고, 미국 각 지역의 산업 생산활동, 소비 동향, 물가, 노동시장 상황 등 모든 경기지표를 조사하고 분석한 내용이 보고서에 담겨요.

미국의 지역별 은행들은 지난 1970년부터 지역별 경제상황을 요약한 보고서를 발간해 왔어요. 원래 이 보고서의 표지 색상은 빨간색이어서 '레드북(Red Book)'으로 불렸고요. 하지만 당시에는 레드북이 정책 입안을 위한 참고자료 정도였다고 해요. 그러다가 1983년부터는 공개적으로 발간하는 자료가 됐고, 이때 책 표지 색상이 베이지색으로 바뀌면서 '베이지북'으로 불리게 됐어요.`

  },

  '칩4': {
    title: '칩4',
    content: `'칩4(Chip4)'는 미국 정부가 주도하는 '반도체 협력체'예요. 반도체를 흔히 칩(chip)이라고 부르는데요. 지난해 3월 미국 정부는 한국과 일본, 대만까지 4개 국가가 반도체 산업에서 힘을 합치자고 제안했죠.

미국은 왜 하필 우리나라와 일본, 대만과 협력 관계를 강화하고 싶어 할까요? 반도체를 만드는 과정이 복잡해지면서 한 나라가 혼자 반도체를 생산할 수 없게 됐기 때문이에요. 일단 미국 반도체 회사들은 설계에 능해요. 그리고 한국과 대만 회사들은 설계도를 보고 직접 반도체를 생산하는 걸 잘하고요. 일본에는 반도체 생산에 필요한 소재나 부품, 장비를 잘 만드는 회사들이 많아요.

그래서 미국 회사들이 아무리 설계를 잘한다고 해도 한국과 대만 업체가 도와주지 않으면 반도체를 충분히 생산할 수 없어요. 결국 미국은 '우리끼리 앞으로도 잘 협력하면서 반도체를 안정적으로 생산해 보자'라고 제안한 거예요.

미국 정부가 협력을 제안한 이유는 전 세계 패권을 두고 경쟁 중인 중국을 견제하기 위해서예요. 이제 반도체는 전자기기뿐 아니라 의료기기와 군사 장비에도 들어가는 핵심 자원이 됐거든요. 미국은 경제는 물론 국가 안보를 위해서도 반도체 협력을 확대하려는 거고요. 중국 반도체 회사에 기술을 알려주거나, 첨단 반도체 생산 장비를 판매하지 말라고 압박하고 있어요.

일본과 대만 정부는 일찍이 이 협력체에 참여하겠다는 뜻을 밝혔어요. 한국 정부는 오랜 고민 끝에 2023년 2월 열린 칩4 회의에 참석하면서 사실상 협력체 가입을 공식화했어요. 우리나라가 고민한 건 중국의 보복이 우려되기 때문이에요. 한국에서 생산된 반도체 중 상당한 비중이 중국으로 수출되거든요.

사실 칩4는 미국에선 팹4(Fab4)라고 불려요. 반도체를 제조하는 생산시설을 뜻하는 패브리케이션(Fabrication)에서 따온 용어죠. 다만 대다수 국내 언론은 반도체 '칩'을 쉽게 연상할 수 있는 칩4라고 불러요.`
  },

  '혼잡통행료': {
    title: '혼잡통행료',
    content: `혼잡통행료는 대도시에서 교통 혼잡을 줄이기 위해 사용하는 정책 중 하나예요. 혼잡도가 아주 높은 지역을 주행하는 차량에 통행료를 부과하는 제도죠. 돈을 내라고 하면 해당 지역에 진입하는 차량이 줄어들 테니까요. 혼잡을 일으킨 사람에게 부과하는 일종의 세금과 비슷하다고 해서 '혼잡세'라는 이름으로 부르기도 해요.

혼잡통행료를 부과하면, 도시의 중심 지역에서 자가용을 운전하는 사람을 감소시켜 교통 체증과 대기 오염 문제에 대응할 수 있어요. 직접 운전을 하는 대신 대중교통을 이용하도록 유도할 수도 있고요. 이 제도는 1975년 싱가포르에서 도입된 이후 전 세계 여러 국가로 확산했어요. 영국의 수도인 런던도 2003년부터 일부 지역에서 혼잡통행료를 부과하고 있어요.

다양한 시설이 집중된 대도시 중심부는 어쩔 수 없이 특정 시간대에 교통 혼잡이 발생하는 곳이에요. 그만큼 '도로' 같은 교통 기반 시설이 더 필요하지만, 공간이나 비용의 문제 때문에 공급을 쉽게 늘리기란 어렵죠. 결국 혼잡통행료는 교통 수요가 몰리는 시간대에 탄력적으로 가격을 부과함으로써 '도로'라는 시설 공급을 늘리지 않고도 '혼잡'이라는 문제를 효율적으로 관리할 수 있게 도와주는 수단인 거예요.

우리나라에서도 혼잡통행료를 부과하는 지역이 존재해요. 1980년대 이후 교통량이 급속하게 증가하며 서울 도심에서 교통 혼잡이 심각해지자, 1996년 11월부터 남산 1·3호 터널을 통행하는 차량에 요금을 부과해왔죠. 지금도 평일 오전 7시부터 오후 9시까지 운전자를 포함해 3명 이상 탑승하지 않은 상태로(1~2명) 남산 터널을 통과하면 혼잡통행료를 내야 해요.`
  },

메기 효과는 정체된 생태계에 강력한 포식자나 경쟁자가 나타나면 기존의 생물들이 생존을 위해 더 활발히 움직인다는 것을 의미해요. 정확한 유래는 알려지지 않았지만, 과거 유럽의 어부들이 이 효과를 활용했다는 주장이 유력한데요. 과거엔 바다에서 잡은 정어리를 항구까지 운반하는 과정에서 많은 수의 개체가 폐사하는 게 골칫거리였대요. 그런데 정어리가 가득 담긴 수조에 천적인 메기를 넣어봤더니 정어리 생존율이 높아졌다고 해요. 몇 마리 정도는 잡아먹히지만, 오히려 나머지 개체는 살아남기 위해 꾸준히 움직였기 때문이에요.

결국 누구든 생존이 걸린 위기 상황에 직면했을 때 최대한의 잠재력을 발휘한다는 건데요. 이 방식을 사회에 적용한다면 치열한 경쟁 환경이 개인이나 조직, 회사의 발전에 도움이 된다는 해석이 가능하죠.

파이어족 열풍은 세계적 금융위기가 발생한 2008년 이후 미국에서 빠르게 퍼졌는데요, 초기 파이어족의 특징은 소비를 극단적으로 줄이고 저축을 늘려서 은퇴 자금을 모으는 데 집중한다는 점이었어요. 반면에 꽤 시간이 흐른 지금은, 적극적 자산 증식을 지향하는 투자자들이 많아지면서 공격적인 투자로 빠른 은퇴를 노리는 다른 유형의 파이어족도 등장했다는 분석이 많아요.

  '예비 타당성 조사': {
    title: '예비 타당성 조사',
    content: `예비 타당성 조사는 대규모 국가 예산이 투입되는 사업을 계획할 때, 그 사업을 추진해도 될지 미리 조사해보는 절차예요. 경제성이 없는 사업을 선심성으로 진행했다가 세금이 낭비되는 걸 막기 위한 거죠.

• 조사 대상
총 500억원 이상의 비용이 들고 국가 예산으로 300억원 이상을 지원하는 사업이 대상이에요. 보통 철도, 도로, 공항 건설 사업이나 통신망 구축, 대규모 연구 사업이 예비 타당성 조사를 받게 돼요. 정부가 의뢰하면 국책 연구기관인 한국개발연구원(KDI)이 조사를 담당해요. 조사 기간은 6개월이고요.

• 평가 기준
예비 타당성 조사는 경제성, 정책적 타당성, 지역 균형 발전 등을 평가해요.
① 경제성: 사업의 비용은 얼마나 드는지, 경제적 효과는 얼마나 큰지, 사업 자금은 안정적으로 조달할 수 있는지를 따져봐요.
② 정책성: 기존 정책과 일관성이 있는지, 고용 유발 효과는 어느 정도인지 등을 평가해요.
③ 지역 균형 발전: 낙후 지역 개선 효과가 있는지, 지역 경제 파급효과는 있는지를 살펴봐요.

이런 요소들을 종합적으로 평가해서 결론을 내려요. 예를 들어 비용 대비 경제적 효과는 작아도 지역 경제 파급효과가 아주 크면 타당성이 있다고 판단할 수 있는 거죠.

• 장단점
예비 타당성 조사를 통해 경제성이 없는 사업을 무리하게 추진하는 걸 막고, 중도에 사업이 취소되는 것을 방지할 수 있어요. 하지만 조사 기간이 길어지면 그만큼 사업이 지연될 수밖에 없어요. 적게는 수억원에서 많게는 수십억원에 달하는 조사 비용도 들어요.

• 조사 제외 대상
교육시설이나 문화재 복원사업, 국가안보와 관련된 사업은 조사 대상에서 제외돼요. 도로나 상수도 등 기존의 시설을 단순 개량하거나 보수하는 사업도 조사를 받지 않아요. 법령에 따라 추진하는 사업도 조사 대상에서 빠지죠. 그래서 예비 타당성 조사를 면제해주기 위해 특별법을 만드는 경우도 있어요.

• 타당성 조사?
예비 타당성 조사가 끝나면 보통 타당성 조사로 넘어가요. 예비 타당성 조사는 정부의 의뢰로 경제적 타당성을 주로 조사하는데요. 이와 달리 타당성 조사는 사업을 시행하는 기업이나 기관이 직접 담당해요. 이 과정에선 사업을 추진하는 게 기술적으로 가능하고 타당한지를 주로 조사해요.`

세계적으로 '친환경 투자'를 향한 관심도가 높기 때문에, 향후 자금 조달이나 투자 유도에 중요한 기준이 될 가능성도 커요. 그래서 기업과 투자자들은 그린 택소노미를 일종의 '녹색금융 지침서'처럼 활용한다고 해요.

그린 택소노미에서 규정한 '친환경 발전'에는 원자력과 천연가스를 이용한 발전이 논란 끝에 포함됐어요. 원자력 발전은 전기를 생산하는 과정에서 탄소를 배출하진 않지만, 결국 방사능폐기물을 만들어 내서 완전히 깨끗하다고 보기 힘들어요. 천연가스는 발전에 활용할 때 '메탄' 등 일부 온실가스를 배출하고요.

하지만 EU는 2050년까지 탄소 중립 목표를 실현하려면 원자력과 천연가스를 '과도기적 에너지'로 활용해야 한다고 판단했어요. 우크라이나 전쟁으로 러시아로부터 에너지 공급이 끊기면서 에너지 위기를 겪은 유럽 국가들이 원자력을 다시 활용해야겠다고 생각하게 된 것도 영향을 미쳤어요.

우리나라도 EU의 그린 택소노미를 참고해 'K-택소노미(한국형 녹색분류체계)'로 불리는 친환경 분류 체계를 도입했어요.`

    content: `'디폴트(Default)'는 채무불이행, 그러니까 빚을 못 갚는 걸 말해요. 빚을 아예 못 갚으면 부도가 나겠죠. 결국 디폴트는 부도 사태와 같은 말처럼 쓰는 용어예요. 보통 파급력이 큰 국가 규모의 부도에 쓰긴 하지만 기업이나 개인이 빚을 갚지 못한 경우도 이 말을 쓸 수 있어요.

  '마진콜': {
    title: '마진콜',
    content: `마진 콜(Margin call)은 선물(Future) 시장에서 주로 사용되는 단어예요. 선물 거래란 어떤 자산을 '미래의 특정 시점에, 미리 정한 가격에' 거래하기로 정하는 계약이죠. 농촌에서 많이 이뤄지는 '밭떼기' 계약을 예로 들곤 하는데, 실제로도 유사한 구조예요. 예컨대 도매상이 "한 달 후에 포기당 3000원에 A농장 배추를 사겠다"는 식으로 계약하는 거죠.

그런데 막상 한 달 후가 되면 배추의 가격은 4000원이 될 수도 있고, 2000원이 될 수도 있어요. 금융시장에서는 주식뿐 아니라 원유, 금·은·니켈 같은 광물 자원, 밀·옥수수 등 식량 자원에 이르기까지 선물 시장이 형성돼 있어요.

선물 거래에서는 계약 이행을 보증하기 위해 거래소(증권사)를 통해 증거금(margin)을 위탁하게 하고, 하루 단위로 '일일 정산'을 해요. 이렇게 손실을 계속 기록하다가 처음에 냈던 증거금이 줄어서 '유지증거금' 이하로 떨어지면 거래소는 '마진 콜'을 해요. "손실이 났기 때문에 증거금이 계약 이행을 보증하기에 부족하니 다시 채워 넣어라"라고 요구하는 거예요. 예전에는 이 요구를 거래소가 전화로 했기 때문에 'Call'이라는 이름이 붙었대요.

이때 투자자가 증거금을 다시 채워 넣지 못하면 거래소는 강제 청산을 통해 선물 거래를 종결시켜요. 기존 증거금을 모두 잃고 계약도 끝나는 거죠. 마진 콜이라는 용어는 선물 거래 외에도, 주식을 담보로 대출을 받았는데 주가 하락으로 담보 가치가 일정 수준 이하로 떨어지면 금융기관이 "담보를 더 제공하라"고 요구하는 상황 등 다양한 금융 거래에서 활용돼요.`

  '상호출자': {

    content: `상호출자란 기업 집단에 속한 회사끼리 서로 상대 회사에 주식에 투자해서 상호 보유하는 것을 말해요. 같은 그룹 계열사끼리 주식을 사주고 서로의 주주가 되는 행위죠.

  '매파': {

반도체를 제조하는 생산시설은 팹(Fab)으로 불려요. 그래서 팹리스(Fabless)는 팹(생산시설)이 없는 반도체 회사를 뜻해요. 팹리스 중에는 반도체 설계 기술력은 있지만, 대규모 생산 공장을 보유하지 못한 소규모 기업들이 많아요. 물론 애플 같은 대기업도 반도체를 직접 생산하지 않아서 팹리스로 구분하긴 하지만요. 애플의 경우 맥북이나 아이패드에 들어가는 반도체를 설계한 뒤, 제조 과정은 위탁생산업체 맡겨요.

 · 파운드리 (생산만!)
파운드리는 반도체 위탁생산을 전문으로 하는 업체들을 뜻해요. 1980년대까지만 해도 대부분의 반도체 회사는 제품을 직접 설계하고 자체적으로 생산까지 했는데요. 반도체 성능이 점점 좋아지면서, 추가적인 성능 향상을 위해선 설계 기술만큼이나 생산 기술도 중요해졌어요.

반도체는 회로를 미세하게 그릴수록 성능이 향상되는데, 미세하게 설계한 회로를 실제 제품으로 구현하는 생산 과정에 점차 높은 기술력이 필요해진 거예요. 그래서 생산만을 전문적으로 대신해 주는 기업들이 생겨나게 됐어요. 이런 파운드리 시장에서는 대만의 TSMC가 독보적인 시장점유율을 기록하고 있어요.

 · 반도체 종합회사
반도체 개발과 설계, 제조까지 자체적으로 소화하는 회사예요. 국내 업체인 삼성전자와 SK하이닉스는 반도체 종합회사에 해당해요.`

    title: '재건축 초과이익 환수제',
    content: `재건축이란 아파트 같은 공동의 건물과 토지를 소유한 사람들이 조합을 결성하고 새로운 건물을 짓는 것을 말해요. 보통은 오래된 아파트 단지 사람들이 합의를 통해 새로운 아파트를 짓는 방식을 재건축이라고 부르죠.

아파트를 완전히 허물고 다시 짓는 게 쉬운 일은 아니에요. 법적으로 거쳐야 할 절차도 많고, 비용도 꽤 들죠. 그런데도 아마 주변이나 뉴스에서는 재건축을 원하는 반응을 많이 접하셨을 거예요. 비용과 시간이 들더라도 헌 아파트 대신 새 아파트를 갖게 되면서 재산상 이익을 볼 가능성이 크기 때문이에요. 이때 얻는 이익 중 일부를 정부가 가져가는 제도가 바로 '초과이익 환수제'예요.

재건축을 통해 조합원이 평균 3000만원 이상 이익을 얻으면 금액에 따라 이 중 10~50%를 정부가 부담금으로 거둬가요. 재건축을 처음 추진한 시기부터 새 아파트가 완공돼 입주하는 시기까지 얻은 시세 차익을 계산한 다음, 평균적인 집값 상승분, 공사비, 조합운영비 등을 뺀 금액이 '재건축 이익'이에요. 주변 집값을 생각하면 당연히 올랐을 법한 금액은 빼주고, 실제로 재건축 과정에서 들어간 돈까지 뺀 금액을 재건축 이익으로 보는 거죠.

재건축 초과이익 환수제는 2006년에 처음 도입됐는데, 부동산 경기가 좋지 않아지면서 2012년부턴 시행을 유예했고, 지난 정부 시절인 2018년에 부활했어요.

지난해 9월 현 정부는 이 규제를 완화하겠다는 방침을 밝혔어요. 기존에 초과이익 환수의 기준으로 삼았던 3000만원은 1억원으로 높이고, 부과액도 다소 줄이는 방안을 발표했죠. 하지만 이 방안을 두고 국회에서 논쟁이 벌어져서 아직 개정되지는 않았어요.`
  },

  '소프트뱅크 비전펀드': {
    title: '소프트뱅크 비전펀드',
    content: `소프트뱅크 비전펀드(SoftBank Vision Fund)는 세계 최대 규모의 벤처 투자 펀드예요. 성장 가능성이 큰 벤처 기업에 일찍 투자해서 수익을 올리는 기업을 '벤처 투자 회사'라고 부르고, 여러 사람이 돈을 모아 투자하는 기금을 '펀드'라고 부르는데요. 그러니까 비전펀드는 여러 주체가 모은 돈으로 벤처 기업에 투자하는 회사들 중 가장 크고 유명한 곳인 거예요.

이 펀드는 일본 최대 정보기술(IT) 기업인 '소프트뱅크'를 중심으로 여러 나라의 국부펀드(정부 자산으로 투자하는 펀드)와 애플·퀄컴 등 대기업이 모여 만들었어요. 2017년 1호 비전펀드가 출범했고, 2019년에 2호 펀드도 만들어졌죠. 두 펀드의 출범 당시 규모는 각각 1000억 달러(약 130조원) 이상에 달했어요.

벤처 기업에 투자하기 위해 이렇게 큰 규모의 자금이 모일 수 있었던 건 일본 최고 부자이자 세계적 부호인 손정의 소프트뱅크 회장 때문이었어요. 손정의 회장은 평범한 집안에서 성장해 소프트뱅크를 창업하고 키워낸 신화적 사업가로 꼽히거든요. 전 세계 투자업계의 큰손으로 불리죠. 한국계 일본인이어서 우리나라 언론에도 자주 등장하는 인물이에요. 원래 이름은 '손 마사요시(正義)'이지만, 한국에선 한자를 우리 식으로 읽어 '손정의'로 불러요.

소프트뱅크 비전펀드는 투자 금액의 규모가 엄청난 만큼, 정말 다양한 기업에 투자를 했어요. 투자계 큰손이 이끄는 펀드이다 보니 투자하는 곳마다 시장과 언론의 큰 관심을 끌었고요. 잘 알려진 기업 중 비전펀드가 투자한 대표적인 곳으로는 차량 공유 업체 '우버(Uber)'와 세계 최대 공유 오피스 업체 '위워크(WeWork)', 반도체 기업인 '엔비디아(NVIDIA)', 기업용 소셜미디어 '슬랙(Slack)' 등이 있어요. 우리나라 기업 중에선 쿠팡, 야놀자 등이 비전펀드의 투자를 받았어요.

막대한 자금을 운용하며 큰 관심을 받는 곳이어서, 비전펀드에 대한 비판도 존재한다고 해요. 기업의 미래 가치와 성장 잠재력을 너무 고려하다보니 지나치게 비싼 값에 투자할 때가 있다는 거예요. 비전펀드의 이런 투자들이 벤처 기업들의 몸값을 너무 높이면, 시장에 '거품'이 생겨난다는 논리죠.`
  },

벤처 기업에 투자하기 위해 이렇게 큰 규모의 자금이 모일 수 있었던 건 일본 최고 부자이자 세계적 부호인 손정의 소프트뱅크 회장 때문이었어요. 손정의 회장은 평범한 집안에서 성장해 소프트뱅크를 창업하고 키워낸 신화적 사업가로 꼽히거든요. 전 세계 투자업계의 큰손으로 불리죠. 한국계 일본인이어서 우리나라 언론에도 자주 등장하는 인물이에요. 원래 이름은 '손 마사요시(正義)'이지만, 한국에선 한자를 우리 식으로 읽어 '손정의'로 불러요.

그런데 이 현상은 다른 방법으로도 표현할 수 있어요. 예전보다 더 많은 원화를 주고 달러와 교환한다는 건, 그만큼 원화의 상대적 가치가 달러화에 비해 하락했다는 의미이기도 하니까요. 그래서 '달러당 원화값이 하락했다'고 표현하기도 해요.

    content: `규모의 경제(Economies of scale)는 기업이 생산량을 늘릴수록 평균적으로 들어가는 비용은 점점 줄어드는 현상을 말해요. 생산의 '규모'가 커질수록 효율적인 생산이 가능해진다는 의미 때문에 이런 이름이 붙었어요.

제조 기업이 제품을 생산해 판매하기 위해선 공장을 짓거나 빌리고, 생산 설비들도 구매해서 갖춰야 하는데요. 100개를 만들어 팔든 1000개를 만들어 팔든 이런 생산 설비가 필요한 건 똑같아요. 사업을 시작하기 위해 꼭 필요한 고정 비용이 존재하는 거예요. 하지만 일단 이런 공장과 설비를 갖추고 나면, 이후에는 이런 비용이 자주 들어갈 필요가 없겠죠. 생산량이 늘어나면 늘어날수록 제품 1개 생산에 들어가는 평균 비용은 줄어들 가능성이 커져요.

대량으로 생산할 수 있게 되면 원자재나 원료를 아무래도 싸게 구입해올 수 있게 되는 점도 규모의 경제가 나타나는 중요한 요인이에요. 보통 대기업의 사업 수익성이 중소기업보다 높은 이유죠.

건물이나 시설에 들어가는 비용뿐 아니라 기술개발 연구비도 비슷해요. 만약 한 자동차 회사가 신형 전기자동차 모델을 개발해 냈다면 연구비용이 꽤 들었을 거예요. 그런데 이 전기차가 얼마 팔리지 않으면 연구비를 포함한 생산비용은 엄청나게 큰 셈이 돼요. 또 다른 차를 개발해야 할 테고요. 반대로 한번 개발해 둔 차량이 인기를 얻어 불티나게 팔린다면 평균적인 생산비는 계속해서 내려가겠죠.

이런 이유 때문에 사업 초기에 들어가는 고정 비용이 큰 산업일수록 규모의 경제도 크게 나타날 수 있어요. 인터넷이나 이동통신 서비스를 제공하는 유·무선 통신 산업이 대표적 예인데요, 사업 초기엔 통신망을 구축해야 하니까 엄청난 비용이 들지만, 일단 기반 시설이 확보된 다음에는 평균 비용이 급격히 감소해요.

대량으로 생산할 수 있게 되면 원자재나 원료를 아무래도 싸게 구입해올 수 있게 되는 점도 규모의 경제가 나타나는 중요한 요인이에요. 보통 대기업의 사업 수익성이 중소기업보다 높은 이유죠.

하지만 규모의 경제도 생산량이 늘어난다고 해서 계속되지는 않아요. 일정 수준 이상으로 규모가 커지면 기업이 조직을 운영하는 데 추가로 써야 하는 비용이 생겨나고, 경영의 효율성도 낮아질 수밖에 없기 때문이에요. 이런 한계를 극복하기 위해서 기업들은 꾸준히 새로운 기술을 개발하거나 다양한 경영 합리화 작업에 나서기도 해요.`

  '부가가치세': {
    title: '부가가치세',
    content: `부가가치세(Value added tax·VAT)는 특정 제품이나 서비스를 생산하고 유통하는 단계에서 발생한 '부가가치'에 매기는 세금이에요. 우리나라는 1977년에 처음 도입했고, 현재 세율은 10%예요.

'부가가치에 매기는 세금'이라니 조금 어렵게 들리지만, 사실 우리가 지불하는 대부분 상품 가격의 10%가 부가가치세라고 보면 돼요. 최종적으로 소비하는 상품 가격은 곧 생산·유통을 통해 만들어진 '부가가치'의 합인 셈이니까요.

부가가치세는 대부분의 소비에 부과돼서 스스로 얼마나 세금을 부담하는지 느끼기 어렵지만, 연령이나 소득과 상관없이 전 국민 누구나 자연스럽게 부담하고 있어요. 과자나 아이스크림 하나를 사 먹어도 나도 모르게 부가가치세 10%를 함께 내죠. 그만큼 파급력도 큰 세금이에요.

그런데 이 세금을 내야 하는 '납세 의무자'는 사실 소비자가 아니에요. 부가가치세를 낼 의무는 상품이나 서비스를 판매하는 '사업자'에게 있어요. 하지만 실질적으로는 소비자가 상품이나 서비스를 돈 주고 살 때 모두 부담하는 구조죠. 이렇게 납세의무자와 담세자(세금을 실질적으로 부담하는 사람)가 다른 세금을 '간접세'라고 불러요. 부가가치세는 대표적인 간접세이고요. 결국 최종 소비자가 부담한 부가가치세를 판매자가 받아서 잘 보관하고 있다가 국가에 납부하는 구조인 거예요.

싼 물건이든 비싼 물건이든 부가가치세는 10%로 정해져 있어요. 항상 같은 세율을 매기다 보니, 실질적인 세금 부담의 경우 소득이 적은 사람이 더 많이 느낄 수 있다는 단점도 존재해요. 예를 들어 누구나 꾸준히 비슷한 양을 구매해 사용하는 생활필수품이라면, 돈을 적게 버는 사람이나 많이 버는 사람이나 구매할 때 내게 되는 부가가치세는 비슷할 수밖에 없겠죠.

소득이 적은 사람이 생필품을 구매할 때 내는 세금은 자신의 소득에서 상대적으로 높은 비율을 차지할 테고, 고소득자는 소득 전체에서 생필품 구매 시 내는 세금의 비율이 낮을 거예요. 부가가치세는 원칙적으로는 모든 상품과 서비스에 부과되지만, 저소득층의 부담이 상대적으로 클 수 있는 일부 상품에 대해선 세율을 낮추거나 면제하기도 해요.

일부 농·축·수산물, 수돗물, 연탄 등이 대표적인 부가가치세를 면제 대상이에요. 2022년 7월부터는 서민 물가 부담 경감을 위해 간장, 된장, 고추장, 김치, 단무지, 젓갈류(비닐·플라스틱·병에 담긴 제품)에 대해서도 2023년까지 한시적으로 부가가치세를 면제해주고 있어요.`
  },

    content: `퍼펙트 스톰(perfect storm)은 여러 가지 악재가 동시에 발생한다는 뜻으로, 원래는 기상 현상을 나타내는 용어예요. 개별적으로 보면 위력이 크지 않은 둘 이상의 태풍이 합쳐지면서, 영향력이 폭발적으로 커지는 현상을 말하죠. 태풍 외에도 인류에게 피해를 줄 수 있는 자연현상들이 동시에 발생하는 경우에 '엄청난 파괴력을 지닌 자연재해로 발전할 수 있다'는 의미로 쓰이는 단어예요.

기상 용어로 사용되던 퍼펙트 스톰은 2008년부터 경제 용어로 널리 사용되기 시작했어요. 당시 미국에서 시작된 금융 위기가 전 세계에 영향을 미쳤거든요. 이때 미국은 개인과 회사, 은행이 연달아 부도를 맞는 경제 위기를 겪고 있었고, 경제 최강대국인 미국이 흔들리자 그 영향이 다른 국가들로도 퍼져나가기 시작했어요. 그런데 당시에 또 다른 문제가 생겼어요. 국제 유가와 곡물 가격이 급등하면서 물가도 덩달아 오른 거예요. 이런 경제적 상황들은 서로 얽히면서 세계적인 경제 위기를 발생시켰어요.

'퍼펙트 스톰'이라는 말은 경제 전반이나 특정 기업에 복합적인 위기가 발생할 때면 위기의 심각성을 강조하기 위해 자주 사용돼요. 최근 경제 뉴스에서도 심심치 않게 접할 수 있는 용어예요.`

  'PCE': {
    title: 'PCE',
    content: `개인소비지출(PCE, Personal Consumption Expenditure)은 한 나라에 있는 모든 '개인'이 소비에 쓴 돈을 모두 합한 금액이에요. 정부나 기업이 아니라 개인들이 물건을 사거나 서비스를 이용하는 데 지불한 금액의 합계인 거죠.

이 지표를 통해 일정 기간에 한 나라의 개인이 지출을 늘렸는지, 아니면 줄였는지를 파악할 수 있어요. 꾸준히 이 지표를 집계하면 소비 시장의 변화를 알게 되는 거예요.

그래서 PCE는 향후 경기 흐름을 예측하는 데에 사용돼요. 특히 미국에서는 PCE를 아주 중요한 지표로 여긴다고 해요. 미국은 개인들의 소비 지출이 전체 경제의 약 70%를 차지할 정도로 중요한 성장 동력이니까요.

미국에서 PCE는 매월 미국 상무부 경제분석국(BEA)에서 발표하는데요, 이 지표가 최근 세계적으로 부쩍 큰 주목을 받기 시작했어요. 미국 경제에 중요한 지표인 만큼, 개인소비지출 통계를 바탕으로 산출한 물가지수인 'PCE 물가지수'를 미국 연방준비제도(Fed·연준)가 기준금리를 인상하거나 인하할 때 아주 중요하게 여긴다는 사실이 알려졌기 때문이에요.

  },

  '회색 코뿔소': {
    title: '회색 코뿔소',
    content: `회색 코뿔소(Gray Rhino)는 지속적인 경고를 통해 충분히 예상할 수 있는데도, 쉽게 대처하지 못하거나 간과하는 위험을 일컫는 말이에요. 이런 '회색 코뿔소'는 갑자기 발생하는 것도 아니고 이미 알려져 있던 문제이지만, 실제로는 큰 피해를 줄 수 있죠.

코뿔소는 워낙 덩치가 큰 동물이라 실제로 달릴 때 땅이 흔들릴 정도라고 해요. 그래서 누구나 코뿔소가 달려온다는 걸 쉽게 알 수 있죠. 코뿔소가 달려오는 건 누가 생각해도 위험한 일이고요.

이런 코뿔소가 달려오는데도 두려움 때문에 아무 대처도 하지 못하거나 어떻게 행동할지를 몰라서 애써 무시한다면, 정말 큰 피해를 보게 될 거예요. 그래서는 안 된다는 맥락에서 사용되는 단어가 '회색 코뿔소'인 거죠. 이 표현은 2013년 다보스포럼에서 한 유명인이 처음 언급한 뒤 널리 알려졌어요.

미래의 위험을 동물에 비유한 표현 중엔 '블랙 스완(Black Swan)'도 잘 알려져 있어요. 우리말로는 '검은 백조(고니)'예요. 블랙 스완은 '발생할 확률이 극히 낮아서 예측이 어렵지만, 실제로 일어나면 큰 충격을 주는 위협'을 뜻해요. 검은 백조는 정말 희귀하긴 해도 실제로 존재하거든요. '백조는 희다'라는 고정관념이 검은 백조를 발견했을 때 무너졌던 일을 계기로 이 표현을 쓰기 시작했대요.

특히 '블랙 스완'이라는 용어는 미국 뉴욕대의 탈레브 교수가 뉴욕 금융계의 허상을 파헤친 책 제목으로 사용하면서 유명해졌어요. 이 책에서 2001년 9·11 테러와 2008년 글로벌 금융위기 등의 '발생 가능성은 극도로 낮지만, 일어나면 엄청난 충격이 있는 사건'들이 블랙 스완에 비유됐어요.`
  },

당연히 이런 방식은 결국 한계에 도달했어요. 실제 사업은 하지 않고 투자금 돌려막기만 했으니까요. 투자자들에게 약속했던 수익금을 주기 위해선 끊임없이 신규 투자자가 나타나야 하는데 그건 불가능하잖아요. 또 뭔가 이상하다고 느낀 일부 투자자들이 투자금을 회수하기 시작하면서 회사의 자금 사정은 급격히 악화했어요.

  'ETF(상장지수펀드)': {
    title: 'ETF(상장지수펀드)',
    content: `주식 관련 뉴스를 보다 보면 'ETF(상장지수펀드)'라는 단어가 자주 등장하는데요. 이름은 조금 어려워 보이지만 ETF는 초보 주식 투자자에게 많이 추천하는 투자 대상이에요. 주식을 잘 모르더라도 간편하게 분산 투자를 할 수 있기 때문이죠.

ETF(Exchange Traded Fund)는 증권 거래소에서 주식처럼 사고팔 수 있는 펀드를 말해요. 펀드는 원래 쉽게 사고파는 게 아니라 마치 적금처럼 가입하고 해지해야 하는 금융 상품이거든요. ETF는 주식 투자와 펀드 투자의 장점을 결합한 방식으로 보면 되는데요, 일단 주식투자와 펀드투자의 차이부터 알아볼게요.

• 주식 투자
주식투자는 투자자가 직접 원하는 주식 종목을 고른 다음, 증권사를 통해 사고파는 투자 방식이에요. 주식 시장만 열려 있다면 원하는 시점에 편하게 사고팔 수 있어요. 다만 어느 종목에 어떻게 투자할지는 투자자가 직접 결정해야 하니까 투자 관련 지식이 없으면 쉽게 하기 힘들다는 단점이 있어요.

• 펀드 투자
펀드투자는 펀드 운용사가 투자자들의 돈을 맡아서 대신 투자해주는 방식이에요. 여러 사람 돈을 모아서 투자하고, 수익이 발생하면 투자자들에게 돌려줘요. 이것저것 신경 쓰기 어려운 투자자 입장에선 유용하겠죠. 하지만 세상에 공짜는 없는 법. 돈을 대신 굴려준 운용사에게 보수를 지급해야 해요. 그리고 투자를 결정할 때나 그만하고 싶을 때도 불편해요. 펀드에 가입하거나 해지해야 하기 때문이죠. 해지 과정은 복잡하거나 시간이 오래 걸릴 수도 있고, 수수료를 내야 할 수도 있어요.

그런데 펀드 중엔 이 운용보수가 특히 저렴한 상품도 있어요. 펀드 운용사가 복잡한 분석을 통해 돈을 굴려주는 게 아니라, 주요 주가지수나 특정 자산의 가격을 따라가도록 투자하는 펀드인데요, 예를 들면 우리나라에서 가장 큰 주식시장인 '코스피(KOSPI)'의 지수 흐름만 따라가게 투자를 하는 거예요. 주식 시장 전체가 10% 오르면 내 펀드도 대충 10%쯤 오르게 분산투자 하는 거죠. 아무래도 국내 주식 시장에서 차지하는 비중이 높은 삼성전자나 네이버, 카카오 같은 대표 주식들에 많이 투자 하게 되겠죠?

어쨌든 이런 방식으로 투자하면 펀드 운용사는 할 일이 별로 없어요. 그래서 운용 보수가 적어지죠. 주요 지수나 자산의 가격을 추종하니까 상대적으로 안정적인 투자 방법이기도 해요. 지수(INDEX)를 추종한다고 해서 이런 펀드를 '인덱스 펀드'라고 불러요.

• 주식+인덱스 펀드=ETF
ETF는 주식과 인덱스 펀드를 결합한 형태예요. 아무리 운용 보수가 싸고 안정적인 인덱스 펀드라도 가입하고 해지하는 건 귀찮으니 더 편한 방법을 찾은 거죠. 펀드에 돈 넣고 가입하러 가는 대신에 그냥 주식을 살 때처럼 투자할 수 있게 한 거예요. 인덱스 펀드 자체가 어차피 주요 주가지수들과 비슷하게 움직이도록 여러 주식들을 묶은 거니까, 그렇게 주식을 묶어서 만든 'ETF'를 사면 결국 분산 투자하게 되는 건 똑같아요.

그래서 ETF는 주식처럼 편하게 사고 팔 수 있고, 가입이나 해지도 필요 없어요. 운용보수도 저렴한 편이에요. 분산 투자가 기본이니까 개별 주식 투자보다는 안전하고요. 세계에는 다양한 주가지수와 자산이 있는 만큼, ETF도 아주 많은 종류가 있어요.`
  },

  '패시브 자금': {

    content: `경제 뉴스를 읽다 보면 가끔 '패시브 자금'이나 '패시브 투자', '패시브 펀드' 같은 용어가 등장해요. 패시브(Passive)는 '수동적·소극적'이라는 뜻이잖아요. 패시브 투자는 투자자가 스스로 투자 대상을 고르지 않고 주식 시장의 흐름에 맡기는 투자 방법을 말해요.

패시브 투자는 보통 주요 주가지수의 흐름에 따라 투자하는 방식으로 이뤄져요. 주가지수는 증권 시장에서 형성되는 주가의 변동 상황을 종합적으로 나타내는 지표예요. 수많은 기업들의 주식이 대체로 어떻게 움직이는지를 살펴보기 위해 만들었죠.

주가지수는 각국 증권 시장에 있는 주식들을 모두 묶어 만들거나(미국의 '나스닥', 한국의 '코스피' 등) 특정 주식들을 한데 묶어서 만들어요. '대형 반도체 기업'이나 '규모로 100등 안에 드는 기업' 등 다양한 기준으로 묶어서 만들 수 있는데요.

예를 들어 국내엔 한국거래소가 발표하는 '코스피200'이라는 주가지수가 있어요. 시가총액(주식 가치의 합)이 크고 거래가 활발하게 이루어져 코스피를 대표할 수 있다고 간주되는 종목 200개를 선정한 지수죠. 주식시장 흐름에 따라 새로운 종목이 코스피200 지수에 포함되고, 기존 종목은 빠지기도 해요.

만약 일반 투자자가 '코스피200 지수를 따라서 패시브 투자를 해야겠다'라고 마음먹으면, 이 지수를 참고하는 패시브 펀드에 돈을 맡기면 돼요. 펀드 투자는 펀드 운용사가 투자자들의 돈을 맡아서 대신 투자해 주는 방식인데요. 펀드 중엔 코스피200 지수에 포함된 200개 종목에 적당히 나눠서 투자하는 패시브 펀드도 있거든요. 이런 식으로 패시브 펀드에 맡긴 돈을 '패시브 자금'이라고 불러요.

주요 지수를 따라 투자하는 패시브 펀드가 많기 때문에 기업이 주요 지수에 새롭게 포함되는 것만으로 주가가 상승하는 경우도 있어요. 예를 들어 한 기업이 코스피200 지수를 구성하는 종목에 들어가면, 코스피200 지수를 참고하는 패시브 펀드들은 보통 해당 기업의 주식을 사들이거든요. 이런 현상을 '패시브 자금이 유입돼 주가가 올랐다'라고 표현해요.`

• 확장적 재정·통화 정책
확장적 재정 정책은 정부가 빚을 내서(=국채를 발행해서) 직접 여러 분야에 투자도 하고, 지원금을 나눠주며 소비도 촉진하는 걸 말해요. 실제로 일본은 정말 많은 빚을 져가며 이런 정책을 펼쳤고, 그 결과로 일본은 주요 국가 중 경제 규모 대비 빚이 가장 많은 나라가 됐어요. 보통 '부채비율'이 높다고 표현해요.

확장적 통화 정책은 중앙은행이 기준금리 인하나 채권 매입(양적완화)을 통해 시장에 돈을 풀어 소비·투자를 촉진하는 것을 뜻해요. 중앙은행이 정하는 기준금리를 낮추면 시중에서 예금이나 대출 이자율도 함께 낮아지는데, 이러면 대출을 받아 투자하는 사람은 늘어나고, 예금을 하는 사람은 줄어들어서 '돈 풀기 효과'가 나타나거든요.

그래서 일본의 기준금리는 6년 넘게 –0.1%예요. 마이너스라서 헷갈리실 수도 있지만 사실상 0%(제로금리)라고 보시면 돼요. 일본의 중앙은행인 일본은행은 국채 등 채권 매입을 통한 '양적 완화'도 계속 진행 중이에요. 일본 중앙은행이 시장의 국채를 사들여서 시장에 돈을 푸는 거죠.

자국 기업들의 수출 환경 개선에 초점을 맞춘 전략인데요, 엔화 가치가 떨어지면 상대적으로 달러 가치는 높아져요. 예를 들면 '1달러=100엔'이었던 환율이 '1달러=130엔'이 되는 거예요. 이러면 외국에 수출을 하고 달러로 대금을 받았을 때 더 많은 돈을 벌게 되겠죠. 똑같이 100달러를 받아도 1만엔이 아니라 1만 3천엔을 벌게 되니까요.

그래서 일본의 수출 기업들은 과거 '엔저'가 일어났을 때 무역에서 큰 폭의 흑자를 냈고, 기업 가치가 높아지면서 주식 시장에도 긍정적 영향을 미쳤어요. 이러면 곧 엔화 가치가 하락을 멈추고 적정 수준에서 유지되곤 했죠. 이런 이유 때문에 대표적인 저성장 국가인 일본은 오히려 엔저 현상을 유도해왔어요. 수출 호조를 바탕으로 '기업 실적 개선→임금 인상→소비 확대'로 이어지는 긍정적 순환이 일어나기를 기대하는 거예요.`

  '순이체한도제': {
    title: '순이체한도제',
    content: '순이체한도(Net Debit Cap)는 금융결제원의 차액결제시스템에 참가하고 있는 각 참가기 관으로 하여금 여타 참가기관과의 CD, 타행환 거래 등에서 발생하는 순이체액(지급지시 송신액 - 지급지시수신액)에 대하여 그 상한을 설정토록 함으로써 결제불이행 사태의 발 생 가능성 및 불이행 규모를 최소화하도록 한 제도이다. 순이체한도의 적용을 받는 차액 결제시스템은 한은금융망을 통하여 차액결제되고 있는 거래중 지급지시가 실시간으로 송 수신되고 금융기관 간 결제보다 고객앞 대금지급이 먼저 이루어짐으로써 미결제순채무가 발생하는 타행환공동망, 전자금융공동망, 지방은행공동망, 국가간ATM망과 어음교환시 스템, CD공동망, B2C 전자상거래 중 지급지시가 실시간으로 송수신되는 거래이다. 차액 결제 대상거래로서 지급지시가 실시간으로 이루어지지 않는 지로시스템, 직불카드공동망 등은 순이체한도 설정 대상에서 제외된다. 순이체한도는 각 차액결제 참가기관이 자신의 과거 최대 순채무액, 향후 대고객 거래규모의 변화 등을 종합적으로 고려하여 자율적으로 설정하도록 하고 있다.',
  },
  '숨은 그림(은화)': {
    title: '숨은 그림(은화)',
    content: '은행권의 위조방지를 위한 장치의 하나로 은행권 용지를 빛에 비췄을 때 여백에 숨겨진 문양이 나타나도록 하는 장치를 말한다. 기술적으로는 은행권 용지를 제작할 때 특정 부 분의 두께와 밀도를 달리하면 부분적으로 용지의 얇음과 두꺼움이 달라지게 되며 이로 인 해 빛의 투과정도가 달라져 빛에 비췄을 때 명암 차이가 문양으로 드러나게 된다. 현재 우 리나라 각 은행권의 앞면에는 화폐도안 인물 초상 모양의 숨은 그림이 있는데, 오만원권 에는 신사임당, 만원권에는 세종대왕, 오천원권에는 율곡 이이, 천원권에는 퇴계 이황이 나타난다.',
  },
  '스마트계약': {
    title: '스마트계약',
    content: '스마트계약(Smart Contract)은 블록체인을 이용하여 일정 조건이 만족되면 자동으로 거래가 실행되도록 작성된 컴퓨터 프로토콜 또는 코드를 뜻한다. 1996년 닉 자보(Nick Szabo)가 이 용어를 처음으로 사용하였다. 그는 이 새로운 스마트계약이 디지털 혁명에 의해 종이 계약보다 더 기능적이며, 인공지능을 사용하지 않고서도 계약 당사자들의 약속 을 실행하게 만드는 프로토콜을 가진 디지털 형태의 약속세트라고 정의하였다. 2015년 7 월 비탈릭 부테린(Vitalik Buterin)이 블록체인 기술을 통해 컴퓨터 분산네트워크를 구성 해서 금융거래 이외에도 계약기능 등을 구현한 ‘이더리움’(Ethereum)이라는 가상통화 플 랫폼 서비스를 시작한 후에 이 스마트계약이 더 확산되고 있다. 이 기능을 활용하면 개발 자가 프로그래밍 언어로 직접 계약조건과 내용을 코딩할 수 있기 때문에 원칙적으로 모 든 종류의 계약을 체결하고 이행할 수 있다. 금융거래·부동산계약·공증·지적재산권·공 유경제 등 다양한 형태의 계약을 체결·이행할 수 있으며 ‘블록체인 2.0’이라고도 말한다. 스마트계약은 블록체인 공유네트워크를 통해 계약 이행 및 검증 과정이 자동화되고 계약 조건을 확인하는 사람의 간섭과 추가 비용 없이 직접 처리되도록 만든 일종의 컴퓨터 프 로그램이다. 따라서 전통적인 계약에 비해 상대방의 불이행 리스크 최소화 및 결제시간 의 감소로 비용이 낮아지며, 투명성도 향상되어 신뢰도가 높아짐으로써 더 안전하게 계약 이 실행될 수 있다. 예를 들면 손해보험 보상업무의 경우 보험가입자·보험사·손해사정인· 정비업체·병원·사법기관 등 여러 이해관계자들이 각각 확인 및 검증절차를 처리해야 함 으로써 많은 비용과 시간이 들어간다. 하지만 이미 합의한 내용이 담긴 스마트계약 프로 그램에 따라 블록체인 기반 공유네트워크를 통해 자동 실행조건이 만족되면, 위변조를 막 으면서도 각 이해관계자의 간섭 없이 계약이 자동 실행되고, 그 결과는 모든 이해관계자 에게 공유됨으로써 계약이 신속하고 정확하며 안전하게 이행될 수 있는 것이다.',
  },
  '스무딩오퍼레이션': {
    title: '스무딩오퍼레이션',
    content: '우리나라는 자유변동환율제도를 채택하고 있어서 환율이 원칙적으로 외환시장에서 자율 적으로 결정되도록 하고 있으나, 일시적인 수급불균형이나 시장 불안심리 등으로 환율이 급변동하는 경우에 한해 외환당국이 외환시장에 개입하여 환율변동 속도를 조절하게 되 는데 이를 스무딩오퍼레이션(Smoothing Operation)이라 한다. 즉 단기간에 환율이 급 격하게 하락할 경우 외환당국이 외환시장에서 원화를 대가로 미달러화를 매입함으로써 미달러화의 초과공급(원화의 초과수요)을 흡수하여 원화의 절상 속도를 줄일 수 있고, 이 와는 반대로 환율이 급등하는 경우에는 외환당국이 외환시장에서 원화를 대가로 미달러 화를 매각하여 미달러화의 초과수요(원화의 초과공급)를 흡수하여 원화의 절하 속도를 조 절할 수 있다.',
  },
  '스왑': {
    title: '스왑',
    content: '스왑(SWAP)은 거래 쌍방이 미리 정한 계약조건에 따라 현재 시점에서 원금, 이자 등을 서 로 교환하기로 하고 일정 기간 주기적으로 원금이나 이자 등 현금흐름(cash flow)을 서로 교환하는 파생상품 계약을 말한다. 스왑 거래의 예로는 서로 다른 통화의 일정 원금만 교 환하는 외환스왑(FX swap), 서로 다른 통화의 일정 원금과 이에 대한 이자의 지급을 교환 하는 통화스왑(currency swap), 동일 통화의 일정 원금에 대해 서로 다른 이자(예: 변동 금리와 고정금리)를 교환하는 이자율스왑(interest rate swap) 등이 있다. 통화스왑의 가 장 대표적인 형태는 거래 시작 시 원금을 교환한 뒤 만기 시 다시 원래 통화로 재교환하는 구조이다. 기간 중에는 각자 받은 통화에 해당하는 이자를 거래상대방에게 지급한다. 이 를 통해 환율 및 금리 위험을 관리할 수 있다. 이자율스왑은 금융시장 참가자들이 이자율 변동 위험을 최소화하고 자금 운용의 안정성을 높이는 핵심 파생상품이다. 이자율스왑의 단순한 예를 들면 A기업은 변동금리 대출을 갖고 있어 이자율 상승이 걱정되고, B은행은 고정금리 대출로 인해 이자수익이 일정해 시장 상황 반영이 어렵다고 느낀다. 이때 A와 B 가 이자율스왑을 체결하면, A는 B에게 고정금리로 이자를 지급하고, B는 A에게 변동금리 로 이자를 지급하게 되어 A는 대출 이자 변동 위험에서 벗어나고 B는 변동성 있는 수익을 얻게 된다.',
  },
  '스왑레이트': {
    title: '스왑레이트',
    content: '스왑레이트(Swap Rate)는 현물환율 대비 선물환율과 현물환율의 차이(=(선물환율-현 물환율)/현물환율)를 연율(%)로 표시한 것으로 이론적으로는 양 통화 간 금리차와 일치 (covered interest rate parity)하게 된다. 스왑레이트는 금융기관의 자금사정을 나타내는 대용지표(proxy)로도 활용된다. 예를 들어 국내 금융기관의 외화자금사정이 악화되면 금 융기관은 외화조달의 방안으로 현물환매입/선물환매도(buy/sell) 스왑을 이용한다. 이 경 우 현물환매입 증가로 현물환율은 상승하고 선물환매도 증가로 선물환율은 하락하게 되 어 스왑레이트가 낮아진다. 반대로 금융기관의 원화자금사정이 악화되면 원화차입을 위 한 현물환매도/선물환매입(sell/buy) 스왑 증가로 스왑레이트가 올라간다. 한편 스왑레이 트가 내외금리차를 하회하면 외화차입 후 외환스왑(현물환매도/선물환매입)을 통해 원화 를 조달한 다음 원화자산에 투자함으로써 환리스크 없이 이익을 획득할 수 있다. 이에 따 라 ‘내외금리차-스왑레이트’를 차익거래 유인으로 해석할 수 있다.',
  },
  '스왑베이시스': {
    title: '스왑베이시스',
    content: '스왑베이시스(Swap Basis)는 일반적으로 통화스왑(CRS) 금리와 금리스왑(IRS) 금리의 차이를 의미한다. CRS는 원화를 담보로 달러를 조달할 때 적용되는 금리로 달러 조달 비용을 나타내며, IRS는 원화 변동금리를 고정금리로 전환할 때의 수준으로 원화 고정 조 달 비용을 의미한다. 따라서 스왑베이시스는 원화 투자자가 달러를 조달할 때 추가적으로 부담해야 하는 가산금리를 반영한다. 이는 스왑 대상 국가 간 신용도 차이, 금리 격차, 그 리고 통화스왑시장의 수급 요인 등에 의해 영향을 받는다. 스왑베이시스는 특정 통화의 자금 조달 여건, 시장의 신용 리스크 인식, 그리고 글로벌 달러 유동성 상황 등을 파악할 수 있는 지표로 활용된다.',
  },
  '스탠더드&푸어스(S&P)': {
    title: '스탠더드&푸어스(S&P)',
    content: '스탠더드&푸어스는 무디스, 피치와 함께 세계 3대 국제신용평가기관으로 불리는 미국의 신용평가회사로서 1860년 Henry Varnum Poor가 설립한 Poor’s라는 투자정보서비스 회사와 1916년 설립된 Standard의 두 회사가 1942년 합병하여 Standard&Poor’s로 출 범하였다. 무디스와 마찬가지로 1929년 세계대공황을 계기로 높은 명성을 획득하여 성장 하였는데 이 회사는 채권의 신용등급을 신용리스크에 따라 AAA(최우량)·AA(우량)·A(비 교적우량)·BBB(중위)·BB(저중위)·B(저급)·CCC·CC·C(모두 최저급) 순으로 채권의 신용등급을 매기고 있으며 더불어 미국의 3대 주가지수인 S&P500지수도 발표하고 있다. 스탠더드&푸어스는 각국의 정부채무에 대해 경제적, 재정적 성과 수치들을 합한 정량분 석과 미래의 부채 지불 능력을 반영한 정성분석을 모두 실시하는 특징을 보이며 주요 신 용평가 항목은 정치 리스크, 경제구조, 경제성장, 정부의 역할과 재정수지, 공공부채 부 담, 물가안정, 경상수지 구조, 대외부채와 유동성 등이다.',
  },
  '스테이블코인': {
    title: '스테이블코인',
    content: '스테이블코인은 가격변동성이 최소화되도록 설계된 가상자산을 의미한다. 비트코인 등 대부분의 가상자산은 가격 변동성이 커서 실제로는 화폐로서의 수용성이 제한되므로 가 격 변동성을 최소화할 필요성이 대두되었다. 스테이블코인은 가격변동 최소화를 위한 연 동대상 자산과 방법에 따라 법정화폐 담보형 및 암호자산 담보형, 알고리즘형 등으로 분 류된다. 법정화폐 담보형은 미국 달러화, 유로화 등 기존 화폐를 담보로 제공하고 담보가 치만큼 스테이블코인을 발행하는 방식이다. 암호자산 담보형은 비트코인 등과 같은 주요 암호자산을 담보로 발행하는 방식이다. 알고리즘형은 스테이블코인의 공급량을 자동적으 로 조정하는 알고리즘을 내재하여 가치를 안정시키는 방식이다. 스테이블코인은 가상자 산을 이용한 지급 및 송금의 효율성 제고, 금융포용성 증가 등의 긍정적 효과가 기대되나 담보자산 가치하락, 알고리즘에 대한 신뢰 부재 등으로 가격변동성이 확대될 가능성이 완 전히 사라지지 않을 수 있음에 유의하여야 한다.',
  },
  '스트레스 DSR': {
    title: '스트레스 DSR',
    content: '스트레스 DSR이란 변동금리 대출 등을 이용하는 차주가 대출 이용기간 중 금리 상승으로 인해 원리금 상환 부담이 증가할 가능성을 감안하여 DSR 산정시 일정 수준의 가산금리 (스트레스 금리)를 부과하여 대출한도를 산출하는 제도(실제 대출금리에는 미부과)를 말 한다. 스트레스 DSR 제도는 금리변동 위험을 DSR에 정교히 반영하여 상환능력을 넘어서 는 과도한 가계대출 확대를 방지하고, 고정금리 확대 등 가계부채의 질적 개선을 도모하 기 위해 도입되었다. 스트레스 DSR의 시행범위는 은행권 및 제2금융권의 모든 대출을 대 상으로 한다. 다만 동 제도 도입으로 인해 차주들이 체감하는 대출한도 축소 부담이 과도 할 우려 등을 감안하여 2024년부터 3단계에 걸쳐 순차적·점진적으로 시행하였다. 스트레 스 금리는 과거 5년 내 가장 높았던 수준의 가계대출 금리와 현 시점(매년 5월·11월 기준) 금리를 비교하여 결정하되 일정한 수준의 하한(1.5%), 상한(3.0%)을 부여한다. 스트레스 DSR 도입에 따라 DSR 산정시 스트레스 금리가 가산되면 차주별 대출한도가 줄어들어 가 계대출 수요를 억제하는 효과를 기대할 수 있다. 다만 스트레스 DSR 적용 과정에서 취약 계층에 대한 신용공급이 제약될 우려가 있는 만큼 금융당국의 세심한 관리가 필요하다.',
  },
  '스트레스 테스트(위기상황분석)': {
    title: '스트레스 테스트(위기상황분석)',
    content: '예외적이지만 발생가능한(extreme but plausible) 위기 상황을 상정하여 개별 금융기관, 금융부문 및 금융시스템 전체의 취약성과 복원력을 평가하는 기법을 의미한다. 스트레스 테스트(Stress Test)에서는 위기 시나리오 하에서 예상되는 금융기관의 손익, 자본비율,',
  },
  '시스템 리스크': {
    title: '시스템 리스크',
    content: '현금흐름, 유동성 상황 등을 정량적으로 측정하여 리스크를 분석한다. 글로벌 금융위기를 계기로 개별 금융기관 단위보다는 금융시스템 전체 관점에서의 건전성 평가 및 규제 필요 성이 대두되면서 금융기관 간 연계성 및 거시-금융 연계성을 반영하는 거시 스트레스 테 스트의 중요성이 높아지고 있다. 미국, EU 등 주요국 중앙은행 및 정책당국은 위기 이후 거시 스트레스 테스트를 강화하고 이를 금융기관의 자본 규제 등 건전성정책 수행에도 활 용하고 있다.',
  },
  '시뇨리지': {
    title: '시뇨리지',
    content: '시뇨리지(Seigniorage)란 화폐에 대한 독점적 발권력을 갖는 중앙은행이나 국가가 화폐 발행을 통해 획득하는 이득을 의미한다. 금속화폐 시대에는 절대군주가 금, 은 등을 소재 로 화폐를 제조하여 유통하는 과정에서 화폐를 생산비용 보다 높은 액면가치에 유통시킴 으로써 시뇨리지(화폐시뇨리지=화폐 액면가-화폐제조비용)가 발생하였다. 한편 명목화폐 등장 이후에는 중앙은행이 화폐의 신뢰와 가치를 보장하기 위해 화폐발행액을 부채로 인 식하게 되면서 화폐시뇨리지를 수익으로 간주하지 않는 대신 화폐발행을 통해 취득한 유 가증권 등의 운용수익에서 화폐제조비를 차감하는 방식으로 시뇨리지를 계상하게 되었 다. 전통적으로 시뇨리지는 정부의 재정적자 보전수단으로 인식되어 왔으나 최근에는 중 앙은행의 재무적 독립의 중요성이 강조되면서 통화정책 운영에 필요한 재원이라는 인식 이 확산되고 있다.',
  },
  '시스템적으로 중요한 금융기관': {
    title: '시스템적으로 중요한 금융기관',
    content: '규모가 크고 금융시스템 내 상호연계성이 높아 부실화 또는 도산 시 금융시스템에 광범 위하고 중대한 영향을 미칠 수 있는 은행, 보험사 및 여타 금융기관을 의미한다. 정책당 국이 충격 완화와 금융시스템 복원을 위해 공적자금을 투입하여 부실화된 시스템적으로 중요한 금융기관(SIFI; Systemically Important Financial Institutions)을 회생시킬 경 우 납세자 부담이 증가할 뿐만 아니라 SIFI 부실화시 정부 지원이 있을 것이라는 대마불 사(大馬不死; TBTF; Too Big To Fail)의 기대를 강화시킴으로써 SIFI의 과도한 리스크 추 구 행태를 부추길 우려가 있다. 글로벌 금융위기 이후 금융안정위원회(FSB)는 이러한 문 제점을 해결하기 위해 바젤은행감독위원회(BCBS) 등 국제기준제정기구들과 공동으로 SIFI 선정을 위한 평가 체계를 개발하고 대상 금융기관에 대한 추가자본 부과 등 규제 강 화를 추진하였다. FSB와 BCBS는 매년 글로벌 은행과 보험사를 대상으로 G-SIBs(Global Systemically Important Banks)와 G-SIIs(Global Systemically Important Insurers) 명단을 선정하여 발표하고 있다. 우리나라 역시 매년 금융체계상 중요한 은행 및 은행지 주회사를 선정하여 발표하고 있다. 2025년 9월 현재 우리나라의 금융체계상 중요한 은행 에는 1.0%의 추가자본 적립의무가 부과되고 있다.',
  },
  '시장리스크': {
    title: '시장리스크',
    content: '금융시장의 금리, 주가, 환율 등의 변동에 따라 은행이 단기매매를 위해 트레이딩계정 (trading book)에 보유한 금융상품의 가격이 하락하여 손실이 발생할 가능성을 의미한 다. 바젤은행감독위원회(BCBS)는 은행이 시장리스크에 상응하는 자기자본을 보유하도 록 의무화하고 있다. 글로벌 금융위기를 계기로 그 동안 시장리스크가 과소 평가되었다는 비판이 제기되면서 BCBS는 시장리스크에 대한 자본규제 체계 개선작업을 진행하였으며 2016년 1월 시장리스크에 대한 자본규제 개정 기준서를 공표하였다.',
  },
  '시장평균환율(MAR)': {
    title: '시장평균환율(MAR)',
    content: '시장평균환율이란 외국환중개회사를 통해 거래가 이루어진 현물환매매 중 결제일 2영업 일 전 현물환시장에서 형성되는 환율과 그 거래량을 가중평균하여 산출한 환율을 의미한 다. 우리나라는 환율의 시장기능을 제고하기 위해 1990년 3월 시장평균환율제도를 도입 하였다. 시장평균환율은 다음 영업일의 기준환율이 되며 이 기준환율을 중심으로 상하 일 정 범위 내에서만 환율이 변동되도록 하는데, 시장평균환율제도 도입 당시에는 일일 환율 변동제한폭을 기준환율을 중심으로 상하 0.4%로 설정하였으며 이후 변동제한폭을 지속 적으로 확대하였다. 1997년 외환위기에 직면하면서 변동제한폭을 상하 10%로 대폭 확대 하였다가 같은 해 12월 이를 완전히 폐지함으로써 자유변동환율제도로 이행하였다. 한편 시장평균환율은 외국환거래규정에서 정의하고 있는 매매기준율로서 외국환포지션한도의 관리, 기업의 외화자산·부채 평가 등 다양한 분야에서 사용된다. 우리나라 외환시장에서 는 이러한 시장평균환율로 상당한 규모의 현물환 거래(이를 MAR거래라 한다.)가 이루어 지고 있다.',
  },
  '시장평균환율제도': {
    title: '시장평균환율제도',
    content: '시장평균환율제도는 우리나라가 1990년 3월 국내 외환시장의 활성화와 자본 및 금융 의 국제화를 촉진시키기 위한 환율제도의 단계적 개편방안의 일환으로 도입한 제도로서, 1997년 외환위기 이전까지 시행되었다. 기본적으로 환율이 외환시장에서의 수요와 공급 에 의해 결정되도록 하되, 급격한 환율 변동에 의한 외환시장 교란과 경제적 불안정을 완 화하기 위하여 환율의 일중변동 폭을 제한하였다. 시장평균환율제도하에서는 외환중개 회사를 통해 외국환은행 간 실제 거래된 환율을 거래량으로 가중평균하여 다음 영업일 의 기준환율로 정하고, 동 기준환율을 중심으로 원/달러 환율이 상하 일정 범위 내에서만 변동되도록 하였다. 동 제도 도입 당시에는 일중 환율변동제한폭을 기준환율의 상하 0.4%로 설정하였으며 이후 변동제한폭을 지속적으로 확대하였는데, 1997년 11월 외환 위기를 맞으면서 상하 10%로 대폭 확대하였다가 같은 해 12월 완전히 철폐하였고 이로 써 우리나라는 자유변동환율제도로 이행하였다.',
  },
  '시카고상업거래소(CME)': {
    title: '시카고상업거래소(CME)',
    content: '시카고상업거래소(CME; Chicago Mercantile Exchange)는 세계 최대의 파생상품 거 래소 중 하나이자, 농산물과 금융상품 선물을 주로 다루는 대표적인 시장이다. 1898년에 버터와 계란을 거래하던 상인들이 설립한 비영리단체인 “시카고 버터 앤 에그 보드(The Chicago Butter and Egg Board)”가 전신이며 처음에는 농산물 거래소로 시작하였다. 1970년대에는 은 선물, 1980년대에는 통화선물 및 S&P500 선물 등을 상장하며 금융 선 물시장을 개척하고 파생상품 시대를 열었다는 평가를 받고 있다. 이후 2002년에 상장되 었으며, 2007년에는 시카고상품거래소(CBOT)와 통합하여 CME 그룹이 되었다. 그리고 뉴욕상업거래소(NYMEX), 상품거래소(COMEX) 등 다른 주요 거래소들도 인수하였다. 이러한 거래소들을 통해 CME 그룹은 전 세계 시장참여자들에게 광범위한 선물 및 옵션 상품을 제공하며, 글로벌 금융시스템에서 중요한 역할을 하고 있다.',
  },
  '시카고 연준 금융상황지수': {
    title: '시카고 연준 금융상황지수',
    content: '시카고 연준의 금융상황지수(National Financial Conditions Index)는 미국의 금융시 장 상황을 지수화하여 현재 금융시장이 긴축적인지 또는 완화적인지를 나타낸다. 지수 는 각종 신용스프레드, 채권발행량, 변동성 지수 등 신용(credit), 레버리지(leverage), 리 스크(risk) 상황을 나타내는 105개의 금융변수로 구성된다. 지수는 0을 기준으로 음수일 수록 금융여건이 완화적임을, 양수일수록 긴축적임을 나타내며, 절댓값이 커질수록 그 정도가 심화됨을 의미한다. 시카고연준의 금융상황지수 외에도 Bloomberg, Goldman Sachs 등 여러 기관에서 금융상황지수를 산출하고 있다.',
  },
  '신용경색': {
    title: '신용경색',
    content: '금융기관 등에서 돈의 공급이 원활히 이루어지지 않아 어려움을 겪는 현상을 의미한다. 신용경색은 금융시장에 공급된 자금의 절대량이 적거나 자금의 통로가 막혀 있을 때 주로 발생한다. 신용경색(Credit Crunch)이 발생하면 기업들은 자금 부족으로 인해 정상적인 경영 활동에 어려움을 겪게 되고 무역업체들도 수출입 활동에 큰 제약을 받게 된다. 신용 경색이 나타나는 과정은 보통 다음과 같다. 먼저 일부 은행의 도산이나 부실화로 인해 금 융시스템 내의 대출 가능 규모가 줄어들게 되고, 이들 은행과 거래하던 기업들의 차입이 어려워지면서 기업 도산확률이 높아지게 된다. 이렇게 되면 건전한 은행들도 높아진 기업 의 신용위험과 유동성 위험 등에 대비하여 대출 규모를 축소하기 때문에 금융시스템 내 유동성이 부족해져 자금공급이 더욱 위축되는 악순환이 발생하게 된다. 신용경색은 주식, 채권 등 직접금융시장이 발달하지 못한 경우 실물경제에 더 큰 충격을 준다. 부문별로는 신용도가 낮은 중소기업이나 가계와 같이 직접금융시장을 이용하기 어려운 부문에 더 큰 영향을 미치게 된다. 우리나라도 1998년 외환위기 시 극심한 신용경색으로 인해 많은 기 업이 도산한 경험이 있다.',
  },
  '신용레버리지': {
    title: '신용레버리지',
    content: '신용레버리지란 레버리지효과를 거두기 위해 경제주체가 활용하고 있는 신용의 정도를 의미한다. 사전적 의미로 레버리지(Leverage)는 ‘지레의 작용’, ‘지레 장치’ 또는 ‘타인 자본을 이용한 효과’를 말한다. 기업경영 분야에서 레버리지란 기업이 투자수익률을 높 일 목적으로 타인으로부터 조달한 부채를 이용함으로써 자기자본의 수익률을 지렛대 효 과를 통해 보다 크게 확대시키는 것을 말한다. 레버리지 효과는 투자수익률이 타인자본 의 이자율보다 높을 경우 그 차이만큼 자본의 수익률을 높일 수 있기 때문에 발생하는 것 인데, 반대로 투자수익률이 타인자본의 이자율보다 낮을 경우에는 자본의 수익률이 그 차이만큼 줄어드는 역효과도 나타나게 된다. 이는 레버리지가 커질수록 손실발생의 위 험도 커지게 됨을 의미하므로 레버리지는 적정 수준을 유지할 필요가 있다. 참고로 한국 은행의 금융안정보고서에서는 우리나라 민간부문의 신용레버리지 수준으로 민간신용/ 명목GDP 비율을 이용하여 분석하고 있다. 여기서 민간신용으로 가계(대출금, 정부융자) 및 기업(대출금, 채권 및 정부융자) 부채의 합을 이용하고 있는데 이는 BCBS(2010)에서 민간신용을 ‘가계 및 비금융기업에 공급하는 모든 형태의 채무’로 넓게 정의하고 있는 것 을 감안한 것이다.',
  },
  '신용스프레드': {
    title: '신용스프레드',
    content: '신용스프레드란 특정 채권의 신용위험이 어느 정도인지를 보여주는 지표로서 동일만기 무위험 채권인 국고채 금리와 해당 채권 금리의 차이로 나타난다. 예를 들어 신용등급이 AA-인 3년만기 회사채 금리가 2.5%이고 3년만기 국고채 금리가 2.0%인 경우 신용스프 레드는 0.5%p(2.5%-2.0%)이다. 현재 회사채는 투자적격 회사채와 투자부적격 회사채로 구분되며, 투자적격 회사채는 우량회사채(AAA~AA-)와 비우량회사채(A+~BBB-)로 구분 된다. 우량회사채 신용위험이 비우량회사채 신용위험보다 작기 때문에 우량회사채 신용 스프레드는 비우량회사채 신용스프레드보다 당연히 작게 나타난다. 신용스프레드는 경기 회복, 기업실적 개선, 투자심리 안정 등으로 신용위험이 낮아질 때 축소되며, 반대로 경기 침체 우려, 기업 부실, 금융시장 불안 등으로 신용위험이 높아질 때 확대된다. 특히 비우 량회사채 신용스프레드의 움직임은 자본시장에서 자금이 기업에 원활히 공급되고 있는지 를 보여주는 핵심 지표이다. 2008년 9월 발생한 금융위기 때처럼 신용위험이 크게 부각 되는 시기에는 비우량회사채의 자금공급이 급격히 줄어들기 때문에 비우량회사채의 신용 스프레드가 급등하게 된다.',
  },
  '신용연계증권(CLN)': {
    title: '신용연계증권(CLN)',
    content: '신용연계증권(Credit Linked Notes)은 지급보증계약과 유사한 신용파산스왑(CDS)을 증권화한 형태이다. 신용연계증권의 보장매입자(CLN 매도자)는 기초자산의 신용상태 와 연계된 증권을 발행하고 약정된 방식으로 이자를 지급하며, 보장매도자(CLN 매수자) 는 약정이자를 받는 대신 신용사건이 발생하는 경우 기초자산의 손실을 부담하게 된다. 신용연계증권 거래의 특징은 보장매도자가 지급하는 신용연계증권 매수대금이 신용사건 발생시 보장매도자가 부담하게 되는 손실의 담보 역할을 한다는 점이다. 기초자산에 신용 사건이 발생하는 경우 보장매입자는 수취한 신용연계증권 거래대금에서 기초자산의 손실 분을 차감하여 보장매도자에게 돌려주거나, 기초자산을 보장매도자에게 인도한다. 이와 같이 신용연계증권은 신용파산스왑과는 달리 신용연계증권 거래대금이 담보 역할을 하고 있어 보장매도자의 신용도는 문제가 되지 않는다.',
  },
  '신용위험(신용리스크)': {
    title: '신용위험(신용리스크)',
    content: '바젤 자본규제에서는 신용위험을 채권·채무관계에서 채무자의 채무불이행, 이행거부 또 는 신용도 하락 등으로 인해 발생하는 손실 가능성을 포괄하는 개념으로 정의한다. 규제 하에서 신용위험은 일정 기간(통상 1년) 이내에 발생할 수 있는 발생할 것으로 예상되는 부도율(PD; Probability of Default), 채무불이행이 발생했을 때 담보 등을 고려한 실제 손실 비율(LGD; Loss Given Default), 부도 시 익스포저(EAD; Exposure At Default) 등의 지표를 통해 체계적으로 산출하되 예상을 벗어나는 충격적 손실(예상외 손실, UL; Unexpected Loss)도 신용위험에 포함한다.',
  },
  '신용창조': {
    title: '신용창조',
    content: '신용창조(Credit Creation)는 일반적으로 은행이 예금과 대출업무를 반복적으로 취급 하는 과정에서 예금통화를 만들어내는 현상을 말한다. 예를 들어 중앙은행이 A은행에 100만큼의 본원통화를 공급하면 A은행은 이중 10(지급준비율 10%, 민간의 화폐보유성 향 0% 가정)을 지급준비금으로 남겨두고 나머지 90을 대출로 운용한다. 대출받은 사람 이 이를 B은행에 예금을 하면 B은행은 다시 이 가운데 9를 지급준비금으로 남겨두고 나 머지 81을 다시 대출하게 된다. 이러한 과정이 무한정 반복되면 결국 예금은 1,000(그러 나 대출받는 사람이 전부 예금하기 보다는 이중 일부를 현금으로 보유하게 되는데 그러 면 동 현금 부분은 신용창조 사이클에서 누락되므로 실제통화량은 1,000 보다 작아진다) 만큼 늘어난다. 즉, 100이라는 본원통화가 신용창조를 통해 1,000이라는 예금통화가 창 출되었다. 본원통화와 통화량 사이의 관계를 통화승수라 하는데 여기서 통화승수는 10이 다(1000÷100). 지급준비율을 변경하면 승수효과를 통해 신용창출효과(통화량)에 영향 을 주기 때문에 지급준비제도는 중앙은행의 핵심적인 유동성조절 수단이다. 지급준비율 을 인하하면 통화승수가 커지기 때문에 통화량이 늘어나고 반대로 지급준비율을 인상하 면 통화승수가 줄어들기 때문에 통화량이 감소한다. 그래서 중앙은행은 통화완화가 필요 한 경우에는 지급준비율 인하를 통해, 통화긴축이 필요한 경우에는 지급준비율 인상을 통 해 통화량을 조절하게 된다.',
  },
  '신용파생상품': {
    title: '신용파생상품',
    content: '신용파생상품(Credit Derivative)이란 채권, 대출금 등과 같이 차입자 또는 발행자의 신 용에 따라 가치가 변동하는 기초자산(underlying asset)의 신용위험(credit risk)을 분리 하여 이를 다른 거래상대방에게 이전하고 그 대가로 프리미엄(수수료)을 지급하는 금융 상품을 말한다. 금리, 환율 등 가격변수의 변동에 따라 가치가 변동하는 금융자산의 시장 위험(market risk)을 선도 및 선물거래, 스왑, 옵션 등을 통해 관리할 수 있는데, 차입자 의 부도, 신용등급 변동 등에 따라 자산가치가 등락하는 금융자산의 신용위험은 신용파생 상품의 거래를 통해 그 위험을 헤지할 수 있다. 신용파생상품 거래에서 신용위험을 전가 하고 수수료를 지급하는 거래자는 보장매입자(protection buyer), 신용위험을 매수하고 그 대가로 수수료를 수취하는 거래자는 보장매도자(protection seller)라고 한다. 보장매 입자는 보유채권의 신용위험 노출을 없애고 기존 포트폴리오의 만기 구조를 개선할 수 있 으며, 보장매도자는 수수료 수입을 통해 수익증대를 도모하고 투자수단을 다양화할 수 있 다. 일반적으로 신용파생상품은 기초자산의 이전 없이 신용위험만을 분리하여 거래하므 로 신용위험에 대한 가격산정의 적정성을 높여 신용위험을 다수의 투자자에 분산시키는 기능을 수행한다.',
  },
  '신용평가제도': {
    title: '신용평가제도',
    content: '넓은 의미에서 신용평가란 자금을 빌리는 가계, 기업 등 차입자의 부채 상환능력이나 신 용도를 일정한 등급으로 평가하는 것을 말한다. 대표적인 예로서는 먼저 기업이 증권을 발행할 때 신용평가회사가 기업의 신용을 평가해주는 것이 있고, 다음으로 은행 등 금융 기관이 고객에게 대출을 할 때 개인 등의 신용등급을 평가하는 제도가 있다. 신용평가 회사(CRAs; Credit Rating Agencies)는 채권을 발행하려는 기업이나 금융기관의 재무 상황, 경제적 여건 등을 감안하여 발행자의 신용도를 등급으로 제시한다. 신용평가회사 는 1800년대 미국에서 채무자의 신용을 평가하기 위해 도입되었다. 1841년 태펀(Lewis Tappan)은 상인들의 신용을 평가하는 회사를 설립하였는데 현재 세계 신용평가회사 중 하나인 Moody’s Investors Service로 발전하였다. 1990년대에 들어서 이러한 신용평가 는 투자자에 대한 자료제공 이외에 금융기관이 등급이 낮은 채권 보유를 일정량 이상 보 유하는 것을 제한함으로써 건전성감독의 수단으로도 활용되고 있다. 한편 가계대출 등에 이용되는 개인신용평가제도(CSS; Credit Scoring System)는 개인의 인적사항, 소득, 금 융기관 거래 및 대출실적 등 신용정보를 토대로 신용등급을 매겨 대출여부 결정, 대출가 능금액 및 적용금리 산정 등에 활용된다.',
  },
  '신용환산율': {
    title: '신용환산율',
    content: 'BIS 자기자본비율 계산시 난내자산의 경우 익스포저에 거래상대방의 신용위험도에 따른 위험가중치를 곱하여 위험가중자산(risk-weighted assets)을 산출하게 된다. 난외자산의 경우 관련 권리·의무가 미확정된 상태로 난내자산으로 전환되기 전까지는 익스포저를 산 출할 수 없으므로 난외자산 계약의 명목원금에 신용환산율(Credit Conversion Factor) 을 곱해서 산출된 신용리스크 상당액을 익스포저로 보고 이에 거래상대방에 따른 위험 가 중치를 곱하여 위험가중자산을 구한다. 따라서 신용환산율은 난외자산이 실제로 활용되 어 난내자산으로 전환될 확률 개념이며, 특별한 원칙에 따라 결정되기 보다는 거래 유형 및 과거 경험을 토대로 바젤위원회(BCBS)가 산정한 비율을 사용하고 있다.',
  },
  '신·재생에너지': {
    title: '신·재생에너지',
    content: '매장량이 한정되어 있는 기존의 화석연료(석유, 석탄, 천연가스 등)와 우라늄을 대체 할 수 있는 에너지를 지칭하는 것으로, 새로운 기술을 활용한 에너지 또는 재생가능한 (renewable) 에너지를 포함한다. 세계 각국은 자국의 자원 여건 및 환경기준 등을 고려하 여 신·재생에너지의 개념을 특정 에너지를 추가 또는 제외한 것으로 규정하고 있어 그 정 의에 대한 명확한 국제적 기준이 없고 이에 따라 통계편제 기준도 국가별로 다르다. 우리 나라에서는 신에너지 및 재생에너지 개발·이용·보급 촉진법 및 시행규칙에 의거하여 연 료전지, 석탄액화·가스화 및 수소에너지의 3개를 신에너지로, 태양열, 태양광, 바이오, 풍 력, 수력, 해양, 폐기물 및 지열의 8개를 재생에너지로 각각 규정하고 있다.',
  },
  '신종자본증권': {
    title: '신종자본증권',
    content: '신종자본증권이란 채권과 주식의 특성을 모두 보유한 금융상품을 의미한다. 증권 보유자 에게 일정 수준의 이자가 지급되는 것은 채권과 비슷하지만, 주식과 같이 만기가 없거나 유동적이며 발행기관이 부실해지면 이자 지급이 중단될 수 있다. 특히 금융회사의 경우 일 정 요건을 충족하는 신종자본증권은 감독기관으로부터 자본으로 인정받을 수 있고, 투자 자 입장에서는 상대적으로 금리 수준이 높다는 장점이 있다. 반면 발행기관 입장에서는 채 권에 비해 조달 비용이 크고 투자자는 발행기관 부실시 자본으로 전환되며 원금 손실이 발 생할 위험이 있다. 우리나라에서는 2003년 4월 한국외환은행(주)에서 최초 발행하였다. 신주인수권부사채(BW) 신주인수권부사채(Bond with Warrant)는 채권을 발행한 회사가 주식을 발행할 경우 투 자자가 미리 약정된 가격에 일정한 수량의 신주(新株)를 인수할 수 있는 권리인 워런트 (Warrant)가 결합된 회사채를 말한다. 투자자들은 발행기업의 주가가 약정된 매입가를 상회하면 신주를 인수하여 차익을 얻을 수 있고, 그렇지 않으면 인수권을 포기하면 된다. BW는 일반 채권에 비해 발행금리가 낮아 발행 회사는 적은 비용으로 자금을 조달할 수 있는 장점이 있다. 또한 발행기업의 주가가 약정된 매입가를 상회할 경우에는 투자자들의 신주인수권 행사에 힘입어 자기자본이 증가하면서 새로운 자금조달이 가능하게 된다. 이 경우 투자자는 채권으로부터 이자수익을, 주식으로부터 주가 상승에 따른 자본수익을 기 대할 수 있어 투자의 안전성과 수익성 모두를 확보하게 된다. BW는 발행회사의 주식으로 전환할 수 있는 권리가 부여된 전환사채(CB; Convertible Bond)와 비슷한 것처럼 보이 지만, CB는 전환 시 그 사채가 소멸되는 데 반해, BW는 신주인수권 행사 시 인수권 부분 만 소멸될 뿐 사채 부분은 계속 효력을 갖게 되므로 양자 간에는 차이가 있다.',
  },
  '신흥시장국채권지수(EMBI+)': {
    title: '신흥시장국채권지수(EMBI+)',
    content: 'EMBI+(Emerging Market Bond Index+)는 신흥국(이머징 마켓) 정부가 국제금융시장 에서 발행한 달러화 표시 국채의 수익률을 기반으로 하는 대표적인 벤치마크 지수로 글로 벌 투자은행인 JP Morgan이 산출한다. 구체적으로는 신흥시장국 채권 등의 가산금리를 거래금액을 기준으로 가중평균하여 지수화한다. 미국, 유럽, 일본 등 신용등급이 높은 국 가에서 발행한 채권에 주로 투자하는 펀드를 글로벌 채권펀드, BRICs 등 신흥시장 국가 에서 발행한 채권에 주로 투자하는 펀드를 신흥시장국 채권펀드라고 하는데, 양자간 투자 위험도의 차이 때문에 통상 후자의 금리(투자수익률)는 전자의 금리보다 높다. EMBI+ 수 익률에서 미국 국채수익률을 차감한 값을 EMBI+ 스프레드라고 하며, 일반적으로 신흥국 의 위험이 증가하면 동 스프레드가 커진다.',
  },
  '실망실업자': {
    title: '실망실업자',
    content: '구직단념자라고도 하며, 비경제활동인구 중 잠재구직자의 일부분이며 취업 희망과 취업 가능성 기준 외에도 노동시장적 사유로 지난 4주간 구직활동을 하지 않는 자 중 지난 1년 내 구직 경험이 있는 사람을 의미한다. 여기서 노동시장적 사유라 함은 다음과 같은 사유 로 구직활동을 하지 않게 된 경우를 의미한다. ① 전공, 경력, 임금수준, 근로조건 등의 면 에서 적당한 일자리가 없을 것 같아서 ② 지난 4주간 이전에 구직하여 보았지만 일자리를 찾을 수 없어서 ③ 교육·기술·경험 부족 등의 면에서 자격이 부족하여 지난 4주간 구직활 동을 하지 않은 경우를 의미한다.',
  },
  '실물화폐/명목화폐': {
    title: '실물화폐/명목화폐',
    content: '고유의 사용가치 및 교환가치를 가지고 화폐의 기능을 수행하는 물건을 실물화폐라고 한 다. 화폐경제 초기에는 각기 그 사회의 고유한 사정에 의해 생산량이나 존재량이 충분하지 못하여 희소가치가 있는 조개 등 귀한 물건 또는 교환의 도구로 사용하기에 적당한 가축, 면 포 등이 실물화폐로 사용되었으나 점차 운반도 간편하고 변질도 되지 않는 내구성이 있는 귀금속, 특히 금 또는 은이 주로 실물화폐로 쓰여졌다. 이러한 실물화폐는 경제규모가 커짐 에 따라 필요한 양만큼 보관과 운반이 불편하여 소재가치와 교환가치가 다른 무엇을 화폐 로 사용하게 되는데 이를 명목화폐라고 한다. 오늘날에는 은행권(지폐)으로 대표되는 명목 화폐가 화폐의 대부분을 이룬다. 명목화폐는 그 자체가 가치를 가져서 화폐가 된 것이 아니 라, 법률에 근거하거나 역사적인 관습이 그대로 사회적 신임을 얻어 통용되게 된 것이다.',
  },
  '실시간총액결제': {
    title: '실시간총액결제',
    content: '실시간총액결제는 금융기관간 지급액과 수취액을 상계시키지 않고 지급지시 건별로 그 지급지시의 금액(총액)을 실시간으로 이체하여 결제하는 방식이다. 실시간총액결제시스 템을 운영하기 위해서는 지급지시를 건별로 동시에 안정적으로 처리할 수 있는 전산시스 템 구축이 필요하며 차액결제와 비교하여 신용리스크가 발생하지 않는다는 장점이 있다. 실시간총액결제방식은 거액지급시스템에 주로 적용되었으나 글로벌 금융위기 이후에는 신용리스크 관리에 대한 관심이 높아지고 IT기술 발달하면서 다량의 소액지급거래를 건 별로 안정적으로 처리할 수 있는 전산시스템 구축이 용이해지면서 소액지급시스템 관련 신속자금이체시스템의 패러다임이 이연결제방식에서 실시간총액결제방식으로 전환되고 있다. 한국은행도 실시간총액결제를 기반으로 하는 소액지급시스템인 신속자금이체시스 템을 구축할 계획이다.',
  },
  '실업률': {
    title: '실업률',
    content: '고용상황을 파악하고자 할 경우에는 전체 인구보다는 경제적으로 생산활동이 가능한 인 구가 더욱 중요한 의미를 가진다. 이에 따라 현재 각국에서 작성하는 고용통계는 일정 연 령 이상의 노동가능인구를 대상으로 작성되고 있으며, 동 인구는 다시 노동을 통해 경제 활동에 참가할 의사가 있는 경제활동인구와 경제활동의 의사가 없는 비경제활동인구로 나뉜다. 경제활동인구는 다시 취업자와 실업자로 구분, 조사되는데 실업자가 경제활동인 구에 포함되는 이유는 비록 조사시점 당시에는 일시적인 이유로 직장이 없어 실업상태에 있으나 언제든지 노동력을 제공함으로써 경제활동을 할 수 있는 인구로 분류되기 때문이 다. 고용현황조사를 통하여 노동가능인구, 경제활동인구, 취업자 및 실업자 등의 노동력 과 유휴노동력의 규모가 파악되면 경제활동참가율, 실업률 등의 지표를 성별, 지역별, 연 령별 등으로 산출하여 취업구조의 변화를 판단하게 되는데 경제활동참가율은 경제활동인 구수를 노동가능인구수로 나눈 백분율이며, 실업률은 실업자수를 경제활동인구수로 나누 어 백분율로 계산한다.',
  },
  '실업률갭': {
    title: '실업률갭',
    content: '실업률과 자연실업률간의 차이를 말한다. 실업률갭은 노동시장의 여력(slack)을 평가할 수 있는 유용한 지표로, 잠재GDP와 실제GDP의 차이인 GDP갭과 함께 경기수준 또는 경 제 전반의 유휴자원을 파악할 때 유용하다. 실업률갭이 양(+)인 경우에는 노동공급 여력 이 양호한 상황으로 인플레이션압력이 높지 않음을 나타내며, 실업률갭이 음(-)인 경우 에는 노동공급 여력이 소진된 상황으로 노동력 확보 경쟁 등으로 인한 임금상승이 인플 레이션압력을 높일 가능성이 큰 상황으로 볼 수 있다. 따라서 물가안정을 주된 정책목표 로 하는 중앙은행의 경우 실업률갭은 노동시장을 통한 인플레이션 상승압력을 평가하거 나, 통화정책 기조가 노동시장 수급불균형 해소에 어느 정도 부합하는지 등을 살펴보는 데 유용하게 활용할 수 있다. 다만 중앙은행이 실업률갭만을 염두에 두고 통화정책을 운 영하는 데는 한계가 있는데, 이는 실업률갭의 구성요소인 자연실업률이 실시간으로 관측 되지 않고 추정방법도 다양하여 정확한 추정이 이루어지지 않을 경우 중앙은행이 원하는 정책효과를 얻지 못할 수 있기 때문이다.',
  },
  '실질구매력': {
    title: '실질구매력',
    content: '구매력이란 어떤 양의 화폐로 구입할 수 있는 재화와 서비스의 양을 말한다. 다시 말하면 재화와 서비스로 평가한 화폐의 가치이다. 실질구매력은 물가수준을 고려한 구매력이다. 물가가 오르면 같은 금액으로 살 수 있는 양이 줄어들어 실질구매력은 낮아진다. 반대로 물가가 떨어지면 같은 금액, 소득으로 살 수 있는 재화와 서비스의 양이 늘어나게 된다. 실질구매력은 시간의 흐름에 따른 화폐가치의 변화를 나타내어 실제 생활에서 체감하는 소비 능력을 평가하는 지표이다. 따라서 물가가 안정된 상황에서 명목임금의 상승이 예상 된다면 최종수요에서 큰 비중을 차지하는 소비의 긍정적 변화를 전망할 수 있다. 한편, 실 질구매력 변화율은 명목임금 변동률에서 소비자물가 상승률을 차감하여 계산된다.',
  },
  '실질임금': {
    title: '실질임금',
    content: '근로자가 노동의 대가로 받는 임금을 현재의 화폐단위로 표시한 것을 명목임금이라고 하 는데 이러한 명목임금으로 재화와 서비스를 실제 구입할 수 있는 수량 즉, 구매력을 측정 하기 위해 명목임금을 소비자물가지수로 나눈 것을 실질임금이라고 한다. 물가상승률이 명목상승률보다 더 높으면 실질임금은 오히려 줄어들어 실제 구매력은 감소하게 된다.',
  },
  '실효환율': {
    title: '실효환율',
    content: '환율은 양 통화 간의 교환비율이기 때문에 주요 교역상대국 통화 전체에 대한 자국 통화 가치의 변동을 파악하는 데에는 부족한 측면이 있다. 실효환율(Effective Exchange Rate) 은 이러한 점을 고려해 자국통화와 주요 교역상대국 통화 간의 환율을 무역 비중으로 가중평균하여 산출한 환율로서 자국 상품의 종합적인 가격경쟁력 지표로 볼 수 있다. 한 편, 일국 통화의 대외가치는 환율 변동뿐 아니라 국가 간의 물가상승률의 차이에 의해서 도 영향을 받게 되는 바, 국가 간의 물가변동을 고려하지 않고 주요 교역대상국의 환율 변 동만을 종합적으로 고려한 실효환율을 명목실효환율(nominal effective exchange rate) 이라고 하고 물가변동까지를 고려한 실효환율을 실질실효환율(real effective exchange rate)이라고 한다. 명목실효환율이나 실질실효환율은 명목환율의 절대적 수준이 통화별 로 상이한 점 때문에 절대적 환율 수치가 아닌 기준년 대비 지수 형태로 표시되는 경우가 많은데 이를 각각 명목실효환율지수 또는 실질실효환율지수라고 한다. 지수가 상승하면 자국 통화가 고평가되어 수출 가격경쟁력이 약화되고, 하락하면 저평가되어 수출 가격경 쟁력이 강화됨을 의미한다.',
  },
  '쌍순환 전략': {
    title: '쌍순환 전략',
    content: '국민경제의 최종수요는 크게 소비·투자 중심의 내수(국내경제 순환)와 수출 중심의 외수 로 구분할 수 있다. 세계화된 국민경제는 일반적으로 내수와 외수의 두 개의 축이 조화롭 게 떠받칠 때 지속 성장이 가능하게 된다. 쌍순환(雙循環) 전략은 2020년 이후 미국과 중 국의 무역 갈등이 심화되면서 중국 정부가 제시하고 사용한 용어이다. 안정적이고 자립적 인 경제시스템을 구축하기 위해 기술 혁신을 통한 투자 확대와 소비확충의 내순환을 바탕 으로 수출 증대(외순환)를 도모하겠다는 의미를 담고 있다. 우리나라도 수출 비중이 높아 글로벌 경제와의 연계가 매우 중요하다. 그래서 안정적이고 지속적인 성장을 위해 내수와 수출의 보완과 조화로운 확대를 추구하여왔다. 소비 중심의 내수가 건전하고 단단해야 글 로벌 충격에 잘 견딜 수 있으며 다른 나라와의 관계 유지 등을 통해 무역을 확대하여 국민 경제의 성장을 추구할 수 있는 것이다.',
  },
  '아세안+3 거시경제조사기구(AMRO)': {
    title: '아세안+3 거시경제조사기구(AMRO)',
    content: 'AMRO(ASEAN+3 Macroeconomic Research Office)는 아세안(ASEAN) 10개국 과 한국, 중국, 일본 등 13개국이 치앙마이 이니셔티브 다자화 협정(CMIM; Chiang Mai Initiative Multilateralization)의 효과적인 운영을 지원하기 위하여 2011년에 설립한 기구로서 싱가포르에 본부를 두고 있다. 설립 당시에는 싱가포르 민간법인의 형태였으나 원활한 역내 협력 및 감시업무 수행을 위하여 2013년 5월 국제기구화하 기로 합의하고 이후 2016년 2월 AMRO 협정문이 발효됨에 따라 국제기구로 공식 전 환되었다. 이에 따라 CMIM, AMRO로 구성되는 역내 금융안정망의 위상이 크게 높 아졌으며 국제통화기금(IMF) 등 여타 국제기구와 공식적으로 협력할 수 있게 되는 등 AMRO의 역량도 강화되었다. AMRO는 ASEAN+3 지역의 거시경제 연구와 금융감 시를 전담하는 기구로서, 평시와 위기 시에 따라 차별화된 역할을 수행한다. 평시에는 역내 전체 및 회원국별 거시경제 동향과 전망을 분석해 보고서를 작성하고, ERPD 회 의에서 관련 자료를 제공한다. 또한 회원국과의 연례협의를 통해 국가별 감시보고서 (Annual Consultation Report)를 제출하며, 지역경제전망보고서(AERO), 금융안정 보고서(AFSR), 재정정책보고서(AFPR) 등 정기간행물을 발간한다. 위기 시에는 지원 대상국의 거시경제 상황을 심층 분석하고 정책 권고안을 제시하여 CMIM 의사결정기 구의 판단을 지원하며, 동시에 CMIM 협정상 인출 조건 준수 여부를 점검·감시하는 기능을 수행한다.',
  },
  '아시아개발은행(ADB)': {
    title: '아시아개발은행(ADB)',
    content: '아시아개발은행(ADB)은 아시아·태평양 지역의 경제성장 및 경제협력 촉진과 역내 개도 국의 경제개발 지원을 목적으로 1966년 8월 설립된 국제금융기구로서 필리핀 마닐라에 본부를 두고 있다. 주요 기능은 공공 및 민간자본의 역내 개발투자 촉진, 역내 국가의 균 형적 경제발전을 위한 회원국의 개발사업에 대한 자금지원, 개발사업계획의 작성 및 집행 에 관한 기술지원 등이다. 이에 따라 회원국의 출자금과 차입금 등으로 조달된 일반재원 의 투자 및 융자, 회원국의 출연금으로 조성한 아시아개발기금의 운영 등의 업무를 수행 하고 있다. ADB(Asian Development Bank) 조직은 총회, 이사회 및 총재를 비롯한 실무 부서로 구성되어 있다. 가입 자격은 역내 국가의 경우 UN, UN 전문기구, ESCAP의 회원 국이어야 하며 역외 국가는 선진국으로 제한하고 있는데 2025년 6월말 현재 회원국은 총 69개국(역내 50개국, 역외 19개국)이다. 회원국의 투표권은 기본표와 비례표로 구분되는 데 기본표는 총 투표권의 20%를 회원국에 균등하게 배분하고 비례표는 1주당 1표씩 출 자액에 비례하여 배분한다. 2024년 말 현재 회원국별 투표권 비중을 보면 미국과 일본이 각각 12.747%로 가장 높고 중국(5.43%), 인도, 호주, 인도네시아, 캐나다, 한국(4.31%)의 순이다.',
  },
  '아시아인프라은행(AIIB)': {
    title: '아시아인프라은행(AIIB)',
    content: '아시아 국가들의 사회간접자본 구축을 지원하기 위해 설립된 국제금융기구이다. 2013년 10월 중국의 제안을 바탕으로 2014년 10월에 참여를 희망하는 21개국이 양해각서를 체 결하였다. 이후 2016년 1월 중국 베이징에서 창립총회를 개최하면서 공식 출범하였다. 국제부흥개발은행(IBRD)과 아시아개발은행(ADB) 등 개발금융기구가 선진국 주도로 운 영되고 있어 신흥시장국 및 후발 개도국들의 요구가 반영되기 어렵다는 비판을 배경으로 중국이 AIIB(Asian Infrastructure Investment Bank) 설립을 주도하였으며 미국과 일본 은 참여하지 않았다. IBRD나 ADB의 회원국은 AIIB의 회원국이 될 수 있으며, 회원국이 되면 AIIB로부터 사회간접자본 확충을 위한 투자를 받을 수 있다. 회원국들의 투표권은 기본표, 비례표, 창립회원국표로 구분된다. 기본표는 총 투표권의 12%가 각 회원국에게 균등하게 배분되며, 비례표는 1주당 1표씩 출자액에 비례하여 배분된다. 창립회원국표 는 창립회원국에게만 각각 600표가 배분된다. 2025년 8월말 현재 회원국은 103개국(아 시아 지역 51개국, 비아시아 지역 52개국)으로 예비 회원국 7개국까지 포함하면 총 110 개국이다. 우리나라는 창립회원국으로 가입하여 37.4억 달러(2025년 6월말 기준 출자 비 중 3.83%, 출자 순위는 중국, 인도, 러시아, 독일에 이어 5위)를 출자하였다. AIIB의 설립 당시 수권자본금은 1,000억 달러이며, 2025년 6월말에도 동일하게 유지되고 있다. 이 중 출자배분된 자본금은 976억 달러이며, 납입자본금은 출자배분된 자본금의 20%에 해당하 는 195억 달러이다.',
  },
  '아시아태평양경제협력체(APEC)': {
    title: '아시아태평양경제협력체(APEC)',
    content: '아시아 및 태평양 연안 국가 간의 경제협력을 목표로 설립된 국제기구로서 1989년 11월 호주 캔버라에서 개최된 제1차 각료회의를 통하여 공식 출범하였다. 회원국은 출 범 당시 한국·일본·미국·캐나다·호주·뉴질랜드·아세안 6개국 등 12개국이었으나 이후 중국·대만·홍콩·멕시코·칠레·베트남·러시아·페루 등이 차례로 가입하여 현재는 총 21 개국이다. 설립 목적은 단기적으로는 역내 무역과 투자의 자유화를 실현하고 장기적으로 는 아시아태평양 경제공동체를 창설하여 아시아태평양 자유무역지대를 실현하는 것이 다. APEC(Asia-Pacific Economic Cooperation)의 의사결정은 전원합의 방식이며 비 구속적 이행을 원칙으로 함으로써 회원국의 자발적인 참여 및 이행을 중시하고 있다. 주 요 조직은 정상회의, 각료회의, 고위관리회의, 실무그룹 등으로 각료회의와 고위관리회 의에서 주요 기능을 수행하고 있다. 중국·대만 문제 등으로 공식 명칭이 경제지도자회의 (Economic leader\'s Meeting)로 되어 있는 정상회의는 매년 회원국이 번갈아 개최하 면서 공식 의제 없이 역내 협력의 비전 등을 협의하고 있다. 우리나라는 2005년 부산과 2025년 경주에서 APEC 정상회의를 개최한 바 있다.',
  },
  '애그플레이션': {
    title: '애그플레이션',
    content: '농업이라는 뜻의 Agriculture와 인플레이션(inflation)의 합성어로 농산물 가격의 급격한 상승이 일반 물가의 상승을 일으키는 현상을 말한다. 미국의 시사주간지 타임(2007.6.14 인터넷판)은 옥수수로 대체연료인 에탄올을 생산하는 경우가 많이 늘어나면서 옥수수 값 이 급격히 오를 것으로 예상함에 따라 옥수수를 원료로 사용하는 식품은 물론 옥수수가 쓰이는 각종 제품의 가격이 오를 가능성이 있다고 보고한 바 있다. 쓰임새가 무척 다양한 옥수수 값 상승의 영향은 과자나 빵 등 식품의 가격에만 국한되지 않으며, 설탕의 대체재 로 사용되고 옥수수로 만드는 감미료의 가격이 상승하여 이를 사용하는 각종 청량음료나 사탕 등의 제품가격에도 영향을 미치게 되었다. 또한, 옥수수는 가축사료로 쓰임에 따라 가축을 기르는 비용의 상승으로 이어져 계란, 우유, 베이컨 등의 제품가격도 오를 수밖에 없다. 이외에 종이나 옷, 기저귀, 샴푸, 페인트, 크레용 등에도 옥수수가 들어가기 때문에 이들 제품의 가격도 오를 가능성이 있다. 이러한 애그플레이션의 원인으로는 ① 지구 온 난화와 이상 기후 등으로 인한 농작물 생산량 감소 ② 급격한 도시화로 인한 농경지 축소 및 농가수 감소 등으로 인한 농작물 생산량 감소 ③ 옥수수, 사탕수수 등을 이용한 바이오 연료 개발 및 육류 소비 증가에 따른 곡물 수요 증가 등으로 농산물에 대한 수요가 폭등한 것 등을 들 수 있다.',
  },
  '양도성예금증서(CD)': {
    title: '양도성예금증서(CD)',
    content: '양도성예금증서(CD; negotiable Certificate of Deposit)는 은행의 정기예금증서에 양 도성을 부여한 것이다. CD는 1961년 미국의 대형은행들이 기업의 거액자금을 유치하기 위해 발행한 고수익 단기금융상품으로 출현하였다. 국내에서는 은행의 수신기반 강화를 위해 1984년 6월에 본격 도입되었다. CD는 만기 30일 이상으로 할인 발행되며 중도해지 는 허용되지 않으나 양도가 가능하므로 보유 CD를 매각하여 현금화할 수 있다. 현재 한 국은행에 예금지급준비금을 예치할 의무가 있는 시중은행, 지방은행, 특수은행, 외은지점 등 한국수출입은행을 제외한 모든 은행이 CD를 발행할 수 있다. CD는 발행시 매수주체 에 따라 대고객CD와 은행간CD로 구분된다. 대고객CD는 다시 은행창구에서 직접 발행 되는 창구CD와 중개기관(증권회사, 자금중개회사 등)의 중개를 통해 발행되는 시장성CD 로 구분된다. 개인, 일반법인 등은 주로 발행은행 창구에서 직접 매입하는 반면 자산운용 회사, 보험회사 등 금융기관은 중개기관을 통해 매입한다. 은행간CD는 은행상호간 자금 의 과부족을 해소하기 위한 수단으로 발행은행과 매수은행간 직접 교섭에 의해 발행되며 은행 이외의 금융기관, 개인, 일반법인에게 양도하는 것이 금지되어 있다. 대고객CD는 한국은행법상 예금채무에 해당하여 일반 정기예금과 같이 2%의 지급준비금 적립의무가 부과되고 있으나 은행간CD의 경우 지급준비금 적립대상에서 제외된다. 한편 CD는 2001 년부터 예금보호대상에서 제외되었다.',
  },
  '양적완화정책': {
    title: '양적완화정책',
    content: '양적완화정책(QE; Quantitative Easing)이란 금리중시 통화정책을 시행하는 중앙은행이 정책금리가 제로 수준에 근접하게 인하(추가적인 정책금리 인하 여지가 없음)하였음에도 불구하고 경제 회복이 당초의 기대에 미치지 못함에 따라 장기금리 하락을 유도하기 위해 국채 등을 무제한으로 매입하여 유동성을 충분히 공급함으로써 중앙은행의 대차대조표를 확대하는 정책을 말한다. 이러한 양적완화정책은 2001년 3월 일본은행이 제로금리 하에 서 일본은행 당좌예금잔액을 확대하는 정책을 도입하면서 처음으로 사용되었다. 2008년 9월 글로벌 금융위기가 실물부문으로 빠르게 확산하면서 주요 선진국의 경기침체가 심화 되자 주요국 중앙은행은 전통적 통화정책의 한계에 봉착하게 되었고, 이러한 상황을 타개 하기 위해 비전통적 통화정책 수단인 양적완화정책을 실시하게 되었다. 양적완화는 통화 정책의 완화기조가 상당 기간 유지될 것이라는 신호를 줌으로써 민간 경제주체들의 향후 경기회복에 대한 기대를 높이거나, 금융시장 유동성 사정 개선 및 위험회피 심리 완화로 금융기관 대출이 늘어나는 등의 경로를 통해 금융시장 및 실물경제에 영향을 미치게 된 다. 하지만 양적완화가 장기간 지속될 경우에는 민간 경제주체들의 과도한 수익 추구 행 위 등으로 금융불균형이 심화되는 부작용이 발생할 가능성이 있다. 한편 중앙은행이 양적 완화정책으로 크게 늘어난 보유자산 규모를 경기회복세 등을 배경으로 점진적으로 축소 할 때 그 속도가 경기회복세에 비하여 더딜 경우에는 과잉 유동성이 자칫 물가상승압력 으로 작용할 가능성도 배제할 수 없다. 한편 양적완화정책과 대비되는 개념으로 질적완 화 정책(Qualitative Easing)이 있다. 이것은 중앙은행의 대차대조표는 확대하지 않으면 서 중앙은행의 자산구성을 변경하는 것이다. 즉, 중앙은행은 대부분 무위험자산인 국채를 보유하고 있는데 이 중 일부를 신용위험이 있는 채권으로 포트폴리오를 조정(중앙은행이 금융시장에서 신용위험채권을 매입함을 의미)함으로써 금융시장의 신용경색을 타개하고 자 하는 정책수단이다.',
  },
  '어음관리계좌(CMA)': {
    title: '어음관리계좌(CMA)',
    content: '어음관리계좌(CMA; Cash Management Account)는 고객이 맡긴 자금을 어음이나 우 량채권 등에 운용하여 그 수익을 고객에게 돌려주는 대표적인 단기금융상품이다. 1984년 8월 「종합금융회사법」에 의거 종금사 수신상품의 하나로 도입되었으나 2003년 11월부 터는 증권사들도 약관에 의해서 취급함에 따라 현재 CMA는 대부분 증권사에서 취급하고 있다. 증권사 CMA는 고객과의 약정에 따라 예치자금을 MMF, RP 등에 투자하는 금융서 비스 계좌로 고객예탁금 계좌와 연계하여 수시 입출금, 급여이체, 신용카드 결제대금 납 부 등의 부가서비스도 제공하고 있다. 당초 증권사 CMA는 가상계좌를 통해 제한적으로 만 지급결제서비스를 제공해왔으나 자본시장법 시행으로 증권사의 소액지급결제서비스 가 허용됨에 따라 2009년 8월 이후에는 은행의 요구불예금 수준의 지급결제서비스가 가 능해졌다.',
  },
  '어음교환': {
    title: '어음교환',
    content: '어음교환이란 다수의 은행이 일정한 시간에 특정 장소에 모여 자행이 수납한 어음(수표 및 제 증서 포함) 중 다른 은행을 지급지로 하는 어음과 다른 은행이 수납한 어음 중 자행 을 지급지로 하는 어음을 서로 교환하고, 이에 따른 대금을 청산하는 것을 말하며 어음교 환이 이루어지는 장소를 어음교환소라 한다. 어음교환제도는 어음·수표의 추심에 따른 은행 업무부담 및 비용을 절감하고 추심 소요기간을 단축시키는 효과가 있다. 우리나라 의 어음교환소는 1910년 7월 서울에 설립된 사설 경성어음교환소(현 서울어음교환소)가 그 효시로 이후 인천, 부산, 대구, 광주, 대전 등 경제규모가 큰 대도시로 설치지역이 확대 되었다. 이후에도 경제규모의 확대와 더불어 어음교환소 설치가 확대되어 2000년대에는 전국적으로 약 50여개의 어음교환소가 운영되었다. 그러나 2010년 11월 어음교환정보를 전자적인 방식으로 교환 처리하는 전자정보교환제도(truncation)가 전국으로 확대 실시 되면서 지방어음교환소는 모두 폐쇄되었으며 현재는 서울어음교환소에서 모든 업무를 처 리하고 있다.',
  },
  '업무지속계획': {
    title: '업무지속계획',
    content: '각종 재해나 비상사태의 발생 시에도 조직의 업무나 대고객서비스가 중단 없이 지속될 수 있도록 하거나 업무 중단에 대한 신속한 대응 및 복구를 목표로 하는 일련의 대책을 의미 한다. 최근 들어 금융업무 특히 지급결제업무가 금융기관간 또는 지급결제시스템간 상호 연계성이 높아지면서 한 시스템에서 발생한 재해나 장애가 다른 시스템이나 금융기관에 연쇄적으로 영향을 주는 등 전체 금융시스템의 안정성을 해치는 경우가 빈번하게 발생하 고 있어 업무지속계획의 중요성에 대한 인식이 높아지고 있다. 업무지속계획(Business Continuity Plan)은 수립단계부터 최고 경영층의 적극적인 지원이 필요하다. 또한 체계 적인 접근방법을 통해 전략을 수립하고 그 이행결과를 점검하며 필요한 경우 전략을 수정 해 나가야 효과적으로 운영될 수 있다. 일반적으로 업무지속계획의 수립 및 운영은 다음 과 같은 과정을 통해 이루어진다. ① 업무지속계획의 범위를 설정하고 ② 발생가능한 재 해 및 장애의 유형과 영향을 분석, 평가한 후 ③ 재해 및 장애 발생으로 업무가 중단될 경 우 그 영향을 분석하고 이에 따른 업무의 중요도를 정한 다음 ④ 중단된 업무를 중요도에 따라 신속하게 복구하기 위한 전략을 개발한다. 동 전략에는 제2운영센터 구축 및 운영과 데이터 백업 및 소산에 관한 사항 등이 포함된다. ⑤ 업무중단사태의 사전예방과 재해·장 애 발생 시 사후 대응 절차 등 구체적인 내용이 포함된 업무지속계획을 수립하고 ⑥ 주기 적인 모의 훈련을 시행한다.',
  },
  '에너지 믹스': {
    title: '에너지 믹스',
    content: '에너지 믹스(Energy Mix)는 인구 증가와 전력사용량의 급증에 대응하여 에너지를 다양한 방법으로 생산하는 것을 의미한다. 국가나 지역이 사용하는 전체 에너지 소비에서 원자 력, 화력, 재생에너지 등 서로 다른 에너지원이 차지하는 비율을 뜻하는 개념이다. 정부는 에너지 생산의 경제성과 환경에 미치는 영향, 에너지 안보 등을 고려하여 적합한 에너지 믹스를 목표로 설정하고 이를 달성하기 위한 정책을 추진한다. 에너지 수요가 급증하면서 하나의 에너지원만으로 그 수요를 충족시키기 어려워 에너지원을 조합하는 에너지믹스가 중요해졌다. 또한 산업혁명 이후 크게 늘어난 화석연료 사용으로 기후위기 이슈가 나타나 면서 에너지믹스가 더욱 관심을 받게 되었다. 최근 탄소중립 목표 달성을 위해 석탄, 석유 등의 이산화탄소를 배출하는 연료를 줄이고 신재생에너지 비중을 확대하는 방향으로 에 너지믹스를 조정하는 추세에 있다.',
  },
  '엥겔의 법칙': {
    title: '엥겔의 법칙',
    content: '엥겔의 법칙은 독일의 통계학자 엥겔이 벨기에 노동자의 가계조사를 통해 발견하였다. 1857년 당시 작센 지방의 통계국장이었던 엥겔은 153세대의 가계지출을 조사한 결과 저 소득 가계일수록 소비지출에서 식료품비가 차지하는 비율이 높고, 고소득 가계일수록 식 료품비가 차지하는 비율이 낮음을 발견하였다. 또한 가계의 소비지출은 식료품비, 피복비, 주거비, 광열비, 문화비 등 다섯 가지로 크게 구분할 수 있는데 소득의 증가에 따라 식료품 비에 대한 지출비중은 점차 하락하고 피복비, 주거비, 광열비에 대한 지출비중은 비교적 변 동하지 않지만, 문화비에 대한 지출비중은 소득의 증가에 따라 급속히 증가한다는 것을 발 견하였다. 이와 같은 사실들을 「엥겔의 법칙」이라고 하며, 가계의 소비지출 중에서 식료품 비가 차지하는 비중을 특히 엥겔계수(Engel’s coefficient)라고 한다. 일반적으로 식료품은 필수품으로 소득의 많고 적음에 관계없이 어느 정도는 반드시 소비하여야 하지만 어느 수 준 이상은 소비할 필요가 없는 재화이다. 그러므로 저소득 가계라도 일정 금액의 식료품비 지출은 이루어지며, 소득이 증가하여도 식료품비는 그보다 크게 증가하지는 않는다. 이와 같은 이유로 엥겔계수는 소득수준이 높아짐에 따라 점차 감소하게 되는 것이다.',
  },
  '여신전문금융회사': {
    title: '여신전문금융회사',
    content: '은행과 같은 예금 수신기능 없이 여신업무만을 수행하는 금융회사를 의미한다. 여신전문 금융회사는 신용카드회사(신용카드업), 할부금융회사(할부금융업), 리스회사(시설대여업), 벤처캐피탈사(신기술사업금융업) 등이 있다. 신용카드업은 신용카드의 발행 및 관리, 신 용카드 이용과 관련된 대금의 결제, 신용카드가맹점의 모집 및 관리업무를 행하는 업종을 말한다. 할부금융업은 재화 및 용역 매매에 대하여 매수인과 매도인이 각각 약정을 맺고 재화 및 용역의 구매자금을 매도인에게 지급하고 매수인으로부터 그 원리금을 나누어 상 환받는 방식의 금융업을 말한다. 시설대여업은 특정물건을 새로 취득하거나 대여받아 거 래상대방에게 일정 기간 사용하게 하고 그 사용기간 동안 일정한 대가를 정기적으로 나누 어 지급받으며 사용기간이 끝난 후의 물건의 처분은 당사자간 약정으로 정하는 방식의 금 융업(일명 ‘리스’)을 말한다. 신기술사업금융업은 신기술사업에 대한 투자, 융자, 경영 및 기술의 지도, 신기술사업투자조합의 설립, 신기술사업투자조합자금의 관리ㆍ운용업무를 종합적으로 행하는 업종을 말한다.',
  },
  '역모기지론': {
    title: '역모기지론',
    content: '역모기지론(Reverse Mortgage Loan)은 주택을 소유하고 있으나 자체수입이 부족한 고 령자가 보유주택을 담보로 소유자 및 배우자의 사망 시까지 노후생활에 필요한 자금을 연 금 형태로 받아 안정된 주거생활을 확보하는 제도이다. 역모기지론을 활용하는 경우, 고 령자들은 보유주택의 유동화를 통해 현 주거지에서 일정 수준의 생활을 유지하고, 대출금 융기관은 고령자가 사망한 이후 동 담보주택을 처분하여 대출 원리금을 회수하게 된다. 역모기지론은 고령자가 자식이나 주위의 도움 없이 스스로 경제적 문제를 해결하는 방안 이 될 수 있다. 또한, 사회 전체적인 측면에서도 적은 규모의 재정 지원으로 고령층의 복 지문제를 해결할 수 있어 저비용·고효율의 예산 운용도 기대할 수 있다. 역모기지론은 주 택을 담보로 한 장기대출이라는 점에서 모기지론과 유사하다. 그러나 역모기지론은 고령 자의 생계비 조달이 목적이고, 모기지론은 주택구입이 목적이므로 대출목적, 이용자 등에 서 모기지론과 차이가 있다. 또한, 모기지론은 주택구입자가 대출금의 일정 부분을 매월 상환하므로 기간 경과에 따라 부채가 감소하고 주택의 순자산 가치는 증가하는 반면, 역 모기지는 매달 약정금액을 지급받으므로 기간 경과에 따라 부채가 증가하고 주택의 순자 산 가치는 감소하게 된다.',
  },
  '역선택': {
    title: '역선택',
    content: '역선택(Adverse Selection)이란 정보의 비대칭이 있을 때, 즉 거래의 당사자 중 정보가 한쪽에만 있는 상황에서, 정보가 없는 쪽은 바람직하지 못한 상대방과 거래할 가능성이 큰 것을 의미한다. 중고차 시장에서 상등품의 중고차가 사라지는 경우나, 생명보험 시장 에서 건강한 사람은 보험에 가입하지 않고 건강하지 않은 사람들만 생명보험에 가입하는 현상, 금융시장에서 신용도가 높은 대출자는 시장을 이용하지 않고 신용도가 낮은 대출자 만 남게 되는 사례 등이 있다. 이러한 역선택은 자원의 효율적 배분을 저해할 뿐만 아니라 시장을 위축시키는 심각한 문제를 발생시킬 수 있으므로 정보의 비대칭성을 없애고 적절 한 유인을 통하여 역선택을 완화할 필요가 있다.',
  },
  '역외금융': {
    title: '역외금융',
    content: '역외금융(Offshore Banking)이란 금융기관이 비거주자인 자금공여자로부터 외화자금을 조달하여 비거주자를 상대로 외화자금을 운용하는 일련의 금융을 말한다. 비거주자와 비 거주자 간의 자금중개만 포함하므로 비거주자와 거주자 간 또는 거주자와 거주자 간의 자 금중개는 이에 속하지 않는다. 우리나라의 역외금융제도는 국내금융시장에 영향을 주지 않으면서 외국환은행의 선진 금융기법 습득 등을 통한 대외경쟁력 제고를 도모하기 위해 1988년 1월에 도입되었으며, 외국환은행이 역외금융업무를 위해 역외계정을 설치하는 경우에는 이를 일반계정과 구분하여 회계 처리하도록 하고 있다. 또한 역외계정과 일반계 정 간의 자금이체는 직전 회계연도 중 역외자산 평잔의 10% 이내에서 가능하며 이를 초 과하는 경우에는 기획재정부 장관의 허가를 받도록 규정하고 있다.',
  },
  '역외펀드': {
    title: '역외펀드',
    content: '펀드는 근거 법률에 따라 역외펀드(Off-Shore Fund)와 역내펀드(On-Shore Fund)로 구 분되는데 역외펀드는 외국의 법률에 의하여 외국에서 설정, 설립된 것으로 외국펀드라고 도 한다. 역내펀드는 국내 법률에 의하여 국내에서 설정, 설립된 것으로 국내 자산에 주로 투자하는 국내투자펀드, 해외 자산에 주로 투자하는 해외투자펀드로 구분된다. 역외펀드 는 국외에서 설정되어 운용되므로 세금이나 규제 등에서 국내법의 적용을 받지 않지만, 해외펀드는 국내법의 적용을 받는다는 점에서 차이가 있다. 한편 역외펀드는 기업 및 금 융회사의 유가증권 매매차익에 대한 과세가 없거나 과세가 상대적으로 적은 지역, 또는 외국환관리가 엄격하지 않은 지역에 이름뿐인 회사(페이퍼 컴퍼니)를 설립하고, 실질적인 영업은 본토에서 행하는 경우가 일반적이다. 대서양 연안의 더블린, 유럽의 작은 도시국 가 룩셈부르크, 동남아의 홍콩, 싱가포르, 라부안, 아메리카 대륙 연안의 바하마, 버뮤다 제도, 케이먼군도 등이 주요 역외펀드의 거점 역할을 하고 있다.',
  },
  '역전세': {
    title: '역전세',
    content: '역전세란 현재의 전세가격이 계약 시 전세보증금보다 낮게 거래되는 것을 말한다. 예를 들어 임차인 A가 2년 전에 2억 원을 전세금으로 지불했는데, 계약이 만료된 시점에 전세 가격이 1억 5,000만 원으로 하락하여 새로운 임차인 B는 이 가격에 전세 계약을 맺었다 고 한다. 이때 집주인 C는 B에게 받은 전세보증금 1억 5,000만 원에 5,000만 원을 더해 A에게 2억 원을 돌려주어야 하는데 집주인이 전세가격 하락분 5,000만 원을 임차인 A에 게 돌려줄 수 없을 경우 역전세가 발생한다. 역전세는 주택 거래가 위축되어 전세가격이 떨어질 때 나타날 수 있는 현상이다. 역전세와 비슷한 개념으로 깡통전세가 있다. 깡통전 세는 집값이 전세 계약 시점의 전세보증금보다 낮아져 집주인이 집을 팔아도 전세보증금 을 돌려줄 수 없는 상태를 일컫는다. 만약 집주인이 주택담보 대출을 받은 상황이라면, 집 값이 대출금과 전세보증금을 합한 금액보다 낮은 수준에 거래될 때 깡통전세가 된다. 한 편 2022~2023년중 주택 매매 및 전세가격의 하락과 함께 빌라·다세대에서 발생한 대규 모 전세사기 등으로 인해 역전세 및 깡통전세에 대한 사회적 관심과 우려가 커진 바 있다. 이에 따라 정부는 전세사기피해자 지원을 위해 “전세사기피해자 지원 및 주거안정에 관한 특별법”을 제정하여 임차인의 법적 권리를 강화하고 전세사기 피해를 지원하는 제도를 마 련하여 시행 중에 있다.',
  },
  '연구개발(R&D)': {
    title: '연구개발(R&D)',
    content: '연구개발은 지식량(knowledge stock)을 증가시키기 위하여 체계적으로 수행되는 창조적 활동과 기존 지식을 사용하여 새로운 운영 방법을 고안하는 활동을 아우르는 개념이다. 기업, 대학, 정부 등의 경제 주체가 새로운 제품 또는 서비스 개발, 생산공정 혁신 등을 위 해 수행한다. 특히, 인공지능(AI), 바이오, 신에너지 등 첨단기술 분야에서 매우 중요하다. 연구개발 지출은 1년 이상의 기간 동안 생산과정에 반복적, 지속적으로 사용된다는 측면 에서 기계류와 같은 고정자산이며, 국민계정(SNA)에서 투자 지출로 처리된다. 또한 연구 개발 활동은 기업과 국가의 경쟁력 강화를 위한 핵심 요소로서 생산성 제고를 통해 장기 성장률을 끌어올리기 위해 중요하다. 한편, 우리나라는 삼성전자, 현대자동차, LG 등 민 간 기업의 왕성한 연구개발 활동으로 GDP 대비 R&D 투자 비율이 세계 최고 수준이다.',
  },
  '연방준비제도(FRS)/연방준비은행(FRB)': {
    title: '연방준비제도(FRS)/연방준비은행(FRB)',
    content: '연방준비제도(FRS; Federal Reserve System)는 1907년 금융공황 후 그 대책으로서 1913년에 제정된 연방준비법(Federal Reserve Act)에 의해서 창설된 미국 특유의 중앙 은행제도이다. 동 제도는 연방준비제도이사회(Board of Governors)와 연방공개시장위 원회(Federal Open Market Committee)를 정점으로 이들을 지원하는 본부와 12개 지 역 연방준비은행(FRB; Federal Reserve Bank)으로 구성되어 있다. 연방준비제도이사회 는 상원의 승인을 얻어 대통령이 임명하는 7인의 전임이사로 구성되며, 통화정책을 수립 하고 지역 연방준비은행을 통할하는 최고 의사결정기구이다. 연방공개시장위원회는 공개 시장운영정책을 수립·집행하는 기구이며, 연방준비은행에 대해서 지정한 공개시장운영 의 실시를 명할 수 있다. 한편, 지역 연방준비은행은 12개 지역의 중앙은행 역할을 하며, 금융기관 지급준비금관리, 재할인, 지급결제, 연방준비권의 발행, 가맹 주립은행에 대한 업무감독, 국고대리업무 등 연방준비제도의 일상적인 업무를 수행한다.',
  },
  '연쇄가중법': {
    title: '연쇄가중법',
    content: '현재 우리나라를 비롯한 주요 선진국의 실질GDP 추계에 이용하는 물량지수 작성방법이 다. 이 방법은 기준년의 고정된 금액이나 가중치를 비교년에 계속 사용하는 고정가중법 (fixed weighted method)에 의해 실질GDP를 추계하면 비교년이 기준년에서 멀어질수 록 실질GDP 통계가 왜곡될 가능성이 높아지는 문제점을 개선하기 위해 도입된 것으로 매년 실질GDP 추계시 전년도의 가격 또는 금액 가중치를 연쇄적으로 이용하기 때문에 연쇄가중법(Chain-Weighted Method)이라고 부른다. 연쇄가중법을 이용하여 실질GDP 를 추계하면 기준년이 매년 바뀌는 것과 같은 효과가 있어 산업 및 기술구조의 변화, 신상 품의 등장과 기존상품의 퇴장 등을 GDP에 즉시 반영할 수 있는 장점이 있다. 연쇄가중법 의 가장 큰 특징은 경제성장률(연환지수)을 당해 년의 경제상황과 관련성이 높은 전년도 의 가격 또는 명목금액 가중치를 기준으로 측정한다는 점이다. 한편 연쇄가중법은 고정가 중법에 비해 더 많은 자료가 필요하고 계산과정이 다소 복잡하며 총량금액과 그 구성항목 의 합간 가법성이 성립하지 않는다는 단점이 있다.',
  },
  '연지급수입': {
    title: '연지급수입',
    content: '수입대금의 전액 또는 일부를 물품 또는 선적서류 영수일로부터 일정 기간이 지난 후에 지급하는 조건의 수입을 말한다. 구매자는 영수한 수입물품을 매각하고 그 대금으로 수입 대금을 결제할 수 있으므로 물품대금지급에 대한 부담을 줄일 수 있다.',
  },
  '연차보고서': {
    title: '연차보고서',
    content: '연차보고서는 한국은행이 발간하는 법정 보고서이며 1년간의 경제 동향, 통화신용정책 운용 내용, 금융시장 안정 조치, 국제 협력 활동, 조사·연구 결과 등을 종합적으로 정리한 자료이다. 이는 한국은행법 제102조에 따라 매년 국회에 보고되며, 국민과 시장 참가자에 게 주요 경제 상황과 정책 방향을 투명하게 전달하는 주요 커뮤니케이션 수단 중 하나이다. 주요 내용으로는 ▲기준금리 결정과 경기 및 물가 흐름, ▲유동성 공급 및 금융안정 방안, ▲국내외 경제 환경 분석, ▲화폐 발행 및 지급결제제도 운영, ▲기후변화, 고령화 등 구조 적 이슈에 대한 연구 결과, ▲국제 금융기구와의 협력 내용 등이 포함된다. 연차보고서는 단순한 실적 보고서를 넘어, 통화당국의 경제 인식과 정책 철학을 담은 자료로 해석되며, 경제 연구자·정책 입안자·투자자에게 폭넓게 활용된다. 동 보고서는 한국은행 홈페이지 에 등록되어 누구나 열람할 수 있다.',
  },
  '영끌': {
    title: '영끌',
    content: '영끌 “영혼까지 끌어 모은다”의 줄임말로 주로 부동산이나 주식 등 자산을 매입하기 위해 개인이 보유한 자금과 대출 등을 통해 조달가능한 모든 자금을 총동원하여 투자하는 행위 를 말한다. 자기자본 외에도 신용대출, 전세자금대출, 마이너스통장, 카드론 등 가능한 모 든 금융수단을 활용하며 부모나 지인들로부터의 자금 차입도 포함된다. 이 용어는 2020 년대 초반 한국의 부동산 가격 급등기에 유행하면서 널리 알려졌다. 특히 청년층 사이에 서 “지금 사지 않으면 평생 집을 못 살 수 있다”는 불안심리가 퍼지면서 극단적인 금융 레 버리지 활용이 증가했다. 이러한 행동은 일시적으로 자산을 마련할 수 있지만 향후 금리 상승, 자산 가격 하락, 소득 감소 등의 위험에 매우 취약하다. 정부는 대출 규제 강화(예: DSR 규제)를 통해 차주의 상환능력에 기반한 대출 관행을 정착시키기 위한 노력을 기울 이고 있다. 영끌은 ‘빚투(빚내서 투자)’와 함께 동시대 개인투자자의 위험성 높은 투자 행 태를 대표하는 용어로 사용된다.',
  },
  '영업잉여': {
    title: '영업잉여',
    content: '한 나라 국민이 생산활동에 참여한 결과 발생한 소득은 노동, 자본, 경영 등의 생산요소를 제공한 경제주체에게 나누어진다. 이 중에서 노동을 제공한 대가로 피고용자에게 분배되 는 임금 및 급여 등을 피용자보수라고 하고, 생산과정에서 발생한 잉여소득인 자본에 대 한 몫을 영업잉여(Operating Surplus)라고 한다.',
  },
  '예금보험제도': {
    title: '예금보험제도',
    content: '예금보험은 금융기관의 예금지급정지, 파산 등으로 해당 금융기관이 기존 예금자의 예금 인출요구에 응할 수 없는 경우 예금보험기관이 당해 금융기관을 대신하여 예금을 지급함 으로써 예금자를 보호하고, 대규모 예금인출사태(뱅크런)를 방지하여 금융안정을 유지하 도록 하는 공적보험이다. 보험가입금융기관은 이러한 서비스의 대가로 일정한 보험료를 정기적으로 예금보험기관에 납부하여야 한다. 일반적으로 예금자를 보호하는 수단으로 금융기관 감독제도, 지급준비금제도 및 상호보장제도 등이 있으나 예금보험제도는 여타 감독 수단보다도 가장 직접적으로 예금자를 보호하는 수단으로서 금융제도의 안정성 유 지를 위해 다수 국가에서 시행하고 있다. 우리나라에서는 일부 금융업권에서 개별적으로 기금을 조성하여 예금보험제도를 운영하다가, 1996년 6월 ‘예금자 보호법’이 시행되면서 예금보험공사가 예금보험업무를 전담하고 있다. 예금보험의 적용대상기관은 은행, 투자 매매업자, 투자중개업자, 증권금융회사, 보험회사, 종합금융회사, 상호저축은행 및 상호 저축은행중앙회이며, 예금, 적금, 부금, 수입보험료 및 확정기여형퇴직연금 적립금 등을 적용대상예금으로 한다. 동일한 금융회사 내에서 예금자 1인이 보호받을 수 있는 한도(원 금과 소정의 이자 합산)는 예금보험공사 설립 당시 2,000만 원이었다. 이후 1997년 11월 에는 예금 전액으로 확대되기도 하였으나, 2001년 1월부터 5,000만 원으로 운용되었다 가 2025년 9월 1일부터 1억 원으로 상향되었다.',
  },
  '예금취급기관': {
    title: '예금취급기관',
    content: '예금취급기관이란 고객으로부터 예금을 수취하고 이를 기반으로 대출 등 금융중개 기능 을 수행하며, 통화창출 기능을 갖는 금융기관을 말한다. 일반적으로는 은행법에 따른 은 행(시중은행, 지방은행, 인터넷전문은행 등)과 비은행 예금취급기관(상호저축은행, 신용 협동조합, 새마을금고, 농·수·산림조합의 상호금융, 우체국예금계정 등)이 이에 해당한 다. 또한 산업은행, 중소기업은행, 농협은행, 수협은행 등 일부 특수은행도 예금취급기 관으로 분류된다. 다만, 예금취급기관의 범위는 정의의 목적에 따라 달라질 수 있다. 예 를 들어, 한국은행이 통화지표 등 거시경제 통계를 작성할 때는 금융자산의 중개 및 운용 기능을 기준으로 하여 한국은행(중앙은행), 한국수출입은행, 자산운용회사, 신탁회사 등 도 예금기관에 포함시키는 경우가 있다. 이는 예금 수취 여부보다는 금융시장에서의 자금 흐름과 통화창출에 기여하는 기능적 역할을 기준으로 한 분류이다. 반면, 실무적·소비자 중심의 정의에서는 일반 개인이나 기업이 예금을 맡기고 대출을 받을 수 있는 기관을 의 미하므로, 한국은행, 수출입은행, 자산운용회사, 신탁회사 등은 예금취급기관에서 제외된 다. 특히 한국은행은 중앙은행으로서 통화정책과 지급결제 시스템을 운영하지만 일반 고 객의 예금 수취 기능은 없으며, 수출입은행은 정책금융기관으로서 일반적인 예금 수취 기 능을 수행하지 않는다.',
  },
  '예금토큰': {
    title: '예금토큰',
    content: '예금토큰(Tokenized Deposit)은 은행이 예금을 기반으로 분산원장기술 등을 이용하여 발행하는 디지털화폐를 의미한다. 예금토큰은 예금에 의해 완전히 담보되며 보유자는 언 제든지 동일한 금액의 예금으로 교환할 수 있게 된다. 예금토큰은 지급결제의 효율성 제 고, 비용 절감 및 안정성 제고 등의 장점을 가지고 있다. 현재 예금토큰은 중앙은행과 대 형 금융기관들에 의해 시범 발행되면서 상용화를 위한 개발작업이 진행되고 있다.',
  },
  '예대금리차(예대마진)': {
    title: '예대금리차(예대마진)',
    content: '예대금리차(예대마진)는 자금중개기관인 은행이 자금차입자로부터 수취하는 대출금리와 예금자에게 지급하는 예금금리간의 격차로서 은행수익의 본질적 원천이 된다. 예대금리 차는 간단히 표현하면 대출금리(수입이자/대출금)에서 예금금리(지급이자/예수금)를 차 감한 것으로, 분석목적에 따라 신규취급액 또는 잔액을 기준으로 측정할 수 있다. 또한 이 와 유사한 개념인 순이자마진(net interest margin)은 예대업무 뿐만 아니라 유가증권투 자에서 얻는 수익과 비용까지 포함하는 광범위한 수익성지표로 총이자수익에서 총이자비 용을 차감한 금액을 이자부자산 총액으로 나눈 값을 말한다. 일반적으로 예대금리차는 예 금과 대출시장의 경쟁도가 낮을수록, 은행의 위험기피성향이 강할수록, 대출취급에 따른 한계비용이 클수록, 신용위험이 높을수록 확대되는 것으로 알려져 있다.',
  },
  '예대율': {
    title: '예대율',
    content: '예대율이란 예금을 대출의 재원으로 보고 원화예수금 가운데 원화대출금이 차지하는 비 율을 말한다. 금융당국은 양도성예금증서(CD), 은행채 등 시장성 수신을 기반으로 한 은 행들의 과도한 대출 경쟁을 억제하기 위해 2012년 7월부터 예대율을 100% 이하로 관리 하도록 규제하고 있다. 이에 따라 원화예수금 산정시 CD는 원칙적으로 제외된다. 다만, 2020년 이후에는 원화예수금의 최대 1%까지 시장성 CD 발행잔액을 포함하는 것으로 규 제가 개편되었다. 한편, 원화대출금 규모 산정 시에는 정책자금대출은 제외되고 기업부문 에 자금을 원활하게 공급할 수 있도록 차주별로 상이한 가중치가 적용되는데, 가계대출은 115%, 기업대출(개인사업자대출 제외)은 85%의 가중치가 각각 적용된다.',
  },
  '예상손실': {
    title: '예상손실',
    content: '예상손실은 현재 시점부터 일정 기간 동안 발생할 것으로 예상되는 손실의 평균금액을 의 미하며 일반적으로 자산별로 발생 가능한 손실액에 발생 확률을 곱하여 산출한다. 예상손 실은 ‘부도 시 익스포저(EAD; Exposure at Default) × 예상 부도율(PD; Probability of Default) × 부도 시 손실률(LGD; Loss Given Default)’ 산식을 이용해 산출된다.',
  },
  '예약자금이체제도': {
    title: '예약자금이체제도',
    content: '실시간 총액결제시스템에서는 금융기관의 자금이체 지급지시가 접수되는 즉시 처리되는 것을 원칙으로 하나, 미래의 특정시점에서 자금결제가 이루어지도록 시스템이 금융기관 으로부터 미리 자금이체신청을 받아 두었다가 결제시점이 도래하면 자동으로 결제하도 록 하는 제도를 예약자금이체제도라 한다. 한은금융망에서는 두 가지 종류의 예약자금이 체제도를 운영하고 있다. 하나는 지정시점에 금융기관 간 차액결제가 원활히 이루어질 수 있도록 결제자금이 부족한 금융기관이 다른 금융기관으로부터 자금을 차액결제시점에서 수취할 수 있는 지정시점 예약자금이체제도이고, 다른 하나는 금융기관이 지정하는 특정 시점에 자금을 이체하는 일반 예약자금이체제도이다.',
  },
  '오픈뱅킹': {
    title: '오픈뱅킹',
    content: '오픈뱅킹(Open Banking)이란 금융기관이 보유한 고객의 금융 데이터를 고객의 동의를 받아 API(Application Programming Interface)를 통해 제3자 금융 서비스 제공자에게 개방하고 이를 기반으로 고객이 다양한 금융 서비스를 더욱 편리하게 이용할 수 있도록 허용하는 제도이다. 오픈뱅킹이 이루어질 경우 고객은 하나의 앱을 통해서 오픈뱅킹에 참 여하는 모든 금융기관의 금융서비스를 통합하여 누릴 수 있어 고객의 편의성이 크게 제고 된다. 우리나라의 경우 금융결제망 개방을 통한 금융혁신 촉진과 고객 서비스 제고를 도 모하기 위해 2019년 12월 개인 고객을 대상으로 도입되었으며 2025년 1월에는 오픈뱅 킹 이용자 범위를 법인까지 확대하였다.',
  },
  '옵션': {
    title: '옵션',
    content: '옵션(Option)이란 거래당사자들이 미리 정한 가격(행사가격, strike price)으로 장래의 특정시점 또는 그 이전에 일정자산을 팔거나 살 수 있는 권리를 매매하는 계약을 말한다. 선도 및 선물, 스왑거래 등과 함께 대표적인 파생금융상품의 하나이다. 옵션은 매입권리 가 부여되는 콜옵션(call option)과 매도권리가 부여되는 풋옵션(put option)으로 나누 어진다. 옵션거래를 통하여 매입 또는 매도할 수 있는 권리를 보유하게 되는 옵션매입자 는 시장가격의 변동 상황에 따라 자기에게 유리한 경우 옵션을 행사하며 불리한 경우에 는 포기할 수 있게 된다. 옵션매입자는 이와 같은 선택권에 대한 대가로 거래상대방인 옵 션매도자에게 프리미엄을 지급하며 반대로 옵션매도자는 프리미엄을 받는 대신 옵션매 입자의 옵션 행사에 따라 발생하는 자신의 의무를 이행할 책임을 부담한다. 옵션거래의 손익은 행사가격, 현재가격 및 프리미엄에 의해 결정된다. 한편 옵션의 가격이 어떻게 결 정되는가에 대해서는 1973년에 블랙과 숄즈가 개발하여 미국 시카고 대학의 Journal of Political Economy에 발표한 블랙-숄즈 모형(Black-Scholes model)이 선구적으로 매 우 중요한 역할을 수행하였다. 동 모델은 옵션의 가격이 변동성, 행사가격, 만기, 무위험 자산 금리 등 입수하기 쉬운 데이터로부터 합리적으로 산출되는 옵션가격이론으로서 이 후의 각종 파생금융상품 가격결정의 기본적인 모형으로 널리 활용되어 왔다.',
  },
  '와타나베 부인': {
    title: '와타나베 부인',
    content: '일본에서 낮은 금리로 엔화를 빌려 외화로 환전한 뒤 해외의 고금리 자산에 투자(일종의 yen carry trade)하는 일본의 중·상류층 주부 투자자들을 ‘와타나베(Watanabe)부인’이 라고 하는데 일본의 개인 외환투자자들을 통칭하는 용어로 확장하여 사용하기도 한다. 이들은 일본의 장기불황(1991~2002년)과 저금리를 배경으로 2000년 무렵부터 등장하 였다. 가정의 재정을 담당하는 일본 주부들은 낮은 저축이자에 실망하여 해외로 투자 기 회를 찾아 엄청난 규모의 국제금융거래를 일으키며 외환시장을 좌지우지하는 세력으로 까지 성장하면서 글로벌 외환시장의 큰 손으로 통하기 시작하였다. 이들이 주로 사용하 는 투자방식은 개인외환거래, 즉 FX(Foreign Exchange) 마진거래이다. 동 거래는 일정 액의 증거금을 국내 선물회사나 중개업체에 맡겨두고 특정 해외통화의 변동성을 예측하 여 두 종류의 통화를 동시에 사고파는 방식의 외환선물거래인데, 흔히 가치가 오를 것으 로 예상되는 달러를 사는 동시에 가치가 떨어질 것으로 보이는 엔화를 매도하는 방식으 로 이루어졌다.',
  },
  '완충자본': {
    title: '완충자본',
    content: '완충자본(Buffer Capital)은 금융위기 시 은행이 손실을 흡수하거나 신용공급 기능을 지 속(경기순응성 증폭을 억제)하면서도 최소 규제자본비율 수준 이상으로 자본비율을 유지 하기에 충분한 자본량을 의미하며, 바젤Ⅲ 규제개혁 시 도입한 것으로 최소 자기자본에 더하여 보통주자본으로 추가 적립하도록 요구하는 제도이다. 완충자본은 최소 자기자본 비율에 대한 보완장치로서 이를 위반 시에는 적립비율을 충족할 때까지 이익배분(배당, 자사주 매입, 성과연동형 상여금 등)이 제한된다. 우리나라는 완충자본으로서 ① 손실흡수 능력제고를 위한 자본보전완충자본(Capital Conservation Buffer, CCoB) ② 신용공급 에 따른 경기순응성 완화를 위한 경기대응완충자본(Counter-Cyclical Buffer, CCyB)을 운용하고 있다. 자본보전완충자본은 위기시 손실 발생에 대비하기 위한 것으로 은행은 평 상시 위험가중자산의 2.5%만큼을 추가 적립하여야 한다. 경기대응완충자본은 금융시스 템 상황에 따라 완충자본을 탄력적으로 조정하는 정책수단으로 리스크가 완화되는 시기 에는 경기대응완충자본을 적립하도록 하고 리스크가 확대되거나 금융불안이 발생하여 신 용공급 축소가 우려되는 시기에는 은행들이 경기대응완충자본을 활용할 수 있도록 완충 자본 부과 수준을 하향 조정한다. 우리나라는 2024년 5월부터 1%의 추가적립을 의무화 하고 있다.',
  },
  '외국환거래법': {
    title: '외국환거래법',
    content: '우리나라는 경제개발 초기에 외화자금이 크게 부족하였고 이에 대응해 국가 차원에서 외 화자금을 효율적으로 조달·운용하기 위해 기업 등의 외환거래를 매우 엄격하게 규제하는 「외국환관리법」을 시행하였다. 그러나 1997년 외환위기 이후 IMF의 권고를 수용하여 민 간부문의 경상거래 및 자본거래를 전면적으로 자유화하고 국가경제 측면에서 필요한 최 소한의 사항만을 제한하는 「외국환거래법」을 도입하였다. 외국환관리법이 외환거래 및 대외거래의 합리적 조정 또는 관리에 초점을 두었던 반면 외국환거래법은 외환거래 및 대 외거래의 자유를 보장하고 시장기능을 활성화함으로써 대외거래의 원활화, 국제수지의 균형 및 통화가치의 대외적 안정을 도모하는 데 치중하였다. 이후 2001년에 제1차 제2단 계 조치를 실시하여 개인의 외환거래를 자유화하였으며, 2006년에는 제2차 외환자유화 조치를 시행하여 자본거래 허가제를 폐지하고 신고제로 전환하였다. 한편 글로벌 금융 위기 이후 외환시장의 안정과 외화유출의 급격한 변동성을 완화하기 위하여 외환건전성 감독 강화 방안 시행, 외환건전성부담금제도 시행 등 유사시 시장안정장치를 마련하여 시 행하고 있다.',
  },
  '외국환업무취급기관/외국환은행': {
    title: '외국환업무취급기관/외국환은행',
    content: '외국환업무를 업으로 영위하기 위하여 재무건전성, 외환업무시설 및 전문인력을 갖추어 기획재정부장관에게 등록한 금융기관을 “외국환업무취급기관”이라고 한다. 동 기관은 재 무건전성과 관련해 금융위원회가 정하는 기준에 비추어 자본규모와 재무구조가 적정해야 하며, 외환업무시설과 관련하여 외환정보집중기관과 전산망이 연결되어 있고 외환 업무 및 그에 따른 사후관리를 원활하게 할 수 있는 전산설비를 갖추어야 한다. 또한 전문인력 과 관련하여서는 2년 이상 외환 업무에 종사한 경력자 또는 기획재정부장관이 정하는 교 육을 이수한 자를 영업소별로 2인 이상 확보하여야 한다. 한편 외국환업무취급기관인 금 융기관 중 은행법에 의한 금융기관, 농·수협은행, 한국산업은행, 한국수출입은행, 중소기 업은행의 국내영업소를 “외국환은행”이라고 한다. 외국환업무취급기관은 그 금융기관의 업무와 직접 관련되는 범위에서 외국환 업무를 할 수 있기 때문에 외국환업무취급기관이 라 하더라도 금융기관 종류별로 외국환 업무 취급 범위가 다른데, 외국환은행은 외국환거 래법상의 외국환 업무를 대부분 취급할 수 있다.',
  },
  '외국환중개회사': {
    title: '외국환중개회사',
    content: '외국환중개회사는 외국통화의 매매·교환·대여의 중개, 외국통화를 기초자산으로 하는 파 생상품거래의 중개 또는 이와 관련된 업무를 영위하는 자를 말한다. 현재 외국환중개업무 를 인가받은 기관으로는 서울외국환중개, 한국자금중개, KIDB자금중개, IPS외국환중개, Tullett Prebon 등이 있다. 외국환중개업무를 영위하려면 자본·시설 및 전문인력에 관한 증빙서류 등을 기획재정부장관에게 제출하여 인가를 받아야 한다. 인가요건으로는 40억 원 이상의 납입자본금, 외국환중개업무 및 이에 관한 보고 등을 수행할 수 있는 전산시설, 업무수행에 필요한 2명 이상의 전문인력을 갖추어야 한다. 외국환중개회사는 외환시장에 서 하루 동안 거래된 외환의 거래량과 가격을 합산해서 가중평균한 시세인 시장평균환율 을 다음 날 오전에 매매기준율로 고시하는데, 외국환은행들은 이 매매기준율을 참고하여 여기에 수수료 등을 적용해 각각의 은행별 매매기준율을 결정한다. 이처럼 외국환중개회 사는 우리나라 외환시스템에서 중요한 역할을 수행하고 있다.',
  },
  '외국환평형기금': {
    title: '외국환평형기금',
    content: '자국 통화가치의 안정을 도모하고 투기적인 외화 유출입에 따른 외환시장의 혼란을 방지 할 목적으로 정부가 외환시장에 개입하는 데 사용하기 위하여 조성한 기금을 말한다. 대 다수 국가에서 유사한 형태로 동 기금을 설치·운용하고 있는데 미국에서는 Exchange Stabilization Fund, 영국에서는 Exchange Equalization Fund라고 부르며 우리나라에 서는 외국환평형기금(Exchange Equalization Fund)이라고 부르고 있다. 우리나라의 외 국환평형기금은 외화기금계정과 원화기금계정으로 구분되어 한국은행에 설치되어 있다. 한편 외국환평형기금의 소요자금은 주로 공공자금관리기금으로부터의 예수금, 외화표시 외국환평형기금채권 발행을 통하여 조달한다. 자금의 운용은 주로 한국은행에의 예치, 한 국투자공사(KIC)에 대한 위탁의 형태로 이루어지고 있다.',
  },
  '외국환포지션': {
    title: '외국환포지션',
    content: '외국환포지션은 일정 시점에 외국환은행 및 기업 등이 보유하고 있는 외화표시자산과 부채의 차액으로서 거래 주체가 환리스크에 노출된 정도를 나타낸다. 외국환포지션에 서 외화자산이 외화부채를 초과하는 상황을 매입초과포지션(over-bought position 또 는 long position), 외화부채가 외화자산을 초과하는 상황을 매도초과포지션(over-sold position 또는 short position), 그리고 외화자산과 외화부채가 균형을 이루는 상황을 스 퀘어포지션(square position)이라 한다. 한편 외국환포지션은 포지션 산정에 있어 포함 되는 자산의 범위에 따라 현물환포지션(현물자산-현물부채), 선물환포지션(선물자산-선 물부채), 그리고 현물환포지션과 선물환포지션을 합산한 종합포지션으로 구분되고 있다. 외환당국은 개별 은행의 건전한 경영을 유도하고 과도한 외국환포지션 구축으로 인한 외 환시장 교란을 방지하기 위하여 각 외국환은행별 외국환포지션 한도를 설정, 관리하고 있다.',
  },
  '외국환포지션한도': {
    title: '외국환포지션한도',
    content: '외국환은행의 외화자산과 외화부채가 일치하지 않을 경우 환율변동 위험에 노출되어 이 에 따른 손익이 발생한다. 예를 들면 외국환은행이 달러매입초과포지션인 상황에서 환율 이 상승하면 이익을 보게 되나 환율이 하락하면 손실을 입게 된다. 반대로 매도초과 포지 션일 경우 환율상승 시 손실을, 환율하락 시 이익을 보게 된다. 한 외국환은행의 과도한 외국환포지션은 외환시장내 교란요인으로 작용할 수 있다. 이에 따라 우리나라는 외국환 은행의 건전 경영을 유도하고 외환시장 교란을 사전에 방지하기 위하여 외환매입초과포 지션 또는 외환매도초과포지션의 한도를 설정하는 외국환포지션관리제도를 운영하고 있 다. 종합포지션과 선물환포지션에 대해 관리하고 있는데, 2025년 6월 말 현재 종합포지 션한도는 전월 말 자기자본의 50%, 선물환포지션한도는 국내은행의 경우 전월 말 자기자 본의 75%, 외은지점은 전월 말 자기자본의 375% 이내이다.',
  },
  '외부자금': {
    title: '외부자금',
    content: '기업은 투자나 운영자금을 기업내부 또는 기업외부에서 조달하는데 금융기관 차입금, 사 채발행 등 기업외부에서 조달된 자금을 외부자금이라 한다. 외부자금은 내부유보나 감가 상각충당금 등과 같은 내부자금과는 달리 자금의 이용가능 기간의 면에서 제약을 받으며, 자금조달에도 절차나 경비가 필요한 불리한 점도 있다. 반면, 자본시장의 상황에 따라 조 달의 곤란도는 다르나 내부자금에서와 같은 자금량의 절대금액의 한계는 없으며, 또 여러 종류의 조달가능성과 조달조건이 있어 적기에 이용할 수 있다는 이점이 있다. 따라서 기 업은 자금수요의 상태에 따라 외부자금을 적절히 조달하여, 기업의 재무적 안전성을 유지 하도록 하는 것이 중요하다. 통상 기업들의 고정투자 규모가 커질수록 외부자금 수요가 커지면서 내부자금보다 외부자금 조달 비중이 상대적으로 높아지는 경향을 보인다.',
  },
  '외부효과': {
    title: '외부효과',
    content: '어떤 경제주체의 행위가 본인의 의도와는 관계없이 다른 경제주체에게 의도하지 않은 혜 택이나 손해를 발생시키지만 그 영향에 대한 보상이 이루어지지 않는 현상을 말한다. 외 부효과(Externality)는 긍정적인 효과와 부정적인 효과로 구분된다. 부정적 외부효과 (negative externality)는 자동차의 배기가스나 소음, 공장의 매연이나 폐수 등과 같이 제 3자의 경제적 후생수준을 낮추는 외부효과로 외부불경제(external diseconomy)라고 도 한다. 반면 교육에 따른 편익, 신기술의 개발에 따른 파급효과 등과 같이 제3자에게 이 득을 주는 외부효과를 긍정적 외부효과(positive externality) 또는 외부경제(external economy)라고 한다. 외부효과가 생기면 이에 대한 대가나 비용을 시장에서 지불하지 않 아도 되기 때문에 해로운 외부효과를 만들어 내는 개인이나 기업은 굳이 외부효과를 줄이 려 하지 않게 되며, 이로운 외부효과를 만들어내는 개인이나 기업도 굳이 외부효과를 많 이 만들어 낼 필요성을 느끼지 못하게 돼 외부효과를 시장에만 맡겨놓을 경우 전체적인 자원배분이 비효율적으로 될 수 있다.',
  },
  '외채/대외채권': {
    title: '외채/대외채권',
    content: '국제통화기금(IMF)의 “외채통계 작성 및 이용 지침”에 따르면 외채(External Debt)는 “한 나라의 거주자가 비거주자에게 미래 특정 시점에 원금이나 이자 또는 원금 및 이자를 지 급해야 하는 우발적이 아닌, 현재 확정된 채무의 잔액”으로 정의하고 있다. 외채와 상대 되는 개념인 대외채권은 일정 시점에서 거주자가 비거주자로부터 미래 특정 시점에 원 금 또는 이자를 회수하게 될 확정채권 잔액을 말한다. 그러므로 외채 및 대외채권에는 국제투자대조표(IIP)에 포함되는 주식, 펀드지분 등 지분성 대외금융자산과 부채가 포 함되지 않는다. 왜냐하면 지분이란 모든 채권자가 청구권을 행사한 후의 잔여가치에 대 한 청구권을 의미하는 것으로 확정 채무가 아니기 때문이다. 외채와 대외채권은 한 나라 의 거주자가 비거주자에게 장래에 상환(회수)해야 할 채무(채권)의 잔액과 구성을 보여 준다. 이에 따라 채무국과 채권국의 정책담당자는 물론 국제금융기구, 국제신용평가회 사, 국제상업은행 등의 경제 분석가들도 특정 국가의 외채 및 대외채권 통계를 대외 상환 부담 정도와 신용도를 평가하고 유동성 위험 등 각종 리스크를 분석하는 데 기초자료로 활용하고 있다.',
  },
  '외화자금시장': {
    title: '외화자금시장',
    content: '외환시장이 이종통화 간 매매가 수반되고 환율이 매개변수가 되는 시장을 의미하는 반면 외화자금시장은 금리를 매개변수로 하여 외환의 대출과 차입이 이루어지는 시장을 말한 다. 대표적인 외화자금시장으로는 스왑(외환스왑 및 통화스왑)시장이 있는데 스왑거래의 경우 외환의 매매 형식을 취하고 있으나 실질적으로는 금리를 매개로 하여 여유통화를 담 보로 필요통화를 차입한다는 점에서 대차거래라고 볼 수 있다. 이외에도 은행 간에 초단 기로 외화의 차입 및 대여가 이루어지는 외화콜시장과 1년물 이내의 기간물 대차거래가 이루어지는 단기대차시장 등이 외화자금시장의 범주에 속한다. 은행 간 외화예치거래도 넓은 의미에서 외화자금시장으로 볼 수 있으나 런던이나 싱가포르와 같은 국제중심지와 달리 우리나라는 외화예치거래가 활발하지 않은 편이다. 한편 외화자금시장도 넓은 의미 에서는 외환시장에 포함되는 것으로 볼 수 있다.',

  '외환건전성부담금제도': {

    content: '동아시아 외환위기, 글로벌 금융위기 등 우리나라가 겪었던 금융위기는 호황기에는 자본 이 과도하게 유입되고 불황기에는 급격히 유출되는 자본유출입의 변동성에 주로 기인하 였다. 이에 따라 정부와 한국은행은 금융·외환위기의 재발을 방지하기 위하여 과도한 자 본유출입의 변동성을 제어하는 한편 우리 경제의 거시건전성을 제고하기 위한 방안으로 외환부문 거시건전성정책 수단을 도입하게 되었는데, 이의 일환으로 2011년 8월에 외환 건전성부담금제도를 도입·시행하였다. 외환건전성부담금제도는 과도한 외화차입을 억제 하고 외채구조의 장기화를 유도하기 위하여 은행의 비예금성외화부채(=전체외화부채-외 화예수금-경과성자금 등)를 대상으로 계약 만기별로 0.02∼0.2%의 부담금을 부과하였 으며 적립된 부담금은 외국환평형기금에 귀속되어 위기 시 금융기관에 대한 외화유동성 지원에 활용되도록 하고 있다. 2015년 7월 금융업권 간 형평성을 제고하고 부과체계를 단순화하기 위하여 외환건전성부담금의 부과대상 및 부과요율 체계를 중심으로 제도를 개편하였으며, 현재는 만기 1년 이내의 비예금성외화부채에 대해 0.1%의 부담금을 부과 하고 있다.',

  '외환결제리스크': {
    title: '외환결제리스크',
    content: '외환결제과정에 내재된 리스크로 국가간 또는 복수통화 간에 이루어지는 외환결제의 특 성상 환율, 시차, 국가간 상이한 자금이체시스템 및 법률체계 등 여러 요인에 의해 발생한 다. 외환결제리스크의 여러 형태 중 가장 대표적인 것은 원금리스크로서 외환거래 후 매 도통화를 지급하였으나 거래상대방이 파산하여 매입통화를 수취하지 못할 위험이 있다. 또한 매도통화의 지급 이전이라도 거래상대방이 결제를 불이행할 경우 다른 거래상대방 과 불리한 조건으로 새로운 거래를 체결해야 하는 대체비용리스크가 내재되어 있으며, 거 래상대방이 파산하지 않더라도 일정기간 동안 채무를 결제하지 못하는 경우 수취예정통 화에 대한 유동성리스크에 직면할 수 있다.',

  '외환동시결제(PVP)': {
    title: '외환동시결제(PVP)',
    content: '외환동시결제(PVP; Payment versus Payment)는 외환결제과정에서 국가간 결제시간대 의 차이로 인하여 발생하는 외환결제리스크를 최소화하기 위하여 외환거래에 따른 수취 통화와 지급통화를 동시에 주고 받는 결제방식으로서 대표적으로 CLS은행이 이러한 방 식의 외환결제서비스를 제공하고 있다. 외환동시결제방식은 매수통화의 수취가 보장되는 경우에만 매도통화를 지급하기 때문에 거래당사자 일방이 파산 등의 이유로 매도통화를 지급하지 못했을 경우에는 매입통화의 지급도 일어나지 않아 외환결제리스크를 감축할 수 있다.',

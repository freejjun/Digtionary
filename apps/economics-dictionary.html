  '한국은행': {
    title: '한국은행',
    content: '우리나라의 중앙은행인 한국은행은 1950년 6월 12일 「한국은행법」에 의하여 설립되었 다. 한 나라의 중앙은행이 수행하는 통화정책에는 경제발전 과정에서 나타나는 시대적 과 제가 반영되는 게 보통이다. 한국은행은 설립 이래 1950년대 전란극복과 금융체계 정비, 1960~70년대 공업화와 성장통화 공급, 1980~90년대의 물가안정 기반구축과 금융자유화, 2000년대의 경제의 글로벌화와 금융위기 극복 등 시대가 요구하는 중앙은행의 기능과 역할 을 충실히 수행해 왔다. 그동안 여러 차례의 「한국은행법」 개정으로 제도가 정비되어 왔는 데 2011년 제8차 개정으로 한국은행의 목적 조항에 물가안정과 함께 금융안정 책무가 명시 되었다. 현행 「한국은행법」은 한국은행의 설립목적을 효율적인 통화신용정책의 수립 및 집 행을 통해 물가안정을 도모하고 이 과정에서 금융안정에도 유의하는 것으로 규정하고 있다.',
  },
  '한시적 근로자': {
    title: '한시적 근로자',
    content: '근로기간이 정해져 있지 않는 상시 근로자와 달리 근로 기간이 정해져 있는 계약직, 일용 직 등을 비정규직 근로자라 한다. 이에는 한시적 근로자, 시간제 근로자 및 비전형근로자 가 있다. 한시적 근로자란 근로계약 기간을 정한 근로자(기간제 근로자) 또는 따로 정하지 않았으나 계약의 반복 갱신으로 계속 일할 수 있는 근로자와 비자발적 사유로 계속 근무 를 기대할 수 없는 근로자(비기간제 근로자)를 말한다. 여기서 기간제 근로자는 일정 기간 의 근로계약 기간을 정하여(구두 또는 묵시적 약속이나 계약을 포함하여) 근로를 제공하 는 근로자를 말하며 계약 기간의 장·단, 계약 반복 갱신 여부, 계약직·촉탁직·임시직·계 절근로자 등 명칭과는 관계가 없다. 시간제 근로자란 직장에서 근무하도록 정해진 소정의 근로 시간이 동일 사업장에서 동일 종류의 업무를 수행하는 근로자의 소정의 근로시간보 다 1시간이라도 짧은 근로자로 평소 1주에 36시간미만 일하기로 정해져 있는 경우가 여 기에 해당된다. 한편 비전형근로자는 파견근로자, 용역근로자, 가정내 근로자, 일일(단기) 근로자 등을 말한다. 참고로 임시근로자는 임금근로자로서 고용계약 기간이 1개월 이상 1년 미만인 경우, 고용계약 미설정자는 일정한 사업(완료 기간이 1년 미만)의 필요에 의해 고용된 경우를 말한다.',
  },
  '한은금융망(BOK-Wire+)': {
    title: '한은금융망(BOK-Wire+)',
    content: '한국은행이 금융기관간 자금결제를 위하여 1994년 12월부터 가동 운영하고 있는 거액지 급시스템으로 금융기관의 콜거래, 외환 및 증권매매 등에 따른 원화자금 이체는 대부분 한은금융망을 이용하여 한국은행에 개설된 당좌예금을 이용해 계좌이체하는 방식으로 처 리한다. 한은금융망은 금융기관간 원화자금 이체 이외에 한국은행 대출금 지원 및 상환, 국고금 수납 등 한국은행과 금융기관간 자금이체를 처리하고 어음교환시스템, 지로시스 템 등 소액지급시스템의 은행간 채권·채무 결제에도 이용된다. 한은금융망은 실시간총액 결제방식에 다자간 동시처리결제(차액결제) 요소를 추가한 혼합형결제방식으로 운영되 고 있어 결제과정에서 신용리스크를 제거하는 동시에 일중 결제유동성도 절약할 수 있다. 이밖에 결제유동성을 효율적으로 관리하기 위하여 대기관리제도, 일중당좌대출제도 및 일중RP제도, 반일물콜거래제도 등을 운영하고 있다. 2024년 12월말 현재 20개 국내은행 을 포함하여 32개 외국은행 국내지점, 84개 비은행금융기관 등 총 136개 기관이 한은금 융망에 참가하고 있다.',
  },
  '할당관세제도': {
    title: '할당관세제도',
    content: '특정물품의 수입이 정부가 정한 일정수량에 이를 때까지는 저율의 관세가 부과되나 일정 량을 초과하면 그 이후에는 고율의 관세가 부과되는 제도를 할당관세제도라고 하며 이때 부과되는 고율 또는 저율의 관세를 할당관세라 한다. 할당관세제도는 특정물품의 국내총 생산량이 총수요량에 미치지 못하는 상황에서 수입을 억제하려는 국내 생산자 측의 요구 와 그 물품을 싼값으로 구매하려는 수요자 측의 상반된 요구를 동시에 충족시키기 위한 수 단으로 사용된다. 이 제도는 자유무역의 확대를 위해서는 바람직하지 않으나 국내산업보 호를 위해서는 필요하다는 점에서 WTO에서도 무차별 적용을 조건으로 인정해 주고 있다.',
  },
  '합계출산율': {
    title: '합계출산율',
    content: '한 여성이 가임기간인 15세에서 49세 사이에 낳을 것으로 기대되는 평균 출생아 수를 측 정하는 통계를 말하는데, 실제로는 5년 단위 간격으로 구분한 연령대별 출산율을 계산한 후 이를 합한 개념이기 때문에 합계출산율(Total Fertility Rate)이라고 부른다. 동 지표는 한 국가의 출산력 비교에 유용하게 쓰이고 있으며, 향후 인구는 물론 노동력의 변동을 가 늠하는 데 매우 유용한 지표로 활용되고 있다. 유럽경제위원회(UNECE)는 선진국에서 현 재의 인구를 그대로 유지하는 데 필요한 합계출산율이 최소 2.1명이어야 한다고 추산한 바 있다. 우리나라의 합계출산율은 1982년 2.39명을 정점으로 1983년 2.03명으로 낮아 진 이후 계속 떨어져 2023년에는 0.72명의 매우 낮은 수준을 기록하였다. 앞으로도 합계 출산율 수준이 현 수준보다 크게 높아지지 않는 한 우리나라 인구가 2030년 이후에는 빠 르게 감소할 것으로 예상되고 있다.',
  },
  '해외외국환업무취급기관(RFI)': {
    title: '해외외국환업무취급기관(RFI)',
    content: '해외외국환업무취급기관(RFI; Registered Foreign Institution)이란 외국환 거래법 등 관 련 법령에서 정한 요건을 충족해 외환당국에 등록한 해외 소재 외국 금융회사를 말한다. 기존에 외국계 은행이 국내 외환시장에 참여하기 위해서는 국내에 지점을 두거나 국내 금 융기관의 고객이어야만 국내 외환시장에 참여할 수 있었으나 RFI 제도로 인해 해외에 소 재하고 있는 외국 금융회사도 직접 참여가 가능해졌다. RFI는 국내 외국환중개회사를 통 해 국내 금융기관 및 비거주자 고객과 현물환(FX Spot), 외환스왑(FX Swap) 거래가 가능 하며 RFI를 통한 다국적 기업의 수출입대금 환전, 본·지점 근로자의 급여 송금 등 실수요 거래도 가능해졌다. 이 제도는 2024년 1월부터 시범운영을 하고 2024년 7월부터 정식으 로 시행되었으며, 외국 금융기관의 국내 외환시장 접근성을 크게 개선하여 한국 시장의 매력도를 높이는 데 기여했다는 평가를 받고 있다. 2025년 9월 10일 기준으로 총 64개의 RFI가 등록되어 있다.',
  },
  '헤지펀드': {
    title: '헤지펀드',
    content: '개인 및 연기금, 보험사 등 기관투자자를 대상으로 모집한 자금을 고수익 또는 위험회피 등을 목적으로 국제증권시장이나 국제외환시장에 투자하는 사적투자조합 또는 투자계 약을 말한다. 헤지란 본래 위험을 회피, 분산시킨다는 의미이지만 헤지펀드는 위험회피 보다는 투기적인 성격이 더 강하다. 뮤추얼펀드가 다수의 소액투자자를 대상으로 공개모 집하는 펀드인 데 반해, 헤지펀드는 소수의 고액투자자를 대상으로 하는 사모 투자자본 이다. 또한 뮤추얼펀드가 주식, 채권 등 비교적 안전성이 높은 상품에 투자하는 데 반해 헤지펀드는 주식, 채권뿐 아니라 파생상품 등 고위험, 고수익을 낼 수 있는 상품에도 적 극적으로 투자를 한다. 주로 100명 미만의 투자자들로부터 개별적으로 자금을 모아 파 트너 쉽(partnership)을 결성한 뒤, 카리브 해의 버뮤다와 같은 조세회피지역에 위장 거 점을 설치해 자금을 운영한다. 1백만·5백만 달러의 거액을 최소단위로 해 개인과 금융 기관으로부터 자금을 모집하고 모집한 원금의 몇 배에 달하는 자금을 차입하여 선물이 나 옵션 등 파생상품에 투자함으로써 투자 규모를 몇십 배로 키우는 것이 특징이다. 현재 국제금융시장에서 활동 중인 헤지펀드는 10,000여 개로 추산되며 자산규모는 십조 달러 이상에 이르는 것으로 추정된다.',
  },
  '현금자동인출기(CD)공동망': {
    title: '현금자동인출기(CD)공동망',
    content: '현금자동인출기(CD)공동망은 금융공동망 중계센터인 금융결제원과 금융기관들의 전산 시스템을 상호 연결하여 특정 금융기관 고객이 다른 금융기관의 CD 또는 ATM을 이용하 여 현금인출, 계좌이체, 잔액조회 등의 서비스를 받을 수 있도록 구축된 시스템으로 1988 년 7월 가동되었다. CD공동망의 가동으로 금융서비스의 장소적 제약이 제거되어 이용고 객은 현금카드만으로 모든 참가기관의 CD/ATM을 이용하여 손쉽게 현금인출 등 각종 서 비스를 이용할 수 있게 되었으며, 금융기관의 무인점포영업이 조기에 도입되는 계기가 마 련되었다. CD공동망을 통하여 취급 가능한 업무는 현금인출, 신용카드 현금서비스, 계좌 이체, 잔액조회, 지로대금 납부 등이며 이용대상 예금으로는 보통예금, 저축예금, 가계당 좌예금, 기업자유예금, 신탁예금, 투자자예탁금 등이 있다.',
  },
  '현시비교우위지수(RCA)': {
    title: '현시비교우위지수(RCA)',
    content: '현시비교우위지수(RCA; Revealed Comparative Advantage Index)는 한 국가가 어 떤 특정 품목에서 국제무역상 상대적으로 경쟁력이 있는지를 계량적으로 보여주는 지 표이다. 이는 경제학자 Bela Balassa가 1965년에 제안한 지표로, 이론적 비교우위 (comparative advantage)의 개념을 실제 무역 데이터를 통해 드러내기 위해 고안되었 다. 말 그대로 ‘현시된(revealed)’ 비교우위란, 이론적 추정이 아닌 실제로 나타난 수출구 조를 통해 비교우위가 있는지를 간접적으로 확인하는 것이다. 현시비교우위지수(RCA) 는 “RCAij = (Xij/Xit) / (Xwj/Xwt)”로 계산된다. 여기서 Xij는 국가 i의 품목 j 수출액, Xit 는 국가 i의 총 수출액, Xwj는 세계 전체의 품목 j 수출액, Xwt는 세계 전체의 총 수출액을 나타낸다. 즉, 특정 국가의 특정 품목이 자국 수출에서 차지하는 비중을 세계 총수출에서 의 해당 품목 수출비중과 비교하여 상대적 우위를 계산하는 방식이다. RCA가 1보다 크면 해당 품목은 비교우위가 있다고 할 수 있다. 즉, 이 품목의 수출 비중이 세계 평균보다 높 아서 상대적으로 경쟁력이 있다고 볼 수 있다. 예를 들어, 한국이 반도체 수출에서 RCA 지수가 3.5라고 하면, 이는 한국의 반도체 수출 비중이 세계 평균보다 3.5배 더 높다는 뜻 이다. 다시 말해, 한국은 반도체 산업에 대해 비교우위를 갖고 있음을 나타낸다.',
  },
  '현용화폐': {
    title: '현용화폐',
    content: '현용화폐는 현재 대한민국에서 법적으로 통용되고 있는 공식적인 지급수단으로서, 한국 은행이 독점 발행권을 가지고 있는 은행권(지폐)과 주화(동전)를 의미한다. 한국은행법 제 47조 및 제53조에 따르면, 한국은행은 은행권과 주화의 발행권을 독점적으로 보유하고 있으며, 이들 화폐는 대한민국 영토 내에서 무제한으로 법적 통용력을 가진다. 즉, 상거래 및 채권·채무관계에서 금액의 제한 없이 지급수단으로 사용할 수 있다. 현용화폐는 법화 로서, 모든 거래에서 유효한 지급수단으로 인정되며, 이를 통해 거래가 이루어지면 채권· 채무관계가 종결된 것으로 간주된다. 현재 우리나라에서 사용되는 현용화폐는 1962년 제 2차 통화조치 이후에 발행된 화폐 중 유통이 정지되지 않은 화폐들을 의미한다. 구체적으 로 은행권은 오만원권, 만원권, 오천원권, 천원권의 4종류가 있으며, 주화는 오백원화, 백 원화, 오십원화, 십원화, 오원화, 일원화의 6종류가 현용주화로 통용되고 있다. 한국은행 은 화폐의 발행뿐 아니라, 화폐의 도안, 액면, 크기, 소재 등 기본적 사항을 금융통화위원 회가 정부의 승인을 받아 결정하도록 하고 있으며 화폐는 한국조폐공사가 제조하여 한국 은행에 인계하면, 한국은행이 이를 금융기관에 공급함으로써 시중에 유통된다. 아울러 현 용화폐는 위조 방지를 위한 다양한 장치와 함께 국민 편의를 위한 디자인 및 규격 변화를 거쳐 왔으며, 한국은행은 화폐의 안정적인 공급과 효율적인 관리를 통해 현용화폐가 원활 히 유통될 수 있도록 노력하고 있다.',
  },
  '현지금융': {
    title: '현지금융',
    content: '현지금융이란 거주자(개인은 제외), 거주자의 국외지점 및 현지법인이 외국에서 사용하기 위하여 외국에서 외화자금을 차입(증권발행에 의한 경우 포함)하거나 지급보증을 받는 것을 말한다. 현지금융은 해외직접투자를 하려는 국내기업, 해외건설업자, 원양어업자 등이 주로 이용하고 있으며 외국에 있는 금융기관으로부터 자금을 차입하는 경우가 대 부분이지만 외국회사 등 금융기관이 아닌 자로부터 자금을 차입하거나 지급보증을 받 는 경우도 현지금융에 포함된다. 현지금융으로 조달한 자금은 국내로 유입될 경우 국내 금융시장을 교란시킬 우려가 있기 때문에, 현지법인 등과 국내 거주자 간의 인정된 경 상거래에 따른 결제자금을 제외하고는 국내에 예치하거나 유입할 수 없다. 1980년대까 지 현지금융제도는 여신지원 측면보다는 차입기업의 경영부실화 방지, 국내 본사의 대 지급 방지, 현지금융 차입자금의 국내 유입 및 전용 방지 등에 중점을 두고 운영되었으나 1990년대 이후부터는 기업의 국제경쟁력 강화를 위해 현지금융 한도 및 용도 제한을 완 화하거나 폐지하는 방향으로 운영되었다. 1999년 이후 외환거래의 상당 부분이 자유화 되면서 현재 ‘현지금융제도’가 남아있지는 않으나 일반 외화차입·대출 신고·보고 제도에 기능이 통합되어 있다.',
  },
  '현지법인': {
    title: '현지법인',
    content: '현지법인이라 함은 거주자가 외국환거래규정에 의하여 신고 등을 하고 국외에서 해당국 의 법에 따라 설립한 법인을 말한다. 현지법인은 어떤 기업이 해외시장을 확보하려고 할 때, 해외의 싼 인건비 등을 이용해 생산시설을 배치하려고 할 때 또는 현지의 선진 기술과 영업정보를 획득하고자 할 때 주로 설립된다. 현지법인은 법적으로 독립된 기업으로서 초 기 해외 진출 형태인 해외 사무소나 지점·지사보다 영업범위가 넓고 그 설립과 운영에 있 어 보다 큰 규모의 자금이 필요한 경우가 많다. 따라서 현지법인은 법적으로 보다 엄격한 관리가 필요하기 때문에 현지금융을 받거나 세금납부 등과 관련하여 일정한 규제를 받는 경우가 많다. 본국 기업들도 현지법인을 관리하기 위해 동 법인 및 파견 직원 관리에 관한 사항을 규정으로 정하는 것이 일반적이다. 동 규정에는 현지법인의 업무처리기준 및 예산 집행과 회계 등에 관한 사항이 주로 포함된다.',
  },
  '협의통화(M1)': {
    title: '협의통화(M1)',
    content: '협의통화(M1)는 경제 내에 유통되는 화폐규모를 측정하는 통화지표 중 화폐의 지급결제 수단으로서의 기능에 초점을 맞춘 지표로서 유동성이 가장 높은 통화를 의미한다. 구체적 으로 현금통화(지폐 및 동전)와 요구불예금(보통예금, 당좌예금 등), 수시입출식 저축성예 금이 포함된다. M1은 소비나 투자에 바로 사용될 수 있는 자금의 총량을 나타내며, 단기 적인 경기 흐름이나 소비 심리를 파악하는 데 유용한 지표로 활용된다. 예를 들어 M1이 증가하면 가계나 기업이 현금을 많이 보유하고 있다는 뜻으로, 향후 소비나 투자가 활발 해질 가능성이 있다. M1은 본원통화(M0)에 비해 유동성 범위가 넓지만, 단기적이고 즉시 사용 가능한 자금만을 포함한다는 점에서 광의통화(M2)보다 좁은 개념이다.',
  },
  '혼합형결제시스템': {
    title: '혼합형결제시스템',
    content: '혼합형결제시스템(Hybrid Settlement System)은 신용리스크가 발생하지 않는 실시간총 액결제방식의 장점과 결제유동성을 절약할 수 있는 차액결제방식의 장점이 결합된 거액 지급시스템을 말한다. 혼합형결제방식은 차액결제를 영업시간이 끝난 이후 특정 시점으 로 이연하지 않고 영업시간중에 수시로 수행함으로써 참가기관의 자금부담과 결제비용 을 최소화하면서 일중에 결제완결성을 보장할 수 있는 특징이 있다. 혼합형결제시스템은 2000년대 들어 도입되기 시작하였는데 이는 금융 및 외환시장의 거래 규모가 확대되면서 금융기관들의 결제유동성 부담도 늘어나자 신용리스크 제거와 결제유동성 절약의 장점 을 동시에 갖춘 혼합형결제방식이 새로운 결제방식으로 부각되었기 때문이다. 우리나라 는 2005년 4월부터 본격적으로 한은금융망 재구축 사업에 착수하였으며 2009년 4월에 혼합형결제방식을 반영한 새로운 거액지급시스템을 가동하게 되었다. 2009년 4월 동 결 제방식 도입 당시에는 양자간 및 다자간 동시처리 유동성절감방식을 채택하였다가 2020 년 10월 차세대 한은금융망 가동 이후에는 시스템 부하를 가중시키는 ‘양자간 동시처리 방식’을 폐지하고 ‘다자간 동시처리방식’만을 운영하고 있다.',
  },
  '홀로그램': {
    title: '홀로그램',
    content: '은행권 위조방지를 위한 장치의 하나로 사진용 필름과 유사한 표면에 3차원 이미지를 기 록하여 기울여 보면 문양 변화 효과를 확인할 수 있다. 기술적으로는 두 개의 레이저광 이 서로 만나 일으키는 빛의 간섭 효과를 통해 화상이나 색상의 변화를 보여주는데, 은행 권의 위조방지를 위해 활용되고 있다. 홀로그램은 복사할 경우 그 효과가 나타나지 않는 다. 현재 우리나라 은행권에는 오만원권에 띠형 홀로그램이, 만원과 오천원권에는 패치 형 홀로그램이 각각 적용되어 있다. 오만원권의 띠형 홀로그램은 앞면 왼쪽 끝 부분에 부 착되어 있으며 보는 각도에 따라 상·중·하 3곳에서 ① 우리나라 지도 ② 태극 ③ 4괘 무늬 가 같은 위치에 번갈아 나타나며, 그 사이에 액면 숫자 “50000”이 세로로 쓰여 있다. 띠 형 홀로그램의 바탕에는 기하학적 무늬가 넣어져 있고, 홀로그램 왼쪽 끝에는 “BANK OF KOREA 50000”이라는 문구가 상·하 2곳에 세로로 새겨져 있다. 만원권에는 사각형 모양 의 홀로그램이, 오천원권에는 원형의 홀로그램이 각각 부착되어 있는데, 보는 각도에 따 라 ① 우리나라 지도 ② 액면숫자와 태극 ③ 4괘 무늬가 같은 위치에 번갈아 나타난다.',
  },
  '화폐교환': {
    title: '화폐교환',
    content: '화폐교환이란 고객의 요구에 따라 다른 종류의 화폐로 바꾸어 주거나 훼손·오염 또는 마 모 등의 사유로 손상된 화폐를 사용할 수 있는 화폐로 바꾸어 주는 것을 말한다. 손상된 화폐를 바꾸어 줄 때에는 일정한 기준이 있다. 앞·뒷면을 모두 갖춘 은행권은 면적을 기준 으로 3/4이상 남아있는 경우 액면금액의 전액을, 2/5이상이고 3/4미만인 경우 액면금액 의 반액을 교환해 주나 2/5미만인 것은 무효로 교환이 불가하다. 여러 개로 조각난 은행 권은 동일 은행권으로 인정되는 부분을 모두 합친 면적을 기준으로 교환하며 불에 탄 은 행권은 불에 탄 재가 은행권에서 떨어지지 않고 원형에 붙어 있거나 재만 남은 은행권도 흩어지지 않고 붙어 있으면 그 재 부분까지 면적으로 판정하여 교환해 준다. 한편 주화는 모양을 알아볼 수 있고 진위를 판별할 수 있으면 액면금액으로 바꾸어 준다.',
  },
  '화폐발행/화폐발행액': {
    title: '화폐발행/화폐발행액',
    content: '화폐발행은 중앙은행인 한국은행의 독점적인 권한으로 금융시장에서 국공채 매입, 은행에 대출, 외환 매입, 금융기관의 예금 인출 요청 등의 형태로 화폐를 시중에 공급하는 것을 말한다. 이렇게 발행된 화폐는 민간이 보유하거나 금융기관이 예금인출에 대비하여 보유 하게 된다. 따라서 화폐발행액은 민간보유현금(정부부문의 시재금 포함)과 금융회사의 시 재금을 합친 것이다. 금융기관 등으로 부터 지급준비금 등의 형태로 다시 중앙은행에 환 수되는 화폐가 있으면 화폐발행액은 줄어들게 된다.',
  },
  '화폐의 액면체계': {
    title: '화폐의 액면체계',
    content: '화폐의 액면체계는 한 국가의 화폐를 구성하는 액면금액의 틀을 의미하는데, 보통 액면 체계는 ‘일상적인 거래 편의 도모’라는 대원칙 아래 국가의 경제·사회적 여건과 국민의 화폐사용 습관의 영향을 받는다. 화폐의 액면체계는 대부분 기본수(1·5·10 등)에 10의 승수(10, 100, 1000...)를 곱하여 액면의 크기를 높여가는 방식으로 정해진다. 액면체계 는 크게 [1, 5]체계와 [1, 2, 5]체계로 구분할 수 있는데 [1,5]체계는 (1, 5, 10, 50, 100, 500) 등의 액면배열을 말하여 [1, 2, 5]체계는 (1, 2, 5, 10, 20, 50, 100, 200, 500) 등 의 액면배열을 말한다. 특정액면에서 2 대신 2.5를 사용하는 [1, 2.5, 5] 체계도 있는데 보통 [1, 2, 5]체계로 분류한다. [1, 5] 체계는 우리나라, 중국, 일본 등 주로 동아시아 국 가에서 채택하고, [1, 2, 5] 체계는 유럽을 비롯하여 세계적으로 대종을 이루고 있다. 액 면 종류가 적으면 사용자가 은행권 액면을 쉽게 식별하고 계산이 용이한 이점이 있는 반 면에 현금거래에 필요한 은행권 수량이 상대적으로 많아 불편하고 화폐 제조비용도 많 이 드는 단점도 있다.',
  },
  '화폐환수': {
    title: '화폐환수',
    content: '한국은행이 발행하여 시중에서 유통되는 화폐는 예금 또는 세금 납부 등으로 금융기관으 로 입금되며, 금융기관은 입금된 화폐 중 일부를 고객의 예금인출에 대비하여 시재금으로 보유하고 나머지는 한국은행에 예금지급준비금과 결제자금 등으로 입금하는데, 이처럼 한국은행에서 발행된 화폐가 다시 한국은행으로 되돌아 들어오는 것을 화폐의 환수라 한 다. 한국은행은 환수된 화폐에 대해 다시 사용할 수 있는 사용화폐와 다시 사용할 수 없는 손상화폐로 구분하는 정사(整査) 과정을 거친 후 사용화폐는 금융기관을 통해 다시 시중 에 발행하고, 손상화폐는 폐기한다.',
  },
  '환경계정': {
    title: '환경계정',
    content: '환경계정이란 1993년 UN이 경제활동과 환경 간의 상호 관계를 체계적으로 분석하기 위 하여 국민계정의 위성계정 형태로 새로 도입한 「환경경제통합계정」(SEEA; System of Integrated Environmental and Economic Accounts)을 말한다. 환경계정은 기존 국민 계정의 편제 대상이 시장에서 거래되는 경제적 자본(economic capital)에만 국한되어 환 경오염이나 자원고갈 등으로 인한 경제·사회적 비용을 반영하지 못하는 한계를 보완해 주 기 위한 것으로서 토지, 광물 및 에너지 자원, 수자원, 동물자원, 수목 등과 같은 자연자본 (natural capital)도 경제적 자본(economic capital)과 마찬가지로 재화와 서비스의 생 산에 이용되는 자산으로 취급하여 동 자산의 기초 및 기말 스톡과 기간 중 변동을 국민계 정체계(SNA) 구조 및 분류에 따라 기록하도록 하고 있다. 즉 광물채굴 또는 산림벌채 등 에 따른 자연자산의 감모나 환경오염에 따른 환경자산의 질적 악화 등 사회적 환경손실분 을 화폐로 평가하여 이를 기존의 국민소득지표인 국내순생산(NDP)에서 차감하여 「환경 요인 조정 국내순생산」(EDP; Environmentally Adjusted Net Domestic Product)을 추 계하게 된다. 언론이나 일부 학계에서 사용하고 있는 녹색GDP는 EDP에 가까운 개념이 라 할 수 있다.',
  },
  '환경권': {
    title: '환경권',
    content: '환경권(Environmental Rights)이란 모든 국민이 건강하고 쾌적한 환경 속에서 인간답 게 살 수 있는 권리를 말한다. 헌법에 나와 있는 환경권의 정의에 따르면, 모든 국민은 건 강하고 쾌적한 환경에서 생활할 권리를 가지며, 국가와 국민은 환경보전을 위하여 노력하 여야 한다고 규정되어 있다(헌법 제35조 1항). 이는 환경권이 공해로 오염된 환경으로부 터 보호받기 위한 생존권적 기본권으로 모든 국민은 자신의 건강을 지키기 위해 환경관련 행정기관이나 제3자에게 환경개선을 요구할 수 있음을 의미한다. 즉 환경권은 깨끗한 환 경에서 건강하고 쾌적한 생활을 누릴 수 있는 포괄적 권리로 볼 수 있다. 따라서 이는 오 염되고 불결한 환경으로부터 고통 받지 말아야 한다는 소극적인 권리와 함께 국가에 대해 깨끗한 환경을 보전하고 조성해 달라고 요구할 수 있는 적극적인 권리도 포함한다.',
  },
  '환리스크': {
    title: '환리스크',
    content: '장래의 예상하지 못한 환율변동으로 인하여 보유한 외화표시 순자산(자산-부채) 또는 현 금흐름의 가치가 변동될 수 있는 불확실성을 의미한다. 환리스크는 기본적으로 외환포지 션의 보유형태와 규모, 장래의 환율변동 방향과 변동폭에 따라 결정된다. 일반적으로 환 리스크에는 계약시점과 결제시점 간의 시간적 차이에서 발생하는 거래위험(transaction risk)과 대차대조표상의 자산과 부채의 가치를 환산하는 과정에서 발생하는 환산위험 (translation risk)이 있다. 거래위험의 예로는 우리나라 기업이 물품을 수출입하는 경우 수출입대금결제 시 계약일로부터 결제일까지 환율변동에 따른 위험을 부담해야 하는 경 우를 들 수 있다. 또한 환산위험의 예로는 외국에 자회사가 있는 본사의 연결재무제표에 외국 자회사의 자산과 부채를 자국 통화로 환산할 때 발생하는 환율변동위험이 있다.',
  },
  '환리스크 헤지': {
    title: '환리스크 헤지',
    content: '장래의 예상하지 못한 환율변동으로 인하여 기업 등이 보유하고 있는 외화표시 순자산(자 산-부채)의 가치 또는 현금흐름의 순가치가 변동될 수 있는 불확실성을 제거하는 것을 의 미한다. 환율변동으로 인한 불확실성 즉, 환리스크를 제거하기 위해 선물환, 통화옵션, 통 화선물, 외환 및 통화스왑, 한국무역보험공사의 환변동보험 등 다양한 수단이 이용되며, 기업의 자산 및 부채구조와 위험노출 정도, 현금흐름, 재무구조의 건전성 등에 따라 환리 스크 헤지 방법이 달라진다.',
  },
  '환매조건부매매/RP/Repo': {
    title: '환매조건부매매/RP/Repo',
    content: '미래의 특정 시점에 특정 가격으로 동일한 증권을 반대방향으로 매수 및 매도할 것을 약 정하고 이루어지는 증권의 매매거래를 말한다. 법적으로 RP거래는 약정기간 동안 대상증 권의 소유권이 RP매도자에서 RP매수자로 이전되는 증권의 매매거래이지만 경제적 실질 측면에서 보면 RP매도자가 RP매수자에게 증권을 담보로 제공하고 자금을 차입하는 증권 담보부 소비대차의 성격을 지닌다. 우리나라에서 RP거래는 거래주체를 기준으로 금융기 관과 일반고객 간에 이루어지는 ‘대고객 RP’, 금융기관 간에 이루어지는 ‘기관간 RP’ 그 리고 한국은행의 공개시장운영 수단으로서 한국은행과 금융기관 간에 이루어지는 ‘한국 은행 RP’로 구분된다.',
  },
  '환어음': {
    title: '환어음',
    content: '환어음은 발행인이 직접 어음금액을 지급하지 아니하고 제3자인 지급인에게 일정한 금액 의 지급을 위탁하는 형식의 지급위탁증권이다. 따라서 환어음은 발행인 이외에 지급인이 있어야 하며 지급채무를 확정지우기 위해서는 별도로 지급인의 인수를 필요로 한다는 점 에서 약속어음과 차이가 있다. 그러나 엄격한 요식증권으로서 어음법상의 어음요건을 갖 추어야 한다는 점에서는 약속어음과 동일하다.',
  },
  '환율조작국': {
    title: '환율조작국',
    content: '1988년에 제정된 미국의 종합무역법에서 규정된 개념으로 동 법은 현저한 대미 무역흑 자 및 상당한 경상수지 흑자를 보인 국가를 환율조작국으로 지정할 수 있다. 한편 2015년 에 제정된 교역촉진법에 의거 미 재무부는 ① 대미 무역흑자 150억 달러 초과, ② 국내총 생산(GDP) 대비 경상흑자 비율 3% 초과, ③ 정책당국이 연간GDP 대비 2%를 초과하는 달러를 순매수하고 순매수가 12개월 중 8개월 이상 지속되는 등의 세 가지 요건이 모두 해당되는 국가를 심층분석대상국으로 지정할 수 있다. 따라서 교역촉진법상의 심층분석 대상국은 사실상 종합무역법상 환율조작국 지정의 전 단계로 기능하고 있다. 미국 재무부 는 종합무역법, 교역촉진법에 의해 매년 4월 및 10월 반기별로 주요 교역국의 외환 정책 보고서(환율보고서)를 작성하여 의회에 제출한다. 환율조작국으로 지정되면 미국은 해당 국에 환율 저평가 및 지나친 무역흑자 시정을 요청하며 1년이 지나도 개선되지 않으면 해 당국에 대한 미국 기업들의 투자 제한, 해당국 기업들의 미국 연방정부와의 조달계약 체결 제한, 국제통화기금(IMF)에 추가적인 감시 요청 등의 구체적인 제재를 할 수 있다. 한편 위 의 세 가지 요건 중 두 가지 요건에 해당된 국가는 관찰대상국(monitoring list)으로 분류된 다. 한국은 2016년 4월 이후 2025년 6월 현재까지 환율관찰대상국으로 분류되고 있다.',
  },
  '환전영업자(환전상)': {
    title: '환전영업자(환전상)',
    content: '환전영업자는 외국통화의 매입·매도 또는 외국에서 발행한 여행자수표의 매입을 업으로 영위하는 자를 말한다. 매입할 수 있는 대상은 외국통화와 여행자수표에 한하며 외화송 금수표 환어음 등은 매입할 수 없다. 환전영업자는 원칙적으로 외환매입만 가능하고 외 환매도는 지정거래외국환은행을 통해서만 가능하다. 다만, 2015년 1월부터 2천 달러(동 일자ㆍ동일인 기준) 이하 금액은 비거주자뿐만 아니라 거주자에게도 매도할 수 있게 되 었다. 환전영업자가 2천 달러 초과 금액을 지정거래외국환은행이 아닌 자에게 매도할 경 우에는 비거주자에 대해서만 가능하며, 재환전 금액까지만 매도할 수 있다. 환전영업은 1999년 4월부터 인가제에서 등록제로 전환되었는데, 이에 따라 필요한 시설을 갖춘 자는 누구든지(개인 포함) 관세청장에게 등록하면 환전영업에 종사할 수 있다. 환전영업자가 환전을 할 때에는 금액과 관계없이 주민등록증, 여권, 사업자등록증, 납세번호증 등 실명 확인증표를 통해 상대방의 인적사항을 확인하여야 한다.',
  },
  '환차손/환차익': {
    title: '환차손/환차익',
    content: '환위험은 크게 회계적 환위험(또는 환산환위험)과 거래적 환위험으로 나누는데, 이중에 서도 회계적 환위험이란 해외지사 및 자회사의 재무제표를 모기업의 재무제표와 연결시 키기 위해 자산과 부채의 가치를 동일한 통화로 환산하는 과정에서 발생하는 환위험을 말한다. 환차손/환차익은 회계적 환위험과 관련되는 것으로, 한 경제주체가 외화 자산 또 는 부채를 보유하고 있을 때 환율변동에 따라 자국 통화로 평가한 자산(부채)의 가치가 변 동하게 되는데, 환율 변동에 따라 이익이 발생하면 환차익이라고 하고 반대로 손실이 발 생하면 환차손이라고 한다. 예를 들어 외화자산이 외화부채보다 많은 경우(외환매입초과 포지션, over-bought positions 또는 long positions) 환율이 상승(하락)하면 환차익(손) 이 발생하고 반대로 외화부채가 외화자산보다 많은 경우(외환매도초과포지션, over-sold positions 또는 short positions) 환율이 상승(하락)하면 환차손(익)이 발생한다. 환차손 이 발생할 위험을 관리하는 방법으로는 리드앤드래그, 매칭, 자산부채관리 등 기업 내부 적으로 환위험을 최소화하는 내부적 관리기법과 은행과의 외환파생상품을 이용한 대응거 래 등을 통해 환위험을 커버하는 외부적 관리기법이 있다.',
  },
  '후방연쇄효과': {
    title: '후방연쇄효과',
    content: '후방연쇄효과란 특정 산업에서 제품의 생산이 이루어질 때 그에 필요한 원자재, 부품, 기 계, 에너지, 물류 등 중간재의 수요가 증가하여 유발되는 경제적 파급 효과를 말한다. 즉, 한 산업의 성장이 그 산업에 중간재를 공급하는 산업의 생산과 고용을 유도하는 파급력을 가리킨다. 후방연쇄효과는 산업연관분석(Input-Output Analysis)에서 중요한 개념 중 하나로, 특정 산업에서 생산이 증가했을 때 중간재를 공급받기 위해 다른 산업에 어떤 정 도로 수요를 유발하는지를 계량적으로 측정한 값이다. 예를 들어 자동차 산업이 성장하 면, 철강, 유리, 플라스틱, 전자부품, 기계장비 산업 등의 생산도 함께 증가하게 되는데, 이 처럼 자동차 산업의 확대가 중간재를 공급하는 산업의 생산 확대를 견인하는 작용이 바로 후방연쇄효과이다.',
  },
  '후순위금융채': {
    title: '후순위금융채',
    content: '자기자본비율을 산정할 때 보완자본의 일종으로 분류되는 채권이다. 은행 파산 시 예금 채권자 등 선순위채권자(unsubordinated creditors)에 대해 원리금이 전액 지급된 후에 야 원리금의 지급이 가능한 점에서 자기자본의 성격을 지닌다. 한편, BIS에서는 다음과 같 은 일정한 조건을 갖춘 채권을 보완 자본으로 인정하고 있다. ① 무담보 및 후순위특약 요 건 ② 원 계약기간이 5년 이상이고 잔존만기가 5년 이내가 될 경우 매년 기한부 후순위채 무의 20%씩을 보완자본에서 차감 ③ 파산 등의 사태가 발생할 경우 선순위채권자가 채권 전액을 지급받을 때까지 상계권이 허용되지 않음',
  },
  '후행종합지수': {
    title: '후행종합지수',
    content: '개별 경제지표로는 파악하기 어려운 국민경제의 총체적인 경기수준을 파악하기 위하여 경기종합지수를 작성한다. 경기종합지수는 선행종합지수, 동행종합지수, 후행종합지수 3 개가 작성되고 있으며, 기준년도 수치가 100이 되도록 하여 산출하고 있다. 후행종합지수 는 재고, 소비지출 등 실제 경기순환에 후행하여 변동하는 개별지표를 가공·종합하여 만 든 지표로서 현재 경기의 사후확인에 이용한다. 현재 후행종합지수의 구성 지표로는 생산 자제품재고지수, 도시가계소비지출, 소비재수입액(실질), 상용근로자수, 회사채유통수익 률 등이 있다.',
  },
  'Beyond GDP': {
    title: 'Beyond GDP',
    content: 'GDP(국내총생산)는 한 국가의 거시경제 성과를 파악하기 위해 고안된 경제지표이지만 인간의 총체적인 후생복지를 측정하기에는 여러 가지 한계가 있다는 지적을 받아 왔다. GDP는 인간의 복지나 행복에 중요한 여가, 건강, 직업의 안정성, 사회 안전과 자연환경 등의 요소를 감안할 수 없기 때문이다. 이러한 GDP의 문제점을 보완하기 위해 국제적 으로 GDP를 넘어선(beyond) 지표 즉, Beyond GDP의 개발이 이슈화되었다. 2004년 OECD World Forum부터 Beyond GDP에 대한 논의가 본격화되면서 학계와 국제기구 를 중심으로 지속적(sustainable)이고 평등한(equitable) 복지에 대한 측정방법의 개발에 착수하였다. Beyond GDP의 개발과 관련하여 가장 큰 어려움은 대상지표의 선정과 설득 력 있는 측정지표의 작성방법을 마련하는 것이다. Beyond GDP가 만들어진다고 해도 현 재의 핵심 경제지표인 GDP의 유용성은 여전할 것으로 보이며 Beyond GDP는 보조지표 로서의 역할을 할 것이라고 보는 견해가 우세하다.',
  },
  'BIS 자기자본비율': {
    title: 'BIS 자기자본비율',
    content: '국제결제은행(BIS)의 바젤은행감독위원회(이하 ‘BCBS’)가 “국제업무를 수행하는 은행 의 자기자본비율은 8%를 초과해야 한다”고 제정한 국제적인 통일기준으로, 은행 보유 자 산에 내재된 리스크(위험가중자산) 대비 복원력(자기자본)의 비율로 산출한다. BCBS는 1988년 「바젤자기자본협약」(Basel Capital Accord)에 따라 신용리스크에 중점을 둔 자 기자본규제(바젤Ⅰ) 비율을 처음 발표(실행은 1992년)하였으며, 1996년 1월부터는 시장 리스크를 반영토록 하였다. 이후 운영리스크 등 다양한 리스크를 반영하고 규제 회피 등 에 대응하기 위해 2004년 6월 「바젤Ⅱ: 자기자본 측정 및 자기자본에 대한 국제적인 통 일기준 개정체계」를 발표하였다. 그러나 2008년 글로벌 금융위기를 거치면서 규제자본 의 질이 하락하고 8% 자기자본비율이 위기시 대규모 손실을 흡수하기에는 불충분하다는 우려가 제기되었다. BCBS는 G20 정상회의, 금융안정위원회(FSB) 등의 결정을 반영하여 2010년 12월 「바젤Ⅲ: 은행부문의 복원력 강화를 위한 글로벌 규제체계」를 발표하였다. 바젤Ⅲ는 규제자본의 질을 제고하기 위해 즉각적으로 손실 흡수가 가능한 보통주자본 중 심으로 자본규제를 재편하고 非자본증권의 규제자본 인정범위를 엄격히 제한하였다. 또 한 가장 양질의 자본인 보통주자본과 기본자본(보통주자본+기타기본자본)을 각각 4.5% 및 6% 이상 유지하도록 의무화하였다. 규제자본의 양적 확충 측면에서는 최소자기자본비 율(8%)에 더하여 2.5%의 보통주자본을 추가 적립하도록 하는 자본보전완충자본(CCoB) 을 도입하는 한편 거시건전성 요인을 고려하여 경기대응완충자본(CCyB)과 시스템적 중 요 은행에 대한 추가자본(SIB)을 부과하여 은행별·국가별로 자본을 추가 적립하도록 하 였다. 한편 BCBS가 2017년 12월 발표한 바젤Ⅲ 최종안은 2023년 1월부터 시행되고 있 는데, 우리나라를 포함한 6개국은 최종안의 도입을 완료하였으며 미국, 유럽연합 등은 2025년중 시행을 목표로 도입작업을 진행 중이다. 총자본(일반은행에 대한 2025년 규제기준) 바젤Ⅲ (최소비율)',
  },
  'CAMEL-IR 방식/ROCA 방식/CACREL 방식': {
    title: 'CAMEL-IR 방식/ROCA 방식/CACREL 방식',
    content: '은행의 경영실태평가방식으로는 CAMEL-IR, ROCA 및 CACREL 방식이 있는데, 일반 은행 본점 및 현지법인에 대해서는 CAMEL-IR 방식, 외은지점 및 국내 일반은행 국외 지점에 대해서는 ROCA 방식, 특수은행에 대해서는 CACREL 방식에 의해 평가한다. 은 행 본점 및 현지법인에 대해서는 과거 CAMELS 방식을 운영하였으나, 리스크 부문 제 도 개선을 통해서 2012년 4분기부터 CAMEL-R 방식으로 변경하였으며, 2024년 4월 부터는 내부통제를 별도 평가 부문으로 분리하여 CAMEL-IR 방식으로 변경하여 평가 하고 있다. CAMEL-IR 방식은 경영평가부문을 자본적정성(Capital adequacy), 자산 건전성(Asset quality), 경영관리의 적정성(Management), 수익성(Earnings), 유동성 (Liquidity), 내부통제(Internal controls), 리스크관리(Risk management) 등 7개 부문 으로 구분·평가하고, ROCA 방식은 리스크관리(R), 경영관리 및 내부통제(Operational controls), 법규준수(Compliance), 자산건전성(A) 등 4개 부문으로 구분 평가한다. CACREL 방식은 자본적정성(Capital Adequacy), 자산건전성(Asset Quality), 법 규준수(Compliance), 위험관리(Risk Management), 수익성 (Earnings), 유동성 (Liquidity) 등 6개 부문으로 구성된다.',
  },
  'CDS프리미엄': {
    title: 'CDS프리미엄',
    content: '신용파산스왑(CDS; Credit Default Swap)은 채권 발행 기업이나 국가가 부도날 경우 제 3자로부터 손실액을 보상받을 수 있는 신용파생상품 거래이다. 채권자는 보상의 대가로 제3자에게 일정한 수수료(프리미엄)를 지급하는데, 해당 채권의 부도 위험이 클수록 CDS 프리미엄이 높아진다. 즉, CDS프리미엄은 채권의 부도 위험을 반영한다고 볼 수 있다. CDS프리미엄은 특히 국제금융시장에서 국가의 신용 상태를 파악하는 중요한 지표로 활 용된다. 우리나라 CDS프리미엄(외평채, 5년물)은 2007년까지는 50bp 이내로 낮은 수준 을 유지하였다가 글로벌 금융위기 발생으로 2008년 10월 27일에 699bp까지 급등하였 는데, 이는 당시 투자자들이 국제금융시장의 신용경색 심화로 우리나라 금융·외화자금 사 정에 대한 부정적 시각이 매우 커졌음을 의미한다.',
  },
  'CLS은행': {
    title: 'CLS은행',
    content: 'CLS은행은 외환결제리스크 감축에 관한 국제결제은행(BIS)의 권고에 따라 1999년 주요 국제 상업은행들이 세계 주요 통화가 게재된 외환거래의 동시결제를 구현할 목적으로 설 립한 국제외환결제전문은행이다. 동 은행을 통해 외환거래를 결제하면 각 통화별 중앙은 행에 개설된 CLS은행 계좌를 통해 양 거래통화의 동시결제(PVP)가 이루어지므로 원금리 스크를 제거할 수 있으며 다자간상계에 따른 결제유동성 절감효과도 거둘 수 있다. CLS 은행은 스위스 취리히에 소재한 CLS그룹지주회사(CLS Group Holdings)의 자회사로서 1999년 11월 미국 뉴욕에 설립되었으며, 2024년말 현재 전세계 70개 이상의 결제회원 은행과 약 35,000개 이상의 제3자고객을 대상으로 원화 등 총 18개국 주요국 통화간 외 환매매거래 등에 대해 결제서비스를 제공하고 있다.',
  },
  'CMO': {
    title: 'CMO',
    content: 'CMO(Collateralized Mortgage Obligation)는 미국에서 발행되는 주택담보대출증권의 일종으로, 패스스루(pass-through) 증권 및 모기지를 기초자산으로 하며, 해당 자산에 서 발생하는 현금흐름을 만기, 이자율, 조기상환 민감도가 서로 다른 여러 개의 트렌치 (tranche)로 구조화함으로써 투자자의 다양한 선호에 부합하도록 설계된 상품이다. 대 표적인 CMO 상품으로는 sequential, PAC, stripped MBS 등을 들 수 있다. sequential CMO는 기초자산에서 발생하는 현금흐름을 사전에 정해진 순서에 따라 각 tranche에 순차적으로 지급하는 상품으로, 선순위 tranche에 가장 먼저 원금 상환이 이루어지며 이 후 차순위 tranche의 원금 수령이 이어지는 구조로 선순위의 원금 상환 전 단계에서는 차 순위 tranche에 이자만 지급된다. 듀레이션 측면에서 선순위 tranche의 듀레이션이 후 순위 tranche보다 작으며 이러한 점은 투자기간이 짧은 투자자에게 투자유인으로 작용 한다. PAC(Planned Amortization Class)는 조기상환 속도에 대한 상한 및 하한을 사전 에 지정하여 조기상환 속도 변화에 따른 현금흐름의 불확실성을 완화하는 상품이다. 조기 상환 속도가 지정된 범위 내에 있을 경우 PAC tranche가 예정된 원리금을 수령하게 되 며, Support tranche가 초과되는 현금흐름을 흡수함으로써 PAC으로 유입되는 현금흐름 을 안정화시킨다. Stripped MBS는 pass-through에서 발생하는 원금과 이자를 별도의 tranche로 각각 분리한 상품이다.',
  },
  'CVIX': {
    title: 'CVIX',
    content: 'CVIX(Currency Volatility Index, 외환시장 변동성 지수)는 향후 30일 동안의 환율변동 성에 대한 시장의 기대치를 나타내는 지수로 도이치방크나 JP모건 등 대형 투자은행이 발 표한다. 주요 통화옵션의 내재변동성을 지수화하여 산출하며, 글로벌 투자심리를 판단하 는 지표로 활용된다. 즉 CVIX 값이 상승하면 투자자들이 환율변동성이 커지고 시장이 불 안해질 가능성을 높게 본다는 것으로 위험회피 심리가 증가하고, 하락하면 시장이 안정될 것으로 기대하여 위험선호 심리가 높아진다. 시카고옵션거래소에서 산출하는 VIX와 달리 대형 투자은행들이 산출하므로 지수 간 직접 비교 시에는 대상 통화가 다를 수 있음에 유 의해야 한다.',
  },
  'DebtRank': {
    title: 'DebtRank',
    content: '금융시스템의 상호연계성을 기반으로 부실전염 리스크를 정량적으로 평가하여 금융시스 템 전체의 안정성을 모니터링하는 지표로서, 특정 금융업권의 도산에 따른 충격이 상호거 래 익스포저를 통해 거래상대방에게 순차적으로 확산되어 나타나는 손실 합계가 전체 금 융업권 내 자본에서 차지하는 비중을 업권별로 계산하여 이를 단순 평균한 값이다. 예를 들어 DebtRank 0.1은 특정 업권의 도산에 따른 상호거래 관련 손실이 평균적으로 업권 전체 자본의 10%에 해당하는 손실을 초래함을 의미한다.(Battiston et al,. “DebtRank: Too Central to Fail? Financial Networks, the Fed and Systemic Risk”, 2012를 참조)',
  },
  'EC방식': {
    title: 'EC방식',
    content: '중앙은행이 통화정책을 수행함에 있어 금리와 통화량 가운데 어느 것을 보다 중시할 것인 지에 대한 판단은 시대에 따라 변해왔다. 보다 긴 시각에서 본다면 중앙은행은 대체로 가 격지표인 금리를 중시한 통화정책을 수행해 왔다고 평가된다. 하지만 지난 1970년대 석 유파동 등으로 높은 인플레이션을 겪는 가운데 각국은 물가안정을 위해 양적인 지표인 통 화량을 보다 중시하고 통화량을 안정적으로 관리하기 위한 노력을 한층 강화한 바 있다. EC방식이란 이같은 배경 하에 1972년 EC(European Community)에서 각 회원국에 채 택할 것을 권고한 적정 통화공급규모 산정방식을 말한다. 이론적으로는 통화와 실물경제 간의 일반적 균형조건을 나타내는 Fisher의 교환방정식, 즉 MV=PY에 근거를 두고 있는 데 여기서 M은 통화공급량, V는 통화유통속도(V=PY/M), P는 물가수준, Y는 총거래량 또는 실질국민총생산을 나타낸다. 이 방정식을 미분개념(변화율)으로 바꾸어 표시하면 다 음과 같다. dM/M = dY/Y + dP/P - dV/V. 이 방식에 의하면 적정 통화증가율은 경제성 장률에 물가상승률을 더하고 통화의 유통속도 변동률을 차감하여 산정한다. 예를 들어 경 제성장률이 3%, 물가상승률이 1%, 통화의 유통속도 변동률이 -5%라고 추정된다면 적정 통화증가율은 9%[=3%+1% -(-5%)]가 된다.',
  },
  'ESG경영': {
    title: 'ESG경영',
    content: '환경(Environmental), 사회(Social), 지배구조(Governance)의 세 가지 요소를 중시하면 서 기업을 경영하는 방식을 말한다. 기업은 전통적인 경영목표인 이윤추구를 위한 생산 및 영업활동에 그치지 않고 환경보호, 사회적 책임, 지배구조 개선 등을 통해 사회 발전 에 기여할 수 있다. 기업을 평가하는 관점도 재무적 성과를 중시하던 전통적 접근에서 벗 어나 중장기적 시각에서 기업가치와 지속가능성에 영향을 주는 이른바 ESG기준이 최근 조명을 받는 추세이다. 예를 들어 기업은 환경보호를 위해서 탄소 배출 저감, 에너지 효 율화, 자원 절약과 재활용, 친환경 제품 및 서비스 개발 등을 추구할 수 있다. 사회적 책임 을 다하기 위해서는 노동자의 인권과 복지 보장, 협력사와의 공정한 거래, 지역사회와의 상생 등에 보다 큰 노력을 기울일 수 있다. 지배구조를 개선하기 위해서는 이사회의 독립 성과 투명성, 윤리경영 및 내부 통제, 부패 방지, 주주와의 책임 있는 소통 등을 강화할 수 있다. ESG 경영은 중장기적으로 기업경쟁력을 높이는 효과도 있다. 투자자들이 점점 더 ESG 기준을 고려해 투자 결정을 내리는 추세이고, 소비자들도 기왕이면 윤리적이고 지속 가능한 기업을 선호하고 있으며, 날로 강화되는 글로벌 규제와 기준에 효과적으로 대응할 수 있기 때문이다.',
  },
  'ESTR': {
    title: 'ESTR',
    content: 'ESTR(€STR, Euro Short-Term Rate)은 유럽중앙은행(ECB)이 발표하는 유로지역의 단 기금리 벤치마크이다. 유로지역 내 주요 은행들의 1백만 유로 이상의 무담보 오버나이트 자금거래의 평균금리를 반영하는데, 금리 순으로 정렬하여 누적 거래금액 기준 상위 25% 및 하위 25% 거래를 제외한 잔여 50% 거래량의 금리를 가중 평균하여 산출한다. 기존의 EONIA 및 EURIBOR 금리의 신뢰성 문제(조작 가능성 등)를 해결하고자 2019년 10월 2 일부터 공식 도입되었다. ESTR은 ECB의 정책금리 결정 및 유로지역 금융시장 상황 판단 에 참고지표로 활용될 뿐만 아니라 시장 참가자들의 금리 예측 등에도 활용되고 있다.',
  },
  'FedWatch': {
    title: 'FedWatch',
    content: 'FedWatch는 미 연준(Fed; 미국의 중앙은행)의 금리 결정에 대한 시장 참가자들의 기대 를 나타내며, 시카고상업거래소(CME; Chicago Mercantile Exchange)가 제공한다. 페 더럴펀드금리선물(Fed Funds Futures)의 가격을 기반으로 산출하며, 향후 미국의 정책 금리를 전망하는 데 활용한다. FedWatch는 “다음 FOMC 회의에서 금리가 0.25%p 인하 될 확률이 18%, 동결될 확률이 72%”와 같이 확률로 제시된다. 미 연준이 발표하는 정책 금리 점도표(dot plot)와의 비교를 통해 미국 통화정책에 대한 시장의 기대가 미 연준 내 부 전망과 어느 정도 괴리되어 있는지를 파악할 수 있다.',
  },
  'FIMA Repo Facility': {
    title: 'FIMA Repo Facility',
    content: 'FIMA Repo Facility(Foreign and International Monetary Authorities Repo Facility)는 미 연준이 외국 중앙은행 등이 보유하고 있는 미 국채를 환매조건부로 매입하 여 미 달러화 자금을 외국 중앙은행 등에게 공급하는 제도이다, 미 연준은 코로나19 팬데 믹에 대응하여 2020년 3월 이 제도를 한시적으로 도입하였다가 2021년 7월 상설제도로 전환하였다. 이 제도를 통해 외국 중앙은행 등은 보유 중인 미국 국채를 매도하지 않고 필 요시 미 달러화 자금을 즉시 조달할 수 있게 되었다. 한국은행은 2021년 12월부터 필요시 FIMA Repo Facility를 이용하기로 미 연준과 합의하였다.',
  },
  'FOMO현상': {
    title: 'FOMO현상',
    content: 'FOMO현상(Fear Of Missing Out)은 다른 사람들이 누리는 중요한 경험이나 투자 기회 등을 자신만 놓치고 있다는 불안감이나 두려움을 느끼는 현상을 말한다. 이는 타인과 비 교하며 뒤처지는 것에 대한 불안, 사회적 고립에 대한 두려움 등으로 이어질 수 있다. 특 히 현재와 같이 소셜 미디어의 발달로 인해 타인의 삶을 쉽게 접하게 되면서 포모 현상을 경험하는 사람들이 늘고 있다. 금융시장에서 발생하는 포모 현상은 투자자들이 다른 사람 들이 커다란 이익을 얻는 것을 보고 자신도 기회를 놓칠까 두려워 충동적으로 투자하는 심리를 말한다. 특히 암호화폐 시장과 같이 변동성이 큰 시장에서 자주 발생하며 주식시 장의 버블 형성 과정에서도 두드러지게 나타나는 현상인데 감정적인 판단이 합리적인 분 석보다 앞서는 경향을 보인다.',
  },
  'FTSE 지수': {
    title: 'FTSE 지수',
    content: '영국의 FTSE Russell사가 작성, 발표하는 세계 주가지수를 말하며 ‘FT 지수’라고도 한다. 전 세계를 대상으로 투자하는 대형 펀드, 주로 유럽계 펀드의 운용에 중요한 기준이 되는 투자 지표이며 미국의 MSCI 지수와 더불어 세계 양대 투자지표로 꼽힌다. FTSE Russell 사는 영국의 FTSE 인터내셔널과 Russel 인덱스 그룹이 합병되어 만들어진 회사로 FTSE 지수를 개발하고 관리하는 사업을 수행한다. FTSE Russell사는 매일 증권, 채권관련 지수 를 산출하고 있으며 이 중에서도 런던국제증권거래소에 상장된 100개의 우량주식으로 구 성된 ‘FTSE 100지수’, 중형주 중심의 ‘FTSE 250 Index’, 세계 주요국 우량주식을 포괄한 ‘FTSE 올월드인덱스’ 등이 많이 사용된다. FTSE 올월드인덱스는 선진시장, 선진신흥시 장, 신흥시장의 3개 그룹으로 구성되며 우리나라는 2009년 9월 선진 신흥시장에서 선진 시장으로 편입되었다. 다만 미국의 MSCI 지수에서는 한국이 여전히 신흥시장으로 분류 된다.',
  },
  'G2(Group of Two)': {
    title: 'G2(Group of Two)',
    content: '세계에서 경제적으로 영향력이 큰 두 국가라는 의미로서 미국과 중국을 가리키는 비공식 적인 용어이다. G2라는 용어는 2000년대 들어 중국이 급속한 경제발전을 토대로 국제 사회에서 경제적 위상이 크게 높아지면서 등장한 용어로 2006년부터 본격적으로 사용되 었다. 특히 2009년 G20 정상회의 기간 중 오바마 미국 대통령과 후진타오 중국 국가주 석이 만나 관계를 강화하기로 합의한 이후 빈번히 사용되고 있다. 중국이 미국에 버금가 는 경제대국으로 성장한 만큼 기존의 초강대국인 미국과 더불어 글로벌 리더로서 경제위 기·중동사태·기후변화·핵확산 등 각종 국제문제의 해결에 앞장서야 하는 시대가 왔음을 ABC 의미하기도 한다. 중국 내에서는 중국에게 능력 이상의 책임을 지우는 빌미가 될 수 있다 고 경계하는 견해도 있다. 정기적으로 회의를 개최하는 국제적인 회의체는 아니라는 점에 서 G7, G20과는 차이가 있다.',
  },
  'G7(Group of Seven)': {
    title: 'G7(Group of Seven)',
    content: '미국, 일본, 영국, 프랑스, 독일, 이탈리아, 캐나다 등 7개 선진국의 모임을 지칭한다. 이들 국가의 모임은 1973년 1차 오일쇼크에 대한 대책 마련을 위해 미국, 영국, 프랑스, 서독, 일본의 5개국 재무장관이 모인 G5 회의로 시작되었으며 이후 이탈리아(1975년)와 캐나 다(1976년)가 참여하면서 G7이 되었다. 냉전 종식과 함께 러시아가 회의에 정식으로 참 여(1997년)하며 G8이 결성되었으나 2014년 크림반도 위기로 러시아의 G8 참가자격이 일시 정지되었고, 2017년 1월에는 러시아가 G8 탈퇴를 선언함에 따라 서방선진 7개국 (G7) 체제를 다시 갖추게 되었다. 재무장관·중앙은행총재회의와 정상회담을 개최하고 있 는데 재무장관·중앙은행총재회의는 각국의 재무장관과 중앙은행 총재가 참여하는 회의 로 매년 세계 경제 및 금융에 관한 주요 이슈와 각국 간 경제정책 협조 등을 논의하고 있 다. 정상회담은 각국 대통령과 총리가 참가하는 가운데 1년에 한번 개최되며 세계의 주요 의제 등을 논의한다. 이 모임은 당초 세계 경제의 당면과제 해결방안 모색에 주안점을 두 고 있었으나 이후 기후변화 대응, 에너지 안보, 디지털 전환, 글로벌 공급망 안정화, 국제 안보와 같은 다양한 글로벌 이슈로까지 논의가 확대되었다. 최근에는 러시아의 우크라이 나 침공 대응과 같은 지정학적 현안과 더불어, 민주주의 가치와 규범에 기반한 국제 질서 수호, 인권 문제, 중국과의 무역·기술 경쟁 대응 등도 주요 의제로 다뤄지고 있다. 이처럼 G7은 단순한 경제협의체를 넘어, 글로벌 현안 전반에 대한 주요 선진국 간 정책 공조와 대응의 핵심 포럼으로 자리 잡고 있다.',
  },
  'G20(Group of 20)': {
    title: 'G20(Group of 20)',
    content: 'G7에 속하는 7개국, 신흥시장국 12개국 및 유럽연합, 아프리카연합을 포함한 21개 회원 으로 구성된 국제회의체이다. G7이 1999년 재무장관·중앙은행총재회의에서 국제 금융 경제 현안에 관한 논의 등 정책협력 대상을 주요 신흥시장국으로 확대하기로 합의함에 따 라 G20 재무장관·중앙은행총재회의가 개최되기 시작하였다. 2008년 글로벌 금융위기를 계기로 G20 정상회의가 처음으로 개최된 후 2011년부터 정례화되면서 G20는 세계경제 협력을 위한 최상위 포럼 역할을 하게 되었다. 이에 따라 금융위기 극복 및 정책정상화, 포용적이며 지속가능한 성장체계 구축, 금융규제 개혁, 글로벌 금융안정망 구축, 글로벌 불균형 완화 및 국제금융기구 개편 등에 관한 논의를 진전시키고 있다. 또한 기후변화, 디 지털세, 공급망 안정화, 팬데믹 대응 등으로도 의제를 확대해 오고 있다. G20 회의는 정 상회의를 정점으로, 금융·경제 정책을 다루는 재무트랙(Finance Track)과 정상회의 의제 를 준비하는 셰르파트랙(Sherpa Track)으로 크게 구분된다. 재무트랙은 재무장관·중앙 은행총재회의, 의장국단회의, 재무차관·중앙은행부총재회의, 실무그룹 회의 등으로 구성 되어 있다. 재무장관·중앙은행총재회의는 의장국의 재무장관과 중앙은행총재가 공동의 장을 수임하며 회원국 재무장관 및 중앙은행총재와 국제기구 및 초청국 대표가 참가한다. 재무장관·중앙은행총재회의는 통상 연 3~4회 개최된다. G20 회의는 법적 구속력이 있는 투표권이나 결의문이 없기 때문에 권고안이나 조치에 대해서는 합의를 도출하는 것이 원 칙이다. 우리나라는 1999년부터 G20 회의에 적극적으로 참여하고 있으며 2010년에는 서울에서 정상회의를 개최한 바 있다.',
  },
  'GDP갭': {
    title: 'GDP갭',
    content: '한 나라의 생산요소인 노동과 자본을 모두 동원(완전고용)하여 달성할 수 있는 최대 수준 의 GDP를 잠재GDP라고 한다. 한편으로는 인플레이션을 가속하지 않으면서 달성 가능 한 최대GDP로 정의하기도 한다. GDP갭은 실제GDP에서 잠재GDP를 뺀 차이로 정의되 는바, 동 수치가 양(+)이면 경제활동이 정상수준을 넘어서 과도한 수준에서 이루어지면서 초과수요가 발생하게 되어 인플레이션이 높아진다. 반대로 GDP갭이 음(-)이면 총수요가 ABC 총공급을 밑돌게 되어 경제활동이 위축되면서 인플레이션도 낮아진다. 참고로 GDP갭률은 GDP갭을 잠재GDP로 나눈 백분율(%)의 값을 가리킨다.',
  },
  'GDP디플레이터': {
    title: 'GDP디플레이터',
    content: '명목GDP를 실질GDP로 나누어 얻어지는 값을 GDP디플레이터라 한다. GDP를 추계할 때는 생산자물가지수(PPI)나 소비자물가지수(CPI)뿐만 아니라 수출입물가지수, 임금 등 각종 가격지수가 종합적으로 활용된다. 따라서 GDP디플레이터는 모든 물가요인을 포괄 하는 가장 종합적인 물가지수라 할 수 있다. 한편 소비, 투자, 수출, 수입 부문별로 명목 GDP를 동일 부문의 실질GDP로 나누면 개별 부문에서의 물가지수(예를 들면 소비디플 레이터, 투자디플레이터 등)를 얻을 수 있다.',
  },
  'Herstatt 리스크': {
    title: 'Herstatt 리스크',
    content: '외환결제과정에 내재된 리스크 중의 하나로서 외환거래 후 매도통화를 지급하였으나 거 래상대방이 파산하여 매입통화를 수취하지 못할 가능성, 즉 원금리스크를 Herstatt 리스 크라고도 부른다. 1974년 6월 26일 오후 3시 30분(프랑크푸르트 시간) 막대한 영업손실 이 발생한 독일의 Herstatt은행에 대해 독일 법원이 파산결정을 내렸는데 당시 이 은행과 외환매매 거래를 한 미국소재 은행들은 독일소재 환거래은행을 통하여 Herstatt은행에 독일 마르크화를 이미 지급하였으나 상대 미국 달러화는 결제지역 간 시차로 인해 아직 수취하지 못한 상태였다. 그러나 독일에서 파산결정이 난 바로 그 시간 뉴욕에서 미국 달 러화 지급이 중지됨에 따라 결국 거래은행들은 미국 달러화를 받지 못하게 되어 큰 손실 을 보게 되었다. 가장 대표적인 원금 리스크 발생 사례로서 이후 외환결제와 관련된 원금 리스크를 Herstatt 리스크라고 부르게 되었다.',
  },
  'IC카드': {
    title: 'IC카드',
    content: 'IC(Integrated Circuit)카드는 신용카드 크기의 플라스틱카드에 마이크로프로세스와 IC 메모리가 내장된 IC칩을 탑재한 카드를 말한다. IC카드는 기존 자기띠(MS; Magnetic Stripe)카드보다 기억용량이 크고 카드 자체에서 연산처리를 통해 정보의 암호화가 가능 하여 보안성이 높다. IC카드는 현금·신용·선불·직불카드 및 전자화폐 등에 이용할 수 있 고, CD/ATM기에서는 IC카드 사용이 의무화 되어 있다. IC카드에 개인정보를 저장해 신 분증 대용으로도 사용할 수 있다. IC카드는 카드에 내장된 IC칩과 카드단말기와의 물리 적인 접촉여부에 따라 접촉식, 비접촉식 및 콤비카드로 구분된다. 접촉식 카드는 칩이 단 말기의 접점에 직접 접촉되었을 때 작동하는 형태이며, 비접촉식 카드는 물리적인 접촉 없이 카드에 내장되어 있는 안테나의 무선주파수를 이용하여 작동하는 형태로 RF(radio frequency) 카드라고도 한다. 콤비카드는 하나의 카드에 접촉식과 비접촉식을 모두 구현 한 카드이다.',
  },
  'IFRS17': {
    title: 'IFRS17',
    content: 'IFRS17은 기존의 IFRS4를 대체하여 적용되고 있는 보험계약에 관한 새로운 국제회계기 준이다. 우리나라의 경우 2023년 1월 1일부터 시행하고 있다. IFRS17에서는 보험부채 평가시 종전 IFRS4에서 보험판매시점의 예상수익률이나 고정이자율을 기준으로 원가 평 가하였던 것을 보고시점별 시장금리와 위험률로 시가 평가한다는 것이 가장 큰 특징이다. 또한 수익의 인식과 관련하여 종전에 현금주의를 기반으로 보험료를 수취할 때 인식하였 던 것을 IFRS17에서는 발생주의로 변경하였다. IFRS17 도입으로 일관성있는 회계처리가 가능하여 보험회사 재무제표의 신뢰성이 제고되는 한편 보험회사와 은행 등 여타 금융회 사 재무제표와의 비교 가능성이 증대된 것으로 평가된다.',
  },
  'IMF 스탠드바이협약': {
    title: 'IMF 스탠드바이협약',
    content: 'IMF 스탠드바이협약(SBA; Stand-By Arrangement)은 국제통화기금(IMF)이 회원국과 체결하는 금융지원계약의 일종으로 회원국이 단기적인 국제수지 불균형이나 외환위기로 급격한 외환부족 사태에 직면하게 되었을 때 IMF로부터 신속하게 자금을 지원받아 경제 ABC 안정에 활용할 수 있도록 하는 제도이다. IMF 회원국은 기본적으로 국제수지 개선을 위해 노력하겠다는 약속만으로 쿼타(quota, IMF에 납입한 자본금)의 25%(reserve tranche) 까지 인출이 가능하지만, 이를 초과하는 융자를 받기 위해서는 IMF와 별도의 스탠드바이 협약을 맺고 이 협약에서 정한 신용공여조건 및 관련 프로그램을 이행하여야 한다. 2025 년 4월 현재 연간으로는 쿼타의 200%까지, 누적으로는 최대 600%까지 지원이 가능하다. 융자 기간은 일반적으로 12~24개월이고 최대 36개월을 넘길 수 없으며 4년 차부터 8분 기에 걸쳐 상환하여야 한다.',
  },
  'IMF 쿼타': {
    title: 'IMF 쿼타',
    content: '국제통화기금(IMF)에 대한 회원국의 출자금으로서 IMF 회원국의 국제수지 불균형 조정 등을 위한 신용공여 재원으로 사용될 뿐 아니라 투표권을 산출하고 IMF 신용 이용한도 와 특별인출권(SDR) 배분규모를 결정하는 기준이 된다. 회원국별 쿼타 산출을 위하여 쿼 타공식(quota formula)을 마련하고 있지만 창설 회원국의 실제 쿼타가 회원국 간 정치 적 협상에 의해 결정됨에 따라 쿼타공식에 의해 산출된 계산 쿼타와 실제 쿼타는 출발부 터 큰 괴리를 보였다. IMF 쿼타의 증액은 일반증액 또는 특별증액으로 이루어지는데 일반 증액은 5년을 초과하지 않는 기간마다 쿼타 정책 전반을 점검하는 일반검토의 결과에 따 른 증액이고, 특별증액은 개별 회원국의 요청에 의한 증액이다. 특별증액의 경우 창설 당 시 지나치게 낮게 책정되었던 일부 국가들의 쿼타를 현실화하기 위해 초기에는 빈번히 이 루어졌으나 1970년대 이후에는 예외적으로만 실시되어 왔다. 이후 신흥시장국의 경제성 장으로 계산 쿼타와 실제 쿼타 간의 괴리가 확대됨에 따라 2006년 9월 이러한 괴리가 두 드러진 한국, 중국, 터키, 멕시코에 대한 특별증액이 이루어진 바 있다. 2023년 IMF 16차 일반쿼타 검토(GQR) 결과, 쿼타 총액은 2025년 말까지 약 7,060억 SDR로 확대될 예정 이며 이에 따라 한국의 쿼타도 약 128억 SDR 수준으로 늘어날 전망이다.',
  },
  'J커브효과': {
    title: 'J커브효과',
    content: '이론적으로 환율이 상승할 경우 수출은 늘어나고 수입은 줄어들어 경상수지가 개선된다. 그러나 현실에서는 초기에 경상수지가 악화되다가 어느 정도의 시간이 지난 후에야 경상 수지가 개선되는 효과가 나타나는데, 이를 J커브효과라고 한다. 이는 환율의 상승으로 경 상수지가 실질적으로 개선되기까지는 어느 정도의 시간이 소요되기 때문이다. 환율 상승 으로 국내 수출품 가격이 하락하더라도 이러한 가격 하락에 대응하여 수출물량이 증가하 기까지는 시간이 걸린다. 이에 따라 단기적으로는 수출가격에 물량을 곱한 수출금액이 오 히려 감소하면서 경상수지가 악화된 후, 수출물량이 증가하면서 수출금액이 늘어나 경상 수지가 개선된다. 이 과정에서 경상수지의 시간에 따른 변화를 그래프로 나타냈을 때 영 문자‘J’처럼 보인다고 하여‘J커브효과’라는 이름이 붙었다.',
  },
  'KIKO': {
    title: 'KIKO',
    content: '환율이 특정 구간(barrier)에 도달하는 경우 옵션이 발효(KI; Knock-In)되거나 소멸(KO; Knock-Out)되는 조건이 부과된 비정형적인 통화옵션 상품이다. 2000년대 중반, 많은 중소기업들이 환율 변동 위험을 헷지하기 위해 KIKO상품을 활용하였다. 그러나 2008 년 금융위기로 환율이 급등하면서 KIKO상품을 활용한 많은 기업들이 도산하였다(키코 사태). 당시 수출기업이 이용하였던 KIKO의 구조는 풋옵션 매입과 콜옵션 매도를 결합하 되, 옵션기간 중 환율이 KI 상한 이상으로 상승하면 콜옵션 매도의무가 발효되고 KO 하 한 이하로 하락하면 풋옵션이 소멸되도록 하였으며, 환헤지에 따른 비용을 절감하기 위하 여 콜옵션의 약정금액을 통상 2배로 하였다. 이에 따라 환율이 KI 상한과 KO 하한 사이 에서 변동하는 경우에는 미리 약정한 환율(또는 시장환율)에 수출대금을 원화로 바꿀 수 있지만, 그 범위를 벗어나면 큰 손실을 볼 수 있다. 기업들은 금융위기 이전 환율이 안정 적일 것으로 예상하고 KIKO를 통해 환위험을 헤지하였으나, 금융위기 발생으로 환율이 급등하면서 KI 상한에 도달하여 콜옵션 매도가 발효되고 KIKO를 이용한 기업들은 대규 모 손실을 보게 되었다.',
  },
  'KP스프레드': {
    title: 'KP스프레드',
    content: 'KP(Korean Paper)는 한국정부, 공기업, 금융기관 등이 해외시장에서 달러화 등 외화로 발행한 채권을 뜻한다. KP 스프레드는 이러한 KP채권 금리와 동일만기 미국 국채 금리간 의 차이를 의미하며, 한국계 채권에 내재된 신용위험, 유동성 프리미엄 등을 반영하는 지 표로 활용된다.',
  },
  'MOVE': {
    title: 'MOVE',
    content: 'MOVE(Merrill Lynch Option Volatility Estimate)는 미국 채권시장의 단기 변동성에 대한 시장의 기대치를 나타내는 지수로, BoA메릴린치가 발표한다. MOVE는 미국 국채의 1개월 만기 옵션의 변동성을 기초로 하여 산출되며, 대상이 되는 미국 국채 금리는 2년물, 5년물, 10년물, 30년물이다. MOVE가 급등하면 미국 국채 금리의 변동성이 커져서 금리 예측이 어려워지고, 미 연준의 통화정책이나 경기 전망에 대해 불확실성이 커졌다는 신호 이며, 신용시장 경색, 안전자산 선호 증가로 이어질 수 있다. 일반적으로 MOVE가 100이 상이면 채권시장이 불안정하다는 신호로 해석된다. VIX가 주식시장의 공포지수로 불리는 것처럼 MOVE는 채권시장의 공포지수로 불린다.',
  },
  'N-B SRS': {
    title: 'N-B SRS',
    content: '은행간 상호연계성을 통해 전염되는 시스템 리스크를 측정하는 지표로, Network-Based Systemic Risk Scoring의 약자이다. 동 지표는 특정 은행의 도산 확률(은행채 스프레드 로 추정)이 여타 은행과의 상호거래 익스포저를 통해 확대되어 나타나는 리스크 총량으로 서 거래관계에 있는 두 은행의 도산 확률과 상호거래 규모를 곱한 값을 모든 거래조합에 대해 산출 후 합산한 값의 제곱근으로 정의한다(Das, “Matrix Metrics: Network-Based Systemic Risk Scoring”, 2015를 참조).',
  },
  'NFC(Near Field Communication) 기술': {
    title: 'NFC(Near Field Communication) 기술',
    content: 'NFC(Near Field Communication) 기술은 근거리 무선 통신 기술로, 통상 10cm 이 내의 짧은 거리에서 기기간 무선 데이터 통신을 가능하게 하는 기술이다. RFID(Radio Frequency IDentification) 기술을 기반으로 전자기 유도를 통해 데이터를 송수신하 며, 블루투스와 달리 별도의 페어링 과정 없이 기기를 가까이 대는 것만으로 통신이 가능 하다. 이에 따라 간편하고 근거리 작동으로 보안성이 높은 방식으로 받아들여지고 있다. NFC 기술의 주요 활용 분야로는 모바일 결제, 교통카드, 출입 통제, 기기 간 빠른 페어링 (블루투스 이어폰 등), 그리고 최근에는 마케팅 및 인증 분야를 들 수 있다. 우리나라에서 도 모바일 지급뿐 아니라 교통카드, 모바일 신분증(모바일 운전면허증 등), 간편 태그를 통한 정보 공유, 스마트 홈 기기 제어 등 다양한 분야에서 NFC 기술이 활용되고 있다.',
  },
  'Nowcasting': {
    title: 'Nowcasting',
    content: '“Now”와 “Forecasting”의 합성어로 현재 또는 가까운 미래의 경제 상황을 실시간 또는 매 우 짧은 시차로 추정하는 기법을 말한다. 즉 나우캐스팅을 통해 GDP, 소비, 생산 등의 경제 상태를 가능한 빠르게 판단하여 경제정책 결정, 기업 전략 수립 등에 활용하게 된다. 나우캐 스팅이 필요한 이유는 GDP, 실업률 등 많은 경제 지표가 일정 기간이 경과한 후에야 발표되 어 대응이 늦어질 수 있기 때문이다. 나우캐스팅은 실시간 또는 짧은 시차로 데이터 입수가 가능한 카드 결제액, 전기 사용량, 교통량, 항공 승객 수, 소비자심리지수, 재고 지표 등을 활 용하게 되며 머신러닝, AI, 고빈도 데이터 분석 기술의 발달로 더욱 빠르게 발전하고 있다.',
  },
  'OIS': {
    title: 'OIS',
    content: 'OIS는 Overnight Index Swap의 약자로 금융기관 간에 단기 변동금리와 고정금리를 일 정 기간(주로 1일) 동안 서로 교환하는 금리스왑 계약을 말한다. 변동금리는 미 연준의 연방기금금리(Fed Funds Rate)나 한국의 콜금리와 같이 주로 익일물에 연동된다. OIS는 주로 금융기관이 단기금리 변동에 따른 위험을 헤지하기 위해 활용하는 수단이다. OIS의 계약 당사자들은 원금의 교환 없이 변동금리와 고정금리의 차액만을 정산한다.',
  },
  'P2P대출': {
    title: 'P2P대출',
    content: 'P2P대출(Peer-to-Peer Lending)은 온라인상에서 자금공급자(투자자)와 자금수요자 (차입자) 간 전통적인 금융회사의 중개 없이 자금중개가 이뤄지는 금융활동의 하나이다. P2P(peer-to-peer)는 원래 인터넷망을 통해 개인 간에 자신의 음악·동영상·사진 등의 파일을 공유하는 서비스인데 이 개념을 금융에 접목한 것이다. 초기에는 개인 사이의 대 출 중개에 집중하였으나 최근에는 기업에 대한 대출 중개 및 다른 금융서비스 제공까지 그 업무영역을 확장하고 있다. 이러한 대출 형태는 나라마다 조금씩 차이가 있는데 미국 의 경우 P2P대출 중개업자는 온라인으로 대출을 신청한 차입자의 관련 어음(notes)을 산 업대부회사(ILC; Industrial Loan Company)로부터 매입하여 투자자에게 제공한다. 증 권거래위원회(SEC)가 이 어음을 ‘증권’(securities)으로 해석하여 규제하고, 투자자는 이 증권을 유통시장에서 매도하여 중간에 투자금액을 회수할 수도 있다. 이에 기관투자가까 지도 투자자로 참여함에 따라 P2P대출은 시장형 대출(marketplace lending)로도 표현 된다. 반면 영국의 경우 소비자신용업이 가능한 P2P대출 중개업자가 투자자들에게서 모 금한 자금을 차입자에게 ‘대출금’으로 집행하므로 미국의 ILC같은 여신금융기관은 별도 로 없다. 그래서 금융행위감독청(FCA)이 중개업자들의 자본건전성을 규제한다. 우리나라 의 경우 대체로 ‘P2P대출정보’중개업자는 자회사인 대부업체로부터 매입한 ‘원리금수취 권리’를 투자자에게 매도하고, 대부업체에게서 대출받은 차입자가 원리금을 상환하면, 이 것이 다시 투자자에게 돌아간다. 그래서 대부업관련 법률을 적용받는다. 금융위원회는 투 자자·차입자 등을 보호하기 위해 ‘P2P대출 가이드라인’(2017.2.27)을 도입하여 개인당 P2P대출정보 중개업자별 투자한도(1천만원) 설정, P2P업체 자산과 투자자 예치금의 분 리 예치, 과장광고 금지 등의 규제를 시행하였으며 최근에는 「온라인투자연계 금융업 및 이용자 보호에 관한 법률」이 2025년 8월 27일부터 시행될 예정임에 따라, 기존의 가이드 라인도 동 법령과 연계해 일부 개정 및 확대 적용될 예정이다.',

  'P-CBO(Primary Collateralized Bond Obligation)': {

    content: 'P-CBO는 회사채 시장이 위축되거나 기업의 신용등급이 낮아 회사채를 직접 발행하기 어 려운 경우에 이들 기업의 회사채를 모아(pooling) 하나의 자산으로 유동화한 후 신용보증 기금 등 공공기관의 선순위 증권에 대한 지급보증을 통해 발행된 증권을 말한다. 이는 이 미 유통 중인 채권을 담보로 하여 발행되는 Secondary-CBO와 구분된다. 우리나라에서 는 2007년 P-CBO 발행 제도가 도입되었으며 경기위축이나 자금시장 경색시 중소·중견 기업들의 자금조달 지원에 자주 활용되고 있다.',

  'Treasury Bill(T/B)': {
    title: 'Treasury Bill(T/B)',
    content: 'Treasury Bill(T/B)은 미국 재무성이 발행하는 만기 4주(1개월), 13주(3개월), 26주(6 개월), 52주(1년) 등 1년 이하의 단기국채로서 이자지급이 없는 할인채(zero coupon bond)의 형태로 발행된다. 단기금융시장의 여타 투자대상보다 수익률은 다소 낮지만, 대 부분의 주에서 이자소득에 대한 주세(州稅)가 면제되며, 사실상 무위험(risk-free) 자산이 고 공급량도 많은 데다 상환기간도 다양하여 단기금융시장(money market)에서 투자자 들에게 가장 안전하고 유동성이 높은 투자수단의 하나로 이용되고 있다. T/B의 유통은 이 자의 지급 없이 발행 당시에 할인되었던 가격으로 매매되고, 만기에 액면가격을 지급받는 방식으로 이루어진다. 금융시장의 조건에 의해 할인율이 결정되므로 T/B의 할인율은 시 장금리를 나타내는 지표로 이용되며, 여타 채권의 벤치마크 기능, 위험헤지 수단, 국제채 권시장 동향지표 등으로 널리 활용되고 있다. T/B 이외의 미국 정부채로는 T-Notes(2∼ 10년), T-Bonds(20∼30년), 물가연동채(TIPS), 변동금리채(FRN) 등이 있다. ABC VAN사업자 통신사업자로부터 회선을 대여 받아 고도의 통신처리기능으로 부가가치를 높여 서비스 를 제공하는 통신회사를 말한다. 부가가치 통신망(VAN; Value Added Network)의 본 래 의미는 전화 또는 텔렉스통신 서비스 기능을 첨가한 데이터 통신망을 지칭하는 개념 으로 창출되는 부가가치는 일반적으로 프로토콜, 부호, 형태, 미디어, 속도 등의 변환을 전송에 부가하여 행하는 통신처리에 있다. 지급결제분야에서 VAN사업자는 부가가치 통 신망을 이용하여 금융회사 또는 전자금융회사를 위하여 전자금융거래를 보조하는 업무 를 하거나 결제중계시스템을 운영하는 자를 말하며 신용카드 VAN사업자가 대표적이다. 신용카드 VAN사업자는 신용카드 가맹점에 단말기를 구축하고 통신망을 통해 신용카드 거래의 승인 및 조회, 매출전표의 수집 및 청구 대행 등 신용카드 지급과 관련된 다양한 부수업무를 하는 회사를 말한다. 가령 신용카드 거래가 발생하면 VAN사업자는 거래 승 인을 위해 신용카드사에 거래내역을 전송하고 승인 및 조회결과를 수신한 후 이를 가맹 점에 전송한다. 또한 VAN사업자는 가맹점이 신용카드사에 전표를 제출하여 대금을 청 구하는 업무를 대신하기 위하여 가맹점을 방문하여 전표실물을 수거하거나 전표 데이터 를 수집한다.',

  '채권의 가격과 금리': {
    title: '채권의 가격과 금리',
    content: `지난 2023년 3월, 미국 실리콘밸리은행(SVB)이 파산하는 충격적인 사태가 일어났어요. 많은 돈을 대표적 안전자산인 미국 국채에 투자했는데, 국채 가격이 이례적으로 빠르게 하락한 탓이 컸다고 해요. 왜 갑자기 이런 가격 급락 현상이 발생한 걸까요?

국채 가격이 급락한 건 국채의 '금리'가 급등했기 때문이었어요. 채권 금리와 가격은 반대로 움직이거든요.

채권 금리는 돈을 빌릴 때 정하는 이자율이라고 생각할 수 있어요. 채권 금리는 정말 다양한 시장 상황에 영향을 받아요. 지난해처럼 각국 중앙은행들이 기준금리를 올릴 때라면 채권 금리가 자연스럽게 높아져요. 기준금리 인상에 따라서 예금이나 대출 금리가 모두 오르니 새로 발행되는 채권의 금리 수준도 높아질 수밖에 없어요.

이러면 기존에 발행했던 채권들은 어떨까요? 함께 금리가 올라갈까요? 아니에요. 이미 몇 년 동안 몇 퍼센트의 이자율을 적용하기로 약속을 했거든요. 그래서 금리는 그대로예요. '새롭게 발행되는 채권'의 금리 수준이 높아지는 거죠.

기존에 발행한 채권들의 금리는 그대로이지만, 이 채권들이 시장에서 거래되는 가격은 하락해요. 투자자들은 새로 발행되는 금리 높은 채권을 사려고 하기 때문이에요. 금리 5%짜리 채권이 새로 발행되는 판에 금리가 3%인 채권을 제값 주고 사려는 사람은 없겠죠.

그래서 '채권의 금리와 가격은 반대로' 움직인다고 표현해요. (새로 발행되는 채권의) 금리가 오르면 이미 발행된 채권을 거래하는 시장에서 가격 하락으로 나타나는 거예요.`,

// =====================================================

function getDef(term) {
  if (defCache[term] !== undefined) return defCache[term];
  const d = DEFS[term] || null;
  defCache[term] = d;
  return d;
}

// =====================================================
// 필터링

function getFiltered() {
  let list = [...TERMS];
  if (currentCat !== 'all') list = list.filter(t => t.category === currentCat);
  if (currentAlpha) {
    list = list.filter(t => getInitial(t.term) === currentAlpha);
  }
  if (searchQ) {
    const q = searchQ.toLowerCase();
    list = list.filter(t => {
      if (t.term.toLowerCase().includes(q)) return true;
      const def = getDef(t.term);
      if (def && def.content && def.content.toLowerCase().includes(q)) return true;
      return false;
    });
  }
  if (sortMode === 'alpha') {
    list.sort((a,b) => a.term.localeCompare(b.term, 'ko'));
  } else if (sortMode === 'id-asc') {
    list.sort((a,b) => a.id - b.id);
  } else {
    list.sort((a,b) => b.id - a.id);
  }
  return list;
}

function esc(s) { if (!s) return ''; return String(s).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

function highlight(text, q) {
  if (!q) return esc(text);
  const safe = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return esc(text).replace(new RegExp('(' + esc(safe) + ')', 'gi'), '<mark>$1</mark>');
}

function highlightContent(text, q) {
  if (!q || !text) return '';
  const safe = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return text.replace(new RegExp('(' + safe + ')', 'gi'), '<mark>$1</mark>');
}

// 카드 그리드 렌더링
// =====================================================
function renderGrid() {
  sortMode = document.getElementById('sortSel').value;
  filtered = getFiltered();
  const grid = document.getElementById('grid');
  const total = filtered.length;
  document.getElementById('rcnt').innerHTML =
    searchQ
      ? `<strong>"${esc(searchQ)}"</strong> 검색 결과 <strong>${total}</strong>개`
      : `<strong>${total}</strong>개 용어`;

  if (!total) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><h3>검색 결과가 없어요</h3><p>다른 검색어나 필터를 시도해 보세요</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map((t, i) => {
    try {
      const catLabel = CAT_LABELS[t.category] || t.category;
      const nameHl = highlight(t.term, searchQ);
      const def = getDef(t.term);
      let snippetHtml = '';
      let hasDef = false;
      if (def && def.content) {
        hasDef = true;
        const rawSnippet = def.content.replace(/[\r\n]+/g, ' ').trim().slice(0, 90);
        snippetHtml = searchQ ? highlightContent(esc(rawSnippet), esc(searchQ)) : esc(rawSnippet);
        if (rawSnippet.length >= 90) snippetHtml += '…';
      }
      return `<div class="card card--${t.category}" onclick="openModal(${i})" title="${esc(t.term)}">
        <div class="card-head">
          <div class="card-terms"><div class="card-name">${nameHl}</div></div>
          <span class="badge badge--${t.category}">${catLabel}</span>
        </div>
        <div class="card-snippet${hasDef ? '' : ' no-def'}">${hasDef ? snippetHtml : '정의 준비 중'}</div>
        <div class="card-foot">
          ${hasDef ? '<span class="def-dot" title="정의 있음"></span>' : ''}
          <span class="card-date">${t.date || ''}</span>
        </div>
      </div>`;
    } catch(e) {
      return `<div class="card card--${t.category||'society'}" onclick="openModal(${i})">
        <div class="card-head"><div class="card-terms"><div class="card-name">${esc(t.term)}</div></div></div>
        <div class="card-snippet no-def">정의 준비 중</div>
        <div class="card-foot"><span class="card-date">${t.date||''}</span></div>
      </div>`;
    }
  }).join('');
}

// =====================================================
// 카테고리 & 초성 네비
// =====================================================
function renderCatNav() {
  const nav = document.getElementById('catNav');
  const cats = [['all','전체'], ...Object.entries(CATS)];
  nav.innerHTML = cats.map(([k,v]) => {
    const cnt = k === 'all' ? TERMS.length : TERMS.filter(t => t.category === k).length;
    return `<button class="cat-btn${currentCat===k?' active':''}" onclick="setCat('${k}')">${v} <span style="opacity:.55;font-size:11.5px">${cnt}</span></button>`;
  }).join('');
}

function setCat(cat) {
  currentCat = cat;
  currentAlpha = '';
  renderCatNav();
  renderGrid();
}

function getInitial(term) {
  const first = term.replace(/^[^가-힣A-Za-z0-9]/, '')[0] || '';
  if (/[A-Za-z]/.test(first)) return first.toUpperCase();
  const code = first.charCodeAt(0) - 0xAC00;
  if (code < 0) return '';
  const choList = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  return choList[Math.floor(code / (21 * 28))] || '';
}

function renderAlphaNav() {
  const nav = document.getElementById('alphaNav');
  const KO = ['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  const EN = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

  // 현재 카테고리 기준으로 실제 존재하는 초성 집합 계산
  const baselist = currentCat === 'all' ? TERMS : TERMS.filter(t => t.category === currentCat);
  const available = new Set(baselist.map(t => getInitial(t.term)).filter(Boolean));

  nav.innerHTML = `<span class="alpha-label">초성</span>` +
    [...KO, ...EN]
      .filter(a => available.has(a))
      .map(a => `<button class="alpha-btn${currentAlpha===a?' active':''}" onclick="setAlpha('${a}')">${a}</button>`)
      .join('') +
    `<span class="alpha-sep"></span><button class="alpha-btn alpha-reset" onclick="setAlpha('')">전체</button>`;
}

function setAlpha(a) {
  currentAlpha = a;
  renderAlphaNav();
  renderGrid();
}

// =====================================================
// 검색
// =====================================================
const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', function() {
  searchQ = this.value.trim();
  const scBtn = document.getElementById('scBtn');
  scBtn.style.display = searchQ ? 'flex' : 'none';
  // 검색어 입력 시 초성·카테고리 필터 자동 해제
  if (searchQ) {
    currentAlpha = '';
    renderAlphaNav();
  }
  renderGrid();
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') clearSearch();
});

function clearSearch() {
  searchInput.value = '';
  searchQ = '';
  document.getElementById('scBtn').style.display = 'none';
  renderGrid();
  searchInput.focus();
}

// =====================================================
// 모달
// =====================================================
function openModal(idx) {
  modalIdx = idx;
  const t = filtered[idx];
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  // 위치 표시
  document.getElementById('mPos').textContent = `${idx + 1} / ${filtered.length}`;
  document.getElementById('mPrev').disabled = idx <= 0;
  document.getElementById('mNext').disabled = idx >= filtered.length - 1;

  // 제목
  document.getElementById('mName').textContent = t.term;

  // 메타 (카테고리 + 날짜 + 복사 버튼)
  document.getElementById('mMeta').innerHTML =
    `<span class="badge badge--${t.category}">${CATS[t.category] || t.category}</span>` +
    (t.date ? `<span class="modal-date">${t.date}</span>` : '') +
    `<button class="modal-copy" id="copyBtn" onclick="copyTerm()">
      <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke-linecap="round"/></svg>
      복사
    </button>`;

  // URL 해시 업데이트
  history.replaceState(null, '', '#' + encodeURIComponent(t.term));

  // 본문
  const bd = document.getElementById('mBd');
  const def = getDef(t.term);

  if (def && def.content) {
    // 단락 분리 렌더링
    const paragraphs = def.content.split(/\n{2,}/).map(p => p.trim()).filter(Boolean);
    const contentHtml = paragraphs.length > 1
      ? paragraphs.map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('')
      : `<p>${def.content.replace(/\n/g,'<br>')}</p>`;
    bd.innerHTML = `<div class="def-content">${contentHtml}</div>`;
  } else {
    bd.innerHTML = `
      <div class="def-no-content">
        <div class="dni">📋</div>
        <h4>정의 준비 중</h4>
        <p>이 용어의 정의는 아직 등록되지 않았어요.</p>
      </div>`;
  }

  // 모달 스크롤 초기화
  document.getElementById('modal').scrollTop = 0;
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
  history.replaceState(null, '', location.pathname);
}

function overlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function navModal(dir) {
  const next = modalIdx + dir;
  if (next >= 0 && next < filtered.length) openModal(next);
}

// 복사 기능
function copyTerm() {
  const t = filtered[modalIdx];
  const def = getDef(t.term);
  const text = def ? `【${t.term}】\n\n${def.content}` : t.term;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    if (!btn) return;
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5" stroke-linecap="round" stroke-linejoin="round"/></svg> 복사됨`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke-linecap="round"/></svg> 복사`;
    }, 2000);
  }).catch(() => {});
}

// 키보드 단축키
document.addEventListener('keydown', e => {
  const isOpen = document.getElementById('overlay').classList.contains('open');
  if (e.key === 'Escape') { if (isOpen) closeModal(); }
  if (isOpen) {
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); navModal(-1); }
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); navModal(1); }
  }
  // '/' 키로 검색창 포커스
  if (!isOpen && e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
  }
});

// =====================================================
// 스크롤 TOP
// =====================================================
window.addEventListener('scroll', () => {
  document.getElementById('goTop').classList.toggle('vis', scrollY > 500);
}, {passive: true});

// =====================================================
// URL 해시로 직접 용어 열기
// =====================================================
function openFromHash() {
  const hash = decodeURIComponent(location.hash.slice(1));
  if (!hash) return;
  const idx = filtered.findIndex(t => t.term === hash);
  if (idx >= 0) openModal(idx);
}

// =====================================================
// 초기화
// =====================================================
function init() {
  document.getElementById('totalCount').textContent = TERMS.length;
  renderCatNav();
  renderAlphaNav();
  renderGrid();
  openFromHash();
}

init();
</script>
</body>
</html>

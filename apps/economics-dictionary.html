  '외환스왑거래': {
    title: '외환스왑거래',
    content: '외환스왑거래란 거래당사자들이 현재의 계약환율에 따라 서로 다른 통화를 교환하고 일 정 기간 후 최초 계약 시점에서 정한 선물환율에 따라 원금을 재교환하는 거래를 말한다. 즉 외환스왑거래는 동일한 거래상대방 간에 현물환과 선물환 또는 만기가 상이한 선물환 과 선물환, 현물환과 현물환을 서로 반대 방향으로 동시에 매매하는 거래를 의미하며 스 왑기간 중 이자 지급은 없으나 계약 시 통화 간 이자율 차가 반영되어 만기 시 환율이 산 정된다. 외환스왑거래에 있어 매입·매도는 원일물(far date)거래를 기준으로 구분된다. 예를 들면 우리나라에서 외환스왑 매입은 달러화를 기준으로 근일물을 매도하고 원일물 을 매입하는 sell&buy swap거래를 말하며 외환스왑 매도는 근일물을 매입하고 원일물 을 매도하는 buy&sell swap거래를 의미한다. 외환스왑의 거래동기를 보면 자금조달, 환 리스크의 관리, 결제일의 조정, 금리차익 획득 및 금리변동을 이용한 투기적 거래 등의 목적으로 나누어 볼 수 있다.',
  },
  '외환시장': {
    title: '외환시장',
    content: '외환시장은 좁은 의미에서 외환의 수요와 공급이 연결되는 장소를 말하나 넓은 의미에서 는 이러한 장소적 개념뿐 아니라 외환거래의 형성, 결제 등 외환거래가 정기적 또는 지속 적으로 이루어지는 일련의 메커니즘을 포괄한다. 외환시장은 기본적으로 서로 다른 통화 로 표시된 지급수단의 매매가 이루어지는 시장(market for means of payments)으로서 외화자금의 대차가 이루어지는 외화자금시장과는 그 성격을 달리한다. 외환시장에서의 서로 다른 통화 간의 매매는 기본적으로 상품과 용역 그리고 금융자산의 매매거래에 수반 하여 일어나기 때문에 이들 외환거래는 기본적으로 지급 메커니즘의 한 과정으로 이해할 수 있다. 따라서 각국의 금융시장이나 유로금융시장에서 이루어지는 서로 다른 통화로 표 시된 금융거래는 외환시장의 거래와 연계되어 이루어진다. 오늘날 국제외환시장은 세계 주요 외환시장의 거래를 24시간 연계시키면서 모든 시장정보를 환율에 신속하게 그리고 지속적으로 반영하는 하나의 범세계적 시장으로서의 기능을 수행하면서 국제금융거래의 효율화를 촉진하고 있다.',
  },
  '외환전산망': {
    title: '외환전산망',
    content: '1997년 외환위기 이후 우리나라가 주식·채권시장을 전면 개방하고 외국인직접투자도 전 면 허용하는 등 외환거래 자유화조치를 취함에 따라, 국외 여건 변화에 따른 빈번한 외자 유출입 등으로 우리 경제의 변동성이 확대될 가능성이 크게 높아졌다. 이러한 위험에 효 과적으로 대처할 수 있도록 외환거래 정보를 집중하고 이용할 수 있는 인프라의 구축필 요성이 제기됨에 따라 정부는 1999년 3월 한국은행을 외환정보집중기관으로 지정하였 고, 한국은행은 1999년 4월 외환거래 및 시장정보를 신속하게 수집·분석할 수 있는 외환 정보시스템(FEIS; Foreign Exchange Information System, 이하 ‘외환전산망’)을 구축 하였다. 외환전산망에는 외국환업무취급기관들이 실행한 외환거래 관련 통계 등 정보가 집중되며 한국은행은 이를 취합하여 기획재정부, 금융위원회, 국세청, 관세청, 금융정보 분석원, 금융감독원 등 여러 이용기관들에게 신속하게 제공하고 있다. 한국은행은 외환전 산망 자료를 활용해 국내외 외화자금 유출입 동향 등에 대한 신속한 모니터링과 시장안정 을 위한 대응방안 마련, 국제수지·외채 등 주요 외환통계의 작성, 각종 불법적인 외환거래 조사 등의 업무를 수행하고 있다.',
  },
  '요소비용': {
    title: '요소비용',
    content: '국민소득을 평가하는 데는 두 가지 방법이 있다. 하나는 시장가격에 의한 평가이고 다른 하나는 요소비용(Factor Cost)에 의한 평가이다. 시장가격이란 상품이 시장에서 실제로 거래되고 있는 가격을 말하는 것으로서 여기에는 순생산 및 수입세(생산 및 수입세-보조 금)가 포함되어 있다. 생산 및 수입세란 부가가치세나 특별소비세 등과 같이 우리가 상품 을 살 때 상품가격에 포함되어 있는 세금을 말하며 보조금이란 기업이 상품을 만들 때 정 부가 그 상품의 생산을 장려하기 위하여 생산비용 중 일부를 무상으로 제공해 주는 것을 말한다. 요소비용이란 시장가격에서 이와 같은 순생산 및 수입세를 공제한 것으로서 결 국 그 상품을 만드는 데 들어간 생산요소에 대한 대가인 피용자보수와 영업잉여의 합계를 말한다. 이와 같이 생산의 요소비용을 측정하는 목적은 주로 투입된 생산요소의 생산성을 정확히 측정하는 데 있다.',
  },
  '요소비용 국민소득': {
    title: '요소비용 국민소득',
    content: '요소비용에 의한 국민소득(NI at factor cost)은 통상 국민소득(NI)이라 불리며 한 나라 의 국민이 제공한 생산요소에서 발생한 소득의 총액, 즉 노동에 대한 대가인 피용자보수 와 토지, 자본, 경영에 대한 대가인 영업잉여의 합계로서 고정자본소모와 순생산 및 수 입세가 포함되지 않으므로 한 나라 국민이 벌어들인 순수한 소득을 나타내는 지표이다. 요소비용에 의한 국민소득 = 시장가격에 의한 국민소득 - 생산 및 수입세 + 보조금 = 피용자보수 + 영업잉여의 관계가 성립한다.',
  },
  '우발부채(채무)': {
    title: '우발부채(채무)',
    content: '과거에 발생한 원인은 있으나 채무의 확정이 미래 불확실한 사건의 발생 여부에 달려있는 잠재적 의무를 의미한다. 또한 현재의무라고 하더라도 이를 이행하기 위해 경제적 가치가 있는 자원을 지출할 가능성이 높지 않거나 지출 가액을 신뢰성 있게 측정할 수 없는 경우 도 포함한다. 예를 들면 대출약정, 지급보증, 계류 중인 소송사건 등이 이에 속한다. 즉 우 발채무는 지급가능성, 채권자, 지급시기, 금액 등 불확실한 요소가 많기 때문에 재무제표 에서 부채로 반영하지 않고 주석으로 기재한다. 우발부채(채무)는 매입채무, 차입금 등과 같이 채권자·지급시기·금액이 정해진 확정부채가 아니지만, 퇴직급여충당금 등 충당부채 와 유사하다고 볼 수 있다. 그러나 충당부채는 결산일에 기업이 부담해야 할 의무가 명백 히 존재하고 금액을 합리적으로 추정할 수 있다는 점에서 우발부채와는 확실하게 차이가 있다. 예를 들면 법원에 계류 중인 소송사건의 패소가능성은 우발채무에 속한다.',
  },
  '우발전환사채(코코본드)': {
    title: '우발전환사채(코코본드)',
    content: '우발전환사채(Contingent Convertible Bond)는 발행기관이 경영개선명령을 받거나 부 실금융기관으로 지정될 경우 상각되거나 보통주로 전환되는 조건이 부가되어 있는 채권 (조건부자본증권)을 말한다. 이러한 조건이 실현될 경우 코코본드는 강제로 상각되거나 주식으로 전환되기 때문에 발행기관의 채무부담은 줄어들고 자본은 확충된다. 채권이 상 각될 경우 투자자가 원금손실을 입게 되는 위험을 반영하여 코코본드의 발행금리는 일반 회사채보다 다소 높게 형성된다. 최근 코코본드의 발행이 늘어난 것은 공급측면에서 무엇 보다 바젤Ⅲ 시행에 따른 은행권의 자본확충 필요성이 증가한 데 기인한다. 바젤Ⅲ에서 는 금융기관 자본의 인정요건을 종전보다 강화하였는데, 특히 후순위채권 등에 대해서는 유사시 주식으로 전환되거나 상각되는 조건부자본 요건을 추가로 충족하도록 요구하고 있다. 바젤Ⅲ 규제 하에서 금융기관 입장에서는 코코본드를 발행하게 되면 자본이 증가 해 건전성지표인 자기자본비율이 개선되는 효과가 있다. 수요측면에서 보면, 코코본드는 지속되는 저금리 상황에서 일반 채권보다 금리가 높은 데다 이자지급이 보장되는 후순위 채 위주로 발행됨에 따라 투자메리트가 높은 편이다. 코코본드 발행은 유사시 손쉽게 자 본을 확충하는 이점이 있으나 발행기관의 자본조달비용을 증가시키는 효과도 있으므로 적정수준에서 관리될 필요가 있다.',
  },
  '운영리스크': {
    title: '운영리스크',
    content: '부적절하거나 잘못된 내부 프로세스(internal process), 인력, 시스템, 외부사건(external events) 등으로 인해 발생할 수 있는 손실 가능성을 말한다. 운영리스크(Operational Risk) 발생요인으로는 인력과 관련해서 인적 자원의 부족, 부적절한 직원, 교육 미실시, 실수 또는 의사소통상 오해 등이 있다. 프로세스와 관련해서는 부적절한 업무 분장, 과도 한 업무강도·과다한 업무량, 취약하거나 잘못된 프로세스, 복잡한 거래처리능력 부족 등 이 있다. 시스템과 관련해서는 시스템 장애, 취약한 시스템 설계, 데이터 보안구조 결함, 프로그램 오류 작동 등이 있다. 외부사건과 관련해서는 자연재해, 테러, 전쟁, 시설장애, 파업·데모·업무중단, 외부인의 범죄, 사기, 횡령, 경제환경 및 외부규제 등이 있다. 운영리 스크의 결과로 발생가능한 손실에는 기업가치의 저하, 청구권손실, 손해배상, 법적지불책 임, 규제조치, 자산손실 등이 있다.',
  },
  '워싱턴 컨센서스': {
    title: '워싱턴 컨센서스',
    content: '1990년대 미국이 중남미 국가들에 대해 제시하였던 미국식 시장경제체제의 확산 전략 을 뜻하며 미국이 주도하는 신자유주의의 대명사로도 인식되고 있다. 이 용어는 1989년 미국 국제경제연구소의 정치경제학자 존 윌리엄슨이 당시 경제위기로 어려움을 겪고 있 던 중남미 국가들에 대한 개혁 처방을 워싱턴 컨센서스(Washington Consensus)로 명 명한 데서 유래하였고 1990년대 초 미국의 재무부, 국제통화기금(IMF), 세계은행(World Bank) 등 미국 워싱턴에 있는 기관들의 논의를 거치면서 그 개념이 정립되었다. 워싱턴 컨센서스는 개발도상국, 체제전환국, 제3세계 국가들이 시행해야 할 구조조정 정책으로 서 정부예산 삭감, 자본시장 자유화, 외환시장 개방, 관세 인하, 국가 기간산업 민영화, 외국자본에 의한 국내기업 합병ㆍ매수 허용, 정부 규제 축소, 재산권 보호 등을 제시하고 있다. 실제로 이러한 정책들은 동구 사회주의국가의 체제 전환과 1990년대 후반 아시아 의 외환위기 극복과정에서 채택되었다. 워싱턴 컨센서스에 대해서는 세계의 경제시스템 을 미국의 자본과 기업이 진출하기 쉽게 만들어 미국의 이익을 증진시키기 위한 것이라는 비판도 있다.',
  },
  '원금리스크': {
    title: '원금리스크',
    content: '외환결제리스크 중 가장 대표적인 리스크로 매도통화를 이미 지급하였거나 매도통화의 지급을 취소할 수 없는 상황에서 거래상대방이 파산하는 경우 매입통화를 전액 수취하지 못하는 리스크를 원금리스크(Principal Risk)라고 한다. 환거래가 양방향으로 일어난다는 점과 주로 국경을 넘어 발생한다는 특성으로 인하여 매입통화와 매도통화의 결제가 동시 에 이루어지지 않기 때문에 원금리스크가 발생하게 된다.',
  },
  '원금이자분리채권(STRIPS)': {
    title: '원금이자분리채권(STRIPS)',
    content: '이표채의 원금과 미래의 이자금액을 분리하여 각각 무이표채(zero coupon bond)의 형 태로 거래할 수 있는 채권을 말한다. 즉 채권의 원금과 이자를 분리하여 거래할 수 있는 채권이다. 만기에 한 번의 현금흐름만을 가지고 있기 때문에 이표채 채권에서 발생하는 재투자 위험이 제거되어 투자시점에서 확정 수익률을 보장받을 수 있으며 한 종목의 이표 채가 원금이자분리채(STRIP; Separate Trading of Registered Interest and Principal of Securities)를 통해 다양한 만기의 무이표채로 전환됨에 따라 연기금, 보험 등 주요 기 관투자가의 장기 무이표채에 대한 수요를 충족시킬 수 있다. 그리고 이표채권과 현금흐름 이 동일한 원금이자분리채권 포트폴리오 간의 가격차이를 이용한 차익거래가 가능해진다. 다양한 만기와 수익률을 형성하게 되어 채권시장에 유동성을 증가시킬 수 있고 분리했을 때 각 채권 가치의 합과 재결합 상품 가치와의 차이에 의해 차익거래가 가능해 투자나 거 래기법의 향상을 도모할 수 있다. 보통 원금부분을 P-STRIP, 이자부분을 C-STRIP이라 고 한다.',
  },
  '원/위안 직거래시장': {
    title: '원/위안 직거래시장',
    content: '원/위안 직거래시장은 달러를 매개로 하지 않고 원화를 위안화로, 위안화를 원화로 바로 환전할 수 있는 시장을 의미한다. 2014년 7월 한·중 정상이 양국 간 자국 통화 거래를 활 성화하는 것이 서로에게 이익이 된다는 데 인식을 같이하고 한ㆍ중 무역 및 금융거래에 서 위안화 활용도를 제고하기 위한 정책과제의 하나로 원/위안 직거래시장을 개설하기로 합의함에 따라 서울외환시장 운영협의회를 중심으로 중개시스템 개발, 시장조성자 제도 도입 등을 추진하여 2014년 12월 원/위안 직거래시장을 공식 개설하였다. 또한 2015년 10월 양국 정상회담을 통해 상하이 원/위안 직거래시장을 조속한 시일 내에 개설하기로 합의하였고 이에 따라 2016년 6월 27일 상하이 원/위안 직거래 시장이 개설되었다. 원/ 위안 직거래시장은 우리 경제 전반에 다양한 경제적 효과를 미친다. 우선 기업 등 고객은 미달러화의 매개 없이 원화와 위안화를 직거래함으로써 환전수수료 등 거래비용을 절감 할 수 있다. 결제통화 다변화를 통해 미달러화 의존도가 낮아질 경우 미달러화 자금사정 에 대한 우리경제의 민감도를 낮출 수 있다. 원/위안 직거래시장은 개설 이후 높은 관심과 시장조성은행들의 적극적거래 등에 힘입어 일평균 거래량이 30억 달러를 넘어서고 호가 스프레드도 경쟁적으로 형성되는 등 시장형성에 비교적 성공한 것으로 평가되고 있다.',
  },
  '위조지폐': {
    title: '위조지폐',
    content: '우리나라의 지폐는 한국은행의 의뢰에 따라 한국조폐공사가 제조하고 있는데 스캐너, 프 린터 등을 이용하여 현용 지폐처럼 보이도록 만든 지폐를 위조지폐라고 한다. 돈으로 사 용하기 위해 지폐를 위조하는 행위는 국민경제에 커다란 혼란을 초래할 수 있으므로「형 법」제207조에 따라 무기 또는 2년 이상 징역의 처벌을 받게 된다. 한편, 한국은행은 지폐 의 위조를 예방하기 위해 홀로그램, 색변환잉크, 요판잠상, 미세문자, 숨은은선 등과 같은 위조방지장치를 지폐에 적용하고 있다.',
  },
  '위험가중자산/위험가중치': {
    title: '위험가중자산/위험가중치',
    content: '자기자본비율 산출시 대차대조표상 자산계정의 단순 합계를 분모로 사용할 경우 자산을 구성하는 각 익스포저에 따른 리스크를 반영할 수 없는 문제가 있다. 그러므로 각 익스포 저 금액에 해당 위험가중치를 곱하여 합산한 금액인 위험가중자산을 분모로 사용하게 된 다. 위험가중자산은 신용·시장·운영리스크로 구성된다. 각 리스크별 위험가중자산을 산 출하는 방식은 바젤은행감독위원회(BCBS)가 제시한 방법을 따르는 표준방법과 은행의 자체 내부모형을 이용하는 방법으로 구분할 수 있다. 예를 들어 신용리스크 표준방법을 사용할 경우 익스포저에 거래상대방별 위험가중치를 곱한 금액을 합산하여 위험가중자 산을 산출한다. 내부 모형을 사용하는 은행의 경우 자체 추정한 차주 부도율, 부도시 손실 률, 부도시 익스포저 등을 사용하여 위험가중자산을 산출한다.',
  },
  '위험회피심리': {
    title: '위험회피심리',
    content: '일반적으로 투자자들이 동일한 기대현금흐름에 대해 보다 덜 위험한 투자안을 선호하는 경향을 위험회피(Risk Aversion)심리라고 한다. 투자자들이 더 위험회피적일수록 금융상 품의 가격이 동일한 평균 보수를 갖는 무위험 채권보다 낮아진다.',
  },
  '유동비율': {
    title: '유동비율',
    content: '단기채무에 충당할 수 있는 유동자산이 얼마나 되는가를 평가하여 기업의 단기지급능력 을 판단할 수 있는 대표적 지표로서 유동비율이 높을수록 단기지급능력이 양호하다고 볼 수 있으나 과다한 유동자산 보유는 자산운용 효율성을 떨어뜨려 수익성을 저해한다. 유동비율 = 유동자산/유동부채 × 100',
  },
  '유동성리스크': {
    title: '유동성리스크',
    content: '거래 일방이 일시적인 자금부족으로 인해 정해진 결제 시점에서 결제의무를 이행하지 못 함에 따라 거래상대방의 자금조달 계획 등에 악영향을 미치게 되는 위험을 말한다. 유동 성 리스크는 거래상대방이 지급기일이 지난 이후 채무를 결제할 수 있다는 점에서 거래 상대방이 파산하여 채권 회수가 영원히 불가능한 신용리스크와 차이가 있으나 실제로는 그 구별이 쉽지 않다.',
  },
  '유동성커버리지비율': {
    title: '유동성커버리지비율',
    content: '유동성커버리지비율(LCR; Liquidity Coverage Ratio)은 단기 유동성 규제비율로서 은행 이 유동성 부족에 대비하여 보유한 고유동성자산 규모를 30일간의 유동성스트레스 시나 리오 하에서 예상되는 순현금유출액으로 나눈 비율이다. LCR의 산식은 ‘고유동성자산 / 향후 30일간 순현금유출액(현금유출액 - 현금유입액) × 100’이다. 분자의 고유동성자산 은 현금은 물론 정부 및 중앙은행이 발행하는 채무증권, 은행이 중앙은행에 예치한 지급 준비금 등으로 구성된다. 분모의 순현금유출액은 30일 동안의 심각한 위기상황에서 발생 할 것으로 예상되는 현금유출액에서 현금유입액을 차감하여 산출한다. 일반은행이 준수 해야 하는 LCR 규제비율은 2015년 80%에서 2019년 100%로 점진적으로 도입되었다. 코 로나19 사태 이후 금융권의 가계대출 및 기업 자금 공급 확대를 위해 2020년 일시적으로 기존 100%에서 85%로 인하하였으나 2022년부터 단계적 상향을 통해 2025년 7월 말 현 재 100%를 준수하여야 한다.',
  },
  '유동성 함정': {
    title: '유동성 함정',
    content: '유동성 함정(Liquidity Trap)이란 금리 인하를 통한 확장적 통화정책이 투자나 소비 등 실 물경제에 영향을 주지 못하는 상태를 말한다. 경제가 침체될 것으로 예상되면 중앙은행은 정책금리를 낮추고 유동성을 공급한다. 그러나 금리를 계속 낮추는데도 경기가 회복되지 않고 이 이후에 명목이자율을 더 이상 낮출 수 없어 확장적 통화정책을 통한 경기 진작은 어려워지는데 이를 유동성 함정에 빠졌다고 표현한다.',
  },
  '유럽부흥개발은행(EBRD)': {
    title: '유럽부흥개발은행(EBRD)',
    content: 'EBRD(European Bank for Reconstruction and Development)는 중·동부 유럽 국가 의 시장경제체제로의 전환 촉진과 경제개발 지원을 목적으로 1991년 3월 설립된 국제금 융기구로서 영국 런던에 본부를 두고 있다. 주요 업무는 역내 회원국에 대한 생산적이고 경쟁적인 민간부문의 활동 지원, 경제개발을 위한 역내외 자본 및 선진기술 동원, 경쟁여 건 조성과 생산성 향상을 위한 투자 촉진, 개발사업계획 관련 기술지원 등이다. 재원은 자 본금, 채권 발행 및 차입금으로 조성되는 일반재원과 출연을 통한 특별재원으로 조달하 고 조직은 총회, 이사회 및 총재를 비롯한 집행부로 구성되어 있다. 2025년 7월 말 현재 회원국은 총 77개국이며 역내 국제기구인 유럽연합(EU)과 유럽투자은행(EIB; European Investment Bank)에도 회원자격을 부여하고 있다. 우리나라는 창립회원국으로 참여하 고 있다.',
  },
  '유럽연합(EU)': {
    title: '유럽연합(EU)',
    content: '유럽연합(EU; European Union)은 1991년 12월 마스트리히트 유럽이사회에서 유럽공 동체(EC) 12개국 정상이 유럽통합의 방향과 주요 원칙에 합의한 뒤, 1992년 2월 마스트 리히트조약(Treaty on European Union)에 서명하고 1993년 11월 동 조약이 발효되면 서 종전의 유럽공동체를 계승하는 지역공동체로 공식 출범하였다. 창설 목적은 유럽 내 단일시장 구축 및 단일통화 실현을 통한 유럽의 경제와 사회발전 촉진, 공동외교안보정책 을 통한 국제무대에서의 유럽의 이익 제고, 유럽연합 시민권제도 도입에 의한 회원국 국 민의 권리와 이익 보호 등이다. 회원국은 1995년 1월 3개국이 추가 가입한 데 이어 동유 럽 체제전환국들이 가입하면서 점차 늘어났으나 2020년 1월 영국이 EU에서 탈퇴함으로 써 2025년 현재 총 27개국의 회원국이 있다. 유럽연합의 주요 기구는 회원국 정상들의 회의체인 유럽이사회(European Council), 각종 정책 입안 및 집행을 담당하는 집행위원 회(European Commission), 회원국 간 문제해결을 위한 장관들의 회의체인 각료이사회 (CEU), 유럽의회(EP) 등이며 그 외에 유럽사법재판소, 유럽회계감사원, 지역위원회, 유럽 중앙은행(ECB), 유럽투자은행 등이 있다. 유럽연합은 유럽의회가 입법부, 유럽사법재판 소가 사법부, 집행위원회가 행정부의 역할을 하는 등 일반적인 국제기구와는 달리 독자적 인 법령 체계와 입법·사법·행정 기능을 갖추고 있다.',
  },
  '유럽중앙은행(ECB)': {
    title: '유럽중앙은행(ECB)',
    content: '유럽연합(EU)의 통화정책을 수행하는 중앙은행으로서 1994년에 설립된 유럽통화기구 (EMI)를 승계하여 1998년 6월 출범하였으며 독일 프랑크푸르트에 본부를 두고 있다. 유 럽중앙은행(ECB; European Central Bank)의 주요 목적은 유로화를 사용하는 유럽국 가 지역인 유로존(eurozone)의 물가를 안정시키는 것이며 유로화 발행의 독점적인 권한 을 갖고 있다. 지폐가 아닌 동전의 경우에는 유럽중앙은행의 감독하에 각 나라가 발행할 수 있다. 유럽중앙은행은 1999년 1월 1일부터 유로존의 단일 통화정책 권한을 행사하였 으며, 정책 최상위 의사결정기구인 Governing Council은 ECB 집행이사회(Executive Board)의 6명과 유로존 회원국 중앙은행 총재들로 구성되고, 연 8회 정책금리를 결정한다.',
  },
  '유로달러(Euro dollar)': {
    title: '유로달러(Euro dollar)',
    content: '미국 외의 국가에 소재하는 은행에 예치된 미국 달러화를 말하는데, 런던 등 주요 금융시 장에서 많이 거래되고 있다. 유로달러시장의 중심은 은행 간 예금시장으로서 은행 및 브 로커들로 구성되어 있다. 1950년대부터 미·소 간 냉전격화에 따라 동유럽 공산국가의 은 행들이 미국 내 은행에 예치했던 달러화 예금을 유럽으로 이체한 데서 비롯되었다. 이후 미국의 국제수지 적자가 누적되면서 대규모의 달러 자금이 유럽에 유입된 데다, 1970년 대의 오일쇼크 당시 OPEC 국가들이 오일달러를 유로은행에 예치(동 자금은 유로은행의 신디케이트론을 통해 무역수지 적자국으로 환류)함으로써 크게 증가하였다. 유로달러는 은행의 금융·외환거래 및 무역금융의 원활화, 국제유동성 증대에 크게 이바지하였으나 보 유자의 수익 추구를 위해 국경을 넘어 자유롭게 자금의 예치나 대출이 이루어지는 특성이 있다. 이 때문에 유로달러는 세계 각지의 금리 차이나 환율 변동에 의한 차익을 찾아 빠르 게 이동하는 핫머니(hot money)의 성격을 가지고 있으며, 따라서 국제적 금융교란을 일 으킬 위험성을 내포하고 있다.',
  },
  '유로마켓(Euro market)': {
    title: '유로마켓(Euro market)',
    content: '뉴욕, 동경 등 선진국의 국제금융시장에 대비되는 순수한 의미의 국제금융시장으로, 어 떤 통화로 표시된 자금이 해당 통화 발행국 이외의 국가에서 거래되는 시장이다. 따라서 국내시장으로부터 독립된 시장이라는 특성을 갖고 있으며 Euro dollar, Euro currency, Euro bond 등 여러 하부 시장으로 구성되어 있다. 유로마켓은 Euro dollar 거래에 힘입 어 발전하였으며, 당초에는 은행의 달러 자금을 중심으로 한 Euro dollar 시장 또는 Euro currency 시장의 성격이 강하였으나 1980년대 들어 증권화가 진전됨에 따라 Euro bond 시장의 비중이 확대되었다. 유로마켓은 각국 정부의 규제나 간섭에서 벗어나 비교적 자유 롭게 거래를 할 수 있다는 장점을 바탕으로 금융 혁신과 기법의 발전을 촉진하며 범세계 적인 확산을 가져다주었다. 유로마켓의 확산은 1980년대 이후의 세계적인 금융혁신을 촉 진하고 나아가 각국 금융시장의 개방과 효율화를 촉진하는 등 금융의 세계화에도 기여하 였다.',
  },
  '유통시장': {
    title: '유통시장',
    content: '유통시장(또는 제2차 시장, Secondary Market)은 이미 발행된 채권, 주식 등 유가증 권이 투자자들 사이에서 매매되는 시장을 말한다. 유통시장은 발행시장에서 발행된 유 가증권의 시장성과 환금성을 높여주고 자유경쟁을 통해 공정한 가격을 형성하는 기능 을 한다. 채권 유통시장은 장외시장과 장내시장으로 구분된다. 현재 대부분의 채권거래 는 장외시장에서 주로 증권회사의 단순중개를 통하여 이루어지고 있다. 장내시장으로는 한국거래소 내에 일반채권시장과 국채전문유통시장이 개설되어 있다. 일반채권시장에서 는 전환사채와 소액 국공채의 장내거래가 의무화되어 있어 채권 거래가 비교적 활성화되 어 있다. 국채전문유통시장에서의 거래는 국고채전문딜러의 지속적이고 유효한 호가 제 시를 통한 시장조성 의무 강화 등의 제도 개선 노력에 힘입어 증가하고 있다. 주식 유통 시장에는 유가증권시장(코스피시장), 코스닥시장, 코넥스시장 및 K-OTC시장이 있다. 이 중 K-OTC시장은 장외시장이며, 나머지는 한국거래소에서 개설·운영하는 장내시장이다. 주식이 장내시장에서 매매되기 위해서는 상장이라는 등록 절차를 거쳐야 한다. 코스닥시 장은 유망 중소기업, 벤처기업 등이 진입하는 시장이다. 코넥스시장은 설립 초기 중소기 업에 특화된 시장으로, 2013년 7월 개설 당시에는 코스닥시장의 하부시장 형태였으나, 2013년 9월 별도시장으로 분리되었다. K-OTC시장에서는 비상장 주식이 거래된다.',
  },
  '유틸리티 토큰(Utility Token)': {
    title: '유틸리티 토큰(Utility Token)',
    content: '유틸리티 토큰은 특정 플랫폼(Platform) 내에서 운영기관 또는 제휴기관이 제공되는 특 정 재화 또는 서비스에 대한 접근 권한을 부여하기 위한 수단으로 발행된다. 최근에 발행 되고 있는 유틸리티 토큰은 분산원장 또는 블록체인 플랫폼의 생태계 내에서 제공하는 서 비스나 기능 등에 대한 접근 또는 이용을 보장하고 생태계 참여를 촉진하기 위해 발행되 는 디지털 자산을 의미한다. 또한 유틸리티 토큰은 블록체인 네트워크를 기반으로 암호화 기술을 사용하여 발행, 유통될 수 있다는 점에서 암호자산의 하나에 속한다.',
  },
  '은선': {
    title: '은선',
    content: '은행권의 위조방지를 위한 장치의 하나로 은행권용지에 삽입된 플라스틱 또는 금속으 로 된 가는 선형필름을 말하며, 삽입된 필름의 문양 또는 글자 등을 확인할 수 있다. 은 선(Security Thread)에는 현용 천원권과 같이 숨고 드러나기를 반복하는 부분노출은선 과 오천원권, 만원권과 같이 용지 속에 완전히 삽입된 숨은 은선이 있다. 또 오만원권처 럼 숨은 은선과 부분노출은선이 같이 있는 경우도 있다. 숨은 은선에는 주로 미세문자를 삽입하거나 보는 각도에 따라 색상이 변하는 필름을 적용한다. 오만원권에는 초상 오 른쪽에 숨겨져 있는 특수 필름띠 위에 문자와 액면 숫자 “한국은행 BANK OF KOREA 50000”이 보이며, 만원권·오천원권에는 액면 숫자만 다르게 표시되어 있다. 그리고 오만 원권의 부분노출은선은 청회색 특수 필름 띠로, 여러 개의 태극무늬가 사방 연속으로 새 겨져 있으며 은행권을 상하로 움직이면 태극무늬가 좌우로, 은행권을 좌우로 움직이면 태 극무늬가 상하로 움직이는 것처럼 보여 ‘Motion’이라 부른다. 한편 천원권에는 숨은 은선 은 없고 가운데 부분에 부분노출은선이 있다.',
  },
  '은행경영공시제도': {
    title: '은행경영공시제도',
    content: '은행의 건전성을 유지하기 위해서는 감독당국의 직접적인 감독 이외에 예금자, 채권자 및 주주 등 이해관계자에 의한 시장규율(market discipline)이 중요하다. 이에 따라 은행은 이해관계자에게 금융기관에 관한 중요한 정보를 정기적으로 공시한다. 「은행업 감독규 정」에 따르면 은행은 연 결산시 결산일 이후 3개월 이내, 분기별 가결산은 결산일 이후 2 개월 이내에 공시하도록 되어 있다. 공시 내용은 조직 및 인력, 재무 및 손익, 자금조달·운 용, 건전성·수익성·생산성 등 경영지표, 경영방침 및 리스크 관리 등에 관한 사항을 포괄 한다.',
  },
  '은행인수어음(BA)': {
    title: '은행인수어음(BA)',
    content: '은행인수어음(BA; Banker’s Acceptance)은 은행의 단기무역신용공급방식의 하나로 수 출입대금결제를 위해 발행된 환어음을 은행이 인수(accept)하는 것을 말하며, 은행이 어 음상의 지급의무를 부담한 것이므로 그 신용도가 높아 시장에서 자유로이 양도되고 자산 보유의 형태로도 이용되고 있다. 통상 어음발행인이 인수은행에 매입을 신청하고 할인받 는 것이 관행으로 되어 있으며, 미국에서는 일반적으로 인수은행이 BA를 만기일까지 보 유하지 않고 유통시장에 매각함으로써 안정성과 유동성이 뛰어난 독특한 시장이 형성되 는데 이를 은행인수어음시장이라 한다.',
  },
  '을기금(Capital B)': {
    title: '을기금(Capital B)',
    content: '외국은행 국내지점의 동일인 및 동일계열기업군 여신한도 등 은행법상의 영업규제와 관 련하여 자기자본을 확대해줌으로써 여신기능이 원활히 수행될 수 있도록 하기 위한 명목 상의 자본금으로 대차대조표에는 나타나지 않는다. 현재 을기금은 「은행업 감독규정」 제 11조에 의거 외국은행 국내지점이 외화자금을 환매조건부로 한국은행에 매각하여 보유· 운용하는 원화자금과 외은지점이 자행의 본점 또는 국외지점으로부터 상환기간이 1년을 초과하는 조건으로 차입한 자금 중 국내에서 운용하는 자금(본지점 장기차입금)을 합산한 것으로 하되 대차대조표상 자본총계의 200%를 초과할 수 없도록 규정하고 있다.',
  },
  '의중임금': {
    title: '의중임금',
    content: '의중임금이란 유보임금이라고도 하는데 특정 근로자로 하여금 노동을 공급하게 하기 위 해 지불해야 할 최소한의 임금을 말한다. 다시 말해 노동을 공급할 의사가 있는 근로자가 받고자 하는 최소한의 임금이라고 할 수 있다. 따라서 취업자들은 현직에서 받는 임금이 자신들이 염두에 두고 있던 임금보다 높은 사람들이다. 의중임금은 실업기간에 중요한 영 향을 미친다. 구직활동기간을 종료시키는 경로는 두 가지인데 하나는 구직활동을 포기하 고 비경제활동 상태로 전환하는 경우이고 다른 하나는 취업을 하는 경우이다. 후자는 자 신에게 제시된 임금이 자신의 유보임금보다 높을 때 발생한다. 따라서 다른 조건이 같을 경우 유보임금이 높을 때 실업기간은 길어지게 된다.',
  },
  '이구환신': {
    title: '이구환신',
    content: '이구환신은 중국 정부가 소비를 촉진하여 내수를 확대하고 생산활동을 활성화하기 위해 시행한 정책이다. 이구환신(以舊換新)은 한자로 ‘오래된 것을 새로운 것으로 교체한다’라 는 뜻이다. 소비자에게 금융지원을 하거나 판매기업에 보조금 지급을 통해 오래된 소비재 (예: 가전제품, 자동차 등)를 새로운 제품으로 교체하도록 유도하는 정책이다. 중국 정부는 2009~10년 글로벌 금융위기 시기 및 2024~25년에 둔화된 소비를 진작하고자 이구환신 정책을 실시하였다. 동 정책은 에너지 소비가 높고 오염물질 배출량이 많은 오래된 가전 제품, 자동차를 최신 기술 탑재 제품으로 교체토록 한다는 점에서 환경보호, 기술혁신이 라는 더 큰 목적을 추구하는 측면도 있다. 한편, 우리나라도 소비촉진, 환경보호 등을 위 해 오래된 디젤자동차 교체 촉진, 유류세 인하 등의 정책을 추진한 바 있다.',
  },
  '이슬람금융': {
    title: '이슬람금융',
    content: '이슬람금융이란 이슬람교 율법인 샤리아(Shariah)에 따라 행해지는 금융을 말한다. 이 슬람교 율법인 샤리아에서는 이자금지, 도박금지, 불확실거래금지 등을 명시하고 있어 서 이슬람금융은 그 운용방식이 일반금융과는 다른데, 우선 모든 이슬람 금융상품 및 금 융거래는 사전에 이슬람 법학자들로 구성되는 샤리아위원회의 샤리아 적합성 인증이 필 수적이다. 또한 이슬람 은행에서는 이자 개념을 탈피하기 위하여 실물자산을 개재한 거 래(매매나 리스)와 수익을 배분하는 거래(신탁이나 출자) 등의 방식을 이용하고 있다. 한 편 이슬람금융의 상품거래 형태로는 무라바하(Murabahah), 이스티스나(Istisna), 이자라 (Ijarah) 등이 있고, 투자 형태로는 무다라바(Mudharabah), 무샤라카(Musyarakah) 등 이 있다. 이 외의 응용 형태 금융거래로서 보험과 유사한 타카풀(Takaful), 금융 투자 상 품으로 수쿠크(Sukuk, 이슬람채권) 등이 있다.',
  },
  '이연차액결제': {
    title: '이연차액결제',
    content: '이연차액결제는 일정 기간중 지급결제시스템에 참가하는 기관의 양자간 또는 다자간 에 지급할 총금액과 수취할 총금액을 모아서 상계 처리한 차액을 일정 시점 후에 결제하 는 방식이다. 금융기관의 순포지션은 해당 금융기관이 수취한 지급지시 금액의 합계에 서 송부한 지급지시 금액의 합계를 차감하여 산출한다. 이연차액결제방식은 상계한 차액 만을 결제하면 되므로 결제유동성을 절감할 수 있는 장점이 있으나 결제시점까지 결제 가 완료되지 않아 신용리스크에 노출되는 문제가 있다. 현재 우리나라의 소액결제시스템 (어음교환, 타행환, 전자금융 등)은 이연차액결제 방식으로 최종 결제가 이루어지고 있다.',
  },
  '이자보상배율': {
    title: '이자보상배율',
    content: '영업이익을 이자비용으로 나눈 값으로 측정하는 지표이다. 이는 영업활동에 의한 이익으 로 이자비용을 어느 정도나 부담할 수 있는 지, 즉 기업의 이자부담능력을 평가하는 지표 로 이용된다. 동 지표가 높을수록 이자부담능력이 좋다고 할 수 있으며, 동 지표가 1보다 작으면 영업이익 전체로도 금융비용을 충당할 수 없는 상태를 의미한다. 다만 우리나라와 같이 기업의 이자수익이 상당한 규모에 이르는 경우 기업의 실질적인 금융비용 부담능력 이 과소평가될 가능성이 높으므로 이자비용에서 영업외이익으로 분류되는 수입이자를 차 감한 순금융비용을 이용하여 산출한 순이자보상배율을 보조지표로 활용하는 것이 좋다. 한편 같은 개념으로 이자보상비율이 있는데 이는 이자보상배율에 100을 곱하여 %로 표 시한 것이다.',
  },
  '이전소득수지': {
    title: '이전소득수지',
    content: '이전소득수지는 국제수지표상 경상수지를 구성하는 항목 중의 하나로 거주자와 비거주자 사이에 무상으로 주고받는 거래의 수지를 말한다. 이러한 거래에는 재외교포가 국내 친지 에게 보내는 개인송금, 국외 자선단체의 기부금이나 구호물자, 국제기구 출연금 등이 포 함된다.',
  },
  '이중통화채(Dual Currency Bond)': {
    title: '이중통화채(Dual Currency Bond)',
    content: '국제 간 환율 및 금리 전망을 바탕으로 채권 발행 통화와 상환 통화를 달리하여 발행하는 채권을 말한다. 발행방식은 기본적으로 채권의 발행은 저금리 통화(강세통화)로, 상환은 고금리 통화(약세통화)로 한다. 이중통화채의 발행으로 발행자는 금리부담을 경감할 수 있고 투자자는 상환 통화가 미리 정한 환율보다 강세가 될 경우 환차익을 기대할 수 있는 장점이 있다. 예컨대 액면과 이자는 미 달러화로 표시되고, 상환은 엔화나 스위스 프랑화 로 하는 방식의 채권을 가리킨다. 달러화가 강세인 때에 주로 사용된다. 일본의 경우 저금 리 상태가 지속되면서 자국 통화 표시 채권의 수익률이 지속적으로 낮아지는 상황에서 채 권의 쿠폰을 금리가 높은 통화로 지급하는 방식의 이중통화채가 활발하게 발행되었다. 최 근에는 역이중통화채(reverse dual currency bond)라는 발행 형태가 등장하였는데 이는 기채 통화와 상환 통화는 같으나 이자 지급은 발행 당시의 고금리 통화로 이루어지는 형 태를 말한다. 이밖에 채권의 원금은 두 나라 통화로 수수되고 이자지급은 두 나라 환율에 연결되어 있는 혼합이중통합채권도 있다.',
  },
  '이차전지': {
    title: '이차전지',
    content: '외부의 전기 에너지를 화학 에너지의 형태로 전환하여 내부에 저장해 두었다가 필요할 때 재사용할 수 있도록 만들어진 장치가 이차전지(Secondary Cell)이다. 전기화학 반응 을 통해 전기 에너지를 장치 내부에서 직접 만들어내는 일차전지(primary cell)와는 달리 외부로부터 전기 에너지를 공급받는 방식이 적용된다는 점에서 이차전지로 통용된다. 다 만 일회용인 일차전지와 달리 충전과 방전을 통해 반복적으로 재사용이 가능하다는 특징 을 감안하여 충전식 전지(rechargeable battery)로 불리기도 한다. 이차전지는 충전기술 및 저장기능의 획기적인 발전으로 충전을 통한 재사용에 횟수 제한이 대폭 완화되고 사용 시간이 크게 늘어나면서 일차전지 시장의 상당 부분을 대체하는 가운데 기존 일차전지가 활용되지 못했던 영역으로까지 사용처가 빠르게 확대되고 있다. 특히 최근에는 스마트폰, 디지털 카메라 등의 휴대용 전자장치 및 소형 가전뿐만 아니라 전기차, 드론 등 이동수단 으로까지 활용 사례가 광범위해지고 있다.',
  },
  '이표채': {
    title: '이표채',
    content: '국채·금융채·회사채 등의 채권은 이자지급 방법에 따라 할인채(Discount Bond), 이표채 (Coupon Bond), 복리채(Compound Interest Bond) 등으로 구분되는데 이표채는 채권 의 권면에 이표(쿠폰, coupon)가 붙어 있어 이자지급일에 이를 떼어 제시함으로써 이자를 지급받는 채권을 말한다. 통상적으로 만기까지 일정 기간마다 이자를 지급하고 만기에는 원금을 지급하는 가장 일반적인 형태의 채권을 지칭한다. 이표채처럼 일정한 간격을 두고 주기적으로 수취하는 채권이자는 투자자의 입장에서 볼 때는 원래의 채권 투자자금 원본 의 회수기간이 일부 앞당겨지는 효과를 얻게 된다. 이처럼 이표의 이자수취 만큼 투자자 금 회수기간이 단축되는 효과를 감안하여 채권의 만기를 정밀하게 산출한 것을 듀레이션, 즉 평균만기라고 한다. 금리가 1% 변동할 때 채권의 가격은 듀레이션의 배율만큼 증폭되 어 변동하기 때문에 유가증권투자에 있어서 매우 중요한 분석도구이다. 한편 이표채와 대 비되는 개념으로 할인채와 복리채가 있다. 할인채는 이자의 지급 없이 만기에 원금을 지 급하는 채권으로 액면보다 할인된 가격으로 발행되는데, 쿠폰 없이 발행되기 때문에 무이 표채 또는 제로쿠폰채(zero-coupon bond)라고 한다. 복리채는 이자를 중간에 지급하지 않고 만기에 원금과 함께 일시에 지급하는 채권을 말한다.',
  },
  '익스포저': {
    title: '익스포저',
    content: '특정 리스크에 노출되어 있는 금액을 의미하며 리스크 유형에 따라 시장리스크 익스포저, 신용리스크 익스포저 등으로 구분된다. 시장리스크 익스포저는 금리, 환율, 주가 등의 변 동에 따른 가치 변동에 따른 손실 가능성에 노출된 금액을, 신용리스크 익스포저는 거래 상대방의 신용도 하락, 채무불이행에 따른 경제적 손실 가능성에 노출된 금액을 의미한 다. 따라서 익스포저(Exposure)는 장부가액보다 포괄적인 개념으로, 난내(on-balance sheet) 자산은 일반적으로 재무상태표상 금액이 통상 익스포저와 동일하나 난외(off- balance sheet) 항목은 현재 시점에서 관련 권리·의무가 확정되지 않아 계약의 명목가 액을 익스포저로 사용할 수 없다. 따라서 난외항목의 경우 해당 계약의 명목금액에 해당 유형별로 난내자산으로 전환될 확률에 해당하는 신용환산율(CCF; Credit Conversion Factor)을 곱하여 산출한 신용등가액(credit equivalent amount)을 익스포저로 한다. 한 편 익스포저는 발생 가능한 손실 가능액을 측정하지만 발생 가능성(위험가중치)으로 조정 하지 않은 중립적인 금액이라는 점에서 위험가중자산과 차이가 있다.',
  },
  '인구고령화': {
    title: '인구고령화',
    content: '인간의 평균 수명이 증가하고 출산율이 감소함에 따라 선진국을 중심으로 고령자의 인 구 비율이 점차 높아져 가는 현상 또는 그러한 상태를 고령화라고 한다. 국제 연합(UN)은 총인구에서 65세 이상 인구가 7% 이상일 경우 고령화 사회, 14% 이상일 경우 고령 사회, 20% 이상일 경우 초고령 사회로 구분하였다. 우리나라는 2000년에 고령화사회로, 2018 년에 고령사회로, 2024년에 초고령사회로 진입하였다. 이와 같은 인구의 고령화 현상은 노동력 부족, 생산성 저하 등 노동시장 변화를 야기하여 경제성장을 둔화시키고, 노년 인 구 부양비 상승과 연금, 의료, 복지비용 등의 증가 문제를 발생시킬 수 있다. 반면 고령화 는 노인의 정치적 영향력 확대, 여가 및 레저 활동 주도계층 변화, 교육제도 재편 등 파급 효과가 나타날 수 있을 뿐 아니라 건강약품과 식품산업, 의료서비스, 금융서비스, 레저 또 는 노인주택산업 등의 고령친화산업 분야의 성장 등 산업구조변화를 가져올 수 있다. 우 리나라의 고령화속도는 세계에서 유래가 없을 정도로 빠르게 진행되고 있어 고령화 문제 의 해결을 위한 사회·경제적인 종합적인 대책이 필요하다.',
  },
  '인적자본': {
    title: '인적자본',
    content: '개인이 보유한 능력, 기술숙련도, 지식 등을 포괄하는 것으로 노동의 질적 수준을 의미한 다. 인적자본(Human Capital)이란 개념은 1960년대 초에 미국의 농업경제학자인 슐츠 (T. Schultz)가 제시한 것으로, 그는“교육을 통해서 형성되는 능력은 임금, 소득, 저축, 자 본형성 등을 근본적으로 변화시킨다”며“경제성장에서 오래 풀리지 않는 수수께끼를 인적 자본에 대한 투자라는 개념을 통해서 분명하게 해결할 수 있다”고 인적자본 증가가 경제 성장에 중요함을 지적하였다. 인적자본이 경제성장에 미치는 영향은 경제성장이론에서 중요한 연구 분야인데, 전통적인 성장이론에 따르면 GDP성장률은 장기적으로 인구 증가 율과 외생적으로 주어지는 기술진보율에 따라서 결정된다. 반면 1980년대 이후의 신성장 이론(new growth theory)에 따르면 인적자본, 내생적 기술발전, 제도 등이 경제성장에 서 중요한 역할을 한다. 생산요소로서의 인적자본은 노동생산성을 높여 직접적으로 경제 성장에 기여할 뿐 아니라 물적자본과 결합하여 자본축적에 따라 자본생산성이 하락하는 속도를 늦추는 효과가 있다. 또한 인적자본은 기술혁신의 중요한 요소로서 기술발전 속도 를 높여 경제성장률을 높인다. 부모의 인적자본 증가도 세대 간의 연결을 통해 지속적으 로 인적자본을 증가시키며 경제성장률을 높이는 효과가 있다.',
  },
  '인터넷뱅킹': {
    title: '인터넷뱅킹',
    content: '인터넷뱅킹이란 고객이 자금이체, 계좌조회 등 은행 업무를 인터넷을 통해 원격지에서 처 리할 수 있는 금융서비스이다. 휴대전화 등 모바일기기를 이용하는 모바일뱅킹의 경우도 넓은 의미에서 인터넷뱅킹의 범주에 포함된다. 인터넷뱅킹 서비스는 제공하는 은행마다 서비스 내용이 조금씩 다르지만 대부분 예금조회, 자금이체, 대출 등의 기본적인 금융서 비스 외에도 계좌통합서비스, 기업간(B2B) 상거래 결제서비스 등을 제공하고 있다. 또한 은행은 각종 상담 및 홍보업무처리도 지원하는 등 인터넷뱅킹을 통해 다양한 서비스를 제 공하고 있다.',
  },
  '인플레이션': {
    title: '인플레이션',
    content: '물가수준이 지속적으로 상승하는 현상을 인플레이션이라고 한다. 여기서 물가는 개별상 품의 가격을 평균하여 산출한 물가지수를 의미한다. 인플레이션은 물가상승 지속기간 및 상승폭, 제품의 질적 수준 향상 여부, 정부의 가격통제에 따른 암시장 가격 상승 여부와 같은 점을 고려할 때 언제 인플레이션이라고 정의할 것인가에 대해 이견이 있을 수 있다. 통상 연 4~5% 정도의 물가상승률이 관측되면 일반적으로 인플레이션이 발생했다고 판단 한다.',
  },
  '인플레이션감축법(IRA)': {
    title: '인플레이션감축법(IRA)',
    content: '인플레이션감축법(IRA; Inflation Reduction Act)은 미국이 높은 인플레이션 상황에 대 응하여 국민생활 안정화를 위해 2022년 8월 시행한 법률이다. 보건의료(healthcare), 청 정에너지(clean energy), 조세(tax) 분야를 중심으로, 보건의료 부문에는 의약품 가격 인 하, 보건비용 부담 완화 등을 통해 가계지출 축소를 지원하는 내용을 담고 있으며, 청정에 너지 분야는 에너지 안보 및 기후변화 대응을 위한 청정에너지경제 구축, 환경오염 감소 등을 주요 목표로 설정해 두고 있다. 그리고 동 법에 의거 소요되는 사업비의 충당을 위해 증세 등 세수확보 수단을 조세 분야에서 규정하고 있다. 이중 청정에너지 분야에 대하여 는 세계 각국의 관심 또한 집중되어 있다. 태양광 패널, 전기차, 배터리 등 재생에너지 산 업과 관련하여 미국 정부가 제공하는 각종 세액 공제 및 보조금 혜택을 핵심사항으로 담 고 있기 때문이다. 특히 전기차의 경우 세제혜택 대상에 포함되기 위해서는 미국 및 미국 과 자유무역협정(FTA)을 체결한 국가에서 채굴·가공된 핵심 광물이 일정 비율 이상 적용 된 배터리를 탑재하여야 하고 북미지역에서 최종 조립되어야 하는 조건을 충족해야한다. 이에 따라 미국 중심의 공급망 재편을 목적으로 한다는 명분에도 불구하고 불공정 무역법 이라는 비판이 제기되고 있다. 국가별, 기업별 미치는 영향 또한 다양하여 중국산 원료 및 소재 의존도가 높은 한국, 일본, 유럽 자동차 기업의 경우 대체 공급망 확보가 중요해진 반면 중국 이외 태양광 업체들에게는 보조금 및 세제혜택 수혜대상에서 중국기업이 배제 됨에 따라 미국 내 시장점유율을 확대할 수 있는 기회라는 평가가 나오고 있다.',
  },
  '일물일가의 법칙': {
    title: '일물일가의 법칙',
    content: '완전경쟁이 이루어질 때 동일한 시기, 동일한 시장에서는 품질이 동일한 상품의 가격이 2 개 이상 형성될 수 없다는 법칙이다. 즉 동일한 상품은 어느 시장에서든지 가격이 같아지 게 된다는 것인데 제본스(Jebons, W. S.)와 엣지워스(Edgeworth, F. Y.)는 무차별의 법칙 이라고 하였다. 만일 동일한 시기, 동일한 시장에서 동일한 품질의 상품에 대해 2개 이상 의 가격이 형성된다면 모든 사람들이 가장 싼 가격으로 사려고 하기 때문에 그보다 비싼 가격을 제시한 판매자는 가격을 인하하지 않을 수 없다. 따라서 가격 차이가 없어지게 되 며 하나의 상품에는 하나의 가격만 정해지게 된다. 무역에서도 일물일가의 법칙이 적용될 수 있는데 어떤 상품의 가격이 국가별로 다를 때 가격이 상대적으로 싼 나라에서 구입하 여 가격이 상대적으로 비싼 나라에 파는 이익 추구의 과정이 계속된다면 결국은 모든 나 라에서 그 상품의 가격은 일치하게 될 것이다. 그러나 현실 세계에서는 일물일가의 법칙 이 성립하기 어려운데, 이는 운송비, 보험료 등의 거래비용뿐만 아니라 관세의 영향도 받 기 때문이다.',
  },
  '일반특혜관세': {
    title: '일반특혜관세',
    content: '개발도상국의 수출 확대 및 공업화 촉진을 위하여, 선진국이 개발도상국으로부터 수입되 는 농수산물, 공산품 및 반제품에 대하여는 아무런 조건 없이 “일반적”으로 무관세 또는 저율의 관세를 부과하는 관세 상의 특혜대우를 말한다. 여기서 “일반적”이란 의미는 영연 방 특혜, 베네룩스 관세동맹 등 기존의 특혜관세제도와는 달리 지리적으로 여러 개 국가 에 국한되지 않고 범세계적으로 적용된다는 것을 뜻한다. 현재 일반특혜관세를 공여하는 국가로는 미국, 일본, 캐나다, 호주, 뉴질랜드, EC 등이 있다. 이들 특혜공여국은 특혜 대 상품목, 특혜 폭, 원산지 기준 등을 정하고 이러한 제반요건을 충족한 경우에 한하여 특혜 관세를 적용하고 있다.',
  },
  '일중RP제도': {
    title: '일중RP제도',
    content: '일중RP제도는 총액결제시스템에서 중앙은행이 참가기관에게 환매조건부증권매매(RP)를 통해 당일 상환을 조건으로 결제에 가용할 수 있는 일중유동성을 제공하는 방법이다. 총 액결제시스템에서는 지급지시를 건별로 결제하기 때문에 참가기관은 결제에 소요되는 유 동성을 충분히 확보하여야 하나 영업시간 중에 자금수취와 지급시점의 불균형 등으로 일 시적인 결제자금 부족이 발생할 수 있다. 이에 따라 중앙은행은 국채 등 적격증권을 대상 으로 환매조건부 증권매매를 통해 일시적인 결제부족자금을 지원함으로써 참가기관들의 실시간 자금결제를 가능하게 한다. 특히 중앙은행의 일중당좌대출 지원 대상이 아닌 비은 행금융기관의 경우 일중유동성 지원은 보통 일중RP를 통해 이루어진다. 한국은행이 운영 하는 한은금융망에서도 2012년 2월에 국채 및 통화안정증권의 매매결제대금 지원을 위 하여 금융투자회사를 대상으로 일중RP제도가 시행되었다. 한국은행은 금융투자회사가 매입 체결한 채권을 직접 매입하여 일중유동성을 공급하고 해당 영업일에 환매 거래를 통 해 자금을 회수한다. 만약 금융투자회사가 당일 중 RP지원 금액을 상환하지 못하면 한국 은행 자금조정대출 이율에 1%p를 가산한 벌칙금리를 환매이자율로 하여 매매증권을 매 입하여야 한다.',
  },
  '일중당좌대출제도': {
    title: '일중당좌대출제도',
    content: '일중당좌대출제도는 한은금융망의 자금결제가 원활히 이루어지도록 은행 참가기관에 대 하여 영업시간 중 일시적인 결제부족자금을 실시간으로 지원하는 제도로 2000년 9월 도 입되었다. 일중당좌대출은 한국은행에 개설된 참가은행의 당좌예금계좌 잔액을 초과한 지급 또는 결제의 요청이 있는 경우 가용담보 범위 내에서 자동으로 실행되는 방식으로 운용된다. 은행별 일중당좌대출의 한도는 없으나 참가기관의 일중당좌대출에 대한 과도 한 의존을 방지하기 위하여 자유한도(금융기관 자기자본의 25%)를 초과하는 대출금에 대 해 이자를 부과하고 있다. 한편 은행이 당일 중 상환마감시각까지 일중당좌대출금을 상 환하지 못하는 경우에는 한국은행의 익일물 자금조정대출로 전환하여 지원하고 있다. 한 편 한은금융망에 참가하는 비은행금융기관에 대한 일중유동성 지원은 일중RP를 통해 이루어진다.',
  },
  '입금이체': {
    title: '입금이체',
    content: '입금이체(Credit Transfer)는 지급인이 자신이 거래하는 금융기관에 지급을 지시하여 이 체금액을 수취인의 계좌로 입금하도록 하는 계좌이체 방식을 말한다. 지급인의 지급지시 에 의해 지급인의 계좌에서 출금이 일어나므로 지급지시와 자금 모두 지급인 거래은행에 서 수취인 거래은행으로 이동한다. 우리나라의 경우 금융기관간 계좌이체의 대부분은 입 금이체에 해당되며 지로의 자동이체와 CMS 출금이체서비스는 출금이체에 해당한다.',
  },
  '자금결제시스템': {
    title: '자금결제시스템',
    content: '자금지급시스템과 연계되어 결제가 이루어지는 외환매매거래나 증권매매거래와 달리 자 금을 지급하는 거래 자체는 자금이 예금되어 있는 은행내에서 계좌간 이체만으로도 결제 가 완료된다. 따라서 자금결제시스템이란 일반적으로 각 은행 내에서 고객자금의 잔액과 유출입을 관리하는 은행 회계시스템과 동일한 의미를 가진다.',
  },
  '자금관리서비스(CMS)공동망': {
    title: '자금관리서비스(CMS)공동망',
    content: 'CMS(Cash Management Service)공동망은 금융기관을 통해 대량의 출금 및 입금서비 스를 제공하는 지급시스템으로 금융결제원이 1996년 8월부터 가동하였다. 먼저 출금이 체 서비스는 각종 상품 판매대금, 서비스 이용대금, 수업료, 회비 등을 받는 자가 다수의 납부자 예금계좌나 예탁금계좌에서 출금하여 입금받는 업무로서 지로 자동이체와 유사하 다. 입금이체 서비스는 각종 상품 구입대금, 배당금, 연금, 급여 등을 보내는 자가 계좌에 서 자금을 인출하여 타 금융기관의 수취인 계좌로 자금을 지급하는 업무로서 지로의 대량 지급과 비슷하다. CMS는 각종 사회단체, 학교 및 학원 등을 중심으로 활발히 이용되고 있 으며 이를 통해 비교적 저렴한 비용으로 매번 금융기관을 방문하거나 인터넷뱅킹 등을 통 해 이체하지 않고 정기적인 대금 수납 및 지급을 처리할 수 있다.',
  },
  '자금순환표': {
    title: '자금순환표',
    content: '국민경제 내에 존재하는 자금의 흐름은 실물거래와 관련하여 일어나는 산업적 유통과 채 권과 채무의 변동을 나타내는 금융적 유통으로 나누어 볼 수 있는데 경제활동을 올바르게 분석하기 위해서는 양 거래를 연결하여 동시에 파악하여야 한다. 따라서 자금의 산업적 유통과 금융적 유통을 연결하여 기업, 개인, 정부 등 각 경제주체가 어떤 경로를 통해 자 금을 조달하고 운용하고 있는가를 파악하기 위한 종합적인 통계가 필요한데 이것이 바로 자금순환표이다. 이처럼 자금순환표는 국민경제 내에서 발생한 다양한 금융활동이 상호 간에 어떠한 관계를 가지고 있으며 이와 같은 금융 활동이 생산·지출 등 실물과 어떤 관계 를 가지고 있는가를 체계적으로 일목요연하게 정리해 놓은 표이다. 이와 같은 자금순환표 는 오늘날 대부분 국가에서 이를 공식적인 통계로 작성하여 경제정책 수립 및 그 효과분 석에 유용한 자료로 활용하고 있다. 우리나라에서도 1965년부터 한국은행에서 분기 및 연간으로 자금순환표를 작성하여 발표하고 있다.',
  },
  '자금조달비용지수(COFIX)': {
    title: '자금조달비용지수(COFIX)',
    content: 'COFIX(Cost of Funds Index)는 은행이 조달한 자금의 평균금리를 나타내는 지수로 은 행 변동금리형 대출의 준거금리로 활용되고 있다. 은행연합회는 신한, 우리, SC제일, 하 나, 국민, 한국씨티, 농협, 중소기업은행 등 국내 8개 은행이 제공하는 수신상품의 금액과 금리를 가중평균하여 신규취급액기준, 잔액기준, 신잔액기준, 단기 COFIX로 구분하여 공시한다. 지수산출대상 수신상품은 정기예금, 정기적금, 상호부금, 주택부금, 양도성예 금증서, 환매조건부증권매도, 표지어음매출, 금융채(후순위채 및 전환사채 제외) 등이다. 다만 신잔액기준 COFIX를 산출할 때는 상기 수신상품 이외에 기타 예수금, 기타 차입금, 결제성 예금 등을 추가로 포함한다.',
  },
  '자기띠 카드': {
    title: '자기띠 카드',
    content: '신용카드나 전화카드와 같이 얇은 플라스틱 카드에 자성체 물질을 띠 모양으로 입히고 필요한 정보를 기록한 카드이다. 신용카드의 자기띠(Magnetic Stripe)에는 국제표준화 기구(ISO)가 정한 기준에 따라 카드 번호, 유효기간, 성명, 제휴코드 등 카드 및 회원에 관 한 정보가 담겨져 있다. 이 카드는 데이터 기록 용량이 일반적으로 72byte로써 다량의 데 이터 저장이 불가능할 뿐만 아니라 부정 사용에 대한 방지대책이 미흡하고 재저장 능력이 없는 등 기능상의 한계가 드러나고 있어 IC 카드로 교체되고 있다.',
  },
  '자기자본비율': {
    title: '자기자본비율',
    content: '자산(= 부채+자기자본) 중에서 자기자본이 차지하는 비중(자기자본비율 = 자기자본/총자본 ×100)을 나타내는 대표적인 재무구조 지표이다. 자기자본은 금융비용을 부담하지 않고 기업이 장기적으로 활용할 수 있는 안정된 자본이므로 이 비율이 높을수록 기업 재무구조 의 안정성이 높다고 할 수 있다. 우리나라 비금융 영리법인기업 전체(전산업)의 2024년 자기자본비율은 49.5%(제조업은 58.8%, 비제조업은 39.5%)이다.',
  },
  '자기자본이익률(ROE)': {
    title: '자기자본이익률(ROE)',
    content: '자기자본을 이용해 얼마나 효율적으로 이익을 창출했는지를 보여주는 수익성 지표이다. 자기자본이익률이 높다는 것은 자기자본에 비해 당기순이익을 많이 내 효율적으로 영업 활동을 했다고 평가할 수 있다. 다만 과도한 부채 사용으로 자기자본이익률이 높아진 경 우 경영위험이 높아지게 된다.',
  },
  '자동안정화장치': {
    title: '자동안정화장치',
    content: '경제정책을 입안하고 시행하는 과정은 간단하지 않다. 정책의 효율성을 점검해야 하며, 효율성이 입증되었다고 해도 경기상황에 대한 정보수집과 예측, 정책입안, 입법절차 등 을 거쳐 실제로 정책을 시행하기까지 많은 시간이 소요된다. 또한 정책시행에 있어서도 준칙을 따를 것인가 재량에 의존할 것인가도 정책의 효과에 영향을 미친다. 이와 같이 적 극적인 경제정책은 여러 가지 한계와 어려움 때문에 상황에 따라서는 더 큰 부작용이 발 생할 가능성이 내재되어 있다. 이러한 점을 고려하여 일부 경제학자들은 수동적인 자동안 정화장치를 경제정책으로 활용할 것을 권장하였다. 자동안정화장치의 대표적인 예로는 누진세를 꼽을 수 있다. 누진 세제는 경기가 침체할 때 추가적인 입법 과정 없이 자동으로 조세부담을 줄여 경기를 활성화하는 효과가 있다. 반대로 경기가 과열일 때는 과세표준이 늘어나 조세부담이 커지면서 경기를 진정시킬 수 있다. 사회보장제도나 실업보험제도 등 도 자동안정화장치의 예이다. 자동안정화장치는 이처럼 경기변동의 폭을 자동으로 완화 해 주는 장점을 갖고 있지만, 경기가 회복되기 시작하여 완전고용 상태로 가는 과정을 더 디게 하는 단점도 있다. 경기가 회복되면서 소득세가 늘어나 소비지출이 줄고 실업수당의 지급이 줄어들면서 정부지출이 감소하여 총수요의 증가가 일부 상쇄되기 때문이다.',
  },
  '자발적 실업': {
    title: '자발적 실업',
    content: '자발적 실업이란 일할 의사가 있어 고용되기를 원하지만 현재의 임금수준이 낮다고 생각 하여 스스로 일하고 있지 않는 상태에 있는 실업이다. 자발적 실업은 완전고용과 밀접한 관계가 있다. 완전고용은 경제활동인구 가운데 현재의 주어진 임금수준에서 일할 의사가 있는 사람은 모두 고용되는 상태이다. 즉, 완전고용의 상황에서는 비자발적 실업은 전혀 존재하지 않는다. 따라서 자발적 실업이란 완전고용을 가정할 때 경제활동인구에서 고용 된 인구를 뺀 나머지를 자발적 실업이라 할 수 있다. 다만 완전고용 상태에서도 모두 고용 될 수 없는 불가피한 두 가지의 실업이 있다. 첫째, 현재의 일자리보다 더 나은 일자리를 모색하는 과정에서 나타나는 마찰적 실업이다. 둘째, 특정 산업의 사양화나 최저임금제, 노동조합, 임금경직성 등 제도적 요인 때문에 발생하는 구조적 실업이다. 이러한 두 실업 은 경기가 호황이든 불황이든 상관없이 발생하므로 완전고용을 정의할 때는 제외한다.',
  },
  '자본거래자유화': {
    title: '자본거래자유화',
    content: '자본거래의 자유화란 직접투자나 간접투자를 불문하고 정부 혹은 민간이 제3국과의 사이 에 자본을 사용 목적, 방법 등에 대해 어떠한 간섭도 받지 않은 채 자유롭게 공급 또는 도 입하고 나아가 동 자본의 원금과 이자의 상환 등에 제한을 받지 않도록 하는 것, 간단히 말해 국경 간의 자본이동을 자유화하는 것을 의미한다. 따라서, 자본거래의 자유화는 내 국인 또는 국내기업(거주자)의 국외 투자와 외국인 또는 외국기업(비거주자)의 대내 투자 양 측면의 자유화를 포괄한다. 자본거래의 자유화는 무역자유화 및 외환거래 자유화와 함 께 일국 경제체제의 개방 및 자유화를 달성하는 가장 중요한 요소이며 최종단계이기도 하 다. 우리나라는 1980년대부터 자본거래의 자유화를 추진하기 시작하여 1992년 주식시장 을 부분적으로 개방하였고 1996년 OECD 가입과 1997년 외환위기를 계기로 그 속도를 높였다. 특히 외환위기 이후 외국자본의 유치 필요성이 높아지면서 주식, 채권 및 단기금 융시장이 순차적으로 개방되었고 1999년 외국환거래법 시행과 함께 국내기업 및 금융기 관뿐만 아니라 개인의 외환 및 자본거래도 대폭 자유화하였으며, 2006년 외화거래 자유 화를 추진하여 거주자의 해외부동산 투자 자유화, 대외채권회수의무 면제 등 자본거래를 더욱 자유화하였다.',
  },
  '자본생산성': {
    title: '자본생산성',
    content: '재화 및 서비스를 생산하기 위하여 투입한 자본의 양과 그 결과 생산된 산출물의 양의 비 율을 자본생산성(Capital Productivity)이라 한다. 이와 비교하여 상품 및 서비스를 생산 하기 위하여 투입한 노동의 양과 그 결과 생산된 산출물의 양의 비율은 노동생산성이라 한다. 이러한 자본생산성과 노동생산성은 각각 자본과 노동의 평균 생산성을 의미한다. 한편 한계자본생산성은 자본 한 단위를 추가로 투입할 때 얻을 수 있는 산출량의 증가분 을 뜻하는 것으로 경제성장 분석에서 유용한 지표로 이용되고 있다.',
  },
  '자본시장법': {
    title: '자본시장법',
    content: '증권거래법, 간접투자자산운용업법, 신탁업법 등 자본시장 관련 6개 법률을 통합한 「자본 시장과 금융투자업에 관한 법률」(2009년 2월 시행)을 말한다. 동 법률의 목적은 자본시 장과 금융투자업에 관한 규제를 개편하여 금융혁신과 경쟁을 촉진하고 대형 투자은행 육 성과 자본시장 활성화 등 직접금융시장을 확충함으로써 기존 은행중심의 간접금융체계와 조화를 도모하기 위한 기반을 조성하는 것이었다. 금융투자업을 투자매매업·투자중개업· 집합투자업·신탁업·투자일임업·투자자문업 등 6개로 구분하고 동 업무를 영위하려는 자 로 하여금 원하는 업무를 복수 또는 단수로 선택적으로 인가를 받거나 등록을 한 후 영업 을 할 수 있도록 하였다. 이와 관련하여 이해 상충 발생 가능성이 높다고 인정되는 금융투 자업 간에는 매매에 관한 정보제공 금지, 임직원의 겸직제한, 사무공간 등의 공동이용 제 한 등을 의무화하였다. 또한 고유자산 및 운용자산이 각각 2조원 이상, 6조원 이상인 금융 투자업자는 의무적으로 사외이사를 선임하고 감사위원회를 설치하도록 하였다. 동 법은 금융투자상품을 포괄주의에 입각하여 원본손실이 발생할 가능성이 있는 모든 금융상품으 로 정의하였다. 금융투자상품을 증권, 장내파생금융상품, 장외파생금융상품으로 구분하 고 증권은 다시 채무증권, 지분증권, 수익증권, 증권예탁증권, 투자계약증권, 파생결합증 권 등으로 구분하였다.',
  },
  '자본적정성': {
    title: '자본적정성',
    content: '자본이란 재무상태표상 자산에서 부채를 차감한 금액으로 순자산(net worth)으로 불리기 도 하며, 납입자본 및 이익잉여금 등으로 구성된다. 자본은 사업을 시작하거나 유지하기 위한 핵심 자금으로, 영업활동을 위한 자금조달의 기초가 될 뿐만 아니라 예상치 못한 손 실에 대비하는 완충장치 역할을 한다. 이러한 의미에서 금융기관의 자본은 지급청구에 대 응할 능력을 유지시키면서 해당 금융기관이 감당할 수 있는 최대 손실규모를 의미하기도 한다. 그러므로 금융기관의 자본적정성은 금융기관이 현재 영위하는 사업 및 형태에 비추 어 당해 금융기관의 현재 및 미래의 영업활동을 원활히 지원할 수 있고 향후 발생 가능한 손실을 흡수하는 데 필요한 자본의 보유 정도를 의미한다고 할 수 있다. 한편 감독당국은 각 금융업권의 감독규정을 통해 금융기관의 자본적정성 규제를 운용하고 있는데 은행, 보 험회사, 증권회사에 대해 각각 BIS 자기자본비율, 지급여력비율(K-ICS비율), 순자본비율 이 일정 기준 이상을 충족하도록 하고 있다.',
  },
  '자본적지출': {
    title: '자본적지출',
    content: '자본재에 대한 사용 가능 햇수(내용연수)의 연장을 목적으로 한 대수선 또는 개보수나 생 산성 또는 생산되는 재화의 질과 양을 현저하게 향상시키는 지출을 말한다. 즉 기계, 설 비, 구조물 또는 기타 고정자산에 대한 주요 개조나 증축이 이에 해당하며 총고정자본형 성(투자)으로 처리한다.',
  },
  '자산건전성 분류': {
    title: '자산건전성 분류',
    content: '금융기관이 보유자산 등에 대해 건전성 여부를 분석하여 불건전자산의 발생을 예방하고 이미 발생한 불건전자산에 대하여는 조기 정상화를 촉진하게 함으로써 금융기관의 자산 운용 건전화를 도모하는 한편 영업활동에서 발생하는 손실 중 사전에 예상되는 손실에 대 한 손실흡수력을 확보하고 있다. 금융기관은 감독당국의 자산건전성 분류기준에 따라 보 유자산의 건전성 상태를 매 분기 정기적으로 점검하여 정상, 요주의, 고정, 회수의문, 추 정손실의 5단계로 분류하고 이에 상응하는 적정 수준의 대손충당금 등을 적립·유지하여 야 한다.',
  },
  '자산유동화': {
    title: '자산유동화',
    content: '일반적으로 특수목적기구(SPV)가 자산보유자로부터 자산을 양도·신탁 받아 이를 기초 로 자산유동화증권(ABS)을 발행하고 해당 유동화자산의 관리·운용·처분에 의한 수익이 나 차입금으로 자산유동화증권의 원리금 또는 배당금을 지급하는 일련의 행위를 말한다. 자산유동화(Securitization)는 자산보유자의 신용과 분리하여 유동화자산 그 자체에서 발생되는 현금흐름을 바탕으로 자금을 조달하는 금융기법으로서 자산보유자의 재무구조 개선, 자금조달 비용 절감, 투자자 확대 등의 장점이 있다. 자산유동화증권은 유동화대상 자산에 따라 그 종류가 다양한데 예를 들어 기초자산이 주택담보대출인 경우에는 주택저 당증권(MBS), 기초자산이 기업 매출채권인 경우에는 자산담보부 기업어음(ABCP)이라고 한다. 「자산유동화에 관한 법률」에 의한 자산유동화증권 발행기관(SPV)으로는 유동화전 문회사, 자산유동화업무를 전업으로 하는 외국법인, 「자본시장과 금융투자업에 관한 법 률」상 신탁업자 등이 있다.',

  '자연독점': {
    title: '자연독점',
    content: '상품의 특성 때문에 시장에서 자연스럽게 생겨난 독점을 말한다. 자연독점(Natural Monopoly)은 생산규모가 커질수록 생산비용이 계속 낮아지는 규모의 경제(economies of scale)가 존재할 때 발생한다. 규모의 경제가 큰 산업의 경우에는 시장에 먼저 진입하 여 대규모 생산능력을 갖춘 선발기업이 가격경쟁력을 바탕으로 다른 후발기업의 시장진 입을 자연스럽게 봉쇄할 수 있다. 예를 들어 지역 주민에게 수돗물을 공급하는 경우 공급 자는 도시 곳곳에 수도관을 설치해야 한다. 이때 복수의 공급자가 수돗물을 공급한다면 공급자마다 수도관을 설치해야 하는데, 이를 위해서는 막대한 고정비용을 지출해야 한다. 따라서 수돗물을 공급하는 평균비용은 하나의 공급자가 존재할 때 가장 낮다. 전기나 전 화 등을 공급하는 경우도 마찬가지이다. 자연독점은 초기 투자비용이 커서 투자비용 회수 에 오랜 기간이 걸린다는 특징을 가지고 있다. 자연독점은 생산 면에서는 가장 효율적이 지만, 소비자로서는 독점의 피해가 나타날 수도 있기 때문에 많은 나라에서는 자연독점기 업이 적당한 가격을 유지하도록 규제하고 있다.',
  },
  '자연실업률': {
    title: '자연실업률',
    content: '1968년 프리드먼(M. Friedman)이 처음 제시한 개념으로, 경제의 균형상태에서 상품 시장과 노동시장 등의 구조적 요인에 의해 결정되는 실업률을 말한다. 이는 노동시장의 구조적·마찰적 요인에 의해 결정되는 실업률로서 영(0)의 실업률을 의미하는 것이 아니라 인플레이션이 안정적으로 유지될 수 있는 가장 낮은 수준의 실업률을 의미한다. 실업률과 인플레이션의 관계는 통화론자와 케인즈학파간 오랜 논쟁거리 중의 하나로, 통화론자인 프리드먼은 예상치 못한 인플레이션이 발생하는 경우 일시적으로 실업률이 하락할 수는 있으나 장기적으로는 노동자들이 인플레이션을 인지하게 되어 임금상승을 요구하게 됨으 로써 장기적으로 인플레이션만 유발할 뿐 실업률은 자연실업률 수준으로 수렴한다고 주 장하였다. 반면 케인즈학파 학자들은 낮은 수준의 실업률을 유지하려는 정책적 노력이 높 은 수준의 물가상승률을 초래하는데 그치지 않고 물가상승률을 가속시킬 수 있다는 점을 강조하였다. 이와 관련하여 이들이 제시한 NAIRU(Non-Accelerating Inflation Rate of Unemployment; 비가속적인플레이션실업률)는 인플레이션이 상승하거나 하락하지 않 고 안정적으로 유지될 수 있는 실업률 수준을 지칭하는 점에서 사실상 프리드먼의 자연실 업률과 같은 개념이다.',
  },
  '자원민족주의': {
    title: '자원민족주의',
    content: '석유, 가스, 광물 등 천연자원을 보유한 국가가 이에 대한 소유권과 관리권을 강화하고 이 를 지렛대 삼아 국제사회에 대한 경제적, 정치적 영향력을 확대하는 국가주의적 경향을 자원민족주의라 일컫는다. 자원에 대한 소유권과 관리권을 강화하기 위해 외국기업이 소 유하고 있는 자원을 국유화하거나 외국기업의 자국내 자원개발에 대해 조건을 까다롭게 하고 국내 자원의 수출량을 제한하는 등의 방식이 대표적인 자원민족주의 행태이다. 자원 민족주의는 자국의 국가안보와 이익보호라는 측면에서 과거로부터 계속되고 있는 일종의 이데올로기적 이념주의 한 유형이지만 최근 들어 더욱 강화되는 모습을 보이고 있다. 특 히 코로나 위기를 계기로 자원에 대한 안정적 공급망 확보가 중요해진 이후에는 이를 둘 러싼 미국과 중국간 경쟁적 갈등이 심화되면서 자원민족주의 경향이 우려 수준에 이르고 있는데 배터리 등 디지털산업 발전에 필수적인 희토류를 대량으로 보유하고 있는 중국 및 중남미 국가들의 강력한 생산 및 수출 통제가 대표적 사례이다.',
  },
  '자유재': {
    title: '자유재',
    content: '희소성이 높지 않고 아무런 대가를 치르지 않아도 무상으로 얻을 수 있는 재화를 말한다. 이는 희소성을 가지며 경제적 거래를 통해 얻을 수 있는 경제재(economic goods)의 반 대 개념이다. 자유재(Free Goods)는 대가를 치르지 않고서도 얼마든지 원하는 만큼 얻을 수 있기 때문에 경제문제를 일으키지 않으며 희소성의 원칙도 적용되지 않는다. 현실세계 에서 자유재는 매우 드물다. 공기, 물, 햇빛 등이 전통적으로 자유재로 고려되었으나 양질 의 생수를 높은 비용으로 구매하고, 맑은 공기를 마시기 위하여 휴양림을 찾아가는 등 기 존에 자유재로 고려되던 재화들이 상황 변화에 따라 경제재로 변하기도 한다. 일반적으로 재화라고 하면 경제재를 의미하며 통상 경제학은 경제재를 분석대상으로 한다.',
  },
  '작업증명': {
    title: '작업증명',
    content: '작업증명(Proof-of-Work)은 제3자로부터의 서비스 요청(request)이 악의적인 공격 (spam 또는 DoS, Denial of Service)이 아님을 증명하기 위해서, 자원이 소모되는 작업 을 추가로 수행할 것을 요구하는 것을 의미한다. 대표적인 작업증명으로는 웹사이트 로 그인시 특정한 문자 및 그림을 읽고 입력할 것을 요구하는 캡차를 들 수 있다. 작업증명의 특징은 비대칭성인데, 서비스 요청자가 수행하는 데는 어느 정도 자원이 소모되지만 이를 확인하기는 매우 쉬워야 한다. 작업증명은 가상자산인 비트코인 등을 채굴하는 합의 과정 에 활용되고 있다.',
  },
  '잠상': {
    title: '잠상',
    content: '은행권 위조방지를 위한 장치의 하나로 인쇄된 글자나 문양이 보통상태에서는 잘 보이지 않으나 보는 각도나 빛의 방향에 따라 보이는 장치를 말한다. 잠상(Latent Image)은 정면 에서 볼 때는 보이지 않지만 은행권을 비스듬히 기울여 비춰봤을 때 숨겨놓은 문자나 문 양이 나타나는 요판 인쇄기술의 하나다. 위조를 위해 복사를 해도 숨겨진 문자나 문양이 나타나지 않아 위조지폐인지 여부를 쉽게 알아볼 수 있게 해준다. 오만원권은 은행권을 기울여보면 앞면 인물 그림 오른쪽에 있는 동그란 무늬 속에서 숫자 “5”가 나타나며, 만원 권·오천원권·천원권에는 앞면 하단에 띠 모양안에 문자 “WON”이 나타난다.',
  },
  '잠재GDP성장률': {
    title: '잠재GDP성장률',
    content: '잠재GDP성장률은 노동이나 자본 등의 자원을 최대로 활용하였을 때 유지되는 실질GDP 의 증가율로서 한 나라 경제의 최대성장능력을 의미한다. 잠재GDP는 일정한 잣대로 추 계할 수 없는 추상적인 개념이어서, 추정에 사용되는 원칙이나 통계분석기법 등에 따 라 결과가 상이하다는 한계가 있다. 한편 잠재GDP는 성장률도 의미가 있지만 그 수준 이 실제GDP보다 얼마나 높은가 또는 낮은가를 살피는 것도 매우 중요하다. 실제GDP 성장률이 잠재GDP성장률을 상회하더라도 그 수준은 잠재GDP를 하회할 수도 있다. 또한 우리나라와 같이 대외의존도가 매우 높은 경우에는 정의에 의한 생산요소의 완전고 용으로 규정하기에는 어려움이 있다. 그럼에도 잠재GDP성장률은 경제의 적정성장목표를 설정하는 데 유용하여 거시경제정책을 수립하고 시행하는 데 있어 널리 활용되고 있다.',
  },
  '잠재경제활동인구': {
    title: '잠재경제활동인구',
    content: '취업자도 아니고 실업자도 아닌 상태로 인해 비경제활동인구로 분류되었지만 취업 가능 성과 의사 등을 고려하여 잠재적인 측면에서 경제활동인구로 간주되는 잠재취업가능자와 잠재구직자를 합한 개념이다. 잠재취업가능자는 비경제활동인구 중에서 지난 4주간 구직 활동을 하였으나 조사대상주간에 취업이 가능하지 않은 자를 가리킨다. 아울러 잠재구직 자는 비경제활동인구 중에서 지난 4주간 구직활동을 하지 않았지만 조사대상주간에 취업 을 희망하고 취업이 가능한 자를 말한다.',
  },
  '장기금융시장(자본시장)': {
    title: '장기금융시장(자본시장)',
    content: '금융시장은 거래 금융상품의 만기를 기준으로 단기금융시장(Money Market)과 자본시장 (Capital Market)으로 구분되는데 자본시장은 만기 1년 이상의 장기채권이나 만기가 없 는 주식이 거래되는 시장을 말한다. 자본시장은 주로 기업, 정부 등 자금 부족부문이 자금 잉여부문으로부터 장기적으로 필요한 자금을 조달하는 데 활용되고 있어 장기금융시장이 라고 부른다. 우리나라의 자본시장에는 주식이 거래되는 주식시장과 국채, 회사채 및 금 융채 등이 거래되는 채권시장이 있다.',
  },
  '장기침체': {
    title: '장기침체',
    content: '장기침체(Secular Stagnation)는 1938년 Hansen이 기술 정체와 인구증가율 둔화에 따른 투자기회의 대폭 축소로 미국경제가 1930년대 대공황 발생 이후에도 회복되지 못하 고 과소 투자 및 총수요 부족에 직면할 것으로 예측하면서 처음 사용한 용어로 알려져 있 으며, 최근에는 하버드대학의 Summers 교수가 IMF경제포럼(2013.11) 연설에서 “선진 국 경제는 2000년대 초부터 구조적 요인에 의해 장기침체에 진입하였다”고 주장하면서 널리 회자되고 있다. 장기침체란 경제활동의 장기적 침체라는 뜻으로 대체로 실제GDP가 잠재GDP를 하회하는 가운데 총수요가 억제 되어 있거나 공급측면에서 잠재GDP가 정체 되어 있는 상황으로 정의된다. 여기서 장기는 인구고령화 등에 따른 노동증가율 감소, 혁 신 정체, 자본투자 감소 등 공급요인에 의해 성장잠재력이 축소되는 현상과 연관이 있다. 그리고 침체는 디레버리징 등 기초경제여건의 변화, 소득불평등 심화, 재정지출 축소, 글 로벌 금융위기 이후 위험회피성향의 증가 등 수요요인에 의해 성장회복이 지연되거나 성 장이 정체되는 것으로 경기순환과 관련이 있다. 장기침체란 용어 자체가 수요요인(경기순 환)과 공급요인(성장잠재력)이 혼재되어 있기 때문에 장기침체 여부와 그 원인에 대해서 는 다양한 시각이 존재한다.',
  },
  '장내시장': {
    title: '장내시장',
    content: '장내시장이란 주식과 같은 유가증권이나 금융상품 등이 표준화된 거래방식에 따라 거래 가 이루어지는 조직화된 시장을 말한다. 한국거래소가 운영하는 유가증권시장이나 코스 닥시장이 대표적인 장내시장이다. 장내시장은 대표적인 유통시장(secondary market)인 데 이미 발행된 유가증권의 시장성과 환금성을 높여주고 자유로운 경쟁을 통해 공정한 가 격을 형성하는 기능을 한다. 주식이 유가증권시장이나 코스닥시장에서 거래가 되기 위해 서는 상장이 되어야 하는데 이를 위해서는 해당 기업이 영업활동기간, 규모, 주식분산, 경 영성과 등과 관련하여 일정한 요건을 충족해야 한다. 채권의 경우 최근에 발행된 국고채 (on-the-run)가 대표적인 채권 장내시장인 국채전문유통시장에서 거래가 이루어진다. 한편 소액 국공채(액면 5천만원 미만)는 환금성 제고를 위해, 전환사채는 수요기반 확충 을 위해 장내거래가 의무화되어 있다. 이런 거래를 제외한 일반적인 채권, 단기금융상품 및 파생상품 등은 대부분 장외시장에서 거래된다.',
  },
  '장단기금리차': {
    title: '장단기금리차',
    content: '장단기금리차란 일정 시점에서 장기금리와 단기금리의 차이를 의미한다. 장단기금리차 는 다양한 만기의 지표금리를 이용해서 산출할 수 있다. 예를 들어 어떤 시점에서 국고 채금리(3년 만기)가 2.0%이고 한국은행 정책금리가 1.5%라면 여기서 장단기금리차는 0.5%p(2.0%-1.5%)이다. 또는 10년만기 국고채금리와 3년만기 국고채금리의 차이도 또 하나의 장단기금리차로 이해할 수 있다. 여기서의 장단기는 통상 1년을 기준으로 하기 보 다는 비교하려는 만기의 상대성에 달려있다. 즉 후자의 예에서 10년을 장기로 보는 경우 3년은 단기의 의미로 비교된 것이다. 장단기금리차는 시장이 경제를 어떻게 바라보고 있 는지를 판단하는데 유용한 지표로 활용된다. 장단기금리차가 줄어들고 있다면(정책금리 는 한국은행이 결정하기 때문에 새로운 정책금리 결정이 나오기 전까지는 변함이 없는 반 면 장기금리는 하락) 이는 경제성장률이 떨어지고 실업률이 상승하는 등 향후 경제가 더 나빠질 것으로 시장이 기대한다고 볼 수 있다. 특히 이런 상황에서 경기진작을 위해 한국 은행이 정책금리를 인하할 것이라는 기대가 강화되는 경우에는 이런 현상이 더욱 두드러 진다. 시장이 정책금리 인하를 극단적으로 기대하는 경우에는 3년 국고채금리가 한국은 행 정책금리를 하회하는 현상도 발생한다. 이를 장단기금리 역전이라고 한다. 반대로 장 단기금리차가 확대되고 있다면 향후 경제가 좋아질 것이라고 시장이 기대한다고 볼 수 있 다. 특히 경제성장률이 잠재성장률에 근접하고 있어 한국은행이 정책금리를 인상할 것이 라는 기대가 형성되는 경우 그 차이는 더욱 확대된다. 또한 장단기금리차는 채권의 수급 에 의해서도 영향을 받는다. 장기채권에 대한 수요가 많아지면 장기금리가 하락하여 장단 기금리차가 축소되고 장기채권의 공급이 많아지면 장기금리가 상승하여 장단기금리차가 확대된다. 장단기금리차의 변화는 수익률곡선의 형태가 가팔라지거나(steepening) 평탄 해지는(flattening) 것으로 표현되기도 한다. 수익률곡선이 가팔라진다는 것은 장단기금 리차가 확대되는 것을 의미하고 수익률곡선이 평탄해진다는 것은 장단기금리차가 축소되 는 것을 의미한다.',
  },
  '장외시장': {
    title: '장외시장',
    content: '장외시장(OTC; Over-The-Counter)이란 장내시장이 아닌 시장에서 중개기관을 통해 개 별적으로 거래가 이루어지는 시장을 말한다. 장내시장에서 거래가 되기 위해서는 금융상 품이 표준화되어야 하는데 채권이나 단기금융상품 또는 파생상품은 표준화하기 어렵다. 예를 들어 채권은 국채, 지방채, 특수채, 금융채, 회사채, 자산유동화증권 등 종류도 많은 데다 발행(잔존) 만기, 발행금리 및 신용도 등이 다르기 때문에 현실적으로 표준화하기 어 렵다. 콜, 기업어음 등 단기금융상품이나 파생상품도 다양한 발행(잔존) 만기, 다양한 표 면금리, 상이한 신용도 등으로 인해 표준화하기 곤란하다. 이처럼 표준화가 어려운 금융 상품들은 장내거래를 하지 못하고 불가피하게 장외시장에서 거래가 이루어지게 된다. 장 외거래는 보통 중개회사가 전화, 인터넷 메신저 등을 통해 매도 또는 매수를 원하는 투자 자의 호가를 받은 후 반대거래를 원하는 상대방을 찾아 거래를 성사시킨다. 따라서 장내 거래와는 달리 장외거래가 활성화되기 위해서는 중개기관의 역할이 매우 중요하다.',
  },
  '재산소득': {
    title: '재산소득',
    content: '국민계정에서 재산소득(Property Income)이란 금융자산 또는 자연자원(주로 토지 및 지 하자원)의 소유주가 타 경제주체에게 자금을 공급하거나 유형 비생산자산을 사용하도록 하고 그 대가로서 수취하는 소득을 말한다. 금융자산은 이자, 배당 등 투자소득의 형태로, 자연자원은 임료의 형태로 재산소득이 발생한다. 이를 구체적으로 살펴보면, 재산소득은 이자, 배당 및 준법인기업소득인출, 국외직접투자에 대한 재투자수익, 투자소득지급, 임 료 등으로 분류된다. 이자는 예금, 채무증권, 대출 및 기타 수취권 등 금융자산의 소유주 가 위에 자금을 공급하거나 유형 비생산자산을 사용하도록 하고 그 대가로서 수취하는 소 득을 말한다. 배당은 주주가 법인기업으로부터 자금 공여의 대가로 취득하게 되는 소득이 다. 준법인기업소득인출은 소유주가 기업에 자금을 투자함으로써 발생하는 소유주의 소 득이다. 국외직접투자에 대한 재투자수익은 거주자의 해외직접투자 또는 비거주자의 국 내직접투자에서 발생한 이익이 배당 등의 형태로 실제로 배분되고 남은 유보이익을 의제 하여 투자자에게 지급 처리한 것을 말한다. 투자소득지급은 보험가입자의 법적준비금 및 연금자산 등의 운용에서 수취하는 투자소득을 해당 자산의 실제 소유자에게 지급된 것으 로 의제처리 한 소득이다. 임료는 토지, 지하자원 등 자연자원 사용에 대한 재산소득으로, 현재 우리나라는 토지에 대한 임료만을 계상하고 있다.',
  },
  '재정수지': {
    title: '재정수지',
    content: '정부의 수입과 지출의 차이를 재정수지라고 한다. 수입과 지출이 같으면 균형, 수입이 더 많으면 흑자, 지출이 더 많으면 적자라고 한다. 재정적자가 발생하면 국채발행이나 차입 이 늘어나 정부부채가 증가하게 된다. 정부의 재정활동은 조세와 정부지출의 형태로 가계 의 소비와 기업의 투자라는 거시경제의 순환에 영향을 주게 된다. 재정지출로 정부서비스 가 생산되지만 일정 부문은 조세 등으로 조달된 자금이 타 부문으로 이전되는 성격도 갖 고 있다. 그래서 재정적자가 과다하지 않도록 유로존(EU)은 안정성장 협약에 의거 회원국 들의 재정적자를 GDP의 3% 이내, 장기적인 정부부채는 GDP의 20%를 넘지 않도록 관 리하고 있다. 한편 우리나라는 당해 연도의 총수입에서 총지출을 뺀 것을 “통합재정수지” 라고 지칭하고, 통합재정수지에서 국민연금기금, 사립학교교직원연금기금, 산업재해보상 보험및예방기금 등 사회보장성 기금의 수지를 제외한 재정수지를 별도로 “관리재정수지” 라고 별도로 산출 운용하고 있다. 이는 사회보장성 기금수입은 장기적인 미래지출을 위한 것으로 당해 연도의 재정활동 결과로 보기 곤란하며 기금의 성숙도에 따라 대규모 흑자나 적자가 발생하여 당해 연도의 재정활동을 판단하는데 효과적이지 않을 수 있기 때문이다.',
  },
  '재정정책': {
    title: '재정정책',
    content: '정부의 지출과 조세를 정책수단으로 사용하는 정부의 제반 정책을 일컬어 재정정책이라 고 한다. 재정정책의 목표는 일반적으로 완전고용, 물가안정, 국제수지 균형, 경제성장, 소득재분배 등이 있다. 그러나 좁은 의미 또는 단기적으로는 정부지출과 조세수입의 양과 구조를 의도적으로 변화시켜 총수요를 조절함으로써 경제안정을 도모하려는 확장적 혹 은 긴축적 재정활동만을 재정정책이라 한다. 예를 들어 단기적으로 불황이 발생할 경우 정부지출을 늘려 경기를 진작할 수 있다. 또한 기업의 연구개발 지출에 보조금을 지급하 면 기술개발이 촉진돼 장기적으로 경제성장률이 확대될 수 있다.',
  },
  '재정환율': {
    title: '재정환율',
    content: '자국 통화와 다른 외국 통화가 국내외환시장에서 직접적으로 거래되지 않는 경우 각각의 시장에서 결정되는 가격을 이용해 산출하는 환율을 말한다. 예를 들면 일본 엔화와 원화 를 교환할 수 있는 시장이 없으므로 원/엔 환율은 서울 외환시장에서 결정된 원/달러 환 율과 도쿄 외환시장에서 형성된 엔/달러 환율을 이용하여 산출한다. 만약 원/달러 환율 이 1,100원이고, 엔/달러 환율이 달러당 110엔이라면 재정환율인 원/엔 환율은 100엔당 1,000원이 된다. 이처럼 재정환율을 사용하는 이유는 세계적으로 각국 외환시장에서의 거래가 대부분 미 달러화를 중심으로 이루어지고 있어 기타 통화 간 외환시장은 발달되어 있지 않기 때문이다. 2025년 6월 현재 우리나라는 서울외국환중개회사가 서울 외환시장 에서 결정되는 원/달러, 원/위안 환율과 국제금융시장에서 형성된 미 달러화와 다른 통화 간 환율(크로스 레이트)을 매개로 하여 55개 통화에 대한 재정환율을 매일 고시하고 있다.',
  },
  '적기시정조치제도': {
    title: '적기시정조치제도',
    content: '부실화 징후가 있는 금융기관(은행, 보험사, 저축은행, 금융투자업자, 여전사 등)에 대하 여 적기에 경영개선을 유도·강제함으로써 조기에 경영을 정상화시키거나 경영정상화 가 능성이 없는 금융기관은 퇴출시키는 제도이다. 금융위원회는 자본충실도가 해당 금융업 권의 지표(일반은행의 경우 BIS 자기자본비율의 기준비율)에 미달하거나 경영실태평가 (일반은행 본점의 경우 CAMEL-IR 방식 등) 결과가 일정등급 이하인 경우 금융기관에 대 하여 그 미달 정도에 따라 단계별 시정조치인 경영개선권고, 경영개선요구, 경영개선명령 을 자동으로 부과하게 된다.',
  },
  '전방연쇄효과': {
    title: '전방연쇄효과',
    content: '전방연쇄효과란 특정 산업에서 제품의 생산이 증가할 때 동 생산품을 중간재나 원재료로 사용하는 산업에 미치는 경제적 파급 효과를 말한다. 특정 산업의 생산이 증가하면, 동 산 업의 생산품을 중간재로 활용하는 다른 산업들의 생산비용이 낮아지거나 공급이 원활해 지면서 이들 산업의 생산과 부가가치 창출에도 긍정적인 영향을 줄 수 있다. 전방연쇄효 과는 산업연관분석(Input-Output Analysis)에서 중요한 개념 중 하나로, 특정 산업이 공 급 측면에서 경제 전체에 얼마나 영향을 미치는지를 보여준다. 예를 들어, 석유화학 산업 은 플라스틱, 섬유, 자동차 등 다양한 산업에 원재료를 제공하는데, 석유화학 산업의 생산 증가가 다른 산업의 생산 확대를 유발하는 작용이 바로 전방연쇄효과이다.',
  },
  '전산업생산지수': {
    title: '전산업생산지수',
    content: '우리나라 경제전체의 모든 산업을 대상으로 재화와 용역에 대한 생산활동의 흐름과 변화 를 월별지수로 나타낸 것이다. 모든 재화와 용역의 생산수준을 한 눈에 볼 수 있는 종합 지표로 업종별로 생산증감의 방향이 다를 때 전체산업의 방향 파악가능하다. 전산업생산 지수는 광공업생산지수와 서비스업생산지수로 구분할 수 있으며, 광공업생산지수는 광 업, 제조업, 전기·가스업을 대상으로 일정 기간 중에 이루어진 산업생산활동의 수준을 나 타내는 지표이며 서비스업생산지수는 한국표준분류상의 서비스업에 해당되는 13개 산업 의 생산활동을 종합적으로 파악하기 위한 것으로 개별업종의 상대적 중요도인 부가가치 기준 가중치를 적용하여 지수화한 것이다. 생산지수는 전체 경기의 흐름과 거의 유사하게 움직이는 대표적인 경기동행지표이다. 또한 동 지수들은 GDP 통계의 추계를 위한 기초 자료로 사용되며, 생산활동의 수준을 파악할 때 GDP와 함께 핵심적인 지표로 사용되고 있다.',
  },
  '전세가율': {
    title: '전세가율',
    content: '전세가율은 주택매매가격 대비 전세가격(전세보증금)의 비율을 의미하는데, 예를 들어 매 매가격이 10억원이고 전세가격이 6억원이라면 전세가율은 60%이다. 전세가율은 일반적 으로 임차인의 전세(보증)금 반환 안정성을 판단하는 지표로 사용되는데, 전세가율이 높 을수록 주택가격의 하락시 전세금 반환 리스크가 커질 수 있기 때문이다. 전세가율이 높 은 상황에서 주택가격이 하락하여 매매가격이 기존 전세금보다 낮아지면 임대인이 해당 주택을 매도해도 전세금을 돌려줄 수 없는 상황(깡통전세)이 발생할 수 있다. 한편 전세가 율은 주택매매가격의 변동 추세를 파악하는 선행지표로 사용되기도 하는데, 이는 전세가 율이 상승할 경우 갭투자(전세보증금을 활용하여 적은 돈으로 주택을 매입하는 투자방식) 유인이 확대됨으로써 주택매매가격의 상승 압력으로 작용하기 때문이다.',
  },
  '전자금융': {
    title: '전자금융',
    content: '금융업무에 컴퓨터 및 정보통신기술을 적용하여 자동화 및 전자화(Network 화)를 구 현하는 것을 말한다. 국내의 전자금융거래법에서는 이러한 전자금융거래를 ‘금융회사 또는 전자금융업자가 전자적 장치를 통하여 금융상품 및 서비스를 제공하고, 이용자가 금융회사 또는 전자금융업자의 종사자와 직접 대면하거나 의사소통을 하지 아니하고 자 동화된 방식으로 서비스를 이용하는 거래’로 정의하고 있다. 전자금융의 수단으로는 홈뱅 킹, 펌뱅킹 등의 PC뱅킹과 전화기를 이용한 폰뱅킹이 주로 이용되었으나, 정보처리 기술 및 통신기술을 활용한 각종 전자금융서비스의 개발이 이루어짐으로써 시간적·공간적 제 약 없이 금융서비스를 이용할 수 있게 되었다. 최근에는 스마트폰의 등장과 함께 다양한 직불 및 선불 전자지급수단이 출시되고 금융기관을 중심으로 모바일금융서비스 제공이 확산되고 있다. 특히 금융과 IT기술의 융합이 가속화되면서 출현한 금융서비스는 기존 금 융기관이 아닌 IT업체들의 전자금융산업 참여를 가능하게 하였으며, 금융과 기술의 융합 인 핀테크(Fintech)가 등장하는 등 관련 산업환경이 변화하면서 비금융기업들의 참여가 더욱 활발하게 진행될 것으로 예상된다.',
  },
  '전자금융공동망': {
    title: '전자금융공동망',
    content: '전자금융공동망은 ARS공동망을 확대 개편하여 2001년 4월부터 가동된 시스템으로 인터 넷뱅킹, 모바일뱅킹 등 전자금융서비스에 대한 중계업무를 처리하고 있다. 전자금융공동 망의 대상 업무는 유·무선전화, PC 등의 매체를 통해 이루어지는데 크게 대고객업무와 중 계업무로 구분된다. 대고객업무는 예금잔액 및 신용카드 관련 각종 정보조회업무, 수표의 사고유무 조회 및 환율조회 등이며, 중계업무에는 타행이체, 타행이체 거래확인 조회 및 자기앞수표 조회 업무 등이 있다. 전자금융공동망을 이용할 수 있는 예금계좌에는 보통예 금, 당좌예금, 저축예금, 기업자유예금, 투자자예탁금 등이 있다. 은행의 전자금융업무 운 영시간은 연중무휴로 00시 05분부터 23시 55분까지로 하되, 공동운영시간대인 07시부 터 23시 30분 이외 시간대의 운영여부는 참가기관이 자율적으로 정하고 있다.',
  },
  '전자단기사채': {
    title: '전자단기사채',
    content: '전자단기사채란 자본시장법상의 채무증권으로서 실물이 아닌 전자적으로 발행·유통되 는 단기금융상품을 말한다. 전자단기사채의 법적 성격은 어음은 아니지만 경제적 실익은 기존의 기업어음과 동일하다. 다만, 기업어음은 실물로 발행·유통되나 전자단기사채는 실 물없이 중앙등록기관의 전자장부에 등록하는 방식으로 발행·유통되는 점이 다르다. 전자 단기사채는 어음이 갖는 문제점, 즉 공시의무가 없어 시장의 투명성과 투자자 보호 장치 가 미흡한 점, 위·변조, 분실 등 실물발행에 따른 위험 등을 개선하고, 등록기관의 전자장 부에 등록하는 방식으로 발행·유통됨에 따라 거래의 투명성을 높이는 한편 증권사 등 비 은행금융기관이 다양한 단기자금 조달 및 운용수단을 갖도록 하여 단기금융시장의 리스 크가 콜시장으로 집중되는 것을 방지하기 위해 2013년 1월에 도입되었다. 전자단기사채 로 인정받기 위해서는 ① 금액은 1억원 이상 ② 만기는 1년 이내 ③ 사채금액은 일시 납입 ④ 만기에 전액 일시 상환 ⑤ 주식관련 권리부여 금지 ⑥ 담보설정 금지 등 여섯 가지 요건 을 갖추어야 한다. 만기를 1년 이내로 제한한 것은 회사채시장과의 경합 가능성을 최소화 하기 위해서다. 전자단기사채의 발행기관, 인수·매매기관 및 중개기관은 성격상 기업어음 시장과 거의 유사하다. 한편, 2019년 9월부터 전자증권법이 시행됨에 따라 기존에 쓰이 던 명칭인 ‘전자단기사채’가 ‘단기사채’로 변경되었다.',
  },
  '전자상거래': {
    title: '전자상거래',
    content: '인터넷을 이용하여 가상공간에서 광고, 발주, 수주 등의 상거래 및 대금지급을 수행하는 것을 말한다. 전자상거래(EC; Electronic Commerce)는 초기에 기업 간 거래가 대부분 이었으나 인터넷의 보급 확산에 따라 일반 소비자를 대상으로 물품을 판매하거나 서비스 를 제공하는 사이버 쇼핑 등이 많이 증가하고 있다. 또한 시간과 공간의 제약이 없고 유통 비용 등 부대비용이 들지 않는다는 장점으로 인하여 실물거래에서부터 교육·의료·금융서 비스 분야 등으로 급속도로 확산되고 있다. 지급수단으로는 신용카드, 은행 계좌이체, 전 자화폐 등이 이용되고 있다. 세계 각국은 전자상거래를 보다 활성화시키기 위해 인터넷을 통해 안전하게 지급할 수 있는 수단을 적극적으로 개발하고 있는데, VISA·Master Card 등에서 전자상거래의 안전성을 확보할 수 있는 SET(Secure Electronic Transaction)이 라는 전자상거래 S/W를 공동으로 개발한 것이 그 예이다.',
  },
  '전자서명': {
    title: '전자서명',
    content: '전자서명은 수기서명의 전자적인 대체물로서 전자 문서의 진정성 및 작성자의 신원을 확 인할 수 있도록 암호화한 정보를 말한다. 광의의 전자서명에는 수기서명을 스캐닝한 이미 지, 접근제어를 위한 비밀번호 등이 있으나 「전자서명법」에 의한 전자서명은 공개키 암호 방식에 의한 디지털 서명만을 의미하고 있다. 특히 「전자서명법」에 따라 공신력과 인증시 스템을 갖추어 지정받은 공인인증기관에 의해 발급된 전자서명을 공인인증서라고 하며 각종 금융거래 및 전자정부 서비스 이용 시 보편적으로 사용되고 있다. 우리나라의 공인 인증기관으로는 금융결제원, 코스콤, 한국정보인증, 한국전자인증, 한국무역정보통신 등 5개 기관이 있으며, 각 기관별로 전문서비스 영역이 특화되어 있다.',
  },
  '전자어음': {
    title: '전자어음',
    content: '전자어음은 실물어음이 아닌 전자적 형태로 발행된 어음으로 발행인, 수취인, 금액 등 어 음 정보를 전자문서 형태로 작성하며 전자어음 관리기관(금융결제원)의 전산시스템에 등 록된 약속어음이다. 따라서 전자어음은 발행, 배서, 권리행사, 소멸 등 모든 단계가 온라 인에서 전자적인 방법으로 처리되나 법적인 효력은 실물 약속어음과 동일하다. 전자어음 은 어음 거래의 투명화, 분실·도난 등 사고 예방, 어음 유통과 관리비용을 절감하고 어음 제도의 폐해를 보완하기 위한 것으로, 2005년 9월부터 「전자어음의 발행 및 유통에 관한 법률」(약칭 「전자어음법」)에 근거하여 전자 지급수단으로 사용되고 있다. 실물어음과 다 른 전자어음만의 특징으로는 백지어음 발행 및 배서 불가능, 환어음 발행 불가능, 만기일 은 발행일로부터 1년까지 가능, 배서 횟수는 20회로 제한, 지급지는 금융기관(은행)으로 한정 등이 있다. 한편 정부의 약속어음제도 폐지 추진에 따라 2016년중에 「전자어음법」 이 개정되어 2018년 5월 30일부터 3년 이내에 전자어음의 만기가 6개월에서 3개월로 단 계적으로 축소됨으로써 2021년 5월 30일부터 3개월이 적용되고 있다.',
  },
  '전자정보교환제도': {
    title: '전자정보교환제도',
    content: '금융기관 수납장표의 전자정보교환제도(Truncation)란 공과금 납부용지, 지로용지, 어 음, 수표 등 금융기관에서 수납하는 각종 장표를 표준화하고 전산화하여 장표 실물의 이 동 없이 전산망을 통한 정보(전산데이터)의 이동만으로 교환 업무를 처리하는 제도이다. 이를 통해 장표의 실물 이동 및 수작업에 따른 인적·물적 비용, 분실, 도난 등 사고 발생 및 오류발생 가능성을 크게 감소시키게 되었다. 수납장표 전자정보교환제도는 2000년 5 월 자기앞수표를 시작으로 대상 장표의 범위를 확대하여 2009~2010년중 어음 및 기타 수표의 교환이 정보화되면서 마무리되었다. 이에 따라 현재 금융결제원은 어음, 수표 및 장표지로의 교환업무를 모두 전자정보교환방식으로 수행하고 있다.',
  },
  '전자지급결제대행(PG)': {
    title: '전자지급결제대행(PG)',
    content: '전자지급결제대행(PG; Payment Gateway)이란 인터넷 쇼핑몰 등의 전자상거래에서 구 매자로부터 대금을 수취하여 판매자에게 지급될 수 있도록 지급정보를 송·수신하는 것 또 는 그 대가의 정산을 대행하거나 매개하는 것을 의미한다. 가령 구매자가 인터넷 쇼핑몰에 서 신용카드로 대금을 지급하는 경우 신용카드 PG업자는 해당 쇼핑몰(가맹점)을 대신하여 신용카드사에 거래내역 및 승인정보 등 지급정보를 전송하고 신용카드사로부터 대금을 지 급받아 일정 수수료를 공제한 후 가맹점에 지급하게 된다. 온라인상의 전자상거래 규모가 급속히 늘어남에 따라 PG업자는 IT업체가 중심이 되어 동 서비스를 제공하고 있다.',
  },
  '전자화폐': {
    title: '전자화폐',
    content: 'IC카드 등에 화폐가치를 저장하였다가 상품 등의 구매에 사용할 수 있는 전자지급수단으 로서 범용성과 환금성을 갖춘 것을 말한다. 전자화폐(Electronic Money)의 유형은 가치 저장 매체에 따라 IC카드형과 네트워크형으로 구분할 수 있다. IC카드형은 플라스틱 카 드 위에 부착된 IC칩에 화폐가치를 저장하였다가 상품이나 서비스를 구매한 후 가맹점용 단말기 등을 통하여 대금을 지급하는 형태의 전자화폐로 국내에는 K-Cash, VisaCash, MYbi 등이 있다. 인터넷 네트워크를 통하여 구매대금을 지급하는 형태의 네트워크형 전 자화폐는 현재는 발행되지 않고 있다.',
  },
  '전자화폐공동망': {
    title: '전자화폐공동망',
    content: '전자화폐공동망은 금융기관이 공동으로 개발한 한국형 전자화폐(K-CASH) 이용시 발생한 금융기관간 정산금액을 결제하기 위한 시스템으로 2000년 7월 가동되었다. K-CASH 이 용자가 본인의 예금을 기반으로 전자화폐에 가치를 저장하면, 발행은행은 고객의 예금계좌 에서 전자화폐 구매금액을 인출하여 선불계정에 예치한다. 구매거래가 발생하여 금융결제 원으로부터 지급 및 정산내역을 전송받으면, 결제할 금액을 선불계정에서 인출하여 한국은 행과의 차액결제를 통해 매입은행에 이체한다. 한편 2013년 3월 국내은행들과 금융결제원 이 공동개발한 모바일지갑 서비스인 뱅크월렛(BankWallet)의 선불전자지급수단인 뱅크머 니(BankMoney)도 전자화폐공동망을 이용하여 개인간 송금 서비스를 제공하고 있다. 전 자화폐 거래의 결제과정에는 발행은행, 매입은행, VAN사업자 및 전자화폐공동망센터(금 융결제원)가 참여하고 있으며, 은행간 거래차액의 결제는 한은금융망을 통해 이루어진다.',
  },
  '전환사채(CB)': {
    title: '전환사채(CB)',
    content: '전환사채(Convertible Bond)란 사채로 발행되었지만, 일정 기간이 지난 후 소유자의 청 구에 의하여 발행회사의 주식(보통주)으로 전환할 수 있는 권리가 부여된 사채를 말한다. 처음 기업이 발행할 땐 보통의 회사채와 동일하지만 일정 기간이 지나 주식전환권이 행사 되면 채권을 주식으로 바꿔 주가 상승의 이익을 취할 수 있다. 예를 들어 A기업이 1년 만 기 전환사채를 만기보장수익률 10%, 전환가격 10,000원으로 발행한다고 가정하자. 향 후 주가가 11,000원 이상(11,000원 이하인 경우에는 채권으로 이자를 수취하는 것이 더 유리함)이 되었다면 주식으로 전환해 시세 차익을 얻을 수 있고 주가가 11,000원 이하 일 경우에는 만기까지 채권을 보유해 10%의 이자를 받으면 된다. 전환사채는 수익성이 기대되나 위험이 있어 투자자금 확보에 어려움을 겪는 기업, 채권과 주식의 장점을 모두 취하려는 투자자에게 이용된다. 만기보장수익률은 보통의 회사채에 비해 낮은 편이어서 기업의 입장에서는 일반 회사채에 비해 낮은 비용으로 자금을 조달할 수 있다.',
  },
  '정규직/비정규직': {
    title: '정규직/비정규직',
    content: '정규직은 법적인 개념은 아니지만 기간이 정해져 있지 않은 고용형태로 근로자와 사업주 가 직접 근로계약을 체결하고 전일제로 근무하면서 정년까지 보장된다는 의미로 받아들 이고 있다. 따라서 회사가 소멸되지 않는 한 원할 때까지 계속 근무가 가능하며 임금, 휴 가, 상여금 등의 각종 복지혜택도 받을 수 있다. 반면 비정규직은 근로기간이 정해져 있는 계약직과 일용직, 파견 도급직, 상시 근로를 하지 않는 시간제 근로자 등을 포함하는 개념 으로 계약기간이 종료되는 시점이 정해져 있다. 인턴은 일정기간 근무시켜 능력과 성품 등을 평가하여 필요시 채용하는 방식이다. 계약직은 일반계약직과 무기계약직으로 구분 할 수 있다. 우선 일반계약직은 회사와 근로자가 정해진 한정된 기간에 근로계약을 맺은 것으로 정년이 보장되지 않기 때문에 정규직보다 불안정하고 임금 및 근무환경이 열악하 다. 무기계약직은 일반계약직과는 달리 계약기간을 정하지 않은 것이지만 임금 및 복지나 승진 등에 대해서는 일반계약직과 비슷하다. 파견직은 아웃소싱 업체에 고용되어 있으면 서 다른 업체로 파견되어 일하는 근로자를 말한다. 파견기간이 2년이 넘게 되면 파견 나 간 다른 업체에서 직접 고용해야 할 의무가 생긴다.',
  },
  '정보의 비대칭성': {
    title: '정보의 비대칭성',
    content: '시장에서 거래의 당사자인 쌍방 간의 상호작용에 필요한 정보량에 차이가 있는 경우를 말 한다. 이러한 정보의 비대칭성(Information Asymmetry)은 효율적인 자원배분을 불가 능하게 하며 역선택(adverse selection)이나 도덕적 해이(moral hazard) 등의 문제를 낳 는다. 역선택은 중고차시장의 경우와 같이 판매자가 파는 물건의 속성에 대해 구매자보 다 정보가 많을 때 생기는데 이런 상황에서는 판매자가 구매자에게 품질이 낮은 물건을 시장에 아예 내놓지 않게 되거나, 구매자가 좋지 않은 물건을 비싸게 사게 된다. 노동시장 이나 보험시장에서도 역선택이 문제가 되는데, 노동시장의 경우 기업이 근로자의 생산성 을 잘 알 수 없어 시장균형이 사회적으로 비효율적인 상태가 될 수 있으며 보험시장의 경 우에는 사고를 당할 가능성이 낮은 사람들은 보험조건이 자신들에게 불리하기 때문에 아 예 보험에 가입하지 않게 되는 문제가 생긴다. 도덕적 해이는 대리인이 사용자를 위해 어 떤 임무를 수행할 때 발생하는 문제로, 대리인의 부적절하거나 비도적적인 행위에 따른 위험을 지칭한다. 자동차보험에 가입한 후 안전운전을 소홀히 하거나, 국민건강보험이 잘 되어 있다고 해서 특별한 이상이 없는데도 병원에 자주 가는 것 등은 도덕적 해이의 예이 다. 도덕적 해이를 방지하기 위해 사용자는 대리인이 보다 성실하게 행동하도록 인센티브 를 지급하거나 감시체계를 구축하는 등의 방법을 활용한다.',
  },
  '정부당좌예금계정': {
    title: '정부당좌예금계정',
    content: '정부의 재정활동과 관련하여 발생하는 모든 국고금의 수입과 지출을 관리하는 계정을 정 부당좌예금계정이라 한다. 동 계정은 한국은행 본부에만 설치되어 있는데 한국은행 본부 및 지역본부, 한국은행 국고대리점 및 체신관서 등에서 취급하는 수입금 및 지출금 등 일 체의 국고금 수급 내역이 계상된다. 그러나 2003년 「국고금 관리법」의 제정으로 예외조 항이 신설됨에 따라 당행 외에 금융기관에도 예치가 가능해져 현재 금고은행에 일부 기금 이 예탁되어 있다. 당행은 동 계정의 수급내역을 명확히하기 위해 일반회계, 특별회계, 기 금 및 특별계정으로 구분하여 관리한다. 일반회계는 국가예산의 근간이 되는 것으로서 주 로 조세와 같은 일반 세입과 국가기능 유지를 위한 일반 지출을 회계처리하기 위한 용도 이며, 특별회계는 국가가 특정사업(우편·양곡·조달관리 등)을 운영하고자 하거나, 특정 한 세입으로 특정한 세출에 충당하고자 할 때 일반회계와 구분하여 회계처리하기 위한 용 도이다. 기금은 특정한 분야의 사업에 대하여 지속적이고 안정적인 자금 지출이 필요하거 나, 개별 법률에 의해 탄력적인 집행이 필요한 경우에 회계처리하기 위한 용도이고, 특별 계정은 국고금 수급에 수반되는 자금의 흐름을 그 성격에 따라 명확하게 구분·회계처리하 기 위한 용도이며 세입·세출과는 무관하게 이루어진다.',
  },
  '정부실패': {
    title: '정부실패',
    content: '시장실패를 교정하기 위한 정부의 시장개입과 규제가 자원배분의 효율성을 높이기보다 오히려 해치는 경우가 있는데 이를 시장실패에 비유하여 정부실패(Government Failure) 라고 한다. 정부실패는 규제자의 불완전한 지식·정보, 규제수단의 불완전성, 규제자의 경 직성 등의 이유로 발생한다. 또한 정부는 대부분 영역에서 독점적인 지위를 갖고 있어 민 간기업처럼 경쟁해야 할 필요가 없으며 성과에 따라 보상을 받는 유인제도가 부족하므로 정부실패가 발생하기도 한다. 예컨대 최근 여러 국가에서 정부는 국민의 안정된 노후생활 을 보장하기 위해 사회보장제도를 시행하고 있다. 그러나 정부가 사회보장제도를 잘못 운 영하면 근로능력이 있음에도 고의로 일을 하지 않는 계층이 생기고 사회보장기금이 방만 하게 운영되는 등 심각한 비효율이 초래될 수 있다. 이런 경우 정부의 시장개입이 오히려 자원배분의 효율성을 악화시키는 정부실패를 가져오게 된다. 정부실패를 방지하기 위해 서는 정부정책의 투명성 강화, 정부부문에의 유인제도 도입, 입법부·감사원·시민단체 등 에 의한 감시활동 강화 등의 조치가 필요하다.',
  },
  '정책모기지/주택 정책대출': {
    title: '정책모기지/주택 정책대출',
    content: '정부의 주택 정책목표(주거복지 증진과 대출 접근성 제고)를 달성하기 위해 정부재정을 직·간접적으로 투입하여 주택금융공사와 주택도시기금으로 하여금 구입 주택 혹은 전월 세 보증금을 담보로 시중보다 낮은 금리로 관련 주택자금을 제공하도록 하는 다양한 주택 관련 정책대출 상품(보금자리론, 디딤돌대출, 버팀목대출 등)을 의미한다. 정책모기지는 취약계층과 서민·실수요층의 주거 안정을 지원하고 주택자금 상환부담을 낮추는 한편 안 심전환대출 등을 통해 주택담보대출에서 고정금리·분할상환 대출이 차지하는 비중을 높 임으로써 가계부채의 질적 구조를 개선하는데 기여하고 있다. 또한 저출산·인구구조 변 화에 대응하기 위해 청년·신혼부부·출산가구로 공급대상을 확대하고 지원대상 요건(연소 득, 주택가격 등)도 완화하였다. 한편 보증의 형태로 주택자금을 공급하는 경우까지 포함 할 경우 주택 정책금융이란 용어를 사용하고 있다.',
  },
  '정책시차': {
    title: '정책시차',
    content: '정책시차(Policy Lag)란 어떤 경제정책을 시행해야 하는 원인이 발생하여 동 정책을 집행 하는 데까지 걸리는 시간과 정책이 실제로 집행된 후 정책효과가 나타나는 데 걸리는 시 간을 말한다. 전자를 내부시차(inside lag)라 하고 후자를 외부시차(outside lag)라고 한 다. 일반적으로 재정정책은 정책이 집행되기까지의 내부시차가 긴 반면, 정책효과가 나타 나는 데 걸리는 외부시차는 짧다. 그 이유는 정부지출이나 조세제도를 변경하려면 시간이 걸리는 입법 절차를 거쳐야 하지만, 일단 정책이 집행되고 나면 총수요에 직접적인 영향 을 미치기 때문이다. 한편, 통화정책의 경우는 재정정책과는 달리 내부시차는 짧지만, 생 산, 물가 등 실물변수에 영향을 미치는 데는 상당한 시간이 걸리는 등 외부시차가 상대적 으로 길다. 예컨대 통화정책으로 기준금리가 인하되고 그것이 금융·외환시장을 거쳐 실물 부문의 가계 소비나 기업 투자 등으로 파급되기까지는 상당한 시간이 걸릴 수 있다.',
  },
  '정크본드': {
    title: '정크본드',
    content: '정크본드(Junk Bond)란 리스크가 상대적으로 큰 기업들이 자금 조달을 목적으로 발행한 고수익·고위험 채권을 말한다. 신용도가 낮은 회사가 발행한 채권이어서 원리금 상환 불 이행 위험이 크기 때문에 일반 채권금리에 가산금리를 더한 이자를 지급한다. 미국의 경 우 회사채는 만기 10~30년의 장기채 발행이 대부분을 차지하고 있는데, 신용등급이 높은 우량기업 발행채권이 대부분을 차지한다. 1970년대 중반 이후 기업의 매수 합병 및 구조 조정 과정에서 다수의 기업들이 경영 악화와 부채 증가 등으로 투자부적격 등급으로 하락 하면서 정크본드 시장이 형성되기 시작하였다. 우리나라의 정크본드 시장은 자산유동화 증권(ABS; Asset-Backed Securities)과 관련이 있다. ABS를 설계할 때 신용보강을 위해 위험요소가 경감될 수 있도록 원리금 지급 우선순위에서 선순위와 후순위로 차등을 둔다. 이 때 선순위채는 기초자산에서 나오는 현금흐름이 부족할 경우 후순위채보다 원리금을 우선적으로 지급받게 되며, 일반적으로 후순위채는 정크본드시장에서 소화시키거나 자산 보유자가 직접 인수하게 된다.',
  },
  '제1차 통화조치': {
    title: '제1차 통화조치',
    content: '한국전쟁의 여파로 산업활동이 크게 위축되고 물가가 급등하는 등 경제가 큰 혼란에 빠짐 에 따라 이를 타개하기 위하여 1953년 2월 15일 화폐단위를 ‘원(圓)’에서 ‘환( )’으로 변 圜 경하고 100대 1로 절하(100圓 → 1 )하는 긴급통화조치를 단행하였다. 1953년 2월 17 圜 일부터 ‘圓’표시 한국은행권의 유통을 중지시켰으며 그 동안 한국은행권과 함께 저액면용 으로 통용되어 오던 7종류 조선은행권(10圓, 5圓, 1圓, 50錢, 20錢, 10錢 및 5錢)과 일본 정부의 소액보조화폐(1錢주화)의 유통도 전면 중지하고 환( ) 표시 한국은행권만을 유일 圜 한 법화로 인정함으로써 우리나라 화폐의 완전한 독자성이 확보되었다.',
  },
  '제2차 통화조치': {
    title: '제2차 통화조치',
    content: '정부는 1962년부터 「경제개발 5개년 계획」을 추진하면서 퇴장자금의 산업 자금화 등을 위하여 1962년 6월 10일 긴급통화조치를 단행하여 화폐단위를‘환( )’에서 ‘원’으로 변 圜 경하고 10대 1로 절하(10 → 1원)하고 ‘환( )’ 표시 화폐의 유통과 거래를 금지하였다 圜 圜 (단, 50환화와 10환화는 1975년 3월 21일까지 유통). 한국은행은 긴급통화조치에 의해 500원권, 100원권, 50원권, 10원권, 5원권 및 1원권 등 6종의 새로운 은행권을 발행하 고 소액거래시 1원 미만 끝자리수 처리의 편의를 도모하기 위하여 1962년 12월 1일에 10전권과 50전권도 발행하였다. 본 조치는 경제적 목적 달성보다는 ‘원’표시 도입이라는 의의를 가진다.',
  },
  '제로금리정책': {
    title: '제로금리정책',
    content: '금융기관 간에 여유자금과 부족자금을 빌리는 단기금융시장에서 거래되는 초단기 자금의 금리(한국과 일본의 콜금리, 미국의 페더럴펀드금리 등)를 0%에 가까운 수준으로 떨어뜨 리는 통화정책을 말한다. 중앙은행이 단기금리를 제로 근처로 유도하는 것은 시중 유동성 을 풍부하게 하여 금융경색을 억제하고 경기침체를 극복하기 위한 목적인 것이 보통이다. 일본의 경우 1999년 초 일본은행이 경기활성화를 위해 콜금리를 0.02%까지 떨어뜨리며 제로금리정책을 펼쳤으나 당초 기대만큼 소비나 투자활성화가 이루어지지 않아 2006년 7월 제로금리정책을 폐기한 바 있다. 이와 관련하여 2001년 3월 일본은행은 장기간의 경 기침체에서 벗어나기 위해 양적완화(QE; Quantitative Easing) 정책을 처음으로 도입했 다. 양적완화는 금리가 제로(‘0’)에 가까운 상태에서 경기부양을 위해 국채 등 다양한 금융 자산의 매입을 통해 시중에 돈을 공급하는 것이다. 중앙은행이 금리를 조절해 간접적으로 시중 유동성을 조절하던 전통적인 방식과 달리 양적완화는 금융자산 등을 사들이는 방법 으로 시장에 통화량 자체를 늘리는 정책인데 2008년 글로벌 금융위기 이후 미국, EU, 영 국 등 국제적으로 도입이 확산돼 왔다. 2008년 12월 글로벌 금융위기로 미국도 제로금리 를 도입하였다.',
  },
  '제조업생산능력/가동률지수': {
    title: '제조업생산능력/가동률지수',
    content: '생산능력지수는 공급능력의 수준과 동향이 어떻게 변화하는가를 나타낸 것이며, 가동률 지수는 생산실적과 생산능력의 비율인 설비이용도를 지수화한 것으로서 경기동향 분석의 기초 자료로 이용된다. 두 지수는 공급능력과 설비가동의 절대수준을 나타내는 것이 아니 라 기준년도의 생산능력과 가동률을 100으로 하였을 때 비교시의 공급능력과 가동상태가 어느 수준인가를 나타낸다. 일반적으로 생산은 자가소비, 출하 및 재고변동의 합으로 표 현하는데 출하가 생산보다 경기에 대해 민감(선행)한 경향이 있다. 따라서 경기가 하강하 는 경우 출하는 즉시 감소하나 기업이 생산을 급격히 감소시키기 어려우므로 재고가 증가 하게 된다. 반대로 경기가 회복되는 경우 출하가 증가하면서 재고가 감소하고 뒤따라 생 산이 증가하게 된다. 한편, 가동률은 경기의 움직임에 따라 변동한다. 가동률 = 생산실적/생산능력×100',
  },
  '제조업평균가동률갭': {
    title: '제조업평균가동률갭',
    content: '제조업평균가동률만으로는 경제내에 유휴생산능력이 있는지 여부와 그 크기를 판단하는 데 한계가 있게 된다. 이러한 점을 고려하여 한 시점에서의 제조업평균가동률이 동 가동 률의 잠재수준에서 얼마만큼의 편차를 보이는가를 계산하여 그 판단의 참고로 활용하는 데 이 편차를 제조업평균가동률갭이라 한다. 일반적으로 잠재수준은 해당연도의 장기평 균(예를 들면 10년 이전 기간 제조업가동률의 평균)을 계산하여 사용한다. 제조업평균가 동률갭이 마이너스이고 절대값이 클수록 유휴생산능력이 확대되고 있는 것으로 보아 투 자위축과 실업 등을 예상하게 되고, 플러스이면서 클수록 공급측면에서의 문제가 발생할 가능성을 예상하게 된다.',
  },
  '조세부담률': {
    title: '조세부담률',
    content: '조세부담률은 국민계정에서 조세수입이 국민총소득(GNI)에서 차지하는 비중으로 정의된 다. 이는 국민 전체의 조세부담 정도를 나타내 주는 지표로 조세의 누진 정도, 국가의 조 세징수능력 등에 따라 결정된다. 반면, 재정통계의 조세부담률은 국가 및 지방자치단체가 거둬들인 국세 및 지방세 수입이 경상금액기준 국내총생산에서 차지하는 비율로 파악된 다. 조세부담률이 높다는 것은 국민들이 벌어들인 소득 중에서 세금으로 납부하는 비중이 높다는 것이다. 조세부담률 = (국세 + 지방세)/경상GDP×100 한편, 국민부담률이란 개념도 있는데 이는 국가가 가입을 의무화하거나 재정에서 지급을 보장하는 각종 공적 사회보험에 대한 보험료 등을 조세수입에 더하여 경상GDP대비 비 율을 산출한 것이다. 사회보장기여금은 4대 공적연금인 국민연금, 공무원연금, 사학연금, 군인연금과 고용보험, 산업재해보상보험, 건강보험, 노인장기요양보험 등이다. 국민부담률 = (국세+지방세+사회보장기여금)/경상GDP×100',
  },
  '종합금융투자사업자': {
    title: '종합금융투자사업자',
    content: '신성장 동력 산업과 대규모 해외 프로젝트 등을 지원할 수 있는 투자은행 출현을 유도하 기 위해 2013년 도입된 제도이다. 자기자본 3조원 이상 등 일정 요건을 갖춘 증권사를 종 합금융투자사업자(투자은행)로 지정하여 기업 신용공여 업무 등을 취급할 수 있도록 하 고 있다. 이와 더불어 2016년 8월 제도 개편을 통해 종합금융투자사업자의 자본 확충을 통한 대형화를 유도하였는데, 자기자본이 4조원 이상인 경우 단기금융업무(만기가 1년 이내인 어음의 발행, 할인, 매매, 중개, 인수 및 보증업무)를 허용하고 있으며, 8조원 이 상인 경우에는 종합투자계좌(고객으로부터 예탁 받은 자금을 통합하여 기업금융자산 등 에 운용하고 그 수익을 고객에게 지급하는 것을 목적으로 개설된 계좌(IMA; Investment Management Account) 업무를 허용하고 있다.',
  },
  '죄수의 딜레마': {
    title: '죄수의 딜레마',
    content: '전략적 상황에 처한 경제주체들의 행동을 분석하는데 유용하게 활용되는 게임이론의 한 예로서, 협력적인 선택이 양자에게 최선임에도 불구하고 자신의 이익에 치중한 선택으로 인해 오히려 두 사람 모두에게 바람직하지 않은 결과를 가져오는 상황을 말한다. 죄수의 딜레마(Prisoners’ Dilemma)는 1950년 미국 프린스턴대 터커(A. Tucker) 교수가 게임 이론을 설명하기 위해 이용한 다음의 예화에서 비롯되었다. 경찰이 두 용의자 Ⅰ, Ⅱ를 격 리하여 심문하면서 자백을 이끌어 내려고 다음과 같이 말하였다고 가정한다. ① 한 사람 이 자백하고 다른 사람은 입을 다물었다면 자백한 사람은 1단위의 보상, 입을 다문 사람 은 2단위의 벌금형이 부과된다. ② 두 사람이 모두 자백하면 각각에게는 1단위의 벌금형 이 부과된다. ③ 두 사람이 모두 자백하지 않으면 Ⅰ과 Ⅱ는 혐의가 없다. 이러한 상황에서 두 사람이 직면하는 보상행렬은 아래와 같아지는데, Ⅰ과 Ⅱ는 모두 상대방의 전략과 상 관없이 자백하는 전략을 선택하게 되므로 결과적으로 두 사람이 서로를 믿고 자백하지 않 는 전략을 취할 때보다 나쁜 결과에 직면하게 된다. 구분 용의자 Ⅰ 자백함 자백하지 않음 용의자 Ⅱ 자백함 (-1, -1) (-2, 1) 자백하지 않음 (1, -2) (0, 0) 즉 개인적인 수준에서는 합리적인 선택이 구성원 전체로 보아서는 비합리적인 선택이 되 는 결과를 가져오는 딜레마를 낳게 되는데, 이 같은 죄수의 딜레마 문제는 광고경쟁, 기업 의 환경오염, 국가간 군비경쟁 등 다양한 상황에 적용될 수 있다.',
  },
  '주가수익비율(PER)': {
    title: '주가수익비율(PER)',
    content: '주가가 실제 기업의 가치에 비해 고평가되어 있는지, 아니면 저평가되어 있는지 여부를 판단할 때 활용하는 대표적인 지표로 주가수익비율(PER; Price Earning Ratio)이 있다. PER는 기업의 주가를 주당순이익(EPS; Earning Per Share)으로 나눈 값으로, 해당기업 의 주가가 그 기업 1주당 수익의 몇 배 수준으로 거래되는지를 나타낸다. 이에 따라 특정 기업의 현재 PER가 과거 추이 또는 수익구조가 유사한 타기업 등과 비교해 높을 경우 주 가가 기업가치에 비해 고평가되었다고 판단할 수 있다. 개별기업 PER의 개념을 주식시장 전체로 확장하면 상장기업 주가수준의 국가간 비교도 가능해진다. 국내 증시의 PER가 주 요국보다 낮을 경우 국내 상장기업의 주가가 기업가치에 비해 저평가되었다고 판단할 수 있다. 한편, PER 이외에도 주가순자산비율(PBR; Price to Book Ratio)이 기업가치 대비 주가수준 판단지표로 많이 활용되고 있다. PBR은 기업의 주가를 주당순자산(BPS; Book- value Per Share)으로 나눈 값이다. PER가 기업의 수익성 측면에서 주가를 판단하는 지 표라면, PBR는 기업의 재무구조 측면에서 주가를 판단하는 지표이다.',
  },
  '주가순자산비율(PBR)': {
    title: '주가순자산비율(PBR)',
    content: '주가순자산비율(PBR; Price to Book Ratio)은 주가를 주당순자산가치(BPS; Book- value Per Share)로 나눈 비율이다. 즉 기업의 순자산에 비해 주가가 얼마나 높은지 또는 낮은지를 나타내는 지표이다. 대부분의 성공적인 기업의 경우 주가순자산비율이 1을 크 게 상회하는데, 이는 시장이 해당 기업의 미래 성장성과 수익성을 높게 평가하고 있음을 의미한다. 기업별로 이 비율이 다른 것은 경영성과, 성장 가능성, 산업 특성 등 기업 고유 의 가치 차이가 반영되기 때문이다. 증권분석가들은 종종 주가순자산비율이 낮은 주식을 가치주식, 높은 주식을 성장주식으로 분류하기도 한다.',
  },
  '주가연계증권(ELS)': {
    title: '주가연계증권(ELS)',
    content: '주가연계증권(ELS; Equity Linked Security)은 개별 주식의 가격이나 특정 주가지수의 변동에 연계되어 특정조건 충족시 약정된 투자손익이 결정되는 금융투자상품이다. 주가 연계증권 발행 증권사는 발행대금의 상당부분을 채권, 예금 등 안전자산에 투자하는 한편 나머지를 주식, 주식관련 파생상품 등에 투자하여 약정수익 재원 확보를 위한 초과수익을 추구한다. 주가연계증권은 만기, 수익구조 등을 다양하게 설계할 수 있는 장점이 있으나 유가증권시장에 상장되지 않음에 따라 유동성이 낮고 발행증권사의 신용리스크에 노출 되는 단점이 있다. 대신 기초자산이 일정수준 이상인 경우 자동 조기상환되는 조건이 부 여되어 있으며 5~10%의 환매수수료를 부담하는 조건으로 발행증권사에 환매를 요구할 수 있다. 한편 증권회사가 발행하는 주가연계증권과 유사한 상품으로는 자산운용사가 운 용하는 주가연계펀드(ELF; Equity Linked Fund)와 은행이 취급하는 주가연계예금(ELD; Equity Linked Deposit) 등이 있다. 주가연계증권은 1980년대 후반 미국, 홍콩 등에서 판매되기 시작하였으며, 우리나라에서는 2003년 2월 판매가 허용되었다. 발행방식은 공 모보다 사모가 많은 편이며 투자자는 개인 및 일반법인이 절반 이상을 차지하는 가운데 자산운용사, 퇴직연금, 신탁 등도 투자하고 있다.',
  },
  '주가지수선물거래': {
    title: '주가지수선물거래',
    content: '주가지수선물의 거래유형으로는 헤지거래, 투기거래, 차익거래, 스프레드거래 등이 있 다. 헤지거래는 현물(주식)포지션과 반대방향으로 선물을 매수 또는 매도함으로써 현물시 장에서 주가변동의 위험을 회피하는 것을 말한다. 따라서 헤지거래자는 주가변동 위험을 회피할 수 있지만, 주가 상승시 이익을 얻을 수 있는 기회도 상실하게 된다. 투기거래는 현물포지션 보유여부에 관계없이 선물 자체의 매매차익을 겨냥한 거래이다. 약정금액의 일부만으로 선물을 매매할 수 있다는 점으로 인해 레버리지 효과(leverage effect)가 발 생하므로 현물투자보다 위험이 크다. 차익거래는 선물가격과 현물가격간 차이가 적정수 준을 초과할 경우 선물과 현물중 상대적으로 고평가된 것을 매도하고 저평가된 것을 매수 한 후 양자간 가격차가 해소 또는 역전되었을 때 청산거래(반대매매)를 함으로써 무위험 차익을 얻는 거래기법이다. 스프레드거래는 만기나 기초자산이 상이한 주가지수선물간의 가격차이를 이용하여 수익을 획득할 목적으로 양 종목의 매입·매도포지션을 동시에 보유 하는 거래를 말한다. 이는 기초자산이 동일한 주가지수선물의 결제월물별 가격차이를 이 용하는 만기간 스프레드(calendar spread) 거래와 기초자산이 상이한 주가지수선물을 대 상으로 하는 시장간 스프레드(inter-market spread) 거래로 구분된다.',
  },
  '주가지수옵션': {
    title: '주가지수옵션',
    content: '주가지수옵션(Stock Index Options)은 주가지수(기초자산)를 만기일에 사전에 약정한 가격(행사가격)으로 매입하거나 매도할 수 있는 권리를 거래하는 파생금융상품으로서 매입권리인 콜옵션(call option)과 매도권리인 풋옵션(put option)으로 구분된다. 옵션 의 매도자는 매수자에게 옵션을 제공하고 매수자는 그 대가로 프리미엄(옵션가격)을 지급 한다. 콜옵션 매수자는 만기일에 기초자산가격(코스피200 종가 등)이 행사가격을 넘어서 면 권리를 행사할 유인이 발생하며, 기초자산가격이 행사가격에 프리미엄을 더한 값을 초 과하는 금액만큼 매수자의 이익(매도자의 손실)이 된다. 풋옵션 매수자는 만기일에 기초 자산가격(코스피200 종가 등)이 행사가격보다 낮아야만 권리를 행사할 유인이 발생하며, 기초자산가격이 행사가격에서 프리미엄을 차감한 값을 하회하는 금액만큼 풋옵션 매수자 의 이익(매도자의 손실)이 된다. 주가지수옵션은 주가지수선물과 마찬가지로 실물이 존재 하지 않는 주가지수를 대상으로 하고 있으나 거래의 목적물이 권리라는 점에서 주가지수 선물과 다르다. 또한 주가지수옵션은 주가지수선물과 달리 기초자산 가격변동에 따른 손 익구조가 비대칭적이다. 옵션매수자는 손실이 프리미엄으로 한정되는 반면 이익은 기초 자산가격에 비례하여 증가하고, 역으로 옵션매도자는 이익이 프리미엄에 국한되는 반면 손실은 제한이 없다. 주가지수옵션시장은 1983년 3월 미국의 시카고옵션거래소(CBOE; Chicago Board Options Exchange)에서 S&P100지수를 대상으로 최초로 개설되었으 며 우리나라에서는 1997년 7월에 코스피200 옵션시장이, 2001년 11월에 코스닥50 옵 션시장이 개설되었다.',
  },
  '주당순이익(EPS)': {
    title: '주당순이익(EPS)',
    content: '주당순이익(EPS; Earning Per Share)은 기업이 벌어들인 당기순이익을 동 기업이 발행 한 총 주식수로 나눈 값을 말한다. 당기순이익(net income)은 손익계산서상 계속사업손 익과 중단사업손익을 합산하여 산출된 최종손익을 의미하며, 해당 회계연도의 최종적인 경영성과를 나타낸다. 따라서 EPS는 통상 1년 동안 기업이 주식 1주당 얼마나 많은 이익 을 창출했는지를 나타내는 지표가 된다. EPS가 높다는 것은 그만큼 기업의 경영실적이 양 호하고 배당여력도 많다는 것을 의미하므로, 주가의 상승요인으로 작용하게 된다. EPS는 당기순이익 규모가 증가하면 높아진다. 한편, 전환사채(CB; Convertible Bond)의 주식 전환이나 증자로 주식수가 늘어나면 EPS는 낮아지게 된다. EPS는 기업의 수익성을 분석 하는 중요한 지표이며, 주가수익비율(PER) 계산의 기초가 된다. 개별 기업의 EPS 증가는 동 기업의 시장지배력이 확대되는 것으로 이해된다. 전체 산업의 EPS 증가는 신기술 개발 이나 신제품 출시 등 기술혁신이 활발히 이루어지고 있다는 신호로 해석될 수 있다.',
  },
  '주식시장': {
    title: '주식시장',
    content: '주식시장은 주식회사의 지분권을 표시하는 유가증권인 주식이 거래되는 시장이다. 주식 시장은 기업공개, 유상증자 등을 통해 주식이 새롭게 공급되는 발행시장과, 이미 발행된 주식이 투자자간에 거래되는 유통시장으로 나누어진다. 발행시장은 새로운 주식이 최초 로 출시되는 시장으로 제1차 시장(primary market)이라고도 한다. 발행시장은 기업, 금 융기관 등 자금수요자인 발행인, 자금공급자인 투자자, 주식발행사무를 대행하고 발행위 험을 부담하는 인수인으로 구성된다. 유통시장은 이미 발행된 주식이 매매되는 시장으로 제2차 시장(secondary market)이라고도 한다. 유통시장은 발행된 주식의 시장성과 환 금성을 높여주고 자유경쟁을 통해 공정한 가격을 형성하는 역할을 한다. 우리나라의 주 식 유통시장에는 유가증권시장, 코스닥시장, 코넥스시장, K-OTC시장이 있다. 이 중 유 가증권시장, 코스닥시장 및 코넥스시장은 한국거래소에서 개설·운영하는 장내시장이며, K-OTC시장은 장외시장이다. 유가증권시장은 동 시장의 시가총액이 우리나라 대표 주가 지수인 코스피의 산출 기준이 되므로 코스피시장이라고도 한다. 한편, 주식이 장내시장에 서 매매되기 위해서는 상장이라는 등록절차를 거쳐야 한다. 유통시장에서 투자자의 매매 주문은 투자중개업을 영위하는 금융투자회사를 거쳐 한국거래소에서 체결되며, 이에 따 른 결제는 매매일로부터 3일째 되는 날 한국예탁결제원을 통해 이루어진다.',
  },
  '주주환원정책': {
    title: '주주환원정책',
    content: '주주환원정책은 배당 확대, 자사주 매입 등 주주가치를 제고할 수 있는 정책을 의미한다. 배당을 늘리면 주주에게 지급되는 현금이 증가하여 직접적인 수익 환원이 이루어지고, 자 사주를 매입하면 시장에 유통되는 주식수가 감소하여 주가 상승 효과를 기대할 수 있다. 이러한 정책장기투자를 유도하고, 기업에 대한 시장의 신뢰를 높이는 데 목적이 있다.',
  },
  '주택저당증권(MBS)': {
    title: '주택저당증권(MBS)',
    content: '주택저당증권(MBS; Mortgage-Backed Securities)이란 자산유동화증권(ABS)의 일종 으로써 모기지(또는 주택담보대출)를 기초자산으로 발행되는 증권이다. 원래 주택저당 증권은 미국에서 제2차 세계대전 이후 참전한 군인들의 주거 안정을 위해 도입된 제도 인데 우리나라에서는 IMF 외환위기 이후 본격적으로 취급되기 시작하였다. MBS시장은 세 종류의 시장으로 구분되는데 1차 시장은 모기지 차입자와 모기지 대출기관 사이에 모 기지론이 이루어지는 시장이며, 2차 시장은 모기지 대출기관이 보유하고 있는 모기지를 유동화(증권화)하는 시장이며 자본시장은 모기지가 유동화된 주택저당증권이 투자자에 게 매각되고 유통되는 시장을 말한다. 주택저당증권은 일반 채권과는 다른 특징을 보유 하고 있다. 보통 채권은 발행자가 원리금 상환을 부담하는데 반해 MBS는 통상 기초자산 을 특수목적회사(SPC)에 이전하고 SPC가 발행하는 것이기 때문에 원리금 상환이 발행 자의 신용에 기초하기보다는 기초자산의 현금 흐름에 의존하게 된다. 또한 MBS에는 조 기상환위험(prepayment risk)이라는 독특한 위험이 존재한다. 시장금리가 하락하는 경 우에는 기존 모기지 차입자가 이자비용 절감을 위해 동 모기지를 조기에 상환하고 금리 가 더 낮은 모기지론을 받게 되는데 모기지 상환이 이루어지면 그것을 기초자산으로 하 고 있는 MBS도 조기에 상환이 이루어지게 된다. 이것을 투자자 입장에서 보면 자산 듀 레이션이 당초 예상보다 줄어들어 국채 추가 매입 등 자산 듀레이션을 더 늘려야 하는 문 제(반대로 시장금리가 상승하는 경우에는 자산 듀레이션이 당초 예상보다 늘어나 보유 채권 매각 등 자산 듀레이션을 줄여야 하는 문제)를 야기한다. 그래서 투자자는 MBS를 투자할 때는 적정 조기상환율을 산정하고 이를 토대로 투자를 하게 된다. 은행이 보유하 고 있는 모기지를 유동화하는 경우 모기지론에서 발생하는 이자수익은 줄어들지만 매각 대금으로 모기지를 추가로 취급할 수 있는 여력이 생기며 위험자산이 줄어들기 때문에 BIS비율이 올라가는 긍정적인 효과를 기대할 수 있다. 현재 우리나라에서는 은행이 모기 지론을 취급하며 한국주택금융공사가 동 모기지를 유동화하여 자본시장에 매각하는 형 태로 이루어지고 있다.',
  },
  '중간소비': {
    title: '중간소비',
    content: '생산과정에서 원재료, 광열비, 간접비 등으로 소비된 비내구재 및 서비스를 말하는 것으 로써 고정자산의 유지보수를 위한 지출 등이 포함되고 중고품과 폐품의 순판매액은 차감 된다. 중간소비(Intermediate Consumption)는 최종소비지출과 혼돈을 가져올 수 있는 데 양자는 재화와 용역이 생산에 투입되는가 혹은 소비주체에 의해 소비되는가에 의해 구 분된다. 예를 들어 똑같은 비누와 수건이라 하더라도 기업주가 공장이나 사무실에서 근로 자들이 사용할 목적으로 구매하였다면 중간소비로 계상되나 근로자가 가정에서 사용할 목적으로 구매하였다면 최종소비지출로 처리된다. 한편, 중간소비와 자본형성은 생산자 가 구매한 재화가 회계기간 중에 소진 되는가 혹은 회계기간 이후에도 이익의 원천이 되 는가에 따라 구분된다.',
  },
  '중개무역': {
    title: '중개무역',
    content: '수출입 양 당사자 간의 물품거래가 제3국 상인의 중개로 이루어지는 무역형태를 말한다. 거래물품은 제3국 상인을 거쳐서(제3국에 일단 양륙) 인도되는 예도 있으나 수출자로부 터 수입자에게 직접 보내어지는 것이 일반적이다. 대금의 결제는 수출자가 수입자로부터 직접 회수하여 제3국의 상인에게 수수료만을 지급하는 경우도 있으나, 수출자는 제3국의 상인으로부터, 제3국의 상인은 수입자로부터 무역대금을 회수하는 것이 일반적이다. 중 계무역과의 중요한 차이는 제3국 상인이 수출입거래의 당사자가 되어 매매차익을 취하는 것이 아니라 단지 중개수수료만을 목적으로 거래한다는 것이다.',
  },
  '중계무역': {
    title: '중계무역',
    content: '물품을 수입하되 이를 국내에 반입하지 아니하고 가공하지 않은 원형 그대로 직접 제3 국으로 수출하는 형태의 무역거래를 말한다. 중계무역업자는 수출입의 당사자로서 자 기 책임 하에 수입 및 수출을 하고 대금결제를 한다는 점에서 수출입의 주체가 되지 않고 단순히 중개수수료만을 취득하는 중개무역과 구분된다.',
  },
  '중앙거래당사자': {
    title: '중앙거래당사자',
    content: '중앙거래당사자(CCP; Central Counterparty)는 증권거래 계약의 매도자에 대해 매수자 역할을, 매수자에 대해서는 매도자 역할을 수행하는 기관으로서 다자간 차감에 의한 청산 업무를 수행하여 결제 유동성을 절약하는 한편 결제이행보증 서비스를 제공하여 참가자 의 리스크관리 부담을 경감시키고 신용 및 유동성리스크를 집중하여 관리하는 역할을 수 행하고 있다. 한편 글로벌 금융위기 이후 모든 표준화된 장외파생상품거래의 중앙거래당 사자를 통한 청산이 의무화됨에 따라 결제리스크가 집중되는 중앙거래당사자에 대한 리 스크 관리의 중요성이 더욱 커지고 있다. 우리나라의 장내 증권 및 파생상품 거래는 한국 거래소가 중앙거래당사자 역할을 수행하고 있다. 장외거래의 경우 금융위원회로부터 금 융투자상품거래청산업 인가를 받은 한국거래소와 한국예탁결제원이 각각 장외파생상품 거래(원화 이자율스왑거래)와 주식기관투자자거래(상장주식의 위탁매매거래)에 대해 중 앙거래당사자의 역할을 하고 있다.',
  },
  '중앙예탁기관': {
    title: '중앙예탁기관',
    content: '중앙예탁기관(CSD; Central Securities Depository)은 각종 증권을 집중적으로 예탁받 아 관리하는 기관으로서, 증권 발행 및 유통시장에서 예탁자와 예탁자의 고객을 대상으 로 증권의 예탁, 계좌대체, 예탁증권의 권리행사 등의 업무를 수행한다. 또한 중앙예탁기 관은 금융시장에서 거래되는 증권을 집중 보관함으로써 증권결제가 실물증권의 이동 없 이 계좌대체방식으로 이루어질 수 있도록 한다. 금융시장의 증권결제는 대부분 계좌대체 방식으로 이루어지고 있으므로 중앙예탁기관은 통상 증권매매거래의 결제 과정에서 증권 이전(delivery)을 책임지는 기관으로서의 역할을 수행하고 있다. 현재 각국에서는 단일이 나 소수의 중앙예탁기관이 증권의 예탁 및 이전 업무를 수행하고 있으며 우리나라에서는 한국예탁결제원이 동 업무를 수행하고 있다.',
  },
  '중앙은행': {
    title: '중앙은행',
    content: '일반적으로 중앙은행은 독점적 발권력을 바탕으로 금융기관에 부족자금을 대출하는 은행 의 은행 기능과 정부의 세입 및 세출을 관리하고 필요시 부족자금을 대출하는 정부의 은 행 기능을 수행한다. 아울러 통화량 및 금리 조절을 통해 물가안정을 포함한 거시경제의 안정을 도모하는 한편 최종대부자 역할, 거시건전성 정책 등을 통해 금융안정에도 기여한 다. 중앙은행이 처음부터 이러한 기능을 모두 수행한 것은 아니며 경제발전에 따라 진화하 면서 여러 기능이 추가되었다. 중앙은행의 효시로는 1694년에 설립된 영란은행(Bank of England)을 꼽을 수 있다. 당시 영란은행은 상업은행이었으나 정부의 은행 역할을 수행하 면서 화폐발행에 대한 독점권을 부여받았고 점차 은행의 은행 기능을 확대하면서 오늘날 과 같은 모습을 갖추게 되었다. 20세기 이후에는 금본위제가 폐지되고 화폐의 적정관리가 중요해지면서 통화량, 금리, 환율 등의 관리를 통해 물가안정을 포함한 거시경제의 안정을 도모하는 통화신용정책이 중앙은행의 핵심기능으로 자리 잡게 되었다. 1970~80년대에 는 석유파동 외채위기 등에 따른 물가불안과 경기침체에 대응하여 거시경제 안정화 노력 을 강화하였고 이 과정에서 통화신용정책의 중립성을 제고하기 위한 제도개선이 있었다. 1990년대 이후에는 금융자유화 등에 따른 새로운 금융상품의 출현 등으로 통화량 관리가 한계를 보이면서 한국은행을 비롯한 다수의 중앙은행이 물가안정목표제를 도입하였다. 한 편 2008년 글로벌 금융위기를 계기로 거시건전성 정책의 중요성이 커지면서 미국 등 각국 중앙은행의 금융안정 기능을 강화하는 방향으로 제도개편이 이루어졌다.',
  },
  '중앙은행 디지털화폐(CBDC)': {
    title: '중앙은행 디지털화폐(CBDC)',
    content: '중앙은행 디지털화폐(CBDC; Central Bank Digital Currency)는 중앙은행 내 지준예 치금이나 결제성 예금과는 별도로 중앙은행이 발행하는 새로운 전자적 형태의 화폐를 의 미한다. 2010년대 중반 비트코인과 분산원장기술이 주목을 받기 시작한 이후 중앙은행 디지털화폐에 대한 관심이 크게 증대되었으며 2015년 영란은행이 CBDC란 용어를 최초 로 사용하였다. 한편 이용주체에 따라 모든 경제주체가 이용할 수 있는 소액결제용 CBDC 와 금융기관이 이용하는 거액결제용 CBDC로 구분하며 구현방식에 따라 현재와 같은 계 좌방식의 단일원장방식과 분산원장방식으로 구분된다. 다만 단일원장기반 거액결제용 CBDC는 기존의 지준예치금 이나 결제성예금과 개념상 동일하므로 국제기구 등에서는 분 산원장기반 거액결제용 CBDC만을 거액결제용 CBDC로 분류한다. 최근 들어 글로벌 빅 테크 기업 등이 발행한 스테이블코인의 확산 가능성 및 부작용에 대한 우려가 커짐에 따라 중앙은행에 대한 신뢰를 기반으로 발행되는 CBDC에 대한 관심이 더욱 높아지고 있다.',
  },
  '증거금': {
    title: '증거금',
    content: '증권 현물을 거래할 경우 또는 선물/옵션을 거래할 경우에 매매당사자 일방 또는 매매당 사자 쌍방이 매매약정을 이행한다는 증거로 중개회사에 예치하는 금액을 말한다. 주식 현 물매수 주문시 사고자 하는 주식 매입금액의 일정비율에 해당하는 금액을 증거금으로 미 리 예치해야 하며 나머지 대금은 매수가 이루어진 후 실제 결제일에 납부한다. 선물거래 에서도 가격변동에 따른 계약불이행을 방지하기 위해 담보적 성격의 증거금을 납부한다. 선물거래에서 증거금을 납부함으로써 가격 하락시에는 매수자의 계약불이행 가능성으로 부터 매도자를 보호하고 가격 상승시에는 매도자의 계약불이행 가능성으로부터 매수자를 보호할 수 있다. 증거금에는 고객이 중개회사에 납부하는 위탁증거금과 중개회사가 고객 으로부터 받은 증거금 중 일부를 결제기관에 납부하는 매매증거금이 있다.',
  },
  '증권결제리스크': {
    title: '증권결제리스크',
    content: '증권결제리스크는 매매증권의 인도와 대금지급이 예정대로 이행되지 않아 발생할 수 있 는 손실가능성을 말하며 원금리스크, 대체비용리스크, 유동성리스크 등으로 구분된다. 원금리스크는 증권매도자가 증권을 인도했지만 매수자가 대금을 지급하지 않거나 증권 매수자가 대금을 지급했지만 증권을 인도받지 못할 가능성을 말한다. 대체비용리스크는 매매계약 체결 후 거래 당사자 일방이 계약을 취소하여 원래의 거래를 다른 계약으로 대 체할 때 발생한다. 유동성리스크는 증권거래가 발생한 후 거래당사자 일방이 일시적인 유 동성 부족으로 예정된 시간에 결제를 하지 못할 가능성을 말한다. 증권결제는 자금결제와 달리 대금과 증권의 상호이전을 통해 결제되며 리스크 발생 대부분은 주로 결제일에 증권 인도와 대금지급과정에서 현실화한다. 증권인도와 대금지급이 개별적으로 이루어지는 분 리결제(free of payment) 방식은 매매당사자 일방에게 원금리스크가 발생하므로 증권대 금동시결제(DVP) 방식을 채택함으로써 증권결제리스크를 크게 감축할 수 있다.',
  },
  '증권대금동시결제(DVP)': {
    title: '증권대금동시결제(DVP)',
    content: '증권대금동시결제(DVP; Delivery versus Payment)는 중앙예탁기관의 증권결제시스템 을 대금결제은행의 지급시스템과 연계하여 증권 인도를 전제로 자금을 지급하거나 자금 지급을 전제로 증권을 인도하는 방식이다. 이 방식은 증권인도시기와 대금지급시기가 서 로 달라 거래당사자중 한쪽이 계약을 불이행할 경우 발생하는 원금리스크를 근본적으로 제거할 수 있기 때문에 증권결제리스크를 관리하는 데 효과적이다. 「지급결제 및 시장인 프라위원회」(CPMI)와 「국제증권감독기구」(IOSCO)에서 제정한 국제기준인 「금융시장인 프라에 관한 원칙」(PFMI)에서도 증권결제시스템은 DVP방식을 이용함으로써 원금리스크 를 제거하도록 권고하는 등 국제적으로 증권결제시스템이 준수해야 할 결제표준이 되고 있다. 우리나라의 경우 장내 주식거래와 장내국채 및 RP거래, 장외채권거래 등 주요 증권 거래에 대하여 한은금융망과 한국예탁결제원의 증권결제시스템을 연계하여 DVP 방식으 로 결제하고 있다.',
  },
  '증권커스터디서비스': {
    title: '증권커스터디서비스',
    content: '증권커스터디서비스는 유가증권에 투자하는 투자자를 대신하여 해당 증권의 보고 (safekeeping) 및 기록(record keeping), 이전(delivery), 원리금 및 배당금 수령, 통지 등 제반 관리서비스를 제공하는 업무를 말한다. 예를 들어, 외국인 투자자가 국내 증권에 투자할 때 시중은행 및 외국계은행 등의 커스터디기관이 실물증권 반출의 어려움이나 법 적·행정적 복잡성을 해소해 주는 증권커스터디서비스를 제공하고 있다. 또한 외국 중앙은 행이 국내 채권에 투자할 경우, 커스터디기관인 한국은행을 통해 보호예수, 원리금 수령, 매매대금 결제, 환전, 여유자금 운용 등의 서비스를 이용할 수 있다. 이처럼 증권커스터디 서비스는 투자자 자산을 외부 도난, 해킹, 분실 등 위험으로부터 보호하고, 법적·기술적 안전성을 제공한다.',
  },
  '증시주변자금': {
    title: '증시주변자금',
    content: '증시주변자금은 주식시장에 직접 투자되지는 않지만, 언제든지 유입될 수 있는 대기성 자 금이다. MMF, CMA, 예탁금, 펀드 대기자금, 투자자 예수금 등이다. 증시 호조 기대시 이 자금이 주식시장으로 유입되어 지수 상승에 기여할 수 있다. 시장의 유동성과 투자 여력, 투자 심리 등을 파악하는데 중요한 지표로 활용된다.',
  },
  '지급': {
    title: '지급',
    content: '지급(Payment)은 개인이나 기업 등 경제주체가 경제거래를 한 후 현금, 수표, 신용카드, 자금이체 등 지급수단을 이용하여 예금 등 화폐적 가치에 대한 청구권을 이전하는 행위를 말한다. 지급이 현금으로 이루어지는 경우에는 별도의 자금 이전이 필요 없어 청산기관과 결제기관의 청산 및 결제과정이 필요 없으나 수표나 자금이체 등 비현금수단으로 지급하 는 경우에는 지급인과 수취인의 거래은행 사이에 별도의 청산 및 자금이체를 통해 자금이 이전되어야 결제가 완료된다.',
  },
  '지급결제 및 시장인프라 위원회(BIS CPMI)': {
    title: '지급결제 및 시장인프라 위원회(BIS CPMI)',
    content: '국제결제은행(BIS)의 「지급 및 시장인프라 위원회」 (CPMI; Committee on Payments and Market Infrastructures)는 1990년 설립된 「지급결제제도위원회」(CPSS; Committee on Payment and Settlement Systems)의 명칭을 2014년 9월 1일부터 변경한 것으로, 처음에는 주요국의 지급결제제도 동향을 모니터링하고 분석하기 위해 설 립되었다. 현재는 「금융시장인프라에 관한 원칙」 등 국제기준 제정 및 이행상황 모니터 링, 금융시장인프라 감시와 관련한 정책 개발 및 제안 주도, 중앙은행 간 협력 증진 및 정 보교환 촉진 등의 기능을 수행하고 있다. 2022년 9월말 현재 CPMI에는 28개국 중앙은행 이 참여 중이며 한국은행은 2009년 7월 24일 회원으로 가입하였다.',
  },
  '지급결제보고서': {
    title: '지급결제보고서',
    content: '한국은행이 매년 발행하는 지급결제보고서는 국내 지급결제제도의 운영 현황, 지급결제 시스템별 동향, 정책 추진 및 혁신 노력, 주요 현안 분석 등을 종합적으로 담은 공식 보고 서이다. 이 보고서는 거액결제시스템, 소액결제시스템, 외환동시결제시스템, 증권결제시 스템 등 각 지급결제시스템의 연간 결제 동향과 결제리스크 관리 현황을 상세히 분석하며 지급결제제도의 안전성과 효율성 제고를 위한 제도 개선, 인프라 확충, 지급수단의 편의 성 강화, 국제협력 활동 등 한국은행의 주요 정책 추진 내용을 포함한다. 특히, 지급결제 시스템의 안정적 운영을 위해 한은금융망 등 핵심 인프라의 관리, 담보제도 개선, 금융기 관 대상 점검 및 감시 활동, 결제리스크 관리제도 운용 현황을 분석한다. 최근에는 디지털 자산시장 확대 등 지급결제 환경변화에 대응한 정책 방향과 중앙은행 디지털화폐(CBDC) 관련 현황, 가상자산 등 신종 지급수단의 현황 분석 등도 주요 내용으로 다루고 있다.',
  },
  '지급결제시스템': {
    title: '지급결제시스템',
    content: '개인·기업·정부 등 경제주체들의 금융거래나 경제활동에서 발생하는 지급, 청산 및 결제 가 원활히 이루어지도록 해주는 금융시스템의 하부구조로서 중앙은행, 은행, 청산기관, 관련 법규, 지급수단 등으로 구성된다. 지급결제시스템은 시장경제 하에서 각종 경제활동 이 실행되는 금융 하부구조로서 기능하기 때문에 효율적이고 안정적인 지급결제시스템은 금융제도의 발전과 건전한 신용질서를 유지하기 위한 근간이 된다.',
  },
  '지급결제제도 감시': {
    title: '지급결제제도 감시',
    content: '국제결제은행(BIS)의 지급결제 및 시장인프라 위원회는 지급결제제도 감시(Oversight of Payment Systems)를 “기존 시스템 및 구축 예정인 시스템을 모니터링하고 동 시스템에 대해 평가하는 한편, 필요시 개선을 유도함으로써 동 시스템들의 안전성 및 효율성의 증 진을 도모하는 중앙은행의 기능”으로 정의하고 있다. 즉, 지급결제제도 감시의 개념에는 공공정책 목표(안전성 및 효율성), 감시범위(지급결제시스템), 감시활동(모니터링, 평가 및 개선 권고)의 세 가지 요소와 지급결제제도에 대한 중앙은행의 책무라는 의미가 함께 들어 있다. 지급결제제도에 대한 중앙은행의 감시가 필요한 이유는 시장경제가 원활하게 작동하는 데 있어 지급결제시스템의 역할이 매우 중요하기 때문이다. 경제적 거래에 수반 되는 자금, 증권 및 외환의 이동은 대부분 지급결제시스템을 통해 이루어지기 때문에 원 활한 지급결제는 시장이 제 기능을 하는 데 필수적이다. 또한 대부분의 지급결제시스템은 민간부문에 의해 구축·운영되는 것이 일반적인데 일부 시스템의 경우 시장실패로 인해 사 회적으로 최적수준의 안전성과 효율성을 달성하지 못할 가능성이 있어 공공부문의 개입 이 필요하게 된다.',
  },
  '지급수단': {
    title: '지급수단',
    content: '지급수단(Payment Instruments)은 크게 현금과 현금 이외의 지급수단으로 구분된다. 현 금 이외의 지급수단은 금융기관에 자금의 이전을 요청하는 수단을 말하는데 여기에는 계 좌이체, 지급카드, 어음이나 수표 등이 포함된다. 또한 지급수단은 지급결제과정에서 종 이로 제작된 지급수단인 장표가 실제로 이동하는지 여부에 따라 장표방식 지급수단과 전 자방식 지급수단으로 구분할 수도 있다. 장표방식 지급수단에는 어음, 수표, 지로 등이 있 으며 전자방식 지급수단에는 신용카드, 체크카드 등이 있다. 최근에는 지급서비스 제공방 식이 다양화되면서 전통적인 지급수단 분류방식 대신 인터넷뱅킹, 모바일 지급카드 등 접 근채널별로 분류하기도 한다.',
  },
  '지급여력비율/K-ICS비율': {
    title: '지급여력비율/K-ICS비율',
    content: '보험회사의 지급여력(Solvency Margin)을 나타내는 지표로, 「보험업법 시행령」에서는 지급여력금액을 지급여력기준금액으로 나눈 비율로 규정하고 있다. 이 비율이 높을수록 보험회사가 예상 밖의 손실 발생이나 자산가치 하락에 직면하더라도 보험금을 문제없이 지급할 수 있는 지급능력(solvency)이 높다(혹은 예기치 않은 리스크가 발생하더라도 이 에 대한 손실흡수능력이 양호하다)는 것을 의미한다. 2023년부터 보험회사에 새로운 회 계기준(금융자산 분류 및 측정(IFRS9), 보험계약(IFRS17))이 도입되면서 지급여력금액 (가용자본)과 지급여력기준금액(요구자본)의 산정 방식도 기존 위험기준 자기자본(Risk- Based Capital) 제도에서 K-ICS제도로 전면 개편되었다. K-ICS제도 하에서 지급여력 금액(가용자본)은 시가평가된 자산에서 부채를 차감한 순자산을 산출하고 여기에 손실 흡수성 정도에 따라 일부 항목을 가감하여 측정한다. 지급여력기준금액(요구자본)은 생 명·장기손해보험리스크, 일반손해보험리스크, 시장리스크, 신용리스크 및 운영리스크에 대하여 신뢰수준 99.5% 수준에서 충격시나리오 또는 위험계수 방식을 적용하여 충격 후 순자산 감소분으로 측정한다.「보험업감독규정」(2025.6.11. 개정)에서는 보험회사의 지 급능력과 경영건전성을 확보하기 위해 지급여력비율(K-ICS비율)이 130% 이상을 충족 하도록 요구하고 있다.',
  },
  '지급준비자산제도': {
    title: '지급준비자산제도',
    content: '지급준비자산제도란 한국은행이 필요하다고 인정될 때 금융기관에 대하여 예금지급준비 금과는 별도의 지급준비자산을 보유할 수 있는 제도(「한국은행법」 제63조)이다. 지급준 비자산에는 현금, 국채, 정부보증채 및 한국은행이 발행하는 통화안정증권 등이 있다. 원 래 동 제도는 전통적인 예금지급준비제도를 보완하는 한편 금융기관으로 하여금 국채 등 유가증권을 보유토록 함으로써 국채 등에 대한 수요를 강화시켜 공개시장운영 기반을 마 련하기 위해 도입되었다. 통상 지급준비금에 대해서는 이자를 지급하고 있지 않기 때문에 그만큼 기회비용이 발생하게 된다. 그러나 이를 유가증권 등으로 보유하게 되면 수익이 발생함에 따라 지급준비금 보유에 따른 기회비용을 줄일 수 있어 은행의 재무건전성이 제 고될 수 있고 지급준비금 보유의무가 없는 비은행금융기관과의 형평성 문제도 줄어들 수 있다. 그러나 동 제도는 채권시장의 유통물량을 축소시키는 등 금융시장을 위축시킬 수 있으므로 금융시장 여건을 면밀히 고려하여 시행되어야 한다.',
  },
  '지급준비제도': {
    title: '지급준비제도',
    content: '중앙은행이 금융기관으로 하여금 예금 등과 같은 채무의 일정비율에 해당하는 금액을 중 앙은행에 예치하도록 하는 제도이다. 은행이 예금고객의 지급요구에 응하기 위해 미리 준 비해 놓은 유동성 자산을 지급준비금이라 하고, 적립대상 채무 대비 지급준비금의 비율을 지급준비율이라 한다. 지급준비금은 은행이 중앙은행에 예치하고 있는 자금(지준예치금) 과 보유하고 있는 현금(시재금)으로 구성된다. 지급준비제도(Reserve Requirement)는 1863년 미국에서 예금자보호를 위해 법정지급준비금을 부과한 것이 효시라 할 수 있다. 그 후 1930년대 들어 지급준비율을 변경하여 본원통화를 조절하면 승수효과를 통해 통화 량에 영향을 준다는 사실이 밝혀지면서 지급준비제도는 중앙은행의 유동성조절수단으로 그 위상이 높아졌다. 그러나 1980년대 이후 금융의 자유화 및 개방화 등으로 시장기능에 바탕을 둔 통화정책의 필요성이 부각되면서 공개시장운영이 주된 통화정책 수단으로 부 각된 가운데 지급준비제도는 여러 한계점으로 인해 정책수단으로서의 역할이 상대적으로 축소되었다. 그러나 중앙은행은 지급준비율 변경을 통해 금융기관의 자금사정을 변화시 키고 시중유동성을 조절할 수 있으며 나아가 금융안정을 도모하고 금융시장에 중앙은행 의 정책방향을 강력하게 알리는 공시효과가 있기 때문에 지급준비제도는 여전히 유용한 정책수단으로 활용되고 있다.',
  },
  '지니계수': {
    title: '지니계수',
    content: '지니계수란 이탈리아의 통계학자 지니(Gini)가 소득분배상태를 파악하기 위하여 로렌 츠곡선의 단점을 보완, 로렌츠곡선이 나타내는 내용을 하나의 단순한 숫자로 표시한 것 이다. 소득분배의 불균형 정도가 클수록 소득의 완전균등분배를 나타내는 대각선과 로 렌츠곡선 사이의 면적이 넓어지는 데 착안, 대각선과 로렌츠 곡선 사이의 면적을 대각선 에 의해 생성되는 직각삼각형의 면적으로 나눈 값을 계산하여 소득 불평등계수로 사용 하였는데, 이를 지니계수라 한다. 소득분배가 완전히 균등할 경우 지니계수는 0이 되며 소득분배가 완전히 불균등할 경우에는 1이 된다. 그러므로 지니계수는 0에서부터 1까지 의 값을 가지며 그 값이 클수록 소득분배가 불균등함을 의미한다. 지니계수는 가장 널리 쓰이는 소득분배 측정방법이지만 전 계층의 소득분배상태를 하나의 숫자로 나타낼 뿐이 며 특정 소득계층의 소득분포상태를 나타내지 못한다는 한계를 가지고 있다.',
  },
  '지로(GIRO)': {
    title: '지로(GIRO)',
    content: '지로는 대량수납 및 대량지급거래 등 다수인과의 지급거래를 중계센터를 통해 처리하는 소액대량 지급수단중 하나이다. 지로는 지급인이 현금을 입금하거나 지급인의 예금계좌 에서 자금이 인출되어 수취인의 계좌로 입금되는 예금계좌이체 방식을 통하여 이루어지 기 때문에 시스템 처리구조가 단순하고, 거래상대방을 만날 필요 없이 수취인에게 지급내 용(지급인, 지급목적 등)이 통보되므로 격지간 대금결제에 편리하다. 또한 결제금액에 관 계없이 건별로 소액의 수수료를 부과하기 때문에 자금이체에 따른 수수료 부담도 적다. 한편 지로업무의 유형은 지로장표의 수반여부에 따라 장표지로업무와 전자지로업무로 구 분할 수 있다. 장표지로업무는 지로제도를 이용한 각종 대금의 수납업무가 납부내역이 기 재된 지로장표에 의하여 처리되는 업무이며, 전자지로업무에는 각종 대금의 수납 및 지급 의뢰시 인터넷 또는 전송파일을 이용하여 전자적으로 처리되는 자동이체, 납부자자동이 체, 대량지급 및 인터넷지로가 있다.',
  },
  '지방은행공동망': {
    title: '지방은행공동망',
    content: '지방은행공동망은 지방은행이 공동으로 운영하는 지급시스템인 뱅크라인(Bankline) 업 무를 처리하는 공동망으로서 1997년 6월 가동되었다. 동 시스템의 가동으로 전국적인 영 업망을 갖추지 못한 지방은행들도 전국의 고객을 대상으로 예금의 입·출금 및 계좌조회 서비스를 제공할 수 있게 되었다. 2017년말 현재 지방은행공동망에는 6개 지방은행이 모 두 참여하고 있다. 지방은행공동망의 업무는 입금업무와 출금업무로 구분된다. 입금업무 는 타행환공동망과 유사하게 다른 지방은행 계좌로 입금 처리하는 업무이며, 출금업무는 CD공동망과 유사한 방식으로 다른 지방은행의 통장을 소지한 고객에게 출금 처리하는 업무이다. 지방은행공동망의 가동시간은 기본적으로 은행 영업시간과 동일한 09시부터 16시까지이며 전산장애 등으로 운영시간 연장이 불가피한 경우에는 금융결제원이 이를 1시간 범위 내에서 연장할 수 있다.',
  },
  '지분형 모기지': {
    title: '지분형 모기지',
    content: '지분형 모기지는 정부나 공공기관이 주택의 일부를 지분으로 투자함으로써 주택 구매자 의 자금 부담을 완화해 주는 주택금융 제도이다. 동 제도를 이용할 경우 매수자는 자기 자본과 일부 대출만으로 집을 마련할 수 있고, 나머지는 공공기관이 지분을 보유하는 방 식으로 부담을 나누게 된다. 예를 들어 10억 원짜리 주택을 구매할 때, 매수자가 1억 원 의 자기자본과 4억 원의 대출을 마련하면, 나머지 5억 원은 공공기관이 지분 투자로 참여 하게 된다. 이때 등기부에는 공동명의로 등록되며, 매수자는 공공기관의 지분에 대해 낮 은 수준의 사용료를 지불한다. 집값이 상승하면 매각 시 시세차익은 지분율에 따라 나뉘 고, 하락 시에는 공공기관이 손실을 먼저 부담하는 구조로 위험 분산 효과도 기대할 수 있 다. 또한 매수자는 추후 여유 자금이 생기면 공공 지분을 추가로 매입해 완전한 소유권 을 확보할 수도 있다. 동 제도는 청년층과 무주택자의 내 집 마련을 돕고, 가계부채 증가 를 억제하는 정책적 목적도 함께 갖고 있다. 다만 동 제도의 운용에 관한 구체적인 사항은 2025년 7월 현재 확정되지 않았다.',
  },
  '지식서비스 무역통계': {
    title: '지식서비스 무역통계',
    content: '지식서비스 무역통계는 국가 간의 지식 기반 서비스 거래 흐름을 계량적으로 측정하고 분 석하기 위한 통계로서, 국제수지 통계의 서비스수지에 포함되어 있는 ① 지식재산권 사용 료 ② 정보·통신서비스 ③ 문화·여가서비스 ④ 전문·사업서비스 등 4대 지식서비스 분야 를 세분화하여 제공한다. 동 통계는 이들 4대 분야를 16개 세부 유형으로 나누어 산업별 (표준산업분류), 기관형태별(대기업, 중기업, 소기업 등), 거래상대지역별(북미, 아시아, 유럽 등)로 세분화된 수출·수입 및 수지(수출 - 수입) 정보를 보여주며, 표준산업분류상 별도 산업분류가 없는 ICT 산업과 콘텐츠 산업에 대해서도 통계를 제공한다.',
  },
  '지식재산생산물투자': {
    title: '지식재산생산물투자',
    content: '지식재산생산물투자는 국민계정 체계(SNA; System of National Accounts)에서 건설투 자, 설비투자와 함께 총고정자본형성(=투자)을 구성하는 항목이다. 여기서 지식재산생산 물이란 연구, 개발, 조사, 예술작품 창작 등 지적 노력의 결과물로 이루어진 무형자산을 말한다. 이러한 지식재산생산물투자에는 1년 이상 장기간 동안 생산에 사용될 것으로 예 상되는 연구개발(R&D), 오락·문학작품 및 예술품 원본, 컴퓨터 소프트웨어 및 데이터베 이스, 광물탐사 등이 있다.',
  },
  '지정시점처리제도': {
    title: '지정시점처리제도',
    content: '실시간 총액결제시스템에서 금융기관의 이체지시는 신청 즉시 처리되는 것이 원칙이나 어음교환, 타행환 등의 차액결제와 같이 거래 성격상 다수 금융기관 간에 일괄결제가 필 요한 거래는 영업시간중 특정시점에 처리하고 있는데 이를 지정시점처리제도라 한다. 자 금의 이체지시를 영업시간 중에 건별로 실시간 처리하는 실시간총액결제방식에 대응하 는 개념이다. 지정시점처리제도는 다수의 참가기관이 서로 연결되는 대량의 거래를 특정 시점에서 일괄적으로 처리함으로써 참가기관들이 예측가능하고 효율적인 자금관리를 할 수 있고 결제에 필요한 유동성을 절약할 수 있는 장점이 있는 반면 지정시점에 모든 참가 기관이 결제를 이행한다는 보장이 없어 별도의 결제리스크 관리방안이 구비되어야 한다. 현재 한은금융망에서는 11시(금융기관 간 차액결제가 이루어지는 타행환, CD공동망, 은 행지로, 직불카드, CMS, 지방은행공동망, 전자금융공동망, 어음교환 등), 11시 5분(1일물 콜자금 상환), 14시(국고금 수납자금 회수) 등의 지정처리시점을 설정·운영하고 있다.',
  },
  '직불카드': {
    title: '직불카드',
    content: '직불카드(Debit Card)는 카드소지인(고객)이 물품이나 서비스를 구매하는 경우 동 카드 를 이용하여 판매점에 설치되어 있는 단말기와 카드 발급은행의 주전산기를 통하여 고객 의 예금계좌에서 구매대금을 인출하고 이를 판매자의 예금계좌로 자동이체해 주는 용도 로 사용되는 카드이다. 직불카드는 백화점, 슈퍼마켓 등 판매점에서 물품판매와 동시에 고객의 계좌에서 대금이 출금되어 현금을 지급하는 것과 동일한 효과가 있으므로 EFT/ POS (Electronic Funds Transfer at the Point of Sales)카드라고도 부른다. 우리나라에 서는 1996년 2월부터 본격 가동되기 시작한 직불카드공동망을 통하여 서비스가 제공되 고 있다.',
  },
  '직불카드공동망': {
    title: '직불카드공동망',

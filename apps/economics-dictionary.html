• 확장적 재정·통화 정책
확장적 재정 정책은 정부가 빚을 내서(=국채를 발행해서) 직접 여러 분야에 투자도 하고, 지원금을 나눠주며 소비도 촉진하는 걸 말해요. 실제로 일본은 정말 많은 빚을 져가며 이런 정책을 펼쳤고, 그 결과로 일본은 주요 국가 중 경제 규모 대비 빚이 가장 많은 나라가 됐어요. 보통 '부채비율'이 높다고 표현해요.

확장적 통화 정책은 중앙은행이 기준금리 인하나 채권 매입(양적완화)을 통해 시장에 돈을 풀어 소비·투자를 촉진하는 것을 뜻해요. 중앙은행이 정하는 기준금리를 낮추면 시중에서 예금이나 대출 이자율도 함께 낮아지는데, 이러면 대출을 받아 투자하는 사람은 늘어나고, 예금을 하는 사람은 줄어들어서 '돈 풀기 효과'가 나타나거든요.

그래서 일본의 기준금리는 6년 넘게 –0.1%예요. 마이너스라서 헷갈리실 수도 있지만 사실상 0%(제로금리)라고 보시면 돼요. 일본의 중앙은행인 일본은행은 국채 등 채권 매입을 통한 '양적 완화'도 계속 진행 중이에요. 일본 중앙은행이 시장의 국채를 사들여서 시장에 돈을 푸는 거죠.

• 엔저 전략
일본이 이렇게 돈 풀기를 계속해 왔기 때문에 일본 화폐인 엔화 가치는 뚝뚝 떨어졌어요. 지난해 10월엔 달러 대비 가치가 32년 만에 최저 수준인 1달러당 150엔까지 추락하기도 했죠. 조금 심하긴 하지만, 아베노믹스는 원래 '엔저(엔화 가치 하락)'를 노리는 정책이에요.

자국 기업들의 수출 환경 개선에 초점을 맞춘 전략인데요, 엔화 가치가 떨어지면 상대적으로 달러 가치는 높아져요. 예를 들면 '1달러=100엔'이었던 환율이 '1달러=130엔'이 되는 거예요. 이러면 외국에 수출을 하고 달러로 대금을 받았을 때 더 많은 돈을 벌게 되겠죠. 똑같이 100달러를 받아도 1만엔이 아니라 1만 3천엔을 벌게 되니까요.

그래서 일본의 수출 기업들은 과거 '엔저'가 일어났을 때 무역에서 큰 폭의 흑자를 냈고, 기업 가치가 높아지면서 주식 시장에도 긍정적 영향을 미쳤어요. 이러면 곧 엔화 가치가 하락을 멈추고 적정 수준에서 유지되곤 했죠. 이런 이유 때문에 대표적인 저성장 국가인 일본은 오히려 엔저 현상을 유도해왔어요. 수출 호조를 바탕으로 '기업 실적 개선→임금 인상→소비 확대'로 이어지는 긍정적 순환이 일어나기를 기대하는 거예요.`

IPO의 주요 목적은 사업에 필요한 자금을 조달하기 위해서예요. 은행에서 돈을 빌리면 이자도 내고 나중에 원금도 갚아야 하지만, 주식을 새로 발행해 투자자들한테 돈을 받고 팔면 그럴 필요가 없거든요.

그런데 IPO를 하기 위해선 굉장히 까다로운 절차들을 거쳐야 해요. 주식시장을 운영하는 한국거래소가 직접 나서서 상장을 할 만한 회사인지를 종합적으로 따져보는데요. 기업 규모는 충분히 큰지, 실적은 잘 나오는 회사인지, 큰 사고 없이 안정적으로 경영을 해왔는지를 종합적으로 판단하죠.

투자자는 IPO 전에 미리 투자하고 주식을 받아두면, 나중에 이 기업이 IPO를 했을 때 주가가 오른 만큼 차익을 거둘 수 있어요. IPO를 한다는 건 이미 어느 정도 성공한 기업이자, 사업이 안정 궤도에 올랐다는 의미로 받아들여지기 때문에 주가가 오를 확률이 꽤 높거든요. 그래서 기업도 프리IPO로 투자를 유치하면 더 좋은 조건으로 투자를 받을 수 있고요.

물론 프리IPO를 통해 투자금을 유치한 회사가 약속했던 기한 내에 IPO를 하지 못하면 투자자들에게 다시 돈을 갚아야 해요.`

  'ESG': {
    title: 'ESG',
    content: `ESG는 환경(Environmental), 사회(Social), 지배 구조(Governance)의 약자예요. 기업을 평가할 때 고려하는 요소들이죠. 최근엔 ESG를 기준으로 투자할 기업을 물색하는 투자자들도 많아지고 있어요.

과거에는 보통 효율적으로 돈을 잘 버는 기업이 가치가 높다고 평가받았어요. 매출액이나 영업이익처럼 회계 장부상에 나타나는 숫자들이 중요하다고 본 거죠. 그런데 최근에는 환경이나 인권, 다양성 같은 가치들의 중요성이 부각되면서 기업을 평가할 때도 이런 요소들을 고려해야 한다는 목소리가 커지고 있어요. ESG의 대표적인 요소들은 다음과 같아요.

· 환경(Environmental)
기업을 평가할 때 환경친화적으로 사업을 하는지, 탄소 배출량 감축에는 얼마나 기여하고 있는지 등을 보겠다는 거예요.

· 사회(Social)
기업이 경영 활동을 하면서 인권이나 평등 같은 가치를 해치는 건 아닌지를 살펴보겠다는 거예요. 또 노동자의 권리를 보장하고 소비자를 보호하고 있는지도 평가하겠다는 거죠.

· 지배 구조(Governance)
환경, 사회와 달리 지배 구조는 쉽게 와 닿지 않는 용어일 수 있는데요. 지난해 초 국립국어원은 'ESG 경영'을 순화한 단어를 제시했어요. 바로 '환경·사회·투명 경영'이에요. 지배 구조를 평가하는 건, 곧 얼마나 투명하게 경영 활동을 하는지를 보겠다는 의미인 셈이죠. 기업이 부적절한 거래를 하거나 부패 행위에 관련된 것은 아닌지, 공시는 투명하게 이루어지고 있는지를 평가해요. 또 기업이 중요한 의사결정을 할 때 기업의 주인인 주주들의 의사가 충분히 반영되는지, 경영진에게 부당하게 너무 많은 보상을 주느라 배당을 줄인다거나 해서 주주들에게 손해를 입히진 않았는지도 살펴봐요. 회사 임직원을 뽑을 때 차별을 하지 않고 다양성을 존중했는지도 평가 대상이에요.

• 왜 중요한 거야?
물론 '환경과 사회, 투명성이 중요하니까 기업에게도 ESG가 중요하다'라고만 주장하면 설득력이 떨어지겠죠. ESG가 주목받게 된 건 실제로 투자자들이 기업을 평가할 때 기준으로 삼고 있기 때문이에요. 몇 년 전부터 ESG를 투자 기준으로 활용하는 세계적 금융 회사와 기관들이 많아지고 있어요. 이들은 ESG 경영을 하는 기업에 투자하는 게 수익률이 더 높다고 말하죠. 이 가치를 해치는 기업엔 투자하지 않겠다는 곳들도 있어요.

• 수익률이 더 높다고?
ESG 경영을 하는 기업의 수익률이 높다고 주장하는 근거는 다음과 같아요.

· 소비자들도 달라졌어
투자자뿐만 아니라 소비자들도 기업들이 사회적 책임을 다하고 있는지를 중요하게 생각한다는 거예요. 저렴한 제품이라도 생산 과정에서 환경을 파괴하거나 노동자 착취가 이루어졌다면 구매하지 않겠다는 소비자들이 늘어나고 있어요.

· 규제 안 지키면 손해야
최근 각국 정부는 환경 보호를 위한 규제들을 도입하고 있어요. 탄소를 많이 배출하는 기업에 더 많은 세금을 물리겠다는 국가도 있죠. 공시 의무를 제대로 지키지 않은 기업은 처벌을 받기도 해요. 결국 알아서 이런 가치를 잘 지키는 기업이 유리하다는 거예요.

  '지식 재산권': {
    title: '지식 재산권',
    content: `지식 재산권(Intellectual Property Right)은 지적 능력을 활용해 만들어 낸 창작물에 대한 권리를 뜻해요. 재산이라고 하면 보통 건물이나 가구, 보석처럼 구체적인 형태가 있는 것들을 떠올리잖아요. 지식 재산권은 음악이나 소설, 상표, 디자인 같은 무형의 창작물이라도 재산으로서의 가치가 있다면 그 권리를 법으로 보호하겠다는 취지로 만든 개념이에요. 지식 재산권은 크게 저작권과 산업 재산권으로 나눌 수 있어요.

• 저작권(Copyright)
저작권은 미술, 음악, 영화, 시, 소설, 소프트웨어, 게임 등 문화와 예술 분야의 창작물에 대한 권리예요. 이런 창작물을 이용하려면 저작권자의 허락을 받아야 한다는 거죠. 이용 허락을 받기 위해 사용료를 지급하기도 해요. 저작권 중에는 그 권리 자체를 거래할 수 있는 종류도 있어요. 우리나라에선 저작자가 사망한 후 70년까지 저작권을 인정해요.

• 산업 재산권(Industrial Property Right)
산업과 경제활동 분야의 창작물에 대한 권리예요. 발명이나 상표, 디자인 같은 것들이 포함되죠. 특허권이 대표적인데요. 새로운 기술을 발명한 뒤 특허청의 심사를 통과하면 특허권을 갖게 돼요. 특허권이 인정되면 특허권자의 동의 없이는 그 기술을 사용할 수 없고요. 상표와 관련된 권리를 상표권, 디자인과 관련된 권리는 디자인권이라고 불러요.

  '국책은행': {
    title: '국책은행',
    content: `국책은행은 한 나라의 정부가 특정한 목적을 달성하기 위해 만든 은행을 의미해요. 국민·하나·신한·우리은행 같은 일반은행과는 설립 목적과 하는 일이 달라요. 일반은행은 기업이나 개인이 맡긴 돈을 보관해 주면서 이 돈을 필요로 하는 이들에게 빌려줘요. 이 과정에서 예금자에게 지급해야 하는 이자보다 대출자로부터의 이자를 비싸게 받아 돈을 벌죠. 결국 목적은 돈을 굴리면서 이익을 창출하는 거예요.

물론 국책은행도 일반은행처럼 돈을 굴려 이익을 창출해요. 하지만 이들의 주요 목적은 핵심 산업 육성이나 수출 활성화 같은 공공성을 띠는 것들이에요. 일반은행 입장에선 돈벌이가 안 된다거나, 자금이 부족해 하기 어려운 일들이죠. 그래서 국책은행은 국가의 지원을 받기도 해요. 이들은 설립 목적이 특별법으로 지정돼 있어요.

우리나라의 국책은행으로는 산업은행과 수출입은행, 기업은행이 있어요.

• 한국산업은행(KDB산업은행)
국내 산업을 육성하기 위해 설립됐어요. 꼭 키워야 하는 산업인데 투자 비용이 많이 드는 분야가 있잖아요. 기업들이 이런 산업에 진출하려 해도 자금을 구하기 어려운 경우가 많죠. 일반은행들 입장에선 함부로 돈을 빌려주기엔 위험해 보일 수도 있고요. 산업은행은 이런 기업들에 자금을 지원해 산업 육성을 도와요. 국내 경제에 미치는 영향이 큰 기업들이 위기에 빠지면 그 회사를 사들여 되살리고 관리하는 역할도 해요.

• 한국수출입은행
수출·수입이나 해외투자, 해외자원개발 등의 분야에 필요한 자금을 지원하기 위해 설립됐어요. 흔히 한국을 수출로 먹고사는 나라라고 하잖아요. 돈이 필요한 수출 기업의 경영을 돕기 위해 좋은 조건으로 돈을 빌려주죠. 또 우리나라에 꼭 필요한 주요 자원을 수입할 때도 자금을 지원해요. 해외 자원을 개발하는 사업에 돈을 대기도 하고요.

• 중소기업은행(IBK기업은행)

  '경상 수지': {
    title: '경상 수지',
    content: `경상 수지는 '해외로 빠져나간 돈과 벌어들인 돈'을 따져보는 지표 중 하나예요. '경상'은 '일정하게 계속한다'라는 뜻이고, '수지'는 '수입과 지출'이란 뜻인데요. 그러니까 경상 수지는 한 나라가 다른 나라들과 일정하게 하는 경제적 활동의 수입과 지출을 따져보는 지표인 거예요.

일정한 경제적 활동 중 대표적인 게 수입과 수출이에요. 예를 들어 옆 나라에 반도체를 수출하고 바나나를 수입해오는 나라가 있다고 가정해볼게요. 이 외에는 다른 국가들과 경제적 거래는 일절 하지 않는 나라죠. 이 나라가 이번 달에 반도체를 수출해 100억원을 벌고, 바나나를 수입해오면서 90억원을 지출했으면 이 나라의 이번 달 경상 수지는 10억원 흑자인 거예요.

경상 수지는 한 나라의 경제 상황을 보여주는 중요한 지표로 여겨져요. 그래서 우리나라 중앙은행인 한국은행이 매달 집계해 발표하죠. 경상 수지를 구성하는 요소는 다음과 같아요.

• 상품 수지(무역 수지)
상품을 수출해서 벌어들인 금액에서 상품을 수입할 때 지급한 금액을 뺀 결과예요. 보통은 경상수지를 구성하는 요소 중에 비중이 제일 크고 그만큼 중요해요.

• 서비스 수지
다른 나라와 각종 서비스를 주고받는 과정에서 발생한 수입과 지출을 따져 본 결과예요. 외국인이 우리나라에 여행을 와서 쓴 돈, 우리나라 선박회사가 외국 회사의 상품을 운반하고 받은 운임 등은 서비스 수지 수입에 해당하죠.

• 소득 수지
우리나라 사람들이 외국 회사에 취업해 돈을 받거나, 해외 주식에 투자해 배당금을 받으면 소득수지 수입이 돼요.

• 경상 이전 수지
그 비중이 크진 않지만 아무런 대가 없이 돈이나 물건을 주고받을 때도 있잖아요. 예를 들어 외국에 있는 교포가 국내의 친척에게 돈을 보내거나, 외국 자선단체가 국내에 구호물자를 보내면 경상 이전 수지 수입이 돼요.

위에서는 반도체 수출과 바나나 수입만 하는 나라를 예로 들었지만, 실제로는 이 4가지 요소들의 결과를 함께 계산해서 경상 수지를 따져보는 거예요.

• 무조건 흑자가 좋은 거야?
한 나라의 경상 수지가 흑자이고 흑자 규모가 커지고 있다면 보통 수출이 잘돼서 기업들이 돈을 잘 벌고, 국민의 소득도 높다는 의미예요. 이러면 그 나라의 경제 상황도 좋다고 볼 수 있죠. 반대로 경상 수지 적자 폭이 커지고 있다면 경제 상황이 좋지 않을 가능성이 크고요.

하지만 경상 수지가 흑자라고 무조건 좋은 것만은 아니에요. 한 나라가 오랜 기간 큰 규모의 경상 수지 흑자를 기록하고 있다면 다른 나라들의 불만이 쌓일 수도 있어요. 다 같이 잘살아 보자고 무역을 하는 건데 왜 혼자서만 이득을 보냐는 식으로요. 심할 경우 국가 간의 무역 갈등이 생길 수도 있어요.`

• 상품 수지(무역 수지)
상품을 수출해서 벌어들인 금액에서 상품을 수입할 때 지급한 금액을 뺀 결과예요. 보통은 경상수지를 구성하는 요소 중에 비중이 제일 크고 그만큼 중요해요.

  'CBDC': {

    content: `CBDC(중앙은행 디지털 화폐, Central Bank Digital Currency)는 중앙은행이 발행하는 디지털 화폐라는 뜻의 영어 약자예요. 우리나라의 원화나 미국 달러화처럼 국가 공식 화폐(법정화폐)이지만, 실제 종이돈이나 동전 없이 디지털 화폐로 발행하는 형태죠. 결국 CBDC를 발행한다는 건 우리나라로 치면 한국은행이, 미국에선 연방준비제도(Fed)가 마치 암호화폐 같은 가상자산을 만든다는 의미예요.

CBDC는 블록체인 같은 첨단 기술이 적용된다는 점은 암호화폐와 유사하지만, 가치가 정해져 있어서 비트코인처럼 시세 변동은 일어나지 않아요. 정부가 보증하니까 디지털 화폐라도 실제 종이돈과 가치는 다를 게 없어요. 사실 점점 종이돈이나 동전을 사용할 일이 줄어들고 있잖아요. 그러니까 실물 화폐를 덜 찍어내는 대신 CBDC가 역할을 보완할 수도 있고, 먼 미래에는 아예 CBDC만 사용할 수도 있겠죠.

미국과 중국, 유럽연합(EU) 회원국을 포함해 전 세계 100여 개 나라들이 CBDC 개발에 나선 것으로 알려졌어요. 우리나라는 한국은행이 모의실험을 통한 연구를 하고 있다고 해요.

CBDC가 본격적으로 도입된다고 해도 우리 삶은 지금보다 조금 편해지는 정도일 수 있어요. 신용카드뿐 아니라 이미 'OO페이' 같은 모바일 결제 서비스도 보편화되어 가는 상황이니까요.

하지만 국가 차원에서는 큰 차이가 존재해요. 돈을 주고받는 대부분의 거래에서 효율성이 높아진다는 점 때문이에요. 실제로 국가들이 각각 어떤 방식을 취하게 될지는 모르지만, CBDC가 적용되면 기본적으로 시중 은행의 역할은 많이 사라져요.

전자 지갑이라는 건 마치 일종의 은행 계좌처럼 보이지만, 보안 기술인 블록체인 기술을 활용하면 은행 같은 중재자나 관리주체 없이도 안전하게 운영되거든요. 지갑과 송금 시스템을 구축하는 건 한국은행일 테니 더더욱 걱정할 필요가 없을 거고요.

이탈리아 포강 유역 등 일부 유럽 곡창 지대에서는 강물이 말라붙자 민물이 사라진 자리로 바닷물이 밀려 들어왔어요. 강 주변에서 쌀을 생산하던 논이 마르고, 짠물 때문에 염분 피해가 발생했어요. 기후 위기가 곧 식량 위기로 이어진다는 걸 체감할 수 있는 사태였어요.

지난해 가뭄은 중국도 덮쳤는데, 중국에선 에너지 위기로 이어졌어요. 수력 발전량이 급감한 거예요. 특히 중국 남부는 전력 사용량 중 4분의 3을 수력 발전에 의존하는 상황이어서 폭스바겐과 폭스콘 등 전 세계 주요 기업들이 공장 가동을 멈추는 사태까지 벌어졌죠.

• 데이터 3법 개정안
데이터 3법 개정안의 주요 내용은 크게 두 가지예요. 개인정보위를 중심으로 개인정보 보호 관련 업무와 기능을 통합한 것, 그리고 '가명 정보'와 '익명 정보'의 개념을 도입해 빅데이터 활용을 쉽게 만든 것이죠.

데이터 3법 도입으로 개인정보 관련 개념은 다음과 같이 구별하게 됐어요.

· 개인 정보: 이름, 전화번호, 주민등록번호 등 특정 개인을 알아볼 수 있게 하는 정보
· 가명 정보: 추가 정보 없이는 누군지 알아볼 수 없게 조치한 정보
· 익명 정보: 더 이상 개인을 알아볼 수 없게 복원 불가능할 정도로 조치한 정보

굳이 이렇게 구분한 건 가명 정보와 익명 정보를 자유롭게 활용하도록 허용하기 위해서였어요. '개인 정보'는 여전히 정보 제공자의 동의를 받아야만 활용할 수 있지만, 가명 정보는 정보 제공자의 동의 없이도 활용이 가능해졌죠.

개인 정보에서 몇몇 정보를 삭제해 가명 정보로 만든 뒤 연구 등의 목적으로 이용할 수 있게 된 거예요. 물론 아무 때나 사용할 수 있는 건 아니지만요. 그래도 기업들이 각종 연구를 위해 이 정보를 활용할 가능성이 생긴 셈이에요. 익명 정보는 이런 제한 없이도 활용할 수 있어요.`

  '자유무역협정(FTA)': {
    title: '자유무역협정(FTA)',
    content: `오늘날 세계 각국은 다양한 국가들과 경제 협력 관계를 맺고 있죠. 국가 간 경제 교류가 늘어나고 상호 의존성도 높아지면서 한때 '세계화' 바람이 불기도 했고요. 최근 세계 패권을 두고 경쟁하는 미국과 중국의 갈등이 심해지면서 '세계화는 끝났다'라는 이야기가 나오고 있지만, 오히려 협력 관계인 나라 사이의 의존성은 더 높아지기도 했는데요. 국가 간 경제 협력 방식은 다음과 같이 변화해왔어요.

① 세계무역기구(WTO) : 다 같이 잘해보자
1995년에 출범한 WTO는 전 세계가 자유로운 무역을 하면서 다 함께 잘살아 보자는 취지로 만들어졌어요. 회원국 간에 무역을 할 때 서로 차별하지 말고 공정하게 하자는 거였죠. 또 WTO는 무역과 관련한 분쟁이 생기면 옳고 그름을 판단하고, 잘못된 것은 고치도록 감시도 해요. 그래서 '경제의 UN(국제연합)'이라고도 불려요. WTO에 가입한 국가만 160개가 넘어요.

그런데 가입국이 많아지자 문제가 생겼어요. 시대가 변하면서 새로운 규칙이나 협정을 만들어야 하는데 모두가 합의하기는 어려웠던 거죠. 각자의 이해관계를 다 만족시킬 순 없으니까요.

② 양자 간 FTA : 우리 둘이 잘해보자
그래서 나온 게 두 나라 사이에 맺는 '자유 무역 협정(FTA)'이에요. 모두가 만족하는 공통의 규칙은 만들기 어려우니 두 나라 사이에서만이라도 만족할 수 있는 협정을 맺자는 거죠. 두 나라만 합의하면 되니까 WTO보다 더 많은 혜택을 서로에게 주고요.

상품이 국경을 통과할 때 부과되는 세금을 '관세'라고 하는데요. FTA를 맺은 나라들은 두 나라의 특산품 등을 거래할 땐 서로 관세를 낮춰줘요. 수입 상품에 대한 규제를 예외적으로 일부 풀어주기도 해요. 한국은 칠레를 시작으로 미국, 유럽연합(EU), 호주, 캐나다, 중국, 베트남 등과 각각 양자 간 FTA를 체결한 상태예요.

③ 메가(Mega) FTA : 둘만 잘해선 안 되겠네

• 자사 추천 금지
플랫폼 기업이 운영하는 검색 서비스에서 자사 상품이나 서비스를 우선 노출하는 게 금지돼요. 예를 들어 구글 검색에서 어떤 상품을 찾으면, 구글의 자체 쇼핑 서비스가 다른 경쟁사보다 먼저 뜨도록 해선 안 된다는 뜻이에요. 이 법이 적용되면 아마존이 자체 브랜드 상품을 검색 결과 상단에 우선 노출하는 행위도 할 수 없게 돼요.

• 앱 마켓 독점 허용 안 돼
앱스토어를 통해 앱을 내려받을 때 소비자가 구매한 상품의 수수료 일부(최대 30%)를 가져가지 못하게 해요. 플랫폼 기업이 운영하는 앱스토어 외에 다른 마켓에서도 앱을 내려받을 수 있도록 허용해야 하고, 두 개 이상의 앱 마켓을 동시에 설치할 수 있어야 해요.

• Siri냐, 알렉사냐… 기본 앱도 자유롭게
스마트폰을 사면 기본 서비스나 앱이 탑재되는데요. 디지털 시장법이 적용되면 스마트폰 제조사가 자사 서비스만 기본으로 탑재하지 않고, 이용자가 원하는 서비스나 앱을 기본으로 선택할 수 있게 해야 해요. 예를 들어 아이폰을 구매했을 때 AI 음성비서로 애플의 '시리' 대신 아마존의 '알렉사'를 기본 앱으로 설정할 수 있게 될 가능성이 있는 거죠.`

  '디리스킹': {
    title: '디리스킹',
    content: `경제·외교 기사를 읽다 보면 '디리스킹(Derisking·탈위험화)'이라는 단어가 자주 등장해요. 특정 국가와의 교역에서 특정 분야의 의존도를 줄이는 전략을 뜻해요. 특정 분야에서 한 나라에 너무 의존하다가 발생할 수 있는 위험이나 취약한 부분을 줄이겠다는 취지예요.

디리스킹은 특히 미국과 중국 간 경쟁 구도를 다루는 맥락에서 자주 쓰여요. 2010년대부터 미국과 중국이 자국의 첨단산업을 보호하기 위한 움직임이 이어지면서 이 관계를 두고 '디커플링(decoupling·탈동조화)'이라는 표현이 등장했어요. 두 나라의 경제가 분리되고, 각자 독립적인 공급망을 구축하면서 서로 다른 경제 흐름을 따르게 된다는 뜻이에요.

미국뿐 아니라 유럽연합(EU) 및 주요국도 디리스킹이라는 정책 방향을 채택하는 추세예요. 디리스킹이라는 단어는 지난 2023년 3월 우르줄라 폰데어라이엔 유럽연합(EU) 집행위원장이 연설에서 사용하면서 본격적으로 주목받기 시작했어요. 그는 중국에 지나치게 의존하다가 에너지 위기를 겪은 것처럼 큰 위기를 맞게 될 수 있다고 경고했어요. EU가 배터리에 필요한 희토류의 97%를 중국에서 들여오는 상황에서, 이런 의존도에 변화를 줘야 한다는 내용이었어요.

이후 주요 7개국(G7)이 중국에 대한 대응 전략을 담은 공동 성명에서 '디리스킹'이라는 표현을 채택하면서, 2023년 5월 히로시마 정상회의에서 공식 용어로 자리잡았어요.

중국은 디리스킹이 결국 디커플링과 다를 바 없다고 반박해요. 반도체 등 일부 분야에서 중국과의 분리를 추진하거나, 광범위한 분야에서 중국산 부품을 줄이려는 전략이니 결국 같은 것 아니냐는 입장이에요. 그럼에도 '디리스킹'이라는 말은 미국과 서방이 중국을 다루는 외교적 표현으로 이미 정착해 버렸어요.`

  '마진 콜': {
    title: '마진콜',
    content: `마진 콜(Margin call)은 선물(Future) 시장에서 주로 사용되는 단어예요. 선물 거래란 어떤 자산을 '미래의 특정 시점에, 미리 정한 가격에' 거래하기로 정하는 계약이죠. 농촌에서 많이 이뤄지는 '밭떼기' 계약을 예로 들곤 하는데, 실제로도 유사한 구조예요. 예컨대 도매상이 "한 달 후에 포기당 3000원에 A농장 배추를 사겠다"는 식으로 계약하는 거죠.

그런데 막상 한 달 후가 되면 배추의 가격은 4000원이 될 수도 있고, 2000원이 될 수도 있어요. 금융시장에서는 주식뿐 아니라 원유, 금·은·니켈 같은 광물 자원, 밀·옥수수 등 식량 자원에 이르기까지 선물 시장이 형성돼 있어요.

선물 거래에서는 계약 이행을 보증하기 위해 거래소(증권사)를 통해 증거금(margin)을 위탁하게 하고, 하루 단위로 '일일 정산'을 해요. 이렇게 손실을 계속 기록하다가 처음에 냈던 증거금이 줄어서 '유지증거금' 이하로 떨어지면 거래소는 '마진 콜'을 해요. "손실이 났기 때문에 증거금이 계약 이행을 보증하기에 부족하니 다시 채워 넣어라"라고 요구하는 거예요. 예전에는 이 요구를 거래소가 전화로 했기 때문에 'Call'이라는 이름이 붙었대요.

이때 투자자가 증거금을 다시 채워 넣지 못하면 거래소는 강제 청산을 통해 선물 거래를 종결시켜요. 기존 증거금을 모두 잃고 계약도 끝나는 거죠. 마진 콜이라는 용어는 선물 거래 외에도, 주식을 담보로 대출을 받았는데 주가 하락으로 담보 가치가 일정 수준 이하로 떨어지면 금융기관이 "담보를 더 제공하라"고 요구하는 상황 등 다양한 금융 거래에서 활용돼요.`
  },
  '가계부실위험지수(HDRI)': {
    title: '가계부실위험지수(HDRI)',
    content: '가구의 소득 흐름은 물론 금융 및 실물 자산까지 종합적으로 고려하여 가계부채의 부실 위험을 평가하는 지표로, 가계의 채무상환능력을 소득 측면에서 평가하는 원리금상환비 율(DSR; Debt Service Ratio)과 자산 측면에서 평가하는 부채/자산비율(DTA; Debt To Asset Ratio)을 결합하여 산출한 지수이다. 가계부실위험지수는 가구의 DSR과 DTA가 각각 40%, 100%일 때 100의 값을 갖도록 설정되어 있으며, 동 지수가 100을 초과하는 가구를 ‘위험가구’로 분류한다. 위험가구는 소득 및 자산 측면에서 모두 취약한 ‘고위험가 구’, 자산 측면에서 취약한 ‘고DTA가구’, 소득 측면에서 취약한 ‘고DSR가구’로 구분할 수 있다. 다만 위험 및 고위험 가구는 가구의 채무상환능력 취약성 정도를 평가하기 위한 것 이며 이들 가구가 당장 채무상환 불이행, 즉 임계상황에 직면한 것을 의미하지 않는다.',
  },
  '가계수지': {
    title: '가계수지',
    content: '가정에서 일정 기간의 수입(명목소득)과 지출을 비교해서 남았는지 모자랐는지를 표시한 것을 가계수지(Household’s Total Income and Expenditure)라 한다. 가계수지가 흑자를 냈다면 그 가정은 벌어들인 수입 일부만을 사용했다는 것을 의미하며, 적자를 냈다면 수 입 외에 빚을 추가로 얻어 사용한 것이라고 보아야 한다. 우리나라는 통계청에서 국민의 소득수준 및 생활실태를 파악하기 위해 표본으로 선정된 가계에 가계부를 나누어 주고 한 달간의 소득과 지출을 기록하도록 한 다음 이를 토대로 가계수지 통계를 작성하여 발표하 고 있다. 가계부의 소득항목에는 근로소득·사업소득·재산소득·이전소득 항목이 있고, 비 용항목에는 식료품비·주거비·수도광열비·보건비·교육비 항목이 있다.',
  },
  '가계순저축률': {
    title: '가계순저축률',
    content: '일반적으로 저축률은 저축액을 처분가능소득으로 나눈 비율을 말한다. 마찬가지로 가계 순저축률은 가계부문의 순저축액을 가계순처분가능소득과 정부로부터 받은 사회적 현 물이전 금액, 연금기금의 가계순지분 증감조정액을 합계한 금액으로 나눈 비율이다. 여 기서 사회적 현물이전(Social Transfer in Kind)이란 정부 등이 가계에 현물이전의 형 태로 제공하는 재화 및 서비스로서 무상교육, 보건소의 무상진료 등이 해당된다. 또한 연 금기금의 가계순지분 증감조정액을 분모에 더하는 이유는 퇴직연금 등과 같이 가계가 납부한 연금부담금과 연금수취액의 차액을 반영해야 가계부문의 저축액을 정확히 구할 수 있기 때문이다. 가계순저축률은 가계부문의 저축성향을 가장 잘 나타내주는 지표라 고 할 수 있다. 가계순저축률(%) = {가계부문 순저축 / (가계순처분가능소득 + 사회적현물이전수취 + 연금기금의 가계순지분 증감조정)} × 100',
  },
  '가계신용통계': {
    title: '가계신용통계',
    content: '가계신용통계는 가계부문에 대한 신용공급 규모를 나타내는 통계이다. 가계신용은 금융 기관뿐 아니라 정부, 판매회사 등 기타기관이 가계에 제공한 대출과 외상구매 관련 신용 을 모두 포괄하는 것으로 크게 가계대출과 판매신용으로 구분된다. 현재 가계신용통계는 2002년 말 잔액부터 분기별로 제공되고 있다. 가계신용통계는 우리나라 가계부문의 부채 규모 및 변동 등을 파악하는 데 널리 활용되고 있다.',
  },
  '가계처분가능소득': {
    title: '가계처분가능소득',
    content: '가계처분가능소득(PDI; Personal Disposable Income)은 가계가 마음대로 소비와 저 축으로 처분할 수 있는 소득을 의미한다. 흔히 국민의 생활 수준을 파악해 볼 수 있는 지 표로 1인당 국민총소득(GNI)이 널리 쓰이고 있으나 GNI에는 가계뿐 아니라 기업, 금융 회사와 정부가 벌어들인 소득이 모두 포함되어 있다. 따라서 기업과 금융회사 등이 가 계 부문보다 더 많은 소득을 벌어 1인당 GNI가 높아진 경우에는 가계가 느끼는 체감경 기는 전체 경기와 괴리가 있게 된다. 1인당 가계총처분가능소득(PGDI; Personal Gross Disposable Income)은 가계부문의 총처분가능소득을 연앙인구로 나누어 계산한 지표로 가계의 구매력을 가장 정확히 가늠해 볼 수 있는 소득지표이다.',
  },
  '가교은행': {
    title: '가교은행',
    content: '청산 대상 금융기관의 자산, 부채를 임시로 넘겨받아 예금, 출금 등의 업무를 대행하고 합 병, 채권채무관계 조정 등 후속조치를 수행하는 은행을 말한다. 금융기관이 파산한 경우 예금보험공사는 예금자보호법 및 관계법령에서 정한 절차에 따라 청산, 매각, 자산부채승 계, 가교은행을 통한 인수 등의 금융기관 정리수단을 통하여 부실 금융기관을 정리한다. 이 중 가교은행을 통한 인수방식은 파산은행의 처리에 상당한 시간이 소요될 것으로 예상 될 때 사용되며 새로운 은행을 설립하여 자산, 부채를 포괄승계하도록 하고, 인수 희망자 를 물색하는 등의 조치를 취하게 된다. 가교은행을 이용한 처리방식은 금융기관 파산에 따른 충격을 완화하고 시간적인 여유를 확보할 수 있는 장점이 있다. 가교은행은 파산 처 리가 완료되면 정리대상 금융기관과 마찬가지로 없어지는 한시적 기관이다.',
  },
  '가산금리': {
    title: '가산금리',
    content: '신용도 등의 차이에 따라 기준금리에 덧붙이는 금리를 가산금리(또는 스프레드, spread) 라고 한다. 예를 들어 은행이 대출금리를 결정할 때 고객의 신용위험에 따라 조달금리에 추가하는 금리를 말한다. 한편 만기가 길어지면 추가로 가산되는 금리를 기간 가산금리 (텀스프레드, term spread)라고 하는데 이것도 일종의 스프레드이다. 통상 신용도가 높 으면 가산금리가 낮고, 신용도가 낮으면 가산금리 즉 스프레드는 커진다. 한편 채권시장 에서는 비교대상이 되는 금융상품의 금리에 대비한 차이를 스프레드라고 한다. 보통 해외 에서 채권을 발행할 때 동일한 만기의 미국 국채(Treasury Bond) 금리나 무위험지표금리 (RFR; Risk-Free Rate)가 기준금리가 되고 여기에 신용도 등에 따라 가산금리가 붙어서 발행되는게 보통이다. 실제로 우리나라는 지난 1997년 외환위기 당시에 해외에서 채권을 발행할 때 높은 가산금리를 지불한 경험이 있다. 기준금리와의 차이를 나타내는 가산금리 또는 스프레드는 보통 베이시스 포인트(bp; basis point)로 나타내는데 예를 들면 0.5% 의 금리격차를 50bp로 표기하고 1%는 100bp로 표시된다.',
  },
  '가상자산': {
    title: '가상자산',
    content: '가상자산(Virtual Asset)은 분산원장 및 암호화 기술을 바탕으로 민간에 의해 디지털 토큰 형태로 발행되어 전자적으로 거래 또는 이전 가능한 자산이다. 「가상자산 이용자 보호 등 에 관한 법률」에서는 “경제적 가치를 지닌 것으로서 전자적으로 거래 또는 이전될 수 있 는 전자적 증표와 그에 관한 일체의 권리”로 정의하며, 발행인이 사용처와 용도를 제한한 것, 게임물의 이용을 통해 획득한 결과물, 전자화폐, 전자증권, 전자어음 등은 가상자산 에서 제외하고 있다. 가상자산은 전통적인 현금, 예금 등의 화폐와는 구별되는 새로운 형 태의 자산으로서 일부에서 투자 및 지급수단으로 활용되고 있으나, 가격 변동성이 크고, 신뢰성과 안정성 측면에서 기존 금융자산과 차이가 있다. 국제자금세탁방지기구(FATF; Financial Action Task Force)는 “디지털 방식으로 거래, 이전될 수 있으며, 지급 또는 투자 목적으로 사용될 수 있는 가치의 디지털 증표(digital representation of value)”로 정의하며 법정통화의 디지털 증표라고 할 수 있는 중앙은행 디지털화폐(CBDC)나 증권 등 기존 금융자산의 디지털 표현 형태는 포함되지 않는다. 한국은행은 가상자산이 금융시스 템과 통화정책, 지급결제시스템에 미치는 영향에 대해 지속적으로 연구하고 있으며, 국제 기구 등과의 협력을 통해 가상자산 시장의 투명성 및 이용자 보호 강화 등을 위한 정책적 기반 마련을 위해 노력하고 있다.',
  },
  '가상자산공개(ICO)': {
    title: '가상자산공개(ICO)',
    content: '가상자산공개(ICO; Initial Coin Offering)는 주로 혁신적인 신생기업(startup)이 가상 자산(virtual asset) 또는 디지털 토큰(digital token, 일종의 투자증명)을 이용하여 자 금을 조달하는 크라우드펀딩(crowd funding)의 한 방식이다. 가상자산공개(ICO)에서 새로 발행된 가상자산은 법화(legal tender) 또는 비트코인 등 기존의 가상자산과 교환 되어 투자자에게 팔린다. 가상자산공개는 거래소에 상장하려는 기업이 투자자에게 자 기 주식을 처음 공개적으로 매도하는 기업공개(IPO; Initial Public Offering)에서 연유 되었다고 볼 수 있다. 기업공개(IPO)에 참여한 투자자는 해당 기업의 소유권과 관련하 여 주식을 획득한다. 반면 가상자산공개(ICO)에 참여한 투자자는 해당 신생기업의 코인 (coins) 또는 토큰을 얻는데, 이는 해당 기업이 제안한 프로젝트가 나중에 성공했을 경우 평가될 수 있는 가치(value)로 볼 수 있다. ICO는 이더리움(Ethereum)을 포함한 다양한 분산원장 기반 블록체인 네트워크에서 이뤄지고 있다. 우리나라의 경우 향후 논의를 거 쳐 ICO를 포함한 가상자산 전반의 발행 및 유통 관련 사항을 가상자산 관련 법률에서 규 제할 것으로 보인다.',
  },
  '간접금융/직접금융': {
    title: '간접금융/직접금융',
    content: '자금 잉여주체와 자금 부족주체 사이에 은행이나 저축은행 신용협동기구 등 금융기관이 개입하여 자금을 중개하는 방식을 간접금융(Indirect Financing)이라고 한다. 즉 금융기 관이 일반 대중으로부터 예금을 받아 기업 등 다른 경제주체에게 대출해 주는 방식이다. 한편 주식, 채권 발행의 경우와 같이 자금수요자가 금융기관을 통하지 않고 금융시장에서 직접 필요자금을 조달하는 방식을 직접금융(Direct Financing)이라고 한다. 간접금융에 서는 은행이 중추적인 기능을 하고, 직접금융에서는 주식과 채권이 거래되는 자본시장이 중요한 역할을 수행한다. 직접금융과 간접금융은 상호 경쟁적일 뿐만 아니라 보완적이기 도 하므로 균형적으로 발전될 필요가 있다. 직접금융과 간접금융의 상대적 비중이 어느 정도이어야 이상적인지는 해당 국가의 경제발전 단계나 경제구조에 따라 달라질 수밖에 없다. 예를 들면 중소기업의 비중이 높은 국가일수록 정보의 비대칭성 문제를 완화하기 위해 간접금융이 더 중요하고, 혁신산업에 의해 주도되는 경제일수록 미래의 성장 가능성 을 보고 투자하고 그 위험과 이익을 공유하는 주식 등 직접금융의 역할이 더 중요할 것이 다. 일반적으로 금융시장이 발달함에 따라 직접금융 비중이 높아진다.',
  },
  '간접세/직접세': {
    title: '간접세/직접세',
    content: '조세는 납세의무자와 실제로 세금을 부담하게 되는 조세부담자가 일치하는지 여부에 따 라 간접세(Indirect Tax)와 직접세(Direct Tax)로 구분된다. 납세의무자와 조세부담자가 일치하여 조세부담이 전가(轉嫁)되지 않는 조세를 직접세라고 하며, 대표적인 예로는 소 득세, 법인세, 상속세, 증여세, 종합부동산세 등이 있다. 이와 달리 납세의무자와 조세부 담자가 일치하지 않고 조세의 부담이 타인에게 전가되는 세금을 간접세라고 하며, 대표적 인 예로는 부가가치세, 개별소비세, 주세, 인지세, 증권거래세 등이 있다. 간접세는 조세 에 대한 저항이 적고 징수가 간편하여 조세수입의 확보가 용이하다는 장점이 있다. 반면, 개인의 사정을 고려할 수 없으므로 누진세율(累進稅率)을 적용하지 못하고 비례세율이 적 용됨으로써 소득이 적은 자에게 상대적으로 높은 조세부담률이 적용되는 역진성(逆進性) 을 띠게 되어 공평부담의 원칙에 어긋난다는 단점이 있다. 한편, 국민계정체계에서는 조 세의 실질적인 부담주체를 결정하기가 쉽지 않은 점 등을 감안하여 간접세와 직접세 대신 생산 및 수입세, 소득 및 부 등에 대한 경상세, 자본세란 용어를 사용하고 있다.',
  },
  '간편 송금': {
    title: '간편 송금',
    content: '간편 송금은 모바일 앱이나 온라인 서비스를 통해 상대방에게 손쉽게 금전적 가치를 이전해 주는 서비스이다. 이용이 다소 복잡하고 불편한 공인인증서나 OTP(One Time Password, 일회용 비밀번호) 없이도 비밀번호 또는 지문인식과 같은 생체인증만으로 송 금이 가능하기 때문에 사용자가 편리함을 느끼게 된다. 국내에서는 토스, 카카오페이, 네이버페이 등이 간편 송금 방식을 이용하고 있다.',
  },
  '감독자협의회(Supervisory College)': {
    title: '감독자협의회(Supervisory College)',
    content: '다국적 금융기관들에 대한 효과적인 규제·감독을 위하여 다국적 금융기관의 본점이 소 재한 국가(home country)의 감독 당국과 동 기관의 지점 또는 자회사가 소재한 진출국 (host country)의 감독 당국들로 구성된 정보공유 및 감독협력 협의체를 의미한다. 금융 기관의 영업활동이 전 세계적으로 이루어지고 있는데 반해 규제·감독이 금융기관의 국적 또는 지역기반을 중심으로 이루어지고 있는 한계를 극복하기 위하여 설립되었다.',
  },
  '갑기금(Capital A)': {
    title: '갑기금(Capital A)',
    content: '외국은행 국내지점의 대차대조표상 자본금계정으로 ① 외국은행 국내지점의 설치 및 영 업행위를 위하여 본점이 한국은행 등에 외화자금을 매각하여 해당 지점에 공급한 원화 자 금 ② 해당 외국은행 국내지점의 적립금에서 전입하는 자금 ③ 외국은행 국내지점을 추가 로 설치하기 위하여 이미 국내에 설치된 외국은행 국내지점의 이월이익잉여금에서 전입 하는 자금 등이 이에 해당한다. 갑기금은 금융위원회로부터 인정받은 금액에 한하여 지점 별로 관리하되 각 외은지점의 갑기금은 30억원 이상이어야 한다(「은행법 시행령」 제26 조, 「은행업 감독규정」 제11조).',
  },
  '거래정보저장소': {
    title: '거래정보저장소',
    content: '거래정보저장소(TR; Trade Repository)는 장외파생상품(OTC Derivatives) 거래에 대한 상세 정보를 중앙 집중적으로 수집, 보관 및 관리하는 금융시장인프라(FMI)이다. 2008년 글로벌 금융위기 당시 리먼브라더스 사태에서 장외파생상품 거래의 불투명성이 위기를 증폭시킨 주된 원인으로 지목되면서, G20 정상들은 시장 투명성 강화를 위해 모 든 장외파생상품 거래 정보의 보고 의무화를 합의했고, 이에 따라 TR 도입이 추진되었 다. TR의 주요 역할로는 정보 집적 및 관리, 리스크 모니터링, 시장 투명성 제고, 규제 당 국의 감독 지원 등을 들 수 있다. 우리나라에서는 한국거래소(Korea Exchange, KRX)가 2015년 TR사업자로 선정되어 시스템을 구축하였으며, 2021년 4월부터 장외파생상품 거 래 정보 보고 의무화가 시행되면서 KRX-TR이 공식적으로 운영되고 있다.',
  },
  '거시건전성 정책': {
    title: '거시건전성 정책',
    content: '개별 금융회사의 부실 방지를 목적으로 하는 미시건전성정책(Microprudential policy) 과 달리 경제전체의 금융안정을 위해 시스템 리스크(systemic risk)를 억제하는 정책을 의 미한다. 구체적으로 거시건전성정책(Macroprudential policy)의 목표는 시스템 리스크 에 대한 선제적 대응, 과도한 금융불균형 축적 억제, 급격한 되돌림 현상(unwinding) 완 화, 금융시스템의 복원력(resilience) 강화, 금융연계성 제어 등을 통해 금융위기의 발생 가능성과 실물경제에 미치는 부정적인 영향(spillover effects)을 최소화하는 데 있다. 거 시건전성정책은 통화정책과 재정정책 등 여러 다른 정책과 긴밀히 관련되어 있으므로, 거 시건전성정책의 수립과 집행에는 여러 정책당국 간 정보공유와 협력 및 조정이 긴요하다.',
  },
  '거액익스포저 규제': {
    title: '거액익스포저 규제',
    content: '금융기관의 특정 차주 등에 대한 신용공여가 과도한 경우 해당 거래상대방의 채무불이행 등의 발생시 해당 금융기관의 자본건전성을 심하게 훼손할 가능성(편중리스크)이 있다. 바젤Ⅱ에서는 이러한 편중리스크를 직접 규율하지 않고 각국 감독당국이 편중리스크를 점검·관리하도록 하였다. 우리나라는 은행법 등에서 동일인·동일차주 신용공여 한도 제 도를 통해 편중리스크를 관리하고 있다. 한편 금융위기 이후 금융기관간 상호연계성에 의 한 시스템 리스크를 억제하고 편중리스크의 근본적인 관리 필요성이 대두됨에 따라 바젤 위원회(BCBS)는 거액익스포저 규제를 2019년 1월 도입하였고 우리나라는 2019년 3월 시범실시한 이후 2024년 2월부터 시행 중이다. 동 규제는 거액익스포저를 단일 거래상대 방 또는 연계된 거래상대방그룹(경제적 상호의존성이 있는 거래상대방들로 구성되어 거 래상대방들 중 하나가 파산하면 다른 모든 거래상대방들이 파산할 가능성이 상당히 높은 그룹)에 대한 익스포저의 합계가 은행 기본자본의 10% 이상인 경우로 정의하고, 거액익 스포저 현황을 금융당국에 정기적으로 보고하도록 하는 한편, 거액익스포저비율(거액익 스포저를 은행 기본자본으로 나눈 값)이 25%를 초과하지 못하도록 하고 있다.',
  },
  '거액지급시스템': {
    title: '거액지급시스템',
    content: '참가기관 간에 주로 거액의 자기자금 또는 고객자금 이체를 위한 지급지시가 이루어지 는 시스템을 말한다. 거래 가능한 최소금액이 설정된 것은 아니나 일반적으로 금융시장 에서 이루어진 금융기관간 콜거래, 증권 또는 외환매매 등 거액거래에 따른 대금이체지 시를 다루기 때문에 건당 이체지시 금액이 상대적으로 크다. 또한 한 나라의 금융기관 간 자금거래 대부분이 처리되는 중요시스템으로서 결제시점과 결제리스크 관리의 필요 성이 높아 주요국의 거액지급시스템은 대부분 신용리스크를 제거할 수 있는 실시간총액 결제방식을 채택하고 있으며 대부분 중앙은행이 직접 운영한다. 우리나라의 한은금융망 (BOK-Wire+), 미국 연준의 Fedwire, 유럽중앙은행(ECB)의 TARGET2 등이 여기에 해 당된다.',
  },
  '결제': {
    title: '결제',
    content: '결제(Settlement)는 개인이나 기업 등 경제주체가 자금거래 또는 금융자산 거래를 한 후 각각의 지급지시에 따라 자금 또는 증권이 이전되어 법적인 채권·채무가 종결되는 과정 이다. 자금 및 증권의 이전은 주로 결제은행내에서 예금 또는 증권계좌간 자금 및 증권이 이동하는 방식으로 이루어진다.',
  },
  '결제리스크': {
    title: '결제리스크',
    content: '결제리스크는 예기치 못한 사정으로 인하여 결제가 예정대로 이루어지지 않을 가능성 또 는 그로 인하여 야기되는 손실발생 가능성으로 정의할 수 있다. 이러한 결제리스크는 발 생가능성이 낮더라도 실제 발생할 경우 큰 손실을 초래할 수 있다는 특성을 갖고 있다. 지 급결제 규모가 지속적으로 늘어나는 가운데 정보통신기술의 발달 등 지급결제 환경 변화 와 글로벌 금융위기의 영향 등으로 결제리스크에 대한 관심이 높아지고 있다. 특히 인터 넷과 모바일을 이용한 다양한 지급서비스의 제공은 지급결제제도의 효율성을 제고시키고 있으나 다른 한편으로는 결제리스크의 증가에도 영향을 미치고 있다. 결제리스크는 거래 에 따른 지급 시점과 청산·결제시점간의 차이, 청산·결제방식, 금융시장인프라 참가기관 의 재무건전성 등 여러 요인에 의해 발생할 수 있다. 결제리스크를 유형별로 세분화하면 신용리스크(credit risk), 유동성리스크(liquidity risk), 운영리스크(operational risk), 법 률리스크(legal risk), 시스템리스크(systemic risk) 등이 있다.',
  },
  '결제부족자금 공동분담제': {
    title: '결제부족자금 공동분담제',
    content: '결제부족자금 공동분담제(Loss-Sharing)는 참가기관이 거래에 따른 지급의무를 이행하지 않는 경우 지급되지 않은 채무를 여타 참가기관들이 공동분담함으로써 결제가 완료되도록 보장하는 방안이다. 이는 특정기관의 지급불이행이 연쇄적으로 여타 기관의 결제불이행을 유발함으로써 발생할 수 있는 전체 지급결제시스템의 붕괴와 금융혼란을 방지하기 위한 것 이다. 미지급채무의 분담기준으로는 참가기관의 규모, 시스템 이용실적, 참가기관의 신용한 도액 등을 사용한다. 일반적으로 신용한도와 동시에 운용될 때는 각 참가기관이 지급불이행 기관에 제공한 신용한도를 손실분담기준으로 사용하게 되며 이 경우 각 참가기관은 보다 신 중하게 상대신용한도를 설정하게 되는 등 참가기관들에 대하여 리스크 감축을 위한 동기를 부여하는 효과를 기대할 수 있다. 결제부족자금 공동분담은 지급불이행 기관의 사전담보로 결제이행재원을 조달하는 채무불이행자 부담(defaulter pays)과 달리 생존기관(결제이행기 관)이 결제이행재원을 분담한다는 점에서 생존자 분담(survivors pay) 방식이라고도 한다.',
  },
  '결제완결성': {
    title: '결제완결성',
    content: '지급결제시스템을 통해 이루어진 참가기관의 지급지시가 결제된 이후에는 어떠한 상황 이나 법률에 의해서도 취소되거나 무효화되지 않고 해당 지급결제시스템의 운영 규칙 에 따라 무조건적으로 종결되는 것을 의미한다. 결제완결성(Settlement Finality)이 보 장되지 않을 경우 지급결제시스템을 통해 종결된 금융기관의 지급지시가 사후적으로 무 효화될 수 있어 금융시스템에 큰 혼란을 초래할 수 있다. 「지급 및 시장인프라 위원회」 (CPMI)와 「국제증권감독기구」(IOSCO)가 제정한 국제기준인 「금융시장인프라에 관한 원칙」(PFMI)에서도 결제완결성 원칙이 규정되어 있어 각국 정책당국이 준수하도록 하고 있다. 우리나라는 2006년 4월 시행된 「채무자회생 및 파산에 관한 법률」에서 지급결제 시스템에 대한 결제완결성 보장 제도가 도입되었다. 동 법에 따라 한국은행 총재는 금융 위원회 위원장과 협의하여 결제완결성이 보장되는 지급결제시스템을 지정할 수 있으며, 지정된 지급결제시스템을 통해 결제된 지급행위는 참가기관의 파산 등의 사유로 취소할 수 없도록 하고 있다.',
  },
  '겸업주의/전업주의': {
    title: '겸업주의/전업주의',
    content: '하나의 금융회사가 제공할 수 있는 금융서비스의 종류를 어떻게 정하느냐에 따라 겸업주 의(Universal banking)와 전업주의(Specialized banking)로 구분된다. 겸업주의는 한 금융회사가 은행·증권·보험 등 여러 금융서비스를 취급할 수 있는 반면 전업주의는 은행· 증권사·보험사 등이 각각 해당하는 고유의 서비스만을 제공하는 방식이다. 현재 세계적 으로 겸업주의가 대세를 이루고 있으나 국가별로는 법적 형태면에서 차이가 있다. 독일, 네덜란드, 스위스 등 대부분의 유럽국가는 은행산업과 증권산업 간에 아무런 장벽을 두 지 않고 하나의 은행이라는 법적 조직체 안에서 은행, 증권, 보험 등의 모든 서비스를 제 공하는 내부겸업 시스템을 근간으로 한다. 반면에 영국 및 영연방국가, 현재의 미국에서 는 은행이 자회사를 통해 증권이나 보험업무를 수행하는 외부겸업 시스템을 택하고 있다. 전업주의는 종전의 일본 및 미국의 경우처럼 은행산업과 여타 금융서비스 산업의 법적인 분리를 특징으로 한다. 우리나라는 과거에 전업주의를 채택하였으나 1980년대 이후 내부 겸업을 확대하여 왔으며 2000년 「금융지주회사법」 제정으로 미국, 일본 등과 같은 외부 겸업 시스템을 도입하였다. 한편 국외에서는 2008년 글로벌 금융위기의 원인 중 하나로 금융회사의 과도한 금융겸업 확대가 지목되면서 이를 우려하는 목소리가 커지고 있다. 그 결과 미국은 은행부문의 헤지펀드 및 사모펀드 운영을 제한하는 볼커룰(Volcker Rule)을 도입하였으며, 영국은 예금·대출 위주의 소매은행으로부터 리스크가 높은 증권투자업무 를 분리하는 ‘소매은행업 격리제도(ring-fenced bank)’를 마련하였다.',
  },
  '경기': {
    title: '경기',
    content: '경기(Business Conditions)라는 단어는 일상생활에서 경제적인 형편을 뜻하는 말로 자 주 사용된다. 기업들은 매출이 늘고 채산성이 좋아지면 경기가 좋다고 인식할 것이고, 가 계는 임금이 인상되거나 주식, 부동산 등의 자산가격이 올라 살림이 좋아지면 경기가 좋 아졌다고 느낄 것이다. 범위를 넓혀 국민경제 전체를 대상으로 볼 때, 경기가 좋다는 것은 생산, 소비, 투자 등의 경제활동이 평균 수준 이상으로 활발한 경우를 의미한다. 장기적 관점에서 경기는 항상 일정한 수준을 유지하는 것이 아니라 생산·물가·고용이 상승하는 시기와 하락하는 시기가 주기적으로 순환을 반복하는 경제활동의 상황을 의미한다. 경기 는 호황기→후퇴기→불황기→회복기→호황기가 반복되면서 끊임없이 변동하며, 이렇게 경기의 일정한 움직임이 되풀이되는 것을 경기의 순환(business cycle)이라고 한다. 이러 한 경기의 순환과정은 확장국면과 수축국면이 교대로 되풀이되는 반복성, 여러 측면의 경 제활동을 포괄하는 다양성, 확장 및 수축 양상이 시차를 두고 경제 각 부문에 전달되는 파 급성, 그리고 일정한 방향으로 계속 확대해 나가는 지속성 등의 특징을 갖는다. 경기를 판 단하는 방법으로는 생산, 투자, 고용, 수출 등 경제 각 부문의 여러 경제지표의 움직임을 분석하는 방법, 종합경기지표로 판단하는 방법, 기업가나 소비자들의 경기판단 및 전망 설문조사 결과에 의한 방법 등이 있다.',
  },
  '경기순응성': {
    title: '경기순응성',
    content: '경기순응성이란 통상 경제주체의 위험인식 및 행위, 금융의 제도 및 규제 등의 효과가 경 기변동의 움직임과 같은 방향으로 움직이는 것을 의미한다. 예를 들어 은행대출의 경우 호경기에는 미래에 대한 낙관적 기대 등으로 여신심사기준도 완화되어 더 크게 증가하 여 경기확장에 기여한다. 반면 불경기에는 심사기준이 강화되어 대출이 큰 폭으로 감소 하여 불황을 더욱 부추기게 된다. 이러한 은행대출의 경기순응적 행태는 신용팽창 또는 위축을 가속시킴으로서 경기변동의 진폭을 더욱 크게 한다. 따라서 정책당국은 정책을 마련할 경우 경기순응성을 완화할 수 있는 경기대응적 정책수단을 개발하기 위해 노력 하고 있다.',
  },
  '경기조절정책/경제안정화정책': {
    title: '경기조절정책/경제안정화정책',
    content: '경기조절정책(Business Adjustment Policy) 또는 경제안정화정책(Stabilization Policy) 은 경기가 지나친 확장 또는 수축 현상을 보일 경우 이를 정상 수준으로 되돌리기 위해 정 책당국이 취하는 제반 조치를 말한다. 이는 정책당국이 경제 전체의 총수요 수준을 변동 시킴으로써 경기 수위를 조절하는 데 초점을 맞추고 있다. 실제 운영에 있어서는 정부지 출과 세율을 조정하는 재정정책이 이용되거나 통화량과 금리 수준을 조절하는 통화정책 이 활용된다. 즉 경기가 정상 수준을 큰 폭 밑도는 불황에 직면하게 될 경우 정부는 재정 지출을 늘리거나 조세를 줄이는 재정정책 수단을 동원한다. 한편 중앙은행은 통화량을 늘 리거나 금리를 내리는 정책수단을 활용한다. 이와는 반대로 경기가 지나치게 과열될 경우 정책당국은 재정측면에서는 정부지출을 줄이거나 조세를 늘리고, 통화측면에서는 통화량 을 줄이거나 금리를 올리는 조치를 취한다.',
  },
  '경기종합지수': {
    title: '경기종합지수',
    content: '산업생산지수, 소매판매액지수 등 개별 경제지표들은 경제활동의 한 측면만을 반영하고 있어 나라 경제의 전반적인 상황을 종합적으로 파악하기 어렵다. 이에 따라 개별 경제지 표들을 가공·합성하여 경기종합지수(CI; Composite Index)를 작성하고 있다. 경기종합 지수는 각 부문별로 경기를 잘 나타내는 경제지표들을 선정한 다음 계절 및 불규칙 요인 의 제거, 진폭의 표준화 등의 가공 과정을 거친 후 합산하여 하나의 지수로 만든 것이다. 경기종합지수는 지수의 변동 방향으로 경기변동의 방향을 가늠할 수 있고, 지수의 변동 폭으로 경기변동의 크기를 알 수 있기 때문에 경기흐름을 종합적으로 판단하는데 매우 유 용하다. 한편, 경기종합지수는 경기에 대한 선·후행 관계에 따라 선행종합지수, 동행종합 지수, 후행종합지수로 구분한다. 선행종합지수는 비교적 가까운 장래의 경기 동향을 예측 하는 데 활용되며, 동행종합지수는 현재의 경기상태를 판단하는데 이용되고, 후행종합지 수는 경기변동을 사후에 확인하는 데 활용된다.',
  },
  '경영실태평가/은행경영실태 평가등급제도': {
    title: '경영실태평가/은행경영실태 평가등급제도',
    content: '경영실태평가는 금융감독당국이 임점 검사 시 금융기관의 경영실태 전반을 점검·평가 하기 위한 제도로, 각 금융기관의 경영실적, 경영의 건전성, 경영진의 경영능력, 법규준 수 상황 및 리스크 관리실태 등 다양한 평가부문을 종합적이고 통일적인 방식에 따라 일 정한 등급으로 평가하여 금융기관의 경영상태를 체계적이고 객관적으로 확인하는 방법 의 하나이다. 아울러 평가 결과에 따라 부실금융기관에 대해 적기시정조치를 취하는 한 편 감독상 주의 및 관심을 더욱 집중하여 금융기관 경영의 건전성 확보와 금융소비자 보 호 등 감독·검사 업무의 효율성을 높일 수 있다. 우리나라는 1996년 10월 은행에 도입 한 이후 다른 금융기관에 확대 적용하였다. 경영실태평가의 평가절차나 방식 등은 금융 기관별로 거의 동일하나, 금융기관 그룹별 특성에 따라 평가부문과 항목에 차이가 있다. 은행의 경우 해당 은행의 특성(일반은행, 외은지점, 특수은행 등)에 따라 CAMEL-IR 방식, ROCA 방식, CACREL 방식을 운용하고 있다. 경영실태평가의 부문별 평가등급 및 종합등급은 1등급(우수), 2등급(양호), 3등급(보통), 4등급(취약), 5등급(위험)의 5단계로 구분되며, 일반은행의 경우 각 등급을 3단계(+, 0, -)로 세분화하여 5등급, 15단계로 운용 하고 있다.',
  },
  '경제 서프라이즈 지수': {
    title: '경제 서프라이즈 지수',
    content: '경제 서프라이즈 지수는(ESI; Economic Surprise Index)는 실제로 발표된 경제지표가 시장의 전망치(예상치, 컨센서스)와 얼마나 차이가 있는지를 수치로 나타내는 지표이다. 주요 경제지표(고용, GDP, 소비자물가 등)의 실제 값과 Bloomberg, Reuters 등에서 조 사한 시장참가자들의 중간 예측치(컨센서스) 간의 차이를 표준화하여 합산한다. 지수가 양수(+)이면 실제 경제지표가 예상보다 호조이고, 음수(-)이면 예상보다 부진함을 의미한 다. 서프라이즈 지수는 국가별·지역별로 현재 경제 상황이 예상 대비 얼마나 좋은지 또는 나쁜지 파악하는 데 유용하며, 특히 지수가 상승 추세일수록 주식시장 등 위험자산에 긍 정적인 신호를 주고, 하락 추세이면 시장 상승의 탄력을 둔화시키는 등 증권 시장의 투자 심리에 미치는 영향이 큰 지수이다. 시티그룹, JP모건, Bloomberg 등에서 산출하는 ESI 가 널리 사용된다.',
  },
  '경제심리지수': {
    title: '경제심리지수',
    content: '경제심리지수란 한국은행이 기업가 또는 소비자들의 경제에 대한 인식을 조사하여 작성한 지표이며, 대표적으로 조사대상을 기업가로 하는 기업경기실사지수(BSI; Business Survey Index)와 소비자로 하는 소비자동향지수(CSI; Consumer Survey Index)가 있다. 또한 한 국은행은 BSI와 CSI를 합성하여 민간의 경제상황에 대한 인식을 종합적으로 평가할 수 있 는 경제심리지수(ESI; Economic Sentiment Index)도 작성·발표하고 있다. ESI는 BSI와 CSI 중 경기연관성이 높은 항목을 선정하여 이들의 표준화지수를 가중평균하는 등의 과정 을 거쳐 산출한다. ESI가 100을 넘으면 현재 민간의 경제심리가 과거 평균보다 낙관적임 을, 100 미만이면 과거 평균보다 비관적임을 각각 나타낸다. 이러한 심리지표들은 실물지 표와 대체로 높은 상관관계를 보이지만 때로는 미래정보 및 기대수준의 반영 여부, 질적 통 계와 양적 통계 간의 조사척도 차이 등에 따라 다소 괴리되는 움직임을 보이기도 한다.',
  },
  '경제전망보고서': {
    title: '경제전망보고서',
    content: '다양한 경제지표와 세계 경제 동향 등을 바탕으로 향후 경제 상황이 어떻게 전개될지를 분석하고 예측한 보고서를 말한다. 경제전망에는 보통 한 나라의 경제가 얼마나 성장할 지 예측하는 경제성장률 전망, 물가가 얼마나 오를지 분석하는 인플레이션 전망, 일자리 사정을 예측하는 고용 전망, 외환시장 변동성 및 환율을 살펴보는 환율 전망, 수출입 추세 와 무역수지를 예측하는 경상수지 전망 등이 포함된다. 경제주체들이 어떤 경제행위를 결 정할 때 경기판단과 예측의 정확성 여부에 따라 미래의 경제적 성과가 크게 달라질 수 있 으므로 경제전망은 중요하다. 가계는 경제전망에 따라 재화·서비스, 주택, 주식 등의 구 입 시기를 결정한다. 기업은 제품에 대한 수요 전망을 통해 생산량과 시설 투자 계획을 수립한다. 중앙은행은 경기 및 물가 전망을 바탕으로 경제성장과 물가안정을 이루기 위해 통화량 및 금리 운용계획을 결정하며, 정부 또한 경제전망에 기초하여 예산 편성, 재정지 출 등을 확정한다. 한국은행, IMF, OECD, 각종 민간경제연구소 등 국내외 여러 기관은 정기적으로 경제전망을 발표하고 있다.',
  },
  '경제협력개발기구(OECD)': {
    title: '경제협력개발기구(OECD)',
    content: '제2차 세계대전 직후 유럽경제 부흥 지원을 위해 설립되었던 유럽경제협력기구(OEEC)의 18개국과 미국, 캐나다 등 총 20개 선진국이 1961년 9월에 설립한 국제기구이다. 설립목 적은 회원국의 경제성장과 금융안정을 도모함으로써 세계 경제 발전에 기여하고, 세계 각 국의 건전한 경제성장을 촉진하는 한편, 다자주의와 무차별주의에 따라 세계무역 확대에 기여하는 것이다. 회원 가입은 최고의사결정기구인 이사회에서 회원국의 만장일치로 결 정한다. 1990년대 들어 신흥시장국 및 체제전환국에 문호를 개방하고, 2000년대에는 외 연 확대를 위해 적극 노력하면서 회원국 수는 총 38개국(2025년 6월 말 기준)으로 늘어났 다. OECD(Organization for Economic Co-operation and Development)는 이사회, 상임위원회 및 분야별 위원회, 사무국 외에도 각종 부속기구 및 특별기구로 구성되는데, 이사회는 회원국 각료가 참석하는 각료이사회, OECD 주재 회원국 대사가 참여하는 상주 대표이사회로 나뉜다. OECD의 활동은 주로 위원회 및 산하 작업반을 통해 이루어지는데, 경제성장과 안정, 국제무역, 개발원조, 금융, 다국적기업, 투자, 통계 등 다양한 분야에서 회원국 간 정책 경험을 공유하고 글로벌 현안에 대한 정책방안을 연구하는 한편 주요 사 안에 대한 규범 제정에도 큰 역할을 하고 있다. 우리나라는 1995년 가입신청서 제출 이후 가입조건에 대한 협의를 거쳐 1996년 12월에 가입하였다. 경제활동인구/비경제활동인구/경제활동참가율 만15세 이상 인구 중 일할 수 있는 능력과 취업의사를 동시에 갖춘 사람을 경제활동인구 라 한다. 경제활동인구는 현재 취업상태에 있는지에 따라 취업자와 실업자로 구분된다. 취업자란 매월 15일이 포함된 1주일 동안에 수입을 목적으로 1시간 이상 일한 사람과 본 인 또는 가족이 운영하는 농장이나 사업체에서 주당 18시간 이상 일한 무급가족종사자를 가리킨다. 그밖에 일정한 직장이나 사업장은 가지고 있으나 일시적인 질병, 일기불순, 휴 가, 노동쟁의 등의 사유로 조사기간에 일을 하지 않은 사람도 취업자로 분류된다. 실업자 란 적극적으로 일자리를 구해보았으나 일을 하지 못한 사람으로서 즉시 취업이 가능한 사 람을 말한다. 한편 15세 이상 인구 중 경제활동인구에 포함되지 않은 사람, 즉 조사대상 기간에 취업도 실업도 아닌 상태에 있는 사람은 비경제활동인구로 분류된다. 비경제활동 인구에는 집안에서 가사와 육아를 도맡아 하는 전업주부, 학교에 다니는 학생, 일을 할 수 없는 연로자와 심신장애자, 구직단념자 등이 포함된다. 경제활동참가율은 15세 이상 인 구에 대한 경제활동인구의 비율을 말한다. 경제활동참가율 = 경제활동인구(취업자 + 실업자) 15세 이상 인구 ×100',
  },
  '경제후생지표': {
    title: '경제후생지표',
    content: '복지지표로서 한계성을 갖는 국민총소득(GNI)을 보완하기 위해 미국의 노드하우스(W. Nordhaus)와 토빈(J. Tobin)이 제안한 새로운 지표를 말한다. 현재 주요 지표로 활용 중 인 국민총소득은 국민 복지에 영향을 미치는 많은 요인(주부의 가사노동, 여가, 공해 등)을 포괄하지 못하고 있어 국민 생활의 질적 수준 또는 복지수준을 정확히 반영하지 못하는 단점을 갖고 있다. 이를 감안하여 경제후생지표(MEW; Measure of Economic Welfare) 는 국민총소득에 후생요소를 추가하고, 비후생요소를 제외함으로써 복지수준을 정확히 반영하려는 취지로 제안되었다. 하지만 통계작성에 있어 후생 및 비후생 요소의 수량화가 쉽지 않아 널리 사용되지는 못하고 있는 실정이다.',
  },
  '경직적 물가지수': {
    title: '경직적 물가지수',
    content: '소비자물가지수를 구성하는 품목들은 가격이 경직적으로 움직이는 품목과 신축적으로 움 직이는 품목으로 나누어 볼 수 있는데, 그중 경직적으로 움직이는 품목들을 대상으로 만든 물가지수를 경직적 물가지수, 신축적으로 움직이는 품목을 대상으로 한 물가지수를 신축 적 물가지수라고 한다. 정부의 직·간접적인 영향을 크게 받는 공공서비스, 전기·수도, 담 배, 보육·급식 가격이나 개인서비스 요금 등은 대체로 가격이 쉽게 오르거나 내리지 않는 특징을 보이므로 경직적 물가를 구성하는 주요 품목이다. 이러한 경직적 물가의 변동은 장 기적인 인플레이션 흐름을 잘 반영하므로 향후 물가 기조를 예측하는데 유용한 지표이다.',
  },
  '계절변동조정시계열': {
    title: '계절변동조정시계열',
    content: '경제의 움직임은 주로 일, 주, 월, 분기 또는 연간 등 일정기간을 기준으로 통계를 수집하 여 파악하는데 이를 시계열이라 한다. 대부분의 경제분석은 시계열의 수준보다는 변동을 대상으로 한다. 시계열의 변동요인은 크게 추세, 순환, 계절 및 불규칙 요인의 네 가지로 구분할 수 있다. 특히 시계열에서 주기적으로 나타나는 기후나 명절 등과 같은 사회적 관 습은 매년 반복되는 특성이 있는데 이를 계절변동요인이라 한다. 이러한 계절변동을 고 려하지 않고 기간별로 시계열의 증감을 비교하면 오류가 있을 수 있다. 특히 전월 또는 전 분기 대비 증감은 계절변동을 조정하지 않고 계산하면 많은 왜곡이 있게 된다. 계절변동 조정시계열은 원래의 시계열에서 계절요인을 여러 통계적 기법을 이용하여 제거한 것을 말한다. 이때 일반적으로 예측 가능한 불규칙요인도 함께 제거한다. 한편 계절변동요인은 연간단위로 나타나므로 연간시계열에는 적용되지 않으며, 전년동기대비는 각 기간의 계 절변동요인이 같다고 판단하여 원래의 시계열을 이용한다.',
  },
  '계좌대체': {
    title: '계좌대체',
    content: '증권거래시 실물증권을 주고받는 대신 양자 모두 계좌를 가진 중앙예탁기관 내에서 계 좌간 이전하는 방식으로 장부상 처리하는 것을 말한다. 주식ㆍ채권 등 증권거래의 결과 매도자의 증권을 매수자에게 이전해야 한다. 그런데 증권의 이전을 위한 실물증권의 인 도 방식은 자본시장에서 이루어지는 증권의 대량거래와 잦은 소유자 변동 등을 감안하 면 사실상 불가능하다. 따라서 대부분의 국가에서는 중앙예탁기관의 계좌대체 방식으로 증권의 소유권을 이전하고 있으며 우리나라도 한국예탁결제원이 계좌간 대체 방식으로 증권 이전을 처리하고 있다.',
  },
  '고객확인절차(KYC)': {
    title: '고객확인절차(KYC)',
    content: '고객확인절차(KYC; Know Your Customer)는 테러자금조달 및 자금세탁 등 불법거래 차단을 위해 관계당국이 부여한 의무에 따라 고객의 신원을 식별하고 확인하는(verify) 업 무절차를 뜻한다.',
  },
  '고용률': {
    title: '고용률',
    content: '고용률은 통계청에서 매월 실시하고 있는 경제활동인구조사를 통해 집계된 15세 이상 인 구 중에서 취업자가 차지하는 비율을 말한다. 한편 실업률은 경제활동인구 중에서 실업 자가 차지하는 비율을 말한다. 고용률은 실업률 통계의 한계점을 해소할 수 있기 때문에 고용통계에서 중요한 개념이다. 즉, 고용통계에서 취업준비자와 구직단념자는 실질적인 의미에서 실업자이나 비경제활동인구로 분류됨에 따라 이들이 늘어나면 실업률은 낮아질 수 있어 체감 실업률과 차이를 느끼게 한다. 그러나 고용률은 15세 이상 인구를 기준으로 계산되기 때문에 실업자와 비경제활동인구간의 이동 등에 따른 경제활동인구수 변동으로 부터 영향을 받지 않는다는 장점이 있다. 다만 고용률도 근로시간이 18시간 미만인 단시간 근로자 및 일시휴직자 등 불완전취업자가 증가하는 경우에는 국민들이 체감하는 고용상 황과 차이를 보일 수 있다. 고용률(%) = 취업자 / 15세이상인구 × 100 실업률(%) = 실업자 / 경제활동인구 × 100',
  },
  '고용보조지표': {
    title: '고용보조지표',
    content: '국제노동기구(ILO)에서는 노동 공급과 수요가 일치하지 않아서 일하고 싶은 욕구가 있음 에도 불구하고 일을 하고 있지 못하는 노동력의 크기를 나타내는 고용보조지표를 새로이 확정(2013월 10월)한 바 있다. 우리나라 통계청에서도 기존의 공식 실업률만으로는 노동 시장을 제대로 반영하는데 한계가 있다고 판단하여 2014년 11월부터 새로운 고용보조지 표를 발표하고 있다. 고용보조지표는 실업률을 추계하기 위한 공식적인 실업자 이외에 아 르바이트 등 단기근로를 하지만 재취업을 원하는 사람(시간관련 추가취업 가능자), 최근 구직활동을 안했을 뿐 취업의사가 있고 취업 가능성이 있는 사람(잠재구직자), 그리고 구 직노력을 했으나 육아 등으로 당장 일을 시작하지 못하는 사람(잠재취업가능자) 등을 포함 한다. 여기서 비경제활동인구에 포함된 잠재 취업가능자와 잠재 구직자를 합하여 잠재경 제활동인구라고 하고, 이를 기존의 경제활동인구와 합산하여 확장경제활동인구라 한다. 현재 고용보조지표는 그 포괄범위에 따라 세 가지 형태로 작성하여 공표되고 있다. 고용보 조지표1은 경제활동인구 대비 기존의 취업자 중 시간관련 추가 취업가능자와 실업자의 비 율이며, 고용보조지표2는 실업자와 잠재경제활동인구의 합을 확장경제활동인구로 나누어 구한다. 한편 고용보조지표3은 확장경제활동인구 대비 시간관련 추가취업 가능자, 실업자 및 잠재경제활동인구를 더한 수치의 비율이다. 최근 발표되고 있는 고용보조지표를 보면 기존의 공식 실업률과 상당한 차이를 보이고 있는데, 이는 단시간 근로자가 많거나 취업을 희망하고 있지만 구직활동을 하지 않은 사람 등이 그만큼 많다는 것을 의미한다.',
  },
  '고용유발효과/취업유발효과': {
    title: '고용유발효과/취업유발효과',
    content: '노동유발효과는 소비, 투자, 수출 등 최종수요의 발생이 생산을 유발하고 생산이 다시 노 동수요를 유발하는 파급 메커니즘에 기초하여 최종수요와 노동유발을 연결시킴으로써 분 석한다. 이에 따라 노동유발효과는 노동계수와 산업연관표의 생산유발계수를 곱하여 산 출한 노동유발계수를 이용한다. 노동계수란 일정기간 동안 생산활동에 투입된 노동량을 총산출액으로 나눈 계수로서 한 단위(산출액 10억원)의 생산에 직접 필요한 노동량을 의 미하며, 노동량의 포괄범위에 따라 피용자(임금근로자)만 포함한 고용계수와 노동량에 피용자(임금근로자)와 자영업자 및 무급가족종사자를 모두 포함한 취업계수가 있다. 한편 노동유발계수는 노동계수와 생산유발계수를 기초로 산출됨에 따라 어느 품목부문의 생산 물 한 단위(산출액 10억원) 생산에 직접 필요한 노동량뿐만 아니라 생산파급과정에서 간 접적으로 필요한 노동량까지 포함하는 개념인 바, 노동계수에 고용계수를 이용하면 고용 유발계수, 취업계수를 이용하면 취업유발계수라 한다.',
  },
  '고정금리': {
    title: '고정금리',
    content: '고정금리란 최초 약정한 금리가 만기까지 그대로 유지되는 금리를 의미하며 변동금리 란 일정 주기별로 시장금리를 반영하여 약정금리가 변동하는 금리를 의미한다. 예를 들 어 만기 1년, 약정금리는 4%의 고정금리라면 약정기간 1년 동안 시장금리가 어떻게 변 하더라도 해당 약정금리는 4%이다. 반면 만기 1년, 변동주기 3개월, 약정금리는 CD금 리+0.5%(또는 50bp)의 변동금리라면 3개월에 한 번씩 변동된 CD금리에 연동하여 약 정금리가 변하게 된다. 예를 들어 CD금리가 최초 약정시 3.0%, 약정 3개월후 3.2%, 6 개월후 3.5%, 9개월후 4.0%라면 약정금리는 최초 약정시 3.5%, 약정 3개월후 3.7%, 6 개월후 4.0%, 9개월후 4.5%가 된다. 자금 차입자 입장에서는 앞으로 시장금리가 상승할 것으로 예상하는 경우에는 고정금리를 이용하는 것이 유리하고 시장금리가 하락할 것으 로 예상하는 경우에는 변동금리를 이용하는 것이 유리하다. 시장금리 상승 방향의 금리 변동에 따른 주택담보대출 차입자의 리스크를 완화하고 재무건전성을 유지하기 위해 정 부가 고정금리대출을 장려하는 것도 이런 이유 때문이다. 일반적으로 동일 만기에서는 고정금리가 변동금리보다 높은데 이는 자금 대여자(은행)에게 약정 기간중 금리 변동에 따른 위험 프리미엄이 존재하기 때문이다.',
  },
  '고정금리부채권(SB)': {
    title: '고정금리부채권(SB)',
    content: '고정금리부채권(Straight Bond)이란 정해진 기일에 고정된 이자를 지급하고 정해진 만기 에 원금을 지급하는 가장 일반적인 형태의 채권으로 전환사채(CB; Convertible Bond)의 주식전환권과 같이 특별한 조건이 없는 채권을 말한다. 회사채, 국채 등 대부분의 채권이 고정금리부로 발행된다. 이에 대비되는 채권으로 변동금리부채권(FRN; Floating Rate Note)이 있다. 이는 정해진 기일에 특정 금리(예: 국내에서는 3개월 CD금리, 해외에서는 무위험지표금리(RFR; Risk-Free Rate))에 연동된 금리를 지급하고 정해진 만기에 원금을 지급하는 채권이다. 고정금리부채권에 대한 투자는 향후 금리 하락이 예상될 때 유리하며 금리 상승이 예상될 때에는 변동금리부채권에 투자하는 것이 유리하다. 한편 인플레이션 이 심할 때 인플레이션을 헤지하기 위한 목적으로 발행되는 채권이 물가연동채권인데 이 는 원금과 이자가 물가상승률(주로 CPI 사용)에 연동하여 증가한다는 면에서 변동금리부 채권과 구별된다.',
  },
  '고정이하여신비율': {
    title: '고정이하여신비율',
    content: '은행은 보유하고 있는 여신을 자산건전성에 따라 5단계로 분류하여 관리하고 있다. 즉 자 산건전성이 가장 양호한 상태인 “정상”에서부터 회수가 어려운 정도에 따라 단계적으로 “요주의”, “고정”, “회수의문”, “추정손실”로 분류한다. 이중 고정, 회수의문, 및 추정손실 로 분류된 여신의 합계액을 총여신으로 나눈 비율을 고정이하여신비율이라고 한다. 「은행 업감독규정」별표 3에서는 분류단계별 정의를 규정하고 있는데, “고정”은 차주 채무상환 능력의 저하를 초래할 수 있는 요인이 현재화되어 채권회수에 상당한 위험이 발생한 여신 또는 3개월 이상 연체하거나 부도가 발생한 차주의 여신 중 담보처분에 의한 회수예상가 액 해당부분을 말한다. “회수의문”은 차주 채무상환능력이 현저히 악화되어 채권회수에 심각한 위험이 발생한 여신 및 3개월 이상 12개월 미만의 연체대출채권 보유 차주의 여 신 등의 회수예상가액 초과부분을 말한다. “추정손실”은 차주 채무상환능력의 심각한 악 화로 회수불능이 확실하여 손실처리가 불가피한 여신 및 12개월 이상 연체대출채권 보유 차주의 여신 등의 회수예상가액 초과부분을 말한다.',
  },
  '고정자본소모': {
    title: '고정자본소모',
    content: '생산활동에는 공장, 기계설비 등 고정자본(시설)이 필요한데 이들은 생산활동 과정에서 마모되기 마련이다. 이처럼 생산에 이용된 기계 등 자산의 가치 감소분을 고정자본소모 (Consumption of Fixed Capital)라고 한다. 따라서 일정 기간 중에 생산된 생산물의 순 수한 가치를 평가하기 위해서는 현재의 생산능력이 저하되지 않고 그대로 유지된 상태에 서 생산이 이루어지는 것으로 하여야 한다. 즉 고정자본소모만큼 조정하여야 한다. 순생산액 = 총생산액(= 산출액 - 중간투입액) - 고정자본소모 (순소득) (총소득) 자동차공장을 예를 들어보면 먼저 자동차를 만들기 위해서는 차체 등 각종 부품이 있어야 하며 또 각종 부품을 조립하는 기계가 있어야 한다. 자동차를 만들게 되면 부품도 소모되 지만, 조립기계도 닳게 된다. 여기에서 총생산액은 산출액에서 부품구입액 등 중간투입액 을 차감한 총부가가치를 말하고 순생산액은 총부가가치에서 고정자본소모를 뺀 순부가가 치이다. 그런데 고정자본소모는 현 수준의 생산활동을 지속하기 위하여 언젠가는 지출될 부분이므로 이 공장의 측면에서 보면 총생산보다는 본래의 기계 가치를 그대로 유지하면 서 새로이 생산해 낸 부가가치 즉 순생산이 더욱 의미가 있을 것이다.',
  },
  '고정환율제도/자유변동환율제도': {
    title: '고정환율제도/자유변동환율제도',
    content: '환율제도는 고정환율제도(Fixed Exchange Rate System)와 자유변동환율제도(Free Floating Exchange Rate System)를 양극단으로 하여 이를 절충하는 다양한 형태로 분 류될 수 있다. 고정환율제도는 환율을 정부나 중앙은행이 적정하다고 판단하는 수준으로 일정하게 유지하는 제도이다. 반면 자유변동환율제도는 환율이 외환의 수요와 공급에 의 해 자율적으로 결정되도록 하는 환율제도를 말한다. 고정환율제도는 환율 변동에 따른 충 격을 완화하고 거시경제정책의 자율성을 어느 정도 확보할 수 있다는 장점이 있으나 이 를 위해서는 자본이동의 제약이 불가피하여 결과적으로 외화유동성이 부족해질 가능성 이 있다. 이 경우 대외불균형이 지속되거나 기초경제여건이 악화되면 환투기공격에 쉽게 노출되는 단점이 있다. 반면 자유변동환율제도에서는 자본이동이 자유롭게 이루어지므로 외화유동성 확보가 용이하고 외부충격이 환율 변동에 의해 흡수됨으로써 거시경제정책 의 자율적 수행이 수월한 장점이 있다. 다만 외환시장 규모가 작고 외부충격의 흡수 능력 이 부족한 신흥국은 환율 변동성의 확대가 경제의 교란 요인으로 작용할 가능성이 크다. 한편 어떤 환율제도를 채택하더라도 ① 통화정책의 자율성 ② 자유로운 자본이동 ③ 환 율 안정 등 세 가지 정책목표를 동시에 달성하기는 현실적으로 어려운데, 이를 삼불원칙 (impossible trinity 또는 trilemma)이라고 한다.',
  },
  '고통지수': {
    title: '고통지수',
    content: '소비자물가상승률과 실업률을 더한 값으로 1975년 미국의 경제학자 오쿤(A. Okun)이 국민의 삶에 실업률과 물가상승률이 큰 영향을 준다는 점에 착안하여 만든 국민의 삶의 질을 측정하기 위한 지표이다. 이 수치가 높을수록 실업자는 늘고 물가는 높아져 한 나 라의 국민이 느끼는 삶의 고통이 늘어남을 의미한다. 그러나 고통지수(Misery Index)를 절대적인 것으로 생각해 나라 간에 단순 비교하기는 어려운 측면이 있는데 이는 나라별 로 소비자물가상승률과 실업률을 계산하는 기준이 다르고 빈부격차나 조사대상에 따라 서도 느끼는 고통의 정도가 상이할 수 있기 때문이다. 한편 고통지수가 발표된 이후 이를 보완한 다양한 지표들이 개발되고 있는데, 1999년 미국 하버드대 배로(R. Barro)교수는 오쿤의 고통지수에 국민소득증가율과 이자율을 감안한 ‘배로고통지수’(BMI; Barro Misery Index)를 발표한 바 있다.',
  },
  '골디락스경제': {
    title: '골디락스경제',
    content: '골디락스경제(Goldilocks Economy)는 경기과열에 따른 인플레이션과 경기침체에 따 른 실업을 염려할 필요가 없는 최적 상태에 있는 건실한 경제를 가리킨다. 이는 영국의 전 래동화인 골디락스와 곰 세 마리(Goldilocks and the three bears)에 등장하는 금발머 리 소녀의 이름에서 유래하였다. 동화에 따르면 엄마 곰이 끓인 뜨거운 수프를 큰 접시와 중간 접시 그리고 작은 접시에 담은 후 가족이 이를 식히기 위해 산책을 나갔는데, 이 때 집에 들어온 골디락스가 아기 곰 접시에 담긴 너무 뜨겁지도 않고 너무 차지도 않은 적당 한 온도의 수프를 먹고 기뻐하는 상태를 경제에 비유한 것이라 한다. 즉 경기과열이나 불 황으로 인한 높은 수준의 인플레이션이나 실업률을 경험하지 않는 양호한 상태가 지속되 는 경제를 지칭한다.',
  },
  '공개시장운영': {
    title: '공개시장운영',
    content: '공개시장운영(Open Market Operation)은 중앙은행이 금융시장에서 금융기관을 상대로 증권을 매매하여 시중유동성이나 시장금리 수준에 영향을 미치는 통화정책수단이다. 공 개시장운영은 다른 통화정책수단(지급준비제도, 여수신제도 등)에 비해 시기와 규모를 신 축적으로 정할 수 있고 금융시장의 가격메커니즘에 따라 이루어지므로 시장친화적인 데다 즉각적인 매매거래만으로 신속하게 정책을 시행할 수 있다는 장점이 있어 대부분의 선진 국 중앙은행들은 공개시장운영을 주된 통화정책수단으로 사용하고 있다. 우리나라의 경우 한국은행이 공개시장운영을 통해 금융기관의 지급준비금(지준) 보유 규모를 변동시킴으로 써 콜금리가 기준금리에서 크게 벗어나지 않도록 조정한다. 즉 금융기관의 지준 부족(보유 지준 ＜ 필요지준)으로 콜머니가 증가하고 콜금리 상승압력이 증대될 경우 한국은행은 RP 매입 등을 통해 지준을 공급하여 콜금리의 상승을 제한하며, 반대로 지준 잉여(보유지준 ＞ 필요지준)로 콜론이 증가하고 콜금리 하락압력이 증대될 경우에는 RP매각, 통화안정증권 발행, 통화안정계정 예치 등을 통해 잉여 지준을 흡수하여 콜금리의 하락을 제한한다.',
  },
  '공공재': {
    title: '공공재',
    content: '공공재는 모든 개인이 공동으로 이용할 수 있는 재화 또는 서비스를 의미한다. 국방·경 찰·소방·공원·도로 등과 같이 정부에 의해서만 공급할 수 있는 것이라든가 또는 정부에 의해서 공급되는 것이 바람직하다고 사회적으로 판단되는 재화 또는 서비스가 이에 해당 한다. 공공재에는 보통 시장가격은 존재하지 않으며 수익자부담 원칙도 적용되지 않는다. 따라서 공공재 규모의 결정은 정치기구에 맡길 수밖에 없다. 공공재의 성질로는 어떤 사 람의 소비가 다른 사람의 소비를 방해하지 않고 여러 사람이 동시에 편익을 받을 수 있는 비경쟁성·비선택성, 대가를 지급하지 않은 특정 개인을 소비에서 제외하지 않는 비배제성 등을 들 수 있다.',
  },
  '공급병목': {
    title: '공급병목',
    content: '제품이나 서비스가 생산자로부터 소비자에게 전달되는 특정 단계에서 목이 좁은 병 입구 처럼 원활한 흐름이 이루어지지 않아 전체 공급망이 지연되거나 막히는 현상을 말한다. 공급 과정에서 중간에 한 부분이 막히면 아무리 다른 단계가 정상적이어도 전체 흐름이 느려지거나 정지하게 된다. 예를 들어 반도체와 같은 부품이 부족하면 자동차, 전자제품 을 비롯한 많은 생산공정이 차질을 빚는다. 항만 적체, 컨테이너 부족 등으로 물류가 지연 되거나 코로나19, 우크라이나 전쟁 등으로 글로벌 공급망이 붕괴되면 생산 및 유통과정 에 병목이 발생한다. 이처럼 공급병목이 생기면 관련된 물품의 공급 부족으로 물가가 상 승하고, 제조업체의 생산 계획에 영향을 미치며, 배송 지연 등으로 소비자의 불편을 초래 하고 나아가 경제 전반의 성장세가 둔화되어 경기가 나빠지게 된다.',
  },
  '공급사용표(SUT)': {
    title: '공급사용표(SUT)',
    content: '산업연관표는 투입산출표(Input-Output Tables)와 공급사용표(Supply and Use Tables)로 구성되는데, 투입산출표는 상품을 기준으로, 공급사용표는 산업을 기준으로 생산내역을 나타낸 표이다. 투입산출표는 상품을 기준으로 하기 때문에 하나의 산업에 서 한 상품만을 생산한다고 가정하고 있어 경제 현실이 제대로 반영되지 못하는 문제점 을 갖고 있는 반면, 공급사용표는 경제 현실이 잘 반영될 뿐만 아니라 국민소득통계, 국 민대차대조표 등 국민경제 통계들 간의 정합성 유지에도 중요한 역할을 한다. 공급사용 표는 공급표(Supply Table)와 사용표(Use Table)로 구성된다. 공급표의 세로 방향은 각 산업에서 어떤 상품이 얼마만큼 생산(또는 공급)되는가를 기록하여 산업별 상품의 생산 구조를 알려준다. 가로 방향은 각 상품이 어느 산업에서 얼마만큼 생산되어 공급되는가를 표시하여 상품의 산업별 공급구조를 나타내고 있다. 한편 사용표의 세로방향은 각 산업의 생산활동에 투입되는 중간재와 부가가치를 기록하고 있으며, 가로 방향은 공급된 상품이 각 산업별 중간수요 또는 소비, 고정자본형성, 재고증감, 수출 등 최종수요로 사용된 내역 을 나타낸다.',
  },
  '공급탄력성': {
    title: '공급탄력성',
    content: '공급탄력성은 가격변화에 대한 공급의 민감도를 측정하는 척도이다. 공급탄력성은 공급 량의 변화율을 가격의 변화율로 나누어 측정한다(공급량의 변화율÷가격의 변화율). 만일 1%의 가격 상승이 1%보다 더 큰 공급량 증가를 가져오면 공급은 탄력적이라 하며, 1%의 가격 상승이 1%보다 더 적은 공급량 증가를 가져오면 공급은 비탄력적이라 한다. 공급량 변화율과 가격변화율이 같다면 공급탄력성은 1이고, 공급은 단위 탄력적이라 한다. 또한, 어떤 재화의 공급량이 가격변동에 전혀 영향을 받지 않는다면 공급의 가격탄력성은 영(0) 이고, 이 재화의 공급은 완전 비탄력적이라 하며 이 재화의 공급곡선은 수직선의 형태를 보인다. 반대로 한 재화의 공급곡선이 수평선일 때 이 재화의 공급은 완전 탄력적이며 공 급탄력성은 무한대(∞)가 된다. 공급탄력성은 가격의 상승과 하락에 맞춰 공급량을 조절 하는 생산자의 능력에 따라 달라진다.',
  },
  '공동부유': {
    title: '공동부유',
    content: '공동부유(共同富裕, Common Prosperity)는 시진핑 중국 국가주석이 2021년 이후 강조 한 주요 정책 방향 중 하나로서 소수만 부유해지는 것이 아니라 사회 전체가 균형 있게 번 영하고 부를 나누어 모든 국민이 함께 잘사는 사회를 만들자는 것을 의미한다. 즉 독과점 기업의 불공정 거래행위 시정, 기업의 사회 기부 독려, 부동산세 도입 등을 통해 부의 불균 형을 해소하고 국민 전체의 삶의 질 향상을 도모하려는 정책이다. 공동부유가 핵심정책으 로 등장한 배경으로는 중국경제가 개혁·개방 이후 고도성장을 달성하는 데 성공하였으나 경제적 불평등이 심화되어 체제 정당성과 안정을 위협하는 수준에 이른 점을 들 수 있다.',
  },
  '공매도': {
    title: '공매도',
    content: '공매도(Short Selling)는 주식시장에서 투자자가 주식을 보유하지 않은 상태에서 주가 하 락을 예상하고 금융기관으로부터 주식을 빌려 먼저 매도한 후, 주가가 하락하면 시장에서 주식을 매입하여 되갚은 후 차익을 얻는 투자를 말한다. 예를 들어 투자자가 A주식을 빌려 주당 15,000원에 팔고 며칠후 그 주식이 12,000원으로 하락하였다면 12,000원에 주식을 매입하여 빌린 A주식을 되갚으면 주당 3,000원의 수익을 얻는다. 주가가 하락할 경우에는 수익을 얻지만, 예상과 달리 주가가 상승할 경우에는 큰 손실을 볼 수 있다는 점에서 공매 도 투자는 매우 신중히 접근해야 한다. 특히 공매도는 주식시장이 약세장이 되었을 때 이득 을 볼 수 있지만 전체 거래가 이런 분위기에 편승해 공매도에 쏠릴 경우 주식시장이 한 순 간에 폭락하는 등 주식시장의 변동성을 확대시키는 측면이 있기 때문에 각국에서는 공매 도에 대해 많은 규제를 하고 있다. 우리나라도 주식시장 안정을 위해 2008년 금융위기 직 후, 2011년 유럽 재정위기시 및 2020년 코로나19 확산시 공매도를 전면 금지한 바 있으 며, 2023년 11월에는 제도 개선 등을 목적으로 공매도를 전면 금지하기도 하였다.',
  },
  '관리변동환율제도': {
    title: '관리변동환율제도',
    content: '환율이 장기적으로 외환시장의 수급 상황에 따라 결정되도록 하지만, 단기적으로는 정부와 중앙은행이 적정하다고 판단하는 수준에서 환율을 안정시키기 위해 수시로 외환시장에 개 입하여 환율 수준을 관리하는 환율제도이다. 고정환율제도와 자유변동환율제도의 장점을 살린 중간 형태라 할 수 있다. 환율을 완전히 시장 자율에 맡기게 되면 환투기 차익 등을 노 린 단기자본의 급격한 유출입으로 인해 환율과 외환시장이 불안정해질 수 있는바, 이러한 위험을 감소시키는 데 그 목적이 있다. 1970년대 브레튼우즈체제가 무너진 이후 대체로 주요 선진국들은 자유변동환율제도를 채택하고 외환시장 발전이 미흡한 신흥국들은 관리 변동환율제도(Managed Floating Exchange Rate System)를 채택하는 경향을 보였다.',
  },
  '관리통화제도': {
    title: '관리통화제도',
    content: '관리통화제도는 금본위제도와는 달리 중앙은행이 통화량을 직접 조절하여 경제를 안정시 키는 제도이다. 금본위제도에서는 국가가 보유한 금의 양에 따라 통화 발행이 제한되며, 통화의 가치는 금에 의해 보장되었다. 한편 관리통화제도에서는 중앙은행이 금과 같은 실 물자산의 보유 규모와 관계없이 물가안정, 경기 조절, 환율 관리 등을 목적으로 통화 공급 을 유연하게 조절한다. 이때 중앙은행은 기준금리 조정, 공개시장운영, 지급준비율 변경 등 주요 정책수단 등을 통해 인플레이션을 억제하거나 경기를 조절한다. 20세기 중반 이 후 대부분의 국가들은 관리통화제도로 전환하였으며, 이에 따라 각국의 중앙은행은 통화 정책을 통해 경제운영에 있어 핵심적인 역할을 담당하고 있다.',
  },
  '광의통화(M2)': {
    title: '광의통화(M2)',
    content: '광의통화(M2)는 경제 내에 유통되는 화폐규모를 측정하는 통화지표의 하나로서, 지급결 제기능을 중시하여 작성하는 협의통화(M1) 외에도 약간의 이자소득 손실을 감수한다면 언제든지 인출이 가능한 가치저장기능이 있는 금융상품까지 포함된다. 만기 2년 이내의 정기예금, 정기적금, 금융채, 수익증권 등 단기간 내 현금화가 가능한 금융상품이 이에 해 당한다. M2는 중장기적인 통화량 흐름과 금융시장의 유동성 상황을 파악하는 데 활용되 며, 중앙은행의 통화정책 수립에도 중요한 기준이 된다. 일반적으로 M2가 증가하면 시중에 돈이 많이 풀렸다는 의미로 해석되며, 이는 물가 상승 압력이나 경기과열 가능성과도 연 결된다. M2는 협의통화보다 유동성은 낮지만, 실제 경제에서 통화량을 측정할 때 가장 널 리 사용되는 지표다.',
  },
  '교환사채(EB)': {
    title: '교환사채(EB)',
    content: '교환사채(EB; Exchangeable Bond)란 사채권자의 의사에 따라 교환사채 발행기업이 보 유하고 있는 타사 주식 등 여타의 유가증권과 교환할 수 있는 선택권이 부여된 사채를 말한다. 발행하는 채권에 주식이 연계되어 있다는 점에서 발행회사의 신주를 일정한 조건 으로 매수할 수 있는 신주인수권부사채(BW; Bonds with Warrant)나, 발행회사의 주식 으로 전환할 수 있는 권리가 부여된 전환사채(CB; Convertible Bond) 등과 함께 주식연 계증권으로 불린다. 발행회사가 보유하는 교환대상 유가증권은 상장유가증권으로 제한되 고 있으며 증권예탁원에 의무적으로 예탁되어야 한다. 발행회사는 낮은 이자율로 사채를 발행하여 금융비용 부담을 덜 수 있어 회사채 발행을 통한 기업자금조달을 촉진할 수 있 는 장점이 있다. 반면에 투자자의 입장에서도 비교적 안정적인 데다 미래의 주식가격 상 승에 따른 시세차익을 기대할 수 있음에 따라 유리한 투자수단이 된다. 교환이 이루어질 때 발행기업의 자산과 부채가 동시에 감소한다. 신규자금 유입이 없다는 점에서 신주인 수권부사채(BW)와는 다르고 신주발행에 따른 자본금의 증가가 없다는 점에서 전환사채 (CB)와도 다르다.',
  },
  '교환성 통화': {
    title: '교환성 통화',
    content: '국제적인 통용력을 가진 특정 국가의 통화를 말한다. 현재는 외환시장에서 미국의 달러화와 자유로이 교환 가능한 통화라는 의미로 사용되고 있다. 국제통화기금(IMF)에서는 IMF 협 정 제8조에 따라 회원국은 자국 통화에 교환성을 부여할 의무를 부여받고 있다. 이 조항 에 따라 자국 통화의 교환성을 유지하는 국가를 ‘IMF 8조국’이라 하는데, 이들 국가의 통 화를 교환성 통화(Convertible Currency)로 볼 수 있다. 그러나 좁은 의미로는 SDR 가치 산정에 사용되는 바스켓 통화의 요건에 자유사용가능성(freely usable criterion)이 포함 되어 있어서 현재 SDR 바스켓을 구성하고 있는 미 달러화, 유로화, 파운드화, 엔화 및 위 안화를 교환성 통화로 볼 수 있다.',
  },
  '구독경제': {
    title: '구독경제',
    content: '소비자가 제품이나 서비스를 소유하지 않은 채 일정한 금액을 주기적으로 지불하면서 사 용하는 경제 모델을 말한다. 즉, 사는 것이 아니라 빌려 쓰고 구독하는 것에 초점을 둔 소비 방식이다. 월간 또는 연간 등 정기 결제로 제품 또는 서비스를 이용하면서 소유 대신 사용 권한을 얻게 된다. 소비자의 입장에서는 구독경제가 초기 비용 부담이 적고 다양한 서비스를 체험할 수 있다는 점에서 유리하다. 다만 장기적으로 비용이 누적될 수 있고, 구 독 해지를 놓쳐 불필요한 지출이 생기기도 한다. 공급자의 입장에서는 사용자의 취향, 소 비 습관에 맞춰 적절한 정보를 제공하여 고객을 꾸준히 유지함으로써 장기 고객을 확보하 는 것이 비즈니스의 핵심이 된다.',
  },
  '구매력평가 환율': {
    title: '구매력평가 환율',
    content: '구매력평가(PPP; Purchasing Power Parity) 환율은 해당 통화의 실질 구매력을 기준으 로 평가한 환율이다. 이는 관련 당사국 간 물가수준(또는 물가상승률) 차이 즉, 당사국 화 폐 간 실질구매력(가치)의 차이에 의해 균형 환율이 결정된다는 구매력평가이론에 근거 하고 있다. 예를 들어 스타벅스 커피의 가격이 우리나라에서 5,000원이고 미국에서 5달 러라면 원/달러 환율은 1,000원이어야 한다는 것이다. 대표적 구매력평가환율로는 각국 의 맥도날드 햄버거 가격을 비교해 환율을 산출하는 ‘빅맥지수’를 들 수 있다. PPP 환율 은 국가 간 화폐의 교환비율이라기보다는 자국화폐의 실질구매력을 나타내게 되는데, 국 가 간 물가수준 차이를 고려하여 GDP 등의 통계를 국가 간에 비교하는 데 흔히 사용된다. OECD, UN, IMF 등 국제기구에서 작성하고 있다.',
  },
  '구인배수': {
    title: '구인배수',
    content: '노동의 수요와 공급 상황을 나타내는 지표로서 일자리수를 취업 희망자수로 나누어 구하 는데 인력수급동향을 파악하는데 주로 이용된다. 예를 들어 구인배수 0.7은 취업 희망자 열 명당 일곱 개의 일자리가 있다는 의미로 수치가 높을수록 고용사정이 좋다는 것을 의 미 한다. 우리나라의 경우 1986년부터 작성하여 왔다. 외환위기 이전에는 구인배수가 1 을 웃돌아 일자리가 남는 경우도 있었지만, 그 이후에는 대개의 경우 구인배수가 1에 못 미치는 것이 일반적이어서 최근의 고용사정이 과거에 비해 좋지 않다는 것으로 해석된다.',
  },
  '국가경쟁력': {
    title: '국가경쟁력',
    content: '국가경쟁력은 한 나라가 경제성장을 지속하고, 국민들의 삶의 질을 향상시킬 수 있는 능 력을 말한다. 대표적인 국가경쟁력 지표로 스위스 국제경영개발원(IMD)에서 발표하는 세 계경쟁력순위(WCR; World Competitiveness Ranking)가 있다. 국제경영개발원은 기 업 활동을 효율적으로 가능하게 하는 제도적ㆍ경제적 조건을 갖추고 있느냐를 국가경쟁 력의 핵심으로 보고 주요 통계지표와 기업인 및 연구원 대상 설문조사 결과를 종합하여 세계 70여개 국가의 경쟁력을 평가한다. 세계경쟁력순위는 경제 운용 성과, 정부의 효율 성, 기업의 경영 효율성, 사회간접자본 등 4개 부문으로 구성되어 있다.',
  },
  '국가신용등급': {
    title: '국가신용등급',
    content: '한 나라가 채무를 이행할 능력과 의사가 얼마나 있는지를 평가하여 등급으로 표시한 것으 로 국제금융시장에서 차입금리나 투자여건을 판단하는 기준이 된다. 미국의 스탠더드& 푸어스(S&P), 무디스(Moody’s), 영국의 피치(Fitch) 등 국제신용평가기관은 해당국의 정 치체제의 안정성, 국가안보상의 위험 등 정치적인 요소와 경제성장률, 외채 규모, 대외 채 무불이행 경험 등 경제적인 요소를 종합적으로 고려하여 국가신용등급을 평가한다. 국가 신용등급(Sovereign Credit Rating)은 정부채무의 표시통화에 따라 외화표시 채무등급과 국내통화표시 채무등급으로, 만기구성에 따라 단기채무등급과 장기채무등급으로 각각 구 분된다. 또한, 신용도에 따라 크게 투자등급과 투기등급으로 구분되는데, 투기등급에 해당 하는 신용도를 가진 국가에 대한 투자는 그만큼 위험하다고 할 수 있다. 한편 국가신용등 급은 해당국 내의 기업이나 금융기관의 개별 신용등급을 결정하는 하나의 기준이 된다. 따 라서 국가신용등급이 상향조정되면 해당국의 정부는 물론 기업, 금융기관 등이 더 낮은 가 산금리(위험 프리미엄)로 외화자금을 조달할 수 있어 외화차입 비용을 크게 줄일 수 있다.',
  },
  '국가채무': {
    title: '국가채무',
    content: '국가채무란 정부가 재정적자 보전 등을 목적으로 국내외로부터 자금을 차입함으로써 발 생하는 채무를 말한다. 국가채무는 한 번 누적되면 새로운 재정적자가 발생하지 않더라도 기존채무에 대한 이자지급 부담으로 채무가 계속 늘어나는 자기증식의 속성을 가지고 있 다. 또한 기대인플레이션이나 시장금리를 상승시키는 부작용이 있을 수 있다. 이에 따라 각국은 안정적인 자금조달 및 국채시장 유지, 자금조달의 비용최소화 등 재정의 지속가능 성 유지를 위해 국가채무를 적절히 분석·관리하고 있다. 국가채무를 분석할 경우에는 주 로 명목GDP대비 비율을 사용하며 채무의 보유주체, 만기구조 등 채무의 질적 구성을 고 려하기도 한다.',
  },
  '국고금 실시간 전자이체': {
    title: '국고금 실시간 전자이체',
    content: '국고금 실시간 전자이체란 정부가 지급할 국고금이 실시간으로 각 채권자의 예금계좌로 바로 입금되게 하는 것을 말한다. 정부의 통합재정정보시스템(dBrain+, 구 NAFIS)과 한 국은행 및 금융기관의 전산시스템을 연결해 2003년 1월부터 시행되었다. 일반 국민이나 기업들은 정부에 물품이나 용역을 제공한 후 그 대금으로 국고수표를 받는 대신 자신이 거래하는 금융기관의 계좌로 받기 때문에 예전처럼 정부 또는 지자체를 찾아가 국고수표 를 받아 이를 금융기관에 다시 입금하는 수고를 덜게 되었다. 특히 이 시스템이 도입되면 서 정부는 별도로 국고수표를 발행할 필요성이 없어 국고금 관리 행정업무의 효율화는 물 론 국고수표 인쇄비용도 절감할 수 있게 되었다.',
  },
  '국고대리점': {
    title: '국고대리점',
    content: '국가의 경제활동도 민간의 경제활동과 마찬가지로 금전 수수를 수반하게 되는데 이와 같 은 경제활동에 수반되는 일체의 현금을 통상 국고금이라 한다. 우리나라에서는 국고금의 출납사무를 중앙은행인 한국은행이 담당하고 있다. 그러나 한국은행의 한정된 조직과 인 력만으로는 전국의 국고금 납부자에게 충분한 편의를 제공하기 어렵기 때문에 한국은행 은 금융기관과의 계약을 통해 금융기관 영업점을 국고 대리점으로 지정하여 국고금 수납 사무를 위탁하고 있다. 국고대리점은 국고수납대리점과 국고금수납점으로 구분하는데 기 능상 차이는 없으며 계약방식의 차이에 의해서 구분된다. 국고수납대리점은 은행 영업점 및 신용협동기구의 중앙회가 이에 해당되며 국고금수납점은 신용협동기구의 중앙회 등이 산하 회원조합(금고)에 국고금 수납사무를 재위탁한 영업점을 말한다. 2025년 6월말 현재 국고대리점은 총 16,467개(국고수납대리점 5,647개, 국고금수납점 10,820개)가 있다.',
  },
  '국고수표': {
    title: '국고수표',
    content: '국고수표는 지출관이 국고금 지출을 위하여 발행하는 수표로 과거 국고금의 기본지급수 단이었으나 2003년 1월 1일 「국고금관리법」의 시행으로 국고금 실시간 전자이체제도가 실시됨으로써 국고금 지급방식이 국고수표 사용방식에서 수취인의 예금계좌로 바로 입금 되도록 변경된 이후 사용하지 않고 있다. 다만 금융기관의 전산장애 등과 같은 비상시를 위해 폐지하지 않고 있다.',
  },
  '국고전산망': {
    title: '국고전산망',
    content: '2003년 1월 한국은행이 국고업무를 전자적으로 처리하기 위하여 구축한 전산망을 국고 전산망이라고 말하며 정부(디지털예산·회계시스템(dBrain+)), 한국은행, 금융기관(우정 사업본부 포함) 및 금융결제원의 전산시스템을 서버접속 방식으로 연결한다. 국고전산망 을 이용하여 취급하는 업무는 OLTP(On-line Real Time Transaction Processing) 방식 으로 처리하는 실시간 전자이체업무와 FTP(File Transfer Protocol) 방식으로 처리하는 파일 송수신업무가 있다. 국고전산망 참가대상 기관은 기획재정부, 한국은행과 국고수납 대리점계약을 체결한 금융기관 및 한국은행 이외의 국고금수납기관(체신관서, 금융결제 원)으로 한정하고 있다. 국고전산망 운영시간은 오전 9시부터 오후 4시까지이다.',
  },
  '국내공급물가지수': {
    title: '국내공급물가지수',
    content: '국내공급물가지수는 생산자물가지수와 수입물가지수를 결합하여 국내시장에 공급되는 상품 및 서비스의 종합적인 가격 수준을 지수화한 것이다. 국내공급물가지수는 생산단계별, 즉 원재료, 중간재 및 최종재로 지수가 구분되기 때문에 물가변동의 파급과정을 파악하는 데 용이하다. 현재 우리나라뿐만 아니라 미국, 일본, 캐나다 등 주요 선진국에서도 국내공 급물가지수에 해당하는 통계를 작성하고 있다.',
  },
  '국내총투자율': {
    title: '국내총투자율',
    content: '국내총투자율(Gross Domestic Investment Ratio)은 국민경제가 구매한 재화 중에서 자 산의 증가로 나타난 부분이 국민총처분가능소득에서 차지하는 비율을 의미한다. 국민경 제 내에서 자산의 증가에 쓰인 모든 재화는 고정자산과 재고자산으로 구분되는데 전자를 국내총고정자본형성 또는 고정투자, 후자를 재고증감 또는 재고투자라 하며 이들의 합계 를 총자본형성 또는 국내총투자라고 부른다. 따라서 국내총투자율은 국민총처분가능소득 에 대한 총자본형성의 비율이다.',
  },
  '국민계정체계(SNA)': {
    title: '국민계정체계(SNA)',
    content: '국민계정은 국민경제의 순환과 변동을 체계적으로 기록한 사회회계로서 경제활동을 거 래형태별 및 거래에 참가하는 경제주체별로 파악하여 복식부기 방식으로 기록한 것이다. 즉, 국민경제의 순환에 따른 변동을 각각의 거래형태와 거래주체 간의 상호연관 하에서 체계적으로 작성한 것이다. 국민계정체계(SNA; System of National Accounts)는 기존 의 산업연관표, 국민소득통계, 자금순환표, 국제수지표 등 별개로 파악하고 있던 국민계 정관련 통계를 통합, 각종 경제분석에 적합하도록 거래형태 및 거래주체를 경제활동의 동 질성에 따라 몇 가지 부문으로 나누어 체계적으로 작성한 것이다. 국민계정체계는 재화와 서비스의 생산 활동을 보여주는 생산계정, 소득의 분배와 사용을 나타내는 소득계정, 비 금융자산의 취득과 처분 등을 기록하는 자본계정, 금융 자산 및 부채의 취득과 처분을 기 록하는 금융계정, 거주자와 비거주자 간 거래를 기록하는 국외계정, 일정시점에서 경제전 체의 자산과 부채 현황을 보여주는 대차대조표계정 등의 기본 체계로 구성된다.',
  },
  '국민대차대조표': {
    title: '국민대차대조표',
    content: '국민대차대조표(National Balance Sheet)는 특정 시점에서 국민경제 또는 비금융법인기 업, 금융법인기업, 일반정부, 가계 및 비영리단체, 국외 등 각 경제주체가 보유하고 있는 유·무형 실물자산 및 금융자산/부채의 가액과, 자산에서 부채를 차감한 순자산을 기록한 스톡통계이다. 즉, 국민대차대조표는 경제주체별로 처분가능한 금융 및 비금융자산의 가 액 등 재산상태를 나타내며 그중 순자산(net wealth)은 해당 경제주체의 재산상태를 집약 한 정보라 할 수 있다. 특히 국민경제 전체의 순자산은 흔히 국부(national wealth)라 불 리며 국내경제가 보유한 비금융자산의 현재가액과 국외부문에 대한 순금융자산청구권의 합계와 동일하다. 국민대차대조표에 기록되는 자산 항목은 크게 비금융자산과 금융자산/ 금융부채로 구성된다. 비금융자산의 경우 생산과정을 통해 산출된 것이냐의 여부에 따라 생산자산과 비생산자산으로 나누어지고, 비금융비생산자산에는 생산과정을 거치지 않고 자연적으로 존재하는 토지, 지하자원, 입목 등이 포함된다. 한편, 국민대차대조표는 기초 대차대조표, 기말대차대조표 및 대차대조표 증감계정으로 구성되어 있어 각 경제주체의 재산이 기간 중에 어떠한 요인에 의해 변동하였는지를 몇 가지로 분해하여 보여주는 표로 서 SNA 내에서 소득창출 과정 등을 기록한 플로계정과 자산의 축적상태를 기록한 스톡계 정을 통합하는 기능을 수행한다. 2014년에 국민대차대조표를 신규 편제함으로써 우리나 라는 SNA(System of National Accounts) 이행의 최상위인 6단계를 달성하게 되었고 완 전한 국민계정체계를 구현하게 되었다.',
  },
  '국민부담률': {
    title: '국민부담률',
    content: '국민부담률(total tax revenue as percentage of GDP)이란 조세와 사회보장기여금이 명목 국내총생산(GDP)에서 차지하는 비중(조세부담률+사회보장부담률)을 말한다. 이는 조세를 명목GDP로 나눈 조세부담률과 국민이 부담하는 사회보장기여금을 명목GDP로 나눈 사회보장부담률을 합친 개념이다. 따라서 조세부담률보다 포괄적으로 국민부담 수 준을 측정하는 지표이다. 조세부담률이 국민의 조세부담을 나타내는 대표적 지표이기는 하나 국민들이 강제적으로 납부해야 하는 연금 및 사회보험의 부담은 나타내지 못한다는 한계가 있다. 이러한 점을 감안하여 OECD는 미래에 보장급부를 받을 수 있는 권한을 부 여하는 모든 강제적인 납부액 즉, 사회보장기여금(social security contributions)을 일 종의 조세로 분류하여 국민부담률을 산출하고 있다. 국민들은 강제성이라는 특성 때문에 국민연금, 건강보험, 고용보험 등의 사회보장기여금을 세금과 비슷하게 인식하는 경향이 강하므로 국민부담률이 실제 국민들이 체감하는 부담 수준을 더 정확히 나타낸다고 볼 수 있다.',
  },
  '국민소득': {
    title: '국민소득',
    content: '국민소득(NI; National Income)은 한 나라 국민이 제공한 생산요소에서 발생한 소득의 총액, 즉 노동에 대한 대가인 피용자보수와 자본 및 경영에 대한 대가인 영업잉여의 합계 로서 고정자본소모와 순생산 및 수입세는 포함되지 않는다. 즉 한 나라 국민이 벌어들인 순수한 소득을 나타내는 지표로서 다음과 같이 산출한다. 국민소득(NI) = 국민총소득 - 고정자본소모 - 생산 및 수입세 + 보조금 = 국민순소득 - 생산 및 수입세 + 보조금 = 국민순소득 - 순생산 및 수입세 = 피용자보수 + 영업잉여 = 임금 + 지대 + 이자 + 이윤',
  },
  '국민소득 3면 등가의 법칙': {
    title: '국민소득 3면 등가의 법칙',
    content: '국내총생산(GDP)은 생산, 지출, 분배의 세 측면에서 측정할 수 있으며 이론적으로 각 측 면에서 측정된 값은 차이가 없게 된다. 이는 가계, 기업, 정부, 국외 등 경제주체에 의해 재 화와 서비스가 생산되고 구입되며 분배되기 때문인데 이를 국민소득 3면 등가의 원칙이 라고 한다. 한 나라 내에서 일정 기간 동안 생산된 재화와 서비스는 가계의 소비와 기업 의 투자 그리고 정부와 해외 부문의 지출을 통해 모두 구입된다. 이때 국가경제 생산물의 총가치를 생산GDP라 하며 경제주체들이 구입하여 사용한 생산물의 총가치를 지출GDP 라고 한다. 한 나라에서 생산된 생산물은 각 경제주체들에 의해 모두 구입되어 사용되므 로 생산GDP와 지출GDP의 크기는 같게 된다. 그리고 생산활동에 사용된 생산요소에 대 하여 지불하는 대가를 분배GDP라고 하는데 생산활동을 통해 창출된 부가가치는 노동, 자본 등 생산요소를 제공한 경제주체들에게 모두 분배되므로 생산GDP와 분배GDP는 같 게 된다. 즉 생산GDP = 지출GDP = 분배GDP의 관계가 성립한다.',
  },
  '국민연금': {
    title: '국민연금',
    content: '일정기간 동안 보험료를 납부하면 노후에 연금을 지급받아 기본적인 생활을 보장받을 수 있도록 설계된 공적 연금 제도이다. 현재 우리나라는 국민연금공단이 운영 주체가 되어 만 18세 이상 ~ 60세 미만의 대한민국 국민을 대상으로 매달 소득의 일정 비율을 납부 받고 있으며, 일정 연령에 도달해야 연금을 수령할 수 있다. 국민연금으로 받을 수 있는 급여로는 노후 생활비로 지급되는 노령연금, 불의의 사고나 질병으로 장애가 생겼을 때 지급되는 장애연금, 가입자가 사망할 경우 유족에게 지급되는 유족연금 등이 있다. 국민 연금은 고령화 사회에서 은퇴 이후 소득이 줄어드는 사람들을 위한 안정적 소득원으로 개 인연금, 퇴직연금과 함께 노후 대비의 핵심축이 된다. 다만 출산율 저하와 고령화로 인해 국민연금 기금이 고갈될 수 있다는 우려가 높아지면서 수급 개시 연령 상향, 보험료 인상 등의 필요성이 대두되고 있다.',
  },
  '국민처분가능소득(NDI)/국민총처분가능소득(GNDI)': {
    title: '국민처분가능소득(NDI)/국민총처분가능소득(GNDI)',
    content: '국민처분가능소득(NDI; National Disposable Income)은 나라 경제 전체가 소비나 저 축으로 자유로이 처분할 수 있는 소득으로서 거주자와 비거주자 간의 소득이전이 반영된 것이다. 국민처분가능소득은 국민순소득(NNI; Net National Income)에 교포송금 등과 같이 생산활동과는 관계없이 외국으로부터 받은 소득(국외수취경상이전)을 더하고 무상 원조 등 외국에 지급한 소득(국외지급경상이전)을 차감하여 산출한다. 한편 국민처분가능소득에 고정자본소모를 더한 것을 국민총처분가능소득(GNDI; Gross National Disposable Income)이라고 하는데 소비와 저축을 국민총처분가능소득으로 나누어 구한 값을 각각 평균소비성향, 평균저축성향이라고 한다. 국민총처분가능소득은 총저축률과 총투자율을 산출하는데도 이용된다. 국민처분가능소득(NDI) = 국민순소득* + 국외순수취경상이전** * 국외순수취 영업이익 및 재산소득이 반영된 피용자보수 및 영업이익 + 순생산 및 수입세 ** 교포송금 등과 같이 생산활동과는 관계없이 외국으로부터 받은 소득(국외수취경상이전)에서 무상원조 등으로 외국에 지급한 소득(국외지급경상이전)을 뺀 금액 국민총처분가능소득(GNDI) = 국민처분가능소득 + 고정자본소모 = 최종소비지출 + 총저축',
  },
  '국민총소득(GNI)': {
    title: '국민총소득(GNI)',
    content: '국민총소득(GNI; Gross National Income)은 한 나라의 국민이 일정 기간 동안 벌어들인 임금, 이자, 배당 등의 소득을 모두 합친 것이다. 국가 간에는 재화와 서비스는 물론 노동 이나 자본과 같은 생산요소도 활발하게 거래되고 있다. 한 나라의 기업이 다른 나라 사람 을 고용하여 생산을 하기도 하고 반대로 그 나라 국민이 다른 나라에 나가 생산활동에 참여 하기도 한다. 여기서 생산요소의 국가 간 이동을 고려하여 거주성 측면, 즉 한 나라의 국민 을 기준으로 소득을 측정한 것이 국민총소득이다. 국민총소득(명목기준)은 GDP(명목기준) 에다 한 나라의 국민(거주자)이 다른 나라에서 벌어들인 소득(국외수취요소소득)을 더하고, 다른 나라 국민(비거주자)이 그 나라에서 벌어들인 소득(국외지급요소소득)을 뺀 금액이다. 다시 말해서 국민총소득(명목기준)은 GDP에 국외순수취요소소득을 더하여 산출된다. 다 만 실질기준 국민총소득은 실질구매력을 반영하기 위하여 실질GDP에다 국외순수취요소 소득뿐만 아니라 교역조건 변화에 따른 실질무역손익까지 고려하여 산출한다. 국민총소득 에서 고정자본소모를 제외하면 국민순소득(NNI; Net National Income)이 된다.',
  },
  '국외순수취경상이전': {
    title: '국외순수취경상이전',
    content: '국외순수취경상이전은 거주자와 비거주자 간에 반대급부 없이 일어나는 이전거래로 국외 수취경상이전에서 국외지급경상이전을 차감하여 구하며 거래주체에 따라 민간이전과 공 공이전으로 구분할 수 있다. 국외수취경상이전은 민간이전수입과 공공이전수입으로 나눌 수 있는데 민간이전수입은 국외에서 장기간(1년 이상) 일하고 있는 근로자나 교포의 국내 송금 등이 포함되며 공공이전수입에는 조세 및 공과, 군사 및 기술원조금 등이 포함된다. 국외지급경상이전 역시 민간이전지급과 공공이전지급으로 나눌 수 있으며 민간이전수입 과 공공이전수입의 반대 방향 거래이다.',
  },
  '국외순수취요소소득': {
    title: '국외순수취요소소득',
    content: '국외순수취요소소득은 한 나라의 국민이 국외에서 노동, 자본 등의 생산요소를 제공한 대 가로 받은 국외수취요소소득에서 국내의 외국인이 생산활동에 참여함으로써 발생한 국외 지급요소소득을 차감한 것으로 국외순수취 기업 및 재산 소득과 피용자보수를 더하여 구 한다. 국외순수취요소소득은 국내에서의 모든 경제주체가 생산활동에 참여한 결과 발생 한 국내총생산(GDP)과 한 나라의 국민이 생산활동에 참여한 결과인 국민총소득(GNI)의 차이이다.',
  },
  '국외저축': {
    title: '국외저축',
    content: '개별 경제주체가 모자라는 돈을 다른 사람으로부터 조달하는 것과 마찬가지로 국민경제 에서도 투자가 저축을 초과하게 되면 부족한 돈을 국외로부터 조달하게 되는데 이를 국외 저축(foreign savings)이라고 한다. 국외저축이 양(+)인 것은 경상수지 적자에 대응되며 경상수지 적자는 순대외채무(=대외채무-대외채권)의 증가로 보전된다.',
  },
  '국외투자율': {
    title: '국외투자율',
    content: '국외투자율은 국민총처분가능소득(GNDI; Gross National Disposable Income) 중 총 저축에서 국내투자를 차감한 부분이 차지하는 비율을 의미한다. 한 나라 국민 전체가 소비하거나 저축할 수 있는 소득을 국민총처분가능소득(GNDI; Gross National Disposable Income)이라고 하는데, 이는 국민총소득(GNI; Gross National Income)에 국외순수취경상이전을 더한 것이다. 여기서 국외순수취경상이전이 란 교포송금 등과 같이 생산활동과는 관계없이 외국으로부터 받은 소득(국외수취경상이 전)에서 무상원조 등으로 외국에 지급한 소득(국외지급경상이전)을 뺀 금액이다. GNDI에서 최종소비지출을 빼면 총저축을 얻을 수 있다. 이러한 총저축은 투자를 위한 자금으로 이용된다. 투자는 국내투자와 국외투자로 나눌 수 있는데, 총저축이 국내투자보 다 많아 외국에 자금을 투자하는 경우 국외투자가 플러스(+) 값을 가진다. 반대로 총저축 으로 국내투자를 충당할 수 없어서 외국으로부터 자금을 차입하면 국외투자가 마이너스 (-) 값을 갖게 된다. 한편 국내투자, 총저축을 GNDI로 나누어 백분율로 구한 값을 각각 국내총투자율, 총저축 률이라고 하는데, 국내총투자율과 국외투자율을 합한 값을 총투자율이라고 하며, 총투자 율은 총저축률과 같은 값이 된다. GNDI = 최종소비지출 + 총저축 총투자율(%) = 국내총투자율(%) + 국외투자율(%) 국내총투자율(%) = (국내총투자/GNDI) × 100 국외투자율(%) = (국외투자/GNDI) × 100',
  },
  '국제결제은행(BIS)': {
    title: '국제결제은행(BIS)',
    content: 'BIS(BIS; Bank for International Settlements)는 1930년 헤이그협정을 모체로 설립된 세계에서 가장 오래된 국제금융기구로서 중앙은행 간 정책협력을 주요기능으로 하고 있 으며 현재 60개 중앙은행이 회원으로 참여하고 있다. BIS는 중앙은행 간 협력체로서의 기 능 수행에 중점을 두고 있으나 국제금융거래의 원활화를 위한 편의 제공, 국제결제업무와 관련한 수탁자 및 대리인으로서의 역할도 수행하고 있다. BIS는 최고의사결정기구인 총 회, 운영을 담당하는 이사회, 일반업무를 관장하는 집행부로 구성되어 있으며 중앙은행 간 정보교환기능 제고를 위해 총재회의, 특별회의, 각종 산하 위원회 회의 등을 수시로 개 최하고 있다. 또한, 아시아지역과 아메리카지역 중앙은행과의 관계를 증진하기 위하여 홍 콩 및 멕시코에 지역사무소를 개설하였다. 한국은행은 1975년 연차총회에 옵서버 자격으 로 참석한 이래 국제통화협력을 위해 노력한 결과 1997년 1월 14일 정식회원으로 가입 하였다.',
  },
  '국제금융시장': {
    title: '국제금융시장',
    content: '국제금융시장이란 국경을 넘어 자금의 수요와 공급을 연결해 주는 시장 또는 모든 거래 메커니즘을 말하며 두 가지 의미로 사용된다. 첫째, 구체적인 장소의 개념으로 런던, 뉴 욕, 도쿄 등 주요 국제금융의 중심지나 그 지역에서 운용되는 증권거래소 또는 선물옵션 거래소 등을 말한다. 둘째, 추상적 개념으로 국제자금의 수요와 공급을 연결해 주는 모 든 거래의 형태를 말한다. 외환시장(foreign exchange market), 단기 금융시장(money market), 중장기 금융시장(capital market), 주식시장(equity market) 및 파생금융상품 시장(financial derivatives market) 등을 포괄한다.',
  },
  '국제금융중심지': {
    title: '국제금융중심지',
    content: '특정 국가나 지역이 국제금융시장으로 기능하기 위해서는 자국 통화의 국제통용성, 상대 적으로 우월한 기초경제력, 고도로 발달된 금융시장과 다양한 장단기 금융수단의 자유로 운 거래, 전 세계시장 정보의 신속 저렴한 공급, 세계적인 상품 및 서비스거래의 중심지 등의 요건을 두루 갖추어야 한다. 국제금융중심지는 이러한 국제금융시장의 요건을 갖추 고 있어 세계적 금융기관들이 본점, 지점, 현지법인의 형태로 영업망을 집중시킴으로써 대량의 국제금융거래가 지속적, 반복적으로 이루어지는 장소를 말한다. 대표적인 국제금 융중심지로는 뉴욕, 런던, 동경 등이 있다. 한편 역외 국제금융중심지는 주로 비거주자로 부터 자금을 조달하여 비거주자를 대상으로 운영되는 금융중개시장으로, 조세 및 금융규 제 면에서 특혜를 부여하여 인위적으로 창설한 금융 중심지이다. 홍콩, 싱가포르, 룩셈부 르크 등이 대표적이다.',
  },
  '국제산업연관표': {
    title: '국제산업연관표',
    content: '국제산업연관표(International Input-Output Tables)란 국가 간 수출입을 매개로 여러 나라의 산업연관표를 연결하여 하나의 산업연관표로 작성한 것이다. 국제산업연관표에 서는 한 나라 산업의 생산기술구조 및 배분구조를 국내 산업간 상호 연관관계뿐만 아니라 다른 나라 산업과의 연관관계까지 포함하여 나타내고 있으므로 생산기술의 국제비교 및 국가 간 상호의존관계 분석 등에 널리 이용된다. OECD에서 ICIO(Inter-Country Input-Output Table), EU에서 WIOT(World Input- Output Table), ADB에서 MRIO(Multi-Regional Input-Output Table) 등 다양한 국제 산업연관표를 작성하여 글로벌 가치사슬 분석(GVC) 등에 활용하고 있으며, 한국은행에 서는 일본 아시아경제연구소(IDE; Institute of Developing Economies)와 공동으로 한 국, 일본, 중국, 미국 등 아시아·태평양권 10개국 산업연관표를 연결한 아시아 국제산업 연관표를 작성한 바 있다.',
  },
  '국제수지(BOP)': {
    title: '국제수지(BOP)',
    content: '일정 기간 동안 한 나라의 거주자와 비거주자 간에 발생한 경제적 거래에 수반되는 수입 과 지급의 차이를 의미한다. 국제수지(BOP; Balance Of Payments)는 크게 경상수지, 자본수지, 금융계정, 오차 및 누락 등 4개의 계정으로 구성되어 있다. 경상수지는 ① 상품 수출입의 결과인 상품수지, ② 운송, 여행, 건설 등 서비스거래의 결과인 서비스수지, ③ 급료 및 임금, 투자소득 등 본원소득수지, ④ 무상원조, 증여성 송금 등의 결과인 이전소 득수지로 구분된다. 자본수지는 자산 소유권의 무상이전, 채권자에 의한 채무면제 등 자 본이전과 브랜드네임 등 비생산·비금융자산의 취득 및 처분의 결과로 계상된다. 금융계정 은 직접투자, 증권투자, 파생금융상품, 기타투자 및 준비자산으로 구분된다. 오차 및 누락 은 경상수지 및 자본수지의 합계와 금융계정 금액이 같지 않을 경우 이를 조정하기 위한 항목으로 국제수지 작성에 이용되는 기초통계간 계상시점, 평가방법상의 차이 등에 기인 한다.',
  },
  '국제수지표': {
    title: '국제수지표',
    content: '일정 기간 동안 한 나라의 거주자와 비거주자 간에 발생한 경제적 거래를 국제기준에 따 라 체계적으로 기록한 표이다. 이는 국제수지표가 어느 한 시점에서의 대차상황을 기록한 잔액(stock) 통계가 아니라 일정 기간 중에 발생한 거래를 집계한 플로(flow) 통계임을 의 미한다. 거주자와 비거주자의 구분은 경제주체가 어디에 살고 있으며 국적이 어디인지 하 는 지리적 영역이나 법률상의 국적보다는 경제활동에 있어 주된 경제적 이익의 중심이 어 디에 있느냐를 기준으로 한다. 거래유형은 모든 경제적 거래를 대상으로 하는데 상품, 서 비스, 소득, 자본 및 금융거래뿐만 아니라 대외원조 등 대가 없이 이루어지는 이전거래도 포함한다. 우리나라는 한국은행에서 국제수지표를 매월 작성하여 공표하고 있다.',
  },
  '국제원유가격': {
    title: '국제원유가격',
    content: '원유는 전세계적으로 수백 종이 거래되고 있다. 이중 국제원유시장의 대표 유종은 미 국 서부텍사스유(WTI; West Texas Intermediate), 영국 브렌트유 및 아랍에미레이트 (UAE) 두바이유의 세 가지이다. WTI는 북미, 브렌트유는 유럽 및 아프리카, 두바이유는 중동을 각각 대표하는 기준유가를 정하는 유종으로 사용되고 있다. 국제원유가격은 1980 년대 중반까지는 석유수출국기구(OPEC; Organization of the Petroleum Exporting Countries)의 발표가격을 기준으로 사용하였다. 그러나 석유파동 등으로 인한 국제원유 가격의 변동성을 회피하기 위해 선물거래가 활성화되면서 선물가격이 실질적인 현물유가 의 기준역할을 하게 되었다. 우리나라에서는 수입 비중이 높은 두바이유의 가격이 원유도 입단가에 큰 영향을 미친다. 국제석유시장에서는 선물시장 거래량이 가장 많고 광범위한 지역으로 수출되는 브렌트유의 가격이 가장 높은 대표성을 갖고 있다. 국제원유가격은 장 기적으로 원유 수요와 공급에 의해 결정되나 원유 공급지의 지정학적 리스크와 기상, 미 달러화 가치, 주요국 석유재고의 변동 등 많은 요인의 영향을 받는다.',
  },
  '국제증권감독기구(IOSCO)': {
    title: '국제증권감독기구(IOSCO)',
    content: '국제증권감독기구(IOSCO; International Organization of Securities Commissions) 는 전 세계의 증권 규제기관들이 모인 국제적인 기구로서 130여개 국가가 회원국으로 참 여하고 있다. 증권 시장의 안전성과 공정성을 보장하고, 투자자 보호를 위해 국제적인 규 제 기준을 마련하는 것을 목표로 하고 있으며 전 세계 증권시장의 95% 이상이 IOSCO가 제정한 기준을 따르고 있다. IOSCO는 1983년 아메리카 대륙의 11개 증권감독기구들의 연합체로 출발하였는데, IOSCO의 ‘증권규제의 목적과 원칙’(Objectives and Principles of Securities Regulation)은 G20와 국제금융기구(IMF), 세계은행(World Bank) 등에서 도 핵심 기준으로 받아들여지고 있다. 한편 우리나라는 금융감독당국인 금융위원회와 금 융감독원이 참여하고 있다.',
  },
  '국제통화시장(IMM)': {
    title: '국제통화시장(IMM)',
    content: '국제통화시장(IMM; International Monetary Market)은 1972년 미국 시카고상업거래 소(CME) 내에 설립된 세계 최초의 통화선물 전문거래소이다. 환율 변동성에 대응해 기업 과 투자자에게 환위험 관리 수단을 제공하기 위해 만들어졌으며, 달러, 유로, 엔, 파운드 등 주요 국제통화의 선물 및 옵션 상품이 거래된다. 거래단위와 만기, 결제일 등이 표준화 되어 있으며 만기는 주로 3월, 6월, 9월 및 12월의 셋째 수요일이다. IMM의 통화선물 거 래는 국제 외환시장의 흐름과 투자 심리를 반영하며, 글로벌 금융시장에 중요한 신호를 제공한다. IMM 포지션(순매수·순매도 잔고 등)은 투자자들의 환율 전망과 위험회피 성향 을 파악하는 데 활용되고 있다. 또한 IMM은 통화선물 거래의 표준과 글로벌 벤치마크 역 할을 하며, 전 세계 주요 거래소의 통화선물 시장 도입을 유도하는 선도적 역할을 해왔다.',
  },
  '국제투자대조표(IIP)': {
    title: '국제투자대조표(IIP)',
    content: '국제투자대조표(IIP; International Investment Position)는 일정 시점 현재 한 나라 거 주자의 비거주자에 대한 금융자산(대외투자) 및 금융부채(외국인투자) 잔액을 기록한 통 계표로서 국제수지의 금융계정(직접투자, 증권투자, 파생금융상품, 기타투자, 준비자산) 과 포괄범위가 동일하다. 일정 시점의 대외금융자산/부채 잔액은 거래일 이후 환율이나 주가변동 등으로 인한 가치평가분이 포함되어 있기 때문에 금융계정의 거래 누계액과 차 이가 있을 수 있다. 한편 국제투자대조표의 대외금융자산/부채에서 지분성투자(직접투자 내 지분투자, 증권투자 내 지분증권, 기타투자 내 기타지분)와 파생금융상품을 제외할 경 우 대외채권·채무 통계와 개념적으로 일치한다. 국제투자대조표는 한국은행에서 매분기 작성하여 발표하고 있다.',
  },
  '국제회계기준': {
    title: '국제회계기준',
    content: '국제회계기준(IFRS; International Financial Reporting Standards)은 기업의 회계 처리와 재무제표에 대한 국제적 정합성을 높이기 위해서 국제회계기준위원회(IASB; International Accounting Standards Board)가 제정한 회계처리기준을 말한다. 자본시 장 개방 등 전세계의 글로벌화 진전 등으로 국제적으로 통일된 회계기준의 필요성이 증가 한 데다, 특히 2002년 발생한 엔론, 월드콤 등의 회계부정사건을 계기로 국제적으로 회계 투명성에 대한 요구도 커짐에 따라 국제회계기준이 마련되었다. 국제회계기준의 핵심원 칙으로는 ① 원칙중심의 기준회계 ② 연결재무제표 중심 보고 ③ 공정가치 평가 ④ 경제적 실질에 기초한 회계처리 등을 들 수 있다. 회계기준 단일화 추세에 따라 전 세계 100여 개 국가에서 사용 중이며 우리나라도 국내 회계 투명성에 대한 국제적 신뢰도 저하가 자본 시장에 부정적인 영향을 미칠 수 있다는 우려에서 2007년 3월 「국제회계기준(IFRS) 도입 로드맵」을 발표하였으며 이후 희망기업은 2009년부터, 상장회사는 2011년부터 전면 도 입되었다. 2024년 4월에는 손익의 원천을 명시하여 성과정보의 비교가능성을 높이는 방 향으로 재무제표의 표시 방식을 변경하는 IFRS 18이 신규 제정되어 2027년부터 전면 적 용될 예정이다.',
  },
  '국채선물': {
    title: '국채선물',
    content: '국채선물이란 국가가 발행하는 채권을 기초자산으로 하는 선물거래를 의미한다. 국채시장 규모가 확대되고 2000년 7월부터 채권시가평가제도가 시행되면서 채권 투자자에게 가격 변동 위험을 관리할 수 있는 수단을 제공하면서 국채의 거래를 활성화하기 위해 1999년 9 월에 3년 만기 국채선물시장이 개설되었다. 이후 중기채권 시장 및 장기채권 시장에 대한 위험관리 수단을 제공하기 위해서 2003년 8월에 5년 만기 국채선물이 상장되었고, 2008 년 2월에는 10년 만기 국채선물이 상장되었으며, 2024년 2월에는 초장기 국채 발행량 증 가에 따른 헤지 수요 및 시장의 다양한 투자 환경 구축을 위해 30년 국채선물이 상장되었 다. 현재 한국거래소에는 3년, 5년, 10년, 30년 만기 국채선물이 거래되고 있다. 국채선물 의 주문접수, 거래체결 및 통보과정은 전자거래방식에 의해 자동적으로 수행되고 있다. 미 국 시카고상업거래소(CME; Chicago Mercantile Exchange)와 같이 특정 장소(trading pit)에서 거래 참가자들이 모여 육성 또는 수신호로 체결하는 공개호가 방식을 취하는 경 우도 있으나 세계적으로 점차 전자거래 방식이 증가하는 추세를 보이고 있다.',
  },
  '규제 샌드박스': {
    title: '규제 샌드박스',
    content: '규제 샌드박스(Regulatory Sandbox)는 핀테크 기업이 현행 규제를 적용받지 않으면서 자신의 혁신적인 금융상품과 비즈니스모델을 시험할 수 있는 공간이나 제도를 뜻한다. 이 용어는 어린이들이 안전하고 자유롭게 놀 수 있는 놀이터의 모래구역 즉 ‘sandbox’를 연 상시킨다. 즉 규제 샌드박스에 참여하는 소비자에게는 안전장치를 두고, 혁신적인 기업가 에게는 규제를 면제하거나 완화함으로써, 핀테크 기업의 새로운 도전과 시험을 활성화하 려는 규제기관의 정책의지 또는 참여한 기업·소비자의 혁신적인 활동모습을 연상시킨다. 이는 영국의 금융감독기구인 금융행위규제청(FCA)이 핀테크 전담조직(Innovation Hub) 을 설치하고 지속적으로 관련 산업을 지원하기 위해 규제 개선의 필요성을 검토하는 가운 데 규제 개선을 위한 여러 방안들 중의 하나로 도입한 것이다. 규제 샌드박스의 장점은 ① 혁신적인 아이디어가 시장(market)에 접근할 수 있는 시간과 비용을 줄이고 ② 혁신기업 의 자금조달을 쉽게 해주며 ③ 더 많은 혁신적인 상품이 시험되고 시장에 도입될 수 있을 뿐만 아니라 ④ 규제기관이 미리 새로운 상품 및 서비스에 대한 적절한 소비자보호 안전 장치를 확보할 수 있다는 점이다.',
  },
  '그램-리치-블라일리법': {
    title: '그램-리치-블라일리법',
    content: '1999년 11월 미국 의회가 제정한 법으로서 공식 명칭은 「금융서비스현대화법(The Financial Services Modernization Act of 1999)」이다. 공화당 상원의원인 필 그램 (Phil Gramm), 공화당 하원의원인 짐 리치(Jim Leach)와 토마스 J. 블라일리(Thomas J. Bliley)가 공동으로 발의하였기 때문에 통상 「그램-리치-블라일리법(Gramm-Leach- Bliley Act)」이라 불린다. 동 법의 주된 내용은 1933년의 글래스-스티걸법 중 ‘상업은행의 증권 관련 자회사 보유 금지’와 ‘상업은행과 투자은행의 임직원 겸직 금지’ 등 핵심 조항 을 폐지하는 것이다. 종전의 글래스-스티걸법 ‘조항20’에 의하면 상업은행(연준 가입은 행)은 증권의 인수와 거래를 주된 업무로 하는 자회사를 둘 수 없었으나, 그램-리치-블라 일리법 제정으로 글래스-스티걸법 ‘조항20’은 전면 폐지되었다. 동 법은 금융산업의 경쟁 력 강화를 명분으로 내세운 클린턴 행정부의 정책기조와 금융소비자의 편익증진 등을 구 실로 삼은 월스트리트 상업은행들의 로비력이 맞물려 탄생되었다. 동 법 제정으로 미국에 서 금융자유화의 시대가 열린 가운데 대형 상업은행들이 투자은행 업무에 뛰어들면서 경 쟁이 심화되었고 이로 인해 기존 투자은행 중 일부가 무리한 투자를 일삼다가 위기에 빠 진 것이 글로벌 금융위기의 단초가 된 것으로 평가되고 있다.',
  },
  '그린본드': {
    title: '그린본드',
    content: '그린본드는 조달 자금을 기후 및 환경 관련 사업에 사용하는 것을 전제로 발행되는 특수 목적 채권이다. 특징은 조달 자금의 사용처(use of proceeds)에 있고 발행자가 그린본드 원칙(GBP; Green Bond Principle)에 따라 채권을 발행하는 경우 재량으로 이름을 지을 수 있다. 그린본드는 채권의 구조에 따라 ① 그린사업 채권 ② 그린사업 수익 채권 ③ 그 린 프로젝트 채권 ④ 그린 유동화 채권으로 분류된다. 그린본드는 2007년 최초 발행(6억 유로)된 이후 초기에는 주로 EIB, World Bank 등 국제기구가 글로벌 환경보호, 균형성장 등과 관련해 발행을 주도하였으나 최근에는 정부기관, 기업 및 금융기관 등으로 발행기관 의 범위가 확대되어 가파른 성장세를 시현하고 있다. 그린본드의 발행자는 자본비용, 기 업홍보, 사업추진 용이성 측면에서 편익을 누릴 수 있다. 그린본드는 사회적 책임 투자 기 회를 제공하는 한편 여타 채권과 발행방식 및 구조가 동일하여 기존 채권 포트폴리오에 쉽게 융화가 가능한 장점이 있다. 국제자본시장협회(ICMA)가 그린본드 원칙(GBP)의 운 영 및 관리를 담당하고 있다.',
  },
  '그림자금융/비은행금융중개(NBFI)': {
    title: '그림자금융/비은행금융중개(NBFI)',
    content: '집합투자기구(MMF·채권형·혼합형 펀드 등), RP 거래, 유동화기구 등과 같이 은행시스템 밖에서 신용중개기능을 수행하지만 은행 수준의 건전성 규제와 예금자보호가 적용되지 않는 기관 또는 활동을 이르는 용어이다. 그림자금융(Shadow Banking)은 은행의 전통적 인 자금중개기능을 보완하는 한편 금융업의 경쟁을 촉진함으로써 효율적인 신용 배분에 기여하는 순기능을 발휘한다. 그러나 글로벌 금융위기 과정에서 느슨한 규제 하에 과도한 리스크 및 레버리지 축적, 은행시스템과의 직·간접적 연계성 등을 통해 시스템 리스크를 촉발·확산시킨 원인 중 하나로 지목되기도 하였다. 이에 따라 금융안정위원회(FSB), 바젤 은행감독위원회(BCBS) 등 국제금융감독기준 제정기구를 중심으로 그림자금융에 대한 모 니터링 체계 구축 및 규제개혁 논의가 진행되어왔다. 한편 FSB는 그림자금융의 순기능 등 을 고려하여 2018년 10월부터 “그림자금융(Shadow Banking)”이라는 용어를 보다 중립 적인 의미가 담긴 “비은행금융중개(Non-Bank Financial Intermediation)”로 변경하여 사용하고 있다.',
  },
  '근원인플레이션율': {
    title: '근원인플레이션율',
    content: '근원인플레이션율(Core Inflation Rate)은 물가변동을 초래하는 여러 요인들 가운데 일 시적인 공급충격의 영향을 제외한 기조적인 물가상승률을 말한다. 일반적으로 전체 소비 자물가 상승률에서 농산물가격, 국제원자재가격 등의 변동 부분을 제거하여 계산한다. 우 리나라는 근원인플레이션 지표로 농산물 및 석유류제외지수를 작성해 왔으며, 2010년 기 준 지수부터 OECD 방식에 의한 식료품 및 에너지제외지수를 추가로 작성하고 있다. 근 원인플레이션율은 물가에 미치는 단기적 충격이나 불규칙 요인이 제외되어 기조적인 물 가상승의 흐름을 포착할 수 있다는 장점을 갖고 있는 반면 일반 국민이 실제 느끼는 체감 물가와 괴리될 가능성을 내포하고 있다.',
  },
  '글래스-스티걸법': {
    title: '글래스-스티걸법',
    content: '미국 의회가 제정한 법으로 공식 명칭은 「1933년 은행법(Banking Act of 1933)」이다. 민주당 상원의원 카터 글래스(Carter Glass)와 민주당 하원의원 헨리 B. 스티걸(Henry B. Steagall)이 공동으로 제안하였기 때문에 통상 「글래스-스티걸법(Glass-Steagall Act)」이라 불린다. 은행들의 고객 자산을 이용한 방만한 투자행위가 1929년의 주가폭락과 그에 이은 금융위기 및 대공황의 원인 중 하나로 지목됨에 따라 ‘은행개혁’과 ‘투기규제’를 목적으로 동 법이 제정되었다. 동 법의 핵심 내용은 기존 은행을 상업은행과 투자은행으로 구분하 고 이들의 업무를 엄격하게 분리하려는 것이다. 이에 따라 상업은행은 증권의 발행 및 인 수가 금지되고 증권 관련 자회사 보유도 금지되었으며, 투자은행은 일반인으로부터 예금 을 받을 수 없고, 상업은행과 투자은행간에 임직원의 겸직이 금지되었다. 또한 동 법을 통 해 연방예금보험공사(FDIC; Federal Deposit Insurance Corp.)를 설립하여 연방예금 보험제도를 도입하고 금융에 대한 연방준비제도의 통제를 강화하였으며 연방공개시장위 원회(FOMC)를 설치하였다. 동 법 시행 이후 미국에서는 상업은행과 투자은행의 영역이 엄격히 분리되어 골드만삭스·모건스탠리·메릴린치 등은 투자은행으로, JP모건·뱅크오브 아메리카·시티뱅크 등은 대형 상업은행으로 성장하였다. 동 법에 대해서는 경쟁을 제한하 여 금융산업의 비효율성을 초래하였다는 부정적 평가와 수십 년에 걸친 미국 금융시스템 의 안정에 기여하였다는 긍정적 평가가 공존하고 있다. 1999년 11월 금융산업 경쟁력 강 화를 명분으로 내세운 클린턴 행정부의 정책기조와 월스트리트 상업은행들의 로비력이 맞물리면서 ‘상업은행의 증권 관련 자회사 보유’ 및 ‘상업은행과 투자은행의 임직원 겸직’ 허용을 주요 내용으로 하는 그램-리치-블라일리법(Gramm-Leach-Bliley Act)이 제정됨 으로써 글래스-스티걸법의 핵심 조항은 폐지되었다.',
  },
  '글로벌 가치사슬(GVC)': {
    title: '글로벌 가치사슬(GVC)',
    content: '글로벌 가치사슬(GVC; Global Value Chain)은 상품의 설계, 부품과 원재료의 조달, 생 산, 유통, 판매에 이르기까지 각 세분화된 과정이 어느 한 국가가 아닌 비용면에서 우위가 있는 국가에서 이루어지면서 각 단계별로 부가가치가 창출되는 세계교역의 패러다임을 말한다. 많은 수출기업들이 비용절감을 위해 생산시설을 해외에 두고 여러 나라들로부 터 부품을 조달하여 생산하고 현지에서 판매(수출)도 곧바로 하고 있다. 이와 같이 제품의 생산과 판매를 위한 다양한 단계들이 각기 다른 국가에서 발생하면서 세계교역구조는 상 호 유기적인 연계성을 갖게 되었다. 세계시장에서 경쟁력 있는 제품과 서비스를 생산하려 면 기업은 각 단계를 효율적으로 분리하고 최적 국가에서 생산함으로써 부가가치를 극대 화할 수 있는 기반을 조성하는 것이 중요하다. GVC 접근법은 생산의 분절화와 탈집중화, 개발도상국으로의 최종시장 중심 이동 등 세계경제의 분업 행태에 변화를 가져왔다. 최 근 공급망 위기, 지정학적 리스크 확대, 국내산업 보호와 일자리 창출 압력 등을 배경으로 GVC에 바탕을 둔 교역의 글로벌화 경향에 변화가 발생하고 있다.',
  },
  '글로벌 공급망 압력 지수': {
    title: '글로벌 공급망 압력 지수',
    content: '글로벌 공급망 압력지수(GSCPI; Global Supply Chain Pressure Index)는 국제 교역이 이루어지는 과정에서 공급망이 얼마나 원활히 작동하는지 보여주는 지표이다. 미국 뉴욕 연방준비은행(Federal Reserve Bank of New York)이 세계 각국의 무역, 물류, 운송 관련 데이터를 분석하여 매달 발표하고 있다. GSCPI 수치가 0에 가까울수록 공급망이 정상적 이고 안정적인 반면 0보다 크면 공급망에 압력이 높아서 차질이 심한 상태를 의미하는데 코로나19 팬데믹과 우크라이나 전쟁 때 역사적으로 높은 수준을 기록한 바 있다. GSCPI 는 경제정책 결정자들에게 공급망 리스크 판단 지표 중 하나로 인플레이션 예측과 글로벌 경기 흐름 파악에 유용하며, 기업의 생산 및 재고 전략 수립에도 활용된다.',
  },
  '글로벌금융안전망': {
    title: '글로벌금융안전망',
    content: '금융위기 등으로 인하여 외화유동성이 부족해지는 경우에 대비하기 위하여 각국이 외화 유동성을 인출하거나 지원받는 각종 제도적 장치들을 총칭하여 글로벌금융안전망이라고 한다. 글로벌금융안전망은 위기 시 유동성을 지원할 수 있는 국제금융기구의 재원이 제한 적인 점을 감안하여 위기의 성격·규모에 따라 보다 효과적으로 대응하기 위해 중층적으로 구축할 필요가 있다. 이러한 중층적 금융안전망은 일반적으로 외환보유액과 같은 개별국 가 차원의 금융안전망, 중앙은행들의 양자간 통화스왑, CMIM과 같은 특정 지역 내 다자 간 금융협정을 포괄하는 지역 차원의 금융안전망, IMF와 같은 범세계적 통화금융기구의 자금지원제도를 포괄하는 글로벌 차원의 금융안전망 등으로 구성된다. 전통적으로 각국 정부는 금융위기 등에 대비한 기본적인 금융안전망으로 외환보유액을 중시해왔다. 그러 나 2008년 글로벌금융위기 대응과정에서 중앙은행 간 통화스왑 등 양자간 협력의 중요성 이 크게 부각되었으며, 인접국 간의 경제적 협력을 통해 거시경제 및 금융의 안정을 도모 하는 다자간 금융협정도 발전하고 있다. 이 밖에 IMF의 대출제도 확충 등 범세계적인 국 제금융기구의 자금지원 제도도 더욱 확충되면서 글로벌 금융안전망의 중심적 역할을 담 당하고 있다.',
  },
  '글로벌 금융위기': {
    title: '글로벌 금융위기',
    content: '글로벌 금융위기는 전 세계 금융시스템에 심각한 혼란을 일으키는 위기 상황을 의미한다. 특히 2008년 미국에서 시작된 글로벌 금융위기는 전 세계적인 경기침체를 초래하였으며 국제금융시장 전반에 걸쳐 큰 충격을 주었다. 이러한 위기는 특정 국가의 경제 문제에서 시작되어 전 세계로 빠르게 확산되는 특징을 보인다. 2008년 글로벌 금융위기의 주된 원 인은 미국 서브프라임 모기지 부실에서 비롯되었다. 위기 이전에 발생한 금융기관의 과도 한 대출과 부실 채권이 주택가격 하락과 맞물리면서 주택저당증권(MBS)의 가치 하락을 초래했고, 이는 다시 금융시스템 전체의 위기로 확산되었다. 이에 더해 금융 감독 및 규 제 체계의 미흡, 과도한 신용팽창 등이 복합적으로 작용하여 위기를 더욱 심화시켰다. 이 과정에서 은행시스템에 대한 신뢰가 상실되어 주요 금융기관들이 파산하고 정부의 개입 이 필요하게 되었다. 실물경제 측면에서는 여러 나라에서 심각한 경제 위축과 큰 폭의 실 업률 증가를 야기했으며, 이에 대한 대응으로 중앙은행의 금리 인하 및 양적 완화, 정부의 재정 확대 정책 등이 시행되었다. 이 위기를 통해 얻은 교훈을 바탕으로 금융시스템의 안 정성을 높이고, 경제 위기 발생 시 효과적으로 대응할 수 있는 시스템을 구축하는 것이 중 요하다는 인식이 제고되었다.',
  },
  '금리선물': {
    title: '금리선물',
    content: '금리선물(Interest Rate Futures)이란 기초자산인 금리를 거래대상으로 하며 현재의 시 점에서 정한 가격으로 미래의 특정 시점에서 사거나 팔 것을 약정하는 계약을 말하다. 금 리선물의 대표적인 상품은 기초자산별로 다양한 만기의 국채선물이다. 3년 국채선물의 주요 내용을 보면 다음과 같다. 기초자산은 최종결제일 현재 만기 3년, 액면금액 1억원, 표면금리 5%, 반기별로 이자를 지급하는 가상의 국고채권이다. 가격의 표시방법은 액 면금액 1억원을 100으로 환산하여 소수점 둘째자리까지 표시한다. 최소가격 변동폭인 1tick의 크기는 0.01인데 그 가치는 가상채권 가격으로는 10,000원에 해당되며 국고채 금리 1bp(0.01%)는 국채선물가격 3tick과 거의 동일하다. 투자자들은 금리변동위험 헤 지(hedge) 및 투기적 목적으로 국채선물을 거래한다. 일반적으로 은행, 보험사 등 기관투 자가들은 현물채권을 다량으로 보유하고 있으므로 향후 시장금리가 상승하면 채권가격 이 하락하는 금리위험에 노출되어 있다. 이런 위험을 회피하기 위해 국채선물을 매도(시 장금리 상승에 따른 보유채권의 가격 하락이 국채선물 매도에 따른 이익으로 상쇄)하게 되는데 이를 헤지거래라고 한다. 반면 보유채권 없이 국채선물가격의 방향을 예측하고 이 를 바탕으로 국채선물을 매수 또는 매도하여 이익을 추구하는 거래를 할 수 있는데 이를 투기적 거래라고 한다. 국채선물의 경우 거래증거금률이 매우 낮아(3년 만기, 0.5%) 레버 리지가 매우 높으므로 헤지펀드 등 외국인들이 이런 투기적 거래를 많이 이용하고 있으며 국채선물가격에 미치는 영향도 상당히 크다. 한편 금리선물시장에서의 가격 움직임을 보 고 향후 시장금리가 어떤 방향으로 움직일 것인지를 예측하기도 하는데 특히 미국의 페더 럴펀드금리선물(federal funds futures)은 시장참가자들에게 향후 미연준이 통화정책을 어떤 방향으로 운용할 것인지를 가늠해 볼 수 있는 지표역할을 하기도 한다.',
  },
  '금리스왑': {
    title: '금리스왑',
    content: '금리스왑(IRS; Interest Rate Swaps)이란 금리변동위험 헤지 및 차입비용 절감 등을 위하 여 거래당사자간에 원금교환 없이 정기적으로 통상 3개월마다 변동금리(91일물 CD금리) 와 고정금리(IRS금리)를 교환하는 거래를 말한다. 이때 고정금리를 지급하는 대신 변동금 리를 수취하는 거래를 금리스왑 pay거래라 하며 반대로 고정금리를 수취하는 대신 변동 금리를 지급하는 거래를 금리스왑 receive거래라 한다. 거래단위와 만기는 제한이 없지만 통상 100억원, 만기 1~5년 거래가 주를 이룬다. 일반적으로 금리스왑은 고정금리부 자산 과 고정금리부 부채의 듀레이션이 불일치함에 따라 발생하는 금리변동위험을 헤지하는데 이용된다. 예를 들어 고정금리부 자산이 고정금리부 부채보다 많은 경우 고정금리부 부채 를 늘릴 필요가 있는데 이때 금리스왑거래를 통해 채권매도와 같은 효과를 내는 금리스왑 pay거래를 실시하면 금리변동위험이 감소한다. 금리스왑도 향후 금리변동에 따른 위험을 회피하기 위한 헤지거래와 향후 금리 방향을 예상하여 이익을 추구하는 투기적 거래가 있 다. 앞서 제시한 예시는 헤지거래에 해당한다. 자신의 자산·부채 포지션과 관계없이 금리 하락을 예상하여 수익을 추구하는 경우에는 금리스왑 receive거래를, 금리 상승을 예상하 여 수익을 추구하는 경우에는 금리스왑 pay거래를 하게 되는데 전형적인 투기적 거래에 해당한다. 금리스왑시장에서는 금리스왑 스프레드라는 용어가 자주 등장한다. 이는 동일 만기 「IRS금리-국고채금리(무위험채권)」를 의미한다. 금리스왑 스프레드는 향후 금리전 망, 거래상대방의 신용위험 등 다양한 요인에 의해 변동된다. 예를 들어 스왑딜러가 향후 시장금리가 하락할 것으로 예상하여 변동금리를 지급하는 대신 고정금리를 수취하는 금 리스왑 receive거래를 하는 경우 고정금리 수취 수요가 증가함에 따라 IRS금리가 하락하 면서 금리스왑 스프레드는 축소된다.',
  },
  '금리자유화': {
    title: '금리자유화',
    content: '금리자유화란 금리규제를 철폐함으로써 금리가 시장의 자금수급에 따라 자유로이 결정될 수 있도록 하는 조치이다. 금융시장의 대표적인 가격변수인 금리를 제한하는 것은 역사적 으로 보아 미국 등 다수의 국가에서 금융불안이 반복적으로 발생함에 따라 금융안정을 도 모하기 위해 도입한 금융규제의 하나이다. 이러한 구조적 금융규제로는 금리규제 이외에 업무영역규제, 진입제한 등이 있다. 그러나 1970~80년대 인플레이션이 심화되면서 은행 의 자금중개가 위축되는 이른바 디스인터미디에이션(disintermediation)이 발생하는 가 운데 금융규제를 우회하는 금융혁신이 진전되고 금융자유화가 추진되면서 각국은 금리규 제를 단계적으로 철폐하였다. 대표적으로 미국의 경우 ‘레귤레이션 큐(Q)’라는 연준 규정 에 의해 은행예금 최고금리가 제한되었는데, 1980년대 일련의 자유화조치 등으로 금리 자유화가 진전되었다. 한국은 금융기관 간 경쟁을 촉진함으로써 금융의 효율성을 높이고 금융산업의 대외경쟁력을 강화하기 위하여 1991년 8월 수립된 “4단계 금리자유화 추진 계획”에 따라 1995년 11월 제3단계 금리자유화를 완결하였다. 이어 2004년 2월부터는 요구불예금 금리도 자유화함에 따라 모든 예금의 금리상한 규제가 폐지되었다. 우리나라 의 경우 금융부문 낙후의 주요 원인이 금리의 가격기능 위축에 있다는 점에서 금리자유화 는 시장원리에 의한 경제운용과 통화정책의 유효성 제고를 위한 기반이 되었다.',
  },
  '금리평가이론': {
    title: '금리평가이론',
    content: '완전한 금융시장에서, 즉 국경 간 자본이동에 규제가 없고 거래비용이나 세금 등을 고려 하지 않은 경우, 양국 간의 금리 차는 선물환 프리미엄(또는 스왑레이트)과 같다는 이론이 다. 예를 들어 1억 원을 가진 우리나라의 투자자가 1년간 미국 또는 우리나라의 채권에 투 자할 경우 완전한 금융시장에서는 1년 후 투자자가 받는 원리금은 한국에 투자한 것이든 미국에 투자한 것이든 같아야 한다. 이는 아래 식과 같이 표시할 수 있다. ￦1억 × (1+ i) = ( ￦1억 S ) × (1+ i*) × F 단, i: 한국 1년물 채권금리, i*: 미국 1년물 채권금리, S : 현물환율, F : 1년 만기 선물환율 위 식은 다음과 같이 정리할 수 있다. F-S S ≒ i-i* 즉, 완전한 금융시장에서 양국 간 금리 차 는 현물환율(S)과 선물환율(F) 간 차이를 현물환율로 나눈 것(이를 스왑레이트라 한다.)과 같아야 한다. 다만 현실적으로는 거래비용 등이 있기 때문에 양자가 반드시 일치하지는 않는데, 양자간의 차이(내외 금리차-스왑레이트)가 커질 경우 환위험 없이 이익을 얻을 수 있는 차익거래가 발생한다. 이에 따라 금융시장이 안정적일 경우 양자간 차이는 일정 범 위 내에서 유지된다.',
  },
  '금본위제': {
    title: '금본위제',
    content: '금본위제란 각국의 통화가치를 순금의 일정한 중량으로 정해 놓고 금화의 자유로운 주조 와 수출입을 허용하며 이를 지폐나 예금통화 등과 교환할 수 있도록 하는 제도이다. 금본 위제하에서 각국 통화는 금의 중량을 기준으로 그 가치가 정해져 있으므로 통화 간 교환 비율은 금을 통하여 고정되며, 따라서 금본위제는 전형적인 고정환율제도이다. 1800년대 영국의 금본위제 도입을 시작으로 독일, 네덜란드, 노르웨이, 스웨덴, 덴마크, 프랑스, 일 본 등 주요 국가들이 금본위제를 채택하였다. 금본위제는 금의 국제수지 및 국내물가 자 동 조절기능을 통해 국제금융 및 세계 경제의 발전에 공헌하였으나 1차 세계대전 이후 주 요국들이 과다한 전비지출로 말미암은 인플레이션과 정치적 불안 등의 문제에 직면하면서 이들 국가를 중심으로 제도의 유용성에 대한 의문이 높아졌다. 특히 전후 영국이 과대평 가된 파운드화로 인한 막대한 실업과 수출산업의 침체를 겪고, 이어서 독일의 초인플레이 션, 세계 대공황 등이 발생함에 따라 영국은 1931년 금본위제를 포기하고 파운드화의 평 가절하를 단행하였다. 이후 주요 선진국들도 금본위제를 포기하고 변동환율제도로 전환 하면서 금본위제는 결국 붕괴하였다.',
  },
  '금산분리': {
    title: '금산분리',
    content: '산업자본과 금융자본이 결합하는 것을 제한하는 원칙을 금산분리라고 한다. 은행업 등 금 융산업은 예금이나 채권 등을 통하여 조달된 자금을 재원으로 하여 영업활동을 해서 자기 자본비율이 낮은 특징이 있다. 이 때문에 금융산업의 소유구조는 다른 산업에 비해 취약 한 편이며 산업자본의 지배하에 놓일 수 있는 위험이 존재한다. 산업자본이 금융자본을 지배하게 되면, 은행이 특정 기업의 사금고처럼 이용될 수 있는 한편, 지배기업이 다른 경 쟁 기업보다 유리한 조건으로 자금을 조달할 수 있어 시장의 공정한 경쟁을 저해하고 독 과점을 초래할 수 있다. 이러한 이유로 은행법을 통해 산업자본이 보유할 수 있는 은행지 분을 원칙적으로 4% 한도로 제한하고 있다.',
  },
  '금융EDI': {
    title: '금융EDI',
    content: 'EDI(Electronic Data Interchange)는 기업 상호 간에 접속된 컴퓨터를 이용하여 재화 와 용역의 거래정보를 표준화된 양식으로 교환하여 상거래를 처리함으로써 각종 서류작 성 및 거래 정보의 컴퓨터 중복입력 등을 생략하고 업무처리의 정확성 및 효율성을 높이 기 위해 개발된 시스템이다. 표준화된 형태의 정보이므로 수신한 기업이나 조직에서는 새 로이 입력할 필요 없이 전송받은 그대로 업무에 활용할 수 있어서 작성상의 오류를 방지 하고 업무처리 시간을 크게 단축함은 물론 인력 및 재고량의 감축, 대고객 서비스 향상 등 을 기할 수 있다. EDI 표준은 용도에 따라 전자문서표준, 메시지표준, 통신표준 등으로 구 분된다. 한편 이와 같은 상거래 과정에 은행이 개입하여 기업의 거래정보뿐만 아니라 기 업과 거래은행 간의 지급결제를 포함한 거래정보까지도 전자적으로 처리함으로써 모든 거래를 신속히 종결시키는 시스템을 금융EDI라고 한다.',
  },
  '금융공황': {
    title: '금융공황',
    content: '금융공황(Banking Panic)은 일부 금융기관이 실물경제 침체 등으로 인한 대출 부실화로 심각한 경영난에 빠졌을 때 예금인출사태(bank run)가 해당 금융기관만이 아닌 다른 금 융기관에까지 급속하게 확산되어 금융시장 전체가 신용경색 사태에 직면하는 현상을 말 한다. 이때 금융기관의 자산가치가 급격히 하락하면서 경기침체도 가속화된다. 금융공황 은 증시 폭락, 금융자산 버블 붕괴, 통화위기, 국가부도 등을 동반하기도 한다. 예를 들어, 1907년 미국에서 발생한 금융공황을 보면, 뉴욕증권거래소 주가가 전년도 최고치에 비 해 절반 수준까지 폭락하면서 다수의 은행에서 예금인출사태가 일어났다. 뉴욕에서 시작 된 위기가 곧 미국 전역에 확산되면서 많은 은행과 기업이 파산하고 실업자 수는 400만명 에 달하였다. 예금인출사태가 발생한 것은 뉴욕의 금융기관에 유동성이 부족했던 데다 예 금자의 불신이 커졌던 데 기인한다. 당시 중앙은행이 존재하지 않았던 미국은 금융공황을 극복하기 위하여 1913년 12월 윌슨 대통령의 중앙은행 설립 관련 법안 서명을 거쳐 연방 준비제도(Federal Reserve System)를 설립하였다.',
  },
  '금융불안지수(FSI)': {
    title: '금융불안지수(FSI)',
    content: '금융불안지수(FSI; Financial Stress Index)는 금융불안 가능성을 속보성 있게 판단하 는 지수이다. 상당수의 국가에서 동 지수를 편제하여 금융시스템 안정성에 대한 조기경 보 판단지표로 활용하고 있다. 우리나라의 경우 한국은행이 2012년 최초 편제한 이후 현 재까지 매월 산출하고 있다. 한국은행에서 편제하고 있는 금융불안지수(FSI)는 금융시장, 실물, 대외, 은행, 비은행 등 총 5개 부문으로 구성되어 있다. 세부지표로는 코스피 변동 성(금융시장), 소비자심리지수(실물), 원달러환율 변동성(대외), 연체율(은행 및 비은행) 등 총 20개가 있다. 금융불안지수는 0~100의 수치로 나타내며 주의 및 위험 수준 단계의 임계치는 각각 12와 24이다. 즉 동 지수가 12를 넘으면 금융안정상황이 주의 수준 단계 에, 24를 넘으면 위험 수준 단계에 진입하였음을 의미한다.',
  },
  '금융사이클': {
    title: '금융사이클',
    content: '경제주체의 위험추구 성향, 신용담보로 제공되는 실물자산의 가치변동 등이 상호작용 하면서 나타나는 금융변수들의 종합적인 순환변동을 의미한다. 금융사이클 측정에는 BIS(국제결제은행)에서 제시하고 있는 실질 민간신용총량, 민간신용/명목GDP 비율, 비 핵심부채(예금은행 총부채 - 원화예수금) 비중 등이 활용되고 있다. 한국은행에서 1980 년부터 2021년까지 분기단위 민간신용총액을 이용하여 금융사이클을 측정한 결과, 금융 사이클의 평균주기는 24.5분기로 실물사이클(14.5분기)에 비해 더 긴 것으로 분석되었 다. 금융사이클과 실물사이클간 동조화 관계는 2000년 들어 크게 강화되었으나, 2008년 글로벌 금융위기 이후에는 동조화 관계가 약화된 것으로 나타났다.',
  },
  '금융상황지수(FCI)': {
    title: '금융상황지수(FCI)',
    content: '금융상황지수(FCI; Financial Conditions Index)는 전반적인 금융여건의 완화 또는 긴 축 여부를 판단하기 위한 지수이다. 금융상황은 통화정책의 1차 파급경로로서 실물경제 전반에 영향을 미치는 만큼 주요국 중앙은행들은 금리, 환율, 주가, 신용스프레드, 주택가 격 등 다양한 금융변수를 이용하여 지수를 산출하고 이를 통화정책 운영에 참고하고 있 다. 예를 들어, 장단기 시장금리가 낮아지고 주가가 상승하는 경우 금융상황이 완화된 것 으로 해석된다. 반대로 금리 상승, 주가 하락 등이 나타나면 금융상황이 긴축된 것으로 본 다. 한국은행은 단기금리, 실효환율, 주가, 기간스프레드, 리스크프리미엄, 주택가격의 6 개 변수의 장기추세 대비 격차를 가중합산한 후 표준화하여 FCI 지수를 산출해 왔으며, 2025년 3월부터는 금융여건이 일정 시차를 두고 성장에 영향을 미치는 점을 고려하여 현재의 금융상황을 판단할 수 있도록 고안된 FCI-G(1년, 3년)를 신규로 산출하여 금융상 황 평가에 활용하고 있다.',
  },
  '금융시스템 상호연계성': {
    title: '금융시스템 상호연계성',
    content: '금융불안을 초래할 수 있는 시스템 리스크는 시계열 차원뿐만 아니라 특정 시점에서 종합 적으로 파악할 필요가 있는데, 특정 시점에서 시스템 리스크를 초래할 수 있는 핵심 요인 인 상호연계성은 해당 금융업권(기관)이 영업활동 과정에서 여타 금융업권(기관)과 밀접 하게 연결된 정도를 의미한다. 금융시스템 상호연계 구조는 금융기관 간 자금의 조달 및 운용을 통한 실제 상호거래 또는 금융기관의 주가, 금리 등 금융시장 가격변수의 상관관 계 등을 이용하여 분석한다.',
  },
  '금융시장인프라': {
    title: '금융시장인프라',
    content: '금융시장인프라(FMI; Financial Market Infrastructure)는 금융 거래지급, 청산, 결제, 기록 등을 가능하게 하는 시스템과 기관들을 총칭하는 용어이다. FMI의 주요 구성요소 는 지급시스템(Payment Systems), 증권결제시스템(Securities Settlement Systems), 중앙예탁기관(CSD; Central Securities Depository), 중앙청산소(CCP; Central Counterparty)로 구분할 수 있다. FMI는 금융시장의 안정성을 유지하고 효율성을 증진 시키는 데 필수적인 역할을 수행한다. FMI에 문제가 발생하면 광범위한 금융 혼란을 초래 할 수 있으므로, 각국 중앙은행과 금융당국은 FMI의 안전성과 효율성을 철저히 관리하고 있다. 특히, 2008년 글로벌 금융위기 이후 FMI의 중요성이 더욱 부각되어 국제적으로 ‘금 융시장인프라에 관한 원칙(PFMI; Principles for Financial Market Infrastructures)’이 제정되어 안전성 및 효율성 강화 노력이 이루어지고 있다.',
  },
  '금융안정': {
    title: '금융안정',
    content: '금융회사들이 정상적인 자금중개기능을 수행하고, 금융시장 참가자들의 신뢰가 유지되는 가운데 금융인프라가 잘 구비되어 있어 금융시스템이 원활히 작동하는 상태를 의미한다. 금융안정은 지속가능한 경제발전을 위해 물가안정이나 경제성장과 함께 반드시 달성되 어야 하는 정책목표의 하나로서, 각국 정책당국은 이를 이루기 위해 정책적 노력을 경주 하고 있다. 금융안정의 개념이 본격적으로 관심의 대상이 된 것은 1980년대 이후이다. 금 융자유화, 국제화 등 세계적인 금융혁신의 확대와 금리·주가·환율의 변동성 증대, 금융기 관간 경쟁 심화 등으로 특정 금융기관 및 금융시장의 불안이 전체 금융시스템의 불안으로 확산될 수 있는 위험성이 높아지게 되면서 금융안정의 중요성이 부각되었다. 1990년대 초 북유럽 3국의 금융불안, 1994년 멕시코, 1997년 아시아의 금융위기, 1998년 러시아 의 모라토리엄 선언 등 국제적인 금융시스템 불안 사례가 연이어 발생하고 이러한 불안이 다른 국가로 확산되는 국제적 전염효과까지 나타나면서 금융안정은 정책당국의 주요 관 심사가 되었다. 2007년 미국의 서브프라임 모기지 사태와 2008년 9월 리먼브라더스 파 산으로 촉발된 글로벌 금융위기는 세계적인 금융불안과 실물경제 침체라는 전례가 드문 충격을 가져오면서 각국 정책당국과 시장참가자에게 금융안정의 중요성과 정책수단의 개 발 필요성을 재인식하는 계기가 되었다. 2011년 9월 「한국은행법」 개정으로 한국은행은 금융안정 책무를 명시적으로 부여받았다.',
  },
  '금융안정위원회(FSB)': {
    title: '금융안정위원회(FSB)',
    content: '기존 금융안정포럼(FSF)의 국제금융시장 안정 기능을 보다 강화하기 위하여 동 포럼의 참여 대상, 책무, 권한 등을 확대·개편하여 2009년 4월 금융안정위원회(FSB; Financial Stability Board)가 설립되었다. 현재 25개국의 금융당국(중앙은행, 재무부 및 감독기 관)과 10개 국제기구 대표가 회원으로 활동하고 있으며 우리나라에서는 한국은행과 금 융위원회가 참여하고 있다. 최고의사결정기구는 총회(Plenary)로서 통상 1년에 두 번 개 최되며, 총회를 효과적으로 보좌할 수 있도록 산하에 운영위원회를 설치·운영하고 있다. 아울러 FSB의 책무 수행을 지원하기 위하여 취약성평가 상임위(SCAV), 감독·규제협력 상임위(SRC), 기준이행 상임위(SCSI), 예산·재원 상임위(SCBR) 등 4개의 상임위원회를 두고 있다.',
  },
  '금융연관비율(골드스미스비율)': {
    title: '금융연관비율(골드스미스비율)',
    content: '금융연관비율(Financial Interrelations Ratio)은 한 나라의 금융자산 잔액을 유형자산 (실물자산 또는 국부 = 유형자산 + 순 대외자산) 잔액으로 나눈 비율로 골드스미스 (R.W.Goldsmith)가 사용하기 시작하였다. 이는 실물 면의 자본축적 잔액에 대한 금융 면 의 금융자산 잔액의 비율로서 유형고정자산의 증대를 위한 금융조직의 발달 정도, 즉 금 융구조의 고도화 또는 금융자산축적의 정도를 나타내는 지표라 할 수 있다. 그러나 한 나 라의 유형자산 규모를 파악하는 것이 쉽지 않아 유형자산 대신 명목 GNI를 이용하기도 한다. 일반적으로 금융연관비율은 경제의 발전에 따라 증대되는 경향이 있다.',
  },
  '금융의 증권화': {
    title: '금융의 증권화',
    content: '금융의 증권화(Securitization)란 금융기관이 보유하고 있는 대출채권(loan claim) 등 유 동성이 낮은 자산을 매매 가능한 유가증권 형태로 전환하는 자산유동화를 지칭한다. 자 산유동화(ABS; Asset-Backed Securities)는 기초자산을 자산보유자로부터 분리·집합 (pooling)하여 현금흐름 등을 조정하는 구조화 과정과 신용보강을 거쳐 유동화 증권을 발 행·매각하는 형태로 이루어진다. 자산유동화증권은 법적 성격 및 기초자산의 종류에 따라 다양한 명칭이 붙는데, 모기지대출을 기초자산으로 유동화한 증권을 주택저당증권(MBS), 대출채권을 기초자산으로 유동화한 증권을 CLO(Collateralized Loan Obligation), 회사 채를 기초자산으로 유동화한 증권을 CBO(Collateralized Bond Obligation), 자동차 할 부금융을 기초자산으로 유동화한 증권을 auto loan ABS라고 부른다.',
  },
  '금융의 탈중개화': {
    title: '금융의 탈중개화',

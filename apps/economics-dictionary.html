    content: '분산원장 등 신기술의 출현과 핀테크의 발달에 따라 금융업의 분화 현상이 심화됨으로써 금융서비스가 더 이상 기존 금융시스템과 중개기관에 의존하지 않고 다양한 형태로 분절 되는 탈중개화(disintermediation) 및 탈집중화(decentralization)되는 경향이 나타나고 있다. 여기서 금융의 탈중개화는 블록체인을 통한 송금, P2P대출처럼 금융중개기관을 거 치지 않고 거래가 당사자 간에 직접 이뤄지는 현상을 말한다. 이는 금융중개기관에 대한 수요를 감소시키는 반면, 금융서비스 공급자의 수를 증가시키는 방향으로 작용한다.',
  },
  '금융의 탈집중화': {
    title: '금융의 탈집중화',
    content: '금융의 탈집중화(Decentralization)는 탈중개화와 유사한 개념으로 분야별 금융시장에 새로 진입한 핀테크 업체들의 파괴적인 경쟁력 때문에 금융 분야별로 서비스가 더 세분 화되는(unbundling) 현상을 말한다. 예를 들면, 대출 분야의 경우 지점을 갖지 않는 인 터넷전문은행이 인터넷(모바일) 금융서비스 분야에 새로 진입하여 획기적으로 단기간 에 대규모 고객을 확보함에 따라, 기존 대형 은행들의 고객 이탈을 초래하고, 해외송 금 분야에서는 블록체인·모바일네트워크 등을 활용해서 금융중개기관을 거치지 않고 더 싼 수수료로 직접 수신자에게 송금하는 핀테크 업체가 등장하였다. ‘금융의 탈중개 화’(disintermediation)는 블록체인을 통한 송금, P2P대출처럼 금융중개를 거치지 않고 거래가 당사자 간에 직접 이뤄진다는 면에서 탈중개화와 다소 다르다.',
  },
  '금융이해력': {
    title: '금융이해력',
    content: '금융이해력은 재무적 자원을 효과적으로 관리하고 생애 전반에 걸쳐 재정적 안정을 확보 하기 위해 필요한 금융 지식, 기술, 태도 등을 포괄하는 능력을 의미한다. 이는 금융 정보 를 이해하고 활용하여 합리적인 금융 결정을 내리고, 자신의 재무 목표를 달성하는 데 필 요한 역량을 말한다. 일반적으로 금융이해력은 금융지식, 금융행위, 금융태도와 같은 요 소들을 포괄한다. 금융 지식은 금융 상품, 시장, 서비스 등에 대한 기본적인 이해력을 말 한다. 금융 행위는 예산 관리, 저축, 투자, 신용 관리 등 실제 금융 활동을 효과적으로 수 행하는 능력을 말한다. 금융 태도는 미래를 위한 계획, 위험 감수, 소비 습관 등 금융 의사 결정에 영향을 미치는 태도를 의미한다. 이러한 금융이해력은 개인의 재정적 안정뿐만 아 니라 사회 전체의 경제적 복지에도 영향을 미치기 때문에 금융교육을 통해 금융이해력을 높이는 것이 매우 중요하다. 이와 관련해 한국은행과 금융감독원은 2012년부터 OECD INFE(International Network on Financial Education) 가이드 라인을 바탕으로 한 ‘전 국민 금융이해력 조사’를 공동 실시하고 있다.',
  },
  '금융제도': {
    title: '금융제도',
    content: '금융거래에 관한 체계와 규범을 총칭하는 개념으로 금융시장, 금융기관, 금융하부구조 (infra-structure)로 구분된다. 금융시장은 자금의 수요자와 공급자 간에 금융거래가 조 직적으로 이루어지는 장소로서 정보시스템 등 추상적 공간을 포함하는 개념이다. 금융시 장은 은행 등 금융중개기관을 통하여 예금, 대출 등의 형태로 자금 이전이 이루어지는 간 접금융시장과 주식, 채권 등 증권을 통해 자금의 수요자와 공급자 간에 직접적인 자금 이 전이 이루어지는 직접금융시장으로 구분된다. 금융기관은 자금의 공급자와 수요자 간에 거래를 성립시켜 주는 것을 목적으로 하는 사업체로서 우리나라의 경우 은행, 비은행 예 금취급기관, 금융투자업자, 보험회사 및 기타 금융기관으로 구분된다. 금융하부구조는 금 융기관의 인가 및 경영, 재산권 보호 등을 규정하는 법령과 금융시장의 거래준칙, 금융거 래 및 금융기관 업무를 지원하고 감시하는 각종 기구를 포함한다. 금융하부구조를 이루는 주요 기구로는 중앙은행, 지급결제기구, 금융감독기구, 예금보험기구 등이 있다.',
  },
  '금융중개지원대출제도': {
    title: '금융중개지원대출제도',
    content: '한국은행의 금융중개지원대출제도는 은행의 중소기업에 대한 대출 확대를 유도하기 위 해 은행별 중소기업 대출 취급실적에 비례하여 한국은행이 낮은 금리로 자금을 공급하는 대출제도를 말한다. 한국은행이 사전에 설정한 지원대상 대출의 요건에 따라 은행이 개별 기업을 심사한 후 자체자금으로 지원대상 대출을 취급하면, 한국은행이 사후적으로 은행 별 취급실적에 따라 자금을 지원한다. 금융중개지원대출의 금리는 통상 한국은행 기준금 리보다 낮게 운용되고, 대출기간은 1개월이며 월중 취급실적 변동을 반영하기 위해 월단 위로 갱신한다. 금융중개지원대출은 금융통화위원회가 정한 한도 이내에서 세부 지원목 적에 따라 다음의 프로그램으로 구분·운용되고 있다. 무역금융지원 프로그램은 수출금융 지원을 위해 무역금융 취급실적 등에 대해 지원한다. 신성장·일자리지원 프로그램은 창 업 7년 이내, 혹은 일자리 창출에 기여하는 기업을 지원한다. 지방중소기업지원 프로그램 은 지역간 균형발전을 도모할 목적으로 은행의 지방중소기업에 대한 대출을 지원하며, 지 역별 경제사정 등을 감안하여 한국은행 지역본부별로 운영한다. 마지막으로, 한도유보분 은 자연재해 등 예기치 못한 경제충격으로 자금사정에 어려움을 겪는 중소기업을 지원하 기 위한 한시적 프로그램으로 현재 중소기업 한시 특별지원, 재해복구특별지원 프로그램 으로 세분화하여 운영하고 있다.',
  },
  '금융지주회사': {
    title: '금융지주회사',
    content: '금융지주회사(Financial Holding Company)는 지분 보유를 통해 은행, 증권, 보험, 자 산관리 등의 금융업을 영위하는 자회사들을 소유하여 경영하는 모회사를 말한다. 미국의 경우 여러 금융자회사의 지분을 보유한 일종의 페이퍼 컴퍼니(paper company)로서 금 융지주회사를 설립하는 형태인데 비해서 유럽의 경우 유니버셜 뱅킹을 주축으로 하는 모 은행이 바로 지주회사가 되어 여타 금융업을 하는 별도 법인의 금융회사를 자회사로 보유 하는 형태가 보통이다. 금융지주회사 제도는 금융의 대형화 및 겸업화를 통해 금융산업의 경쟁력을 높일 수 있는 장점이 있으나 대형 금융기관의 시장지배력 증대와 은행과 증권업 의 분리 등 금융안정을 위한 방화벽(fire wall)의 약화가 단점으로 지적된다. 우리나라에 서는 자본시장의 발달과 금융의 대형화 추세, 금융기관의 업무영역 확대 노력 등을 반영 하여 2000년 10월 금융지주회사법이 제정되었다. 금융지주회사법에 의하면 금융지주회 사는 주식 또는 지분의 소유를 통하여 하나 이상의 금융기관을 지배하는 것을 주된 사업 으로 영위하는 회사로 여기에서 주된 사업이라 함은 금융지주회사가 보유하는 자회사 주 식총액이 금융지주회사 자산의 50% 이상인 경우를 말한다.',
  },
  '금융채': {
    title: '금융채',
    content: '금융채는 은행, 금융투자회사, 리스회사, 신용카드회사 등 금융기관이 장기적으로 안정적 인 자금을 조달하기 위하여 발행하는 채권을 말한다. 예를 들면, 은행채는 「은행법」에 근 거하여 은행이 자기자본의 5배 이내에서 발행할 수 있으며, 산업금융채권의 경우 「한국 산업은행법」에 근거하여 한국산업은행이 자본금 및 적립금의 30배 이내에서 발행할 수 있다. 중소기업금융채권은 기업은행이 「중소기업은행법」에 근거하여 자본금 및 적립금의 20배 이내에서 발행할 수 있다. 금융채는 채권의 성격에 따라 일반채권, 후순위채권, 하이 브리드채권(신종자본증권), 기타 주식관련 사채, 옵션부채권 등으로 구분된다. 금융기관 은 금융채를 발행하여 조달한 자금을 주로 장기 산업자금으로 대출한다. 한편 금융채 금 리는 은행의 대출금리와도 관련이 있다. 금융채 금리는 단독으로 은행 대출금리의 준거 금리가 되기도 하고 자금조달비용지수(COFIX; Cost of Funds Index) 산정시 예금금리, CD금리 등과 함께 가중평균되어 반영되기도 한다.',
  },
  '금융취약성지수(FVI)': {
    title: '금융취약성지수(FVI)',
    content: '금융안정 상황을 판단하기 위해 금융시스템 내 잠재하고 있는 취약성(vulnerability)을 평 가하고 이를 통해 중장기 금융안정 리스크를 측정하는 금융안정 관련 지수이다. 금융취약 성지수(FVI; Financial Vulnerability Index)는 구체적으로 자산가격의 과도한 상승, 신 용축적 심화 등으로 인한 금융 불균형과 대내외 충격을 흡수할 수 있는 금융기관의 복원 력(resilience)을 함께 고려함으로써 금융안정과 관련한 전반적인 취약성을 평가하는 데 중점을 두고 있다. 이는 금융시장 가격변수 변동, 경제주체 심리 변화 등 금융·경제 상황 의 단기적 변동에 중점을 두고 있는 금융불안지수(FSI)를 보완하는 성격의 지수라고 볼 수 있다. 한국은행은 주요국 중앙은행 및 국제기구와 더불어 2021년 6월부터 금융취약성지 수를 편제해오고 있으며, 금융취약성지수의 추이는 과거 위기 전후 우리나라의 금융취약 성 수준을 비교적 정확히 설명하는 것으로 나타났다.',
  },
  '금융통화위원회': {
    title: '금융통화위원회',
    content: '금융통화위원회(Monetary Policy Board)는 통화신용정책 수립 및 한국은행 운영에 관 한 최고 의사결정기구로서 7명의 위원으로 구성된다. 한국은행 총재와 부총재는 금융통 화위원회의 당연직 위원이 되고, 총재는 의장을 겸임한다. 총재는 국무회의 심의와 국 회 인사청문을 거쳐 대통령이 임명하고, 부총재는 총재의 추천으로 대통령이 임명한다. 임명직 위원들은 각 추천기관(기획재정부, 한국은행, 금융위원회, 대한상공회의소, 전국 은행연합회)의 추천을 받아 대통령이 임명한다. 원칙적으로 매월 둘째, 넷째 목요일에 정 기회의를 개최하고 필요한 경우 수시로 임시회의를 개최한다. 통화정책방향(기준금리 포 함) 의결을 위한 정기회의는 종전의 매년 12회(매월)에서 2017년부터 매년 8회(1, 2, 4, 5, 7, 8, 10, 11월)로 변경되었다.',
  },
  '금융 하부구조': {
    title: '금융 하부구조',
    content: '지급결제시스템, 신용평가제도, 주식시장, 선물시장 등과 같이 금융거래가 원활하게 이루 어질 수 있도록 지원하는 각종 제도적 장치 및 기관을 의미한다. 이는 도로, 항만시설 등 과 같이 실물경제에서 생산에 직접 기여하지는 않으나 생산활동에 없어서는 안 되는 사회 간접자본에 비유할 수 있다. 금융 하부구조(Financial Infrastructure)가 잘 갖춰지면 금 융거래가 투명해지고 금융기관이 각종 위험을 회피할 수 있을 뿐만 아니라 금융 중개비용 을 절감할 수 있게 됨으로써 금융의 효율성이 증진되는 효과가 있다.',
  },
  '금전신탁': {
    title: '금전신탁',
    content: '금전신탁이란 수탁자가 금전을 신탁재산으로 위탁받아 이를 대출, 채권 등 적절한 투자대 상에 운용하여 얻은 이익을 수익자에게 금전 등의 형태로 되돌려 주는 제도이다. 신탁은 재산(금전, 부동산 등)을 잘 운용하기 어려운 사람들을 위해 전문가에게 재산을 맡겨 잘 운용하여 경제적 이득을 얻는 데 그 의의가 있다. 금전신탁은 수익자가 신탁재산의 운용 을 지정하느냐 여부에 따라 특정금전신탁(지정)과 불특정금전신탁(비지정)으로 구분되며, 불특정금전신탁에는 단위 금전신탁, 추가 금전신탁, 가계 금전신탁, 기업 금전신탁 등이 있다. 한편, 은행에서 취급하고 있는 금전신탁과 예금과의 차이점을 살펴보면 운용방법에 서는 금전신탁은 신탁법 및 신탁계약에서 정해진 것에 국한된 반면 예금은 은행법 등에서 정한 범위 내에서 자유롭게 운용할 수 있다. 이익분배에 있어서는 금전신탁은 실적배당, 예금은 확정이율을 원칙으로 한다.',
  },
  '기념화폐': {
    title: '기념화폐',
    content: '기념화폐는 국가적 행사, 역사적 사건, 중요한 인물 또는 국가유산 등을 기념하기 위해 특 별히 발행되는 화폐로서 유통 목적으로 발행되는 통용 화폐와 달리, 주로 수집 가치와 기 념적 의미를 지니며 액면가보다 높은 가격에 판매되는 경우가 많다. 우리나라에서는 기념화폐가 주화로 발행되는 경우 ‘기념주화’, 지폐로 발행되는 경우 ‘기 념은행권’이라 한다. 한국은행은 1971년 우리나라 최초의 기념주화인 ‘대한민국 반만년 역사’를 시작으로, 서울올림픽대회, 정부수립 50주년, 서울 G20 정상회의 개최 등 국가적 행사와 전통민속놀이, 한국의 문화유산, 한국의 국립공원 등 다양한 주제를 담은 기념주 화를 발행해 왔다. 한편, 기념은행권은 평창동계올림픽 개최 기념으로 최초의 액면 2000 원 기념은행권이 발행된 바 있다.',
  },
  '기대인플레이션': {
    title: '기대인플레이션',
    content: '기대인플레이션은 향후 물가상승률에 대한 경제주체의 주관적인 전망을 나타내는 개념으 로 물가안정을 추구하는 중앙은행이 관심을 기울이고 안정적으로 관리해야 하는 핵심지 표 중 하나이다. 기대인플레이션은 임금협상, 가격설정, 투자결정 등 경제주체의 의사결 정에 반영되면서 최종적으로 실제 인플레이션에 영향을 미친다. 구체적인 경로를 살펴보 면 기대인플레이션 상승 시 가계는 구매력 하락을 우려하여 명목임금 상승을 요구하게 되 며, 이는 상품의 생산비용 증가로 이어진다. 또한 기업은 재화 및 서비스의 가격을 올리더 라도 수요가 유지될 것으로 예상하면서 실제로 가격 인상을 추진하게 된다. 또한 기대인 플레이션 상승은 실질금리를 하락시켜 부동산, 주식 등의 자산에 대한 투자를 증가시킨 다. 마지막으로 인플레이션 상승이 예상되는 경우 소비를 앞당기고자 하는 유인이 커져 가수요가 증가하면서 실제 물가가 상승하게 된다. 따라서 중앙은행이 기대인플레이션을 안정적으로 관리하는 것은 물가안정을 위해 필수적이라고 할 수 있다.',
  },
  '기본자본(Tier 1)': {
    title: '기본자본(Tier 1)',
    content: '국제결제은행(BIS)의 기준에 따른 은행의 자기자본(=기본자본+보완자본)을 구성하는 요 소로서, 예상외 손실(unexpected loss)이 발생할 경우 은행이 영업을 계속하면서 손실을 흡수할 수 있는 자본(going-concern capital)을 의미하며, 보통주자본(CET1; Common Equity Tier 1)과 기타기본자본(AT1; Additional Tier 1)으로 구성된다. 2008년 금융위 기를 계기로 실질적인 손실흡수능력이 강조되면서 바젤Ⅲ 규제에서는 보통주자본이 기본 자본의 지배적인 비중을 차지하도록 하였으며 기타기본자본의 요건 및 공제항목의 적용 을 강화하였다. 바젤 Ⅲ에서는 기본자본비율이 위험가중자산의 6.0% 이상이 되도록 규정 하고 있다.',
  },
  '기업간(B2B) 지급시스템': {
    title: '기업간(B2B) 지급시스템',
    content: '기업간(B2B) 지급시스템은 전자외상매출채권(전자채권)의 발행과 만기시 결제를 처리하 는 시스템으로 2002년 3월 가동되었다. B2B 지급시스템으로 이용할 수 있는 서비스는 기업간 상거래로 발생한 채무를 기반으로 구매기업이 거래은행(발행은행)을 통하여 전자 채권을 발행하고, 전자채권의 만기일에 판매기업이 거래은행(전자채권 보관은행)으로부 터 구매기업이 결제한 전자채권대금을 회수하는 서비스이다. 채권의 만기일은 발행일로 부터 3영업일 이후부터 180일 이내이다. B2B 지급시스템의 이용 가능시간은 기본적으로 영업일 08시부터 22시까지이며, 전자채권 발행 및 취급과 관련한 수수료는 각 은행이 자 율적으로 정한다.',
  },
  '기업·개인간(B2C) 지급결제시스템': {
    title: '기업·개인간(B2C) 지급결제시스템',
    content: '기업·개인간(B2C) 지급결제시스템은 인터넷쇼핑몰 등의 전자상거래에서 이루어지는 판 매자 및 구매자간의 소액결제에 이용되는 지급결제시스템을 통칭하는 용어이다. B2C 결 제는 전자지급결제대행서비스(PG서비스)를 통하여 이루어지는 것이 일반적인데, PG서 비스는 인터넷쇼핑몰 등의 전자상거래에서 구매자로부터 대금을 수취하여 가맹점(판매 자)에게 최종적으로 지급될 수 있도록 결제에 필요한 정보를 중계하고 그 대가의 정산을 대행하거나 매개하는 서비스를 말한다. PG서비스는 사용되는 지급수단을 기준으로 크게 신용카드 PG, 계좌이체 PG, 통신과금서비스(유·무선전화결제)로 구분되며, 이 외에도 다 양한 PG서비스가 있다. PG서비스는 온라인상의 결제에 사용되므로 원칙적으로 연중무 휴 24시간 이용할 수 있다.',
  },
  '기업경기실사지수(BSI)': {
    title: '기업경기실사지수(BSI)',
    content: '한 나라의 전체 경기는 기업과 소비자들이 개별적으로 느끼는 경기를 종합한 것이라고 할 수 있다. 이에 따라 전반적인 경기상황을 판단하는데 도움을 얻고자 기업가 및 소비자들 을 대상으로 경제에 대한 인식을 조사하고 있는데 이 중 기업가를 대상으로 하는 것이 기 업경기실사지수(BSI; Business Survey Index)이다. 기업경기실사지수는 국내외 경기동 향에 대한 기업가들의 판단, 예측, 계획의 변화 추이를 조사하여 작성되며, 경기분석 및 전망에 활용되고 있다. 한국은행의 기업경기실사지수는 OECD의 ‘기업경기조사 통일기 준’에 의거 긍정, 보통, 부정 등의 3점 척도를 사용하고 있으며, 긍정적인 응답(증가 또는 호전) 비중과 부정적인 응답(감소 또는 악화) 비중의 차이로 산출된다. 이와 같이 산출된 BSI는 0에서 200의 값을 가지는데 100을 넘어서면 긍정적으로 응답한 업체 수가 부정적 으로 응답한 업체 수보다 많음을 나타낸다. 즉 경기를 좋게 보고 있는 업체 수가 상대적으 로 많음을 의미한다. BSI = [(긍정적 응답업체 수 - 부정적 응답업체 수)/전체 응답업체 수] × 100 + 100',
  },
  '기업공개': {
    title: '기업공개',
    content: '기업공개(IPO; Initial Public Offering)란 넓은 의미로는 기업의 전반적 경영내용을 공 개하는 것을 의미하며 좁은 의미로는 주식을 다수의 투자자들에게 분산 매각하는 것을 말 한다. 즉 주식회사가 신규 발행 주식을 다수의 투자자로부터 모집하거나 이미 개인이나 소수 주주에게 발행되어 소유구조가 폐쇄적인 기업이 일반에 주식을 분산 매출하고 증권 거래소에 상장하여 거래되도록 하는 것을 말한다. 기업공개는 주주의 분산투자 촉진 및 소유분산, 자금조달능력의 향상, 주식가치의 공정한 결정, 세제상 혜택 등의 장점을 가지 고 있다. 공개절차를 간단히 살펴보면 기업공개를 추진하는 기업은 먼저 금융위원회에 등 록하고 증권선물위원회가 지정하는 감사인에게 최근 사업연도 재무제표에 대한 회계감사 를 받아야 한다. 그리고 대표주관회사를 선정하고 수권주식수, 1주의 액면가액 등과 관련 한 정관개정 및 우리사주조합 결성 등의 절차를 진행한다. 이후 금융위원회에 증권신고서 제출, 청약·배정·주금납입, 자본금 변경 등기, 금융위원회에 증권 발행실적 보고서 제출 등의 절차를 거쳐 한국거래소에 상장신청을 마치면 공개절차가 마무리된다.',
  },
  '기업분할(물적분할, 인적분할)': {
    title: '기업분할(물적분할, 인적분할)',
    content: '기업분할이란 회사의 특정사업부를 분할하여 새로운 회사를 설립하는 것을 의미한다. 기 업분할은 특정사업부분의 전문화, 기업가치 제고, 특정사업부문 매각을 통한 재무상태 개 선 등을 목적으로 한다. 기업분할은 크게 물적분할과 인적분할의 두 가지 형태로 나뉘어 진다. 인적분할은 존속회사의 주주들이 자신이 보유한 지분 비율에 따라 신설법인의 주식 을 비례적으로 나누어 갖는 방식이다. 인적분할의 경우 신설회사는 기존회사에서 완전하 게 분리되어 경영의 독립성 확보가 가능하게 된다. 한편 물적분할은 신설된 법인의 주식 을 모회사가 전부 소유하는 방식으로서 분할하는 것을 말한다. 물적분할의 경우 모회사의 신용도를 이용한 원활한 자금조달, 자회사 매각을 통한 용이한 투자금 회수 등의 장점이 있으나 기존 주주들은 신설회사의 주식을 직접 소유하지 않고 기존회사를 통해 간접적으 로 소유하게 되면서 소액주주의 주식평가가치의 하락이 나타날 가능성이 있다.',
  },
  '기업심리지수(CBSI)': {
    title: '기업심리지수(CBSI)',
    content: '기업심리지수(CBSI; Composite Business Sentiment Index)는 기업경기실사지수(BSI)의 주요 지수를 이용하여 산출한 지표이다. 제조업의 경우 업황, 생산, 신규수주, 제품재고, 자 금사정의 BSI 수치를 합성하여 작성하며, 비제조업의 경우는 업황, 매출, 채산성, 자금사 정의 BSI 수치를 합성하여 작성한다. CBSI는 100보다 클 경우 경제상황에 대한 기업들의 기대심리가 과거 평균보다 낙관적임을 나타내며, 반대로 100보다 작을 경우에는 비관적임을 의미한다.',
  },
  '기업어음(CP)': {
    title: '기업어음(CP)',
    content: '기업어음(CP; Commercial Paper)은 신용상태가 양호한 기업이 상거래와 관계없이 운 전자금 등 단기자금을 조달하기 위하여 자기신용을 바탕으로 발행하는 융통어음을 의미 한다. 따라서 상거래에 수반되어 발행되는 상업어음(commercial bill, 진성어음)과는 성 격이 다르지만, 법적으로는 상업어음과 같은 약속어음으로 분류된다. CP는 발행절차가 간편하고 통상 담보없이 신용으로 발행되는 데다 대출대비 금리메리트도 있어 기업의 자 금조달 수단으로 유용하게 활용되고 있다. CP 발행은 민간기업, 공기업, 증권사, 카드사, 특수목적회사(SPC) 등이 담당한다. CP의 할인 및 매출은 주로 증권회사가 담당한다. 한 편, 은행, 자산운용회사 및 보험회사 등의 CP 할인은 활발하지 않다. 은행의 경우 CP 할 인이 대출로 간주되어 동일인 여신한도의 제한(자기자본의 20%)을 받는 데다 당좌대출, 상업어음할인 등 다양한 형태로 기업에 단기자금을 공급할 수 있기 때문이다. CP의 주요 매입주체는 자산운용회사의 MMF, 은행신탁, 증권신탁 등이다.',
  },
  '기업회생절차': {
    title: '기업회생절차',
    content: '기업이 자력으로 회사를 꾸려가기 어려울 만큼 부채가 많을 때 법원에서 지정한 제3자가 자금을 비롯하여 기업활동 전반을 관리하는 것을 말한다. 이는 재정적 어려움으로 파산에 직면하였으나 회생 가능성이 있는 기업의 경우에는 기업에 대한 채권자, 주주, 기타 이해 관계인의 이해를 조정하여 정리재건을 도모하는 제도이다. 부도 위기에 몰린 기업을 파산 시키는 것보다는 살리는 것이 기업과 채권자에게는 물론 국민경제 전반에 이롭다는 점이 이 제도의 취지이다. 기업이 회생절차를 신청할 경우 법원은 기업에 대한 채권, 채무이행 을 동결시킨 다음 3개월 정도의 시간을 갖고 회생신청을 받아들일지, 기각할지를 결정한 다. 회생신청이 기각되면 기업은 파산절차에 들어가고, 수용되면 법원이 선임한 관리인이 기업의 경영을 책임지게 된다.',
  },
  '기저효과': {
    title: '기저효과',
    content: '기저효과(Base Effect)는 경제지표 증가율을 해석할 때 기준시점과 비교시점의 상대적인 위치에 따라서 경제 상황에 대한 평가가 실제보다 위축되거나 부풀려지는 등의 왜곡이 일 어나는 것을 말한다. 즉 호황기의 경제 상황을 기준시점으로 현재의 경제 상황을 비교할 경우 경제지표는 실제보다 위축된 모습을 보이는 반면, 불황기의 경제 상황을 기준시점으 로 비교하면 경제지표가 실제보다 부풀려져 나타날 수 있다. 기저효과는 물가상승률을 설 명할 때도 자주 이용된다. 예를 들어 지난해 여름에 태풍 피해로 농산물가격이 급등하였 다면, 전년동기대비로 계산한 올해 여름의 농산물가격 상승률은 상대적으로 낮게 나타날 것이다. 반대로 지난해 가을 기상여건 호조에 따른 공급과잉으로 과일가격이 폭락하였다 면 올해 가을의 과일가격 상승률은 높은 수준을 보일 가능성이 크다. 따라서 경제지표를 보다 정확히 해석하기 위해서는 기준시점에 특수한 상황이 발생했는지 살펴보고, 그로 인 해 비교시점의 지표가 어떤 영향을 받고 있는지 고려할 필요가 있다.',
  },
  '기준순환일': {
    title: '기준순환일',
    content: '기준순환일이란 경기변동 과정에서 국면전환이 이루어진 일자를 의미한다. 즉 경기가 확 장국면에서 수축국면으로 전환하는 경기정점 또는 수축국면에서 확장국면으로 전환하는 경기저점의 구체적인 일자를 말한다. 경기변동은 이론적이고 추상적인 개념이기 때문에 현실적으로는 생산, 소비, 투자, 고용 등 경기변동 상황을 비교적 잘 반영하는 여러 지표 를 통계적으로 가공한 후 그 움직임을 파악하여 판단한다. 그러나 이러한 경기변동의 실 증적 연구는 분석 방법에 따라 결과가 다양하게 나오는 경우가 일반적이다. 이러한 점을 고려하여 각국의 통계 당국은 여러 측면을 살펴보고 하나의 기준순환일을 공식적으로 정 하고 있다. 우리나라에서는 통계청이 기준순환일을 월 단위로 발표하고 있다. 기준순환일 은 경기변동이라는 추상적 개념을 현실적인 경제의 움직임과 구체적으로 연결시켜주는 매우 중요한 고리의 역할을 한다. 기준순환일이란 용어가 언제부터 쓰이게 되었는지는 분 명하지 않으나 문헌상으로는 1940~50년대 미국경제연구소(NBER; National Bureau of Economic Research)에서 발간한 경기변동관련 연구로부터 유래한 것으로 추정된다.',
  },
  '기준환율': {
    title: '기준환율',
    content: '기준환율이란 일반적으로 “다른 외국 통화 환율 결정의 기준이 되는 특정 통화의 환율” 을 의미한다. 우리나라의 경우 원/달러 환율이 기준환율이며 원/엔, 원/유로, 원/파운드 등 여타 각국 통화의 환율은 원/달러 환율과 각국 통화의 대미달러화 환율을 기초로 하 여 자동적으로 산출(재정환율)된다. 한편 기준환율은 외국환은행이 고객과 원화를 대가로 미 달러화를 매매할 때 기준이 되는 환율(매매기준율)을 의미하기도 한다. 매매기준율은 외국환중개회사를 통해 전 영업일 거래된 은행 간 원/달러 현물환거래 중 익일물(value spot)의 거래환율을 거래량으로 가중평균하여 결정되며, 현재 서울외국환중개회사가 원/ 달러 및 원/위안 기준환율과 55개 재정환율을 매일 아침 고시하고 있다. 한편 각 은행, 환 전상 등이 고객에게 자국 통화와 외국 통화를 매입/매도하는 거래에서 적용하는 대고객환 율은 기준환율에다 외환 환전 업무에 소요되는 리스크, 업무 처리 비용, 수익 등을 종합적 으로 반영하여 자체적으로 정하게 되므로 기관마다 조금씩 다르게 된다.',
  },
  '기초가격': {
    title: '기초가격',
    content: '기초가격(Basic Price)은 일정 기간 동안 경제주체가 생산한 생산물을 가격으로 평가함에 있어 생산자가격에서 부가가치세와 같은 생산물세(production tax)를 제외하고 정부에 서 주는 보조금(subsidy)을 더한 가격을 의미하는 것으로 순수하게 생산자(주로 기업)가 갖게 되는 몫을 말한다. 일반적으로 생산물을 최종 소비하는 소비자가 지불하는 가격 즉, 구매자가격에는 생산물세와 보조금, 운수비용, 거래마진 등이 모두 포함되어 있으며, 생 산자가격은 기초가격에다 생산물세를 더하고 보조금을 차감한 가격을 말한다. 예를 들어 정부가 국민 건강증진의 일환으로 축산농가를 지원하기 위해 우유 1병에 50원의 보조금 을 주며 100원의 생산물세와 200원의 거래마진이 발생한다고 가정하자. 또한 이 우유가 상점에서 1,000원에 판매되고 있다고 하자. 이 경우 구매자가격은 소비자가 지불하는 가 격 1,000원이며, 생산자가격은 구매자가격 1,000원에서 유통업자의 몫인 거래마진 200 원을 뺀 800원이고, 기초가격은 생산자가격 800원에서 정부에 납부하는 세금 100원을 차감하고 정부로부터 받은 보조금 50원을 더한 750원이 된다. GDP를 추계할 때 생산물 의 가격평가는 기초가격으로 하는 것을 원칙으로 하는데, 그 이유는 생산성 분석 등에 세 금 등으로 인해 초래되는 분석결과의 왜곡을 피하기 위해서다.',
  },
  '기축통화': {
    title: '기축통화',
    content: '기축통화란 여러 국가의 암묵적인 동의하에 국제거래에서 중심적인 역할을 하는 통화를 지칭한다. 구체적으로는 ① 국제무역결제에 사용되는 통화 ② 환율 평가 시의 지표가 되 는 통화 ③ 대외준비자산으로 보유되는 통화 등의 의미를 포함한다. 그러므로 어떤 나라 의 통화가 기축통화가 되기 위해서는 세계적으로 원활히 유통될 수 있도록 유동성이 풍 부하여야 하고, 거래당사자들이 믿고 사용할 수 있도록 신뢰성을 갖추어야 하며, 국제적 으로 경제력은 물론 정치력·군사력까지 인정받는 국가의 통화여야 한다. 20세기 초반까 지는 세계 금융경제의 중심이었던 영국의 파운드화가 기축통화로서 국제거래에 주로 이 용되었으며, 2차 세계대전 이후에는 전 세계 외환거래 및 외환보유액의 상당 부분을 차 지하는 미국 달러화가 기축통화로 인정받고 있다. 한편 현재 국제거래에서 비교적 자주 사용되는 통화로는 미국 달러화 이외에도 유로화, 영국 파운드화, 일본 엔화, 스위스 프랑 화 등이 있는데 이들을 흔히 교환성 통화라 한다.',
  },
  '기타기본자본(Additional Tier 1)': {
    title: '기타기본자본(Additional Tier 1)',
    content: '기타기본자본(AT1; Additional Tier 1)은 바젤Ⅲ 자본규제에서 기본자본(Tier 1)을 구성 하는 요소로서, 은행의 계속적인 영업을 전제로 손실흡수능력이 있다고 인정되는(혹은 은 행의 손실을 보통주자본 다음의 순서로 보전할 수 있는) 자본을 의미하며 영구적 성격을 지닌 자본증권의 발행으로 인한 자본금·자본잉여금 등이다. 기타기본자본증권으로 인정 받기 위해서는 예금자, 일반 채권자 및 후순위채권보다 후순위일 것, 영구적일 것, 배당 및 이자지급의 임의성, 중도상환 유인이 없을 것 등의 요건을 충족해야 한다(참고 「은행업 감독업무시행세칙」별표 3).',
  },
  '기펜재': {
    title: '기펜재',
    content: '일반적으로 재화는 수요의 법칙에 따라 가격이 하락하면 수요량이 늘어난다. 그러나 예 외적으로 재화의 가격이 하락할 때 수요량이 감소하는 현상을 관찰할 수 있다. 이렇게 가 격이 하락할 경우 수요의 법칙에 위배되는 재화를 영국 경제학자 기펜(R. Giffen)의 이름 을 따라 기펜재라고 부른다. 기펜재는 열등재의 일종이다. 소득이 증가함에 따라 수요가 감소하는 재화를 열등재라 하는데, 열등재 중에서도 열등성이 매우 커서 소득효과가 가격 하락에 따른 수요량 증가의 대체효과를 초과하여, 결과적으로 가격이 하락할 때 수요량이 감소되는 것으로 분석할 수 있다. 가격이 상승할 경우에는 반대의 방향으로 설명할 수 있다.',
  },
  '기회비용': {
    title: '기회비용',
    content: '인간의 욕구에 비해 자원이 부족한 현상을 희소성이라고 한다. 희소한 자원을 가지고 인 간의 모든 욕구를 충족시킬 수 없기 때문에 인간은 누구든지 부족한 자원을 어느 곳에 우 선으로 활용할 것인가를 결정하는 선택을 해야 한다. 즉 다양한 욕구의 대상들 가운데서 하나를 고를 수밖에 없다. 이때 포기한 선택의 욕구들로부터 예상되는 유·무형의 이익 중 최선의 이익을 기회비용(Opportunity Cost)이라고 한다. 자원의 희소성이 존재하는 한 기회비용은 반드시 발생하게 되고 이는 경제문제를 발생시키는 근본요인이 된다. 기업은 투자를 선택할 경우 포기한 나머지 선택의 가치인 투자금액의 은행예금 이자 등이 기회비 용이 된다.',
  },
  '기후테크': {
    title: '기후테크',
    content: '기후테크(Climate Tech)는 기후 변화 문제를 해결하거나 완화하기 위한 기술을 말한다. 현재 태양광 및 풍력 등 청정에너지 개발, 탄소 포집 및 저장, 전기차 및 수소차 등 친환경 이동수단, 데이터/AI 기반 기후 솔루션, 기후 리스크 분석 플랫폼 등 다양한 분야에서 기 후테크 발전이 이뤄지고 있다. 기후테크는 폭염, 홍수, 가뭄 등 갈수록 심해지는 기후 위 기를 완화하기 위한 필수적 수단인 데다 글로벌 환경규제 강화 추세에 대비한 신성장 산 업으로도 부상하고 있다. 따라서 각국 정부와 기업은 기후테크에 대한 투자를 강화하여 에너지 안보와 경제시스템 전환을 동시에 달성하고자 노력하고 있다.',
  },
  '긴급수입제한조치': {
    title: '긴급수입제한조치',
    content: '긴급수입제한조치(Safeguard) 즉, 세이프가드란 특정 품목의 수입이 급증하여 국내 업체 에 심각한 피해가 발생하거나 그럴 우려가 있을 경우, 수입국이 관세 인상이나 수입량 제 한 등을 통해 수입품에 대한 규제를 할 수 있는 제도이며 무역장벽의 하나라고 볼 수 있 다. 현재 세계무역기구(WTO; World Trade Organization)는 가입국들이 긴급수입제한 조치를 실행할 권리를 인정하고 있다. 수입물품에 대한 수량제한, 관세율 조정 및 국내산 업의 구조조정을 촉진하기 위한 지원정책 등이 세이프가드로 동원될 수 있다. 그러나 세 계무역기구의 세이프가드 협정은 제한적으로 취해져야 하고 세이프가드를 실시하는 수입 국은 해당 물품의 수출국에 적절한 보상을 해줄 것을 권고하고 있다.',
  },
  '긴축정책': {
    title: '긴축정책',
    content: '경기과열 우려가 있는 경우 재정 또는 통화정책으로 가계, 기업, 정부 등 각 경제주체들의 재화 및 서비스에 대한 수요, 투자 의지를 위축시켜 지출을 줄이는 등 경기의 과열을 방지 하려는 정책을 긴축정책(Contractionary Policy)이라고 한다. 경기가 과열되어 물가급등 에 대한 염려가 커지면 정부나 지방자치단체는 예산을 편성·실행함에 있어서 지출을 삭 감·억제함과 동시에 공채의 정리 및 신규 모집을 하지 않는 정책을 취한다. 세입 일부를 다음 연도로 이월하거나 공정이율의 인상을 중심으로 하는 금융긴축 조치 등도 시행된다. 한편 중앙은행은 물가급등에 대한 우려가 커지면 시중에 유통되는 통화량을 줄이거나 금 리를 인상한다. 이렇게 되면 경제주체들의 지출이 줄어들면서 국민소득이 감소하고 지출 축소와 소득 감소의 연쇄 과정이 발생하면서 물가도 하락하게 된다.',
  },
  '꼬리위험': {
    title: '꼬리위험',
    content: '경제성장률이나 주가, 환율 등 시장가격변수 분포의 꼬리부분 이벤트가 발생할 위험을 꼬 리위험(Tail Risk)이라고 한다. 양극단 꼬리부분에 해당하는 이벤트는 발생 가능성은 매우 낮지만 일단 발생하면 경제 전체에 지대한 영향을 줄 수 있는 위험이다.',
  },
  '낙수효과': {
    title: '낙수효과',
    content: '정부가 경제정책으로 대기업과 고소득층 또는 부유층의 소득과 부를 먼저 늘려주게 되면 이들의 소비와 투자 증가를 통해 전체 경제활동이 활발해지면서 결국에는 중소기업과 저 소득층도 혜택을 볼 수 있다는 주장이다. 이러한 주장은 분배와 형평성보다는 성장과 효 율성을 중시하는 논리에 근거한다. 실제로 미국에서는 제41대 대통령인 부시가 1989년 부터 1992년까지 낙수효과(Trickle-Down Effect)에 기반을 둔 경제정책을 채택하기도 했다. 그러나 1993년 1월 당선된 클린턴 행정부는 이를 뒷받침하는 근거가 없다는 이유 를 들어 이전의 정책을 포기한 바 있다. 2015년 국제통화기금(IMF)은 선진국, 신흥국 및 개발도상국을 대상으로 한 연구(“Causes and Consequences of Income Inequality: A Global Perspective”, IMF 2015년 6월)를 통해 상위소득 20% 계층의 비중이 커질수록 경제성장률이 낮아진다는 실증분석 결과를 발표하였는데, 이는 낙수효과가 현실에서 작 동하지 않을 수 있음을 시사한다.',
  },
  '낙인효과': {
    title: '낙인효과',
    content: '범죄학의 낙인이론에 따르면 일탈 또는 범죄 행동은 관련 주체의 독자적 행동에 의해서도 발생하지만, 해당 행동에 대한 사회적 평가 또는 해당 행동을 한 주체의 사회적 소외의 결 과로도 발생할 수 있다. 어떤 사람이 실수나 불가피한 상황에 의해 사회적으로 바람직하 지 못한 행위를 한 번 저지르고 이로 인해 나쁜 사람으로 낙인찍히면 그 사람에 대한 부정 적 인식이 형성되고 이 인식은 쉽게 사라지지 않는다. 이로 인해 추후 어떤 상황이 발생했 을 때 해당 사람에 대한 부정적 사회인식 때문에 유독 그 사람에게 상황이 부정적으로 전 개되어 실제로 일탈 또는 범죄행위가 저질러지는 현상을 낳는데, 이를 낙인효과라고 한 다. 경제 분야에서도 이러한 현상이 발생한다. 예를 들어, 과거에 한 번 부도를 일으킨 기 업이나 국가의 경우 이후 건전성을 회복했다 하더라도 시장의 충분한 신뢰를 얻기 어려워 지며, 나아가 신용위기가 발생할 경우 투자자들이 다른 기업이나 국가보다 해당 기업이나 국가를 덜 신뢰하여 투자자금을 더 빨리 회수하고 이로 인해 실제로 해당 기업이나 국가 가 위기에 빠질 수 있다.',
  },
  '난외거래': {
    title: '난외거래',
    content: '은행의 권리·의무가 확정되지 않아 재무상태표상(on-balance sheet) 자산·부채로 기록 되지 않는 거래를 의미한다. 대표적인 난외(off-balance sheet)거래로는 신용 대체거래 (예: 채무보증), 특정 거래 관련 우발채무(예: 계약이행보증, 입찰보증, 환급보증 등), 무역 금융(예: 신용장), 증권인수보증(NIF; Note Issuance Facility), 금리 및 외환 관련 파생 상품거래의 신용리스크 상당액 등을 들 수 있다. 이러한 난외거래는 보증료 등을 통해 은 행의 수익성에 기여하고 효율적인 리스크 이전을 가능하게 해주는 등의 장점이 있지만 복잡한 거래구조 등으로 인하여 방만하게 취급될 경우 리스크 요인으로 작용할 수 있다. 따라서 감독당국은 최근 난외거래에 대한 감독을 강화하고 있으며 바젤은행감독위원회 (BCBS)도 자기자본비율 규제시 난외자산을 위험가중자산에 포함시켜 적절한 자기자본을 유지하도록 하고 있다. 납부자자동이체 납부자자동이체(Standing Order)는 은행지로 업무의 한 형태로 고객이 거래은행이 아닌 다른 은행에 대출원리금, 정기적금 등을 정기적으로 납부할 때 거래은행의 본인계좌에서 다른 은행으로 자동 이체시켜 주는 업무로서 1994년 4월부터 실시되었다. 납부자자동이 체는 주로 대출원리금, 적금 납입금, 신탁적립금, 기타 정기납부금(각종회비, 기부금, 임 차료) 등 정기적인 은행납입금 납부시 이용되고 있다.',
  },
  '내국신용장': {
    title: '내국신용장',
    content: '국내 외국환은행이 수출업자의 의뢰에 따라 수출업자 앞 국제 신용장(Master L/C)을 담 보로 하는 등의 방식으로 국내 제조업자 또는 공급업자 앞으로 발행하는 신용장을 말한 다. 수출업자가 수출용 수입원자재와 국내에서 생산된 수출용 원자재 또는 수출용 완제품 을 구매하는 경우에 외국환은행이 동 물품대금의 지급을 보증하는 지급보증서의 일종이 다. 국제간에 이용되는 신용장과 유사하나 내국신용장은 국내거래에만 사용 가능하며 거 래 시 수출용임이 입증되어야 한다. 거래당사자로는 개설의뢰인(물품수요자), 수혜자(물 품공급자), 개설은행 및 매입은행 등이 있다. 내국신용장에 의한 거래는 물품공급대금의 조기회수, 무역금융 융자수혜, 부가가치세 영세율(零稅率) 적용, 무역금융융자대상 수출 실적 인정, 관세환급 등의 장점이 있다. 내국 신용장을 받은 물품공급자는 물품공급 후 판 매대금추심의뢰서를 발행하고 관련 서류를 첨부하여 거래은행에 판매대금 추심을 의뢰함 으로써 일반 상업어음보다는 물품대금을 조기에 회수하게 된다.',
  },
  '내부등급법': {
    title: '내부등급법',
    content: '바젤 자본규제에서 정하고 있는 최소 요건(신용평가 시스템의 신뢰도 확보를 위해 갖추 어야 할 최소한의 양적·질적 요건)을 충족하여 감독당국의 승인을 받은 은행이 자산군별 로 리스크 측정 요소(부도율, 부도시 손실률, 부도시 익스포저 등)를 자체 측정모형을 통 해 추정하고 이를 바젤위원회(BCBS)가 정한 내부등급법 산식에 대입하여 신용리스크 에 대한 위험가중자산을 산출하는 방법을 말한다. 내부등급법은 부도율에 대해서만 자체 추정을 허용하고 나머지 요소들은 감독당국이 정한 값을 사용하도록 하는 기본내부등급 법과 모든 리스크 측정 요소의 자체 추정을 허용하는 고급내부등급법으로 구분된다. 내부 등급법은 바젤Ⅱ부터 자본규제 체계의 리스크 민감도를 높이고 은행의 리스크 관리기법 개선을 촉진할 목적으로 도입되었다. 그러나 리스크 측정모형과 관련된 불확실성으로 인 해 위험가중자산이 잘못 산출될 가능성(모형 리스크)이 존재하는 데다 내부모형의 차이로 인해 은행간·국가간 위험가중자산의 편차가 과도하게 확대되어 자기자본비율 규제의 신 뢰성을 저하시키는 요인이 되었다. 이에 따라 바젤Ⅲ에서는 객관적 리스크 측정이 어렵거 나 자료가 부족하여 은행 자체 모형의 검증이 어려운 자산군에 대해서는 내부등급법 사용 을 제한하는 등 위험가중자산의 편차를 축소하기 위한 조치를 취하였다.',
  },
  '내부자금': {
    title: '내부자금',
    content: '기업은 투자에 필요한 자금을 기업 내부 또는 기업 외부에서 조달하는데, 기업이 투자 재 원을 내부유보, 감가상각충당금 등에서 조달한 것을 내부자금이라고 한다. 그리고 금융기 관 차입, 유가증권 발행, 해외차입 등을 통해 조달한 것을 외부자금이라고 한다. 한편 내 부유보란 기업의 손익거래의 결과로 나타난 잉여금 중 사외유출분을 제외하고 사내에 유 보된 이익잉여금 등을 말하고, 감가상각충당금이란 기계와 같은 유형자산의 대체를 위해 기업이익 중 일부를 비축하는 것을 말하는데 이것이 필요한 이유는 기계와 같은 유형자산 은 생산과정에서 사용되고 시간이 흐르면서 노후화 되어 언젠가는 새로운 자산으로 대체 되어야 하기 때문이다. 내부자금은 조달비용도 들지 않고, 이자나 배당을 지급할 필요도 없는 유리한 자금이다. 통상 고정투자가 활발하지 않을 경우 외부자금 수요가 줄어들면서 기업들의 내부자금 조달 비중이 상대적으로 높아지는 경향을 보인다.',
  },
  '노동생산성/노동생산성지수': {
    title: '노동생산성/노동생산성지수',
    content: '노동자 1인이 일정 기간 동안 산출해 내는 생산량으로 정의된다. 생산활동이 활발하면 노 동생산성 증가율도 높아지는 관계가 있으므로 동 지수의 동향은 생산활동의 흐름을 파악 하는 주요 지표로 이용되고 있다. 한편 임금이 노동생산성보다 더 빠르게 상승하면 단위 노동비용이 증가하기 때문에 기업은 제품가격의 상승 압력을 받게 되고 그 결과 제품의 가격경쟁력이 떨어질 수 있다. 나라 전체로 확대되면 물가상승 압력이 커지면서 다른 나 라에 비해 수출제품의 가격경쟁력이 낮아지게 된다. 노동생산성지수 = 산출량지수/노동투입량지수×100',
  },
  '노동시장 긴장도': {
    title: '노동시장 긴장도',
    content: '노동 수요(기업의 일자리 수)와 노동 공급(일할 사람의 수)의 균형 정도를 나타내는 지표로 서, 일자리에 비해 일할 사람이 얼마나 부족한지 또는 많은지를 보여준다. 노동 수요가 공 급에 비해 많은 경우 노동시장의 긴장도(tightness)는 높아지는데 이때 기업은 사람을 더 뽑고 싶지만 구직자가 부족하게 되어 임금 상승 압력도 높아진다. 반면 노동 수요가 공급 에 비해 적으면 노동시장의 긴장도는 낮아지며 실업자가 많아지고 임금도 정체 또는 하락 할 가능성이 높다. 대표적인 지표로는 구인배수가 있으며 이외에 실업률, 임금상승률 등도 노동시장 긴장도를 파악할 수 있는 지표로 활용된다. 노동시장의 긴장도가 과도하게 높아 지면 임금 인상압력이 누적되면서 물가상승 요인으로 작용할 수 있다. 반면에 노동시장의 긴장도가 과도하게 낮다는 것은 경기가 좋지 않고 실업자가 늘어난 상황을 의미한다.',
  },
  '녹색GDP': {
    title: '녹색GDP',
    content: '일반적으로 녹색GDP(Green GDP)는 한 나라의 국내총생산(GDP)에서 생산활동 중 발 생하는 자연자원의 감소나 환경피해 등의 손실액을 공제한 것으로 이해된다. 이는 기존 의 GDP가 재화와 서비스를 많이 생산할수록 커지는 반면, 생산활동 과정에서 발생하 는 자원고갈, 환경오염 등으로 인해 국민의 후생이 떨어지는 부정적인 효과를 전혀 반영 하지 못하는 데서 대안으로 나온 것이다. 경제와 환경을 아우르는 지속가능한 발전의 개 념이 처음 등장한 것은 1970년대이나 본격적으로 공론화되기 시작한 것은 1990년대 초 반부터로, 2012년 UN은 환경과 경제를 통합적인 관점에서 정량적으로 분석할 수 있는 틀인 환경경제통합계정(SEEA; System of Environmental-Economic Accounting)을 국민계정의 부속계정형태로 채택하고, 2021년 생태계 통계 체계의 표준으로 생태계계정 (EA; Ecosystem Accounting)을 채택 후 각국에 이의 이행을 권고한 바 있다. 현재 우리 나라는 SEEA의 환경보호지출계정을 도입하여 운영 중이다.',
  },
  '녹색기후기금(GCF)': {
    title: '녹색기후기금(GCF)',
    content: '개발도상국의 온실가스 감축과 기후변화 대응을 지원하기 위하여 만들어진 UN 산하의 국제금융기구이다. 유엔기후변화협약(UNFCCC)에 따라 운용되고 있는 기존의 지구환경 기금(GEF; Global Environment Facility)과 적응기금(AF; Adaptation Fund)의 경우 기금 규모가 개발도상국의 수요를 충족하지 못하는 데다 기후변화뿐 아니라 생물 다양성, 수자원 보호 등에도 지원해야 하는 등의 한계가 있었다. 이에 따라 2010년 12월 멕시코 칸쿤에서 개최된 제16차 기후변화 당사국 총회(COP; Conference of the Parties)에서 녹색기후기금(GCF; Green Climate Fund)을 새로 설립하기로 합의하였다. 2012년 카타 르 도하에서 열린 제18차 총회에서 한국의 인천 송도국제도시에 사무국을 설치하기로 확 정하고 2013년 12월에 공식 출범하였다. 2025년 6월 말 현재 회원국으로부터 총 168억 달러의 기금을 조성하였다. 녹색기후기금의 운영을 담당하는 이사회는 24개국으로 구성 되며 선진국과 개발도상국이 동수로 참여하고 있다.',
  },
  '뉴스심리지수(NSI)': {
    title: '뉴스심리지수(NSI)',
    content: '뉴스심리지수(NSI; News Sentiment Index)는 경제분야 뉴스기사에 나타난 경제심리를 지수화한 것이다. 뉴스는 경제상황에 대한 사실과 함께 이와 관련한 긍정 혹은 부정적인 감성을 포함하고 있는데, 이러한 감성이 경제주체의 심리와 연관성이 높아 경기를 파악할 수 있는 유용한 정보를 제공한다. 한국은행은 2022년 1월부터 뉴스심리지수(일별 및 월 별지수)를 개발하여 한국은행 경제통계시스템(ECOS)을 통해 공표하고 있다. NSI는 인터 넷 포털사이트의 경제분야 뉴스기사에서 표본문장을 추출한 뒤 각 문장에 나타난 긍정, 부정, 중립의 감성을 기계학습(machine learning) 방법으로 분류하고 긍정과 부정문장 수의 차이를 계산하여 지수화한 지표이다. NSI는 100보다 크면 뉴스기사에 나타난 경제 심리가 과거 장기평균보다 낙관적인 것으로, 100보다 작으면 비관적인 것으로 해석된다.',
  },
  '단기금융시장': {
    title: '단기금융시장',
    content: '단기금융시장(Money Market)은 금융기관, 기업 등 경제주체들이 단기적인 자금수급 불 균형을 조절하기 위하여 통상 만기 1년 이내의 단기 금융상품을 거래하는 시장이다. 이 시장은 기업의 시설자금이나 장기운전자금 조달을 목적으로 발행되는 주식, 채권 등이 거 래되는 자본시장에 대응하여 자금시장이라고도 불린다. 현재 우리나라 단기금융시장에는 콜시장, 기업어음(CP)시장, 양도성예금증서(CD)시장, 환매조건부증권매매(RP)시장, 전 자단기사채시장, 통화안정증권시장(만기 1년 이내) 등이 있다. 이 시장은 중앙은행의 통 화정책이 파급되는 시발점이 되기 때문에 매우 중요한 시장이다. 중앙은행의 정책금리 변 경은 단기금융시장 금리 변화를 통해 장기금리 및 금융기관 예금·대출금리에 영향을 미치 고 궁극적으로 생산, 물가 등 실물경제에 영향을 미친다. 일반적으로 단기금융시장이 발 달되어 있으면 활발한 재정거래를 통해 통화정책의 파급효과가 원활히 이루어진다. 이외 에도 단기금융시장은 단기자금을 손쉽게 조달하거나 운용할 수 있으므로 경제주체들에게 일시적인 단기자금 수급 불균형에 따른 유동성 관리를 용이하게 해주며, 단기금융상품은 만기가 짧아 장기금융상품에 비하여 금리변동위험이 크지 않고 유동성도 높으므로 금융 상품 보유에 따른 위험을 관리할 수 있는 수단을 제공하기도 한다.',
  },
  '단리/복리': {
    title: '단리/복리',
    content: '단리(Simple Interest)는 원금에 대해서만 약정된 이율과 기간을 곱하여 이자를 산출하 는 방식이다. 예를 들어 1억원을 만기 2년, 연 3%에 단리로 정기예금을 하는 경우 2년후 원리금은 106백만원[100백만원(1+3%×2)]이다. 이때 실효수익률은 연 3%(6%/2)로 표 면금리와 동일하다. 반면 복리(Compound Interest)는 일정 기간마다 발생한 이자를 원 금에 합산한 후 그 합산금액에 대한 이자를 다시 계산하는 방식이다. 예를 들어 1억원 을 만기 2년, 연 3%에 6개월 복리(6개월마다 이자를 원금에 가산)로 정기예금을 하는 경 우 2년후 원리금은 106.14백만원[100백만원(1+3%/2)^4]이다. 이 경우 실효수익률은 연 3.07%(6.14%/2)이다. 위 예에서는 복리로 예금했을 때 단리보다 14만원의 이자를 더 받 게 된다. 복리효과는 간단히 말해 이자가 이자를 낳는 원리이기 때문에 시간이 지날수록 추가되는 이자부분이 커지면서 전체 저축 원리금이 기하급수적으로 늘어나는 원리이다. 따라서 저축기간이 짧으면 복리효과가 크지 않은 반면 저축기간이 길면 길수록 약간의 금 리 차이(복리가 단리보다 높으므로)에도 이자금액이 크게 벌어지게 된다. 복리에서는 72 법칙이라는 것이 있다. 이자가 복리로 붙을 경우 원리금이 커지기 때문에 원리금이 두 배 (100%)로 불어나는데 필요한 저축기간과 수익률의 곱이 100%가 아니라 72%만 되면 된 다는 것이다. 위 예에서 보면 1억원을 2억원으로 불리는데 걸리는 기간은 단리의 경우 약 33년(100백만원/3백만원)이 소요되는 반면 복리의 경우 24년(72%/3%)이 소요되어 1억 원을 2억원으로 불리는데 걸리는 기간이 복리가 단리보다 9년이나 짧다. 우리가 꾸준한 저축을 강조하는 이유는 저축의 경제적 성과 뒤에는 복리효과가 숨어있기 때문이다.',
  },
  '단위노동비용': {
    title: '단위노동비용',
    content: '단위노동비용이란 산출물 한 단위를 생산하는데 소요되는 노동비용을 말한다. 일반적으 로 단위노동비용은 상품의 국제경쟁력을 비교하는 데 있어 중요한 지표가 된다. 국제경쟁 력은 가격경쟁력과 기술수준이나 브랜드 등 비가격경쟁력으로 나누어 볼 수 있는데 단기 적으로는 수출상품의 가격경쟁력이 바로 해당 상품의 국제경쟁력을 결정한다고 볼 수 있 다. 한편 단위노동비용은 임금과 노동생산성의 밀접한 관계로 표시할 수 있는데, 이는 다 음을 보면 쉽게 알 수 있다. 단위노동비용 = 노동비용 총산출량 = 시간당 노동비용×총노동시간 총산출량 = 시간당 노동비용 총산출량/총노동시간 = 시간당 노동비용 노동생산성 이 관계로부터 시간당 노동비용(임금)의 상승 또는 노동생산성의 악화는 단위노동비용을 증가시키며, 반대로 임금의 하락 또는 노동생산성의 개선은 단위노동비용을 감소시키는 효과를 갖는다는 것을 알 수 있다.',
  },
  '단일금리방식/복수금리방식': {
    title: '단일금리방식/복수금리방식',
    content: '경쟁입찰에 따른 발행금리 결정방식에는 복수금리(Conventional)방식과 단일금리 (Dutch)방식이 있다. 복수금리(가격)방식은 각 낙찰자가 입찰시 제시한 금리(가격)를 발 행금리(발행가격)로 하는 방식이며, 단일금리(단일가격)방식은 각 낙찰자가 입찰시 제시 한 금리(가격) 중 최고금리(최저가격)를 발행금리(발행가격)로 하는 방식이다. 유동성 흡 수 시에는 금융기관의 자금운용을 제약한다는 점을 고려하여 금융기관에 유리하게 단일 금리방식을 적용하는 반면 유동성 지원 시에는 금융기관의 입찰 독려를 위해 유인을 제공 할 필요가 없으므로 복수금리결정방식을 적용하는 경향이 있다. 현재 통화안정증권 발행 시 입찰시행 전에 발행금리 결정방식을 공고하고 있으며 입찰참가자에게 더욱 유리한 단 일금리방식을 주로 사용한다. 그리고 공개시장운영 수단으로 환매조건부증권(RP) 매매를 경쟁입찰 방식으로 진행할 경우 RP매각 시에는 단일금리방식을, RP매입 시에는 복수금 리방식을 주로 사용하고 있다.',
  },
  '당일결제/익일결제/익익일결제': {
    title: '당일결제/익일결제/익익일결제',
    content: '70%이면 금융기관으로부터 3억 5천만원의 주택담보대출을 받을 수 있다. 「은행업감독업 무시행세칙」에서는 “담보인정비율 = [(담보대출금액+선순위채권+임차보증금 및 최우선 변제 소액임차보증금)/담보가치×100” 방식으로 산정하도록 하고 있다. 여기서 담보가치 는 ① 국세청의 기준시가 ② 감정평가법인 등의 감정평가액 ③ 한국부동산원의 층별ㆍ호 별 격차율 지수로 산정한 가격 ④ KB부동산시세의 ‘일반평균가’ 중 금융기관 자율로 선 택하여 적용한다. 당초 LTV 규제는 은행권을 중심으로 내규에 반영하여 자율적으로 시행 해 오다가 금융기관의 경영 안정성 유지, 부동산 투기 억제 등을 위한 주택담보대출 규모 의 관리 필요성이 제기되면서 2002년 9월 감독규제 수단으로 도입되었다. 이후 가계부채 증가 억제 및 부동산경기 조절 등 거시건전성정책 수단으로 활용되고 있으며, 주택 소재 지(규제·비규제), 차주 특성(무주택·다주택·생애최초 등) 및 대출목적(주택구입·임대사업 등)별로 세분화하여 차등 적용되고 있다. 한편, 금융기관은 주택담보대출 취급시 담보인 정비율(LTV)과 함께 차주의 부채상환능력을 나타내는 총부채상환비율(DTI), 총부채원리 금상환비율(DSR) 등도 고려하여 대출규모를 결정한다.',
  },
  '대기성 여수신제도': {
    title: '대기성 여수신제도',
    content: '대기성 여수신제도(Standing Facilities)는 금리 중심 통화정책 운영방식 하에서 단기시 장금리의 과도한 변동을 억제하기 위한 정책수단이다. 대기성 여신제도는 중앙은행이 차 입기관의 자금사정이나 자금용도 등에 대한 제한 없이 단기자금을 제공하되 시장금리보 다 다소 높은 금리로 제공하는 담보대출제도를 말한다. 차입은행이 기본적인 자산건전성 등의 요건을 충족하는 한 차입수요에 따라 제한 없이 자금을 공급한다는 점에서 금융기관 의 단기 유동성 부족을 해소하는 안전판 기능을 수행한다. 따라서 대기성 여신제도 하에 서 단기시장금리는 대기성 여신금리보다 높아지기 어렵기 때문에 대기성 여신금리가 단 기시장금리의 상한기능을 수행한다. 이에 비해 대기성 수신제도는 중앙은행이 은행의 여 유자금을 금액 제한 없이 수신하여 정책금리보다 낮은 금리를 지급하는 제도로서 대기성 수신금리는 단기시장금리의 하한기능을 수행한다.',
  },
  '대량지급': {
    title: '대량지급',
    content: '대량지급(Direct Credit)은 은행지로 업무의 한 유형으로서 급여, 연금, 배당금 등과 같이 일시 또는 정기적으로 발생하는 다수의 고객을 대상으로 동시에 이루어지는 거래를 위하 여 공공기관이나 대기업 등 이용기관의 예금계좌에서 다수의 수취인 예금계좌로 지정된 날짜에 자금을 이체하는 업무이다. 이를 이용하면 하나의 거래은행을 통해서도 전국 모든 은행의 수취인 예금계좌로 자금을 이체할 수 있다.',
  },
  '대손충당금적립비율': {
    title: '대손충당금적립비율',
    content: '은행을 포함하여 기업이 보유하는 채권 중에서 거래상대방의 부도 등으로 회수가 어려워 손실이 발생할 수 있는데, 이러한 손실을 충당하기 위해 미리 비용으로 처리해서 사내에 유보해둔 자금을 대손충당금이라고 한다. 「은행업 감독규정」에서는 은행들에게 차주의 채무상환능력 등을 감안하여 자산건전성을 분류하고 이에 따라 대손충당금을 적립하도 록 하고 있다. 은행이 적립한 대손충당금을 비교적 회수가 어려운 고정이하여신 금액으로',
  },

    content: '나눈 비율을 대손충당금 적립비율이라고 한다.',

  '대안정기': {
    title: '대안정기',
    content: '2002년 4월 전미경제연구소(NBER; National Bureau of Economic Research) 연례 세미나에서 미국 하버드대 스톡(J. Stock) 교수와 프린스턴대 왓슨(M. Watson) 교수가 주 요국의 경기순환이 달라졌음을 설명하면서 처음 사용한 용어이다. 1980년대 중반 이후 2007년 금융위기 이전까지 약 20년간 일본을 제외한 주요 선진국에서 산출량, 인플레이 션 등 거시변수의 변동성이 크게 감소하면서 경제가 안정을 누린 기간을 지칭한다. 대안 정기(great moderation)는 다양한 원인에서 비롯된 것으로 분석되고 있는데, 2004년 미 국 연준의 버냉키(Ben S. Bernanke) 의장은 ‘대안정기(The Great Moderation)’라는 제 목의 연설에서 “경제제도, 기술, 사업관행, 경제의 구조적인 특징 변화가 경제의 충격을 흡수하는 능력을 향상시켰고, 주요국 중앙은행들이 인플레이션을 잘 통제하는 등 통화정 책의 성과로 경제적 안정이 증대되었으며 경제에 타격을 주는 충격이 적었던 행운도 따랐 기 때문”이라고 지적한 바 있다. 그러나 2008년 글로벌 금융위기가 발생하면서 대안정기 가 허상 혹은 착시였으며 금융시장에 대한 과신과 과잉 레버리지로 위기를 초래하였다는 주장도 제기되었다.',
  },
  '대외지급준비자산': {
    title: '대외지급준비자산',
    content: '대외지급준비자산이란 한 나라의 통화 당국이 경제에 큰 영향을 미치지 않고 언제든지 대 외 지급에 충당할 수 있도록 보유하고 있는 준비자산(금, SDR, IMF position 및 보유 외 화)을 말한다. 대외지급준비자산은 외국 채권자가 받아들일 수 있는 수용성, 외국 화폐단 위로서 표현될 수 있는 가치의 확실성, 통화 당국이 즉각 활용할 수 있는 유동성을 갖추어 야 한다. 한편 중앙은행이나 정부가 국제수지 불균형 보전이나 외환시장 안정을 위해 언 제든지 사용할 수 있도록 보유하고 있는 대외지급준비자산을 외환보유액이라고 한다. 외 환보유액은 긴급 시 국민경제의 안전판일 뿐만 아니라 환율을 안정시키고 국가 신인도를 높이는 데 기여한다. 외환보유액을 산출하는 방식은 국가별로 상이한데, 대체로 우리나라 와 대다수 선진국에서는 공적 외환당국이 보유한 순외화자산만을 계상하고 있다.',
  },
  '대체비용리스크': {
    title: '대체비용리스크',
    content: '미래 특정일자에 종료될 거래의 상대방이 거래를 취소하거나 파산할 경우, 결제일 전에 결제가 이행되지 못할 가능성을 감안하여 다른 거래로 대체하는 과정에서 발생할 비용 리스크를 의미한다. 거래 당사자는 상대방의 거래 취소 또는 부도 등으로 자신의 포지션 을 헤지하지 못하거나 현재 포지션에서 발생하는 미실현 이익을 얻지 못할 수 있으며 이 에 따른 리스크 노출액은 현행 시장가격으로 원거래를 대체하는데 드는 비용과 동일하다. 한 예로 외환거래의 최종결제 이전에 거래상대방이 거래를 취소하거나 파산할 경우 해당 거래를 다른 거래로 대체하는 과정에서 불리한 환율 변동으로 인해 비용이 발생할 리스크 를 들 수 있다. 다른 예를 들면, A은행이 B은행과 금리파생상품을 계약하고 동 거래를 헤 지하기 위해 C은행과 다른 금리파생상품을 계약하였다가, 결제일 전에 C은행이 파산으로 결제불이행이 발생할 경우 A은행은 대체비용리스크에 직면하게 된다. 2008년 9월 리먼 브라더스사가 파산하면서 결제불이행 사태가 대량으로 발생했던 것이 대표적인 사례이 다. 이와 같이 대체비용리스크는 거래상대방의 거래 취소 또는 부도 등이 빈번한 외환거 래, 파생상품 거래 등에서 주로 발생한다.',
  },
  '대체재': {
    title: '대체재',
    content: '비슷한 만족을 얻을 수 있어 서로 경쟁 관계에 있는 재화 또는 서비스를 말한다. 핫도그와 햄버거, 스웨터와 셔츠처럼 어느 한 제품이 다른 제품을 대신하여 사용할 수 있을 때 이 두 제품은 서로 대체관계에 있다고 한다. 또한 두 제품 중 어느 한 제품의 가격상승이 다 른 재화의 수요증가를 초래할 때 이 두 제품은 서로 대체관계에 있다고 한다. 비싸진 삼겹 살 대신 닭고기를 구매했다면 이들 두 상품은 서로 대체재이다. 다만, 이 같은 구분은 사 람들의 평균적인 소비행태에 기초한 것이므로 사람에 따라서는 다르게 느낄 수도 있다.',
  },
  '대출금 출자전환': {
    title: '대출금 출자전환',
    content: '금융기관이 차주기업에 대한 대출채권을 동 기업의 주식과 교환하는 것으로서 금융기관 의 차주기업에 대한 관계가 채권자에서 주주로 변하게 된다. 금융기관은 기업에 대한 경 영감시기능을 높여 경영정상화 후 배당을 받거나 주식매각을 통한 시세차익을 획득할 수 있으며, 기업은 부채비율 하락과 원리금 상환부담 감소로 경영정상화를 도모할 수 있다. 반면 출자전환 기업이 도산할 경우 출자금 회수가 불가능하게 되어 오히려 금융기관의 부 실화가 가속화 될 수 있을 뿐만 아니라 부실기업의 도산위험이 금융기관에 전가되어 금융 기관의 신인도가 저하될 수 있다는 부정적 측면도 있다.',
  },
  '대출채권 분할매각': {
    title: '대출채권 분할매각',
    content: '대출채권 유동화 방법의 하나로서, 대출을 취급한 금융기관이 대출채권의 전부 또는 일부를 타인(참가자 또는 투자자)에게 매각하는 것을 말한다. 금융기관이 차주와의 채권 채무관 계를 유지한 채 원리금 수취권만을 양도하게 되어 있어 참가자가 대출채권에 대한 위험을 부담하게 된다. 즉 금융기관이 채무자로부터 원리금을 회수하는 경우에 한하여 원리금을 수취할 수 있게 된다. 동 거래는 채권을 처분한 대출 금융기관이 여전히 계약상의 채권자 로 남아 있어, 채무자에게 대출채권 분할매각 사실을 통지하지 않아도 되는 장점이 있다.',
  },
  '도덕적 해이': {
    title: '도덕적 해이',
    content: '도덕적 해이는 거래당사자의 한쪽이 상대보다 양질의 정보를 더 많이 가지고 있는 상태 (정보의 비대칭성)에서 계약이 이루어진 후에 나타날 수 있는 문제이다. 예를 들면 주주 와 전문경영인, 은행과 차입자 간의 계약을 들 수 있다. 전문경영인은 회사의 경영상황에 대해 주주보다 더 많은 정보를 가지고 주주가 아닌 자신의 이익을 극대화하는 경우가 있 을 수 있다. 이를 전문경영인의 도덕적 해이라 한다. 또한 은행으로부터 대출을 받은 차 입자가 계약대로 차입금을 적절한 투자에 사용하는지를 은행이 정확히 확인할 수 없기 때문에 발생하는 문제는 차입자의 도덕적 해이에 해당한다. 도덕적 해이를 해결하기 위 해서는 정보의 비대칭성을 완화하거나, 전문경영인이나 차입자(대리인)의 이해를 주주 나 은행(주인)의 이해와 일치시키는 장치를 마련하는 게 중요하다. 여기서 주인과 대리 인의 이해가 일치하지 않아 발생하는 문제를 주인-대리인 문제 또는 대리인 문제라고 한 다. 한편 정보의 비대칭성 상태에서 계약이 이루어지기 전에 나타날 수 있는 문제로는 역 선택이 있다.',
  },
  '도드-프랭크법': {
    title: '도드-프랭크법',
    content: '동 법은 미국에서 2008년의 글로벌 금융위기가 발생한 이후 이러한 위기의 재발을 방 지하기 위해 오바마 정부가 제안한 내용을 반영하여 2010년 7월에 제정되었으며 1930 년대 대공황기의 금융개혁 이후 가장 광범위한 개혁방안을 담고 있다. 동 법의 공식 명 칭은 「도드-프랭크 월가 개혁 및 소비자보호법(Dodd-Frank Wall Street Reform and Consumer Protection Act)」이다. 동 법안을 입안한 미상원 은행위원회 위원장 크리 스 도드(Chris Dodd)와 미하원 금융서비스위원회 위원장 바니 프랭크(Barney Frank) 의 이름을 따서 명명되었다. 동 법은 금융시스템리스크 예방을 위한 금융안정감시위원회 (Financial Stability Oversight Council) 신설, 금융회사 정리절차 개선, 대마불사(大馬 不死) 관행을 막기 위한 대형 은행의 자본확충 의무화, 금융감독기구별 역할 정비, 금융소 비자 보호 강화를 위한 소비자금융보호국(Bureau of Consumer Financial Protection) 신설, 장외파생금융상품 등에 대한 규제·감독 강화 등 매우 광범위한 금융규제방안을 담 고 있으며, 특히 은행의 자기계정투자(proprietary trading)를 금지하는 볼커룰(Volcker Rule)을 포함하고 있어 1930년대 글래스-스티걸법의 부활이라는 평가를 받고 있다.',
  },
  '독점/과점': {
    title: '독점/과점',
    content: '독점(Monopoly)은 완전경쟁의 정반대인 시장 형태로 어느 기업이 시장의 유일한 공급 자로 그 기업이 공급하는 상품에 밀접한 대체재가 존재하지 않는 경우를 말한다. 독점이 생기는 이유는 생산요소 독점, 생산기술 문제, 정부 규제 등으로 시장에 진입장벽이 존재 하기 때문이다. 독점기업은 시장의 유일한 공급자이기 때문에 시장가격이 한계수입보다 높은 수준에 형성되므로 소비자는 결과적으로 비싼 가격을 지불해야 한다. 독점기업은 소 비자의 지불용의에 따라 같은 재화에 다른 가격을 부과하여 이윤을 증가시킬 수도 있다. 한편, 독점은 아니지만 라면, 아이스크림, 가전제품 시장 등과 같이 시장에 유사하거나 동 일한 상품을 공급하는 공급자가 소수에 불과할 때에는 과점(Oligopoly)이라고 부른다. 과 점시장은 기업들의 의사결정 과정이 서로 연결된 상호의존 관계를 가지는 특징이 있다. 과점시장은 시장에 존재하는 기업의 수, 기업 간 관계의 밀접 정도에 따라 독점시장처럼 될 수도 있고 완전경쟁시장처럼 될 수도 있다. 독점기업이나 과점기업은 마음대로 가격을 올리거나 생산량을 줄여 소비자들에게 피해를 줄 수 있기 때문에 세계 각국에서는 독점이 나 과점을 막기 위해 노력하고 있다. 우리나라에서도 “독점규제 및 공정거래에 관한 법률” 을 통하여 기업들이 시장에서 소비자에 대하여 힘을 남용하고 불공정한 거래행위를 하는 것을 규제하여 경제 전반의 공정하고 자유로운 경쟁을 촉진하고 있다.',
  },
  '동남아시아국가연합(ASEAN)': {
    title: '동남아시아국가연합(ASEAN)',
    content: '동남아시아의 지역협력기구로서 아세안(ASEAN; Association of South-East Asian Nations)이라고도 부른다. 동남아시아 지역협력의 촉진, 외국의 간섭 배제 및 역내 국 가의 평화와 안정 수호, 경제·사회·문화·기술 등 각 분야에서의 상호원조를 설립목적으 로 하고 있다. 회원국은 1967년 8월 창설 당시 필리핀, 말레이시아, 싱가포르, 인도네시 아, 태국 등 5개국이었으나 1984년 브루나이, 1995년 베트남, 1997년 라오스와 미얀 마, 1999년 캄보디아가 차례로 가입하면서 총 10개국으로 늘어났다. 주요 기구로는 정상 회의, 외교장관회의, 상임위원회와 함께 상설 사무국을 인도네시아 자카르타에 두고 있 다. 1997년 창설 30주년을 맞아 공동의 비전으로 ASEAN Vision 2020을 도입하였고 이 에 따라 아세안정치보안공동체, 아세안경제공동체, 아세안사회문화공동체를 축으로 하는 역내 통합을 추구하고 있으며 2015년 12월 아세안경제공동체를 출범시킴으로써 단일시 장 구축을 추진하고 있다. 이와 함께 역외 국가들과도 대화 관계를 수립해 경제·안보·문 화 등의 영역에서 협력을 도모하고 있는데 이러한 대화 상대국은 한국을 비롯하여 미국, 일본, 중국, 러시아, 캐나다, 호주, 뉴질랜드, 인도, EU 등이다.',
  },
  '동남아시아국가연합+한·중·일(ASEAN+3)': {
    title: '동남아시아국가연합+한·중·일(ASEAN+3)',
    content: '한국, 중국, 일본 및 ASEAN 10개국이 합의하여 1999년 출범한 국제회의체이다. 동아시 아 외환위기를 배경으로 위기 극복 및 재발 방지를 위한 통화·금융 협력을 증진하고 경제, 사회·인적자원, 과학·기술, 문화 등 각 분야에서의 협력 관계를 강화하는 데 목적을 두고 있다. 현재 추진하고 있는 주요 과제는 치앙마이 이니셔티브(CMI)에 의한 역내 금융지원 체제의 설립과 개선, 역내 감시체제 강화, 아시아채권시장 육성(ABMI), 중장기과제 연구 및 미래우선협력과제 발굴 등이다. ASEAN+3 산하의 역내 금융지원체제로는 CMI에 의 거 한·중·일 상호 간, 그리고 ASEAN 각국과 한·중·일 3국 간 양자 통화스왑계약이 체결 된 데 이어, 2010년 3월에는 위기대응능력 강화를 위해 기존 양자간 스왑계약체제를 단 일계약에 의한 다자간 스왑계약체제로 전환하는 CMI 다자화 협정(CMIM)의 체결이 이루 어졌다. 역내 감시체제로는 경제동향 검토 및 정책협의(ERPD) 개최, ASEAN+3 거시경제 조사기구(AMRO)의 설립(2011년 4월)이 이루어졌고, 아시아채권시장 육성은 역내 통화 표시 채권의 발행과 수요를 활성화하고 역내 채권시장 인프라를 개선하는 방향으로 추진 되고 있다. ASEAN+3는 정상회의를 정점으로 각 분야별 장관회의, 차관회의 및 실무회의 에서 합의사항을 도출하고 이를 각국이 이행하는 방식으로 운영된다.',
  },
  '동남아시아중앙은행기구(SEACEN)': {
    title: '동남아시아중앙은행기구(SEACEN)',
    content: '회원 간 정보 및 의견 교환, 공동 관심 분야에 대한 조사연구 및 연수 활동을 주요 기능 으로 하는 동남아 중앙은행들의 협력체로서 1966년 2월 동남아 7개국 주도로 출범하였 다. 초기에는 국제통화기금(IMF), 국제부흥개발은행(IBRD), 아시아개발은행(ADB) 등 국 제금융기구에서 회원국의 이익을 대변하는 데 역점을 두었으나 1982년 SEACEN(South East Asian Central Banks) Centre 협정문을 채택한 이후 회원국 간 교류협력 증진과 조 사연구 및 연수 활동에 치중하고 있다. 회원은 출범 당시의 7개국에서 2025년 6월 현재 19개국 중앙은행으로 확대되었다. 조직은 총재회의, 집행위원회, 금융안정담당 임원회 의, 이사회, 국장급 회의와 SEACEN Centre로 구성되어 있다. 말레이시아 쿠알라룸프르 에 있는 SEACEN Centre는 금융경제 이슈에 관한 조사연구, 연수프로그램 수립 및 집행, 회원에 대한 기술지원 및 자문 기능 외에 사무국 역할도 수행하고 있으며 동 센터의 운영 경비는 회원국 균등분담을 원칙으로 하고 있다. 한국은행은 1990년 1월에 가입한 이후 SEACEN 관련 행사 개최 등을 통해 적극 참여하고 있다.',
  },
  '동아시아 외환위기': {
    title: '동아시아 외환위기',
    content: '1997년 태국을 시작으로 인도네시아, 말레이시아, 필리핀, 한국 등 동아시아 국가들에서 발생한 외환위기를 말한다. 1997년 중반 이후 태국의 바트(baht)화 가치가 고정환율제도 포기의 영향으로 폭락하고 그 여파로 인도네시아, 필리핀, 말레이시아의 통화가치가 급락 한 데 이어 11월에는 한국이 환율 급등 및 외화유동성 부족에 직면하는 등 동아시아 국가 들은 외환시장 마비, 급격한 자본유출 등으로 큰 어려움을 겪었다. 이들 국가별 외환위기 의 원인 및 정책 대응은 각국 여건에 따라 상이하기 때문에 일률적으로 규정하기는 어렵 다. 다만 한국을 비롯하여 태국, 인도네시아, 필리핀은 위기 극복과정에서 국제통화기금 (IMF)으로부터 자금지원을 받는 대신 IMF의 정책권고에 따른 데 비해 말레이시아는 IMF 지원을 받지 않고 독자적으로 극복정책을 추진하였다. 이들 국가는 1998년 중반 이후 경 기가 점차 회복되면서 1999년에는 대체로 위기상황으로부터 벗어났다. 한국의 경우 대기 업의 연쇄 부도, 경상수지 적자 확대, 단기외채 급증 등의 대내적 요인 외에 개도국 시장 에 대한 불안감 확산으로 인한 해외 채권자들의 자금회수 등 대외적 요인이 겹치면서 외 화유동성이 크게 부족해지자 1997년 12월 IMF에 구제금융을 신청하여 IMF로부터 195 억 달러, 세계은행(IBRD)과 아시아개발은행(ADB)으로부터 각각 70억 달러와 37억 달러 를 지원받았다.',
  },
  '동아시아·태평양중앙은행기구(EMEAP)': {
    title: '동아시아·태평양중앙은행기구(EMEAP)',
    content: 'EMEAP(Executives’ Meeting of East Asia and Pacific Central Banks)는 동아시아, 태평양 지역 내 중앙은행 간의 협력을 증진하고 회원국의 금융·경제에 관한 정보교환을 위해 1991년 설립된 중앙은행 간 협력체이다. 회원은 한국, 호주, 중국, 홍콩, 인도네시 아, 일본, 말레이시아, 뉴질랜드, 필리핀, 싱가포르, 태국 등 11개국의 중앙은행이다. 초기 에는 임원회의 중심의 비공식적 모임이었으나 급변하는 세계 금융환경하에서 금융위기의 사전예방과 확산방지를 위해 중앙은행 간 긴밀한 정책협조가 필요하다는 공감대가 형성 됨에 따라 실질적인 정책협의체로 발전하고 있다. 주요 활동으로는 역내 금융·경제동향을 모니터링하고 현안에 대해 공동 연구하는 가운데 통화금융안정위원회를 통해 위기관리체 제를 운영하고 있으며, 회원 중앙은행이 출연하여 역내 채권시장에 투자하는 아시아채권 펀드(ABF)를 조성함으로써 역내 채권시장 육성에도 힘쓰고 있다. 조직은 총재회의, 임원 회의, 통화금융안정위원회, ABF 감시위원회, 아시아채권지수펀드(PAIF) 감독위원회 및 실무협의체로 구성된다. 한국은행은 창설회원으로서 모든 회의에 적극 참여하고 있다. 동일인 신용공여한도제(동일인 여신한도제) 특정인에 대한 금융기관의 여신 편중을 억제하기 위한 규제로 우리나라의 경우 은행법 등 에 관련 내용이 규정되어 있다. 은행법 제35조는 동일인(개인·법인 포함) 및 동일차주(동일 인 및 이와 신용리스크를 공유하는 개인·법인)에 대한 신용공여가 각각 해당 은행 자기자 본의 20% 및 25%를 초과할 수 없도록 규율하고 있다. 또한 은행 자기자본의 10%를 초과 하는 동일인·동일차주에 대한 신용공여(거액신용공여)의 합계가 자기자본의 500%를 초과 하지 못하도록 규정하고 있다. 다만 국민경제를 위하여 또는 은행 채권 확보의 실효성을 높 이기 위해 필요한 경우, 은행의 자기자본, 동일차주 구성, 환율 등의 변동, 신용공여를 받은 개별 기업간 합병 또는 영업 양도·양수 등으로 추가 신용공여 없이 한도 초과가 발생하는 경우, 경제여건 급변 등 은행의 귀책사유가 없는 불가피한 사유로 추가 신용공여가 필요한 경우 등에 대해서는 신용공여 한도 적용의 예외를 인정하고 있다. 동일인 등에 대한 신용공 여한도 제도는 바젤위원회(BCBS)가 금융위기 이후 도입한 거액익스포저 규제(우리나라는 2019년 3월부터 시범실시한 이후 2024년 2월부터 시행)와 유사한 제도이다.',
  },
  '동태적 대손충당금 제도': {
    title: '동태적 대손충당금 제도',
    content: '발생주의 대손충당금 회계기준(Incurred-Loss Model)은 대출 원리금 연체 등 신용손실 이 객관적으로 입증되는 경우에만 은행 대출에 대한 대손충당금을 적립하도록 하였다. 동 회계기준 하에서 은행은 경기 호황기에는 연체율이 하락함에 따라 대손충당금 적립액이 감소하고 순이익 및 자본이 증가하는 등 대출여력이 확대되어 대출과 경기가 더욱 확대 되는 반면 불황기에는 반대로 대출여력이 축소되면서 대출과 경기를 더욱 위축시킬 수 있 다. 동태적 대손충당금(DP; Dynamic Provisioning)은 발생손실 기준 대손충당금 회계 기준 하에서 나타나는 은행 대출의 경기순응성을 완화하기 위해 2000년 7월 스페인을 비 롯하여 다수 남미 국가에서 도입된 거시건전성 정책이다. 대손충당금은 대출채권의 연체 등 구체적 손실사건(loss event)에 근거하여 적립되는 특정충당금(specific provisions)과 은행 포트폴리오의 잠재손실 등을 고려하여 결정되는 일반충당금(general provisions) 으로 구분된다. 동태적 충당금 제도는 은행 대출의 경기순응성을 완화하고 대내외 충격에 대한 은행의 복원력을 제고하기 위해 일반충당금을 경기대응적으로 적립하는 방식으로 운영된다. 즉, 경기 호황기에 연체율이 하락하여 특정충당금 규모가 감소하면 일반충당금 규모가 증가하고 불황기에는 반대로 특정충당금 규모가 증가하면 일반충당금 적립 규모 가 감소하도록 설계되어 있다. 이에 따라 호황기에 발생손실을 초과하는 대손충당금을 적 립하도록 함으로써 미래손실에 대한 복원력을 확충하는 한편 급격한 신용팽창을 억제하 고, 불황기에는 미리 적립한 대손충당금을 손실 보전 등에 활용토록 함으로써 급격한 신 용공급의 위축을 완화할 수 있다.',
  },
  '동행종합지수': {
    title: '동행종합지수',
    content: '개별 경제지표로는 파악하기 어려운 국민경제의 총체적인 경기수준을 파악하기 위하여 경기종합지수를 작성한다. 경기종합지수는 선행종합지수, 동행종합지수, 후행종합지수 등 세 종류가 작성되는데 기준년도 수치가 100이 되도록 하여 산출하고 있다. 동행종합 지수는 광공업생산지수, 서비스업생산지수(도소매업 제외), 건설기성액, 소매판매액지수, 내수출하지수, 수입액, 비농림어업취업지수 등 경기순환과 함께 변동하는 7개 개별지표를 가공·종합하여 만들어진다. 다만 현재의 경기상황을 판단하는 데는 동행종합지수에서 추 세변동을 제거한 동행종합지수 순환변동치를 주로 사용한다. 경기종합지수는 경기의 종 합적인 움직임을 가늠할 수 있다는 장점이 있으나 작성상 한계가 있는 만큼 개별 경제지 표의 움직임도 함께 살펴보아야 한다.',
  },
  '듀레이션': {
    title: '듀레이션',
    content: '듀레이션(Duration)이란 채권에서 발생하는 현금흐름의 가중평균만기로 투자자금의 평 균회수기간을 의미한다. 듀레이션은 채권의 현금흐름 발생기간(t)에 각 시점 현금흐름의 현재가치가 채권가격에서 차지하는 비중을 가중치로 곱하여 산출한다. 채권의 발행만기 는 최종 현금흐름 시점을 나타내는 데 비해 듀레이션은 만기 이전에 발생하는 모든 현금 흐름을 감안한 평균회수기간이기 때문에 만기 이전에 현금흐름이 발생하는 이표채권의 듀레이션은 항상 채권의 발행만기보다 짧다. 할인채의 경우 현금흐름이 만기시점에 한번 만 존재하므로 듀레이션과 만기가 같다. 듀레이션은 채권의 만기, 표면금리, 만기수익률 등에 따라 결정된다. 먼저 듀레이션은 일종의 만기 개념이므로 만기에 비례하여 길어진 다. 또한 채권의 표면금리가 높을수록 초기에 많은 금액이 회수되므로 듀레이션은 짧아진 다. 마지막으로 현금흐름의 현재가치를 산정하는 할인율로 쓰이는 만기수익률이 높을수 록 만기에 가까운 현금흐름의 가중치가 상대적으로 작아져 듀레이션은 짧아진다. 한편 듀 레이션은 채권가격의 이자율탄력성을 나타낸다. 즉 듀레이션(D), 채권가격(p), 만기수익 률(r) 사이에는 (dp/p) = -〔dr/(1+r)〕× D의 관계가 성립한다. 따라서 듀레이션은 채권투 자에 따른 이자율위험(시장이자율 변동에 따른 채권가격의 변동률)을 나타내는 척도이자 중요한 리스크 관리수단으로 활용되고 있다.',
  },
  '등록발행': {
    title: '등록발행',
    content: '등록발행이란 채권을 실물발행(physical issue)하지 않고 한국예탁결제원 등 등록기관이 관리하는 채권등록부에 채권자의 성명, 주소, 채권금액 등 권리내역을 등록(book-entry) 함으로써 증서의 점유 없이도 채권자의 법적 권리를 보장하는 것을 말한다. 채권자는 등록절차를 마침으로써 채권자로서의 권리가 확보되며, 채권의 매매, 질권 및 담보권의 설정, 신탁재산의 표시 등은 채권등록부 기재를 통하여 해당 채권의 발행자 및 제3자에게 대항할 수 있다. 채권 발행자 입장에서는 실물 발행비용이 절감되고, 원리금을 지급할 때 실물 확인절차를 생략할 수 있는 등 업무처리가 간편해지는 이점이 있다. 채권자의 입장 에서도 실물보관에 따른 위험부담이 없고 보관비용이 절감되는 이점이 있다. 현재 대부분 의 채권은 실물발행 없이 등록발행되고 있다. 국고채 등 대부분의 국채와 통화안정증권은 한국은행이, 금융채·회사채 등 여타 채권은 한국예탁결제원이 각각 등록업무를 담당하고 있다. CD의 경우 2006년 6월부터 CD 등록발행제가 시행됨에 따라 은행들이 금융기관을 대상으로 CD를 발행하는 경우 대부분 CD를 실물발행하지 않고 한국예탁결제원을 통해 등록발행하고 있다.',
  },
  '디레버리징': {
    title: '디레버리징',
    content: '디레버리징(Deleveraging)은 부채를 축소하는 것을 말한다. 미시경제 측면에서 보면, 가 계나 기업 등 개별 경제주체의 재무상태표에서 부채의 비중을 낮추는 것을 의미한다. 경 기가 호황일 때는 상대적으로 낮은 금리로 자금을 차입하여 수익성이 높은 곳에 투자해 빚을 상환하고도 수익을 많이 낼 수 있는 레버리지(leverage)가 효과적인 투자기법이 된 다. 그러나 경기가 불황일 때는 자산가치가 급격히 하락하여 수익성이 낮아지고 금리가 상대적으로 높아지게 되므로 부채를 상환, 정리, 감축하는 디레버리징이 더 큰 손실을 줄 이는 투자기법이 된다. 디레버리징을 위해서는 경제주체는 자산을 매각하거나 증자를 통 해 자금을 조달해야 한다. 디레버리징은 자금난을 겪고 있는 민간부문에게는 고통스러운 과정인데, 이는 자산을 할인가격에 매각하여 심각한 손실을 떠안아야 하기 때문이다. 거 시경제 측면에서 보면, 경제 전체의 디레버리징은 민간과 정부 등 여러 부문에서의 동시 다발적인 부채 수준의 감축을 뜻한다. 통상 국민계정에서 GDP 대비 총부채 비율의 하락 으로 측정된다. 2008년 글로벌 금융위기 이후 세계 각국에서 나타난 경제 전체의 디레버 리징은 거시경제 전반에 심대한 영향을 미쳤으며, 종종 경기불황으로 이어졌다. 민간부문 의 디레버리징을 상쇄하는 과정에서 정부부채가 증가하는 현상이 많은 나라에서 관찰되 었다.',
  },
  '디스인플레이션': {
    title: '디스인플레이션',
    content: '물가수준이 지속적으로 높아지고 있으나 물가상승률은 둔화되는 현상을 말한다. 예를 들 어 소비자물가상승률이 2020년 5.0%, 2021년 3.5%, 2022년 2.0%라고 할 경우 매년 물 가상승률이 0보다 크기 때문에 상품과 서비스의 가격 수준은 지속적으로 상승하고 있지 만 상승률은 점차 낮아지고 있는데 이때 디스인플레이션(Disinflation)이 진행 중이라고 한다. 디스인플레이션은 단기간에 그치면 크게 걱정할 일은 아니다. 예를 들어 에너지가 격 하락이나 생산성 증대 등 공급요인으로 인한 일시적인 물가상승률의 둔화는 경제에 이 로울 수 있다. 그러나 디스인플레이션이 계속돼 물가상승률의 추가적인 하락이 전망되는 경우에는 가계와 기업이 소비와 투자를 미룸으로써 수요의 위축을 초래하여 경기침체가 초래될 수 있다. 또한 물가상승률이 낮아졌지만 임금 상승률이 더 낮다면 실질구매력 저 하로 수요 위축이 심화될 수 있다. 이 같은 상황에서는 디스인플레이션이 지속되지 않도 록 정책당국은 통화·재정정책 등을 활용하여 사전에 잘 대응할 필요가 있다.',
  },
  '디커플링/커플링': {
    title: '디커플링/커플링',
    content: '디커플링(Decoupling)이란 탈동조화라고 번역할 수 있는데, 어떤 나라나 지역의 경제가 인접한 다른 국가나 전반적인 세계 경제의 흐름과는 다른 모습을 보이는 현상을 말한다. 디커플링의 예로는 금융위기 이후 신흥국가나 유로지역 국가 등이 미국 경제와 다른 모습 을 보이는 것을 들 수 있다. 이외에도 주가나 금리, 환율 등 일부 경제 변수의 흐름이 국가 간 또는 특정 국가 내에서 서로 다른 흐름을 보이는 현상도 디커플링이라고 할 수 있다. 예를 들어 국가 간의 경우 미국의 주가와 한국의 주가가 다른 방향으로 움직이거나, 한 국 가 내에서의 경우 주가가 하락함에도 해당국 통화가 강세 현상을 보이는 경우 등을 들 수 있다. 반대로 한 나라 또는 지역의 경제가 인접한 다른 국가나 세계 경제 흐름과 유사한 흐름을 보이는 것을 커플링(동조화, Coupling)이라 한다.',
  },
  '래퍼곡선': {
    title: '래퍼곡선',
    content: '미국의 경제학자 래퍼(A. Laffer)가 제시한 조세수입과 세율 간의 관계를 나타낸 곡선을 말한다. 래퍼는 세율이 0%에서 100%로 증가할 때 조세수입은 상승하다가 정점에 이른 후 다시 하강한다면서, 세율(t)을 수평축에 조세수입(T)을 수직축에 놓고 이들의 관계를 그려보면 아래 그림과 같이 “역 U자 모양의 곡선”이 된다고 주장하였다. 래퍼곡선(Laffer curve)에 따르면 세율이 높아지면 초기에는 세수가 늘어나나 일정 수준(t*)이 넘으면 오히 려 감소하므로 현재의 세율이 세수가 가장 많은 수준(t*)을 넘지 않았다면 세수증대를 위 해서는 세율을 올려야 하며 반대로 현재의 세율이 세수가 가장 많은 수준을 넘었다면 세 율 인하가 세수증대에 도움이 된다. 래퍼곡선은 미국 레이건 정권의 감세정책을 뒷받침한 이론적 근거로 널리 이용되었으나 조세수입을 극대화시키는 최적세율이 어느 정도 수준 인지는 정확하게 제시하지 못한다는 한계가 있다.',
  },
  '레그테크': {
    title: '레그테크',
    content: '레그테크(RT; RegTech, Regulatory Technology)는 금융업 등 산업 전반에 걸쳐 혁신 정보기술(IT)과 규제를 결합하여 규제관련 요구사항 및 절차를 효율적으로 처리하는 기술 또는 회사를 뜻한다. 이는 금융서비스 산업의 새 영역이자 일종의 핀테크(FinTech)이다. 레그테크회사들은 수작업의 자동화, 분석·보고절차의 연결, 데이터 품질 개선, 데이터에 대한 전체적인 시각의 창출, 절차관련 앱(application)에 의한 데이터 자동 분석, 핵심 사 업에 대한 의사결정 및 규제당국 앞 송부용 보고서 생산에 초점을 맞춘다.',
  },
  '레버리지비율/단순기본자본비율': {
    title: '레버리지비율/단순기본자본비율',
    content: '레버리지비율(Leverage Ratio)은 ‘[기본자본(Tier 1) / 총익스포저(난외자산 포함)] × 100’으로 정의된다. 분자의 자본은 바젤Ⅲ 기준 기본자본(Tier 1)을 사용하며 분모의 총 익스포저는 자기자본비율을 산정할 경우에 적용되는 위험가중자산과는 달리 명목가액을 기준으로 하여 산출한다. 자기자본비율 규제 하에서 은행은 호황기에 보유자산의 위험가 중치를 낮게 설정함으로써 외형상 높은 자기자본 수준을 유지하면서 레버리지를 확대할 수 있었다. 이 경우 위기 발생시 급격한 디레버리징(자산처분, 부채상환)이 발생하여 위기 가 증폭되는 악순환이 발생할 수 있는데, 레버리지비율 규제는 이러한 자기자본비율 규제의 문제점을 보완한다고 할 수 있다. 바젤은행감독위원회(BCBS)는 2015년 1월부터 레버리지 비율 공시를 의무화하였으며 은행들은 2018년 1월부터 최저 레버리지비율(3%)도 준수해 야 한다. 이 밖에도 글로벌 시스템적 중요 은행(G-SIB)에게는 2022년 1월부터 시스템적 중요도에 따라 국별로 추가 레버리지비율이 적용되고 있다. 이는 위험가중자산 기반 자기 자본비율 규제에서 G-SIB에 대해 부과하고 있는 추가자본 규제와의 일관성을 갖추기 위 한 것으로 G-SIB은 자기자본비율 규제상 부과되는 추가자본의 50%만큼 상향 조정된 레 버리지비율을 준수해야 한다. 예를 들어 2%의 추가자본이 부과된 G-SIB이 준수해야 할 레버리지비율은 최저 레버리지비율 3%에 추가자본의 50%에 해당하는 1%가 가산된 4% 가 된다. G-SIB이 동 레버리지비율을 준수하지 못할 경우, 추가자본의 미준수시와 동일 하게 이익배분이 제한된다. 우리나라는 레버리지비율을 「은행업감독규정」에서 단순기본 자본비율로 정의하고 있으며 2015년 1분기부터 보조지표로 공시된 후 2018년부터 동 규 제(3% 이상)가 시행되었으며 2020년 1월부터는 인터넷전문은행에도 적용되었다.',
  },
  '레버리지 효과': {
    title: '레버리지 효과',
    content: '안정성을 추구하는 저축과 달리 투자에서는 종종 레버리지 효과(Leverage Effect)가 발 생한다. 금융에서는 실제 가격변동률보다 몇 배 많은 투자수익률이 발생하는 현상을 지 렛대에 비유하여 레버리지로 표현한다. 투자에서 가격변동률보다 몇 배 많은 투자수익률 이 발생하려면, 즉 레버리지 효과가 나타나려면, 투자액의 일부가 부채로 조달되어야 한 다. 레버리지 효과는 총투자액 중에서 부채의 비중이 커지면(자기자본의 비중이 작아지 면) 증가하게 된다. 레버리지가 내재한 투자의 예로, 전세를 끼고 주택을 매입한 경우를 상정해보자. 10억원인 아파트를 8억원의 전세를 끼고 자기자본 2억원으로 매입하였다 면, 투자 레버리지(=총투자액/자기자본)는 5배(=10억원/2억원)가 된다. 이후 집값이 10% 상승하여 11억원이 되면 자기자본 2억원에 대한 투자수익률은 실제 가격변동률(10%)의 5배인 50%가 된다. 만일 집값이 30% 하락하여 7억원이 되면 투자수익률은 실제 가격변 동률(-30%)의 5배인 -150%가 되어 집값이 전세값에도 못 미치는 소위 ‘깡통 전세’로 전 락하게 된다. 이와 같이 레버리지는 손익을 확대시키는 효과가 있으므로 레버리지는 ‘양 날의 칼’에 비유되기도 한다. 1997년말 한국에 외환위기가 닥쳤을 때 많은 사업자와 기업 이 파산하게 된 원인 중 하나가 부채에 의존한 높은 레버리지였다. 그러므로 투자를 할 때는 감내할 만한 수준 이내로 부채를 적절하게 활용하는 것이 바람직하다.',
  },
  '로렌츠곡선': {
    title: '로렌츠곡선',
    content: '1905년 미국의 통계학자인 로렌츠(M. Lorenz)가 소득의 불평등 정도를 측정하기 위해 제안한 것으로, 인구의 누적비율을 가로축에 소득의 누적점유율을 세로축에 놓고 이들의 관계를 그림으로 표시한 곡선을 말한다. 모든 사람의 소득이 일정하다면 인구가 누적되어도 소득 누적액이 일정할 것이므로 로렌츠 곡선(Lorenz Curve)은 아래 그림의 OO′선과 같 은 대각선이 된다. 반면 소득이 불평등하다면 처음에는 소득이 적은 사람들의 누적액이 더해져 그래프의 기울기가 완만하다가 뒤로 갈수록 소득이 많은 사람들의 누적액이 더해 지면서 가파른 모양의 아래로 늘어진 곡선이 된다. 극단적으로 한 사람이 모든 소득을 다 가지고 있는 경우에는 OTO′선과 같은 모양이 된다. 따라서 로렌츠 곡선이 OO′선에 가 까워질수록 분배상태가 평등하고, OTO′선에 가까워질수록 불평등 정도가 높다고 판단할 수 있다. 로렌츠 곡선은 한 나라의 소득분배 상태를 그림으로 볼 수 있다는 장점이 있으나 그 정도를 정량적으로 표시할 수 없다는 단점이 있다. 소득분배 상태를 정량적으로 파악 하기 위해서는 지니계수를 이용하여야 한다. 지니계수는 아래 그림의 대각선과 로렌츠곡 선 사이의 면적을 대각선 아래 삼각형 면적 전체로 나눈 것으로, 소득분배가 완전히 평등 하다면 대각선과 로렌츠곡선 사이의 면적이 0이 되어 지니계수는 0이 된다. 반대로 소득 분배가 완전히 불평등하다면 대각선과 로렌츠곡선 사이의 면적이 대각선 아래 전체 면적 과 같게 되므로 지니계수는 1이 된다. 소 득 누 적 점 유 율 ( % ) 0′ 소득의 완전 균등분배를 나타내는 대각선 로렌츠 곡선 인구의 누적비율(%) T',
  },
  '로보어드바이저': {
    title: '로보어드바이저',
    content: '로보어드바이저(Robo-Advisor)는 로봇(robot)과 자문가(advisor)의 합성어이다. 이는 인공지능 알고리즘, 빅데이터 등을 활용하여 투자자의 투자성향·리스크 선호도·목표수익 률 등을 분석하고 그 결과를 바탕으로 투자자문·자산운용 등 온라인 자산관리서비스를 제 공하는 것이다. 서비스 제공 과정에서 비용으로 작용하는 사람의 개입을 최소화함으로써 기존 자산관리서비스보다 더 낮은 최소투자금액과 더 싼 수수료로 소액 자산을 가진 일반 개인도 더 쉽게 접근할 수 있게 되었다.',
  },
  '리디노미네이션': {
    title: '리디노미네이션',
    content: '리디노미네이션(Redenomination) 또는 ‘화폐단위 변경’이란 구매력이 다른 새로운 화 폐단위를 만들어 현재의 화폐단위로 표시된 가격, 증권의 액면가, 예금·채권·채무 등 일 체의 금액을 법정비율(교환비율)에 따라 일률적으로 조정하여 새로운 화폐단위로 표기 및 호칭하는 것을 의미한다. 보통 리디노미네이션은 지속적인 인플레이션으로 인해 재화와 서비스의 교환가치를 화폐로 나타내는 숫자가 많아서 초래되는 계산 및 회계기장 등의 불 편을 해소할 목적으로 시행된다. 또한 자국 통화의 대외적 위상을 높일 목적으로 시행되 기도 한다. 우리나라에서는 1953년의 제1차 통화조치에 따라 100원( )이 1환( )으로, 圓 圜 1962년의 제2차 통화조치에 따라 10환( )이 1원으로 변경된 사례가 있다. 圜',
  },
  '리쇼어링/니어쇼어링/프렌드쇼어링': {
    title: '리쇼어링/니어쇼어링/프렌드쇼어링',
    content: '리쇼어링(Reshoring)은 해외에 공장이나 생산기지를 둔 기업이 다시 본국으로 돌아오 는 현상으로 인건비 등 생산비용 절감을 위하여 해외로 생산시설을 옮기는 오프쇼어링 (offshoring)과 반대되는 말이다. 리쇼어링 양상은 2008년 금융위기 이후 미국의 제조 업 쇠퇴와 실업률 상승, 중국 의존도 증가, 사회·경제적 양극화 등을 배경으로 미국의 버 락 오바마 대통령이 제조업 부활과 일자리 창출을 위하여 자국으로 돌아오는 기업에 각종 혜택을 제공하면서 촉진되었다. 최근 각국 정부는 자국내 일자리 창출과 경제활성화를 위 하여 리쇼어링을 추진하고 있다. 한편 니어쇼어링(Nearshoring)은 물류 효율성 제고와 생산비용 절감 등을 위하여 지리적으로 가까운 국가로, 프렌드쇼어링(Friend-Shoring) 은 지정학적 리스크 감소와 경제안보 강화 등을 위하여 정치적·외교적으로 우호적인 국가 로 업무나 생산활동을 이전하는 전략을 뜻한다.',
  },
  '리스크 온(Risk On)/오프(Off)': {
    title: '리스크 온(Risk On)/오프(Off)',
    content: '리스크 온(Risk On)과 리스크 오프(Risk Off)는 투자 심리를 나타내는 용어로서 시장의 위험 선호도와 위험 회피 심리를 반영한다. 리스크 온은 투자자들이 위험 자산(주식, 암호 화폐 등)에 적극적으로 투자하는 상황을 의미하고, 리스크 오프는 반대로 안전 자산(채권, 금 등)으로 투자 자금을 이동하는 상황을 의미한다. 리스크 온 상황에서는 경제 성장 기대 감 증대, 금리 인상 가능성 감소, 기업 실적 호조 등의 요인이 작용하는 가운데 투자자들 이 경제 상황에 대해 낙관적인 태도를 보이며 위험 자산에 대한 투자를 늘리는 경향을 보 인다. 반대로 리스크 오프 상황에서는 경기침체 우려 증대, 금리 인상 가능성 증가, 지정 학적 리스크 고조 등의 요인이 작용하는 가운데 투자자들이 경제 상황에 대해 비관적인 태도를 보이며 안전 자산으로 자금을 이동시키는 경향을 보인다.',
  },
  '마러라고 합의': {
    title: '마러라고 합의',
    content: '마러라고 합의는 트럼프 미국 대통령의 플로리다 별장 ‘마러라고(Mar-a-Lago)’의 이름 을 딴 경제 정책 구상으로 1985년의 플라자 합의를 현대적으로 재해석한 전략이다. 이 정 책 구상은 트럼프 2기 행정부가 시작되면서 경제자문위원장 스티븐 미런과 재무장관 스 콧 베센트가 주도적으로 제안한 것으로 알려져 있다. 이 정책 구상의 목표는 미국의 무역 적자 해소와 제조업 부흥이며 이를 위해 달러화의 인위적 평가절하를 추진해 미국 제품의 가격경쟁력을 높이고 수출을 촉진하는 것이 핵심이다. 무역 상대국들과의 합의를 통해 달 러화 가치를 큰 폭 절하시키고, 미국의 안보 우산을 제공 받는 동맹국들에게 무역 협상에 서 더 많은 양보를 요구하며, 외국이 보유한 미국 국채를 초장기(예: 100년 만기) 저금리 채권으로 교환하여 미국의 부채 부담을 줄이는 방안 등이 포함되어 있다. 이러한 정책 구 상은 미국의 무역 및 재정 적자 부담을 동맹국에 전가하려는 의도가 크다는 비판을 받고 있다.',
  },
  '마샬의 k': {
    title: '마샬의 k',
    content: '마샬의 k(Marshallian k)는 경제 전체의 명목소득 대비 통화량 보유 비율을 의미한다. 어 떤 경제에서 일정 기간 동안 명목국민소득이 PY이고 화폐의 유통속도가 V일 경우 실물 거래를 위해 필요한 화폐의 양, 즉 화폐의 수요는 다음과 같이 구할 수 있다. 거래수량설 방정식 MV=PY에 따르면 M=1/V×PY=kPY의 관계가 도출된다. 따라서 마샬의 k는 화폐 유통속도의 역수와 동일한 값을 갖는 상수에 해당한다. 이 이론은 화폐의 유통속도가 일 정함을 전제로 하고 있다. 그러나 화폐의 유통속도는 결제 수단의 발전 등 여러 가지 제도 적 요인에 영향을 받을 뿐만 아니라 단기적으로도 매우 변동이 심하게 나타난다. 경기가 호황일 때에는 유통속도가 빨라지고 불황일 때는 늦어지는 경기순응적 움직임을 보인다. 한편 마샬의 k는 MS=Md=kPY에 의거 한 나라의 경제규모 대비 통화공급의 적정 수준을 판단하는 지표로 사용되기도 한다. 그러나 현실적으로 통화량이 다양하게 정의(현금통화, M1, M2, Lf 등)될 뿐만 아니라 금융제도의 혁신 등으로 유통속도도 많이 변하기 때문에 마샬의 k의 적정 수준을 사전적으로 정하는 것은 매우 어려운 일이다.',
  },
  '마스트리히트조약': {
    title: '마스트리히트조약',
    content: '마스트리히트조약(Maastricht Treaty)은 유럽공동체(EC)의 12개 회원국(벨기에, 덴마크, 독일, 그리스, 스페인, 프랑스, 아일랜드, 룩셈부르크, 이탈리아, 네덜란드, 포르투갈, 영 국)이 1992년 2월 7일 네덜란드 마스트리히트에서 서명하고, 1993년 11월 1일부터 발효 된 조약으로 정식 명칭은 유럽연합조약(Treaty on European Union)이다. 이 조약은 EC 가 시장 통합을 넘어 정치·경제적 통합체로 결합하는 토대가 되었으며, 유럽중앙은행 창 설 및 단일통화 사용의 경제통화동맹(EMU) 달성, 공동방위정책 형성, 유럽연합 시민권제 도 도입, 사법 및 치안에 관한 협력 등을 핵심내용으로 하고 있다. 이에 따라 유럽공동체 (EC)는 명칭을 유럽연합(EU)으로 변경하여 새롭게 출범하면서 단일통화를 단계적으로 도 입하기로 하였다. 아울러 유럽경찰 창설에 합의하고 회원국 간의 격차를 해소하기 위한 결속기금 조성을 추진하는 한편 유럽의회의 역할도 조사권, 청원권, 협력절차 도입을 통 해 강화하였다.',
  },
  '만기수익률': {
    title: '만기수익률',
    content: '만기수익률(YTM; Yield to Maturity)은 채권을 만기까지 보유했을 때 얻을 수 있는 예상 연간 수익률을 말한다.',

  '매매보호 서비스(Escrow)': {
    title: '매매보호 서비스(Escrow)',
    content: '판매자와 구매자 사이의 신용관계가 불확실한 전자상거래 시 신뢰할 수 있는 중립적인 제 3자가 중개역할을 하여 상거래가 원활히 이루어질 수 있도록 하는 서비스를 말한다. 구체 적으로는 전자상거래 시 소비자가 물품을 구매한 후 대금을 제3자에게 보관하고, 판매자 는 제3자에게 입금 사실을 확인하고 구매자에게 물품을 발송한다. 구매자는 물품 확인 후 제3자에게 물품의 도착 및 구매 여부를 알리고, 제3자는 판매자에게 대금을 송금하는 절 차로 이루어진다. 중개하는 제3자는 수수료를 수익으로 얻는다. 에스크로(Escrow) 서비 스는 구매자의 인터넷 사기 피해나 판매자의 채권추심 비용 등 전자상거래 피해를 줄여주 는 효과가 있다.',
  },
  '매몰비용': {
    title: '매몰비용',
    content: '이미 지급되어 회수할 수 없는 비용을 말한다. 기회비용은 어떤 것을 선택할 때 포기하여 야 하는 비용을 말하지만, 매몰비용(Sunk Cost)은 무엇을 선택하는가에 상관없이 지급할 수밖에 없는 비용이다. 이미 지급된 매몰비용에 대해서는 더 이상 아무것도 할 수 없고 이 로 인해 현재 시점에서 아무것도 포기할 필요가 없기 때문에 매몰비용과 관련된 기회비용 은 영(0)이다. 따라서 어떤 선택을 할 때에는 선택에 따른 편익은 극대화하고 비용은 최소 화하되 이미 지출된 매몰비용은 무시해야 한다. 의사결정을 할 때 매몰비용에 집착하면 의사결정을 제대로 할 수 없게 되는데, 이미 투입한 비용과 노력이 아까워 경제성이 없는 프로젝트를 중단하지 않고 지속함으로써 결국 손실을 키우는 경우를 매몰비용 오류(Sunk Cost Fallacy)라고 한다.',
  },
  '매입외환/환가료': {
    title: '매입외환/환가료',
    content: '매입외환은 외국환은행이 고객으로부터 매입한 수출환어음, 내국신용장어음, 외화수표, 약속어음 등의 외국환으로 표시된 자산을 말한다. 외국환은행이 수출환어음 등의 외국환 을 매입하면 원화 대금은 즉시 고객에게 지급되나 외화 자금은 추심 후 외국환은행에게 입금된다. 따라서 원화 자금 지급일로부터 외화 자금 입금일까지 은행이 고객에게 자금을 대출해주는 효과가 발생한다. 이와 같이 외국환은행이 고객으로부터 수출환어음 등을 매 입하는 경우, 고객에게 원화 대금을 지급한 시점과 어음 등의 발행자로부터 외화자금을 받는 시점 사이에 은행이 부담하는 어음금액에 대한 이자와 환차손 등을 보전받기 위해 고객에게 수수료를 부과하는데 이를 환가료라고 한다. 따라서 환가료가 징수되는 거래는 은행이 고객으로부터 어음 등을 매입한 후 그 대금을 외화자금으로 수취하는 거래이다. 만약 원화로 대금을 수취할 경우에는 원/달러 환율 등이 적용되고 이 환율에 수수료가 포 함되기 때문에 환가료를 따로 징수하지 않는 것이 일반적이다.',
  },
  '매출액영업이익률': {
    title: '매출액영업이익률',
    content: '기업의 주된 영업활동의 효율성을 측정하는 지표로 제조 및 판매활동에 의해 창출된 영업 손익을 매출액으로 나누어 산출한다. 매출액영업이익률은 다시 생산효율성(매출총손익/ 매출액)과 관리효율성(영업손익/매출총손익)으로 분리하여 이의 변동요인을 찾아낼 수도 있다. 매출액영업이익률은 정상적인 경우 높을수록 좋으나 어떠한 표준치가 있을 수 없으 므로 경쟁관계에 있는 기업이나 동종 업종의 평균치 또는 그 기업의 과거실적과 비교해서 좋고 나쁨을 판단하게 된다. 매출액영업이익률 = ×100 = ( × )×100 영업손익 매출액 매출총손익* 영업손익* 매출액 매출총손익 * 매출총소익 = 매출액 - 매출원가 ** 영업손익 = 매출총손익 - 판매비와 관리비',

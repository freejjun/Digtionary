  '머니마켓펀드(MMF)': {
    title: '머니마켓펀드(MMF)',
    content: '머니마켓펀드(MMF; Money Market Fund)는 고객의 일시적인 여유자금을 금리위험과 신용위험이 적은 국공채, 어음 등에 운용하고 동 운용에서 발생하는 수익을 배당하는 펀 드의 일종으로서 대표적인 단기금융상품이다. MMF로 들어온 자금은 주로 부도 위험이 거의 없는 국채, 통화안정증권 등의 채권, 우량 CP, CD 및 예금 등으로 운용하며 운용자 산의 가중평균 잔존만기가 60일(시가평가의 경우는 120일) 이내로 제한된다. 편입자산의 신용등급은 취득시점을 기준으로 상위 2개 등급 이내(채권 AA이상, CP A2 이상)여야 하 며 주식과 관련이 있는 채권(전환사채 등)이나 사모발행채권 등은 운용대상 자산에서 제 외된다. 2022년 4월부터 법인형 MMF에 대해 시가평가제도가 도입되었으나 안정적 자산 의 비중이 30%를 초과하는 MMF의 경우 기존과 같이 장부가 평가가 허용된다. 이에 따라 현재 대부분의 MMF는 안정성을 추구하는 투자자의 선호를 반영하여 장부가 평가를 적용 받기 위한 운용행태를 나타내고 있다. MMF는 유동성 측면에서 익일 설정 및 익일 환매가 이루어짐에 따라 다른 펀드에 비해 유동성이 높은 편이며 자산의 운용은 자산운용사가, 판매는 은행 및 증권사가 하고 있다.',
  },
  '명목GDP목표제': {
    title: '명목GDP목표제',
    content: '명목GDP목표제란 명목GDP가 사전에 정한 목표수준을 따라가는 것을 목표로 하는 통 화정책 운영체제이다. 이는 글로벌 금융위기 이후 저인플레이션, 저성장, 저금리 현상이 지속됨에 따라 물가안정목표제의 대안으로 일부 학계를 중심으로 제시된 방안이다. 명목 GDP목표제에서는 물가와 실물경제에 동일한 가중치를 부여하기 때문에 경기부진에 보 다 적극적으로 대응하는 것이 가능하다. 또한 유가급등과 같은 공급충격으로 물가상승과 생산감소가 동시에 발생하는 경우 어느 정도의 물가상승을 허용하여 생산감소폭을 축소 시키는 유연한 정책대응이 가능하다는 장점도 있다. 그러나 명목GDP목표제의 경우 물가 안정에 대한 중앙은행의 신뢰성을 확보하기 어렵고 현실 적합성이 크게 떨어진다는 단점 이 있다. 물가와 경기를 동시에 고려하기 때문에 명목기준지표로서의 명료성이 떨어지고 기대 인플레이션을 안정적으로 관리하기가 어렵다. 또한 목표대상지표의 포괄범위도 넓어 중앙은행의 통제가능성도 낮다. 이러한 한계로 현재 명목GDP목표제를 실제로 채택한 사 례는 아직 없는 상황이다.',
  },
  '명목국내총생산/실질국내총생산': {
    title: '명목국내총생산/실질국내총생산',
    content: '명목국내총생산(Nominal GDP)은 한 나라 안에서 생산된 최종생산물의 가치를 그 생산 물이 생산된 기간의 가격을 적용하여 계산한 것이다. 명목GDP의 변동분에는 최종생산물 의 수량과 가격변동분이 혼재되어 있다. 명목GDP는 경제규모 등의 파악에 이용된다. 반 면 실질국내총생산(Real GDP)은 한 나라 안에서 생산된 최종생산물의 가치를 기준년도 의 가격으로 측정한 것이다. 실질GDP는 우리나라를 비롯한 많은 국가에서 UN이 권고한 국제기준인 국민계정체계(SNA; System of National Accounts)에 따라 연쇄가중법에 의 해 추계되고 있다. 연쇄가중법은 기준연도의 가중치를 계속 적용하지 않고 기준연도의 명 목금액에 연쇄물량지수를 곱하여 실질GDP를 산출한다. 실질GDP는 경제성장, 경기변동 등 전반적인 경제활동의 흐름을 분석하는 데 이용된다. 명목GDP는 특정 시점의 국가간 비교, 다른 지표의 기준치(예: 총저축률, GDP대비 경상수지 비율 등)로 활용된다.',
  },
  '명목금리/실질금리': {
    title: '명목금리/실질금리',
    content: '금리는 돈의 가치 즉, 물가변동을 고려하느냐의 여부를 기준으로 명목금리와 실질금리로 구분할 수 있다. 명목금리는 돈의 가치 변동을 고려하지 않고 외부로 표현된 표면상의 금 리를 말한다. 이와 달리 실질금리는 물가상승률을 고려한 금리를 의미한다. 예컨대 금년 중 1년 만기 정기예금의 명목금리가 3%이고 물가상승률이 1%일 경우 명목금리는 3%이 지만 실질금리는 2%(=3%-1%)가 된다. 한편, 금리와 물가의 관계를 설명하는 피셔효과 (Fisher effect)란 금융거래시 명목금리는 실질금리에 예상 물가상승률을 더해서 결정되 는 것을 말한다. 예를 들어 시장참가자들이 미래의 인플레이션율을 합리적으로 예상하여 실질금리에 덧붙이는 형태로 금리를 결정한다면 실질금리는 변하지 않고 명목금리만 조 정될 수 있는 것이다. 그러나 경험적으로 1970~80년대 두 자릿수의 인플레이션 시대에 명목금리에서 물가상승률을 차감한 사후적(ex post) 실질금리가 마이너스로 나타나는 사 례도 있어 장기적으로 실질금리가 불변한다는 견해에 대해서는 논란이 있다.',
  },
  '명목소득/실질소득': {
    title: '명목소득/실질소득',
    content: '명목소득(Nominal Income)은 대상 경제주체의 소득이 발생할 당시의 가격으로 측정된 소득을 말하며, 실질소득(Real Income)은 통화가치의 변동을 감안하여 명목소득을 기 준시점에 맞춰 조정한 것을 말한다. 예를 들어 2015년에 A씨의 연간 소득을 당시 통화가 치로 측정한 금액이 3,000만원 이라면 명목소득은 3,000만원에 해당한다. 2017년 측정 된 A씨의 명목소득이 3,500만원이라면, 2년 동안 A씨의 명목소득은 500만원 증가한 셈 이다. 이 경우 A씨의 경제형편이 나아졌는지를 판단하기 위해서는 보다 정확한 정보를 반영하고 있는 실질소득의 변화 여부를 확인해 보아야 한다. 만약 2015~2017년중 인플 레이션율(물가상승률)이 15%라면 같은 기간중 통화가치는 15% 하락한 것으로 볼 수 있 다. 이 경우 A씨의 2017년 명목소득 3,500만원은 실질소득 기준으로 3,043만원(3500/ (1+0.15))이 된다. 따라서 2015~2017년중 통화가치 변동을 감안할 경우 A씨의 실질소 득은 43만원 증가한 것이 된다. 통화의 가치는 인플레이션 등으로 인해 시간이 지날수 록 하락하므로 수시로 발표되는 다양한 경제지표를 정확하게 이해하기 위해서는 명목 (nominal)과 실질(real)의 개념으로 구분해서 살펴보아야 한다. 국내총생산에 대한 명목 GDP·실질GDP, 임금에 대한 명목임금·실질임금, 이자율에 대한 명목이자율·실질이자율 등은 명목지표와 실질지표를 구분하는 한 예라 하겠다.',
  },
  '모기지대출': {
    title: '모기지대출',
    content: '모기지대출(Mortgage Loan)은 주택이나 부동산을 담보로 하여 은행 등 금융기관에서 장 기간 자금을 빌리는 대출을 말한다.',
  },
  '모바일뱅킹': {
    title: '모바일뱅킹',
    content: '모바일뱅킹 서비스는 고객이 휴대전화 등 모바일기기를 이용하여 무선인터넷을 통하여 금융기관에 접속하여 이용할 수 있는 금융서비스이다. 이 서비스는 은행이 이동통신회사 의 무선인터넷망을 통해 고객의 자금이체 및 계좌조회 등 금융거래과정 전반을 관리하는 것을 기본구조로 하고 있다. 1999년 농협은행 등이 제공하기 시작한 국내 모바일뱅킹 서 비스는 2009년 스마트폰 기반 모바일뱅킹 서비스가 개시된 이후에는 주로 스마트폰을 통 해 제공되고 있다. 모바일뱅킹을 통해 제공되고 있는 서비스에는 예금조회, 거래명세조 회, 자금이체 등이 있으며, 일부 은행에서는 현금서비스, 대출, 환율조회, 수표조회, 사고 신고 등의 서비스까지 제공하고 있다. 모바일뱅킹 서비스는 대부분의 국내은행 및 우체 국, 신용협동조합 및 새마을금고중앙회 등에서 제공되고 있다.',
  },
  '모집': {
    title: '모집',
    content: '자본시장에서 불특정 다수로부터 동일한 조건으로 유가증권 취득의 청약을 권유하는 것 을 말한다. 금융시장은 크게 은행의 예금·대출 업무를 중심으로 한 간접금융시장과 유가 증권의 발행 유통을 위주로 하는 직접금융시장으로 대별된다. 이때 간접금융시장의 경 우 고객이 맡기는 예금과 대출의 운용은 그 연결 관계가 직접적이지 않은 게 보통이다. 이 에 반해 모집은 자본시장에서 자금을 모으는 행위로서, 일반고객들로부터 예금을 조달하 는 은행의 수신 행위와 대응되는 면도 있지만 동 자금의 차입자가 이미 확정되어 있다는 측면에서는 차이가 있는 자금조달 방법이다. 다시 말해 모집과 은행수신은 각각 금융시장 에서의 자금조달이라는 공통점이 있으나 자금조달 기법과 운용 기법에서 차이가 크다. 은 행의 예금은 자금 수요자를 특정하지 않고 은행 자체의 신용으로 자금을 수입하는 상대 형 거래인 데 비해 모집은 자금수요자(흔히 증권을 발행하는 기업 등)가 특정되어 있고 총 자금 공여액을 맞추기 위해 주요 투자자들에게 할당되는 전형적인 시장형 거래라는 점에 서 뚜렷한 대조를 보인다. 이러한 유가증권의 모집은 불특정 다수로부터 공개모집하는 공 모(public offering)가 보다 일반적이고 일부 제한된 수(50인 미만)를 대상으로 하는 사모 (private offering)도 있다.',
  },
  '무디스': {
    title: '무디스',
    content: '무디스는 1909년 미국의 출판업자인 John Moody가 창업한 신용평가기관이다. 1929년 세계 대공황 때 무디스가 ‘투자적격’으로 평가한 기업들이 채무를 100% 이행하게 되면서 높은 신뢰와 명성을 획득한 이후 세계적인 투자 자문회사로 성장하였으며 S&P, Fitch와 함께 세계 3대 국제신용평가기관으로 인정받고 있다. 무디스는 일반적으로 채권의 신용 등급을 신용리스크 수준에 따라 Aaa(최우량), Aa, A, Baa, Ba, B, Caa, Ca, C(최저)의 순 으로 매기며, Aa에서 Caa까지는 숫자 1, 2, 3을 추가하여 등급을 세분한다. 무디스의 평 가원칙은 정량분석(quantitative)을 강조하고 있으며, 여타 두 신용평가기관에 비해 평가 경향이 보수적인 것으로 알려져 있다. 주요 평가항목은 공채와 우선주식, 정부의 부채 상 환 능력, 장단기 채무 이행 능력, 은행감독 정도, 자본시장 구조, 재무상의 투명성 및 규제 환경, 채무 감당 능력, 유동성 등 시장리스크, 기업의 재정 및 리스크 경영과 통제 등이다.',
  },
  '무역지수': {
    title: '무역지수',
    content: '일반적으로 거래금액의 변동은 가격이 변하거나 물량이 변하거나 또는 가격과 물량이 동 시에 변하기 때문에 나타난다. 무역지수는 경제성장, 고용 등과 밀접한 관계를 갖고 있는 수출액 또는 수입액의 변동요인을 가격요인과 물량요인으로 나누어 분석하기 위해 한국 은행에서 작성하고 있다. 무역지수에는 수출입금액지수, 수출입물가지수, 수출입물량지 수가 있다. 이러한 무역지수통계를 이용하여 한 나라의 교역조건을 측정한다. 수출입금액 지수는 수출입 품목의 비교시점 수출입금액을 기준시점 수출입금액으로 나눈 후 100을 곱하여 산출한다. 수출입물량지수는 먼저 계산한 수출입금액지수를 수출입물가지수로 나 눈 후 100을 곱하여 산출하는데, 이때 수출입물가지수는 수출입 계약과 통관 간의 시차를 조정하여 이용한다. 예를 들어 승용차 수출의 경우 계약부터 실제 통관까지 평균 2개월이 소요된다면 무역지수 작성에 적용되는 자동차 수출물가지수는 2개월 전의 자동차의 수출 물가지수가 된다.',
  },
  '무위험지표금리(KOFR)': {
    title: '무위험지표금리(KOFR)',
    content: '무위험지표금리(KOFR)는 Korea Overnight Financing Repo Rate의 약자로서, 국채· 통안증권을 담보로 하는 익일물 RP금리를 사용하여 산출한 우리나라의 무위험지표금리 (RFR; Risk-Free Reference Rate)이다. 이는 투자자가 신용 리스크 없이 얻을 수 있는 이론상의 최소 수익률을 나타내는 금리로서 LIBOR 금리 조작사건 등 기존 금융거래지표 의 신뢰도 하락을 계기로 개발된 대체지표금리이다. KOFR는 국채·통안증권을 담보로 하 는 초단기 거래이기 때문에 무위험 금리에 가깝고, 실거래에 기반하여 산출되기 때문에 조작 가능성이 없는 것이 특징이다. 우리나라는 2021년 2월 RFR로 RP거래금리를 최종 선정했으며, 증권결제 및 장외 RP거래 환매서비스를 제공하는 기관인 한국예탁결제원이 중요지표 산출기관으로 최종 선정되어 KOFR의 산출·공시 업무를 수행하고 있다. 한국 무위험지표금리(KOFR)는 2021년 11월 26일부터 「금융거래지표의 관리에 관한 법률」에 따른 중요지표로서 정식 공시를 시작하였으며, KOFR Index는 2018년 1월 2일을 기준 시점으로 1,000을 기준지수로 하여 산출된다. KOFR는 신뢰할 수 있는 지표금리 제공을 통해 금융시장의 안정성을 높이며, 국제적인 금리 기준과의 정합성을 높여 국내 금융시장 의 국제화를 촉진한다. 또한, 시장에서 실제로 거래된 금리를 기반으로 산출함으로써 금 리 산정의 투명성을 높이는 KOFR는 국내 금융시장에서 중요한 역할을 수행하며, 앞으로 더욱 다양한 분야에서 활용될 것으로 기대된다.',
  },
  '물가안정목표제': {
    title: '물가안정목표제',
    content: '물가안정목표제(Inflation Targeting)란 중앙은행이 명시적인 중간목표(intermediate target) 없이 일정기간 동안 또는 중장기적으로 달성해야 할 물가상승률 목표치를 미리 제 시하고 이에 맞추어 통화정책을 운영하는 방식이다. 즉, 중앙은행은 통화량, 금리, 환율 등 다양한 정보변수를 활용하여 장래의 인플레이션을 예측하고 실제 물가상승률이 목표 치에 수렴할 수 있도록 통화정책을 운영하며, 이후 그 성과를 평가하고 시장의 기대와 반 응을 반영하면서 정책방향을 수정해 나간다. 물가안정목표제는 다음과 같은 핵심 요소를 포함한다. 첫째로 물가안정목표의 구체적인 수치가 제시되어야 하고, 둘째로 통화정책의 목표 중에서 물가안정이 가장 중요한 목표가 되어야 하며, 셋째로 제시된 목표의 달성에 대한 책임성이 확보되어야 한다는 점이다. 물가안정목표제는 1990년 뉴질랜드에서 처음 도입되었으며, 이후 캐나다, 영국, 스웨덴, 호주 등 선진국과 다수의 신흥시장국으로 확산 되었다. 우리나라는 1998년부터 물가안정목표제를 도입하여 시행하고 있다.',
  },
  '물가지수': {
    title: '물가지수',
    content: '시장에서 거래되는 여러 가지 상품과 서비스의 가격을 경제생활에서 차지하는 중요도를 고려하여 평균한 종합적인 가격 수준을 물가라고 한다. 물가지수는 물가의 변화를 한 눈 에 알아볼 수 있도록 기준연도의 물가수준을 100으로 놓고 비교되는 다른 시점의 물가를 지수의 형태로 나타낸 것을 말한다. 물가지수(PI; Price Index)는 경제성장, 국제수지 등 과 함께 한 나라 거시경제의 움직임을 나타내는 중요한 경제지표이다. 물가지수를 이용하 면 일정기간 동안의 생계비 또는 화폐가치의 변화를 측정할 수 있고 명목금액으로부터 실 질금액을 산출할 수 있다. 또한 물가수준을 통해 경기변동에 대해 어느 정도 가늠할 수 있 다. 물가는 경제 전체의 총공급과 총수요의 영향을 받아 변동한다. 총수요에 영향을 끼치 는 대표적인 요인으로는 통화량과 가계소득을 들 수 있다. 반면, 임금 및 국제원자재가격 등 생산요소 가격은 총공급을 변화시키는 요인이다. 기대인플레이션은 총수요와 총공급 모두에 영향을 준다. 우리나라의 대표적인 물가지수로 생산자물가지수, 소비자물가지수, 수출입물가지수, 농가판매 및 구매가격지수 등을 들 수 있다.',
  },
  '뮤추얼펀드': {
    title: '뮤추얼펀드',
    content: '투자자들이 자금을 모아 투자 회사를 설립해 주식이나 채권, 파생상품 등에 투자한 후 그 운용수익을 투자자, 즉 주주들에게 배당금의 형태로 나누어주는 투자신탁의 하나이 다. 뮤추얼펀드는 투자자가 유가증권을 직접 매매하는 것이 아니라 전문 펀드매니저를 통해 운용하는 간접투자 방식이다. 제도적으로 회사형과 계약형으로 나눌 수 있고, 주 요 투자대상에 따라 단기금융시장, 채권형(또는 고정수입), 주식형(또는 순자산), 혼합형 (하이브리드) 등으로 분류된다. 미국의 경우 뮤추얼펀드 이전의 간접투자 제도로는 1868 년 투자조합 형태로 설립된 Foreign Colonial Government Trust가 최초이고 1924년 신탁형태로 보스톤에 설립된 Massachusetts Investors Trust가 있었다. 1940년 투자회 사법(Investment Company Act 1940)의 제정으로 법적 기반이 정비되었다. 한편 단기 금융시장에 투자하는 MMMF(Money Market Mutual Funds)는 지난 1970년대 금리가 규제되고 있던 시대에 혁신적인 금융상품의 하나로 발전하면서 미국 금융시장에서 금리 규제 철폐와 금융자유화를 가속화하는 데 중요한 역할을 한 대표적인 금융혁신 상품으로 평가된다. 우리나라는 1998년 9월 증권투자회사법이 제정되어 국제적 형태의 뮤추얼펀 드가 도입되었고, 자본시장법에 따라 집합투자기구와 집합투자증권이란 명칭으로 규정되 어 있다.',
  },
  '미국·멕시코·캐나다협정(USMCA)': {
    title: '미국·멕시코·캐나다협정(USMCA)',
    content: '미국·멕시코·캐나다협정(USMCA)은 1994년 체결된 북미자유협정(NAFTA)을 대체하는 협정으로서 2020년 7월 1일 공식 발효되었다. NAFTA는 3개국 간 각종 관세 및 비관세 장벽의 단계적 철폐를 주요 내용으로 삼고 있었으나, NAFTA로 인해 미국의 무역적자가 심화되었다는 트럼프 대통령의 문제제기로 2017년 재협상이 시작되어 2018년 USMCA 협상이 타결되었다. USMCA는 원산지규정 및 노동규정을 강화하여 미국 내 제조업 보호 와 고임금 일자리 창출을 도모하는 한편, 디지털 무역 관련 규정을 추가하는 등 협정을 현 대화하고자 하였다. 협정의 존속기간은 16년이며, 발효 6년 차에 3개국이 공동 평가하여 연장 여부를 결정한다. 이에 트럼프 행정부는 2026년 예정된 검토를 앞두고 협정의 성과 와 개정 필요성에 대한 논의를 본격화하고 있다.',
  },
  '미달러화지수': {
    title: '미달러화지수',
    content: '미달러화지수(US dollar Index)는 미국 달러화의 가치를 주요 6개국 통화(유로, 엔, 파 운드, 캐나다 달러, 스웨덴 크로나, 스위스 프랑) 대비 미달러화 환율을 가중평균하여 측 정하는 지수다. 1973년 브레튼우즈체제 붕괴 이후 주요국이 변동환율제도로 이행하면서 도입되었으며 기준점은 1973년 3월(100)이다. 지수가 오르면 미달러화 가치가 상승했다 는 뜻이고, 내리면 미달러화 가치가 하락했다는 의미이다. ICE(International Exchange) 와 미국 연방준비제도이사회(FRB; Federal Reserve Board of Governance, 이하 미연 준)가 발표하는 지수가 널리 활용되고 있으며, 두 기관의 지수에는 통화별 가중치를 계산 하는 방법에서 약간의 차이가 있다. ICE 미달러화지수의 통화별 가중치는 지수를 만들 당 시 미국과 해당 국가와의 교역규모 등 경제적 중요성을 반영하여 결정되었다. 이 가중치 는 고정적으로 유지되며, 1999년 유로화 출범으로 유럽국가 통화들의 비중을 유로화 단 일 통화의 비중으로 합산하는 정도의 수정이 있었다. 2024년 말 현재 통화별 가중치는 유 로가 57.6%로 절반 이상을 차지하며 엔 13.6%, 파운드 11.9%, 캐나다 달러 9.1%, 스웨 덴 크로나 4.2%, 스위스 프랑 3.6% 순이다. 한편, 미연준의 지수는 미국과의 교역규모를 지속적으로 업데이트하여 산출하며 Trade-Weighted 미달러화지수로도 불린다.',
  },
  '미달러화페그제도': {
    title: '미달러화페그제도',
    content: '페그제도란 자국통화를 단일 외국통화나 복수의 통화바스켓에 연동시켜 고정환율을 유 지하는 제도이다. 따라서 미달러화페그제도는 자국 통화의 미국 달러화에 대한 환율은 고 정시켜 둔 채 자국 통화의 기타 통화에 대한 환율은 미국 달러화 대 기타통화의 환율 변 동에 따라 자동으로 결정되게 하는 환율제도를 말한다. 통상 외환 당국은 직접 및 간접 개 입을 통해서 자국통화의 미달러화에 대한 시장환율이 기준환율을 중심으로 좁은 범위(± 1% 이내, ± 2% 이내 등)에서 변동하도록 관리한다. 페그제도를 채택하면 환율변동에 대 한 불확실성이 제거됨으로써 국경 간 교역 및 자본유출입의 원활화를 도모하는 데 유리하 지만, 미국 달러화의 가치변동에 따라 자국 통화의 가치가 수동적으로 변동하게 됨으로써 통화의 가치가 자국의 경제 상황 또는 수출경쟁력을 적절히 반영되지 못하는 문제점이 발 생할 수 있다.',
  },
  '미발행화폐': {
    title: '미발행화폐',
    content: '미발행화폐란 한국은행이 보유하고 있는 은행권과 주화 중 사용하기에 적합하지 아니하 여 폐기(잘게 썰거나, 분쇄 또는 녹이는 등의 방법으로 소각)하기로 결정한 화폐를 제외한 모든 은행권과 주화를 말한다. 한국은행은 미발행화폐를 필요한 곳에 적기에 공급하기 위 하여 한국은행 본부와 각 지역본부에 분산하여 보관하고 있으며 동 화폐의 대부분은 한국 조폐공사로부터 제조하여 납품받은 새화폐와 금융기관들이 지급준비금 불입 등을 위해 입금한 화폐가 대부분이다. 그리고 한국은행은 미발행화폐를 한국은행 본부 또는 지역본 부가 아닌 특정 금융기관에 보관케하는 미발행화폐 임치제도를 운용할 수 있다. 이는 한 국은행 본부 및 지역본부로부터 원격지에 위치하여 교통여건이 열악한 지역의 화폐수급 애로를 해소하기 위하여 동 지역소재 금융기관 1개 점포를 지정하여 한국은행의 미발행 화폐를 보관케하고 한국은행의 입회, 지시, 감독하에 화폐의 입·출업무를 수행하게 하는 제도이다. 이 제도는 1996년 가장 많은 23개 점포를 지정·운영하였으나 현재는 교통여건 개선 등으로 한 곳도 운용하지 않고 있다.',
  },
  '미분양주택': {
    title: '미분양주택',
    content: '주택사업자가 분양 공고를 내고 입주자를 모집하였으나 정해진 일정 내에 청약이 이루어 지지 않은 주택이다. 미분양주택은 주택경기를 파악할 수 있는 지표 중 하나이다. 주택수 요는 탄력적이지만 주택공급은 비교적 비탄력적이기 때문에 주택시장에서는 침체와 회복 이 반복되는 경기순환적 특성을 보이며, 미분양주택은 이러한 경기순환 상황을 나타낸다. 주택공급이 과도하거나 금융위기와 같은 수요충격이 발생한 경우 미분양주택이 적체된 다. 이후 가격이 조정되는 과정 등을 거쳐 미분양주택이 소진되고 주택시장은 회복국면에 들어서게 된다. 우리나라에서는 선분양 제도를 통하여 주택이 지어지기 전 청약을 시행하 는데 주택이 준공된 이후에도 분양계약이 체결되지 않는 경우 준공 후 미분양주택으로 분 류하며, 준공 후 미분양주택이 지속적으로 적체되는 경우 해당 지역의 주택시장 침체가 더욱 심화되었음을 시사한다. 미분양주택 관련 정보는 국토교통부 통계누리, 통계청 국가 통계포털 등에서 살펴볼 수 있다.',
  },
  '바이오인증': {
    title: '바이오인증',
    content: '바이오인증(Biometric Authentication, Biometrics)은 개인을 식별하거나 인증하기 위 해 각 개인마다 구별해서 측정할 수 있는 고유 생체정보를 자동화된 장치에 보관하고 금 융거래시 이를 이용해 본인임을 인증하는 기술이다. 생체정보는 크게 지문·홍채·정맥·안 면·DNA·심장박동 등 신체적 특성과 음성·서명·걸음걸이·자판입력 등 행동적 특성으로 분류된다. 바이오인증은 별도의 보관 및 암기가 불필요하고, 분실우려가 적으며, 도용·양 도가 어렵다는 장점을 지닌다. 이런 특징을 바탕으로 바이오인증은 정보통신기술의 발달 과 함께 금융거래에서 본인을 인증하기 위해 사용되는 기존의 비밀번호·공인인증서 등 여 러 인증수단을 대체하고 있다. 또한 공항 등 주요 보안시설이나 사무실 건물에의 출입 통 제절차에서는 물론 사물인터넷 기술이 적용된 스마트홈 기기 접근 등 일상생활에서도 신 분증·출입카드·비밀번호 등의 대안으로서 그 활용 폭을 넓혀가고 있다. 바젤은행감독위원회/바젤위원회(BCBS) 1974년 독일 헤르슈타트 은행(Bankhaus Herstatt)의 도산이 국제외환시장 및 은행시 스템에 심각한 영향을 미치면서 글로벌 은행감독기준 마련을 위한 공조의 필요성이 대두 되었다. 그 결과 1974년말 G10 국가 중앙은행 총재회의의 결의로 바젤은행감독위원회 (BCBS; Basel Committee on Banking Supervision)가 설립되었다. BCBS는 은행 건전 성을 규율하기 위한 국제기준 등을 제정하고 은행감독 관련 사안들에 대한 국제협력의 장 을 제공해 왔다. 글로벌 금융위기 이후 BCBS가 은행 규제체계 개혁을 추진하는 과정에서 G10 이외 국가에 문호를 개방하면서 은행 규제·감독 관련 국제기준 제정기구로서의 중요 성은 더욱 커지게 되었다. 2024년 5월 14일 현재 G20 국가를 포함한 28개국(EU 포함)의 45개 중앙은행 및 은행감독기관이 회원으로, 非회원국 중앙은행, 감독기관 협의체, 국제 기구 등 9개 기관이 초청기관 자격으로 참여하고 있다. 우리나라는 2009년 3월 한국은행 과 금융감독원이 BCBS에 가입하였다.',
  },
  '발행시장': {
    title: '발행시장',
    content: '발행시장(Primary Market)이란 주식이나 채권 등의 유가증권을 신규로 발행하는 시장을 말한다. 발행시장 내에서는 자금을 필요로 하는 기업, 금융기관, 정부, 지방공공단체 등 (발행주체)이 유가증권을 최초로 발행하여 자금공급자인 가계나 기관투자가 등(투자주체) 에게 제공하고 소정의 자금을 조달하는 일련의 과정이 발생한다. 발행시장 참여자에는 이 러한 발행주체와 투자주체 외에 인수기관이 있다. 인수기관은 발행주체를 대신하여 증권 발행에 수반되는 사무 절차를 처리하고 유가증권 인수업무 등을 수행한다. 이중 채권 발 행은 정부, 지방공공단체, 기업, 금융기관 등이 필요 자금을 조달하기 위해 일정한 이자를 지급할 것을 약속하며 발행하는 유가증권으로, 국채, 지방채, 회사채 등 다양한 종류가 있 다. 발행시장에서 채권이 신규로 발행되어 투자자에게 판매되며, 이를 통해 발행주체는 장기 자금을 확보한다. 한편 이중 주식 발행은 기업공개, 유상증자, 무상증자 및 주식배당 등의 형태로 이루어진다. 기업공개란 주식회사가 신규발행 주식을 다수의 투자자로부터 모집을 하거나 이미 발행되어 대주주 등이 소유하고 있는 주식(구주)을 매출하여 주식을 분산시키는 것을 말하며, 유상증자는 기업재무구조 개선 등을 목적으로 회사가 신주를 발 행하여 자본금을 증가시키는 것이다. 무상증자란 주금의 납입 없이 이사회의 결의로 준비 금 또는 자산재평가적립금을 자본에 전입하고 전입액만큼 발행한 신주를 기존 주주에게 소유 주식수에 비례하여 무상으로 교부하는 것을 말하며, 주식배당이란 현금 대신 주식으 로 배당함으로써 이익을 자본으로 전입하는 것을 말한다.',
  },
  '발행어음': {
    title: '발행어음',
    content: '발행어음은 금융회사가 투자자로부터 자금을 조달하기 위해 고객을 수취인, 금융회사를 지급인으로 하여 어음을 의미하며 만기는 1년 이내이다. 발행어음을 매입한 고객은 만기 에 약정된 이자를 원금과 함께 받게 된다. 발행어음은 만기 구조에 따라 수시형과 만기형 으로 구분할 수 있다. 수시형 발행어음은 입출금이 자유로우며 이자는 매일 계산하는 반 면 만기형 발행어음을 만기가 정해져 있으며 중도에 해지하게 되면 만기이자율보다 낮은 이자율을 받게 된다. 한편 발행어음에는 만기가 도래하더라도 발행회사가 원금과 이자를 지급하지 못하는 신용위험이 존재하므로 신용도가 높은 금융회사에게만 발행어음 업무를 취급하도록 허용된다. 현재 우리나라 금융당국은 발행어음의 신용위험 최소화를 위해 은 행과 자기자본 4조원 이상의 갖추고 종합금융투자사업자로 지정된 대형 증권사에게만 발 행어음 업무를 허용하고 있다.',
  },
  '발행중지화폐/유통정지화폐': {
    title: '발행중지화폐/유통정지화폐',
    content: '발행중지화폐는 발권기관인 한국은행이 화폐의 원활한 유통 등을 위해 발행을 중지하기 로 한 화폐이다. 발행중지화폐는 비록 화폐 발행은 중단되지만 화폐로서의 강제통용력 도 있고 지급결제수단으로 사용도 가능하다. 또한 발행중지화폐는 한국은행 및 금융기 관에서 현행 사용하고 있는 화폐와 ‘액면가’로 교환할 수 있다. 이에 반해 유통정지화폐 는 화폐 발행을 중단할 뿐만 아니라 시중에서의 사용도 정지된 화폐이다. 즉 화폐로서의 강제통용력이 상실되어 지급결제수단으로 사용할 수 없다. 현재 우리나라 화폐 중 1962 년 제2차 통화조치 이전에 발행된 화폐들은 화폐로서의 효력이 상실된 유통정지화폐이고 1962년 제2차 통화조치 이후에 발행된 화폐 중 현재 사용하고 있는 은행권 4종류(오만원 권, 만원권, 오천원권, 천원권)와 주화 6종류(오백원화, 백원화, 오십원화, 십원화, 오원화, 일원화)를 제외한 모든 화폐는 발행중지화폐이다.',
  },
  '방카슈랑스': {
    title: '방카슈랑스',
    content: '방카슈랑스(Bancassurance)라는 말은 유럽에서 만들어지고 발전된 개념으로 은행을 의 미하는 프랑스어 Banque와 보험을 의미하는 Assurance의 합성어이다. 은행과 보험회 사가 서로 연결되어 일반 개인에게 폭넓은 금융서비스를 제공하는 시스템을 말하는데, 좁 게는 보험회사가 은행 지점을 보험상품의 판매 대리점으로 이용하여 은행원이 직접 보험 상품을 파는 것을 말한다. 최근에는 금융권역의 장벽이 낮아지는 추세를 보이며 은행뿐만 아니라 저축은행, 카드사 등과 같은 비은행 금융기관에서도 보험을 판매하는 사례가 늘고 있다. 또한, 방카슈랑스가 좁은 의미로는 보험상품의 판매에 국한되지만 넓은 의미로는 은행과 보험사 간의 공동 상품개발이나 종합적인 업무제휴도 포함한다. 고객은 금융기관 방문으로 더욱 다양한 금융서비스를 제공받을 수 있고 은행을 통해 저렴하게 보험상품을 구입할 수 있게 되었으며, 은행과 보험상품을 조합해 효율적으로 리스크를 관리할 수 있 다는 장점이 있다. 유럽에서는 1980년대 중반부터 점차 확대되었고, 일본은 2001년부터 자회사의 일부 보험상품에 한해 판매제휴를 허용하였으며, 우리나라는 2003년 8월부터 시행되었다. 이론적으로 어떤 상품을 따로 만들 때 보다 함께 생산할 때 평균비용을 절감 할 수 있고 시너지 효과를 얻는 것을 범위의 경제(economy of scope)라고 하는데 은행 과 보험의 제휴도 이러한 사례에 속한다. 그동안의 운용경험으로 보아 은행과 증권의 겸 업에 비해서는 시장충격이 크지 않았던 것으로 평가되는데 이는 그만큼 보험업의 고유성 격이 강하여 은행상품과의 경합관계가 높지 않은데 기인한 것으로 보인다.',
  },
  '배당할인모형': {
    title: '배당할인모형',
    content: '배당할인모형(Dividend Discount Model)은 주식투자에 따라 발생하는 미래의 현금 흐름을 적절한 할인율을 적용하여 현재가치로 전환함으로써 주식의 현재가치를 평가하 는 모형이다. 주식투자에 따른 현금흐름은 보유기간 중의 배당금과 매도할 경우의 주식 가격으로 구성되는데 만일 보유기간이 매우 길다면 매도할 주식가격의 현재가치는 0에 수렴하게 된다. 일반적으로 주식은 만기가 없는 영구적인 증권이므로 보유기간을 무한대 로 상정할 수 있다. 따라서 주식의 가치는 각 기별 배당금을 적절한 할인율(주식투자의 요 구수익률이라고 함)로 할인한 현재가치의 합으로 볼 수 있다. 배당할인모형은 주식가치 평가모형 중 가장 기본적인 모형으로서 주식가격 형성에 있어서 핵심 요인이 무엇인지를 보여준다. 그러나 기업경영 및 이익에 관한 수많은 불확실성 등으로 인해 먼 미래의 배당 금을 추정하는 것은 불가능에 가깝다. 이러한 문제점을 극복하기 위해 Myron Gordon은 배당금이 일정률로 성장한다는 가정을 기초로 정률성장배당할인모형(Constant Growth Dividend Discount Model)을 제시하였다. Gordon의 모형에 따르면 현재 주식의 가치 (P0), 최근 예상배당(D1), 주식투자의 요구수익률(r), 배당성장률(g) 간에는 P0=D1/(r-g) 의 관계가 성립한다.',
  },
  '밴드웨건효과': {
    title: '밴드웨건효과',
    content: '소비자가 대중적으로 유행하는 정보를 쫓아 상품을 구매하는 현상을 말한다. 악대차 (band wagon)가 악단을 선도하며 요란한 연주로 하면 이 밴드왜건을 우르르 쫓아가 는 사람들의 모습에서 밴드웨건효과라는 말이 만들어졌다. 밴드웨건효과(Bandwagon Effect)는 결국 유행에 동조함으로써 타인들과의 관계에서 소외되지 않으려는 비이성적 인 심리에서 비롯된다. 주식시장이나 부동산시장의 거품형성과 붕괴현상도 밴드웨건효과 로 설명할 수 있다.',
  },
  '뱅크런': {
    title: '뱅크런',
    content: '은행의 대규모 예금인출사태를 가리키는 말이다. 금융시장 상황이 불안하거나 은행의 경 영 및 건전성 등에 문제가 발생하면, 예금자들은 은행에 맡긴 돈을 보장받을 수 없을 것이 라는 불안감으로 인해 저축한 돈을 급격히 인출하게 된다. 이로 인해 은행은 일시적으로 지급할 수 있는 자금이 부족하게 되어 패닉 상태에 빠질 수 있다. 이를 뱅크런(Bank Run) 이라 부르며 우리나라의 예금보험공사는 뱅크런과 이로 인한 금융불안을 예방하기 위해 예금자보호법에 의해 1억 원까지의 예금을 보호해주고 있다.',
  },
  '범위의 경제': {
    title: '범위의 경제',
    content: '개별 기업이 한 종류의 제품만을 생산하는 경우보다 여러 제품을 같이 생산하면서 평균 생산비용이 적게 들 때 범위의 경제(Economies of Scope)가 존재한다고 말한다. 승용 차와 트럭을 같이 생산하는 기업의 경우 소재부품이나 조립라인 등의 생산시설을 공동으 로 사용할 수 있는 이점을 갖게 된다. 이러한 현상은 동일한 생산요소를 사용하거나 기업 운영 및 마케팅 활동을 함께 하거나 생산물이 가진 특성 때문에도 나타날 수 있다. 연구개 발·판매·생산은 공동으로 하면서 제품의 종류만 달리할 경우 비용이 절감될 수 있다. 또 한 기존 산업과 비슷한 산업에 진출할 경우 시너지효과를 기대할 수 있는데, 구체적인 예 로는 은행이 보험 상품을 판매하는 방카슈랑스를 들 수 있다.',
  },
  '법정화폐': {
    title: '법정화폐',
    content: '법정화폐(Legal Tender)란 법률에 의해 인정되는 공적 지불수단의 성격을 지닌 화폐를 의미한다. 다시 말해 국가가 법률로 부채의 상환, 상품 구매, 세금 납부 등에 있어서 반드 시 수령하고 경제적 거래가 완결됨을 의미한다. 국가마다 법정화폐로 인정되는 범위가 다 른데 우리나라의 경우 한국은행법 제48조에서 “한국은행이 발행한 한국은행권은 법화(法 貨)로서 모든 거래에 무제한 통용된다.”고 규정함으로써 한국은행권이 모든 경제적 거래 에서 법정화폐로 인정된다. 그러나 법정화폐 수령 거부에 대한 처벌 조항이 없는 데다 신 용카드, 실시간 계좌이체 등 전자결제 수단에 대한 선호, 큰 금액의 채무를 소액 주화를 대량으로 지급하여 수령인의 불편을 초래하는 행위에 대한 사회적 반감 등으로 한국은행 권이 완전한 법정화폐로서 기능하는 데에는 현실적인 한계가 존재한다.',
  },
  '베버리지곡선': {
    title: '베버리지곡선',
    content: '베버리지곡선(Beveridge Curve)은 노동 공급(실업률) 및 수요(빈일자리율) 간 관계를 나 타내는 곡선으로 이를 통하여 노동수급 상황과 노동시장의 효율성 정도를 파악할 수 있 다. 실업과 빈일자리 간 미스매치를 언급한 영국 경제학자 베버리지(W. Beveridge)를 따 라서 명명된 베버리지곡선은 통상 실업률이 높아지면 빈일자리율이 줄어들고, 실업률이 낮아지면 빈일자리율은 늘어나는 관계가 있다. 이는 실업률을 X축, 빈일자리율을 Y축으 로 할 때, 경기 확장기에서처럼 유휴노동력이 축소되면 실업율이 줄어들고 빈일자리율은 늘어나며, 경기 수축기에서 나타나듯이 유후노동력이 늘어나면 실업률이 늘어나고 빈일 자리율은 줄어드는 특성에 기인한다. 한편 노동시장 내 마찰적 요인의 증가로 구인·구직 자 간 매칭 효율성이 낮아질 경우 실업률과 빈일자리율이 동시에 높아져 곡선 자체가 오 른쪽 상방으로 이동할 수 있다.',
  },
  '베블런효과': {
    title: '베블런효과',
    content: '가격이 상승하면 수요량이 감소하는 수요 법칙에 반하는 재화를 베블런재라 부른다. 사치 재, 명품 등이 이에 해당하는데 이러한 재화는 가격이 비쌀수록 소비가 증가하는 경향이 있다. 이러한 과시 욕구를 반영한 소비현상을 베블런효과(Veblen’s Effect)라고 부른다. 베블런은 이러한 현상을 처음으로 관찰한 학자의 이름이다.',
  },
  '변동금리': {
    title: '변동금리',
    content: '변동금리란 시장금리를 반영하여 일정 주기별로 약정금리가 변하는 금리를 의미하며, 고 정금리란 최초 약정한 금리가 만기 때까지 그대로 유지되는 금리를 의미한다. 예를 들 어 만기 1년, 약정금리는 4%의 고정금리라면 약정기간 1년 동안 시장금리가 어떻게 변 하더라도 해당 약정금리는 4%이다. 반면 만기 1년, 변동주기 3개월, 약정금리는 CD금 리+0.5%(또는 50bp)의 변동금리라면 3개월에 한 번씩 변동된 CD금리에 연동하여 약 정금리가 변하게 된다. 예를 들어 CD금리가 최초 약정시 3.0%, 약정 3개월 후 3.2%, 6개월 후 3.5%, 9개월 후 4.0%라면 약정금리는 최초 약정시 3.5%, 약정 3개월 후 3.7%, 6개월 후 4.0%, 9개월 후 4.5%가 된다. 자금 차입자 입장에서는 앞으로 시장금리가 상승 할 것으로 예상하는 경우에는 고정금리를 이용하는 것이 유리하고 시장금리가 하락할 것 으로 예상하는 경우에는 변동금리를 이용하는 것이 유리하다. 일반적으로 동일 만기에서 는 고정금리가 변동금리보다 높은데 이는 자금 대여자(은행)에게 약정 기간 중 금리 변동 에 따른 위험 프리미엄이 존재하기 때문이다. 한편 변동금리의 준거가 되는 금리는 CD금 리가 주로 적용되었으나 지금은 COFIX와 은행채 금리도 많이 활용되고 있다.',
  },
  '변동금리부채권(FRN)': {
    title: '변동금리부채권(FRN)',
    content: '채권은 지급이자 변동 여부에 따라 고정금리부채권과 변동금리부채권(FRN; Floating Rate Note)으로 구분된다. 변동금리부채권은 지급이자율이 시장실세금리에 연동하여 이 자지급기간마다 변동되는 채권을 말한다. 변동금리부채권은 금융시장의 불확실성 확대 로 금리에 대한 장기예측이 어려울 때 금리변동 위험을 최소화하기 위해 발행한다. 통상 금리 하락기에는 발행자에게 유리하고, 금리 상승기에는 투자자에게 유리한 측면이 있다. 변동금리부채권의 지급이자율은 기준금리에 가산금리를 더하는 방식으로 결정된다. 기준 금리는 시장실세금리에 연동하며, 가산금리는 변동금리채 발행자의 신용위험과 기준금리 발행자의 신용위험에 대한 보상으로, 기준금리 대비 추가로 요구되는 수익률을 의미한다. 채권발행자는 금리상승 가능성이 높아 고정금리부채권 발행이 어려울 경우 변동금리부채 권 발행을 통해 자금을 조달할 수 있고, 단저장고(短低長高)의 수익률곡선 하에서 장기자 금을 낮은 단기금리로 조달하는 효과를 얻을 수 있다. 한편, 투자자는 변동금리부채권 투 자를 통해 금리변동위험을 회피할 수 있다.',
  },
  '보복소비': {
    title: '보복소비',
    content: '보복소비(Revenge Spending 혹은 Pent-up Demand)란 상당 기간 소비 기회가 막혀 강제적으로 소비가 제한되거나 혹은 소비가 억제됨에 따른 피로 누적과 이에 대한 보상 욕구, 미래 소비기회 상실 우려 등에 대한 반작용으로 소비가 급격하게 늘어나는 것을 의 미한다. 최근 코로나19로 억눌렸던 소비 욕구 및 수요가 보복하듯 한꺼번에 분출하는 현 상을 지칭하기 위하여 널리 쓰여지게 되었다. 2020년 중국 언론과 소비 트렌드 분석에서 처음 부각된 것으로 알려져 있다.',
  },
  '보완자본(Tier 2)': {
    title: '보완자본(Tier 2)',
    content: '국제결제은행(BIS)의 기준에 따른 은행의 자기자본(=기본자본+보완자본)을 구성하는 요 소로서, 기본자본에 비해 손실흡수능력이 떨어지지만 예상외 손실로 은행이 파산할 경우 예금자를 포함한 일반채권자에 앞서 손실을 흡수(혹은 은행의 청산 시 은행의 손실을 보 전)할 수 있는 자기자본(gone-concern capital)을 의미한다. 보완자본은 해당하는 요건 을 충족하는 보완자본증권 및 이와 관련된 자본잉여금, 자회사가 발행한 보완자본증권의 일부 제3자 보유분, 특정 요건을 충족하는 대손충당금 등으로 구성된다. 해당 은행이 발 행한 증권이 보완자본증권으로 인정받기 위해서는 예금자·일반채권자보다 후순위일 것, 최저만기 5년 이상이고 금리 상향조정을 비롯한 중도상환 유인이 없을 것 등의 요건을 충 족해야 한다(참고 「은행업감독업무시행세칙」별표 3). 아울러 신용리스크 측정시 표준방 법을 사용하는 은행이 설정한 일반 대손충당금(general provisions)과 내부등급법 사용 은행이 예상손실을 초과하여 적립한 적격 대손충당금은 규제자본과 동일하게 예상외 손 실을 흡수하는 데 사용할 수 있다고 간주하여 일정 범위(각각 신용위험가중자산의 1.25% 및 0.6%) 내에서 보완자본(supplementary capital)에 가산할 수 있다.',
  },
  '보완재': {
    title: '보완재',
    content: '두 가지 이상의 재화가 함께 사용됨으로써 효용을 얻을 수 있는 재화로, 한 재화의 가격이 하 락함에 따라 다른 한 재화의 수요가 증가하는 관계에 있는 재화를 말한다. 소비자 효용의 관 점에서 볼 때, 소비자는 보완재 관계에 있는 두 재화를 따로 소비할 때의 효용이 함께 소비 할 때의 효용보다 줄어든다. 승용차와 휘발유, 컴퓨터와 소프트웨어 등은 보완재의 예이다.',
  },
  '보통주자본(Common Equity Tier 1)': {
    title: '보통주자본(Common Equity Tier 1)',
    content: '보통주자본(CET1; Common Equity Tier 1)은 바젤Ⅲ 자본규제에서 기본자본(Tier 1)을 구성하는 핵심 요소로서, 손실흡수능력이 가장 높은(혹은 은행의 손실을 가장 먼저 보전 할 수 있는) 자본을 의미하며 보통주 발행으로 인한 자본금·자본잉여금, 이익잉여금, 기타 포괄손익누계액 등으로 구성된다. 특정 자본이 보통주자본으로 인정받기 위해서는 청산 시 최후 순위일 것, 영구적일 것, 청산시를 제외하고는 상환불가, 재매입 및 상환 또는 발 행취소에 대한 기대가 없을 것 등의 요건을 충족해야 한다(참고 「은행업감독업무시행세 칙」별표 3). 바젤Ⅲ에서는 보통주자본비율을 위험가중자산의 4.5% 이상이 되도록 규정하 고 있다.',
  },
  '보편관세': {
    title: '보편관세',
    content: '관세란 외국에서 물건을 사오거나 외국으로 물건을 팔 때 부과하는 세금으로 수입관세, 수출관세, 통과관세가 있으며 수출관세와 통과관세는 거의 부과되지 않고 수입관세가 일 반적이다. 관세는 보편관세(uniform tariff)와 차별관세(discriminatory tariff), 상호관 세(reciprocal tariff)로도 구분할 수 있는데 특정 품목이나 국가에 국한되지 않고 모든 수 입품에 일률적으로 적용되는 관세를 보편관세라고 한다. 차별관세는 수입품의 출처 국가 나 품목에 따라 서로 다른 관세율을 적용하는 것이며, 상호관세는 특정 상대국이 자국 제 품에 대해 과도하거나 불공정한 관세를 부과할 경우 이에 대해 동일하거나 유사한 방식으 로 관세를 부과하는 경우를 말한다.',
  },
  '보호무역주의': {
    title: '보호무역주의',
    content: '보호무역주의는 국가간 무역을 제한하는 경제정책이다. 주된 수단으로는 수입금지나 수 입할당과 같은 직접적인 방법과 수입상품에 대한 관세 부과와 같은 간접적인 방법 이외 에도 덤핑 규제, 보조금 지급, 지적재산권 보호 강화, 환율조작 등 기타 다양한 정부의 규제 등이 있다. 보호무역주의의 목적은 수입으로 경쟁이 유발되는 산업의 생산, 유통, 고용 등에 손해가 발생하지 않도록 하는 것이다. 한편 보호무역주의는 상대국 수출부문의 생산, 고용은 물론 동 정책을 실행하는 국가의 소비자에게도 물가 상승과 같은 부정적 영 향을 미친다. 보호무역주의의 순효과는 경제의 성장이나 발전에 부정적이라는 견해가 지 배적이어서 선진국의 주도하에 세계적으로 무역장벽을 낮추는 추세를 보여 왔다. 그러나 일부에서 무역수지 흑자국과 적자국이 뚜렷이 구분·지속되고 수지폭도 점점 커지면서 단 기적으로 적자국 수입경쟁 부문의 고용이 심각한 불균형을 보이는 등 부작용도 확대되었 다. 이러한 부작용은 특히 2008년 발생한 글로벌 금융위기의 한 원인으로 지적되기도 했 다. 최근 미국이 보호무역을 강화하는 정책을 실시하면서 무역갈등이 심화되고 있으나 G20의 대부분 국가는 보호무역주의의 확산을 경계하고 있다.',
  },
  '복수통화바스켓제도': {
    title: '복수통화바스켓제도',
    content: '복수통화바스켓제도란 자국과 교역 비중이 큰 복수국가의 통화를 선택하여 통화군(바스 켓)을 구성하고 바스켓(basket)을 구성하는 통화들의 가치가 변동할 경우 각 통화별 교 역가중치에 따라 자국통화의 환율에 반영하는 환율제도를 말한다. 복수통화바스켓제도 는 자국 통화의 가치가 달러화 같은 특정 외국 통화에 고정되는 것이 아니라 바스켓에 포 함된 여러 통화의 가치 변화에 따라 변동하게 하여 환율의 안정성을 도모하는 동시에 환 율이 주요 교역상대국과의 경쟁력을 종합적으로 반영하게 하는 장점이 있다. 우리나라는 1980년 2월부터 복수통화바스켓제도를 시행한 바 있으며, 당시 원/달러 환율은 SDR의 대미달러화 환율인 SDR바스켓과 우리나라의 주요 교역상대국인 미국, 일본, 서독, 영국, 프랑스 통화의 미달러화에 대한 환율변동을 가중평균한 독자바스켓, 그리고 정책조정변 수인 실세반영장치의 세 가지 요소에 의해 결정되었다. 이후 점차 정책당국의 영향력 때 문에 환율이 외환 수급을 적절히 반영하지 못할 수 있다는 우려가 커짐에 따라, 1990년 3 월 정부는 환율 결정에 시장 원리를 보다 폭넓게 반영하기 위하여 시장평균환율제도로 이 행하였다.',
  },
  '본드포워드거래': {
    title: '본드포워드거래',
    content: '본드포워드거래(Bond Forward Transaction)는 두 당사자가 미래의 일정 시점에 정해 진 가격으로 채권(본드)을 매수하거나 매도하기로 약속하는 금융 계약을 말한다. 이는 거 래 당사자 간의 계약을 통해 미래의 특정 시점에 채권을 매수 또는 매도할 가격을 미리 확 정하는 장외파생상품이다. 주로 금리 리스크 헤지, 투자 전략 수립 또는 예상 금리 변동에 대한 대비 목적으로 사용되는 본드포워드거래는 현재 시점에서 거래가 이루어지지만 실 제 거래는 미래 일정 시점에 계약 당시 정해진 가격으로 성사되므로 금리 변동에 따른 위 험을 줄일 수 있다. 또한, 양 당사자 간 신뢰성에 따라 계약이 유지되기 때문에 상대방의 신용상태가 중요하다. 주로 보험사들이 자산 듀레이션을 늘리거나 금리 변동 위험을 헤지 하기 위한 수단으로 활용한다. 예를 들어, 보험사가 5년 후 30년 만기 국채를 현재 가격으 로 매수하기로 약정하는 본드포워드거래를 체결하는 경우, 5년 후 해당 국채를 현재 가격 으로 인수해야 하는데 이러한 거래는 보험사의 자산 듀레이션을 늘리고 금리 상승으로 인 한 채권 가격 하락 위험을 헤지하는 효과를 가져올 수 있다. 이 외에도 기업들이 채권 포 트폴리오의 금리 위험을 헤지하는 경우나 투자자가 금리 전망에 따라 유리한 가격에 거래 를 미리 체결하는 경우에 사용하며, 금융기관이 고객에게 맞춤형 금리 상품을 제공하는 도구로 이용하기도 한다.',
  },
  '본원소득': {
    title: '본원소득',
    content: '제도단위(비금융법인, 금융법인, 일반정부, 가계 및 비영리단체)가 생산과정에 참여하거 나 생산활동에 제공된 자산을 소유함에 따라 발생하는 소득으로 국민순소득(NNI; Net National Income)이라고도 한다. 이는 생산에 의해 창출된 부가가치에서 지급된다. 구 체적으로 본원소득은 피용자보수에 영업잉여, 순생산 및 수입세, 순수취재산소득을 더하 여 계산한다. 본원소득 = 피용자보수 + 영업잉여 + 순생산 및 수입세 + 순수취재산소득',
  },
  '본원소득수지': {
    title: '본원소득수지',
    content: '본원소득수지는 급료 및 임금 수지와 투자소득수지로 구분된다. 급료 및 임금 수지는 외 국인 근로자에게 지급되거나 내국인 해외근로자가 수취하는 금액의 차이를 의미한다. 투 자소득수지는 대외 금융자산과 부채의 보유에 의해 발생하는 배당금과 이자 등의 수입과 지급의 차이를 말하는데, 투자 형태에 따라 직접투자소득, 증권투자소득, 기타투자소득으 로 세분된다.',
  },
  '본원통화': {
    title: '본원통화',
    content: '통화는 일차적으로 중앙은행의 창구를 통하여 공급되는데, 이를 통화량의 원천이 되는 통 화라 하여 본원통화(RB; Reserve Base)라고 한다. 본원통화는 민간보유현금과 금융기관 의 지급준비금의 합계인데, 이는 중앙은행 대차대조표상의 화폐발행액(민간보유현금+금 융기관 보유 시재금)과 금융기관의 중앙은행 지급준비예치금의 합계와 같다. 중앙은행이 증권을 매입하거나 금융기관에 대출을 실시하면 금융기관의 지급준비금이 늘어나 본원통 화가 증가하게 된다. 중앙은행이 보유하고 있는 정부예금을 정부가 필요에 따라 인출하는 경우에도 본원통화가 공급된다. 이렇게 공급된 통화의 일부는 민간의 현금보유성향에 따 라 민간보유로 남게 되며, 나머지는 대부분 금융기관의 예금에 대한 지급준비금이 된다. 그런데 금융기관은 지급준비금 가운데 중앙은행에서 정하는 필요지급준비금을 제외한 나 머지 자금을 대출 등으로 민간에 공급한다. 민간에 공급된 자금은 상당부분이 금융기관에 예금 등으로 다시 유입되고, 금융기관은 그 가운데 필요지급준비금을 제외한 나머지를 또 다시 민간에 공급한다. 이러한 과정이 반복됨으로써 금융기관은 본원통화의 여러 배(통화 승수)에 해당되는 파생통화를 시중에 공급하게 된다. 이러한 과정을 수식화하면 ‘통화량 = 통화승수×본원통화’가 된다.',
  },
  '볼커룰': {
    title: '볼커룰',
    content: '2008년 글로벌 금융위기를 계기로 2010년 7월 미국 의회가 제정한 「금융개혁법(Dodd- Frank Wall Street Reform and Consumer Protection Act)」의 핵심 조항(제619조)으 로 상업은행의 과도한 위험추구를 막는 규제이다. 전 연방준비제도이사회 의장이자 오바 마 정부의 백악관 경제회복자문위원회(ERAB) 위원장인 폴 볼커(Paul Volcker)의 제안이 대폭 반영되어 볼커룰(Volcker Rule)이라 부른다. 이 조항의 골자는 은행의 자기계정투 자(proprietary trading)를 금지하고, 헤지펀드 및 사모펀드에 대한 투자를 제한(개별 펀 드 순자산가치의 3%, 총투자는 해당 은행 Tier 1 자본의 3% 이내)하는 것이다. 볼커룰과 관련한 논란의 핵심은 금지되는 자기계정투자의 범위를 명쾌하게 확정짓기 어렵다는 점 이다. 자기계정투자에는 수익을 얻기 위한 적극적 또는 투기적 거래도 있지만 고객을 위 한 시장조성이나 위험을 회피하기 위한 헤지 목적의 거래도 섞여 있는데 이를 일괄적으로 금지하면 시장의 유동성과 효율성이 크게 저하된다는 우려가 많았다. 이러한 의견을 반영 한 최종안에 따르면 은행은 트레이딩계정에 주식, 채권 등을 보유할 수 있지만 그 규모는 ‘합리적으로 예측할 수 있는 고객의 단기적인 수요’에 국한되어야 하며, 헤지 목적의 거래 는 ‘구체적이고 식별 가능한 리스크’와 연계되어 있을 때만 허용된다. 볼커룰은 연방준비 제도이사회(FRB), 연방예금보험공사(FDIC), 증권거래위원회(SEC), 상품선물거래위원회 (CFTC), 통화감독청(OCC) 등 5개 금융감독기관의 승인을 거쳐 2013년 12월 10일 최종 안이 확정되었고 2014년 4월 1일 시행 예정이었으나 미 연준은 은행들의 적응기간이 필 요할 것으로 판단하여 2015년 7월 21일부터 시행토록 하였다.',
  },
  '부가가치': {
    title: '부가가치',
    content: '부가가치(Value Added)는 일정 기간 동안에 경제활동주체가 생산활동에 참여하여 새로 이 창출한 가치를 말하는데, 총산출에서 중간투입(소비)을 차감하여 구할 수 있다. 국민소 득계정에서는 국민경제 부가가치 총액이 국내총생산이며, 구체적으로는 피용자보수, 영 업잉여, 고정자본소모, 생산 및 수입세, 보조금으로 구성되어 있다.',
  },
  '부가가치기준 무역(TiVA)': {
    title: '부가가치기준 무역(TiVA)',
    content: '부가가치기준 무역(TiVA; Trade in Value Added)은 국가간 거래를 재화와 서비스의 각 생산 단계에서 창출된 부가가치를 기준으로 파악하는 경제통계이다. 최근 글로벌 공급망 (Global Value Chain)이 복잡해지면서 한 제품이 여러 국가의 부품, 설계, 생산과정을 거 쳐 완성되고 있다. 따라서 재화와 서비스를 최종 수출 국가 몫으로만 기록(gross value)하 는 기존 통계로는 교역이 각국의 경제에 미치는 영향을 분석하는 데 한계가 있다. 전통적 인 무역통계는 중간재 거래액이 중복계상(double-counting)되고, 실제로 중간재를 생산 하고 가치 창출에 기여한 국가들의 기여도가 정확히 반영되지 않는다. 이에 반해 부가가 치기준의 무역(TiVA)은 상대국 최종수요로 인해 자국에서 창출되는 부가가치의 이입액 (VA-in: 무역통계의 수출과 대응)과 자국의 최종수요로 인해 상대국에서 창출되는 부가 가치의 이출액(VA-out: 무역통계의 수입과 대응)으로 정의한다. 부가가치기준의 무역은 무역 구조를 보다 정확하고 투명하게 파악할 수 있어 국가별 경쟁력 분석, 산업정책 수립, 국제 협상 전략 등에 중요한 기초자료이다. 한편, 부가가치기준 무역은 산업간 거래관계 를 통해 상호 의존관계를 분석하는 산업연관분석의 원리를 적용한 국제산업연관표를 활 용하여 측정할 수 있다.',
  },
  '부가가치유발계수/부가가치계수': {
    title: '부가가치유발계수/부가가치계수',
    content: '소비, 투자, 수출 등 최종수요의 발생이 국내생산을 유발하고 생산 활동에 의해서 부가가 치가 창출되므로 최종수요는 부가가치 창출의 원천이 된다. 이러한 최종수요와 부가가 치와의 기능적 관계는 산업연관표를 이용하면 파악할 수 있다. 부가가치유발계수(Value Added Inducement Coefficients)는 최종수요가 한 단위 발생할 경우 국민경제 전체 에서 직·간접으로 유발되는 부가가치 단위를 보여주는 계수이다. 예를 들어 농림수산품 의 부가가치계수가 0.9라는 것은 농림수산품에 대한 최종수요가 한 단위 발생할 경우 직· 간접으로 유발되는 부가가치가 0.9단위임을 의미한다. 한편, 각 산업별 부가가치유발계 수와 수입유발계수의 합은 항상 1이 된다. 이는 국민경제 전체적으로 보면 최종수요 총 액에서 수입을 차감하여 나타낸 지출국민소득이 생산국민소득인 부가가치총액과 항상 일치하는 원리와 같은 의미이다.',
  },
  '부동화/무권화': {
    title: '부동화/무권화',
    content: '증권의 부동화(Immobilization)란 실물증권을 중앙예탁기관에 집중 보관하여 매매거 래 또는 담보거래 등에 따른 증권의 권리이전을 계좌대체 방식으로 처리함으로써 증권 의 실물인도의 필요성을 제거하는 것을 말한다. 증권실물은 이동하지 않고 예탁기관의 장 부상 대차기재에 의하여 증권에 대한 권리가 이전됨으로써 실물증권 이동에 따른 분실· 도난의 위험성, 사무처리의 번잡성 등의 문제점을 해결할 수 있다. 한편 증권의 무권화 (Dematerialization)란 유가증권에 대한 권리를 표시하는 실물증권을 발행하지 않고 증 권에 대한 권리가 오로지 장부(발행기관 및 중앙예탁기관의 계좌)상에 전자기록 형태로 존재하도록 하여 신주발행 및 증권유통에 따른 권리를 이전하는 것을 말한다.',
  },
  '부실채권(NPL)': {
    title: '부실채권(NPL)',
    content: '금융기관의 대출이나 지급보증 중 차주의 재정상황 악화로 인해 회수가 어려운 자산을 의미한다. 「은행업 감독규정」의 자산건전성 분류기준에 의하면 보유자산의 건전성은 ‘정상’, ‘요주의’, ‘고정’, ‘회수의문’ 및 ‘추정손실’ 등급으로 구분된다. 이 중에 부실채권 (NPL; Non-Performing Loan)은 차주의 채무상환능력 저하가 현재화되거나 원리금 상 환이 3개월 이상 연체된 고정 이하 등급(‘회수의문’ 및 ‘추정손실’ 포함)의 대출 등 자산에 해당한다. 부실채권 규모가 증가하게 되면 금융기관은 정상채권보다 더 큰 규모의 대손 충당금을 적립해야 하며 이에 따른 비용 증가로 당기순이익이 감소하고 자기자본비율도 하락하게 된다.',
  },
  '부채담보부증권(CDO)': {
    title: '부채담보부증권(CDO)',
    content: 'CDO(Collateralized Debt Obligation)란 회사채나 대출채권 등으로 구성된 pool을 기초자산으로 하여 AAA등급에서 equity(non-rated)까지의 다양한 신용등급으로 발행된 여러 종의 선·후순위 채권을 말하며, 기초자산의 종류에 따라 회사채를 기초자산으로 하 는 회사채 담보부증권(CBO; Collateralized Bond Obligation), 대출채권을 기초자산으 로 하는 대출채권 담보부증권(CLO; Collateralized Loan Obligation)으로 분류된다. 그 리고 발행목적에 따라 주로 은행 등의 금융기관이 재무상태표상에서 위험자산을 제거하 기 위하여 발행하는 Balance Sheet CDO와 고수익의 원자산인 대출금, 회사채 등과 선· 후순위 채권 간의 이자차익을 얻기 위해 발행하는 Arbitrage CDO 등이 있다. 미국의 모 기지 전문 대출기관들은 2000년대 초중반 부동산 활황을 틈타 대출자금을 조달하기 위하 여 모기지 채권이나 주택저당증권(MBS)을 대량으로 발행하였고, 투자은행들이 이를 사들 여 합성한 뒤 발행한 채권이 바로 CDO였다. 2007년 주택담보대출 연체율이 높아지면서 이른바 서브프라임 모기지론 사태가 벌어져 채권 가격이 폭락함으로써 주요 금융회사 등 투자자들이 큰 손실을 입고 글로벌 금융위기로 이어지게 되었다.',
  },
  '부채비율': {
    title: '부채비율',
    content: '부채를 자기자본으로 나눈 비율로 대표적인 안정성 지표이다. 이 비율이 낮을수록 재무구 조가 건전하다고 판단할 수 있다. 부채비율은 자기자본비율과 역(逆)의 관계에 있어 자기 자본비율이 높을수록 부채비율은 낮아지게 된다. 부채에는 차입금, 회사채, 매입채무, 미 지급금, 부채성충당금 등이 포함되며, 지급기일 도래 시점에 따라 1년 이내에 지급기일이 도래하는 유동부채, 1년 이후에 지급기일이 도래하는 비유동부채로 분류할 수 있다. 경영 자 입장에서는 단기채무 상환의 압박을 받지 않고 투자수익률이 차입금리 등의 조달금리 를 상회하는 한 타인자본을 계속 이용하는 것이 유리하다. 그러나 부채비율이 높은 기업 은 상대적으로 경기나 금리변동에 취약하다. 현금흐름이 악화되거나 금리가 상승하면 이 자 부담이 커지고 원리금 상환이 어려워질 가능성이 커지기 때문이다. 부채비율 = [(유동부채 + 비유동부채)/자기자본] × 100',
  },
  '분리결제': {
    title: '분리결제',
    content: '분리결제(Free of Payment)는 증권매매거래 결제시 증권인도와 대금지급이 동시에 이루 어지지 않고 개별적으로 이루어지는 방식이다. 증권인도와 대금지급이 동시에 이루어지 는 동시결제(DVP)방식과 달리 증권인도와 대금지급 간에 시차가 발생하므로 거래당사자 일방에게 결제리스크가 발생할 수 있다. 이에 따라 주요국에서는 주로 증권결제기관과 자 금결제기관을 연계한 증권대금동시결제방식을 이용하고 있으며 「지급결제 및 시장인프 라위원회」(CPMI)와 「국제증권감독기구」(IOSCO)에서 제정한 국제기준인 「금융시장인프 라에 관한 원칙」(PFMI)에서도 동시결제방식을 권고하고 있다.',
  },
  '분산원장기술': {
    title: '분산원장기술',
    content: '분산원장기술(DLT; Distributed Ledger Technology)은 거래정보가 기록된 원장을 특 정 기관의 중앙 서버가 아닌 공유(P2P; Peer-to-Peer) 네트워크에 분산하여 다수의 참가 자가 공동으로 기록·관리하는 기술이다. 전통적 금융시스템의 근간을 이루고 있는 중앙 집중형(centralized) 시스템은 원장을 집중·관리하는 ‘제3의 기관’(TTP; Trusted Third Party)을 설립하고 해당 기관에 대한 신뢰를 확보하는 방식으로 발전해 왔다. 예컨대 투 자자들이 증권회사를 통해 거래하는 주식을 집중·관리하는 ‘한국예탁결제원’(KSD)이 곧 제3의 기관이다. 반면 분산원장기술에서는 다수 참여자가 거래내역이 기록된 원장 전체 를 각각 분산 보관(decentralized)하고, 거래할 때마다 이를 검증하며 갱신하는 작업을 공동으로 수행한다. 분산원장기술은 가상자산 발행처럼 누구나 접근 가능하고 거래의 기 록 및 관리에도 참여할 수 있는 개방형·비허가형(public, permissionless)과 기업내부 또는 금융회사간 시스템처럼 허가받은 경우에만 접근할 수 있는 폐쇄형·허가형(private, permissioned)으로 나눌 수 있다. 분산원장기술은 당초 비트코인·이더리움 등 가상자산 (virtual asset)의 기반 기술로 개발되었으나, 현재는 동 기술을 다양한 금융서비스에 활용 하기 위한 방안을 모색중이다.',
  },
  '분수효과': {
    title: '분수효과',
    content: '분수효과(Trickle-up Effect, Fountain Effect)란 정부가 경제정책으로 저소득층과 중산 층의 소득을 먼저 늘려주면 이들의 소비 확대가 생산과 투자로 이어지면서 전체 경제활동 이 되살아나고 이로 인해 고소득층의 소득도 늘어날 수 있다는 주장이다. 즉 분수에서 물 이 아래에서 위로 솟아나는 것처럼 저소득층에서 시작된 소득과 소비 증대의 효과가 점차 상위 계층으로 확산되면서 전체 경제도 좋아질 수 있다는 것이다. 이러한 주장은 영국의 경제학자인 케인즈(J. M. Keynes)가 경제 활성화에 긴요한 총수요 진작을 위해서는 상대 적으로 한계소비성향이 높은 저소득층과 중산층에 초점을 맞추어 정부지출을 늘리고 세금 을 줄여야 한다는 논리에 근거하고 있다. 이는 분배보다는 성장에, 그리고 저소득층보다는 고소득층에 중점을 두어 경제정책을 운용해야 한다는 낙수효과와는 상반되는 개념이다.',
  },
  '분절화': {
    title: '분절화',
    content: '‘세계화(globalization)’에 대응되는 개념으로 경제활동이나 시장이 작은 부분으로 나뉘 어 서로 독립되거나 상호작용이 적어진 현상을 ‘분절화(Fragmentation)’라고 한다. 분절 화는 기술 발전이나 정치적 이유 등에 기인하며 이로 인해 경제적 효율성이 높아질 수도 있지만 협력과 경쟁은 줄어들게 된다. 최근 분절화 경향은 미국과 중국 간 무역갈등 심 화, 주요국의 보호무역정책 경향, 세계무역기구(WTO) 등 국제기구의 제한적 역할 등으 로 확대되는 모습이다. 분절화는 대외의존도가 높은 우리 경제에 부정적 영향을 미칠 우 려가 크다.',
  },
  '불완전경쟁시장': {
    title: '불완전경쟁시장',
    content: '시장에 의한 가격결정에 어떠한 영향도 미칠 수 없는 상태를 완전경쟁이라 한다. 이는 경 제주체의 자유로운 시장 진입과 퇴출, 다수의 공급자와 수요자 존재, 거래되는 재화 및 서 비스의 동질성, 정보의 완전성이 충족되는 경우에만 존재 가능하다. 현실에서는 이러한 요건이 충족되기 어려워 독점시장, 과점시장과 독점적 경쟁시장과 같은 형태의 불완전경 쟁시장이 나타나게 된다. 하나의 공급자가 존재하여 재화 및 서비스의 가격을 결정하는 시장을 독점시장이라고 한다. 두 개 이상의 소수 공급자만이 서로 경쟁하는 시장을 과점 시장이라고 하는데, 이러한 예로는 국내의 이동통신서비스, 자동차 시장 등을 들 수 있다. 마지막으로 독점적 경쟁시장에서는 다수의 공급자가 각기 특화된 재화 및 서비스를 생산 함으로써 독자적으로 가격을 결정할 수 있는 시장지배력을 행사할 수 있다.',
  },
  '불태화정책': {
    title: '불태화정책',
    content: '수출입 거래나 국경 간 자본유출입 거래는 국내은행을 통해 국내통화로 전환되며 이에 따 라 국내통화량이 변동하게 된다. 이러한 통화량의 변동은 금리와 물가에 영향을 미칠 가 능성이 있다. 불태화정책(Sterilization Policy)이란 이처럼 해외부문으로부터의 외화유 입으로 인해 본원통화가 증가하고 그 결과로 금리나 물가가 중앙은행이 목표한 바와 다르 게 변동할 우려가 발생할 경우, 중앙은행이 공개시장 조작이나 지급준비율 조정 등을 통 해 본원통화의 증가를 상쇄시키는 정책을 말한다. 따라서 불태화정책의 수단은 일반 통화 정책과 같지만 그 목적이 해외부문에서 비롯된 통화량 증가를 억제하기 위한 것이란 점에 서 다르다. 불태화정책은 중앙은행 등의 외환시장 개입과 연관되어 이루어지는 경우도 있 다. 중앙은행이 환율 안정을 위해 외환시장에서 외환을 매입할 경우 그 반대급부로 원화 대금이 거래상대방에 지급되고 이에 따라 국내 통화량이 증가하게 되는데, 이 경우 중앙 은행은 공개시장조작 등을 통해 증가분을 회수(불태화)함으로써 통화량을 개입 전 수준으 로 유지할 수 있다.',
  },
  '브레튼우즈체제': {
    title: '브레튼우즈체제',
    content: '브레튼우즈체제는 1944년 7월 미국의 뉴햄프셔주 브레튼우즈에서 44개 연합국 대표들 이 새로운 국제통화제도 구축을 위해 체결한 협정에 따라 발족한 국제통화체제를 말한다. 이 협정을 체결하게 된 배경은 1930년대 대공황의 여파로 인한 금본위제도 붕괴, 무역 규제 확대, 환율 불안정에 이어 1940년대 국제유동성 부족, 외환규제 확산 등으로 국제 통화질서가 위기에 직면하게 되었기 때문이다. 브레튼우즈체제는 국제통화제도의 본질 적인 기능인 유동성 공급과 국제수지 조정 메커니즘을 미달러화를 기축통화로 하는 금환 본위제도와 조정가능 고정환율제도를 통해서 해결하고자 하였다. 즉 각국은 달러를 대외 준비자산으로 보유하고 미국은 다른 나라가 보유한 달러에 대해 금태환을 보장하며, 각국 의 고정환율에 조정이 필요한 경우 국제통화기금(IMF)과 협의하여 변경할 수 있도록 하 였다. 이를 뒷받침하기 위하여 설립된 국제기구가 IMF와 국제부흥개발은행(IBRD)이다. 1960년대 들어 국제유동성 수준이 미국의 국제수지 상태에 따라 결정되고 환율 변경을 통한 불균형 개선이 쉽지 않은 등의 구조적인 문제가 대두되는 가운데 1971년 미국이 달 러화의 금태환을 정지하고 뒤이어 선진국들이 변동환율제도로 이행함에 따라 브레튼우즈 체제는 사실상 붕괴되었다.',
  },
  '브렉시트(Brexit)': {
    title: '브렉시트(Brexit)',
    content: '브렉시트(Brexit)는 영국(Britain)과 탈퇴(Exit)의 합성어로 영국의 유럽연합(EU) 탈퇴를 뜻한다. 영국은 2016년 6월 23일 유럽연합(EU) 탈퇴 여부에 대한 국민투표 실시를 통해 51.9%의 찬성으로 EU 탈퇴를 결정하였다. 영국 국민들이 EU 탈퇴를 찬성하게 된 배경 에는 2008년 글로벌 금융위기 이후 남유럽국가 구제금융 지원, EU의 난민 포용정책 등 으로 영국의 재정부담이 가중되는 가운데 회원국 노동자의 영국 이주에 따라 영국 고용시 장이 악화되는 데 대한 불만이 크게 작용하였다. 2017년 3월 영국 정부가 EU 정상회의 (European Council)에 탈퇴 의사를 공식 통보함으로써 탈퇴 협상이 개시되었으며 이후 양자간 긴 협상 끝에 2020년 12월 말 공식적인 탈퇴 절차가 완료되었다. 브렉시트 이후 수년간 영국 경제는 여러 가지 부정적인 영향을 받았다. 영국의 대EU 수출은 감소한 반면 수입은 증가하여 무역적자가 확대되었고, 저임금 이민 노동자 감소로 인한 노동인력 부족 과 비EU 이민자 증가 등이 경제·사회적 문제로 대두되고 있다. 이에 따라 브렉시트에 대 한 회의적 시각이 커지게 되었다.',
  },
  '브릭스(BRICS)': {
    title: '브릭스(BRICS)',
    content: '브릭스(BRICS)는 브라질(Brazil), 러시아(Russia), 인도(India), 중국(China), 남아프리 카공화국(South Africa) 등 5개국의 영문 앞 글자를 따서 만든 용어다. 2001년 골드만 삭스의 짐 오닐이 잠재 경제력이 높은 브라질(Brazil), 러시아(Russia), 인도(India), 중국 (China) 등 4개국을 지칭하기 위해 BRICs라는 용어를 처음 사용하였다. 이들 4개국은 2006년부터 비공식적인 외무장관회의를 시작한 데 이어 2009년 첫 번째 정상회의를 개 최한 이후 지속적으로 모임을 갖고 있다. 2011년 남아프리카공화국이 포함되면서 이들을 가리키는 용어가 기존의 BRICs에서 BRICS로 바뀌었으며 이에 따라 브릭스의 지정학적 대표성이 부각되는 한편 이들 5개국 간 대화의 깊이와 폭도 더욱 넓혀왔다. 2024년 1월 이집트, 에디오피아, 이란 아랍에미레이트가, 2025년 1월에는 인도네시아가 정식 회원국 으로 가입하였다. 브릭스는 현재의 경제성장 속도와 앞으로의 발전 전망에 비추어 신흥 경제대국으로 발돋움할 가능성이 높은 나라들을 하나의 경제권으로 묶은 대표적인 블록 으로 자리잡아 가고 있다. 실제로도 브릭스 국가들은 공통적으로 거대한 영토와 노동력, 풍부한 지하자원 등 경제대국으로 성장할 수 있는 잠재력을 갖춘 것으로 평가되고 있다.',
  },
  '브릿지론': {
    title: '브릿지론',
    content: '개인이나 기업이 주택구입, 대규모 개발 프로젝트 수행 등을 위해 장기 자금조달이 필요 할 경우, 해당 자금 마련 이전에 일시적으로 소요되는 비용을 충당하기 위해 단기 자금조 달 수단으로 이용하는 것이 브릿지론이다. 마치 다리(bridge) 역할을 하는 자금조달 수단 이다. 예를 들어 부동산 개발 사업을 실시할 경우 토지를 매입하는 초기 단계에서 이에 필 요한 자금을 본격적인 PF(Project Financing) 대출로 전환되기 이전에 일시적으로 조달 하는 용도로 사용된다. 브릿지론은 일반적으로 6개월에서 1년 만기 정도의 단기대출이며 본 PF대출에 비해 금리가 높다. 이는 초기 사업비용 충당이 주목적인 브릿지론의 특성을 감안할 때 리스크가 높은 점이 반영된 것이다.',
  },
  '비관측경제(NOE)': {
    title: '비관측경제(NOE)',
    content: '비관측경제(NOE; Non-observed Economy)란 국내총생산(GDP)의 추계에 이용되는 기 초자료와 행정자료에 누락된 경제활동을 의미한다. GDP는 원칙적으로 합법적이건 불법 적이건 모든 경제적 거래에서 발생한 소득을 포함해야 하나 현실적으로 지하경제나 불법 생산 등은 반영하기가 쉽지 않다. 비관측경제는 일반적으로 문제영역(problem areas)에 속하는 활동 때문에 발생한다. 대표적인 경우가 흔히 지하경제(underground economy) 나 은닉경제(hidden economy)로 표현되는 경제활동이다. 이는 조세나 사회적 의무의 회피, 근로안전이나 소비자보호 등 법적·행정적 규제에 따른 비용의 회피를 위하여 은밀 하게 이루어진다. 이러한 거래는 세무·통계 당국에 축소 보고되기도 하고 현금거래로만 행해져 아예 누락되기도 한다. 또한 마약, 장물 거래, 성매매 등과 같이 생산물의 내용이 불법적인 경우도 거래내역을 포착하기 힘들다. 불법생산(illegal production)은 판매나 소유 자체가 법에 의해 금지되어 있으나 GDP에는 포함되어야 한다는 것이 국제적으로 합의된 원칙이다. 이 밖에도 “통계적 지하(statistical underground)”라고 불리는 소규모 기업이나 자영업자 등에 대한 미흡한 기초통계 자료 등에 의해서도 비관측경제가 존재하 게 된다.',
  },
  '비교우위': {
    title: '비교우위',
    content: '특정 국가나 경제주체가 다른 국가나 경제주체에 비해 상대적으로 더 적은 기회비용으로 어떤 재화나 서비스를 생산할 수 있는 능력을 말한다. 각국이 비교우위를 가진 상품 생산 에 특화하고 이를 교역함으로써 상호 이익을 극대화할 수 있다는 논리로 국가간 무역 발 생 이유를 설명하고 있다. 고전학파 경제학자인 리카르도(D. Ricardo)가 제시한 이론으 로 자유무역이 교역 대상국 모두에게 유리하다는 국제 분업 및 무역에 관한 이론적 기반 을 제공하였다. 그러나 노동가치설에 근거하여 노동투입에 따른 요소비용만을 고려하였 고 두 나라 간에 두 가지 재화 생산만이 가능하다는 제한적인 가정에 근거하고 있다. 오늘 날에는 상품의 종류가 세분되고 또한 같은 품질과 특성을 지닌 상품이 다수 생산되고 있 어 생산비용의 상대적 차이만으로 무역의 발생 원인을 설명하는 데는 한계가 있다. 한편, 보다 먼저 애덤 스미스(Adam Smith)는 생산성의 절대적 차이에 근거한 국제분업과 무역 의 절대우위이론을 주장하였다.',
  },
  '비용인상 인플레이션': {
    title: '비용인상 인플레이션',
    content: '재화나 서비스의 생산과 관련하여 투입요소 비용의 상승에 의해 물가가 지속적으로 오 르게 되는 것을 비용인상 인플레이션(Cost-Push Inflation)이라고 한다. 주요 투입요소 인 노동, 자본, 원자재 등의 가격이 상승하면 기업은 증가한 생산비용을 가격에 반영시키 므로 최종재의 가격이 오르게 되는 것이다. 비용인상 인플레이션은 경제 내의 생산활동 을 위축시키면서 유발되므로 사람들의 소득 수준이 악화될 가능성이 크다. 실제로 1970 년대 발생한 2차례의 오일쇼크(석유가격이 급등하여 재화 및 서비스의 생산비가 크게 상승했음)로 인해 유발된 비용인상 인플레이션은 이러한 가능성을 보여주고 있다. 당시 유가 상승으로 인해 생산비가 증가하면서 생산활동이 위축되고 이로 인해 경기가 둔화되 었다.',
  },
  '비트코인': {
    title: '비트코인',
    content: '비트코인(Bitcoin)은 가상통화(암호통화)이자 디지털 지급시스템 전자 토큰 형태의 가상 자산이다. 비트코인 시스템은 중앙 저장소 또는 단일 관리자 없이 탈중앙화된 구조로 작 동한다. 비트코인은 사토시 나카모토라는 사람(집단)에 의해 만들어진 것으로 알려져 있 고 2009년 개방형 소프트웨어로 배포되었다. 이 시스템은 공유형(peer-to-peer)이며, 거래는 중개자 없이 블록체인 소프트웨어를 이용하는 참여자(nodes) 사이에 직접 이뤄진 다. 이런 거래들은 공유(P2P) 네트워크상 참여자의 작업증명(proof-of-work)을 통해 검 증되고 공개된 분산원장인 블록체인에 기록된다. 승인된 거래의 새 그룹인 한 블록은 대 략 10분에 한 번씩 만들어져서 블록체인에 추가되고 신속하게 모든 참여자에게 보내진 다. 비트코인은 컴퓨터 처리 능력(power)을 활용해서 이뤄지는 채굴(mining)에 대한 보 상으로 발행되고 있으며, 비트코인을 다른 통화·상품·용역 등과 교환하는 거래도 발생하 고 있다. 중앙은행이 발행한 법정화폐가 아닌 비트코인은 비트코인플랫폼에서 거래되며 투자대상으로도 많은 관심을 받고 있다. 또한 익명성으로 자금세탁 등 불법거래에 악용될 소지가 많아 일부 국가에서 비트코인 등 가상통화의 거래를 규제하기도 한다. 일본의 경 우 비트코인의 거래이익에 대해 세금을 부과한다. 비트코인은 추가되는 한 블록당 새로 6.25비트코인을 보상하는데(2020.5월 기준), 21만개가 채굴될 때(대략 4년)마다 그 보상 이 반으로 줄어든다. 비트코인의 총량은 21백만개이며 2140년경 모두 채굴될 것으로 전 망된다. 비트코인은 그 시스템의 설계시 그 수량을 한정시켜 놓았기 때문에 원칙적으로 인플레이션에 의해 가치가 떨어질 수 있는 화폐와 다른 속성을 지닌다. 한편 2017년에는 비트코인에서 규칙을 근본적으로 바꾸는 하드포크(hard-fork)가 발생하였고, 이 과정에 서 8월 1일에는 ‘비트코인캐시(BCH)’가, 10월 25일에는 ‘비트코인골드(BTG)’가 새롭게 만들어져 기존 비트코인(classic bitcoin)과는 별도로 거래되고 있다.',
  },
  '빅데이터': {
    title: '빅데이터',
    content: '빅데이터(Big Data)란 복잡하고 다양한 대규모 데이터세트 자체는 물론 이 데이터세트로 부터 정보를 추출하고 결과를 분석하여 더 큰 가치를 창출하는 기술을 뜻한다. 수치 데이 터 등 기존의 정형화된 정보뿐 아니라 텍스트·이미지·오디오·로그기록 등 여러 형태의 비 정형 정보가 데이터로 활용된다. 최근 모바일 기기와 SNS 이용 보편화, 사물인터넷 확산 등으로 데이터의 양이 기하급수적으로 늘어나고 있다. 하지만 저장매체의 가격 하락 등 으로 데이터 관리비용이 감소하고, 클라우드 컴퓨팅 등으로 데이터 처리·분석 기술도 발 전하면서 빅데이터 활용 여건은 계속 개선되어가고 있다. 빅데이터 관련 기술은 데이터를 수집·저장하는 데이터 ‘처리기술’과 데이터를 분석·시각화하는 데이터 ‘분석기술’로 구성 된다. 데이터 처리기술의 발달은 저가의 서버와 하드디스크를 여러 대 연결하여 대용량 데이터를 분산 처리함으로써 기존의 고비용 데이터 분석 솔루션을 대체하였다. 데이터 분 석기술의 발달은 기존 데이터 분석에서는 불가능했던 비선형적 상관관계 규명, 감성분석 등 비정형화된 분석도 가능하게 만들었다. 여기서 감성분석은 텍스트 채굴(text mining) 기술의 하나로 텍스트(예: 상품 품평)에 나타난 사람들의 태도·의견·성향 등 주관적인 속 성을 지닌 데이터 추출·분석기법이다. 이처럼 빅데이터는 대량(high-volume), 초고속 (high-velocity), 고다양성(high-variety), 고가변성(high-variability)의 특성을 지니며 고정확성(high-veracity)을 확보해야 하는 정보 자산이다.',
  },
  '빅맥지수': {
    title: '빅맥지수',
    content: '빅맥지수(Big Mac Index)는 각국 통화의 구매력 정도 또는 환율 수준을 측정하기 위해 일물일가의 법칙을 햄버거 가격에 적용한 것으로 영국에서 발행되는 주간 경제전문지 이 코노미스트지(The Economist)에서 1986년 이래 매년 전 세계적으로 판매되고 있는 맥 도날드의 빅맥 가격을 비교·분석해서 발표하고 있다. 맥도날도의 빅맥은 전 세계 120개 국에서 동일한 재화로 판매되고 있으므로, 이 빅맥지수를 이용하여 일물일가의 법칙 또 는 절대적 구매력평가를 간단하게 검증할 수 있는 기회를 독자들에게 제공한다는 취지이 다. 만약 일물일가의 법칙이 완전하게 성립한다면 세계 모든 나라에서 빅맥의 미달러화 가격이 동일하여야 하므로 실제 환율과는 다른 구매력평가환율을 산정해 볼 수 있다. 예 를 들어 어느 기준시점의 우리나라 빅맥 가격이 5,500원이고 미국에서의 가격은 5.69달 러라 하면, 구매력평가이론의 일물일가의 법칙이 성립한다면 원/달러 환율은 967원/달 러(=5,500원/5.69달러)가 되어야 한다. 그런데 그 시점의 실제 환율이 1,350원/달러라면 빅맥지수로 볼 때 원화는 미달러화 대비 약 28% 저평가되어 있다고 볼 수 있다.',
  },
  '빅테크': {
    title: '빅테크',
    content: '빅테크(Big Tech)는 세계적으로 규모가 크고 영향력이 큰 기술 기업들을 통칭하는 용어 이다. 주로 미국 정보기술산업에서 지배적인 기업들을 지칭하지만 중국 및 여타국들의 대 형 기술기업도 이에 포함된다. 빅테크는 다양한 국가에서 사업을 운영하며 세계경제에 큰 영향을 미친다. 미국의 구글(Google), 아마존(Amazon), 애플(Apple), 마이크로소프 트(Microsoft), 엔비디아(NVIDIA), 중국의 바이두(Baidu), 알리바바(Alibaba), 텐센트 (Tencent) 등이 대표적이다.',
  },
  '빈일자리율': {
    title: '빈일자리율',
    content: '현재 비어있거나 1개월 안에 새로 채용될 수 있는 일자리 수를 전체 근로자 수와 빈 일자리 수의 합으로 나눈 백분율을 의미한다. 우리나라에서는 고용노동부가 매달 발표하고 있다.',

  '사이드카': {
    title: '사이드카',
    content: '사이드카는 주식시장에서 선물 가격 급등락으로 인한 현물 시장의 과도한 변동을 막기 위 해 프로그램 매매 호가의 효력을 일시적으로 정지시키는 시장 안정화 장치이다. 코스피200 선물 가격이 전일 종가 대비 5%(코스닥150의 경우 6%) 이상 변동(상승 또는 하락)한 시세 가 1분 이상 지속될 경우 발동되며, 프로그램 매매 호가의 효력이 5분간 정지된다. 사이드 카는 프로그램 매매만을 하루 한 차례에 한해 일시적으로 중지시키고 발동 5분 후 자동으 로 해제되며, 주식시장 매매거래 종료 40분 전 이후에는 발동하지 않는 특징이 있다. 사이 드카는 증권시장의 공습경보로 여겨지는 ‘서킷브레이커(Circuit Breaker)’의 전 단계로, 투자자에게 합리적인 판단을 할 수 있는 시간적 여유를 주기 위한 경계경보라 할 수 있다.',
  },
  '사이버리스크': {
    title: '사이버리스크',
    content: '정보통신기술의 발달로 기업경영활동에서 디지털화가 가속화되고 상호 연결이 확대되어 감에 따라 전자상거래나 정보통신기술을 이용하여 이루어지는 활동 중 사이버 상에서 발 생하는 예기치 못한 사고로 인해 기업이 부담하게 될 유·무형의 비용이 증가하는 위험을 말한다. 사이버리스크 발생에 따른 유형의 비용에는 자금 분실, 컴퓨터시스템 손상 또는 악성코드 감염, 네트워크 폐쇄에 따른 조업중단, 고객정보 및 디지털자산의 분실, 정보 유출에 따른 법적 및 피해자 보상 등이 있으며, 무형의 비용으로는 고객 이탈, 기업 신뢰 도 하락, 브랜드 이미지 손상, 핵심기술 유출에 따른 경쟁우위 훼손 등이 있다. 사이버리 스크에 대한 대책으로는 사전 대응(secure)과 지속적 경계(vigilant) 및 신속한 복구능력 (resilient) 확보가 제시되고 있다. 한편 디지털 정보량의 증대와 클라우드 컴퓨팅 이용 기 업의 증가세를 감안할 때 향후 사이버리스크에 대한 노출은 더욱 늘어날 것으로 예상된다.',
  },
  '사전담보제': {
    title: '사전담보제',
    content: '사전담보제(Collateral Requirements)는 지급결제시스템의 참가자로 하여금 여타 시스 템 참가자들 모두에 대한 순채무를 결제하기에 충분한 담보를 사전에 제공토록 하여 결제 불이행이 실제로 발생하였을 때 결제불이행 기관의 담보를 처분하여 결제의 종료를 보장 하는 제도다. 이는 참가기관간 순채무액만을 지정시점에 결제하는 이연차액결제시스템에 서 일부 기관의 결제불이행이 타 기관의 연쇄적인 결제불이행으로 이어지지 않도록 하는 리스크 관리기법의 하나이다. 예치 담보로는 중앙은행 예치금이나 국채 등 유동성이 높은 증권이 주로 이용되고 있다. 만약 각 참가기관이 자신의 순채무한도 전액에 해당하는 담 보를 예치한다면 차액결제시스템은 결제불이행 기관의 수에 관계없이 나머지 참가기관에 어떠한 손실도 주지 않고 결제를 종료시킬 수 있다. 우리나라의 경우에도 차액결제시스템 에 참가하는 금융기관은 국채, 정부보증채, 통화안정증권 등을 차액결제 이행을 위한 담 보로 제공하도록 되어 있다.',
  },
  '사전적 정책방향 제시(Forward Guidance)': {
    title: '사전적 정책방향 제시(Forward Guidance)',
    content: '사전적 정책방향 제시는 향후 통화정책 방향에 대해 중앙은행이 명시적으로 시그널을 전 달하는 것으로 새로운 정책은 아니다. 그러나 글로벌 금융위기 이후 정책금리의 추가 인 하가 어렵고 경제여건의 불확실성이 높은 상황에서 주요국 중앙은행이 적극적으로 그 방 식을 다양화하여 활용하였다는 점에서 비전통적 통화정책의 일종으로 분류되고 있다. 중앙은행이 정책금리를 상당 기간 낮은 수준으로 유지할 것이라는 사전적 정책방향을 명 확히 제시할 경우 단기시장금리의 미래 기대경로를 낮추고 정책금리 경로 관련 불확실성 이 줄어들어 기간프리미엄도 축소되면서 장기금리의 하락에 기여할 수 있다. 또한 중앙은 행이 당면한 정책목표 간의 상충관계에 대한 견해를 제시하여 정책목표의 우선순위를 명 확히 전달할 수도 있다. 사전적 정책방향 제시는 미래에 대한 예고이기 때문에 정책적으 로 유효하기 위해서는 경제주체들의 중앙은행에 대한 신뢰가 긴요하다. 경제·금융 여건이 예상과 다르게 변화하여 중앙은행이 당초 공표한 정책방향을 변경하게 되면 상황에 따라 서는 금융시장의 변동성이 오히려 확대되고 중앙은행의 신뢰성에 부정적인 영향을 줄 가 능성이 있다. 또한 사전적 정책방향의 제시내용이 지나치게 복잡하고 이해하기 어려울 경 우 오히려 정책운영 방식의 명료성을 제약하고 정책 불확실성이 다시 높아지는 문제가 발 생할 수도 있다.',
  },
  '4차 산업혁명': {
    title: '4차 산업혁명',
    content: '2010년대 물리적, 디지털 및 생물학적 세계를 융합하여 사회·경제·산업 등 전반적으 로 충격을 주는 새로운 기술 영역이 등장한다. 4차 산업혁명(4IR; Fourth Industrial Revolution)은 인공지능(AI), 빅데이터, 사물인터넷(IoT), 블록체인 등의 새로운 정보 통신기술이 산업과 사회 전반에 가져온 근본적이고 혁신적인 변화를 말한다. 18세기 초 증기기관 발명으로 인한 산업혁명(1차) 이후 19세기 후반 전기를 기반으로 한 대량 생산체계, 20세기 중반 컴퓨터, 인터넷으로 인한 지식정보 혁명에 이은 4번째의 커다 란 변화이다. 이전 3번의 혁명처럼 일상은 물론 노동시장, 기업경영, 정부정책 등에 심 대한 영향을 주고 있다. 이 용어는 2016년 세계경제포럼(WEF)에서 회장인 클라우스 슈 밥(Klaus Schwab)이 처음 사용하였다. 그는 「4차 산업혁명」이라는 저서에서 인공지 능(AI)·로봇·사물인터넷·3D프린팅·자율자동차·양자컴퓨팅·나노테크 등의 기술을 4 차 산업혁명의 특징으로 보았다. 4차 산업혁명은 초연결성(hyperconnectivity), 초지능 (superintelligence), 더 빠른 속도(velocity), 더 많은 데이터 처리능력(volume), 더 넓 은 파급 범위(scope) 등의 특성을 지니는 ‘초연결지능 혁명’으로 볼 수 있다. 한편, 4차 산업혁명은 인공지능의 작업 대체로 인한 일자리 감소, 인간과 로봇(인공지능)의 공존, 개인정보 및 사생활 보호, 유전자 조작에 따른 생명윤리 등 새로운 과제도 낳고 있다.',
  },
  '사회보장제도': {
    title: '사회보장제도',
    content: '사회보장제도는 개인이 어떠한 불행을 당하더라도 국가가 최소한의 인간다운 생활을 보 장할 수 있도록 하는 제도이다. 사회 불평등 현상을 해결하기 위해 도입된 것으로 사회보 험과 공공부조, 사회복지서비스가 대표적이다. 사회보험(社會保險)은 산업재해, 실업, 질 병 등으로 인하여 소득이 상실되었을 때를 대비한 보험으로 산업재해보험, 국민연금, 고 용보험, 건강보험이 있다. 보험료는 일반적으로 혜택을 받는 개인과 고용주 또는 국가가 나누어 부담하며, 소득이 높을수록 부담이 높아진다. 한편 공공부조(公共扶助)는 비용 전 부를 국가가 부담하며 생활능력이 없는 사람의 최저한의 생활보호를 위해 마련된 제도로 기초생활보장제도가 대표적인 예이다. 마지막으로 사회복지서비스는 도움을 필요로 하는 모든 국민이 정상적인 생활을 할 수 있도록 도와주는 상담, 재활, 직업소개 및 지도 등 여 러 지원제도를 의미한다. 주로 아동, 노인, 장애인을 위한 복지제도가 여기에 포함된다.',
  },
  '사회보험': {
    title: '사회보험',
    content: '사회보험(Social Insurance)이란 보험방식을 통해 발생 가능한 각종 사회적 위험에 대처 함으로써 국민의 생활, 건강, 소득 등을 보장하는 제도를 가리킨다. 구체적으로는 ① 산업 재해보험(업무상 재해를 입었을 경우 신속한 보상 및 복귀 지원) ② 건강보험(질병, 상해, 사망 등의 사고가 발생할 경우 의료서비스 제공) ③ 국민연금(퇴직, 노령, 사망 등에 따른 당사자 및 유족의 생활보장) ④ 고용보험(실직자의 생활 안정 및 재취업 지원)으로 구분된 다. 이들 제도는 사회보장정책을 수행하기 위한 주요 수단으로 활용되며 특히 노동자와 그 가족을 발생 가능한 각종 위험으로부터 보호하는 것을 목적으로 한다. 사회보험은 반 드시 개인의 자유의사에 의하여 가입하는 것은 아니며 보험료는 국가, 기업 및 개인이 분 담하되 개인이 받을 위험 정도가 아닌 소득 수준에 비례하여 산정된다.',
  },
  '산업연관표(I/O Tables)': {
    title: '산업연관표(I/O Tables)',
    content: '일정 기간(보통 1년) 동안 국민경제 내에서 발생하는 재화와 서비스의 생산 및 처분과 관 련된 모든 거래 내역을 일정한 원칙과 형식에 따라 기록한 종합적인 통계표이다. 세로 방 향은 각 산업에서 생산활동을 위해 사용한 중간재, 노동, 자본 등 생산요소의 내역을 나타 내는 투입 구조를, 가로방향은 각 산업에서 생산된 산출물의 처분내역을 나타내는 배분구 조를 의미한다. 이 표를 통해 산업 간에 그물같이 복잡하게 얽혀 있는 상호연관관계를 파 악할 수 있다. 산업연관표는 1930년대 초 레온티에프(W. Leontief) 교수가 처음으로 작 성 발표한 이래 선진국은 물론 개발도상국에 이르기까지 많은 나라에서 작성되고 있다. 산업연관표는 경제구조 및 정책효과 분석에 많이 이용되고 있으며 국가 간 산업연관관계 나 지역경제 분석 및 환경, 에너지 분야 등에까지 다양하게 활용되고 있다. 우리나라에서 는 한국은행이 「1960년 산업연관표」를 처음 작성한 이후 매 5년마다(끝이 0과 5인 연도) 실측표를 작성하였으며 2006년부터는 매년 산업연관표를 작성하여 공표하고 있다.',
  },
  '삼불원칙': {
    title: '삼불원칙',
    content: '삼불원칙(Impossible Trinity, Trilemma)는 ① 고정환율 유지 ② 자본의 자유로운 이동 ③ 통화정책의 독립성 등 세 가지 정책목표를 동시에 만족시키는 것은 불가능함을 의미한 다. 고정환율제도하에서는 환율을 고정함으로써 환율 변동에 따른 충격을 완화하고 일정 부분 거시경제정책의 자율성을 확보할 수 있으나 이를 위해서는 자본이동을 제약할 수밖 에 없다. 반대로 자유변동환율제도하에서는 자본이 자유롭게 이동하므로 외화유동성 확 보가 용이하고, 외부 충격이 환율 변동을 통해 흡수되어 거시경제정책을 자율적으로 수행 하기 쉽다는 장점이 있으나 이를 위해서는 환율 변동을 용인할 수밖에 없다. 이 밖에 통화 위원회제도의 경우 국내통화를 미달러화 등에 일정 비율로 고정함으로써 환율 변동은 제 한할 수 있으나 외화 공급에 비례하여 국내통화가 자동적으로 공급되어야 하므로 통화정 책의 자율성은 크게 제약을 받을 수밖에 없다.',
  },
  '상계관세': {
    title: '상계관세',
    content: '상계관세(Countervailing Duties)는 수출국이 수출기업에 보조금이나 장려금을 지급하여 지나치게 낮은 가격을 책정할 경우 수입국이 이로 인한 경쟁력 저하를 상쇄하기 위해 부과 하는 관세를 말한다. 즉 수출국 정부의 보조를 받아 가격·품질 면에서 우위를 갖게 된 수입 품으로 인해 수입국이 피해를 입거나 피해를 입을 우려가 있는 경우 그 효과를 상쇄할 목 적으로 정규관세 이외에 부과하게 된다. 이러한 점에서 상계관세는 수입국 산업의 경쟁력 을 유지하기 위한 일종의 차별관세라 할 수 있다. 우리나라에서는 관세법 제57조에 국내 산업을 보호할 필요가 있다고 인정되는 경우 상계관세를 부과할 수 있다고 규정하고 있다.',
  },
  '상대적 빈곤율': {
    title: '상대적 빈곤율',
    content: '상대적 빈곤율은 처분가능소득이 중위소득(소득이 많은 순서대로 세웠을 때 정확히 중간 인 사람의 소득)의 50%를 밑도는 계층이 전체 인구에서 차지하는 비율을 말한다. 소득을 기준으로 한 빈곤선(50%)에 의거해 국민이 겪는 빈곤의 정도를 측정하는 데 활용된다. 우 리나라는 2022년 기준으로 상대적 빈곤율이 14.9%를 기록하였는데 핀란드, 네덜란드, 노르웨이, 스웨덴은 각각 6.7%, 7.4%, 8.0% 및 8.4%로 상대적으로 낮은 수준이며 멕시코 및 미국은 각각 15.0%, 18.1%로 상대적으로 높았다. 우리나라의 경우 상대적 빈곤율이 2018년 16.7%에서 다소 낮아졌다. 이를 연령층 기준으로 살펴보면 2023년 기준 근로연 령인구(18~65세)는 15.1%인 반면 은퇴연령인구(66세 이상)는 48.2%의 매우 높은 수준 을 나타내어 고령층이 소득 부족에 따른 빈곤에 더 큰 영향을 받고 있음을 알 수 있다. 한 편, 소득이 최저생계비 미만인 가구의 비율을 절대적 빈곤율이라 한다.',
  },
  '상시감시제도/상시감시전담데스크': {
    title: '상시감시제도/상시감시전담데스크',
    content: '상시감시는 감독당국이 평상시 은행의 영업실적 및 재무상태에 관한 보고서를 징구, 분 석하는 등 전반적인 은행의 경영상황을 파악하기 위한 감독수단의 하나이다. 상시감시 제도는 은행수가 많고 은행도산이 빈발하는 미국에서 문제은행의 조기식별 수단으로 발 달된 제도로 금융의 개방화·국제화 등으로 각종 리스크가 증대되는 금융환경하에서 그 중 요성은 더욱 커지고 있다. 금융감독원은 금융기관별로 상시감시체제 강화를 위하여 상시 감시전담데스크를 설치·운영하고 있다. 동 데스크는 업무보고서 심사 및 기타 수집정보의 분석 등을 통해 문제금융기관 또는 경영상의 취약부문을 조기에 포착하고 수집정보를 임 점검사반에 제공하며, 수시로 금융기관 업무 전반에 대한 문제점 등을 확인·지도함으로써 감독·검사 정책 개발을 지원하는 기능을 수행한다.',
  },
  '상장지수펀드(ETF)': {
    title: '상장지수펀드(ETF)',
    content: '주식, 채권, 통화, 원자재 등의 가격지수를 추종하는 것이 목표인 인덱스펀드의 지분을 거래소에 상장하여 일반주식처럼 거래하도록 한 금융상품이다. 최초의 ETF(Exchange Traded Fund)는 S&P500지수 펀드로 1993년 1월에 뉴욕증권거래소에서 매매되기 시작 하였고, 국내에서는 2002년 10월 KOSPI 200을 추종하는 KODEX 200과 KOSEF 200 ETF의 매매가 개시되었다. 국내에서 ETF는 설정을 원하는 기관투자자가 지정참가회사(증 권사)를 통해 설정에 필요한 주식바스켓을 집합투자업자(자산운용사)에 납입함으로써 발 행된다. 이렇게 발행된 ETF가 거래소에 상장되면 일반주식과 동일한 방식으로 거래된다. 유통시장에서는 지정참가회사 중 1개사 이상이 유동성공급자로 지정되어 ETF의 원활한 거래를 돕는다. ETF는 통상적인 펀드와 달리 개인 주식거래계좌를 통해 손쉽게 거래할 수 있는 데다 증권거래세 면제 등으로 거래비용이 낮고 소액으로도 분산투자가 가능하다는 장점을 가지고 있다. 우리나라의 ETF는 처음에는 국내 주가지수를 추종하는 상품이 대부 분이었으나 현재는 국내외 주식 및 채권, 파생상품, 통화, 원자재 등의 가격지수를 활용한 상품으로 영역이 넓어졌다. 또한 수익률이 지수의 일정배율에 연동되는 레버리지 ETF, 지 수변동의 반대방향으로 수익률이 정해지는 Inverse ETF 등 다양한 구조의 상품들이 있다.',
  },
  '상품공동기금(CFC)': {
    title: '상품공동기금(CFC)',
    content: '1989년 7월 설립된 상품공동기금(CFC; Common Fund for Commodities)은 1차산 품의 수급 안정을 위한 국제협력 증진과 국제상품협정 체결 촉진 및 기능 활성화를 목적 으로 하고 있다. 주요 기능으로는 국제상품협정에 따른 완충재고 유지를 위한 금융지원,',
  },
  '상호관세': {
    title: '상호관세',
    content: '1차산품의 개발 촉진 및 교역조건 개선을 위한 연구개발 지원, 1차산품에 관한 가맹국 간 정보교환 및 정책협의 촉진 등을 들 수 있다. 2021년 말 기준 가맹국은 101개국과 9개 기 구(EC, AU, COMESA 등)로 납입자본금은 139.5백만 달러(약정액 기준)이며 출연금은 175.4백만 달러이다. 우리나라는 1989년 7월 설립과 함께 가입하였으며 2021년 말 기준 1,051.8천 달러를 출자하였다.',
  },
  '상품수지': {
    title: '상품수지',
    content: '거주자와 비거주자 간의 상품 수출입 거래를 계상한 것으로, 경상수지의 한 부분이다. 수 출이 수입보다 많으면 흑자, 수출보다 수입이 많으면 적자로 표시한다. 상품수지의 수출 입은 관세청에서 통관기준으로 작성하는 무역수지의 수출입과 일치하지 않는 경우가 많 다. 이는 관세청에서는 상품이 우리나라의 관세선을 통과하면 수출입으로 계상하는 반면, 국제수지의 상품수지에서는 상품의 소유권이 이전되어야 수출입으로 간주하는 소유권이 전(change of ownership) 기준을 따르기 때문이다. 또한 무역수지에서 수출은 FOB가 격, 수입은 운임 및 보험이 포함되어 있는 CIF가격으로 평가하지만, 상품수지에서는 수출 과 수입 모두 FOB가격으로 평가한다는 차이점도 있다.',
  },
  '생산세': {
    title: '생산세',
    content: '현재 국민계정 작성기준인 국민계정체계(SNA)에서는 조세를 크게 종전 간접세에 해당하 는 생산세(Taxes on Production)와 소득·부 등에 대한 경상세, 자본세로 분류하고 있다. 생산세는 생산물세(taxes on products)와 기타생산세(other taxes on products)로 분 류되는데, 생산물세는 생산자가 재화 및 서비스를 생산, 배달, 판매, 이전 또는 기타 용도 로 사용하였을 때 동 재화 및 서비스에 대해 부과되는 조세를 말한다. 생산물세에는 재화 의 수입이나 비거주자의 거주자에 대한 서비스 공급 등에 부과되는 수입세 및 관세가 포 함된다. 한편, 기타생산세는 기업이 생산에 참여한 결과 부과되는 조세 중 생산물세를 제 외한 모든 조세를 말한다. 여기에는 주로 생산에 이용된 토지, 고정자산, 노동 또는 특정 거래나 활동에 대한 조세가 포함된다.',
  },
  '생산유발효과': {
    title: '생산유발효과',
    content: '한 나라에서 각 산업의 생산활동은 소비, 투자, 수출 등 최종수요의 크기에 따라 결정되는 데, 최종수요의 변화가 생산에 미치는 영향을 생산유발효과라 한다. 예를 들어, 자동차 수 출이 1대 증가할 경우 엔진, 타이어와 같은 수많은 중간재가 생산되어야 하고 다시 이들 중간재의 생산을 위해서 냉간압연강재 같은 철강제품, 고무, 타이어코드 등 다른 원료의 생산이 필요하게 된다. 이와 같이 자동차의 생산은 아무 관련이 없는 것처럼 보이는 많은 산업에까지 영향을 주게 되는데 이러한 생산유발효과는 산업 간의 수급균형이 이루어질 때까지 무한히 계속된다. 생산유발효과는 생산유발계수의 크기로 측정할 수 있는데, 생산 유발계수는 최종수요가 한 단위 발생하였을 때 이를 충족시키기 위하여 각 산업부문에서 직·간접적으로 유발되는 생산액의 수준을 의미하는 것으로 생산유발계수가 클수록 국내 생산에 미치는 영향이 크다고 해석할 수 있다. 생산유발계수를 이용하여 소비, 투자, 수출 등 최종수요의 변동이 국내 각 산업의 산출, 부가가치, 고용 등 생산활동에 미치는 파급효 과를 계량적으로 분석할 수 있다.',
  },
  '생산자물가지수(PPI)': {
    title: '생산자물가지수(PPI)',
    content: '국내생산자가 국내시장에 공급하는 상품과 서비스의 평균적인 가격변동을 측정하기 위하 여 작성되는 물가지수로서 그 대상품목의 포괄범위가 넓어 전반적인 상품과 서비스의 수 급 동향이 반영된 일반적인 물가수준의 변동을 측정할 수 있기 때문에 일반목적지수로서 의 성격을 갖는다. 지수작성에 이용되는 가격은 생산자가 제품 한 단위당 실제로 수취하 는 기초가격(basic price)이다. 생산자물가지수는 1910년부터 한국은행에서 작성해 오고 있다.',
  },
  '생산자제품재고지수': {
    title: '생산자제품재고지수',
    content: '현실 경제에서는 경기의 좋고 나쁨에 따라 재고의 증가 또는 감소 현상이 필연적으로 나 타나게 마련이다. 기업은 이에 효율적으로 대처하고자 재고를 비축하거나 처분하는 과정 에서 생산을 조정하기 때문에 재고수준의 변동은 단기적인 경기순환을 나타내는 중요한 지표로 인식된다. 생산자제품재고지수는 생산자가 보유하고 있는 원재료, 반제품, 재공품 을 제외한 완제품 재고의 변동을 파악하기 위한 것으로서 월말 재고수준을 나타내는 경기 후행지표이다. 통계청은 매월 광업·제조업 동향조사를 통하여 534개 품목을 조사하여 생 산제품재고지수를 작성하여 공표하고 있다.',
  },
  '생산자제품출하지수/생산자출하지수': {
    title: '생산자제품출하지수/생산자출하지수',
    content: '생산자제품출하지수는 생산자의 판매활동과 광업, 제조업, 전기·가스업 및 수도사업 제 품의 출하 동향을 나타내는 지표이다. 여기서 제품 출하란 생산된 제품을 판매 등의 목적 으로 공장 관할 밖의 외부로 출고하는 것을 의미한다. 따라서 보관만을 위하여 공장 내 창 고, 타 지역에 있는 자기창고나 타인창고로 이송하는 것은 출하로 보지 않는다. 출하지수 는 물건을 생산한 공장에서 물건이 팔려나가는 수준을 나타내며 생산자의 판매활동과 광 공업 제품의 수급 동태를 나타내는 실물경제 지표로서 단기 경제동향 분석을 위한 지표로 널리 이용되고 있다. 출하지수는 출하내역에 따라 내수출하지수와 수출출하지수로 구분 된다. 이 중 내수용만 집계한 내수출하지수는 현재의 경기상황이 잘 반영되어 경기동행종 합지수의 구성 지표로 활용되고 있다.',
  },
  '생산확산지수': {
    title: '생산확산지수',
    content: '광공업생산지수나 서비스업생산지수 등 총량지표로는 파악하기 어려운 전반적인 생산 확산의 정도를 측정하는 경제지표이다. 광공업 생산확산지수는 광공업생산 소분류 업종 (2025년 현재 72개) 중 생산이 전월 대비 “증가 또는 보합인 업종의 수”를 백분비로 산 출하고, 서비스업생산확산지수는 서비스업생산 소분류 업종(2025년 현재 85개) 중 생산 이 전월 대비 “증가 또는 보합인 업종의 수”를 백분비로 산출한다. 생산확산지수는 0에서 100까지의 범위 값을 갖는데, 지수가 50 이상이면 전월 대비 증가업종의 수가 감소업종 의 수보다 많아 확산도 측면에서 본 생산경기가 확장국면에 있음을 의미한다. 통계청은 2007년 2월부터 제조업부문에 한정하여 생산확산지수를 공표하다가, 2009년 7월부터 광공업 및 서비스업 생산확산지수를 공표하고 있다. 생산확산지수 = 증가 업종수 + (보합*업종수×0.5) 전체 업종 수 ×100 * 보합: -0.05% < 증감률 < 0.05%',
  },
  '생성형 인공지능(AI)': {
    title: '생성형 인공지능(AI)',
    content: '인공지능, 소위 AI(Artificial Intelligence)는 인간의 학습, 추론, 문제해결, 지각, 의사결 정 등 능력을 인공적으로 구현하는 컴퓨터과학의 한 분야로 인간의 지능을 컴퓨터를 비 롯한 여러 장치에 적용한다. 웹검색 기능, 개인비서 서비스, 자율주행장비 등으로 나타나 고 있다. AI는 1956년 미국 다트머스(Dartmouth) 회의에서 등장한 용어로 학문적 과정의 하나로 시작되었으나 이후 과잉기대, 자금조달 문제 등으로 부침을 겪었다. 2020년대 들 어 생성형(generative) AI가 발전하면서 AI 붐이 형성되었다. 생성형 AI는 텍스트, 이미 지, 음악, 코드 등 새로운 콘텐츠를 생성하는 AI 기술로 기존 AI가 데이터를 분석하거나 분류하는데 중점을 둔 것과 차이가 있다. GPT, DALL-E, Sora 등이 대표적이며 교육, 의 료, 마케팅, 대고객서비스, 개발 및 연구 분야에서 널리 활용되고 있다. 생성형 AI의 대두 는 허위정보 생산, 콘텐츠 조작, 사이버 범죄, 저작권 문제 등 의도하지 않은 결과와 피해 를 초래하기도 하였다. 생성형 AI가 인류에 미칠 장기적 효과, 잠재적 능력에 대한 고찰이 진행되면서 도덕적 문제를 포함한 여러 쟁점이 제기되었으며 혜택 확대와 함께 기술안전 확보 방안 등에 대해 많은 논의가 이루어지고 있다.',
  },
  '생활물가지수': {
    title: '생활물가지수',
    content: '생활물가지수(CPI for living necessaries)는 체감물가를 파악하기 위해 일상생활에서 구 입 빈도가 높고 지출비중이 높아 가격변동을 민감하게 느끼는 생활필수품을 대상으로 작 성한 지수이다. 개별 소비자들이 느끼는 물가는 개인이 구입하는 품목이나 구입 빈도에 따라 각각 달라 2025년 현재 소비지출비중이 큰 458개 품목의 가격변동을 평균하여 작 성하는 소비자물가지수와는 차이가 있다. 통계청은 이러한 지수물가와 체감물가와의 차 이를 설명하기 위하여 일반소비자들이 자주 구입하는 품목과 기본생필품을 중심으로 144 개 품목(쌀, 달걀, 배추, 소주 등)을 선정하여 생활물가지수를 작성하고 있다.',

  '서비스수지': {
    title: '서비스수지',
    content: '국제수지표에서 서비스수지란 외국과의 서비스거래 결과 벌어들인 돈과 지급한 돈의 차 이를 말한다. 서비스거래는 가공, 운송, 여행, 건설, 보험, 금융, 통신, 지식재산권, 유지 보수, 정부서비스, 기타사업서비스 등의 항목으로 이루어진다. 서비스수지는 거래항목별 로 수입과 지급으로 나누어 계상한다. 예를 들어 우리나라의 선박이나 항공기가 상품을 나르고 외국으로부터 받은 운임, 외국관광객이 쓰고 간 외화, 무역대리점의 수출입 알선 수수료 수입 등이 서비스 수입으로 기록된다. 반대로 우리나라가 외국에 지급한 선박과 항공기의 운항경비, 해외여행 경비, 기술용역 대가 등은 모두 서비스 지급으로 나타난다. 서비스수지는 상품수지, 본원소득수지, 이전소득수지와 함께 경상수지를 구성한다.',

  '서킷브레이커': {
    title: '서킷브레이커',
    content: '과열된 전기회로를 차단하는 안전장치에서 유래된 용어로 주식시장에서 주가의 급등락 시 주식거래를 일시 정지시켜 시장에 미치는 충격을 완화하기 위한 ‘매매거래중단 제도’ 를 의미한다. 서킷브레이커(Circuit Breakers)는 1987년 10월 미국 증권시장 사상 최악 의 주가 대폭락 사태를 기록한 ‘블랙 먼데이’ 이후 뉴욕증권거래소를 시발로 각국 증시에 시장 안전장치의 하나로 도입되었다. 우리나라에는 주식시장의 일일 가격제한폭이 확대 됨에 따라 투자자 보호를 위하여 1998년 12월 도입되었으며, 현물주식과 선물옵션의 모 든 거래를 중단시키는 현물 서킷브레이커와 선물옵션 거래만 중단시키는 선물 서킷브레 이크로 구분된다. 현물 서킷브레이커는 2015년 개정 이후 단계별로 발동된다. 구분 발동기준1) 내용 1단계 전일 대비 8% 이상 하락 20분간 매매거래중단 2단계2) 3단계2) 전일 대비 15% 이상 하락 1단계 서킷브레이커 발동시점 대비 1% 이상 추가 하락 20분간 매매거래중단 전일 대비 20% 이상 하락 2단계 서킷브레이커 발동시점 대비 1% 이상 추가 하락 당일 장종료 조치 주석: 1) 1분간 지속시 발동 2) 발동기준 동시 충족 필요',

  '서학개미': {
    title: '서학개미',
    content: '서학개미란 해외, 주로 미국 주식에 직접 투자하는 한국 개인투자자를 일컫는 신조어이 다. ‘서학’은 서양(특히 미국), ‘개미’는 소액을 모아 투자하는 개인투자자를 비유한 표현이 다. 서학개미는 동학개미와 대비되어 생겨난 용어이다. 동학개미는 2020년 코로나19 당 시 국내 증시가 급락했을 때 개인투자자들이 대규모 매수에 나서며 증시 방어 역할을 한 현상을 동학농민운동에 빗대어 표현한 신조어다. 2022년 이후 국내 주식시장이 부진해지 는 반면 미국 주식시장은 미달러화 강세, 빅테크 기업 성장 등을 배경으로 호조를 지속하 자 국내시장에 실망한 개인투자자들이 미국 등 해외 주식투자를 크게 확대해 나갔는데 이 러한 개인투자자들을 서학개미라 일컫게 되었다. 서학개미의 활발한 해외 투자는 달러화 수요를 크게 증가시켜 환율상승 요인으로 작용하는 등 국내 외환시장의 변동성을 확대시 키는 요인 중 하나로 평가된다.',
  },
  '선물환거래': {
    title: '선물환거래',
    content: '선물환거래란 계약일로부터 통상 2영업일 경과 후 특정일에 외환의 인수도와 결제가 이 루어지는 거래를 말한다. 선물환거래는 현재 시점에서 약정한 가격으로 미래 시점에 결제하게 되므로 선물환계약을 체결하면 약정된 결제일까지 거래상대방의 결제가 이연된 다는 점에서 현물환거래와 구별된다. 선물환거래는 주로 환리스크를 헤지하기 위한 목적 으로 이용되는데, 예를 들어 6개월 이후에 달러로 대금을 받을 예정인 수출기업은 은행과 6개월 후 달러를 매각하는 대신 원화를 받는 선물환계약을 체결함으로써 원/달러 환율 변 동에 따른 환위험을 헤지(hedge)할 수 있다. 이외에도 선물환거래는 금리차익(arbitrage) 획득과 투기적 목적 등으로도 이용되고 있다. 선물환거래는 일방적인 선물환 매입 또는 매도 거래만 발생하는 Outright Forward 거래와 선물환거래가 스왑거래의 일부분으로 현물환거래와 함께 일어나는 Swap Forward 거래로 구분되며, Outright Forward 거래 는 다시 만기시점에 실물의 인수도가 일어나는 일반 선물환거래와 만기시점에 실물의 인 수도 없이 차액만을 정산하는 차액결제선물환(NDF; Non-Deliverable Forward) 거래로 나눌 수 있다.',
  },
  '선물환포지션비율 규제': {
    title: '선물환포지션비율 규제',
    content: '선물환포지션비율 규제는 국내은행과 외국은행 지점의 선물환포지션(선물 외화자산에서 선물 외화부채를 뺀 값)을 자기자본의 일정 비율 이내로 제한하는 규제로 2010년 10월 부터 시행된 제도이다. 2006년 이후 국내은행 및 외은지점의 선물환 거래가 급증한 것이 단기외채 급증을 가져와 2008년 글로벌 금융위기 당시 외환시장 불안과 자본유출입 변 동성 확대의 주된 원인으로 지적되었다. 이에 따라 거시건전성 강화와 외환시장 안정, 단 기외채 증가 억제를 목표로 선물환포지션비율 규제 제도가 도입되었다. 도입 당시 국내 은행 50%, 외국은행 지점 250%였던 선물환포지션비율 한도는 외환 및 금융시장 상황에 따라 수차례 조정되어 왔으며 2024년 12월 20일부터 각각 75%, 375%로 상향되었는데 이는 국내은행들이 외화유동성을 보다 원활하게 확보할 수 있도록 하는 조치였다. 이처 럼 선물환포지션비율 규제는 외환건전성 관리의 핵심 정책수단으로 사용됐으며 최근에 는 글로벌 환율변동성 확대와 외환수급 불안에 대응하기 위해 한도가 점차 완화되는 추 세에 있다.',
  },
  '선불카드/선불전자지급수단': {
    title: '선불카드/선불전자지급수단',
    content: '선불형카드는 이용고객이 전자적 또는 자기적 방법으로 일정금액을 저장한 카드를 카드 발행자로부터 구입하여 상품구매 또는 서비스 이용시마다 대금이 자동으로 차감 지급되 도록 한 카드로서 사용범위에 따라 범용 선불형카드와 단일목적 선불형카드로 구분된 다. 범용 선불형카드는 광범위한 지역에서 상품 또는 서비스 대금의 지급에 사용될 수 있 는 반면 단일목적 선불형카드는 일정지역 또는 특정목적으로만 사용될 수 있다. 선불형카 드는 신용카드사가 발행하는 선불카드와 은행 등 금융기관이 발행하는 전자화폐, 전자금 융업자가 발행하는 선불전자지급수단으로 구분된다. 대부분의 신용카드사들은 사용한도 가 미리 정해져 있어 그 범위내에서 일반 신용카드처럼 물건이나 서비스를 구매할 수 있 고 재충전(top-up)도 가능한 기명 선불카드 또는 무기명 선불카드(기프트카드)를 발행하 고 있다. 선불전자지급수단은 IC카드형과 네트워크형으로 분류할 수 있는데 IC카드형은 주로 교통부문을 중심으로 이용되고 있으며 네트워크형은 사이버쇼핑몰 등의 대금결제에 주로 사용되고 있다.',
  },
  '선행종합지수': {
    title: '선행종합지수',
    content: '개별 경제지표로는 파악하기 어려운 국민경제의 총체적인 경기수준을 파악하기 위하여 경기종합지수를 작성한다. 경기종합지수는 선행종합지수, 동행종합지수, 후행종합지수 3 개가 작성되고 있으며, 기준년도 수치가 100이 되도록 하여 산출하고 있다. 선행종합지수 는 제조업 재고순환지표, 기계류내수출하지수, 국제원자재가격지수, 수출입물가비율, 코 스피지수, 장단기금리차, 구인구직비율, 건설주수액, 소비자기대지수 등의 지표처럼 실제 경기순환에 앞서 변동하는 개별지표를 가공·종합하여 만든 지수로 향후 경기변동의 단기 예측에 이용된다.',
  },
  '성장기여도': {
    title: '성장기여도',
    content: '성장기여도는 특정 경제부문(예: 산업 X1)이 전체 경제성장(예: ΣXn, 산업 X1, … 산업 Xn,)에 어느 정도 기여했는가를 보여주는 지표로 구체적으로는 아래 산식에 의해서 산 출된다. X1의 성장기여도(%p) = X1의 성장기여율 × ΣXn의 증감률 X1의 성장기여율(%) = (X1의 증감액 /ΣXn의 증감액 ) × 100 한편 성장기여율은 합계(또는 평균값)의 증감에 대하여 그 구성 항목이 전체를 증가시키 는데 얼마나 공헌했는지를 나타내는 지표로서, 위의 산식에서와 같이 각 항목의 변화 크 기를 전체의 증감에 대한 백분율로 나타낸다. 이때 부문별 성장기여율의 합은 100이 되 며, 부문별 성장기여도의 합은 전체 성장률과 같게 된다. 성장기여율과 성장기여도의 개 념을 알고 있으면 여러 구성 항목으로 이루어진 통계의 증감을 분석하는데 유용하다. 예 를 들어 국내총생산(GDP)에서 제조업, 건설업, 서비스업 등 산업별로 어떤 산업이 경제 성장에 가장 큰 기여를 했는지 알 수 있고 물가상승 시 어떤 품목이 가장 큰 영향을 끼쳤 는지도 파악할 수 있다. 다만, 연쇄가중법에 의해 추계하는 실질GDP의 경우에는 가법성 이 성립하지 않기 때문에 위와는 다른 방법으로 성장기여도를 계산해야 한다.',
  },
  '세계경제포럼(다보스포럼)': {
    title: '세계경제포럼(다보스포럼)',
    content: '세계경제포럼(WEF, 다보스포럼)은 저명한 기업인, 경제학자, 언론인, 정치인들이 모여 세계 경제를 개선하기 위한 과제를 토론하고 연구하는 회의체이다. 본부는 스위스 제네 바에 있으나 매년 1~2월경 스위스 동부의 다보스에서 연차총회가 개최되기 때문에 다보 스포럼(Davos Forum)이라고도 불린다. 1971년 클라우스 슈바브(Klaus Schwab) 교수 에 의해 창설되어 비영리재단 형태로 운영되고 있다. 애초에는 유럽의 기업경영자들이 참 석하는 유럽경영포럼(European Management Forum)으로 출발하였으나 1973년부터 참석 대상을 전 세계로 확대한 데 이어 1974년에는 정치지도자를 처음으로 초청하였다. 1976년에 회원 기준을 세계의 1,000개 선도 기업으로 하는 회원제도를 도입하였고 1987년에는 명칭을 세계경제포럼(WEF; World Economic Forum)으로 변경하였다. WEF는 초청된 인사들에게만 참석을 허용하고 초청받지 않은 참석자는 적지 않은 참석비 를 내야 하는 등 배타적인 모임의 성격을 갖고 있다. WEF는 연차총회 외에 지역별, 산업 별 회의를 운영하고 있는데 2004년 6월 서울에서 지역별 회의(WEF 아시아 전략회의)가 개최된 바 있다. 2025년에는 세계경제포럼과의 협약에 따라 경기도에 4차산업혁명센터 가 설립되었다. WEF가 매년 발간하는 주요 보고서로는 글로벌 리스크 보고서, 글로벌 성 별격차 보고서, 미래 직업 보고서 등이 있다.',
  },
  '세계국채지수(WGBI)': {
    title: '세계국채지수(WGBI)',
    content: '세계국채지수(WGBI)는 영국의 FTSE 러셀이 발표하고 있는 주요국 국채로 구성된 국채 지수로서 미국 등 주요 선진국 국채를 포함하고 있는 대표적인 채권부문 글로벌 지수이 다. 특히, WGBI는 블룸버그·바클레이즈 글로벌 종합지수(BBGA) 및 JP Morgan 신흥국 국채지수(GBI-EM) 등과 함께 세계 3대 채권지수로 분류되고 있으며, 추종자금의 규모 및 구성 종목의 안정성 등의 측면에서 대표적인 채권부문 선진국 지수로 알려져 있다. 2025 년 7월 말 현재 WGBI는 주요 선진국 및 중국, 멕시코, 말레이시아 등 총 25개국 국채를 포 함하고 있으며, 각 국별 지수 비중은 해당국 국채 시가총액 비중에 따라 결정된다. WGBI 신규 편입은 매년 두 차례 진행되는 정기 리뷰 과정을 통해 진행된다. 일반적인 경우 편입 가능성이 높을 것으로 예상되는 국가는 FTSE 러셀의 채권시장 국가분류 보고서의 WGBI 관찰대상국 리스트에 등재되며, 이후 편입기준 충족 여부를 확인한 후 정식 편입 발표가 진행된다. FTSE 러셀이 제시하고 있는 WGBI 편입기준은 시장 규모 및 국가 신용도 등 정량적 기준과 더불어 해당국 시장접근성을 평가하고 있는 정성적 기준이 적용된다. 예 를 들어 신규 편입을 위해서는 국채 발행잔액 기준(500억달러) 및 국가 신용등급(S&P 기 준 ‘A-’) 등의 최소 조건을 충족하여야 하며, 시장접근성 기준의 경우에는 FTSE의 채권 시장 국가분류 레벨 ‘2’이상의 등급이 요구된다. 한국 국채는 2026년 4월부터 지수에 편 입되기 시작하여 2026년 11월에 최종 편입이 완료될 예정이다. 대표적인 선진 채권지수 인 WGBI 편입은 관련 추종자금의 유입과 더불어 국채시장 및 외환시장 안정성 제고에도 기여할 것으로 예상된다. 특히 WGBI 추종자금의 경우 상대적으로 자금 유출입의 변동성 이 낮은 투자자 비중이 높다는 점에서 국채시장의 안정적 자금조달 기반을 제공할 것으로 판단되며, 우리나라 국채시장의 대외신인도 제고를 통해 이른바 ‘원화채 디스카운트’ 해 소에도 도움이 될 것으로 기대된다.',
  },
  '세계은행(World Bank)': {
    title: '세계은행(World Bank)',
    content: '세계은행그룹(World Bank Group)을 구성하는 5개 기구 중에서 국제부흥개발은행 (IBRD)과 국제개발협회(IDA)를 합쳐서 부르는 명칭이다. IBRD는 제2차 세계대전으로 인한 재해 복구 및 개발도상국의 경제개발을 위한 장기개발자금 지원을 목적으로 1945 년 12월 설립되었으며 미국 워싱턴에 본부를 두고 있다. IBRD와 IDA는 별개의 법인체 지만 IBRD의 임원이 IDA의 임원을 겸임하고 있으며 실무 집행부서도 별도의 구분 없이 세계은행으로 통합되어 운영되고 있다. 설립 초기에는 전쟁 복구 지원에 주력하였으나 이후 저소득 개발도상국의 경제·사회 개발을 위한 장기자금 융자 등 지원 분야를 확대 하였다. IBRD 가입자격은 국제통화기금(IMF) 회원국에만 부여되고 가입 시 출자금을 납 입해야 한다. 2025년 6월 말 현재 회원국은 189개국이며 우리나라는 1955년 8월에 가 입하였다. IDA는 1950년대 후반 최빈개발도상국 지원 필요성이 부각됨에 따라 저소득 회원국의 경제개발 촉진 및 생활수준 향상을 위한 자금 지원을 목적으로 1960년 9월 발 족하였다. IDA 가입자격은 IBRD 회원국에게만 부여되며 가입 시 출자금을 내야 한다. 2025년 6월 현재 회원국은 174개국이며 우리나라는 1961년 5월에 가입하였다.',
  },
  '소득5분위배율': {
    title: '소득5분위배율',
    content: '소득분배의 불평등도를 나타내는 지표의 하나로 전체 가구를 소득 수준의 순서에 따라 20%씩 5등분으로 나눈 다음, 소득 상위 20%(5분위) 계층의 평균소득을 소득 하위 20%(1 분위) 계층의 평균소득으로 나눈 값이다. 소득5분위배율 값이 커질수록 고소득층과 저소 득층 간의 소득분배가 악화하였음을 의미한다.',
  },
  '소득교역조건지수': {
    title: '소득교역조건지수',
    content: '소득교역조건지수는 순상품교역조건지수에 수출물량지수를 곱하여 {(수출물가지수/수입 물가지수)×수출물량지수} 산출하는 것으로서 수출 총액으로 수입할 수 있는 상품의 양이 기준시점 대비 얼마나 증가하였는지를 의미하며 순상품교역조건지수가 가격변동만을 고 려하는 단점을 보완해 준다. 예를 들어, 2024년 12월 소득교역조건지수 118.27은 수출 총액으로 수입할 수 있는 상품의 양이 2020년 1~12월의 평균 대비 18.27% 증가하였음 을 의미한다. 순상품교역조건지수와 소득교역조건지수를 동시에 고려하면 수출입 상품의 가격변동뿐만 아니라 수출물량 변동까지 고려할 수 있어 교역조건을 보다 정확히 파악할 수 있다.',
  },
  '소득대체율': {
    title: '소득대체율',
    content: '소득대체율은 은퇴 후 받는 연금수령액이 은퇴 전 소득에 대해 어느 정도 수준인지를 나 타내는 용어이다. 노후의 생활수준이 은퇴 전과 비교하여 얼마나 유지될 수 있는지를 평 가하는 지표로 이용된다. 예를 들어 은퇴 이전 월평균 소득이 300만원이고 은퇴 이후 매 월 연금으로 150만원을 수령한다면 소득대체율은 50%가 된다. 우리나라의 대표적인 사 회보장제도인 국민연금의 수령액 정도, 연금제도의 효용성을 평가하는 정책목표로 주로 사용된다. 일반적으로 소득대체율이 지나치게 낮을 경우 은퇴 이후 연금소득으로 생계 유 지가 어려워 연금제도의 유용성이 낮게 되고, 반면 너무 높으면 제도의 지속가능성에 문 제가 생긴다. 한편 은퇴 이전 소득을 어떻게 정의하느냐에 따라 수치가 크게 달라질 수 있 다. 소득세, 자산소득의 포함 여부 등 나라마다 기준이 다르므로 통계 소득대체율 수치를 비교할 때 주의해야 한다.',
  },
  '소매판매': {
    title: '소매판매',
    content: '소매판매란 여러 유통단계 가운데 최종 소비자인 개인이나 가계를 대상으로 이루어지는 재화의 판매를 말한다. 생산자와 유통업자 간의 거래(도매), 기업 간 거래와 달리 최종 수 요자인 소비자와의 거래로 소비에 해당한다. 생산자의 자본 지출과 함께 내수 경기의 흐 름을 판단하는 데 중요한 역할을 한다. 이러한 소매판매의 동향을 포착하는 지표가 소매 판매액지수이다. 소매판매를 담당하는 대형마트, 백화점, 편의점, 온라인 쇼핑몰 등 다양 한 유통 채널을 조사하여 작성되고 있다. 소매판매액지수는 업태별 외에 자동차, 가전제 품, 의류, 식료품 등 품목별로도 구분 편제되고 있다.',
  },
  '소비의 비가역성': {
    title: '소비의 비가역성',
    content: '소비행태를 설명하는 상대소득가설은 소비가 현재소득 이외에도 과거의 최고 소득수준 또는 타인의 소비수준과 같은 상대적인 요인에 의해서도 영향을 받을 수 있다는 가능성을 고려한다. 이 가설에 따르면 현재소득이 과거의 최고 소득수준에 비해 작아지더라도 소 비자는 소비를 소득감소에 비례하여 줄이지 않고 이보다 작은 폭으로 줄이게 되는 소 비의 비가역성이 발생하게 된다. 이러한 소비의 비가역성으로 인해 발생하는 톱니효과 (Ratchet effect)는 단기적으로 소득이 변동할 경우 한계소비성향은 일정하지만 평균소 비성향은 낮아지는 소비행태를 설명하는 핵심요소로 작용한다. 아울러 장기적으로 소득 이 늘어날 경우 평균 및 한계소비성향이 같아지는 장기소비 행태도 설명 가능하다. 참고 로 상대소득가설에서 타인의 소비수준에 영향을 받는 현상인 전시효과(Demonstration effect)도 장단기 소비행태를 설명하는데 유용한 개념이라 하겠다.',
  },
  '소비자동향지수(CSI)': {
    title: '소비자동향지수(CSI)',
    content: '소비자의 경기나 생활형편 등에 대한 주관적인 판단과 전망, 미래의 소비지출계획 등을 설 문조사를 통해 지수화한 것으로, 기업들의 경제를 보는 시각이 반영된 기업경기실사지수 (BSI; Business Survey Index)와 함께 대표적인 경제심리지수 중 하나이다. 우리나라의 소 비자동향지수(CSI; Consumer Survey Index)는 한국은행이 매월 15일을 전후한 일주일 에 걸쳐 전국의 2,500여 가구를 대상으로 4부문 19개 항목을 조사한 후 하순경 발표하고 있 다. 동 CSI는 5점 척도로 이루어져 있고 아래와 같이 항목별로 가중치를 부여하여 작성되 며 지수의 기준치는 100으로 지수는 최저 0에서 200까지의 값을 갖는다. 지수가 100보다 큰 경우 경제상황을 긍정적으로 보는 소비자가 부정적으로 보는 소비자보다 더 많다는 것 을 의미하며 100보다 작은 경우는 그 반대를 나타낸다. 지수가 0이면 모든 소비자가 경제 상황을 부정적으로 본다는 뜻이고 지수가 200이면 모두 긍정적으로 본다는 의미가 된다. CSI = (매우긍정 × 1.0 + 다소긍정 × 0.5 - 다소부정 × 0.5 - 매우부정 × 1.0) 전체 응답 가구 수 × 100 + 100 CSI는 소비자들의 경제심리를 조사함으로써 경제에서 큰 비중을 차지하고 있는 민간소비 지출의 변화를 예상해 볼 수 있게 하고 소비자들의 물가 전망을 조사하여 통화정책 수립 에 중요한 기초정보를 제공한다는 점에서 유용한 경제지표이다.',
  },
  '소비자물가지수(CPI)': {
    title: '소비자물가지수(CPI)',
    content: '일반 가구가 소비생활을 유지하기 위하여 구입하는 각종 상품과 서비스의 가격변동을 종 합적으로 파악하기 위하여 작성되는 물가지표이다. 우리나라의 소비자물가지수는 통계청 에서 작성하고 있으며 기준년을 100으로 하여 작성된다. 조사대상 상품 및 서비스의 구성 과 가중치도 경제상황에 맞게 주기적으로 조정된다. 2025년 현재는 가계의 총소비지출에 서 구입비중이 큰 458여개의 상품 및 서비스 품목을 대상으로 조사된 소비자 구입가격을 기준으로 하고 있다. 소비자물가지수는 소비자가 일정한 생활수준을 유지하는 데 필요한 소득내지 소비금액의 변동을 나타내기 때문에 소비자의 구매력과 생계비 등의 측정에 사 용된다. 또한 소비자물가지수의 상승은 실질임금의 하락을 의미하므로 이를 보전하기 위 한 임금인상의 기초자료로 널리 이용되고 있다.',
  },
  '소비자심리지수': {
    title: '소비자심리지수',
    content: '소비자를 대상으로 경기에 대한 판단이나 전망 등을 조사하여 지수화한 경제심리지표를 말한다. 이는 경제주체들의 경기에 대한 판단, 전망 등이 국민경제에 영향을 미친다는 사 실에 근거하여 경기상황을 판단하고 미래의 경기를 예측하는 방법이다. 한국은행은 2005 년 1/4분기부터 소비자심리지수(CCSI; Composite Consumer Sentiment Index)를 작 성하여 발표하고 있다. 소비자심리지수는 소비자들의 경제에 대한 전반적인 인식을 종합 적으로 파악할 수 있는 종합지수로서, 개별 소비자동향지수(CSI) 가운데 관련 경제지표와 연관성이 높은 생활형편지수, 경제상황지수, 가계수입 및 소비지출 전망 등의 지표를 표 준화하고 합성하여 산출한다. 따라서 기존의 경제지표가 포착하기 어려운 경제주체의 심 리적 변화를 측정할 수 있어 유용하고, 경기 변화를 신속하게 포착할 수 있으며 양적인 통 계에서 입수하기 어려운 정보도 조사할 수 있는 특징이 있다. 지수의 기준치는 100이며 100을 초과할 경우 소비자들이 현재의 경기를 과거 평균 수준보다 좋아진 것으로 평가하 고 있음을 의미하고, 100 미만은 현재의 경기가 과거 평균적인 경기상황보다 좋지 않음을 나타낸다.',
  },
  '소액지급시스템': {
    title: '소액지급시스템',
    content: '소액지급시스템(Retail Payment System)은 주로 기업이나 개인의 소액거래를 처리하 는 지급시스템으로서 주로 계좌이체지시나 지급카드, 수표, 지로 등을 이용하여 처리된 다. 소액지급시스템은 거래 대상이 광범위하고 지급건수가 매우 많아 건수와 결제유동성 을 줄일 수 있는 차액결제방식을 이용하는 것이 일반적이며 참가기관의 차액결제 불이행 사태에 대비하여 순신용한도 설정, 사전담보 제공, 손실공동분담제 등과 같은 리스크 관 리제도를 두는 경우가 많다. 우리나라의 소액지급시스템은 금융결제원이 운영하고 있으 며 이에는 어음교환시스템, 지로시스템, 금융공동망(CD공동망, 타행환공동망, 직불카드 공동망, CMS공동망, 지방은행공동망, 전자금융공동망, 전자화폐공동망, 국가간ATM공동 망)과 전자상거래 지급시스템 등이 있다.',
  },
  '소프트랜딩/하드랜딩': {
    title: '소프트랜딩/하드랜딩',
    content: '소프트랜딩(연착륙)은 높은 성장세를 보이는 호황기 경제가 큰 충격 없이 점진적으로 둔 화되어 안정되는 것을 말한다. 반대로 하드랜딩(경착륙)은 갑작스러운 정책 변경이나 외 부 충격으로 고성장 경제가 급격하게 침체 상태로 빠지는 것을 의미한다. 경기 순환과 통 화정책 운용의 평가 과정에서 경기 흐름을 설명하기 위해 주로 사용되고 있다. 또한 높은 인플레이션 상황에서 급격한 경기침체나 실업 증가를 야기하지 않으면서 성장률을 낮추 기 위한 정책 운용과 연관된 단어이다. 원래 비행기의 착륙이나 우주선의 궤도 진입 기 법과 관련된 용어로 경제학자들이 비유적으로 사용하기 시작하였다. 소프트랜딩은 미국 경제가 호황이던 1980년대 연방준비제도이사회(Board of Governors of the Federal Reserve System)가 성장세를 크게 해치지 않으면서 인플레이션 상황을 타개하기 위한 금 리 인상을 설명하면서 역사적으로 처음 사용되었다. 호황과 불황이 순환하는 자본주의 경 제가 호황국면에서 적절한 정책 운용을 통해 투자심리 위축, 실질소득 감소로 인한 소비 부진 등의 부작용을 최소화하는 상황과 관련된다.',
  },
  '소형모듈원자로(SMR)': {
    title: '소형모듈원자로(SMR)',
    content: '소형모듈원자로(Small Modular Reactor)는 기존 대형 원전(1,000~1,500MW 출력)보 다 출력 규모를 줄이고, 공장에서 모듈 단위로 제작한 뒤 현장에서 조립·설치하는 방식 의 원자력 발전소를 말한다. 원자로, 증기발생기, 냉각재 펌프, 가압기 등 주요 기기를 하 나의 용기에 일체화한 소형 원자로이다. 일반적으로 출력은 300MW(국제원자력기구 기 준 소형) 이하로 설계되며, 모듈화된 구조로 건설 기간을 단축하고 비용을 절감할 수 있다. SMR은 소규모 전력망 지역이나 산업 단지 등 다양한 수요에 맞춤형 공급이 가능하다. 또 한 풍력, 태양광 등 재생에너지의 간헐성을 보완하는 이산화탄소 배출이 없는 백업 전원 으로 활용이 가능하여 탄소중립 목표달성에도 기여할 수 있다. 외부 전력으로 냉각펌프를 작동시켜야 하는 대형 원전과는 달리 자연 순환 냉각방법을 이용하므로 안전성도 높다. 이런 장점으로 인해 주요국은 SMR 기술개발과 실증, 상용화를 위해 연구개발투자를 확대 하고 있다.',
  },
  '속물효과(스놉효과)': {
    title: '속물효과(스놉효과)',
    content: '개성을 추구하는 사람들은 단지 다른 사람들이 많이 구입한다는 이유만으로 특정 물품을 구입하지 않거나 심지어 자신의 옷과 똑같은 옷을 입은 사람을 보면 그 옷을 더 이상 입 지 않는다. 명품브랜드 소비에서 흔히 일어나는 현상인데 이를 속물효과 또는 스놉효과 (Snob Effect)라고 한다. 즉 특정 상품을 소비하는 사람이 많아질수록 그 상품에 대한 수 요는 줄어들고 값이 오르면 오히려 수요가 늘어난다. 이 용어는 1950년 레이번슈타인(H. Leibenstein)에 의해 스놉(재산과 지위로 거만을 떠는 속물)이 선호하는 브랜드 물품이 일반 구매층까지 영향을 미치는 현상을 지칭하는 데 처음 사용되었다. 이와는 반대로 전 시효과는 상품을 소비하는 사람이 많아질수록 수요도 증가하는 경우를 가리킨다.',
  },
  '수요견인 인플레이션': {
    title: '수요견인 인플레이션',
    content: '수요견인 인플레이션(Demand-Pull Inflation)이란 경기과열 등으로 인해 개인들의 재화나 서비스에 대한 수요가 크게 늘면서 상대적으로 부족해진 재화 및 서비스의 물가가 지속적 으로 상승하게 되는 것을 말한다. 수요견인 인플레이션은 생산요소시장과 생산물시장 모 두에서 초과수요가 발생할 때 특히 분명하게 나타난다. 확대재정정책, 과도한 통화량 증 가, 민간소비나 투자의 갑작스러운 변동에 따른 수요충격 등은 총수요를 증가시켜 수요견 인 인플레이션을 발생시킨다. 예컨대 정부가 침체에 빠진 경기를 부양하기 위해서 정부지 출을 확대하고 세율을 인하하는 등의 급격한 확대재정정책을 시행하였다면 총수요가 증 가하여 수요견인 인플레이션이 발생할 수 있다.',
  },
  '수요탄력성': {
    title: '수요탄력성',
    content: '상품의 가격 변화비율에 대한 수요량의 변화비율을 수요의 가격탄력성(price elasticity of demand)이라 한다. 탄력성은 반응의 크기를 분석하는 데 의미가 있다. 충격을 주는 쪽과 반응하는 쪽의 변화율을 비교하여 같은 경우를 단위 탄력적이라고 하고, 반응하는 쪽의 변화율이 더 높으면 탄력적, 작으면 비탄력적이라고 한다. 수요의 가격탄력성의 경 우, 한 상품의 가격의 변화비율과 수요량의 변화비율이 동일할 경우 수요의 가격탄력성 은 1이 되며, 이 경우 수요가 단위 탄력적이라고 한다. 수요량의 변화비율이 가격의 변화 비율보다 작아서 수요의 가격탄력성이 1보다 작으면 수요가 비탄력적이라고 한다. 반면 수요량의 변화비율이 가격의 변화비율보다 높아서 수요의 가격탄력성이 1보다 크게 되면 수요가 탄력적이라고 한다.',
  },
  '수익률곡선': {
    title: '수익률곡선',
    content: '이자율 기간구조(term structure)를 그래프로 나타낸 것을 수익률곡선(Yield Curve)이 라고 한다. 이는 채권의 수익률을 만기가 단기인 채권부터 장기인 채권 순으로 나열하여 연결한 곡선이다. 가로축은 채권 만기, 세로축은 채권 수익률을 표시하는 평면에서 수익 률 수준을 나타낸다. 수익률곡선의 모양은 이자율에 대한 기대에 의존한다. 장기 이자율 이 단기 이자율보다 크게 높은 가파른 기울기의 우상향 수익률곡선은 미래에 이자율이 상승할 것으로 기대됨을 의미한다. 반대로 장기 이자율이 단기 이자율보다 낮은 우하향 수익률곡선은 이자율이 하락할 것으로 예상함을 시사한다. 이자율은 경기 침체에 반응하 여 하락하는 경향이 있으므로, 우하향 수익률곡선은 경제성장률 하락에 대한 예상으로 해 석되기도 한다.',
  },
  '수입유발계수': {
    title: '수입유발계수',
    content: '최종수요가 한 단위 증가할 때 각 산업부문에서 직·간접으로 유발되는 수입액 단위를 말 하는 것으로 형태에 따라 산업별 수입유발계수와 최종수요항목별 수입유발계수로 나뉜 다. 산업별 수입유발계수는 수입투입계수표에 생산유발계수표를 곱하여 구하고 최종수요 항목별 수입유발계수는 소비, 투자, 수출 등 항목별 최종수요에 의한 수입유발액을 최종 수요액으로 나누어 산출한다.',
  },
  '수출경합도지수': {
    title: '수출경합도지수',
    content: '특정 국가(Z)에 상품을 수출하는 두 국가(X와 Y)의 수출구조가 비슷할수록 경쟁도가 커진 다는 가정하에서 이들 국가가 Z국 시장에서 직면하는 경쟁의 정도를 측정하는 지표이다. 동 지수는 X국과 Y국의 특정 상품이 각각의 총수출에서 차지하는 비중을 비교하여 작은 값을 선택하되 모든 상품에 대해 합산한 후 100을 곱하여 계산한다. 따라서 수출경합도지 수(ESI; Export Similarity Index)가 100으로 두 국가의 수출구조가 완전히 일치하면 경 쟁도가 가장 높은 상황에 있음을, 반대로 지수가 0으로 두 국가의 수출구조가 완전히 다 르면 경쟁도가 가장 낮은 상태에 있음을 각각 의미하게 된다.',
  },
  '수출보험': {
    title: '수출보험',
    content: '상품수출 시 수출업자가 수입업자의 신용위험, 수입국의 정치상황 등으로 수출대금을 회 수하지 못할 위험으로부터 수출업자를 보호하기 위한 보험이다. 수출보험의 운영을 위해 한국무역보험공사 내에 정부 등으로부터 자금을 출연받아 수출보험기금을 설치하였다. 수출보험은 ① 수입국의 수입금지 또는 제한, ② 외국에서의 외환거래 제한 또는 금지, ③ 외국에서의 전쟁 또는 내란으로 인한 금융거래 불능, ④ 수입국의 전쟁 또는 내란으로 인 한 수출 불가능, ⑤ 국외에서 발생한 사유로 인한 운송 불능 등으로 인해 수출업자가 피해 를 입을 경우 이를 보상해 주기 위해 운영되는 금융제도이다.',
  },
  '수출입물가지수': {
    title: '수출입물가지수',
    content: '수출입물가지수는 수출 및 수입상품의 가격변동을 측정하는 지표로서 동 지수는 대외의 존도가 높은 우리나라의 경우 수출입상품의 가격변동이 국내물가, 생산활동 및 대외 경쟁 등에 미치는 효과를 사전에 측정하기 위해 작성되며 주로 수출입관련업체들의 수출채산 성 변동이나 수입원가 부담 등을 파악하는 한편 수출입물가지수의 상호 비교를 통하여 가 격측면에서의 교역조건 등을 측정하는 데 이용된다. 2025년 8월 기준으로 조사대상품목 이 수출물가지수는 212개, 수입물가지수는 237개이며, 조사되는 가격기준은 수출 FOB, 수입 CIF를 원칙으로 하고 있다.',
  },
  '수출입물량지수': {
    title: '수출입물량지수',
    content: '무역지수 중 수출입물량의 변동을 나타내 주는 것으로 수출입금액지수를 수출입물가지수 로 나누어 사후적으로 산출되는데 이러한 방식으로 산출되는 것은 수출입금액이 가격요 인과 물량요인의 합과 일치한다는 점에서 타당성을 가진다고 할 수 있다. 수출입물량지수 는 원유 등의 가격이 변화함에 따라 수출입액이 큰 폭의 변동을 보이는 경우 동 가격요인 을 제외한 물량기준으로 우리나라의 수출입상황을 파악하는데 활용되는 지표이다.',
  },
  '수쿠크': {
    title: '수쿠크',
    content: '수쿠크(Sukuk)란 샤리아(Sharia) 율법을 지키기 위해 투자자들에게 이자수익 대신 배당 금 혹은 리스료 형태로 수익을 배분하는 채권을 말한다. 1970년대 이후의 고유가로 자금 을 축적한 이슬람 산유국들의 금융수요가 확대되면서 수쿠크가 본격적으로 발달하였고 2008년 금융위기 이후 이슬람금융이 전통금융에 비해 보다 안전한 금융수단으로 인식되 면서 성장세가 더욱 확대되었다. 샤리아 율법은 금전거래를 통해 이자를 수취하는 것을 부당이득으로 간주하기 때문에 수쿠크는 특정 자산으로부터 취득할 수 있는 수익(실물자 산에 대한 전매차익, 임대료 등)을 배당금 등의 형태로 배분한다는 점에서 일반 채권과 다 르다. 수쿠크의 거래는 거래소를 통한 장내거래와 장외거래가 모두 가능하며 수쿠크 발행 은 주로 장외거래를 통해 이루어진다. 2023년 말 현재 글로벌 수쿠크 시장의 총 발행액은 약 1,877억 달러(IIMM 기준)이며 이 중 말레이시아의 발행 비중이 36%로 가장 높다. 수 쿠크 발행이 높은 성장세를 보인 이유는 ① 무슬림들의 수요 증가 ② 비이슬람권 투자자 들의 이슬람 금융상품 인지도 상승 ③ 이슬람권 국가들의 이슬람 자본시장 육성 정책 시 행 ④ 수쿠크 구조의 표준화 추진 등을 들 수 있다.',
  },
  '수확체감의 법칙': {
    title: '수확체감의 법칙',
    content: '어떤 생산물을 만드는 데 필요한 자본·노동·토지 등의 생산요소 가운데 자본과 토지는 일 정하게 유지하고 노동의 투입량을 증가시킬 경우, 생산물 전체는 증가하지만 추가로 투입 되는 노동량 1단위당 생산물의 증가는 차차 감소한다는 법칙이다. 수확체감의 법칙(Law of Diminishing Returns)은 원래 농지에서 작업하는 노동자 수의 증가에 대한 1인당 수 확량의 증가와 관련된 것이었으나 이후 모든 산업부문에서 특정 생산요소의 투입량이 고 정된 단기에 발생하는 현상으로 확장되었고 “한계생산력 체감의 법칙”으로 일반화되었다.',
  },
  '순상품교역조건지수': {
    title: '순상품교역조건지수',
    content: '순상품교역조건지수란 수출 1단위로 수입할 수 있는 상품의 양이 기준시점 대비 얼마나 증가하였는지를 나타내며, 무역지수통계에서 작성된 수출가격물가지수를 수입물가지수 로 나누어 산출한다. 예를 들어, 2024년 12월 순상품교역조건지수 93.25는 수출 1단위 로 수입할 수 있는 상품의 양이 2020년 1~12월의 평균 대비 6.75% 감소하였음을 의미 하며, 수출 1단위로 0.9325단위 상품을 수입할 수 있다는 의미가 아니다. 순상품교역조 건지수가 상승했다는 것은 수출물가가 수입물가보다 더 많이 올랐다거나 수출물가가 수 입물가보다 덜 하락했다는 것을 의미한다. 따라서 순상품교역조건지수가 상승하면 1단위 상품을 수출해서 받은 외화로 이전보다 더 많은 양의 상품을 수입할 수 있게 된다. 반대로 순상품교역조건지수가 하락했다는 것은 1단위 상품을 수출함으로써 수입할 수 있는 상품 의 양이 그 이전에 비해 줄어들었음을 의미하며 이처럼 교역조건이 악화되면 국민경제의 실질구매력이 떨어져 실질소득이 감소하고 경상수지가 악화될 수 있다.',

  '순안정자금조달비율': {
    title: '순안정자금조달비율',
    content: '2008년 글로벌 금융위기 시 신용경색으로 금융시장 기능이 마비되면서 자금조달이나 만 기연장이 어려워짐에 따라 많은 은행들이 만기불일치 등에 따른 유동성 위기를 경험하였 고 이는 금융시스템 전체의 유동성 경색을 유발하였다. 이에 따라 바젤위원회(BCBS)는 유동성 위기에 대한 대응 및 금융복원력 강화를 위해 단기 유동성 규제인 유동성커버리 지비율과 함께 중장기 유동성 규제인 순안정자금조달비율(NSFR; Net Stable Funding Ratio)을 도입하였다. 순안정자금조달비율은 유동성을 감안한 은행 보유자산대비 안정 적 조달자금(자본 및 부채)의 비율이며 은행들은 2018년부터 NSFR 비율을 100% 이상으 로 유지하여야 한다. 즉, NSFR은 은행 자금조달 구조의 안정성을 강화하기 위해 장기 운 용자산의 일정 부분을 안정적인 부채·자본으로 조달하도록 함으로써 은행들이 단기 도매 자금조달에 과도하게 의존하는 행태를 제한하기 위해 도입되었다. NSFR의 산식은 ‘가 용 안정자금 조달금액(∑부채 및 자본항목잔액 × ASF 가중치) / 필요 안정자금 조달금 액(∑자산항목잔액 × RSF 가중치) × 100’이다. 분자인 가용 안정자금 조달금액(ASF; Available Stable Funding)은 부채 및 자본 항목 중 향후 1년 이내 이탈 가능성이 낮은 안정적인 자금조달 금액을 의미한다. 분모인 필요 안정자금 조달금액(RSF; Required Stable Funding)은 자산항목 중 향후 1년 이내 현금화되기 어려워 안정적인 자금조달이 요구되는 금액을 말한다.',
  },
  '순이자마진(NIM)': {
    title: '순이자마진(NIM)',
    content: '은행의 모든 금리부자산의 운용결과로 발생한 은행의 운용자금 한 단위당 이자순수익(운 용수익률)을 나타내는 개념이다. 은행의 핵심 수익성 지표로서 이자자산순수익(이자수익 자산 운용수익 - 이자비용부채 조달비용)을 이자수익자산의 평잔으로 나누어 계산한다.',

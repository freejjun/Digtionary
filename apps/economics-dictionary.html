    content: '직불카드공동망은 직불카드 소지자가 판매점에서 동 카드를 사용하여 상품·서비스를 구 입하면 판매대금이 카드소지자 은행 계좌에서 인출되어 다음 영업일 판매자 은행 계좌 로 입금되는 지급시스템으로 1996년 2월 가동되었다. 직불카드 소지자가 판매점에서 거래대금을 직불카드로 지급하면 거래내역이 VAN사업자의 네트워크를 경유하여 직불 카드 발급은행으로 전송되고 발급은행은 즉시 고객계좌에서 거래대금을 출금하여 직불 카드계정으로 이체한다. 그리고 거래 익일이 되면 금융결제원은 각 VAN사업자로부터 직불카드 사용내역을 집계하여 은행별 차액을 계산한 후 한국은행에 전송함과 동시에 판매점 거래은행 앞으로 입금내역을 통보함으로써 거래대금이 판매점의 계좌에 입금되 도록 하고 있다.',
  },
  '직접투자': {
    title: '직접투자',
    content: '직접투자는 한 나라의 기업이 국외 현지법인의 경영에 직접 참여하여 영업이익을 획득할 목적으로 자사 보유 자본, 기술 및 인력 등의 생산요소를 국외로 이전하는 거래행위를 말 한다. 직접투자는 국외 현지법인과 지속적인 경제관계 수립 또는 경영권 획득을 목적으로 한다는 점에서 배당금, 이자나 자본이득(capital gain) 등을 목적으로 하는 간접투자 또 는 증권투자(portfolio investment)와 구별된다. 직접투자는 자금흐름 및 투자주체에 따 라 외국인(비거주자)의 국내직접투자(FDI; Foreign Direct Investment)와 내국인(거주 자)의 해외직접투자(overseas direct investment)로 나눌 수 있다. 직접투자의 유형은 경 영참가를 목적으로 하는 현지법인에 대한 지분매입, 장기 금전대여 등이 있으며 지분매입 방법으로는 신규로 국외에 현지법인을 설립하는 공장설립형(greenfield) 투자와 기존 국 외기업의 인수합병(M&A) 투자가 있다. 다만 장기 금전대여가 직접투자에 포함되려면 투 자자가 실질적 경영권 또는 영향력을 행사할 수 있는 구조여야 한다.',
  },
  '진성어음/융통어음': {
    title: '진성어음/융통어음',
    content: '진성어음(Commercial Bill)이란 기업간 상거래에 있어 대금결제를 위해 발행되는 어음 으로 상업어음, 물품대금어음(물대어음)이라고도 한다. 진성어음을 받은 납품업체는 약 정된 날짜에 현금을 받을 수 있으나 원활한 자금순환을 위해 금융기관에서 미리 할인받 아 현금화하는 것이 일반적이다. 진성어음은 상거래를 수반할 때만 발행할 수 있다는 점 에서 순수하게 자금을 조달할 목적으로 발행되는 융통어음(Accommodation Bill)과는 구별된다. 진성어음과 융통어음은 모두 약속어음의 일종으로 외견상 구분할 수 있는 기 준은 없다. 다만 금융기관은 진성어음을 할인하는 과정에서 어음 뒷면에 납품기업의 세 금계산서를 첨부하도록 요구해 진성어음임을 확인한다. 융통어음 중에서도 신용상태가 양호한 기업이 운전자금 등 단기자금을 조달하기 위해 자기신용(대부분 신용평가기관의 신용평가 필요)을 바탕으로 발행하여 단기금융시장에서 유통되는 어음을 기업어음(CP; Commercial Paper)이라고 한다.',
  },
  '집단대출': {
    title: '집단대출',
    content: '주택담보대출 중 신규분양, 재건축·재개발아파트 입주(예정)자 등 일정 자격요건을 갖춘 차주 집단을 대상으로 개별심사 없이 일괄승인방식으로 실행되는 여신을 말한다. 동 대출 은 은행 입장에서 아파트 분양업자와 협약을 체결할 경우 한꺼번에 입주자 전체를 고객으 로 확보할 수 있다는 장점이 있다. 대출을 받는 사람들도 개별적으로 대출심사를 받는 번 거로움을 피할 수 있을 뿐 아니라 저금리 혜택과 함께 중도상환수수료나 설정비용 부담이 작다는 장점이 있어 많이 활용된다. 집단대출은 이주비대출, 중도금대출 및 잔금대출 등 으로 구분한다. 이주비대출은 재건축(재개발) 사업추진 기간 동안 조합원의 이주 자금을 지원하기 위한 대출이며, 중도금대출은 분양 계약에 따른 중도금(계약금 및 잔금 제외)을 납입하기 위한 자금을 지원하는 대출로 일반적으로 건설사와 아파트 준공시 1순위 근저 당 설정을 조건으로 취급된다. 한편 잔금대출은 주택이 완공된 후 등기 전까지 납입할 잔 금을 지원하기 위한 대출을 말한다.',
  },
  '집중도 지수(HHI)': {
    title: '집중도 지수(HHI)',
    content: '특정 산업에 속한 시장참여자들의 매출액이나 자산규모 등을 기준으로 시장점유율을 백 분율(%)로 산출한 후 이들 모두를 각각 제곱한 값을 합산한 수치로, 이 수치가 높을수록 해당 산업이 소수의 참여자들에 의한 지배력이 커짐을 나타낸다. 미국에서는 특정 기업 의 지배력이 과다하게 커지는 것을 예방하기 위해 1992년부터 반독점금지국(DOJ)과 연 방거래위원회(FTC)를 통해 합병가이드라인을 운영하고 있다. DOJ와 FTC 두 기관은 기 업들의 합병이 경쟁에 미치는 영향을 평가하기 위해 ‘합병 전 HHI’와 ‘합병 후 HHI’를 비 교한다. HHI의 기준점을 1000으로 하여, 1000 이하이면 시장의 집중이 없다고 판단하지 만 1000에서 1800 사이인 경우 시장이 다소 집중되었다고 본다. 그리고 합병 후에 1800 이상인 경우에는 합병 후 HHI 지수가 50 포인트 이상 늘어나면 합병을 금지하는 것이 타 당하다고 보고, 100 포인트 이상 늘어나면 소수의 예외적인 경우를 제외하고는 합병을 금 지하는 조치를 취하게 된다. HHI(Herfindahl-Hirschman Index)는 소수의 기업이 시장 점유율을 분할하고 있는 경우일수록 그리고 특정 기업의 시장점유율이 높을수록 수치가 커지게 되므로 소수 기업들 간의 과점적 협조활동으로 인한 공정한 경쟁의 제한 가능성을 측정하는데 이용된다.',
  },
  '차액결제선물환(NDF) 거래': {
    title: '차액결제선물환(NDF) 거래',
    content: '만기 시 당초 약정한 환율에 의해 특정 통화를 거래당사자 간에 인도 또는 인수하는 일 반적인 선물환거래와 달리 만기에 계약원금의 교환 없이 약정환율과 만기 시 현물환율 인 지정환율(fixing rate) 간의 차액만을 지정통화로 결제하는 거래를 말한다. 차액만 결 제하기 때문에 일반 선물환거래보다 결제위험이 작으며 적은 금액으로 거래할 수 있으 므로 레버리지(leverage) 효과가 높아 환리스크 헤지 수단은 물론 환차익을 획득하기 위 한 투기적 거래에도 널리 이용되고 있다. 또한 NDF(Non Deliverable Forward)의 지정 통화가 주로 미 달러화이므로 비거주자는 원화와 같이 국제화되지 않은 통화를 보유하 거나 환전할 필요 없이 자유롭게 선물환거래를 할 수 있다는 장점이 있다. 지정환율은 당 사자 간 약정에 따라 결정되며 통상 원-달러 NDF의 경우 만기일 전일의 매매기준율로 정한다. 만기는 일반적으로 1개월, 2개월, 3개월, 6개월, 9개월, 1년, 2년, 3년, 4년, 5년 으로 되어 있다. 예를 들어 A은행이 3개월 후 1달러당 1,300원에 B은행으로부터 100만 달러를 사들이기로 하는 NDF 계약을 체결한 경우, 3개월 후 만기일 전일에 현물시장 환 율(지정환율)이 1,400원/달러가 된다면 A은행은 달러당 100원씩 총 1억 원의 이득을 보 게 된다. 그리고 B은행은 이 돈을 달러(즉 71,428.57달러)로 만기일에 A은행에게 지급 한다. 한편 NDF 거래에는 시장 유동성 위험, 정보 비대칭, 거래 비용, 예상치 못한 손실 등 단점도 존재한다. 또한 투기적 거래가 활성화될 경우 환율 변동성을 키울 수 있다는 점에도 유의할 필요가 있다.',
  },
  '차액결제시스템': {
    title: '차액결제시스템',
    content: '결제시스템에 참가하는 금융기관 간 자금결제에서 일정 기간(보통 1일) 동안 발생한 거래 의 상호 지급액과 수취액을 모두 상계처리한 다음 그 차액만을 이체하여 결제하는 시스템 으로 양자간 차액결제시스템과 어음교환, CD, 타행환시스템 등과 같이 다수의 금융기관 간에 이루어지는 다자간 차액결제시스템으로 구분된다. 차액결제시스템은 참가기관간 자 금거래를 매 건별로 결제하는 총액결제에 비해 결제 건수 및 금액을 대폭 축소함으로써 참가기관의 자금부담을 경감시키고 결제시스템의 효율성을 높이기 때문에 지급건수가 많 고 금액이 작은 소액결제시스템에 매우 적합한 제도라 할 수 있다. 그러나 차액결제시스 템에서는 거래일 영업마감 후 또는 그 다음 영업일에 참가기관간 거래차액이 중앙은행의 당좌예금 계좌를 통해 최종적으로 결제될 때까지 참가기관의 결제불이행 위험에 노출되 어 있어 보다 엄격한 리스크 관리방식이 요구된다.',
  },
  '차입매수(LBO)': {
    title: '차입매수(LBO)',
    content: '차입매수(LBO; Leveraged Buy out)란 기업을 매수하려는 주체가 인수에 필요한 자금 이 충분하지 않은 경우 금융기관 등으로부터 인수대상 기업의 자산을 담보로 인수자금을 차입하여 기업을 매수하는 방식을 말한다. 인수 및 합병이 이루어진 후에는 인수한 기업 의 자산을 매각하거나 또는 직접 인수한 기업을 경영하여 발생한 수익으로 차입금을 상환 하게 된다. 차입매수는 자기자본 부담 없이도 기업을 매수할 수 있는 것이 가장 큰 장점이 다. 그러나 기업 인수후 차입금을 상환하지 못할 신용위험이 커지며, 기업 매수 완료 후 자기자본비율이 하락하는 등 재무건전성이 취약해질 가능성도 있고, 자산을 매각하는 과 정에서 대대적인 구조조정도 수반되는 등 많은 약점도 가지고 있다. 그래서 이 제도는 주 로 투기펀드들의 고수익 투자방안으로 많이 활용되고 있다.',
  },
  '채권시가평가': {
    title: '채권시가평가',
    content: '채권시가평가(Mark to Market)란 금융기관들이 보유하고 있는 채권에 대한 가치를 적절 한 가격(시장에서 거래가 활발한 채권은 시장가격으로, 거래부진으로 시장가격을 발견하 기 곤란한 경우에는 보유채권을 시장에 매각할 경우 받을 수 있을 것으로 합리적으로 추 정되는 공정가격)으로 평가하는 것을 의미하며 2000년 7월부터 전면 시행되었다. 평가대 상은 금융기관이 보유한 채권과 자산운용사 등 집합투자업자의 간접투자상품이다. 금융 기관이 보유한 채권은 단기매매계정, 매도가능계정, 만기보유계정 등으로 분류하는데 단 기매매계정에서의 시가평가 손익은 당기손익에 반영되고, 매도가능계정의 경우 시가평 가대상이나 당기손익에 반영하지 않고 재무상태표상 기타포괄손익누계액(자본을 구성하 는 항목)으로 처리하고, 만기보유계정은 장부가평가를 원칙으로 하고 있다. 매도가능계정 으로 분류된 채권의 경우 처분으로 손익이 실현되었을 때는 그 손익이 비로소 당기손익에 반영된다. 채권을 시가로 평가하는 이유는 시가와 장부가 사이의 지나친 괴리로 채권가격 이 과도하게 저평가 또는 고평가될 경우 발생할 수 있는 재무지표의 왜곡(당기손익의 과 소 또는 과대계상 등)을 방지하는데 그 목적이 있다. 특히 집합투자자산으로 편입된 채권 에 시가평가를 하지 않는다면 동 채권에 신용위험이 발생한 경우 나중에 환매한 투자자에 게 그 손실이 대부분 전가될 수 있기 때문에 손실의 공정한 배분을 위해서도 채권시가평 가제도는 필요하다. 한편, 법인형 MMF의 경우 2022년 4월부터 시가평가제도가 도입되 었으며, 일정 조건(안정적 자산 비중)이 충족되는 경우에는 예외적으로 장부가 평가를 허 용하고 있다.',
  },
  '채권시장': {
    title: '채권시장',
    content: '채권시장은 채권이 거래되는 시장이다. 채권은 정부, 공공기관, 민간기업 등이 비교적 장 기로 불특정 다수로부터 거액의 자금을 조달하기 위하여 정해진 이자와 원금의 지급을 약 속하면서 발행하는 증권을 말한다. 채권시장은 발행시장(제1차 시장, primary market) 과 유통시장(제2차 시장, secondary market)으로 나뉜다. 발행시장은 채권이 자금 수 요자에 의해 최초로 발행되는 시장이며, 유통시장은 이미 발행된 채권이 투자자들 사이 에서 매매되는 시장이다. 채권 투자자는 채권을 발행시장에서 인수하거나 유통시장에 서 매입할 수 있다. 이자소득 외에 가격변동에 따른 자본이득(capital gain)을 기대할 수 있기 때문에 채권은 자산 포트폴리오를 구성하는 중요한 투자 수단이 된다. 발행시장의 채권은 정부가 발행하는 국채, 한국은행이 발행하는 통화안정증권, 지방자치단체가 발행 하는 지방채, 상법상의 주식회사가 발행하는 회사채, 금융회사가 발행하는 금융채, 한국 전력공사 등 법률에 의해 설립된 법인이 발행하는 특수채 등 다양하게 분류된다. 채권 유 통시장은 장외시장과 장내시장으로 구분된다. 현재 대부분의 채권 거래는 장외시장에서 주로 증권회사의 단순거래를 통하여 이루어지고 있는데, 이는 채권의 종목이 다양하고 거 래조건이 표준화되어 있지 않아 한국거래소의 자동매매시스템을 통해 거래하기가 곤란하 기 때문이다. 장내시장으로는 한국거래소 내에 일반채권시장과 국채전문유통시장이 개설 되어 있다.',
  },
  '채권시장안정펀드': {
    title: '채권시장안정펀드',
    content: '채권시장안정펀드란 2008년 9월 미국발 금융위기로 국내 금융시장이 경색됨에 따라 국 내 금융기관이나 기업이 채권이나 기업어음 발행을 통해 원활하게 자금을 조달할 수 있도 록 2008년 11월에 만들어진 펀드이다. 동 펀드에는 국내은행, 증권사, 보험사들이 출자 하여 5조원의 펀드를 조성하였다. 이렇게 조성된 자금은 당시 잠재적으로 금융시스템 불 안을 야기할 수 있는 취약부문이 발행하는 채권(중소기업 P-CBO, 건설사 ABCP 및 일부 대기업의 회사채)을 우선적으로 매입함으로써 취약부문에 자금을 선제적으로 공급하였고 은행 및 카드사의 원활한 자금 조달을 돕기 위해 은행채나 카드채도 일부 매입하였다. 특 히 동 펀드에 대한 자금 출자로 금융기관의 유동성 부족이 우려됨에 따라 한국은행은 동 펀드에 출자한 금융기관에 대해 출자금액의 50%까지 자금을 지원하였다. 당시 신용 경색 으로 자본시장을 통한 자금조달이 매우 어려운 상황에서 동 펀드는 직접금융시장의 자금 흐름을 개선하고 취약부문의 자금난을 완화하는 데 크게 기여한 것으로 평가되고 있다. 이후 코로나19 팬데믹으로 국내 금융시장이 불안해지자 2020년 4월 20조원 규모의 채권 시장안정펀드가 재가동되었고, 2022년 10월에는 레고랜드 사태로 인한 단기자금시장 불 안에 대응하여 재가동되기도 하였다.',
  },
  '채무불이행': {
    title: '채무불이행',
    content: '채무불이행(Default)은 채무자가 계약상 또는 법률상 부담하는 채무를 그 내용대로 이행 하지 않거나, 이행할 수 없는 객관적인 상태에 빠지는 것을 의미한다. 이는 법률 분야에서 흔히 사용되는 개념이지만, 특히 금융 및 경제 영역에서도 빈번히 사용된다. 채무불이행 은 크게 이행지체, 이행불능, 불완전이행의 세 가지 유형으로 분류될 수 있다. 이행지체는 채무의 이행기가 도래하였음에도 불구하고 채무자가 정당한 이유 없이 채무를 이행하지 않는 경우를 말한다. 이행불능은 채무의 이행이 채무자의 귀책사유로 인해 사회통념상 불 가능하게 된 경우를 의미한다. 불완전이행은 채무의 이행은 이루어졌으나, 그 이행이 채 무의 내용에 완전히 부합하지 못한 경우를 말한다. 채무불이행이 발생하면 채권자는 채무 자에 대해 손해배상을 청구할 수 있으며, 계약의 해제, 담보권 실행 등 다양한 법적 조치 를 취할 수 있다. 금융부문에서 채무불이행은 개인의 신용등급 하락, 금융기관의 부실채 권 증가, 나아가 금융시스템 전반의 불안정성을 초래할 수 있다. 또한 거시경제적으로는 기업의 연쇄 도산, 실업률 증가, 소비 위축 등 경기 침체로 이어질 수 있으므로 채무불이 행 위험 관리는 개인, 기업, 금융기관 및 정부 등 모든 경제주체에 중요한 과제이다.',
  },
  '채무상환유예(Moratorium)': {
    title: '채무상환유예(Moratorium)',
    content: '라틴어로 ‘지체하다’ 란 뜻의 ‘morari’에서 파생된 말로, 한 국가가 경제·정치적인 이유로 외국에서 빌려 온 차관에 대해 일시적으로 상환을 연기하는 ‘지불유예(支拂猶豫)’를 말한 다. 곧 채무를 반드시 갚겠지만 현 상황에서는 도저히 갚을 능력이 없으니 지급을 일정 기 간 유예하겠다는 선언이다. 따라서 모라토리엄은 채무상환이 아예 불가능한 ‘채무불이행 (디폴트, default)’이나 채무상환을 거절하는 ‘지급거절’과는 의미가 다르다. 한 국가가 모 라토리엄을 선언하면 그 국가는 IMF와 구제금융 협상을 벌이고, 이를 토대로 채권국 모임 인 ‘파리클럽’, 채권은행단 모임인 ‘런던클럽’과 구체적인 채무상환 연장 조건을 협상하게 된다. 이 과정에서 채무국은 채권국과 채무조정 작업을 하여 만기를 연장하거나 구조조정 작업을 통해 국가의 신뢰도를 높이게 된다. 그러나 외채상환 기한을 유예하더라도 모라토 리엄을 선언하면 해당 국가의 신용도가 크게 하락하여 대외거래가 사실상 불가능해지며, 환율이 급등하는 등 국가 전체적으로 경제적 혼란을 겪게 된다. 따라서 모라토리엄을 선 언하지 않으려면 그전에 채무 상환의 연기, 단기채무의 중장기 전환, 원금 삭감 등을 통해 채무 만기를 조정해야 한다.',
  },
  '청년실업률': {
    title: '청년실업률',
    content: '청년실업률이란 15세에서 29세에 해당하는 청년층의 경제활동인구 중 실업자의 비율을 말한다. 따라서 재학 중인 학생이나 군인 및 구직단념자 등은 비경제활동인구로 분류되어 청년실업률에 포함되지 않는다. 다만 연령계층별 고용보조지표를 활용하면 청년층의 고 용상황에 대한 보다 정확한 파악이 가능한 만큼, 기존의 공식 실업률 외에 고용보조지표 를 활용할 필요가 있다.',
  },
  '청산': {
    title: '청산',
    content: '자금지급 거래에서 청산(Clearing)은 경제주체간 지급행위가 수표, 계좌이체 등 비현금수 단을 이용하여 이루어진 경우 지급인과 수취인의 거래은행들이 주고 받을 금액을 정산하 고 최종 확정하는 과정을 말한다. 거래 이후 지급수단의 수령, 전달, 조회, 통지 및 차액계 산(netting)이나 결제전 포지션 산출과정 모두가 청산에 포함된다. 증권결제의 경우에서 도 증권시장에서 거래된 증권의 매매사실을 확인하고 차감을 거쳐 최종 결제자료를 산출 하는 과정을 청산이라 한다. 우리나라의 경우 인터넷뱅킹, 어음 및 수표 등 소액거래에서 는 금융결제원, 장내유가증권시장에서는 한국거래소, 장외채권시장에서는 한국예탁결제 원이 청산기관 역할을 한다.',
  },
  '청산소': {
    title: '청산소',
    content: '청산소(Clearing House)는 금융시장에서 은행, 증권사 등 거래당사자들 사이에 발생하 는 다수의 지급 거래를 집중적으로 처리하여, 각 거래의 채권·채무를 확정하고 최종결제 를 위한 포지션을 산정하는 핵심 금융인프라이다. 청산(clearing)은 결제를 위해 송부된 어음, 수표, 계좌이체 등의 지급수단을 확인한 후 최종적으로 수취하거나 해당 금융기관 간에 지급해야 할 금액을 산출하는 과정과 거래 이후 지급수단의 수령, 전달, 조회, 통지 및 차액계산(netting)이나 결제 전의 포지션 산출과정 모두를 포함하는 개념이다. 청산 소는 청산 과정을 통한 결제(settlement)를 위한 기초자료를 산출하며, 이 과정에서 거 래당사자 간의 채권·채무 관계가 명확히 정리되어 결제의 효율성과 안정성이 크게 향상 된다.',
  },
  '총고정자본형성': {
    title: '총고정자본형성',
    content: '기업에서는 지속적인 생산능력을 유지하고 경쟁력을 확보하기 위해 노후설비를 새로운 설비로 대체하거나 신규 사업 진출을 위해 공장도 짓고 기계도 구매하는데 이러한 경제활 동은 해당연도의 이익만을 위한 것이 아니고 미래의 지속적인 수입의 보장 등 장기적인 안목에서 이루어진다. 이렇게 장기간에 걸쳐 생산과정에 반복적, 지속적으로 사용되는 유 형 또는 무형의 산출물을 고정자산이라 하고, 생산주체에 의한 고정자산의 순취득(취득- 처분)을 총고정자본형성(GFCF; gross fixed capital formation)이라 한다. 총고정자본 형성에는 토지나 중고품의 구매는 제외되고 고정자산 취득에 따른 설치비용이나 취득세, 등록세 등의 부대비용은 포함된다.',
  },
  '총부채상환비율(DTI)': {
    title: '총부채상환비율(DTI)',
    content: '차주의 연간 소득 대비 연간 대출 원리금 상환액의 비율(Debt-To-Income ratio)을 의 미한다. 주택담보대출 차주의 원리금상환능력을 감안하여 주택담보대출 한도를 설정하 기 위해 도입된 규제 비율이다. 「은행업감독업무시행세칙」에서는 “총부채상환비율 = [(해 당 주택담보대출 및 기존 주택담보대출의 연간 원리금 상환액 + 기타부채의 연간이자상 환액) / 연소득] × 100” 방식으로 산정하도록 하고 있다. DTI 규제는 담보인정비율(LTV) 규제 강화의 후속조치로 2005년 8월 도입되었으며, 이는 차주의 상환능력과 관계없이 담 보가치(주택가격)에 비례하여 주택담보대출 한도가 결정되는 LTV 규제의 문제점을 보완 하고자 도입한 것이다. 특히 과도한 가계부채의 증가 억제 및 주택자금 수요 축소 등을 위해 DTI 비율을 특정수준 이내로 제한하기도 한다. 한편, DTI 규제는 LTV 규제와 함 께 대표적인 특정 부문에 대한 거시건전성정책 수단으로서 통화신용정책과 상호 보완적 인 관계를 가지고 있다. 예를 들어 저금리 하에서 주택가격 상승세가 확대될 경우 DTI 및 LTV 규제를 강화하면 주택담보대출 한도가 축소되어 주택시장 과열을 억제하는 효과를 기대할 수 있다.',
  },
  '총산출': {
    title: '총산출',
    content: '총산출(Gross Output)이란 생산된 재화와 용역의 화폐평가액을 총합한 것으로 재고품 과 자가소비를 포함한다. 그러나 국민계정에서는 생산주체별로 비용구조와 산출물 형태 가 같지 않으므로 총산출의 개념도 산업, 정부 및 가계에 봉사하는 비영리단체, 가사서비 스 등 생산주체별로 다르다. 산업의 총산출은 일반적으로 일정 회계기간에 생산된 모든 재화와 서비스의 시장가격을 의미하는데 재고품과 자가소비를 위한 생산도 포함하며 이 의 평가는 생산자가격에 의해서 행해지거나 생산자가격에서 연관된 순상품세를 공제한 기초가격에 의하여 평가된다. 거래가격이 존재하는 재화의 총산출은 생산량과 거래가격 을 이용하여 계산할 수 있으며 서비스의 경우 요금이나 수수료 등 제공한 서비스의 대가 로 받은 수입을 총산출로 계상한다. 다만 도소매업과 같은 유통업이나 수량화가 곤란한 서비스를 판매하는 금융업 등은 총산출에 대한 별도의 정의가 필요하다. 도소매업의 경 우 판매금액과 매입금액의 차액인 거래마진, 금융업은 실제서비스 수수료와 금융중개서 비스, 보험업은 수취한 보험료와 보험준비금의 투자수익을 합한 금액에서 보험금 지급액 과 지급준비금 추가적립액 등을 차감한 보험서비스료를 의제하여 총산출로 간주한다. 정 부 및 가계에 봉사하는 비영리단체가 공급하는 서비스는 보통 시장에서 거래되는 것이 아니므로 시장가격으로 평가하기 곤란하다. 따라서 이 경우에는 서비스의 생산에 들어간 중간투입과 부가가치를 합한 총투입비용을 총산출로 계상한다. 또한 가사서비스업은 생 산을 위해 투입되는 것이 노동뿐이므로 서비스 제공의 대가로 수취한 급여(피용자보수) 를 총산출로 본다.',
  },
  '총수입스왑(Total Return Swap)': {
    title: '총수입스왑(Total Return Swap)',
    content: '총수익스왑(TRS; Total Return Swap)은 기초자산 보유에 따라 발생하는 이자, 자본수익 등 총수익을 대가로 약정이자(통상 LIBOR+spread)를 수취하는 거래를 말한다. 스왑기 간 동안 현금흐름은 다음과 같다. 우선 이표 지급일에 보장매입자(TRS 지급자)는 채권 표 면이자를 지급하고, 보장매도자(TRS 수취자)는 LIBOR+spread의 약정이자를 지급한다. 이후 스왑계약이 종료되는 시점에서는 이자교환 뿐 아니라 채권가치의 변동에 따른 자본 이득이나 손실을 스왑계약 당사자 간에 정산하여 교환하게 된다. 총수입스왑거래를 통해 보장매입자는 기초자산으로부터 발생하는 모든 현금흐름을 거래상대방에게 이전하기 때 문에 해당 자산을 매각하여 단기로 자금을 운용하는 것과 동일한 효과를 가지며 보장매도 자는 자기자금의 부담없이 수익을 획득하는 효과를 가진다. 총수익스왑은 기초자산의 신 용위험뿐만 아니라 금리 환율 변동 등에 따른 시장위험도 거래상대방에게 이전할 수 있다 는 점에서 채무불이행 등의 신용위험만을 전가하는 신용파산스왑(CDS)과는 다르다.',
  },
  '총액결제시스템': {
    title: '총액결제시스템',
    content: '거액지급시스템에 참가하는 금융기관들의 지급액과 수취액을 상계시키지 않고 지급지시 건별로 그 지급지시 금액(총액)을 이체하는 총액결제방식을 채택한 거액지급시스템을 말 한다. 이와 달리 금융기관들의 상호 지급액과 수취액을 상계하여 차액만을 이체하는 차 액결제시스템이 있다. 대체로 총액결제시스템(Gross Settlement System)은 지급지시 가 즉시 이체되어 즉시 결제가 이루어지는 방식을 채택하기 때문에 실시간총액결제(real time gross settlement)로 운영된다. 실시간총액결제시스템은 거래 건별 금액을 지급지 시 입력 즉시 실시간으로 이체해야 하므로 시스템 참가기관은 결제자금을 충분히 보유해 야 한다는 단점이 있으나 개별 지급지시별로 즉시 이체가 완료되므로 차액결제시 필연적 인 신용리스크가 발생하지 않는다. 보통 실시간총액결제시스템에서는 참가기관의 결제유 동성 지원을 위해 일중당좌대출이나 일중RP 등의 결제유동성 지원제도를 운영한다. 우리 나라의 실시간총액결제시스템으로는 금융기관간 자금결제를 위해 한국은행에서 운영하 는 한은금융망(BOK-Wire+)이 있다.',
  },
  '총저축/총저축률/평균소비성향/평균저축성향': {
    title: '총저축/총저축률/평균소비성향/평균저축성향',
    content: '총저축은 국민총처분가능소득에서 소비하고 남은 부분이다. 총저축은 투자재원으로 차기 생산을 증가시키는데 이용되거나 대외자산구입에 이용되므로 이론적으로는 국내총투자 에 국외투자를 더한 총투자와 일치한다. 총저축 = 국민총처분가능소득 - 소비 총저축률은 100에서 국민총처분가능소득 중 최종소비를 목적으로 처분된 재화와 서비스 의 비율인 소비율을 차감한 것이다. 이때 소비율을 백분율이 아닌 계수로 표시한 것을 평 균소비성향이라 하며, 평균저축성향은 1에서 평균소비성향을 차감한 것이다. 총저축률 = 100 - 소비율* * 최종소비지출/국민총처분가능소득** × 100 ** 피용자보수 + 영업이익(국외순수취영업이익 및 재산소득 포함) + 순생산 및 수입세 + 국외순수취경상이전 + 고정자본소모) 평균소비성향 = 최종소비지출/국민총처분가능소득 평균저축성향 = 1 - 평균소비성향',
  },
  '최저임금제': {
    title: '최저임금제',
    content: '국가가 노사 간의 임금결정 과정에 개입하여 임금의 최저수준을 정하고 그 이상 임금을 지급하도록 강제함으로써 근로자를 보호하는 제도이다. 최저임금제도는 1894년 뉴질랜 드가 가장 먼저 도입하였으며 우리나라는 1986년 12월 31일 최저임금법을 제정·공포하 고 1988년 1월 1일부터 이를 시행하였다. 최저임금제를 도입하는 목적은 임금의 최저수 준을 보장하여 근로자의 생활안정과 노동력의 질적 향상에 이바지하고, 임금격차를 완화 하여 소득분배 개선에 기여하며, 근로자의 생활안정 및 근로자의 사기진작을 통해 노동생 산성을 향상시키고, 적정임금을 지급하여 공정경쟁을 촉진하는 등으로 다양하다. 현행 최 저임금법 및 동법시행령에 따르면 고용노동부장관은 매년 8월 5일까지 다음 연도중 적용 할 최저임금을 결정하여 고시해야 하며 최저임금액 보다 적은 금액의 임금을 지급하는 경 우에는 3년 이하의 징역 또는 2천만원 이하의 벌금이 부과된다.',
  },
  '최종대부자 기능': {
    title: '최종대부자 기능',
    content: '최종대부자(Lender of Last Resort) 기능은 금융시장 불안 등으로 일시적인 지급불능 상 태에 빠진 금융기관에 대하여 중앙은행이 발권력을 동원하여 부족자금을 신속하게 대출 해주는 기능을 말한다. 즉, 개별 은행에 대해 예금인출요구가 일시에 몰릴 경우 지급능력 의 유무와 관계없이 유동성 부족상태에 직면하게 되고 이는 해당 은행의 파산, 나아가 은 행의 연쇄 도산 등으로 이어져 국민경제적으로 부정적인 파급효과를 가져오게 되므로, 중 앙은행이 시중에 충분한 자금을 공급함으로써 사람들의 심리를 안정시키고 위기의 확산 을 방지하여 전체 금융시장의 안정을 도모하는 것이다. 다만 이러한 기능 수행 시에는 금 융기관의 과다차입 및 도덕적 해이를 방지하기 위해 시장금리보다 다소 높은 수준의 대출 금리가 적용된다. 이와 같은 기능은 중앙은행이 독점적인 발권력을 가진 데 따른 것으로 써 중앙은행의 중요한 고유기능의 하나이다. 한편 최종대부자 기능의 개념은 글로벌 금융 위기 극복 과정에서 그 범위가 확대되었는데, 중앙은행은 금융안정 회복을 위해 개별 금 융기관뿐만 아니라 금융시장에 대해서도 적극적으로 유동성을 공급하였고, 이를 전통적 인 최종대부자 기능과 구분하여 최종시장조성자(market maker of last resort) 기능이라 고 부르기도 한다.',
  },
  '최종수요/중간수요': {
    title: '최종수요/중간수요',
    content: '어떤 재화나 서비스를 구매하고자 하는 능력과 욕구를 수요라 하는데 이는 용도에 따라 중간수요와 최종수요로 나눌 수 있다. 최종수요는 가계나 일반정부의 소비 혹은 기업의 자본 형성 등과 같이 최종적인 목적으로 사용되는 재화나 서비스를 가리킨다. 이는 생산 과정에서 원재료로 투입되는 재화나 서비스를 가리키는 중간수요의 상대개념이다. 예를 들면 밀가루가 가정에 판매되었을 때 밀가루에 대한 수요는 최종수요가 되지만 제빵공장 에 빵의 원료로 판매되었을 때에는 중간수요가 된다.',
  },
  '추가경정예산': {
    title: '추가경정예산',
    content: '추가경정예산이란 행정부가 예산을 성립한 후에 발생한 사회·경제적인 변동으로 인해 기 존의 예산을 추가·삭감하여 바꾼 예산을 가리킨다. 즉 헌법에서는 예산안을 편성할 때 예 산 성립 후 예상치 못한 지출에 대비하기 위해 따로 예비비를 두고 있으나, 이것만으로 충 당할 수 없을 때에는 추가적으로 세출을 조정하는 등을 통해 추가경정예산을 짤 수 있다. 본예산에 대비되는 용어이며 보정예산이라고도 한다. 구재정법에서는 추가예산과 경정예 산으로 구분하여 규정한 바 있으나 헌법(헌법 제56조)과 국가재정법(제89조)에서는 이를 통합하여 추가경정예산이라 부른다. 이는 행정부가 예산안을 국회에 제출한 후 예산이 성 립되기 전에 불가피한 사유로 예산안의 일부를 수정하는 수정예산과는 구별된다.',
  },
  '추심': {
    title: '추심',
    content: '일반적으로 어음·수표소지인이 거래은행에 어음·수표대금 회수를 위임하고 동 위임을 받 은 거래은행은 어음·수표 발행점포 앞으로 동 대금의 지급을 요청하는 일련의 절차를 말 한다. 실무상으로는 어음소지인 등의 추심권한 및 이에 준하는 권한을 위임받은 은행이 어음의 지급인 또는 인수인 등 어음채무자로부터 어음금액을 받아낼 때의 어음을 추심어 음이라 한다. 약속어음의 경우에는 어음교환제도를 통하여 추심하고, 환어음의 경우에는 거래은행을 통해 지급인 은행에 추심한다.',
  },
  '출구전략': {
    title: '출구전략',
    content: '출구전략(Exit Strategy)이란 경제 위기 발생시 경기를 부양하기 위해 취하였던 각종 완 화정책을 정상화하는 것을 말한다. 본래 군사전략에서 비롯된 용어로 미국이 베트남전 쟁 당시 승산 없는 싸움에서 피해를 최소화하며 군대를 철수할 방안을 모색할 때 사용 한 용어이다. 현재는 의미가 확장되어 위기상황을 극복하고자 취했던 조치들의 부작용이 나 후유증을 최소화하며 정상으로 돌아오기 위해 취하는 조치들을 포괄적으로 지칭한다. 2008년의 글로벌 금융위기와 관련해서는 중앙은행이 위기극복을 위해 이례적으로 취했 던 제로금리정책, 양적완화 정책 등을 정상화하는 조치를 의미하는 용어로 사용되었다.',
  },
  '출금이체': {
    title: '출금이체',
    content: '출금이체(Debit Transfer)는 수취인이 자신이 거래하는 금융기관에 추심을 의뢰하여(즉, 인출지시) 지급인의 계좌로부터 이체금액을 출금하여 수취인 자신의 계좌에 입금하도록 하는 계좌이체방식을 말한다. 대표적인 출금이체방식으로는 수표 추심, 지로시스템의 자 동이체, 자금관리서비스(CMS)공동망의 대량자금이체 중 출금이체가 있다. 지로의 자동 이체와 CMS의 출금이체는 모두 사전 약정된 수취인의 자금인출지시로 납부자의 예금계 좌에서 자금이 인출되어 수납자의 예금계좌로 자동이체된다.',
  },
  '치앙마이 이니셔티브(CMI)': {
    title: '치앙마이 이니셔티브(CMI)',
    content: '1999년 3월 ASEAN+3 정상회의에서 협력과제의 하나로 통화·금융협력을 제시하고 역 내 금융지원체제를 구축하기로 합의함에 따라 2000년 5월 태국 치앙마이에서 개최된 ASEAN+3 재무장관 회의에서 마련한 방안을 말한다. 이 방안에서는 아세안 스왑협정의 확대, 역내 환매조건부채권매매 활성화, 한·중·일과 아세안의 양자간 통화스왑계약 체 결 및 네트워크화, 역내 감시체제 강화를 제시하였다. 이후 스왑규모의 불충분, 개별스왑 계약의 한계 등 CMI(Chiang Mai Initiative)의 미비점을 보완하고 위기대응능력을 더욱 강화하기 위한 CMI 다자화 협정(CMIM; Chiang Mai Initiative Multilateralization)이 2010년 3월 발효됨으로써 CMI는 CMIM으로 전환되었다. 이에 따라 CMI에 의거하여 추 진되었던 양자간 스왑체계가 다자간 스왑체계로 바뀌는 동시에 참가국이 확대되고 위기 해결 목적의 공동기금이 조성되는 등 역내 금융지원체제의 실효성이 높아지게 되었다. 또 한 역내 감시체제 강화를 위하여 기존의 경제동향 검토 및 정책협의(ERPD)와 별도로 역 내 거시경제 및 금융상황을 감시·평가·보고하는 아세안+3 거시경제조사기구(AMRO)가 2011년 4월에 설립되었다.',
  },
  '치킨게임': {
    title: '치킨게임',
    content: '치킨게임(Chicken Game)은 다양한 분야에서 이해 당사자가 모두 최악의 상황에 직면 할 가능성을 초래하는 극단적인 경쟁을 가리키는 용어로 쓰이고 있다. 미국에서는 한때 젊은이들 간에 서로 마주 보는 방향으로 차를 몰고 가는 게임이 성행했는데, 이때 마주 달 리는 차가 충돌하기 직전에 운전대를 바꾸는 사람이 겁쟁이(chicken)로 놀림을 받았다고 한다. 이러한 종류의 게임에서 승리하기 위해서는 상대방에게 자신의 선택을 절대로 바꾸 지 않겠다는 의지를 정확히 전달하는 것이 매우 중요하다. 그러나 이해당사자가 모두 자 신에게 유리한 선택만을 고집할 경우 모두에게 최악의 결과가 도래하게 된다. 게임 전문 가들은 치킨게임이 이해당사자들 간에 반복될 경우 이론적으로는 자신에게 가장 유리한 선택을 포기하게 됨으로써 최악의 상황에 도달하지는 않는다고 한다.',
  },
  '칩플레이션(Cheapflation)': {
    title: '칩플레이션(Cheapflation)',
    content: '저가 상품 가격상승률이 고가 상품보다 더 큰 현상을 말한다. 통상 저소득 계층이 저렴한 제품을 더 많이 소비하는 점을 고려할 때 저소득층이 더 높은 인플레이션 고퉁을 겪는 결 과로 이어진다. 우리나라에서도 팬데믹 이후 저가상품의 가격이 더 크게 상승하는 칩플레 이션이 발생하였다. 이러한 칩플레이션으로 저소득층-고소득층 간 실효물가의 격차가 확 대되는 등 인플레이션 불평등이 심화된다. 따라서 통화정책을 통해 전체적으로 물가안정 기조를 유지하는 것이 저소득층의 어려움을 덜어주는 길이다.',
  },
  '카르텔': {
    title: '카르텔',
    content: '카르텔(Cartel)이란 동종 혹은 유사 산업에서 경쟁하는 기업들이 상호간의 경쟁을 제한하 고 완화함으로써 시장을 지배할 목적으로 결성한 기업연합체를 말한다. 카르텔에 속한 기 업들은 협약을 맺고 가격책정, 생산량 할당 등에 대해 개별 기업 간의 행동을 조정할 기 구를 만들고 이를 통해 가격과 생산량을 결정한다. 이럴 경우 카르텔에 속한 기업들은 서 로 경쟁할 경우에 비해 더 많은 이익을 얻을 수 있다. 따라서 카르텔은 공급자들이 소수 인 과점기업들 사이에 주로 형성된다. 그러나 카르텔은 경제의 비효율성 초래, 경제발전 저해 등과 같이 국민경제에 미치는 폐해가 크므로 일반적으로 금지 및 규제의 대상이 된 다. 대표적인 국제규모의 카르텔로는 중동 산유국이 주축이 된 석유수출국기구(OPEC; Organization of Petroleum Exporting Countries)를 들 수 있다.',
  },
  '캐리트레이드': {
    title: '캐리트레이드',
    content: '상대적으로 금리가 낮은 국가의 통화로 자금을 빌려(carry) 금리가 높은 국가의 주식 채 권 등의 자산에 투자(trade)하는 행위를 의미한다. 국제금융시장에서 주요한 캐리트레이드 (Carry Trade)의 사례는 1990년대 후반 저금리의 일본 엔화를 차입하여 고금리의 신흥 국 자산에 투자하였던 엔 캐리트레이드를 들 수 있다. 글로벌 금융위기를 겪으면서 미국 이 기준금리를 0%대로 낮추었던 2008년 이후에는 낮은 금리의 미 달러화를 차입하여 미 국 이외의 고금리 국가에 투자하는 달러 캐리트레이드가 확산되기도 하였다. 캐리트레이 드의 수익은 국가 간의 금리 차 및 환율변동 등에 따라 결정되므로 금리 차뿐만 아니라 차 입 국가와 투자 국가의 환율 변동도 고려해야 하는 점에 그 특징이 있다. 즉 캐리트레이드 는 주로 저금리로 자금을 조달하여 고금리에 투자하므로 높은 수익을 얻을 수 있으나, 자 금을 차입한 후에 차입 국가의 통화가치가 상승하거나 투자 국가의 통화가치가 하락하는 경우는 오히려 환차손이 발생할 위험이 있다.',
  },
  '캐즘(Chasm)': {
    title: '캐즘(Chasm)',
    content: '캐즘(Chasm)은 새로운 기술이나 제품이 개발돼 대중에서 소개된 뒤 대중화되는 과정에 서 처음의 수요가 후퇴하거나 정체하는 현상을 말한다. 원래 지질학 용어로 지각변동으로 인해 지층 사이 큰 틈이 생긴 것을 말한다. 비즈니즈 컨설턴트인 제프리 무어가 1991년 ‘캐즘을 넘어서(Crossing the Chasm)’란 제목의 책을 내고 초기 시장과 주류시장 사이 간극에서 위기가 나타나는 현상을 캐즘이라 표현하기 시작했다.',
  },
  '커버드본드(이중상환청구권부 채권)': {
    title: '커버드본드(이중상환청구권부 채권)',
    content: '커버드본드(Covered Bond)란 금융기관이 부동산담보대출 등 자신이 보유한 고정자산을 담보로 발행한 채권을 말하며 우리나라에는 2014년 4월 도입되었다. 대출자산 등을 담 보로 하는 것은 자산유동화증권(ABS)이나 주택저당증권(MBS)과 유사하다. 그러나 ABS 나 MBS는 채권 발행시 기초자산(담보자산)을 별도로 설립된 특수목적기구(SPC)에 이전 함에 따라 최초로 담보자산을 보유했던 금융기관의 변제의무는 소멸되는 반면, 커버드본 드는 투자자가 담보자산에 대해 우선변제권을 보장받는 동시에 채권발행 금융기관에 대 해서도 원리금 상환을 청구할 수 있다. 그래서 커버드본드를 이중상환청구권부 채권이라 고도 한다. 커버드본드는 이렇게 이중으로 원리금 상환을 보장받기 때문에 일반 채권보다 발행금리가 낮게 형성된다. 일반적으로 은행들은 만기가 짧은 예금으로 자금을 조달하여 장기로 자금을 운용할 경우 금리위험에 노출됨에 따라 장기로 자금을 운용하기 어렵다. 그러나 은행이 커버드본드를 발행하면 낮은 고정금리로 장기자금을 조달할 수 있어 주택 담보대출과 같은 장기 고정금리대출을 확대할 수 있다. 즉, 커버드본드는 은행들의 안정 적인 장기자금 조달을 가능하게 해주는 한편 가계에 대해서는 장기 고정금리 주택담보대 출을 해줄 수 있으므로 가계부채의 구조 개선(금리변동위험으로부터 차입자 보호 등)에도 기여할 수 있다.',
  },
  '컨트리리스크': {
    title: '컨트리리스크',
    content: '해외 투자자가 평가하는 특정 국가의 대외신인도를 일컫는 말로 투자상대국 정부의 예 상치 못한 제도 변경이나 정책 변화로 투자자가 손실 또는 불이익을 입게 될 가능성을 의 미한다. 신용위험이 주로 거래상대방의 원리금 상환과 관련된 위험인 반면 컨트리리스크 는 주로 투자상대국 정부의 행위로 인한 투자 손실 또는 불이익 발생 가능성을 나타낸다 는 점에서 다르다. 대표적인 컨트리리스크로는 투자상대국의 정책당국이 원리금 상환이 나 예치금을 동결하거나, 외환시장을 일시적으로 폐쇄하거나, 조세제도를 불리하게 개편 하거나, 과실송금을 규제하는 경우 등을 들 수 있다. 이 밖에도 투자상대국 정부가 투자자 산의 강제몰수 또는 징발 및 수용 등의 조치를 취하는 경우, 전쟁이나 혁명의 발발로 인한 투자자산의 파괴와 자산가치의 하락도 컨트리리스크에 해당된다.',
  },
  '코리보': {
    title: '코리보',
    content: '코리보(KORIBOR)는 국내 은행들이 서로 자금거래를 할 때 기준이 되는 금리를 말한다. 금융시장이 발달하고 금융상품이 다양해지면서 국내에서도 영국 런던의 은행간 단기자금 거래 시 적용되는 금리인 LIBOR(London Inter-Bank Offered Rate)와 같은 은행간 단 기 자금거래의 기준금리를 도입할 필요성이 높아졌다. 이에 한국은행은 은행, 전국은행연 합회 등과 협의를 거쳐 2004년 2월 단기 기준금리 도입방안을 구체화하고 수개월간의 시 범운영을 거쳐 같은 해 7월 26일 정식으로 도입하게 되었다. 코리보의 총 6개의 기간물(1 주, 1·2·3·6·12개월)이 발표되고 있으며, 2025년 7월 현재 11개 은행이 제시한 만기별 금리 중에서 상·하 각각 3개의 금리를 제외한 나머지 제시금리를 산술평균하여 산출된다. 코리보는 원칙적으로 매 영업일 오전 11시에 공표되고 당일 오후 3시 30분에 전국은행 연합회 홈페이지에 게재된다. 한편 코리보의 벤치마크였던 LIBOR의 경우 2023년 6월 이후 산출이 완전 중단되면서 SOFR(담보부 초단기 금리) 등 무위험지표금리(RFR)가 그 자리를 대체하고 있다. 코리보 역시 금리호가의 기초가 되는 은행간 무담보 기일물거래 가 미미하여 신뢰성이 낮아 일부 변동금리대출과 내부이전금리에서 제한적으로 활용되 고 있다.',
  },
  '콜론': {
    title: '콜론',
    content: '콜론(Call Loan)은 여유 자금을 가진 금융기관이 다른 기관에 초단기(보통 하루)로 자금 을 대여하는 행위를 말한다. 이 거래는 주로 은행, 증권사, 보험사 등 금융기관들 사이에 서만 이루어지며 일반 개인은 참여하지 않는다. 콜론은 ‘콜(call)’이라는 말처럼 언제든지 회수할 수 있는 자금이라는 특징이 있다. 이때 적용되는 이자율이 바로 콜금리(Call Rate) 이며 이는 금융시장의 단기 유동성을 반영하는 중요한 지표로 활용된다. 예를 들어, 콜금 리가 상승하면 시중에 자금이 부족하다는 신호로 해석되고, 반대로 하락하면 자금이 풍부 하다는 의미로 받아들여진다. 콜론은 단순한 대출이 아니라, 금융기관 간 신뢰를 바탕으 로 한 유동성 조절 수단이다. 예를 들어 A은행이 일시적으로 자금이 남고 B은행은 자금이 부족할 경우, A은행이 콜론을 통해 B은행에 자금을 빌려주는 식이다. 이처럼 콜론은 금융 시장의 원활한 자금 흐름을 유지하는 데 핵심적인 역할을 한다.',
  },
  '콜머니': {
    title: '콜머니',
    content: '콜머니(Call Money)는 콜론과 반대되는 개념으로 자금이 부족한 금융기관이 하루 또 는 이틀 정도의 초단기 자금을 다른 금융기관으로부터 빌리는 것을 말한다. 콜머니는 주 로 일일 자금의 부족분을 해소하기 위한 수단으로 사용된다. 예를 들어, 은행이 고객의 예금 인출 요청이 많아 일시적으로 자금이 부족할 경우, 콜머니를 통해 다른 은행으로부 터 자금을 빌려와 유동성을 확보할 수 있다. 이처럼 콜머니는 금융기관 간의 단기 자금 융 통 메커니즘으로 작동하며, 금융 시스템의 안정성을 유지하는 데 중요한 역할을 한다. 콜 거래에서 발생하는 이자율인 콜금리는 한국은행의 기준금리와 밀접한 연관이 있으며, 시 중금리 전반에 영향을 미친다. 한국은행 기준금리의 상향조정 등으로 콜금리가 오르면 대 출금리도 오르고, 예금금리도 상승하는 경향이 있다. 반대로 콜금리가 낮아지면 대출이 쉬워지고 시중에 자금이 풍부해져 경기 활성화에 도움이 될 수 있다. 콜머니는 단순한 하 루짜리 자금 거래처럼 보이지만 실제로는 금융시장의 체온계 역할을 한다. 콜금리의 급등 은 금융기관 간 신뢰 저하나 유동성 위기를 의미할 수 있고 반대로 안정적인 콜금리는 시 장이 원활히 작동하고 있다는 신호로 해석된다.',
  },
  '콜시장': {
    title: '콜시장',
    content: '콜(Call)시장은 금융기관들이 일시적인 자금 과부족을 조절하기 위하여 상호간에 초단기 로 자금을 차입하거나 대여하는 시장이다. 금융기관은 고객을 상대로 예금을 받고 대출 을 하는 과정에서 수시로 자금이 남기도 하고 모자라기도 하는데, 이러한 자금 과부족을 콜시장에서 금융기관 간 자금거래를 통하여 조절한다. 콜거래 만기는 최장 90일 이내에 서 일별로 정할 수 있으나, 금융기관의 일시적 자금 과부족을 조절하는 콜시장의 속성상 실제 거래에서는 익일물(1일물)이 대부분을 차지하고 있다. 콜거래의 최소 거래금액은 1 억원이며, 거래단위는 억원이다. 거래이율의 변동 단위는 0.01%이다. 콜거래는 계약체결 방식에 따라 중개거래와 직거래로 구분되는데 대부분의 거래는 중개거래로 이루어진다. 중개거래는 자금중개회사가 거래조건(이율, 만기, 금액 등)에 따라 자금의 공급자와 수 요자를 연결시켜 주는 거래이다. 지급준비제도 적용 대상 금융기관(은행)들이 지급준비 금 과부족을 주로 콜거래를 통해 조정하고 있다는 점에서 콜시장은 지준시장으로서의 의 미도 갖는다. 콜시장은 통화정책 수행에 있어서도 매우 중요한 위치를 차지하고 있다. 한 국은행 금융통화위원회가 결정하는 기준금리는 초단기금리인 콜금리를 통해 장단기 시 장금리, 예금 및 대출금리, 궁극적으로는 실물경제 활동에 파급되기 때문이다. 이에 따라 한국은행은 무담보 익일물 콜금리가 한국은행 기준금리 수준에서 크게 벗어나지 않도록 공개시장운영 등을 통해 유동성을 조절하고 있다.',
  },
  '콜옵션': {
    title: '콜옵션',
    content: '콜옵션(Call Option)이란 거래당사자들이 미리 정한 가격(행사가격, strike price)으로 장래의 특정 시점 또는 그 이전에 일정자산(기초자산)을 살 수 있는 권리를 매매하는 계 약이다. 거래대상이 되는 자산은 특정주식, 주가지수, 통화, 금리 등 매우 다양하다. 콜옵 션 매도자로부터 동 자산을 매입할 수 있는 권리가 콜옵션 매입자에게 부여되는 대신 콜 옵션 매입자는 콜옵션 매도자에게 그 대가인 프리미엄을 지급한다. 콜옵션 매입자는 현 재 가격이 행사가격보다 높은 경우 매입권리를 행사하여 대상자산을 매입하게 되며 현 재 가격이 행사가격보다 낮을 경우 매입권리를 포기하고 시장가격에 의해 대상자산을 매입한다. 이때 콜옵션 거래의 손익은 행사가격, 기초자산의 현재 가격 및 프리미엄에 의 해 결정된다.',
  },
  '크라우드펀딩': {
    title: '크라우드펀딩',
    content: '크라우드펀딩(Crowd Funding)은 온라인 플랫폼(중개업자)을 통해 다수의 개인들로부 터 자금을 조달하는 금융서비스이다. 이는 세 행위주체 즉, ① 아이디어 또는 프로젝트 기 획자(자금수요자) ② 아이디어를 지원·전파하는 다수의 개인 또는 집단(자금공급자) ③ 아 이디어를 실행하도록 이끄는 중개자 또는 조직(플랫폼)으로 이뤄진다. 부연하면 이는 자 금수요자가 은행 등 금융중개기관을 거치지 않고 직접 자금공급자를 모집하는 새로운 방 식의 자금조달 수단이며, 그 운용과정에서 빅데이터를 이용한 신용평가 등 디지털기술이 활용될 수 있다. 아이디어 기획자는 크라우드펀딩을 통해 자신의 평판을 높이고 해당 프 로젝트에 대한 마케팅 효과를 얻으며 참여자로부터 직접 피드백을 얻을 수도 있지만, 초 기단계인 아이디어의 공개로 자신의 지적재산권(IP)을 침해받을 수도 있다. 자금공급자 (투자)는 온라인 플랫폼을 통한 의사결정으로 거래·탐색비용을 줄일 수 있는 반면 상대 방의 프로젝트 진행상황에 대한 정보 부족이나 적절한 모니터링이 어려운 정보의 비대칭 (asymmetry) 리스크에 노출될 수도 있다. 크라우드펀딩은 자금모집 방식 및 목적에 따라 크게 후원(기부)형·대출형·투자(증권)형 등으로 구분된다. 후원(기부)형은 예술·복지 등의 분야에서 프로젝트에 자금을 후원하거나 단순하게 기부하는 형태이다. 대출형은 자금이 필요한 개인, 소규모 사업자 등에 소액 대출을 지원하는 유형으로 P2P대출처럼 대출금에 대한 이자수취가 목적이다. 투자(증권)형은 투자금액에 비례한 지분취득과 이익배당을 목 적으로 하며 창의적인 아이디어나 기술을 가진 창업기업 등이 초기 사업자금을 조달하는 데 유용하다.)',
  },
  '타행환공동망': {
    title: '타행환공동망',
    content: '타행환공동망은 금융공동망 중계센터인 금융결제원과 금융기관들의 전산시스템을 상호 연결하여 송금인과 수취인의 거래은행이 다르더라도 전국 어느 금융기관의 점포에서나 상호간 자금이체업무를 처리할 수 있게 한 시스템으로 1989년 12월 가동되었다. 동 시스 템의 가동으로 즉시 자금이체가 가능해짐에 따라 관련 업무가 신속화되고 금융서비스의 장소적 제약이 해소되어 대고객 서비스가 크게 향상되었다. 타행환공동망을 통하여 취급 가능한 업무로는 이체, 자기앞수표 조회, 수취조회 등이 있으며, 이용대상 예금은 당좌예 금, 보통예금, 저축예금, 기업자유예금, 신탁, 적금, 투자자예탁금 등이 있다.',
  },
  '탄소국경세(Carbon Border Adjustment Mechanism, CBAM)': {
    title: '탄소국경세(Carbon Border Adjustment Mechanism, CBAM)',
    content: 'CBAM은 EU 역외에서 생산돼 유럽연합(EU)로 수입되는 시멘트, 전기, 비료, 철·철강, 알 루미늄, 수소 등 6가지 품목 제품을 생산하는 과정에서 나오는 탄소배출 추정치를 계산 해 일종의 세금을 부과하는 제도이다. 관세수준은 정해진 탄소배출량 초과량에 대한 배출 권을 사고 파는 제도인 유럽연합 탄소배출권거래제를 가이드라인 삼아 책정된다. EU는 2026년부터 전면 시행할 예정이다.',
  },
  '탄소배출권': {
    title: '탄소배출권',
    content: '탄소배출권(Carbon Emission Permit)은 온실가스 감축을 유도하기 위한 대표적인 시장 기반 정책 수단이다. 이는 정부나 국제기구가 기업 또는 국가에 일정량의 탄소 배출 허용 량을 할당하고, 실제 배출량이 이보다 적으면 남는 배출권을 다른 주체에게 판매할 수 있 도록 허용하는 제도다. 반대로 배출량이 할당량을 초과하는 기업은 부족한 배출권을 시장 에서 구입해야 한다. 이러한 방식은 ‘배출권 거래제(ETS; Emissions Trading System)’의 핵심 메커니즘으로 작동한다. 배출권은 일종의 ‘환경 화폐’라고 볼 수 있으며, 희소성과 수요에 따라 시장 가격이 형성된다. 이를 통해 기업들은 온실가스를 줄이는 것이 경제적 으로 유리할 경우 감축 기술에 투자하게 되고, 반대로 비용이 높다고 판단하면 배출권을 구입하는 식으로 효율적인 선택을 하게 된다. 이러한 유연성은 규제만으로 달성하기 어 려운 온실가스 감축 목표를 보다 경제적으로 달성하게 해준다. 유럽연합(EU)이 운영하는 EU ETS는 세계 최대 규모의 배출권 시장이며, 우리나라도 2015년부터 세계에서 세 번째 로 큰 국가 단위 배출권 거래제를 시행 중이다. 정부는 매년 기업들에게 할당 계획에 따라 탄소배출권을 무상 또는 유상으로 배분하며, 기업들은 할당량 내에서 자율적으로 배출을 조절하거나 시장에서 거래할 수 있다.',
  },
  '탄소중립경제': {
    title: '탄소중립경제',
    content: '탄소중립은 대기중 온실가스 온도가 인간활동에 의해 더 증가되지 않도록 순배출량이 0 이 되도록 하는 것을 말한다. 특정 기간에 인간활동에 의한 온실가스 배출량이 전 기구적 흡수량과 균형을 이룰 때 탄소중립이 달성된다. 우리나라는 ‘기후위기 대응을 위한 탄소 중립·녹색성장 기본법(2022.3.25.)’을 제정하고 ‘2050 탄소중립 녹색성장위원회’를 설치 하여 탄소중립 및 국가 기후위기 등에 대처하고 있다.',
  },
  '탈세계화(De-globalization)': {
    title: '탈세계화(De-globalization)',
    content: '탈세계화는 세계화의 반대되는 개념으로, 세계 각국간의 상호교류와 협력이 줄어들고 자 국 중심적인 정책을 강화하는 현상을 말한다. 이는 정치, 경제, 사회, 문화 등 다양한 분야 에서 나타날 수 있으며, 보호무역주의 심화, 공급망 재편, 지역주의 강화 등으로 나타난다.',
  },
  '테이퍼링(Tapering)': {
    title: '테이퍼링(Tapering)',
    content: '미국은 2008년 9월 리먼브라더스 파산에 따른 금융위기 이후 큰 경기 후퇴를 겪게 되는 데 이를 대공황에 빗대어 대침체(great recession)라고 한다. 미국 중앙은행인 미 연준은 대침체에 빠진 미국경제를 회복시키기 위해서 정책금리를 거의 영(zero)에 가깝게 통화정 책을 운용하였다. 그러나 이러한 정책에도 불구하고 경기 진작효과가 기대에 미치지 못하 자 국채 및 MBS를 직접 매입(자산매입프로그램)하여 대차대조표를 확대함으로써 장기금 리를 낮추려는 정책을 시행하였는데 이를 양적완화정책(quantitative easing policy)이 라 한다. 2013년 5월 당시 벤 버냉키 미 연준 의장이 의회 증언에서 경제 여건 등을 고려 하여 향후 중앙은행이 자산매입 규모를 축소할 수 있다는 의견을 밝혔는데 이때 이후 자 산매입규모를 점차 줄여가는 정책을 양적완화 축소 또는 테이퍼링이라고 부른다. 당시 양 적완화축소를 실시할 수 있다는 발언에 미국 뿐 아니라 자본 유출이 우려되는 신흥국에서 도 금리가 큰 폭으로 오르고 주가가 하락하는 등 금융시장이 상당히 불안해졌었는데 그것 을 taper tantrum이라 한다. 이후에도 미 연준은 2020~2021년 코로나19 위기 대응 과 정에서 대규모 자산매입을 시행한 뒤, 2021년 11월부터 다시 자산매입 속도를 줄이는 테 이퍼링을 실시한 바 있다. 테이퍼링은 자산매입규모는 점차 줄어들지만 미 연준의 대차대 조표는 계속 확대된다는 측면에서 대차대조표 자체의 축소(보유자산 매각, 만기도래 채권 의 재투자 축소 등)와는 구별된다.',
  },
  '테일러 준칙(Taylor’s Rule)': {
    title: '테일러 준칙(Taylor’s Rule)',
    content: '테일러 준칙(Taylor’s Rule)이란 1993년 미국 경제학자인 존 테일러(John Taylor) 가 제안한 금리준칙으로 중앙은행이 거시경제 안정을 달성하기 위해 물가변동뿐만 아니라 산출변동에도 금리가 조정되도록 한 금리준칙을 말한다. 즉, 주어진 실질중 립금리, 물가갭, GDP갭 등을 고려한 적정 정책금리 수준을 의미하는데 준칙금리는 it = rt * + t + 0.5(t - t *) + 0.5yt(it: 준칙금리, rt *: 실질중립금리, t: 물가상승률, t *: 물가목표, yt: GDP갭률)의 공식으로 산출된다. 이 준칙에 의하면 중앙은행의 단기목 표금리는 물가갭(실제 인플레이션율 - 목표 인플레이션율)과 GDP갭을 고려하여 각각 0.5의 가중치를 두고 결정된다는 것이다. 그래서 중앙은행은 현재 인플레이션율이 목표 인플레이션율보다 높은 경우 금리를 올리고 반대의 경우 금리를 내리며, 실제GDP가 잠 재GDP보다 높으면 금리를 올리고 반대에는 금리를 내리게 된다. 그러나 대부분의 중앙 은행은 테일러 준칙에 따라 통화정책을 수행하기 보다는 이를 하나의 참고지표로 간주하 고 있다. 그 이유는 다음과 같다. 이 세상에 완전한 경제모형은 존재하지 않으므로 물가갭 과 GDP갭을 정확히 알 수 없다는 것이다. 또한 경제는 시시각각으로 변하기 때문에 계수 값이 항상 0.5로 고정되어 있지도 않다. 끝으로 이들 값을 확실히 알고 있다 하더라도 통 화정책은 경제에 영향을 미치는 데 상당한 시차가 존재하며 금융안정과 같은 책무에도 기 여해야 하기 때문에 테일러가 제시한 물가갭과 GDP갭 뿐만 아니라 더 많은 정보와 요소 가 통화정책 수행시 고려되어야 하기 때문이다.',
  },
  '텔레뱅킹(폰뱅킹)': {
    title: '텔레뱅킹(폰뱅킹)',
    content: '텔레뱅킹(폰뱅킹)은 고객이 은행창구에 나가지 않고 가정이나 사무실 등에서 전자식 전 화기를 통하여 자동응답 서비스를 이용하거나 은행직원과 통화함으로써 자금이체, 조회, 분실신고 및 FAX 통지 등을 할 수 있는 서비스이다. 금융기관의 입장에서는 과도한 인력 관리에 따른 비용을 절감할 수 있는 효과가 있으며 고객의 입장에서는 거래시간의 제한 이 없다는 장점이 있다. 최근에는 스마트폰으로 은행업무를 처리하는 모바일뱅킹이나 인 터넷으로 하는 인터넷뱅킹 등의 서비스가 널리 이용되고 있다. 텔레뱅킹을 통해 제공되고 있는 서비스에는 예금조회, 계좌이체, 예·적금의 신규·해지, 공과금 납부, 사고신고 및 각 종 상담서비스 등이 있다.',
  },
  '토빈세(Tobin Tax)': {
    title: '토빈세(Tobin Tax)',
    content: '미국 예일대학교의 제임스 토빈(James Tobin) 교수가 1978년에 주장한 것으로 국제 투 기자본(핫머니)의 급격한 자금유출입으로 각국의 통화가치가 급등락하여 통화위기가 촉 발되는 것을 막기 위한 국경 간 자본이동 규제방안의 하나이다. 토빈은 단기성 외환거래 에 세금을 부과할 경우 연간 수천억 달러의 자금을 확보할 수 있다고 주장하였는데, 이 제 도는 일반 무역거래, 장기 자본거래, 그리고 실물경제에는 지장을 주지 않으면서 투기성 자본에만 제약을 가한다는 장점이 특징이다. 1990년대 후반부터 핫머니가 세계적으로 문 제화됨에 따라 1995년 미국의 반대에도 불구하고 선진 7개국 정상회의(G7)의 의제로 상 정되었으며, G7은 산하에 연구그룹을 만들어 토빈세의 효과를 검토하기도 하였다. 또한 일부 유럽 국가들을 중심으로 토빈세 도입 움직임이 있었으나 순수한 의미의 ‘외환거래 세’를 안정적으로 장기 시행한 국가는 사실상 없다고 할 수 있다. 하지만 토빈세의 목적과 유사하게 단기투기성 자본의 이동을 억제하기 위한 제도는 유럽, 남미, 아시아 일부 국가 등에서 아직도 다양한 형태로 시행되고 있다.',
  },
  '통상임금': {
    title: '통상임금',
    content: '통상임금은 근로자에게 소정근로의 대가로서 정기적·일률적으로 지급되는 임금을 의미 하며, 우리나라 근로기준법상 매우 중요한 개념이다. 통상임금은 연장근로수당, 야간근로 수당, 휴일근로수당, 연차휴가수당 등 각종 수당의 계산 기준이 되는 금액으로, 근로자의 임금 중 법적 보호 범위에 포함되는 핵심 요소다. 통상임금에는 기본급 외에 정기상여금, 직무수당과 직책수당, 기술수당, 면허수당 등 사업주가 정기적으로 근로자 모두에게 추가 조건없이 지급하는 임금이 모두 포함되지만 연월차수당, 연장근로수당 등과 같이 근로실 적에 따라 변동 지급되는 임금은 포함되지 않는다.',
  },
  '통합발행제도': {
    title: '통합발행제도',
    content: '통합발행제도(Fungible Issue 또는 Reopening Issue)란 일정기간(3개월, 6개월, 1년 등) 동안 계속해서 발행하는 채권의 표면금리와 만기 등 발행조건을 일치시켜 그 기간 동안 발행한 채권을 동일한 채권으로 만드는 제도이다. 예를 들어 1년 동안 매주 채권을 발행 한다고 가정할 경우, 통합발행제도가 없다면 총 48개(4x12개월)의 종목이 발생하나 3개 월을 통합발행기간으로 할 경우에는 4종목(각각 3개월 동안 12번[4x3개월] 발행되는 채 권은 동일한 채권이므로)으로 줄어들게 된다. 이처럼 통합발행제도는 유통되는 채권의 종 목 수를 획기적으로 줄여 유통시장에서 종목당 채권의 유동성을 높이는 효과가 있다. 특 히 채권을 장기로 발행할수록, 정례적이고 지속적으로 발행할수록 동 제도를 통해 수요를 증진하고 발행 비용을 절감할 수 있다. 현재 국채, 통화안정증권 등이 통합발행제도를 도 입·운영하고 있다.',
  },
  '통화스왑': {
    title: '통화스왑',
    content: '통화스왑이란 외환스왑과 마찬가지로 거래당사자 간에 서로 다른 통화를 교환하고 일 정기간 후 원금을 재교환하기로 약정하는 거래를 말한다. 통화스왑도 자금 대차거래라 는 점에서는 외환스왑과 비슷하나 이자지급 방법과 계약기간에 차이가 있다. 외환스왑 은 주로 1년 이하의 단기자금 조달 및 환리스크 헤지 수단으로 이용되는 반면 통화스왑 은 주로 1년 이상의 중장기 환리스크 및 금리리스크 헤지 수단으로 이용된다. 이자지 급 방법에 있어서도 외환스왑은 스왑기간 중 해당통화에 대해 이자를 교환하지 않고 만 기 시점에 양 통화 간 금리차이를 반영한 환율(계약시점의 선물환율)로 원금을 재교환하 나, 통화스왑은 계약기간 중 이자(매 6개월 또는 매 3개월)를 교환하고 만기 시점에 처음 원금을 교환했을 때 적용했던 환율로 다시 원금을 교환한다. 통화스왑의 거래과정을 예 를 들어 살펴보면 A은행이 B은행과 현물환율 1,200원에 미 달러화 1천만 달러를 지급 하고 원화를 수취한 후 만기 시점에 원금을 재교환하는 통화스왑계약을 하였다고 하자. 거래 시점에 A은행은 B은행에 1천만 달러를 지급하는 대가로 원화 120억 원(=1,200원× 1천만 달러)을 수취한다. 이후 계약기간 중 원화금리를 지급하고 미 달러화 금리를 수취 하게 되며 만기 시점에 A은행은 B은행으로부터 1천만 달러를 돌려받고 원화 120억 원 을 상환함으로써 거래가 종료된다. 통화스왑은 보유외화자산의 수익률을 높이거나, 외 화자금 조달 시 차입자가 각각 유리한 국제금융시장에서 기채한 후 필요한 통화로 교환 함으로써 차입비용을 절감하거나, 장기차입에 따른 환율 및 금리변동 리스크를 회피하 는 등의 목적으로 이용된다.',
  },
  '통화승수': {
    title: '통화승수',
    content: '중앙은행이 공급한 본원통화는 예금은행의 신용창출과정을 통해 이의 수 배에 달하는 통 화를 시중에 유통하게 한다. 통화승수(Money Multiplier)는 본원통화 한 단위가 이의 몇 배에 달하는 통화를 창출하였는가를 나타내는 지표로서 통화 총량을 본원통화로 나누 어 산출한다. 통화승수는 현금통화 비율과 지급준비율에 의하여 결정되는데 현금통화 비 율은 단기적으로는 안정적이라 할 수 있으며 지급준비율은 중앙은행에 의하여 정책적으 로 결정된다. M(통화) = RB(본원통화) × k(통화승수), k = 1/{c+(1-c)r} (단 c는 현금통화 비율, r은 지급준비율). 참고로 2025년 3월 말 현재 우리나라의 본원통화 잔액(말잔기준)은 290조원이고, M1, M2, Lf, L의 잔액은 각각 1,308조원, 4,228조원, 5,760조원, 7,250조원으로 통화승수는 각각 4.51배, 14.59배, 19.88배, 25.01배를 기록하고 있다. 한편 동 승수의 장기추세를 보면 우리나라의 경우 대략 2008년 글로벌 금융위기 이후 각 통화승수가 장기적으로 낮 아지는 모습을 보이고 있다.',
  },
  '통화신용정책보고서': {
    title: '통화신용정책보고서',
    content: '통화신용정책보고서는 한국은행이 통화신용정책 결정 내용과 배경, 향후 통화정책방향 등을 종합적으로 정리해 국회에 정기적으로 제출하는 법정 보고서로, 한국은행법 제96조 에 따라 연 2회 작성하고 있다. 동 보고서는 통화정책의 투명성과 책임성, 예측 가능성을 높이기 위한 핵심 수단으로 활용된다. 동 보고서는 국내외 경제 상황, 물가 흐름, 금융·외 환시장 동향 등을 분석하여 통화정책 결정의 배경을 설명한다. 또한 기준금리 결정의 근 거와 그에 따른 정책 기조, 금융중개지원대출 등 유동성 공급 수단의 운용 현황, 향후 정 책 방향에 대한 전망과 함께 서술 대상 기간의 주요 경제 현안에 대한 심층 분석도 포함하 고 있다. 통화신용정책보고서는 단순한 정책 결과 보고를 넘어, 한국은행이 경제를 어떻 게 진단하고 어떤 철학과 전략으로 대응하고 있는지를 보여주는 중요한 정책 커뮤니케이 션 수단이다. 각 경제주체들은 통화신용정책보고서를 통해 한국은행의 통화신용정책 운 영 상황을 보다 잘 이해하고, 향후 정책방향에 대해 합리적인 기대를 형성해 나갈 수 있 다. 보고서는 한국은행 홈페이지에서 누구나 열람할 수 있으며, 주요 내용은 기자설명회 및 동영상 등을 통해서도 공유된다.',
  },
  '통화안정계정': {
    title: '통화안정계정',
    content: '통화안정계정은 금융시장 유동성 조절을 위한 일종의 기한부 예금(term deposit)이다. 동 계정은 국외부문 등으로부터의 과잉유동성을 흡수하기 위해 강제예치방식으로 활용되다 가 1990년대 이후 금융시장의 발달, 환매조건부증권매매(RP) 등 시장친화적인 공개시장 운영수단의 정착 등으로 그 활용도가 낮아졌다. 그러나 한국은행은 RP매각에 필요한 담 보증권 확보의 한계, 통화안정증권 발행 누증에 따른 이자부담 증가 등에 대응하여 2010 년 10월 통화안정계정을 재도입하였는데, 운용방식에 있어 종전의 강제예치가 아닌 경쟁 입찰 방식으로 변경하였다. 통화안정계정은 RP매각과 달리 담보 없이도 단기유동성을 효 과적으로 흡수할 수 있으며, 주로 28일물로 운용되고 있다.',
  },
  '통화안정증권': {
    title: '통화안정증권',
    content: '통화안정증권은 「한국은행법」 제69조 및 「한국은행 통화안정증권법」에 따라 한국은행 이 유동성 조절을 목적으로 발행하는 채무증서이다. 통화안정증권은 환매조건부증권매매 (RP) 및 통화안정계정 예치와 함께 한국은행의 주요 공개시장운영수단으로 활용된다. 여 기서 통화안정계정은 경쟁입찰방식의 기간부예금(term deposit)으로 유동성조절 수단 을 다양화하기 위하여 ‘시장친화적 방식의 통화안정계정’의 형태로 2010년 10월 도입되 었다. 한국은행은 경상수지 흑자 또는 외국인투자자금 유입 등으로 시중의 유동성이 증 가하여 이를 기조적으로 환수할 필요가 있을 경우 통화안정증권을 순발행하여 유동성을 흡수한다. 통화안정증권은 환매조건부증권매매와 통화안정계정과 같은 여타 공개시장 운영수단에 비해 만기가 길어 정책효과가 오래 지속되기 때문에 기조적 유동성 조절수단 (structural adjustment)으로 활용된다. 통화안정증권은 공모 또는 상대매출 방식으로 발 행된다. 통화안정증권의 만기는 3년 이내이며, 할인채 및 이표채로 구성된다. 할인채는 할인방식으로 발행되어 만기일에 액면금액이 지급되며, 이표채는 이표지급방식으로 발행 되어 발행일로부터 3개월마다 이자를 지급하고 만기일에 액면금액을 지급한다.',
  },
  '통화유통속도': {
    title: '통화유통속도',
    content: '통화유통속도(Velocity of Circulation of Money)는 통화 한 단위가 일정 기간(통상 1년) 동안 각종 거래를 매개하기 위해 몇 번 유통되었는지를 나타내는 지표를 말한다. 그런데 국민경제 전체의 거래규모를 측정할 수는 없으므로 소득이 거래액과 유사하게 변동한다 는 가정하에 연간 국민소득을 통화량으로 나눈 소득유통속도를 사용하는 것이 일반적이 다. 통화유통속도는 장기적으로는 생산의 우회도, 경제주체의 거래관습 등 경제 구조적인 원인에 의해 결정된다. 반면 단기적으로는 통화보유의 기회비용에 영향을 미치는 시장금 리, 예상물가상승률의 변화, 경기 변동 등 거시적 요인과 금융상품 관련 제도변화나 금융 혁신 등 금융여건 변화에 따라 변동하기도 한다.',
  },
  '통화정책수단': {
    title: '통화정책수단',
    content: '중앙은행이 활용하고 있는 통화정책 수단으로는 지급준비제도, 공개시장운영, 중앙은행 여수신제도 등을 들 수 있다. 지급준비제도란 금융기관으로 하여금 예금 등과 같은 금융 기관 부채의 일정 비율에 해당하는 금액을 중앙은행에 예치하도록 의무화하는 제도이다. 지급준비율을 변경하여 본원통화를 조절하면 승수효과를 통해 통화량에 영향을 주므로 중앙은행은 지급준비제도를 통해 기조적인 유동성을 조절할 수 있다. 공개시장운영은 중 앙은행이 단기금융시장이나 채권시장과 같은 공개시장에서 금융기관을 상대로 국공채 등 증권을 매매하여 시중에 유통되는 화폐의 양이나 금리 수준에 영향을 미치는 대표적인 통 화정책 수단이다. 중앙은행 여수신제도는 중앙은행이 개별 금융기관과의 대출 및 예금거 래를 통해 자금의 수급을 조절하는 정책수단을 말한다. 이와 같은 통화정책 수단은 금융 시장을 매개로 수행되므로 시장 친화적 정책수단이라고 할 수 있다. 한편 일부 중앙은행 의 경우 정책당국에 부여된 행정적 권한을 통해 은행 여수신금리를 직접 규제하거나 은행 대출규모를 일일이 통제하는 등과 같은 직접조절수단을 활용하기도 한다.',
  },
  '통화정책 운영체제(Monetary Policy Regime)': {
    title: '통화정책 운영체제(Monetary Policy Regime)',
    content: '중앙은행은 역사적으로 경제구조의 변화, 금융시장의 발달 정도 등에 따라 다른 형태 의 통화정책 운영체제를 도입해 왔다. 통화정책 운영체제는 명목기준지표(nominal anchor)를 기준으로 구분하는 것이 일반적이다. 이는 통화정책체계의 구성요소 중에 서 최종목표나 정책수단 등은 어느 나라에 있어서나 본질적으로 비슷하며 차이가 있다 고 하더라도 대개 정도의 문제라 할 수 있지만, 통화정책 수행에 있어 어떤 명목기준지표 가 적합한지는 각국의 경제구조와 금융시장 발달 정도 등에 따라 달라지므로 상당히 큰 차별성을 갖기 때문이다. 여기서 명목기준지표란 중앙은행이 최종목표와 연관성이 높다 고 생각하여 중점 관리하는 명목변수를 의미한다. 통화정책 운영체제는 명목기준지표를 통화량, 환율, 물가상승률 중 어느 것으로 하는지에 따라 각각 통화량목표제(monetary targeting), 환율목표제(exchange rate targeting), 물가안정목표제(inflation targeting) 로 나뉘어진다. 일각에서는 기존 통화정책 운영체제의 대안으로 명목GDP목표제 (nominal GDP targeting) 등과 관련한 논의도 이루어지고 있다.',
  },
  '통화정책체계(Monetary Policy Framework)': {
    title: '통화정책체계(Monetary Policy Framework)',
    content: '중앙은행은 통화정책을 수행함에 있어 정책수단과 최종목표(물가안정, 금융안정 등)를 이 어줄 수 있는 다양한 지표를 활용하는 것이 일반적이다. 우선 중앙은행은 통화정책의 최 종목표와 밀접한 관계가 있는 통화량, 환율, 물가상승률 등의 지표 중에 하나를 선택하여 그 지표의 목표 수준을 결정한 다음, 이를 달성할 수 있도록 통화정책을 수행한다. 이렇게 선택된 지표를 명목기준지표(nominal anchor)라고 하며 이중 물가상승률을 제외한 통 화량, 환율 등은 최종목표를 달성하기 위한 중간목표(intermediate target)로 활용된다. 그러나 통화량, 환율 등도 중앙은행이 직접 제어할 수 있는 지표가 아니다. 따라서 중앙은 행이 다른 변수의 영향을 받지 않고 직접 제어하여 원하는 수준을 유지할 수 있는 지표가 필요한데 이를 운용목표(operating target)라고 하며 일반적으로 단기시장금리나 지급준 비금이 사용된다. 중앙은행은 이러한 운용목표의 적정 수준을 설정하고 공개시장운영, 중 앙은행 여수신제도, 지급준비제도 등의 정책수단(policy tool)을 활용하여 동 수준을 유지 함으로써 궁극적으로 최종목표를 달성하기 위해 노력한다. 한편 통화정책의 결정과 집행 에는 이를 뒷받침할 수 있는 제도가 필요한데 의사결정 및 집행기구, 외부압력으로부터의 독립성 확보장치, 정책수행 결과에 대한 책임성 제고방안, 그리고 통화정책의 신뢰성과 유 효성 확보를 위한 투명성 증대 장치 등이 이에 포함된다. 이와 같은 최종목표, 명목기준지 표, 운용목표, 정책수단, 의사결정 관련 제도 등을 모두 포괄하여 통화정책체계라고 한다.',
  },
  '통화정책 커뮤니케이션': {
    title: '통화정책 커뮤니케이션',
    content: '통화정책 커뮤니케이션이란 중앙은행이 통화정책 수행과정에서 가계, 기업, 정부 등 경 제주체 및 시장과 행하는 일련의 소통행위를 말한다. 여기서 통화정책과 관련된 커뮤니 케이션은 단순히 통화정책 관련 정보에 국한된 것이 아니라 시장의 경기인식, 경제주체 들의 통화정책에 대한 반응, 정부와의 정보 및 의견 공유 등 피드백 과정을 모두 포함한다. 1980년대 후반 이후 금융시장의 규모가 커지고 금융기관과 금융상품이 다양해지면서 통 화정책의 유효성 저하에 대한 우려가 증대됨에 따라 중앙은행은 통화정책의 내용과 의 도를 분명하게 알려 시장 참가자들이 정책의도대로 움직이도록 유도할 필요가 있었다. 1990년대 들어 물가안정목표제를 도입한 중앙은행이 늘어나기 시작하면서 중앙은행의 통화정책 커뮤니케이션은 더욱 강화되었다. 물가안정목표제에서는 중앙은행이 물가상승 목표를 사전에 명시적으로 제시하고 중간목표 없이 경제주체의 인플레이션 기대를 유도 함으로써 목표를 달성하고자 하기 때문이다. 한국은행은 금융통화위원회가 통화정책방향 결정회의에서 통화정책방향을 심의·의결한 후 통화정책방향 의결문을 즉시 공표하고 있 으며 한국은행 총재가 기자회견을 통해 정책결정 내용 및 배경에 대해 상세히 설명한다. 아울러 통화정책 심의과정에서 토의한 내용을 의사록에 충실히 기록한 후, 일정 기간이 지나 공개하고 있다. 또한 총재를 비롯한 금융통화위원 등은 연설, 강연, 인터뷰, 학술대 회 참석 등을 통해 통화정책의 현안이나 향후 정책방향 등에 대하여 국민에게 알리고 있 으며, 국회에 대해서도 ‘통화신용정책보고서’와 ‘금융안정보고서’를 각각 연 2회 작성하 여 제출함으로써 설명책임(accountability)을 다하고 있다.',
  },
  '통화정책 파급경로': {
    title: '통화정책 파급경로',
    content: '통화정책이 실물경제에 파급되는 경로에는 금리경로, 자산가격경로, 환율경로, 기대경로, 신용경로, 위험선호경로 등이 있다. 금리경로는 중앙은행이 정책금리를 인하하면 단기시 장금리와 함께 장기시장금리, 은행 여수신금리도 하락하여 기업투자와 가계소비가 늘어 나고 이는 생산 증대 및 물가 상승으로 이어진다. 자산가격경로의 경우 중앙은행이 정책금 리를 인하하면 주식, 부동산 등 자산의 가격이 상승하고, 이에 따라 부(富)가 증가(wealth effect) 하면서 투자와 소비가 늘어나게 되고 이는 생산 증대 및 물가 상승으로 이어진다. 환율경로의 경우 중앙은행이 정책금리를 인하하면 국내금리가 하락하고 원화로 표시된 금 융자산의 수익률이 떨어지게 되어 경제주체들이 상대적으로 수익률이 높은 달러화 표시 금융자산을 매입하고자 하게 되며 이 과정에서 원화를 팔고 달러를 사게 된다. 이때 달러 화에 대한 초과수요로 원화가치가 하락(환율 상승)하면 수출이 증가하고 수입이 감소하여 경상수지가 개선되고 환율 변화가 수입품 가격에 반영되어 물가상승압력으로 작용한다. 기대경로의 경우 중앙은행이 현 시점에서의 정책금리 조정뿐만 아니라 경제주체들의 미 래 통화정책에 대한 기대, 경기전망 및 인플레이션 기대를 변화시킴으로써 소비 및 투자 결정과 물가에 영향을 미치는 것을 말한다. 신용경로의 경우 중앙은행이 정책금리를 인하 하면 기업과 가계에 대한 금융기관의 대출여력이 커져 투자가 증가하고 소비가 늘어나며 이는 생산 증대 및 물가 상승으로 이어진다. 한편 위험선호경로의 경우 완화적 통화정책은 금융기관의 위험선호도를 증대시키게 되며 이로 인해 고위험·고수익 대출 등을 중심으로 신용공급이 확대되면서 소비, 투자 등이 늘어나게 된다. 동 경로는 저금리 기조가 장기간 지속될 경우 금융기관의 과도한 위험추구와 신용공급 확대로 이어지면서 경제 내 금융취 약성이 커질 수 있다는 점에서 통화정책과 금융안정의 연관성을 보여주고 있다.',
  },
  '통화지표': {
    title: '통화지표',
    content: '한 나라의 경제가 건강하게 유지되려면 경제규모에 맞는 적정량의 통화가 필요하다. 경 제규모에 비해 돈이 너무 많으면 인플레이션이, 너무 적으면 디플레이션이 발생하여 물 가의 지속적 상승이나 실업 등의 문제가 발생하기 때문에 중앙은행은 경제에서 유통되는 화폐의 양을 적정 수준으로 관리해야 하는데 그러기 위해서는 우선 시중에서 유통되는 통화의 양을 정확하게 측정할 필요가 있다. 시중에 유통되고 있는 통화량을 나타내는 척 도가 곧 통화지표이다. 통화지표는 통화를 어떻게 정의하는가에 따라 여러 가지가 있는 데 우리나라에서는 M1과 M2를 통화지표로, Lf와 L을 유동성지표로 이용하고 있다. M1 은 화폐의 지급결제수단으로서의 기능을 중시한 지표로 시중에 유통되는 현금에 예금취 급기관의 결제성예금을 더한 것이다. M2는 M1에 예금취급기관의 각종 저축성예금, 시 장성 금융상품, 실적배당형 금융상품, 금융채 및 거주자예금을 더한 것이다. 통화지표보 다 포괄범위가 더 넓은 지표가 유동성지표인데 Lf는 M2에 예금취급기관의 만기 2년 이 상의 정기예적금, 금융채, 금전신탁과 생명보험회사의 보험계약준비금 및 증권금융의 예수금 등을 포함한다. L은 Lf에 기업 및 정부 등이 발행한 기업어음, 회사채 및 국공채 등 유가증권을 포함한다. 한국은행은 외환위기 이전까지는 M2를 명목기준지표(target) 로 하여 그 증가율을 정하고 이를 달성하고자 하는 통화량목표제를 시행하였다. 그러나 1990년대 후반부터 새로운 금융상품의 출현, 금융시장의 발전 등으로 통화량과 실물변 수간의 관계가 약화됨에 따라 한국은행은 여건 변화에 부합하는 새로운 통화정책 운용체 계인 물가안정목표제를 1998년 도입하여 지금까지 운영하고 있다. 물가안정목표제 도입 이후 통화량은 달성해야 하는 명목기준지표가 아니고 물가 및 경기 전망 등을 평가하는 정보변수로서 활용되고 있다.',
  },
  '투입계수': {
    title: '투입계수',
    content: '각 산업부문이 재화나 서비스의 생산에 사용하기 위하여 다른 산업으로부터 구매한 원재 료, 연료 등 중간재별 투입액을 총투입액으로 나눈 것으로서 각 부문 생산물 1단위 생산 에 필요한 중간재들의 단위를 나타낸다. 따라서 어떤 산업부문의 중간재 투입계수들을 모 두 합하면 중간투입률이 되며 이와 같은 투입계수는 각 산업부문의 생산활동에서 생산기 술구조, 즉 투입과 산출의 함수관계를 나타낸다고 할 수 있다. 한편, 투입계수를 산출함에 있어서는 물량단위에 의한 방법이 이상적이라고 할 수 있으나 모든 생산물의 공통적인 단 위가 없으므로 금액에 의한 투입계수를 산출하는 것이 일반적인 방법이다.',
  },
  '투자율': {
    title: '투자율',
    content: '투자율이란 일정 기간 동안 국민경제가 생산한 생산물 또는 수취한 소득에 대한 투자의 비율을 의미하는 것으로 투자액을 국민총처분가능소득으로 나누어 구한다. 총투자는 투 자대상지역에 따라 국내총투자와 국외투자로 나누어지고 이들 국내총투자와 국외투자를 합한 총투자는 총저축과 일치하게 되며 이를 각각 국민총처분가능소득으로 나누어 백분 율로 구한 값을 국내총투자율, 국외투자율, 총저축률이라고 한다. 이들 간에는 다음과 같 은 관계가 성립한다. 총저축률 = 총투자율 = 국내총투자율 + 국외투자율',
  },
  '트리핀 딜레마(Triffin’s Dilemma)': {
    title: '트리핀 딜레마(Triffin’s Dilemma)',
    content: '트리핀 딜레마(Triffin’s Dilemma)는 예일대 교수 로버트 트리핀(Robert Triffin)이 1960년대 미국의 무역수지 적자가 심화되는 상황을 설명하면서 제기한 개념으로, 기축통 화가 안고 있는 구조적 모순을 뜻한다. 1944년 출범한 브레튼우즈(Bretton Woods) 체제 는 금 대신 달러화를 국제결제의 기축통화로 삼고, 금 1온스를 35달러로 고정하여 태환할 수 있도록 한 제도였다. 그러나 달러가 기축통화로 기능하기 위해서는 국제거래에서 지속 적으로 적자를 내며 전 세계에 달러 유동성을 공급해야 한다. 반대로 미국이 흑자를 유지 하면 달러 가치는 안정되지만 국제무역과 자본거래에 필요한 유동성이 부족해진다. 이처 럼 기축통화국이 적자를 내면 신뢰가 흔들리고, 흑자를 내면 세계 유동성이 위축되는 상 충관계를 가리켜 트리핀 딜레마라 한다.',
  },
  '특별인출권(SDR)': {
    title: '특별인출권(SDR)',
    content: '1968년 4월 국제통화기금(IMF) 이사회의 결의에 따라 국제유동성 부족에 대처하기 위 하여 1970년 도입된 일종의 국제준비통화이다. 1960년대 들어 미 달러화의 금태환에 대 한 신뢰가 저하되면서 국제통화체제의 불안정이 초래되자 새로운 준비자산의 필요성이 대두되었다. 이에 대응하여 IMF가 1967년 SDR(Special Drawing Rights) 창출요강을 채택하고 이를 반영한 IMF 협정문 개정안을 1969년 7월 발효시킴에 따라 도입되었 다. SDR의 가치는 도입 당시 미 달러화의 금 평가와 동일한 1SDR=1.2635달러= 금 0.888671그램(1/35온스)으로 설정되었으나 이후 미 달러화의 약세 지속으로 SDR의 가 치를 미 달러화에 고정시키는 것이 불합리하게 되었다. 이러한 문제점을 시정하기 위해 1974년부터 SDR의 가치를 여러 나라의 통화에 연결시키는 바스켓방식을 도입하였으며 현재는 미 달러화, 유로화, 파운드화, 엔화, 위안화의 5개 통화가 바스켓을 구성하고 있다. SDR의 도입에 따라 IMF 회원국은 국제수지가 악화하였을 때 IMF로부터 무담보로 국제 유동성을 인출할 수 있는 권리를 보유하게 되었다. SDR은 IMF 총회의 의결을 통해 창출 또는 말소되며, 창출된 SDR은 SDR에 관한 의무사항을 수락한 IMF 회원국에 배분된다. SDR의 배분은 IMF 쿼타 비중에 따라 배분하는 일반배분과 쿼타 비중과 상관없이 배분하 는 특별배분으로 구분된다. 우리나라에 대한 SDR 누적배분액은 2009년 실시된 일반 및 특별배분에 따라 이전의 0.7억SDR에서 24억SDR로 증가하였으며 2021년 역대 최대 규 모의 SDR 일반배분으로 82억 SDR을 추가로 배분받으면서 총 106억 SDR이 되었다.',
  },
  '특수목적기구(SPV)': {
    title: '특수목적기구(SPV)',
    content: '자산유동화증권(ABS; Asset-Backed Securities) 발행에는 자산보유자, 특수목적기구 (SPV), 자산관리자 및 신용평가기관 등이 참가하게 된다. 이 경우 자산보유자는 기초자산 의 법률적인 소유권을 SPV(Special Purpose Vehicle)에 양도하는 절차를 거치게 되는데 이는 자산보유자와 기초자산간의 법률적 관계를 분리하기 위한 것이다. 자산보유자는 기 초자산을 모아서(pooling) 이를 SPV에 양도하며 SPV는 양도받은 기초자산을 담보로 발 행한 ABS를 투자자에게 매각하고 매각대금을 자산보유자에게 자산양도의 대가로 지급한 다. 현행 「자산유동화에 관한 법률」에 따르면 자산보유자는 금융기관, 한국자산관리공사, 한국토지주택공사 및 금융위원회가 인정한 법인 등이 될 수 있으며 특수목적기구(SPV) 는 유동화전문회사(SPC; Special Purpose Company), 신탁회사 및 자산유동화를 전문 으로 하는 외국법인이 될 수 있다. 동 법률에 따른 SPC는 주식회사보다 설립이 간편한 유 한회사의 형태로 설립되며 ABS의 발행 및 상환과 이에 부속된 업무만을 수행할 수 있다. SPC는 ABS를 한 번만 발행할 수 있기 때문에 자산보유자는 자산유동화를 실시할 때마다 별도의 SPC를 설립하여야 한다. 한편 신탁회사는 수익증권 형태의 ABS를 발행하는 경우 SPV로 활용된다. 즉 자산보유자가 신탁회사에 기초자산을 양도하면 이 자산으로부터 발 생하는 현금흐름을 이용하여 원리금을 지급하는 수익증권을 발행하게 된다. 자산관리자 는 실체가 없는 서류상의 회사인 SPC를 대신하여 기초자산에 대한 채권의 추심 또는 채 무자 관리 등을 담당한다. 우리나라에서는 자산보유자, 신용정보업자 등이 자산관리자가 될 수 있는데 일반적으로 기초자산의 내용을 잘 파악하고 있는 자산보유자가 자산관리자 가 된다.',
  },
  '파레토최적': {
    title: '파레토최적',
    content: '경제적 최적의 의미를 규정하는 개념의 하나이다. 자원배분이 가장 효율적으로 이루어진 상태여서 더 이상의 개선 여지가 없는 상황을 의미한다. 생산 측면에서는 어느 한 재화의 생산량을 증가시키기 위해서는 반드시 다른 재화의 생산을 감소시켜야 하는 상태에 있어 야 한다. 교환 측면에서는 어느 소비자의 효용을 증가시키기 위해서는 반드시 다른 소비 자의 효용을 감소시킬 수밖에 없는 상태에 있어야 한다. 이 두 가지 조건이 동시에 성립하 고 있는 상황을 파레토 최적이라 한다. 그러나 파레토 최적은 소득분배에 대해서는 설명 을 할 수 없으며, 파레토 최적의 상태 또한 유일하지 않다는 한계를 내포하고 있다.',
  },
  '파생금융상품': {
    title: '파생금융상품',
    content: '파생금융상품(Financial Derivatives)은 그 가치가 통화, 채권, 주식 등과 같은 기초금융 자산(underlying asset)의 가치변동에 의해 결정되는 금융상품을 말한다. 계약형태에 따 라 크게 선도계약(forward contracts), 선물(futures), 옵션(options), 스왑(swaps) 등으 로 구분된다. 계약형태별 파생금융상품의 특징을 보면, 먼저 선도계약과 선물은 기초금융 자산을 미래 특정시점에 사고 팔기로 약정하는 계약이라는 점에서 동일한 성격을 가지나, 일반적으로 선도계약은 장외시장에서 거래당사자간에 직접 거래되거나 딜러나 브로커를 통해 거래가 이루어지는 데 반해, 선물은 정형화된 거래소를 통해 거래된다는 점 등에서 차이가 있다. 옵션은 기초자산을 미래의 특정시점에 특정 행사가격으로 매입(call)하거나 매각(put)할 수 있는 권리를 사고 파는 계약으로서, 기초자산 가격의 변화에 대해 비대칭 적 손익구조(asymmetric payoffs)를 가진다. 옵션계약은 거래시점에 프리미엄을 지급한 다는 점에서 선도계약이나 선물과 차이가 있다. 스왑은 일반적으로 두 개의 금융자산 또 는 부채에서 파생되는 미래의 현금흐름을 교환하기로 하는 계약으로서, 서로 다른 통화표 시 채무의 원리금 상환을 교환하기로 약정하는 통화스왑(currency swaps)과 변동금리채 무와 고정금리채무간의 이자지급을 교환하기로 약정하는 금리스왑(interest rate swaps) 등이 있다.',
  },
  '페더럴펀드': {
    title: '페더럴펀드',
    content: '페더럴펀드(Federal Funds)는 미 연방준비은행에 지급준비금 예치의무가 있는 예금은 행이 지급준비금 과부족을 조절하기 위해 여타 예금은행, 정부보증기관(government- sponsored enterprises) 등으로부터 무담보로 차입한 자금을 말한다. 동 자금이 거래되 는 시장을 페더럴펀드시장(federal funds market)이라고 한다. 다만 글로벌 금융위기 및 코로나19 위기 등으로 미 연준이 대규모 자산매입을 실시함에 따라 초과지준이 대폭 늘 어나게 되면서 지급준비금 의무적립의 실효성이 크게 감소하였다. 미 연준은 이를 고려하 여 2020.3월중 지급준비율을 0%로 조정하면서 지급준비 의무가 사라지게 되었다. 이에 따라 페더럴펀드시장의 일평균 거래규모도 글로벌 금융위기 이전보다 크게 축소되었다. 페더럴펀드 거래 만기는 대부분 익일물이며, 기일물(term federal funds)의 경우 만기 제 한은 없으나 통상 1년을 넘지 않는다. 페더럴펀드시장의 구조를 보면, 지준을 적립할 수 있는 상업은행, 저축대부조합(Savings and Loan Association), 상호저축은행(Mutual Savings Bank), 신용협동조합(Credit Union), 해외은행의 미국 지점 등은 페더럴펀드시 장에서 자금 차입과 공급이 모두 가능하다. 반면 지준을 적립할 수 없는 정부기관, 정부보 증기관, 국제기구 및 증권딜러(securities dealer) 등은 페더럴펀드시장에서 자금을 공급 할 수는 있으나 차입할 수는 없다. 글로벌 금융위기 이후 미 연준은 풍부한 지준(ample reserve system) 하에서 지급준비금에 이자를 지급하는 지준부리(interest on reserve balances)와 함께 국채 등 자산을 담보로 시장에서 자금을 차입함으로써 유동성을 흡수 하는 익일물 RP매각(overnight reverse repurchase agreement) 등 공개시장운영(open market operation)을 통해 페더럴펀드금리를 목표범위 내로 유도하고 있다.',
  },
  '평가절상/평가절하': {
    title: '평가절상/평가절하',
    content: '환율은 일반적으로 거래 대상물인 외국환(외국통화) 한 단위와 교환되는 자국 통화의 양으로 정의되는데, 원화절상은 외환시장에서 외환의 공급이 수요를 초과하여 외환의 가 치가 하락하고 원화의 가치는 상승하는 현상을, 반대로 원화절하는 외환의 수요가 공급 을 초과하여 외환의 가치가 상승하고 원화의 가치는 하락하는 현상을 의미한다. 원화절상 시 환율은 하락하게 되는데 이를 평가절상이라고도 말한다. 반면 원화절하 시에는 환율이 상승하는데 이를 평가절하라고도 말한다. 그러나 평가절상(Revaluation)이나 평가절하 (Devaluation), 또는 절상(appreciation)이나 절하(depreciation)의 의미는 일반적으로 는 고정환율제도와 자유변동환율제도 중 어느 환율제도를 채택하느냐에 따라 구분된다. 즉 평가절상(또는 평가절하)은 고정환율제도하에서 정부가 정책적 목적 등으로 자국통화 의 대외가치인 환율을 인위적으로 일시에 조정하였을 경우 사용되며, 절상(또는 절하)은 일반적으로 자유변동환율제도하에서 환율이 외환시장의 수급기능에 의해 변동하였을 경 우에 사용된다.',
  },
  '평잔/말잔': {
    title: '평잔/말잔',
    content: '평잔과 말잔은 금융기관의 업무에서 자주 사용되는 용어로, 각각 평균잔액(average balance)과 기말잔액(end-of period balance)의 줄임말이다. 평잔(평균잔액)은 일정 기 간의 일일 잔액을 합산한 후 해당 기간의 일수로 나눈 값으로 평균치를 의미한다. 예를 들 어 3월 1일부터 3월 31일까지의 1개월 평잔은 각 날짜의 잔액을 합산한 후 31로 나눈 값 이다. 은행 등은 이자 계산이나 수익 평가시 평잔을 주로 사용한다. 반면 말잔(기말잔액) 은 일정 기간의 말일 시점에서 측정된 잔액이다. 예를 들어 6월말이나 12월말의 잔액을 가리킨다. 은행 등은 결산이나 특정 시점의 잔액을 표시할 때 사용한다. 금융기관의 작성 편의상 말잔이 용이함에도 평잔을 편제하는 이유는 기간 말일이 되면 경제주체의 자금 운 용 행태가 크게 달라질 가능성이 있기 때문이다. 예를 들어 기업들은 분기말에 재무비율 개선을 위해 자금을 상환하였다가 다음 분기 초에 다시 대출을 받는 행태를 보인다. 이러 한 행태로 인해 분기말에 일시적으로 잔액이 감소할 수 있기 때문에 평잔을 관측할 필요 가 있다.',
  },
  '표면금리': {
    title: '표면금리',
    content: '표면금리(Coupon Rate)란 채권의 액면가에 대한 연간 이자지급 비율을 채권표면에 표시 한 것으로서 계약기간 동안 지급을 약속한 고정금리이다. 표면금리가 높을수록 채권 매수 자는 동일 액면가에 대해 더 많은 이자를 받게 된다. 채권가격은 표면금리와 시장의 실세 금리에 의해 결정된다. 채권발행 당시에 표면금리(연1회 후불 지급을 가정)와 실세금리가 같으면 채권은 액면가로 거래된다. 이때 표면금리가 실세금리보다 낮으면 액면가 이하로, 높으면 액면가 이상으로 거래된다. 일반적으로 채권가격은 100을 중심으로 나타내는데 이 경우에 표면금리가 실세금리와 같다는 의미이다. 만일 실세금리가 하락한다면 채권의 내재가치는 100을 상회하게 되며 채권의 균형가격도 이에 따라 형성된다.',
  },
  '풋옵션': {
    title: '풋옵션',
    content: '풋옵션(Put Option)이란 거래당사자들이 미리 정한 가격(행사가격, strike price)으로 만 기일 또는 그 이전에 일정자산(기초자산)을 팔 수 있는 권리를 매매하는 계약이다. 거래 대상이 되는 자산은 특정 주식, 주가지수, 통화, 금리 등 매우 다양하다. 풋옵션 매입자에 게는 동 자산을 매도할 수 있는 권리가 부여되는 대신 풋옵션 매입자는 풋옵션 매도자에 게 그 대가인 프리미엄을 지급한다. 그러나 옵션은 권리를 행사하지 않을 권리도 있기 때 문에 풋옵션 매입자는 자신에게 유리할 때만 권리를 행사하고 불리하면 권리를 포기할 수 있다. 그러나 풋옵션 매도자는 일정한 대가(프리미엄)를 받기 때문에 상대방의 권리 행사 에 반드시 응하여야 한다. 풋옵션 손익 구조를 보면 다음과 같다. 풋옵션 매입자는 기초자 산의 현재 가격이 행사가격보다 낮은 경우 매도권리를 행사(기초자산 매도)함으로써 이익 ([행사가격-현재가격]-프리미엄)을 얻게 되며 풋옵션 매도자는 손실(프리미엄-[행사가격- 현재가격])이 발생한다. 반면 기초자산의 현재 가격이 행사가격보다 높을 경우 풋옵션 매 입자는 매도권리를 포기함으로써 지급한 프리미엄만큼 손실이 발생하고 풋옵션 매도자는 수취한 프리미엄만큼 이익을 얻게 된다.',
  },
  '프로그램매매': {
    title: '프로그램매매',
    content: '프로그램매매(Program Trading)란 주식시장에서 시장분석, 투자시점 판단, 매매 지시 등의 과정을 컴퓨터 프로그램을 통해 일괄 처리하여 다수의 종목을 동시에 거래하는 기법 을 말한다. 우리나라에서 한국거래소는 동일한 투자자가 KOSPI종목 중 15개 이상을 동 시에 거래하는 것을 프로그램매매로 규정하고 있으며 이를 ‘지수차익거래’와 ‘비차익거 래’로 구분하고 있다. 차익거래는 현물과 선물(또는 옵션) 중 상대적으로 고평가된 것을 매도하고 저평가된 것을 매수하는 포지션을 취함으로써 차익을 얻는 거래를 말한다. 이 경우 현물과 선물의 가격이 동일해지는 선물 만기 시점에 차익을 실현하거나 그전에 양자 간 상대가격의 변동을 감안하여 당초의 포지션을 뒤집는 반대매매를 통해 차익을 실현하 게 된다. 우리나라의 경우 현물은 주로 KOSPI200 구성 종목이고 선물은 KOSPI200지수 선물이 이에 해당된다. 비차익거래는 선물과 무관하게 일정수 이상의 종목(코스피 구성종 목 중 15개 이상)을 일괄 매매하는 방식으로 주로 외국인 및 기관투자자들이 종목 바스켓 (주식집단)을 구성하여 매매할 때 이용된다.',
  },
  '프로젝트 파이낸싱': {
    title: '프로젝트 파이낸싱',
    content: '프로젝트 파이낸싱(PF; Project Financing)이란 석유개발, 탄광채굴, 조선소, 발전소, 고 속도로 건설 등 대규모 사업을 추진하는 경우 그 프로젝트에 필요한 대규모의 소요자금과 각종 금융수요를 충족하기 위해서 동원되는 다수의 금융수단이나 투자금융기법을 통칭하 는 말이다. 실제로 프로젝트 파이낸싱은 다양한 형태로 설계 운용될 수 있는데 주요한 특 징적 요소를 살펴보면 대체로 다음과 같다. 먼저 통상적인 금융기관의 신용공여가 차입자 의 신용도에 대한 평가나 보유자산을 담보로 하여 이루어지는데 비해 PF는 프로젝트 자 체의 사업성 즉, 그 경제성이나 향후 가능성을 바탕으로 한다는 점에서 특징이 있다. 둘 째로 프로젝트에 대규모의 장기자금이 소요되는 데다 사업의 수익성이 높지만 위험부담 도 그만큼 크기 때문에 다수의 금융기관이 참여하는 협조융자 형태를 취하고 관련 금융 기관이 출자를 통해 모기업과는 별도의 특수목적법인(SPC) 즉 프로젝트회사를 설립하여 동 회사에 자금을 지원하는 형태를 취하여 모기업과 프로젝트회사 간에 리스크를 분산시 키는게 보통이다. 아울러 주도적인 금융기관은 단순한 자금공급원의 기능을 넘어 개발계 획의 입안 및 사업성 검토, 입찰준비, 신용보강 등에 광범위하게 참여하고 다양한 유형의 직간접 금융기법을 결합시키는 투자금융서비스도 제공하게 된다. 유럽 미국 등지에서는 1960년대부터 많이 사용되어 왔고 우리나라에서는 지난 2000년대 이후 사회간접자본 (SOC) 투자, 부동산 개발 등을 중심으로 많이 활용되는 모습을 보이고 있다.',
  },
  '프로젝트 한강': {
    title: '프로젝트 한강',
    content: '프로젝트 한강은 한국은행이 미래 디지털 금융인프라 구축을 위해 추진하는 중앙은행 디 지털화폐(CBDC) 및 예금토큰 활용성 테스트 사업을 말한다. 이는 한국은행, 금융위원회, 금융감독원을 비롯해 시중은행 등 다양한 금융기관이 협력하여 진행하는 민관공동 파일 럿 테스트이다. 프로젝트 한강의 핵심은 중앙은행 디지털화폐(CBDC) 시스템 구축, 예금 토큰 도입 및 활용, 디지털 바우처 기능 등 세 가지를 테스트하는 것이다. 먼저 중앙은행 디지털화폐(CBDC) 시스템 구축과 관련해서는 한국은행이 주관하는 분산원장 기술에 기 반한 디지털화폐 시스템 구축 가능성을 테스트한다. 이 디지털화폐는 참가은행들만 보유 하며, 은행간 예금토큰 거래의 실시간 결제자산으로 기능하게 되며 이를 통해 기존 결제 시스템의 복잡한 결제 및 정산 과정을 간소화하고 수수료를 절감하는 효과를 점검한다. 다음으로 예금토큰 도입 및 활용 테스트는 일반인들이 본인의 거래은행 계좌에 있는 예금 을 예금토큰으로 전환하여 실생활에서 물품 구매 및 서비스 결제에 사용할 수 있도록 구 성한다. 마지막으로 디지털 바우처 기능 테스트는 예금토큰에 스마트계약 기반의 디지털 바우처 기능을 부여하여 특정 용도나 사용처, 기간 등을 제한할 수 있도록 함으로써 정부 의 복지 바우처나 정책자금 등 조건부 자금의 효율적이고 투명한 집행 가능성을 모색한 다. 프로젝트 한강은 한국은행이 2020년부터 연구를 시작한 중앙은행 디지털화폐 실험의 실질적인 첫걸음으로서, 2025년 4월부터 6월말까지 약 10만명 규모의 일반 이용자를 대 상으로 실거래 테스트를 진행했다. 이 테스트 결과를 바탕으로 한국은행은 향후 디지털화 폐 관련 정책방향을 수립하고 후속 연구 및 테스트를 추진해 나갈 계획이다. 궁극적으로 는 미래 디지털 금융환경 변화에 선제적으로 대응하여 지급결제시스템의 안전성과 효율 성을 높이는 것을 목표로 하고 있다.',
  },
  '플라자 합의': {
    title: '플라자 합의',
    content: '플라자 합의는 1985년 9.22일 미국, 일본, 독일(당시 서독), 프랑스, 영국 등 주요 5개국 (G5) 재무장관과 중앙은행 총재들이 모여 체결한 국제 통화 및 환율 정책 합의이다. 플라 자 합의라는 명칭은 이 합의가 이루어진 미국 뉴욕의 플라자호텔에서 따 온 것이다. 이러 한 합의는 먼저 당시 미국 달러화의 지나친 강세로 인해 미국의 무역적자가 심화되고 있 었던 반면 다른 선진국들은 자국 통화의 약세로 경기침체를 겪고 있었다는 것을 배경으로 하고 있다. 이 합의는 그러한 현상을 해결하기 위하여 달러화의 가치를 인위적으로 하락 시키고, 일본 엔화와 독일 마르크화 등 주요국 통화의 가치를 절상시키기로 하였다. 합의 이후 2년간 엔화는 달러 대비 약 65.7%, 마르크화는 약 57% 절상되었는데 그 결과 일본 의 경우 수출 경쟁력이 급격히 약화되었고, 이를 만회하기 위해 일본 정부는 내수경기 부 양과 저금리 정책을 펼칠 수밖에 없었다. 이 과정에서 일본의 부동산과 주식시장이 과열 되어 버블이 형성됐고 이후 이어진 버블 붕괴는 일본의 ‘잃어버린 10년(장기 불황)’의 원 인이 되었다는 평가를 받고 있다.',
  },
  '플랫폼 노동자': {
    title: '플랫폼 노동자',
    content: '플랫폼 노동자는 온라인플랫폼을 통해 노동을 제공하고 대가를 받는 사람을 말한다. 배 달앱라이터 등이 있으며 스마트폰과 앱의 발달로 인해 증가하고 있다. 플랫폼노동은 유 연하고 편리한 노동형태이지만 노동권보호, 사회보험, 안전 등에 대한 제도적 보완이 필 요하다.',
  },
  '피셔효과': {
    title: '피셔효과',
    content: '1920년대 미국의 경제학자 어빙 피셔(Irving Fisher)가 발표한 이론으로, 피셔방정식 (Fisher equation)은 명목금리가 실질금리와 기대인플레이션의 합계와 같다고 표현한다. 시중의 명목금리가 상승했다면 그것은 실질금리의 상승이 원인일 수도 있고, 기대인플레 이션의 상승이 원인일 수도 있는 것이다. 피셔효과(Fisher effect)가 통화정책에서 나타 나는 사례를 살펴보자. 중앙은행이 정책금리를 인상하면 단기적으로 시중의 명목금리가 상승하지만, 중장기적으로는 오히려 명목금리가 하락할 가능성도 있다. 이는 중앙은행이 통화긴축을 실시할 경우 물가안정에 대한 기대감이 높아져 기대인플레이션이 낮아지면 명목금리가 하락하게 되기 때문이다. 한편, 국제피셔효과(international Fisher effect)는 자본의 국제적 이동이 자유롭다(즉, 국가 간의 실질금리는 동일하다)는 가정 하에 양국간 명목금리의 차이는 양국통화간 기대되는 환율변동과 같아진다는 이론이다. 국제피셔효과 는 피셔방정식과 구매력평가설을 함께 적용하여 설명할 수 있다. 완전한 자본이동성이 성 립(양국간 실질금리는 동일)할 경우, 피셔방정식에 의하면 양국간 명목금리 차이는 양국 간 기대인플레이션 차이와 같아진다. 여기에 구매력평가설(purchasing power parity) 이 성립한다고 가정하자. 즉, 동일한 물품은 어떤 국가에서도 같은 가격에 구입한다는 일 물일가(一物一價)의 법칙이 성립한다고 가정하자. 이 경우 자국의 물가수준은 외국의 물가 수준에 양국간 환율을 곱한 값이 된다. 이 관계를 시간에 대해 미분하여 상대적 변화율을 구하면, 양국간 기대인플레이션의 차이는 양국간 기대되는 환율변동과 같게 된다. 따라서 피셔방정식과 구매력평가설이 동시에 성립한다면, 양국간 명목금리의 차이는 양국간 기 대되는 환율변동과 같다.',
  },
  '피용자보수': {
    title: '피용자보수',
    content: '한 나라 국민이 생산활동에 참여한 결과 발생한 소득은 노동, 자본, 경영 등의 생산요소를 제공한 경제주체에 나누어진다. 이 중에서 노동을 제공한 대가로 피고용자에 분배되는 임 금 및 급여 등을 피용자보수(Compensation of Employees)라고 한다.',
  },
  '피용자보수비율': {
    title: '피용자보수비율',
    content: '한 나라에서 생산활동으로 발생된 소득은 노동, 자본 등 생산요소를 제공한 경제주체에 게 분배된다. 노동소득분배율은 국민소득(노동소득과 자본소득의 합)에서 노동소득이 차 지하는 비중으로, 노동소득과 국민소득의 범위를 어떻게 인식하느냐(자영업자의 노동 소득 추정 문제, 국민소득 산출시 고정자본소모의 포함 여부 등)에 따라 다양한 종류의 산식으로 측정이 가능하다. OECD 회원국을 비롯한 여러 국가와 국제기구들은 다양한 방법으로 노동소득분배율을 산출하고 있는데, 우리나라의 경우 한국은행에서 피용자보수 비율(Ratio of Compensation of Employees to NI)을 발표하고 있다. 피용자보수비율 은 좁은 의미의 국민소득(피용자보수와 영업잉여의 합)에서 피용자보수가 차지하는 비중 을 의미한다. 피용자보수비율은 한 나라의 경제 구조나 소득불균형 분석 등에 이용될 수 있다. 피용자보수비율은 일반적으로 노동의 가격이 자본의 가격보다 높을수록, 그리고 한 나라의 산업이 노동집약적일수록 그 값이 커지게 된다.',
  },
  '핀테크': {
    title: '핀테크',
    content: '핀테크(FinTech)는 ‘금융’(finance)과 ‘기술’(technology)의 합성어로 디지털 기술 혁신 을 통해 금융서비스를 획기적으로 효율화하거나 새 금융서비스를 개발하는 것을 뜻한다. 이는 혁신의 정도에 따라 전통적(traditional) 핀테크와 신흥(emergent) 핀테크로 구분 할 수 있다. 전통적 핀테크는 기존 금융서비스의 가치사슬 안에서 그 서비스의 효율을 높 이는 역할을 한다. 즉 기존 금융서비스를 자동화하려는 금융회사가 가치사슬의 핵심에 위 치하고 IT기업은 이를 보조하는 역할을 수행한다. 씨티은행이 블록체인 및 분산원장기술 을 활용해서 디지털화폐(Citicoin)로 글로벌 본·지점을 연결하여 자금을 이체하는 시스템 을 예시로 들 수 있다. 반면 신흥 핀테크는 플랫폼을 제공하는 IT기업이 가치사슬의 핵심 을 맡고 기존 금융서비스 전달체계를 변혁하여 파괴적(disruptive) 속성을 갖는다. 지점 이 없는 인터넷전문은행이 공인인증서 없는 비대면 거래로 기존 관행을 파괴함으로써 단 기간에 대규모 고객을 확보하거나, 대출금리와 송금수수료도 파격적으로 낮춤으로써 기 존 은행의 금리 및 수수료를 인하시키는 것을 예시로 들 수 있다. 이외에도 핀테크 사례로 서 인터넷뱅킹·모바일지급서비스·크라우드펀딩·P2P대출·로보어드바이저·스마트계약· 바이오인증 금융거래 등을 들 수 있다.',
  },
  '필립스곡선': {
    title: '필립스곡선',
    content: '뉴질랜드 출신의 영국인 경제학자 필립스(W. Phillips)는 1958년 명목 임금상승률과 실 업률이 역의 상관관계를 나타낸다는 것을 처음으로 관찰하였는데, 이러한 임금상승률과 실업률 사이의 반비례 관계를 나타내는 곡선을 필립스 곡선이라 한다. 즉 필립스는 1861 년에서 1957년 사이의 영국의 통계자료를 이용하여 실업률이 낮은 해에는 명목 임금상승 률이 높고, 반대로 실업률이 높은 해에는 명목 임금상승률이 낮다는 사실을 발견하였다. 일반적으로 명목 임금상승률과 물가상승률은 비슷한 움직임을 보이기 때문에 물가상승률 과 실업률 간의 안정적인 반비례 관계를 나타내는 곡선을 필립스 곡선이라 부른다. 이러 한 필립스 곡선은 단순히 경험적 관계로부터 도출되었지만, 완전고용을 이루면(실업률이 낮으면) 물가상승률이 높아지고(물가불안정), 완전고용에서 멀어지면(실업률이 높으면) 물가상승률이 낮아지는(물가안정) 완전고용과 물가안정 사이의 상충관계를 밝힘으로써 경제정책 분석에 크게 기여하였다.',
  },
  '한계비용': {
    title: '한계비용',
    content: '한계비용은 재화나 서비스를 한 단위 더 생산하는데 들어가는 비용의 증가분을 의미한 다. 즉 비용증가분을 생산증가분으로 나눈 값이다. 예를 들면, 생수 100병을 생산하는 데 10,000원의 비용이 소요된다면 생수 1병의 평균생산비용은 100원이다. 추가로 생수 한 병을 더 생산하여 101병, 102병을 생산할 때 비용이 각각 10,080원, 10,150원이라 면 생수 101병째의 한계비용은 10,080원 10,000원 = 80원, 102병째의 한계비용은 70 원이 된다. 생산의 경제성을 분석하는 데에 있어 비용이 얼마나 소요되는가도(10,080원 →10,150원) 중요하지만 생산을 늘림에 따라 증가하는 추가적 비용이 어떻게 변하는가를 (80원→70원) 살피는 것도 매우 중요하다. 왜냐하면 생산의 목적이 이윤을 극대화하는 데 있다면 반드시 한계비용의 움직임을 살펴보아야 판단할 수 있기 때문이다. 이는 수학적으 로 어떤 함수값(총비용)의 최소는 변수(생산규모)의 미분값이 0이 되는 곳에서 결정되는 데, 한계의 개념은 바로 미분과 일맥상통한다는 것을 상기하면 이해될 수 있다. 일반적으 로 생산이 증가하면서 한계비용은 점차 줄어들다가 어느 생산규모에 이르면 다시 늘어나 기 시작한다.',
  },
  '한계소비성향': {
    title: '한계소비성향',
    content: '개인의 소득은 소비와 저축으로 나누어지는데, 소득 중에서 소비로 쓰이는 비율을 소비성 향, 저축에 들어가는 비율을 저축성향이라고 한다. 한계소비성향은 새로 늘어난 소득 중 에서 소비로 지출되는 비율을 가리킨다. 즉 소득의 증가분을 △Y, 소비의 증가분을 △C로 하여 △C/△Y로 나타낸다. 일반적으로 물가상승기에는 한계소비성향이 높고 또 저소득 층은 고소득층에 비하여 한계소비성향이 높은 경향이 있다.',

  '한계효용': {
    title: '한계효용',
    content: '어떤 상품이나 서비스의 소비를 한 단위 늘림에 따라 추가로 증가한 효용을 한계효용이라 한다. 한계효용은 총효용의 변화분을 소비량의 변화분으로 나눔으로써 계산할 수 있다. 일반적으로 소비량이 증가함에 따라 전체 효용은 증가하지만, 한계효용은 그 크기가 점차 줄어든다(한계효용체감의 법칙).',
